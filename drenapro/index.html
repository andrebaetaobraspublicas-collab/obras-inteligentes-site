ponsabilidade técnica\"],\n  saved:[\"Projetos salvos\",\"Biblioteca local, importação e cópias de segurança\"],\n  idf:[\"Chuva e IDF\",\"Intensidade, duração e frequência da precipitação\"],\n  basins:[\"Bacias\",\"Áreas de contribuição e coeficientes ponderados\"],\n  tc:[\"Tempo de concentração\",\"Comparação e seleção de métodos\"],\n  rational:[\"Método racional\",\"Vazões de projeto por bacia\"],\n  gutters:[\"Sarjetas\",\"Capacidade, espalhamento, profundidade e velocidade\"],\n  inlets:[\"Bocas de lobo\",\"Captação, obstrução, eficiência e vazão residual\"],\n  pipes:[\"Galerias\",\"Dimensionamento e verificação dos trechos\"],\n  structures:[\"Poços e caixas\",\"Nós, profundidades e perdas localizadas\"],\n  channels:[\"Canais\",\"Escoamento uniforme e regime hidráulico\"],\n  network:[\"Rede integrada\",\"Conectividade, acumulação e perfil longitudinal\"],\n  checks:[\"Verificações\",\"Alertas de consistência e desempenho\"],\n  memory:[\"Memorial de cálculo\",\"Fórmulas, substituições e conclusões\"],\n  report:[\"Relatório técnico\",\"Documento para impressão e exportação\"],\n  settings:[\"Configurações\",\"Parâmetros, bibliotecas e critérios\"]\n};\nfunction showPage(page){\n  $$(\".section\").forEach(s=>s.classList.toggle(\"active\",s.id===`sec-${page}`));\n  $$(\"#nav button[data-page]\").forEach(b=>b.classList.toggle(\"active\",b.dataset.page===page));\n  const info=PAGE_INFO[page]||[page,\"\"];$(\"pageTitle\").textContent=info[0];$(\"pageSubtitle\").textContent=info[1];\n  $(\"sidebar\").classList.remove(\"open\");\n  if(page===\"report\")renderReport();\n  if(page===\"memory\")renderMemory();\n  if(page===\"network\"){requestAnimationFrame(()=>{drawNetwork();drawProfile()})}\n  if(page===\"idf\")requestAnimationFrame(drawIdfChart);\n  if(page===\"dashboard\")requestAnimationFrame(drawBasinChart);\n}\nfunction renderAll(){\n  calculateNetworkFlows();\n  updateSideProject();renderProjectForm();renderSaved();renderIdf();renderBasins();renderTcSelectors();\n  renderRational();renderGutters();renderInlets();renderPipes();renderStructures();renderChannels();renderNetwork();\n  lastChecks=getChecks();renderChecks();renderDashboard();renderSettings();renderMemory();renderReport();\n  autosave();\n}\nfunction renderProjectForm(){\n  const p=state.project,map={pName:\"name\",pCode:\"code\",pVersion:\"version\",pEngineer:\"engineer\",pRegistry:\"registry\",pClient:\"client\",pDate:\"date\",pCity:\"city\",pState:\"state\",pAddress:\"address\",pOccupation:\"occupation\",pCrs:\"crs\",pDescription:\"description\",pNotes:\"notes\"};\n  for(const [id,k] of Object.entries(map))if($(id))$(id).value=p[k]??\"\";\n}\nfunction collectProjectForm(){\n  const map={pName:\"name\",pCode:\"code\",pVersion:\"version\",pEngineer:\"engineer\",pRegistry:\"registry\",pClient:\"client\",pDate:\"date\",pCity:\"city\",pState:\"state\",pAddress:\"address\",pOccupation:\"occupation\",pCrs:\"crs\",pDescription:\"description\",pNotes:\"notes\"};\n  for(const [id,k] of Object.entries(map))state.project[k]=sval(id);\n  state.project.name=state.project.name||\"Novo projeto\";persist(true);toast(\"Dados do projeto aplicados.\");\n}\nfunction renderSaved(){\n  const lib=getLibrary();\n  if(!lib.length){$(\"savedProjects\").innerHTML='<div class=\"muted center\" style=\"padding:30px\">Nenhum projeto salvo na biblioteca.<\u002Fdiv>';return}\n  $(\"savedProjects\").innerHTML=`<div class=\"table-wrap\"><table><thead><tr><th>Projeto<\u002Fth><th>Código<\u002Fth><th>Versão<\u002Fth><th>Modificado<\u002Fth><th>Conteúdo<\u002Fth><th><\u002Fth><\u002Ftr><\u002Fthead><tbody>${lib.map((s,i)=>`<tr>\n    <td><b>${escapeHTML(s.project?.name||\"Sem nome\")}<\u002Fb><br><small class=\"muted\">${escapeHTML(s.project?.city||\"\")}<\u002Fsmall><\u002Ftd>\n    <td>${escapeHTML(s.project?.code||\"—\")}<\u002Ftd><td>${escapeHTML(s.project?.version||\"—\")}<\u002Ftd>\n    <td>${new Date(s.modified||Date.now()).toLocaleString(\"pt-BR\")}<\u002Ftd>\n    <td>${(s.basins||[]).length} bacias • ${(s.pipes||[]).length} trechos<\u002Ftd>\n    <td class=\"t-actions\"><button data-lib-open=\"${i}\">Abrir<\u002Fbutton><button data-lib-duplicate=\"${i}\">Duplicar<\u002Fbutton><button data-lib-export=\"${i}\">JSON<\u002Fbutton><button data-lib-delete=\"${i}\" style=\"color:var(--danger)\">Excluir<\u002Fbutton><\u002Ftd>\n  <\u002Ftr>`).join(\"\")}<\u002Ftbody><\u002Ftable><\u002Fdiv>`;\n}\nfunction renderIdf(){\n  const x=state.idf;\n  for(const [id,k] of Object.entries({idfK:\"K\",idfA:\"a\",idfB:\"b\",idfC:\"c\",idfTr:\"tr\",idfT:\"t\",idfStation:\"station\",idfSource:\"source\"}))$(id).value=x[k]??\"\";\n  const i=idfIntensity(),lsHa=i/3.6;\n  $(\"idfResult\").innerHTML=`<small>Intensidade calculada<\u002Fsmall><div class=\"big\">${fmt(i,2)} mm/h<\u002Fdiv>\n    <div class=\"kpi-row mt\"><div><b>${fmt(lsHa,2)}<\u002Fb><small>L/s·ha<\u002Fsmall><\u002Fdiv><div><b>${fmt(x.tr,1)}<\u002Fb><small>anos<\u002Fsmall><\u002Fdiv><div><b>${fmt(x.t,1)}<\u002Fb><small>min<\u002Fsmall><\u002Fdiv><\u002Fdiv>\n    <div class=\"formula mt\">i = ${fmt(x.K,3)} × ${fmt(x.tr,2)}^${fmt(x.a,3)} ÷ (${fmt(x.t,2)} + ${fmt(x.b,3)})^${fmt(x.c,3)}\ni = ${fmt(i,3)} mm/h<\u002Fdiv>`;\n  requestAnimationFrame(drawIdfChart);\n}\nfunction renderBasins(){\n  const rows=state.basins.map(b=>{\n    const A=basinArea(b),sum=basinSurfaceArea(b),C=basinC(b),diff=Math.abs(A-sum),ok=A>0&&C>=0&&C<=1&&diff<=Math.max(.001,A*.01);\n    return `<tr><td><b>${escapeHTML(b.code)}<\u002Fb><\u002Ftd><td>${escapeHTML(b.name||\"—\")}<\u002Ftd><td>${fmt(A,3)}<\u002Ftd><td>${fmt(C,3)}<\u002Ftd><td>${fmt(b.length,1)}<\u002Ftd><td>${fmt(b.drop,2)}<\u002Ftd><td>${fmt(b.tc,2)}<\u002Ftd><td>${escapeHTML(b.outlet||\"—\")}<\u002Ftd><td>${statusBadge(ok?\"ok\":\"warn\",ok?\"Consistente\":\"Revisar\")}<\u002Ftd><td class=\"t-actions\"><button data-edit-basin=\"${b.id}\">Editar<\u002Fbutton><button data-copy-basin=\"${b.id}\">Duplicar<\u002Fbutton><\u002Ftd><\u002Ftr>`;\n  }).join(\"\");\n  $(\"basinRows\").innerHTML=rows||'<tr><td colspan=\"10\" class=\"muted center\">Nenhuma bacia cadastrada.<\u002Ftd><\u002Ftr>';\n}\nfunction renderTcSelectors(){\n  const current=$(\"tcBasin\").value;\n  $(\"tcBasin\").innerHTML=`<option value=\"\">Selecione...<\u002Foption>${state.basins.map(b=>`<option value=\"${b.id}\">${escapeHTML(b.code)} — ${escapeHTML(b.name)}<\u002Foption>`).join(\"\")}`;\n  if(state.basins.some(b=>b.id===current))$(\"tcBasin\").value=current;\n}\nfunction renderTcResults(){\n  if(!tcComparison.length){$(\"tcResults\").innerHTML='<div class=\"muted center\">Preencha os dados e calcule.<\u002Fdiv>';return}\n  const vals=tcComparison.filter(x=>Number.isFinite(x.value)).map(x=>x.value),min=Math.min(...vals),max=Math.max(...vals),avg=vals.reduce((a,b)=>a+b,0)/vals.length;\n  $(\"tcResults\").innerHTML=`<div class=\"grid g3 mb\"><div class=\"result\"><small>Mínimo<\u002Fsmall><div class=\"big\">${fmt(min,2)} min<\u002Fdiv><\u002Fdiv><div class=\"result\"><small>Média<\u002Fsmall><div class=\"big\">${fmt(avg,2)} min<\u002Fdiv><\u002Fdiv><div class=\"result\"><small>Máximo<\u002Fsmall><div class=\"big\">${fmt(max,2)} min<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n  <div class=\"table-wrap\"><table><thead><tr><th>Adotar<\u002Fth><th>Método<\u002Fth><th>Tc (min)<\u002Fth><th>Expressão<\u002Fth><th>Observação<\u002Fth><\u002Ftr><\u002Fthead><tbody>${tcComparison.map((x,i)=>`<tr><td><input type=\"radio\" name=\"tcPick\" value=\"${i}\" ${i===state.tcSelection?\"checked\":\"\"}><\u002Ftd><td><b>${escapeHTML(x.name)}<\u002Fb><\u002Ftd><td>${fmt(x.value,2)}<\u002Ftd><td><span class=\"code\" style=\"padding:3px 5px\">${escapeHTML(x.formula)}<\u002Fspan><\u002Ftd><td>${x.valid?escapeHTML(x.note):statusBadge(\"danger\",\"Dados inválidos\")}<\u002Ftd><\u002Ftr>`).join(\"\")}<\u002Ftbody><\u002Ftable><\u002Fdiv>`;\n}\nfunction renderRational(){\n  const items=state.basins.map(b=>({b,r:rationalForBasin(b)}));\n  $(\"rArea\").textContent=`${fmt(items.reduce((s,x)=>s+x.r.area,0),2)} ha`;\n  $(\"rFlow\").textContent=`${fmt(items.reduce((s,x)=>s+x.r.q,0),3)} m³/s`;\n  $(\"rIntensity\").textContent=`${fmt(items.length?Math.max(...items.map(x=>x.r.i)):0,1)} mm/h`;\n  $(\"rTr\").textContent=`${fmt(state.idf.tr,0)} anos`;\n  $(\"rationalRows\").innerHTML=items.map(({b,r})=>`<tr><td><b>${escapeHTML(b.code)}<\u002Fb><\u002Ftd><td>${fmt(r.area,3)}<\u002Ftd><td>${fmt(r.C,3)}<\u002Ftd><td>${fmt(r.tc,2)}<\u002Ftd><td>${fmt(r.i,2)}<\u002Ftd><td><b>${fmt(r.q,4)}<\u002Fb><\u002Ftd><td>${fmt(r.ls,1)}<\u002Ftd><td><span class=\"code\" style=\"padding:3px 6px\">Q = ${fmt(r.C,3)} × ${fmt(r.i,2)} × ${fmt(r.area,3)} / 360<\u002Fspan><\u002Ftd><\u002Ftr>`).join(\"\")||'<tr><td colspan=\"8\" class=\"muted center\">Cadastre bacias para calcular as vazões.<\u002Ftd><\u002Ftr>';\n}\n\nfunction worstLevel(levels){\n  return levels.includes(\"danger\")?\"danger\":levels.includes(\"warn\")?\"warn\":levels.includes(\"info\")?\"info\":\"ok\";\n}\nfunction gutterLevel(g,m=gutterMetrics(g)){\n  const levels=[];\n  if(m.util>1||m.depth>asNumber(g.maxDepth,state.settings.maxGutterDepth)*1.001)levels.push(\"danger\");\n  else if(m.util>=state.settings.warnUtil/100)levels.push(\"warn\");\n  if(m.spread>asNumber(g.maxSpread,state.settings.maxSpread))levels.push(\"danger\");\n  if(m.velocity>state.settings.maxV)levels.push(\"danger\");\n  if(m.q>0&&m.velocity<state.settings.minV)levels.push(\"warn\");\n  return worstLevel(levels);\n}\nfunction inletLevel(x,m=inletMetrics(x)){\n  if(m.residual>1e-8||m.eff<state.settings.minInletEff/100)return \"danger\";\n  if(m.eff<.8||m.clog>.5)return \"warn\";return \"ok\";\n}\nfunction pipeLevel(p,m=p.metrics||pipeMetrics(p)){\n  const levels=[];\n  if(m.util>1||m.fill>state.settings.maxFill/100+.002)levels.push(\"danger\");\n  else if(m.util>=state.settings.warnUtil/100)levels.push(\"warn\");\n  if(m.q>0&&m.velocity<state.settings.minV)levels.push(\"warn\");\n  if(m.velocity>state.settings.maxV)levels.push(\"danger\");\n  if(Number.isFinite(m.cover)&&m.cover<state.settings.minCover)levels.push(\"danger\");\n  if(asNumber(p.slope)<=0)levels.push(\"danger\");\n  if(!p.from||!p.to)levels.push(\"info\");\n  return worstLevel(levels);\n}\nfunction channelLevel(ch,m=channelMetrics(ch)){\n  const levels=[];\n  if(Number.isFinite(m.freeboard)&&m.freeboard<0)levels.push(\"danger\");\n  else if(Number.isFinite(m.freeboard)&&m.freeboard<state.settings.minFreeboard)levels.push(\"warn\");\n  if(m.V>asNumber(ch.maxV,state.settings.maxV))levels.push(\"danger\");\n  if(m.q>0&&m.V<state.settings.minV)levels.push(\"warn\");\n  if(asNumber(ch.tauAdmissible)>0&&m.tau>asNumber(ch.tauAdmissible))levels.push(\"danger\");\n  return worstLevel(levels);\n}\nfunction labelForLevel(level){return level===\"ok\"?\"Adequado\":level===\"warn\"?\"Atenção\":level===\"danger\"?\"Insuficiente\":\"Incompleto\"}\n\nfunction renderGutters(){\n  $(\"gutterRows\").innerHTML=state.gutters.map(g=>{const m=gutterMetrics(g),level=gutterLevel(g,m);return `<tr>\n    <td><b>${escapeHTML(g.code)}<\u002Fb><\u002Ftd><td>${fmt(m.q,4)} m³/s<\u002Ftd><td>${fmt(g.slopeLong,4)}<\u002Ftd><td>${fmt(g.crossSlope,4)}<\u002Ftd><td>${fmt(g.n,3)}<\u002Ftd>\n    <td>${fmt(m.depth,3)} m<\u002Ftd><td>${fmt(m.spread,2)} m<\u002Ftd><td>${fmt(m.velocity,2)} m/s<\u002Ftd><td>${fmt(m.cap,4)} m³/s<\u002Ftd>\n    <td>${statusBadge(level,labelForLevel(level))}<\u002Ftd><td class=\"t-actions\"><button data-edit-gutter=\"${g.id}\">Editar<\u002Fbutton><button data-copy-item=\"gutter:${g.id}\">Duplicar<\u002Fbutton><\u002Ftd><\u002Ftr>`}).join(\"\")||'<tr><td colspan=\"11\" class=\"muted center\">Nenhuma sarjeta cadastrada.<\u002Ftd><\u002Ftr>';\n}\nfunction renderInlets(){\n  $(\"inletRows\").innerHTML=state.inlets.map(x=>{const m=inletMetrics(x),level=inletLevel(x,m),dims=`${fmt(x.length,2)} × ${fmt(x.width||x.height,2)} m`;return `<tr>\n    <td><b>${escapeHTML(x.code)}<\u002Fb><\u002Ftd><td>${escapeHTML(x.type)}<\u002Ftd><td>${fmt(m.q,4)} m³/s<\u002Ftd><td>${dims}<\u002Ftd><td>${fmt(m.clog*100,0)}%<\u002Ftd>\n    <td>${fmt(m.cap,4)}<\u002Ftd><td>${fmt(m.captured,4)}<\u002Ftd><td>${fmt(m.residual,4)}<\u002Ftd><td>${pct(m.eff,1)}<\u002Ftd>\n    <td>${statusBadge(level,labelForLevel(level))}<\u002Ftd><td class=\"t-actions\"><button data-edit-inlet=\"${x.id}\">Editar<\u002Fbutton><button data-copy-item=\"inlet:${x.id}\">Duplicar<\u002Fbutton><\u002Ftd><\u002Ftr>`}).join(\"\")||'<tr><td colspan=\"11\" class=\"muted center\">Nenhuma boca de lobo cadastrada.<\u002Ftd><\u002Ftr>';\n}\nfunction pipeDimLabel(p){\n  return p.shape===\"rectangular\"?`${fmt(p.width,2)} × ${fmt(p.height,2)} m`:`DN ${fmt(p.diameter,0)} mm`;\n}\nfunction renderPipes(){\n  $(\"pipeRows\").innerHTML=state.pipes.map(p=>{const m=p.metrics||pipeMetrics(p),level=pipeLevel(p,m);return `<tr>\n    <td><b>${escapeHTML(p.code)}<\u002Fb><\u002Ftd><td>${escapeHTML(p.from||\"?\")} → ${escapeHTML(p.to||\"?\")}<\u002Ftd><td>${fmt(p.qLocal,4)}<\u002Ftd><td><b>${fmt(p.qAccum,4)}<\u002Fb><\u002Ftd>\n    <td>${p.shape===\"rectangular\"?\"Retangular\":\"Circular\"}<\u002Ftd><td>${pipeDimLabel(p)}<\u002Ftd><td>${fmt(p.slope,4)}<\u002Ftd><td>${fmt(p.n,3)}<\u002Ftd><td>${fmt(p.length,1)} m<\u002Ftd>\n    <td>${pct(m.fill,1)}<\u002Ftd><td>${fmt(m.velocity,2)} m/s<\u002Ftd><td>${fmt(m.cap,4)}<\u002Ftd><td>${fmt(m.cover,2)} m<\u002Ftd>\n    <td>${statusBadge(level,labelForLevel(level))}<\u002Ftd><td class=\"t-actions\"><button data-edit-pipe=\"${p.id}\">Editar<\u002Fbutton><button data-copy-item=\"pipe:${p.id}\">Duplicar<\u002Fbutton><\u002Ftd><\u002Ftr>`}).join(\"\")||'<tr><td colspan=\"15\" class=\"muted center\">Nenhum trecho de galeria cadastrado.<\u002Ftd><\u002Ftr>';\n}\nfunction structureConnections(st){\n  return {incoming:state.pipes.filter(p=>String(p.to)===String(st.code)),outgoing:state.pipes.filter(p=>String(p.from)===String(st.code))};\n}\nfunction renderStructures(){\n  $(\"structureRows\").innerHTML=state.structures.map(st=>{const c=structureConnections(st),depth=asNumber(st.ground)-asNumber(st.invert);let level=\"ok\";if(depth<=0)level=\"danger\";else if(depth<state.settings.minCover)level=\"warn\";return `<tr>\n    <td><b>${escapeHTML(st.code)}<\u002Fb><\u002Ftd><td>${escapeHTML(st.type)}<\u002Ftd><td>${fmt(st.ground,2)} m<\u002Ftd><td>${fmt(st.invert,2)} m<\u002Ftd><td>${fmt(depth,2)} m<\u002Ftd>\n    <td>${fmt(st.width,2)} × ${fmt(st.length,2)} m<\u002Ftd><td>${fmt(st.k,2)}<\u002Ftd><td>${c.incoming.map(p=>escapeHTML(p.code)).join(\", \")||\"—\"}<\u002Ftd><td>${c.outgoing.map(p=>escapeHTML(p.code)).join(\", \")||\"—\"}<\u002Ftd>\n    <td>${statusBadge(level,labelForLevel(level))}<\u002Ftd><td class=\"t-actions\"><button data-edit-structure=\"${st.id}\">Editar<\u002Fbutton><button data-copy-item=\"structure:${st.id}\">Duplicar<\u002Fbutton><\u002Ftd><\u002Ftr>`}).join(\"\")||'<tr><td colspan=\"11\" class=\"muted center\">Nenhuma estrutura cadastrada.<\u002Ftd><\u002Ftr>';\n}\nfunction renderChannels(){\n  $(\"channelRows\").innerHTML=state.channels.map(ch=>{const m=channelMetrics(ch),level=channelLevel(ch,m);return `<tr>\n    <td><b>${escapeHTML(ch.code)}<\u002Fb><\u002Ftd><td>${escapeHTML(ch.shape)}<\u002Ftd><td>${fmt(ch.q,4)}<\u002Ftd><td>${fmt(ch.width,2)}<\u002Ftd><td>${fmt(ch.z,2)}<\u002Ftd><td>${fmt(ch.slope,4)}<\u002Ftd><td>${fmt(ch.n,3)}<\u002Ftd>\n    <td>${fmt(m.yn,3)}<\u002Ftd><td>${fmt(m.yc,3)}<\u002Ftd><td>${fmt(m.V,2)}<\u002Ftd><td>${fmt(m.Fr,2)}<\u002Ftd><td>${m.regime}<\u002Ftd><td>${fmt(m.freeboard,2)} m<\u002Ftd>\n    <td>${statusBadge(level,labelForLevel(level))}<\u002Ftd><td class=\"t-actions\"><button data-edit-channel=\"${ch.id}\">Editar<\u002Fbutton><button data-copy-item=\"channel:${ch.id}\">Duplicar<\u002Fbutton><\u002Ftd><\u002Ftr>`}).join(\"\")||'<tr><td colspan=\"15\" class=\"muted center\">Nenhum canal cadastrado.<\u002Ftd><\u002Ftr>';\n}\nfunction renderNetwork(){\n  calculateNetworkFlows();\n  const nodes=new Set(state.pipes.flatMap(p=>[p.from,p.to]).filter(Boolean));\n  const maxQ=state.pipes.length?Math.max(...state.pipes.map(p=>asNumber(p.qAccum))):0;\n  const utils=state.pipes.map(p=>p.metrics?.util).filter(Number.isFinite),maxUtil=utils.length?Math.max(...utils):0;\n  $(\"nNodes\").textContent=nodes.size;$(\"nEdges\").textContent=state.pipes.length;$(\"nOutletFlow\").textContent=`${fmt(maxQ,3)} m³/s`;$(\"nMinUtil\").textContent=pct(maxUtil,0);\n  $(\"networkRows\").innerHTML=state.pipes.map(p=>{const m=p.metrics||pipeMetrics(p),level=pipeLevel(p,m),basins=state.basins.filter(b=>String(b.outlet)===String(p.code)||String(b.outlet)===String(p.id)).map(b=>b.code);return `<tr>\n    <td><b>${escapeHTML(p.code)}<\u002Fb><\u002Ftd><td>${escapeHTML(p.from||\"—\")}<\u002Ftd><td>${escapeHTML(p.to||\"—\")}<\u002Ftd><td>${basins.join(\", \")||\"—\"}<\u002Ftd><td>${fmt(p.qLocal,4)}<\u002Ftd><td>${fmt(p.qAccum,4)}<\u002Ftd><td>${fmt(m.cap,4)}<\u002Ftd><td>${pct(m.util,1)}<\u002Ftd><td>${fmt(m.travel,2)} min<\u002Ftd><td>${statusBadge(level,labelForLevel(level))}<\u002Ftd><\u002Ftr>`}).join(\"\")||'<tr><td colspan=\"10\" class=\"muted center\">Cadastre trechos para montar a rede.<\u002Ftd><\u002Ftr>';\n  const paths=networkPaths(),selected=$(\"profilePath\").value;\n  $(\"profilePath\").innerHTML=paths.map((path,i)=>`<option value=\"${i}\">${path.map(p=>escapeHTML(p.code)).join(\" → \")}<\u002Foption>`).join(\"\")||'<option value=\"\">Sem percurso<\u002Foption>';\n  if(paths[selected])$(\"profilePath\").value=selected;\n  requestAnimationFrame(()=>{drawNetwork();drawProfile()});\n}\nfunction completionData(){\n  const checks=[\n    [\"Projeto\",!!state.project.name&&state.project.name!==\"Novo projeto\"],\n    [\"Equação IDF\",!!state.idf.source&&idfIntensity()>0],\n    [\"Bacias\",state.basins.length>0&&state.basins.every(b=>basinArea(b)>0&&basinC(b)>0)],\n    [\"Tempo de concentração\",state.basins.length>0&&state.basins.every(b=>asNumber(b.tc)>0)],\n    [\"Vazões\",state.basins.length>0&&state.basins.every(b=>rationalForBasin(b).q>0)],\n    [\"Dispositivos\",state.gutters.length+state.inlets.length>0],\n    [\"Rede\",state.pipes.length>0&&state.pipes.every(p=>p.from&&p.to)],\n    [\"Relatório\",state.project.engineer&&state.project.registry]\n  ];\n  return {checks,done:checks.filter(x=>x[1]).length,pct:checks.filter(x=>x[1]).length/checks.length*100};\n}\nfunction renderDashboard(){\n  const areas=state.basins.reduce((s,b)=>s+basinArea(b),0),maxQ=state.pipes.length?Math.max(...state.pipes.map(p=>asNumber(p.qAccum))):state.basins.reduce((s,b)=>s+rationalForBasin(b).q,0);\n  $(\"mArea\").textContent=`${fmt(areas,2)} ha`;$(\"mFlow\").textContent=`${fmt(maxQ,3)} m³/s`;\n  $(\"mPipe\").textContent=`${fmt(state.pipes.reduce((s,p)=>s+asNumber(p.length),0),0)} m`;\n  $(\"mDevices\").textContent=state.gutters.length+state.inlets.length+state.structures.length+state.channels.length;\n  const critical=lastChecks.filter(x=>x.level===\"danger\").length;$(\"mCritical\").textContent=critical;\n  const c=completionData();$(\"completionPct\").textContent=`${fmt(c.pct,0)}%`;$(\"completionBar\").style.width=`${c.pct}%`;\n  $(\"completionSteps\").innerHTML=c.checks.map(([n,ok])=>`<div class=\"step ${ok?\"done\":\"\"}\"><i>${ok?\"✓\":\"○\"}<\u002Fi><span>${escapeHTML(n)}<\u002Fspan><\u002Fdiv>`).join(\"\");\n  const top=lastChecks.filter(x=>x.level!==\"ok\").slice(0,5);\n  $(\"dashboardChecks\").innerHTML=top.length?top.map(x=>`<div class=\"alert ${x.level}\"><b>${escapeHTML(x.title)}<\u002Fb><small>${escapeHTML(x.detail)}<\u002Fsmall><\u002Fdiv>`).join(\"\"):'<div class=\"alert ok\"><b>Nenhuma ressalva ativa<\u002Fb><small>Os itens cadastrados atendem aos critérios configurados.<\u002Fsmall><\u002Fdiv>';\n  requestAnimationFrame(drawBasinChart);\n}\nfunction renderSettings(){\n  const s=state.settings,map={sMinV:\"minV\",sMaxV:\"maxV\",sMaxFill:\"maxFill\",sMinCover:\"minCover\",sMaxSpread:\"maxSpread\",sMaxGutterDepth:\"maxGutterDepth\",sWarnUtil:\"warnUtil\",sDecimals:\"decimals\",sMinFreeboard:\"minFreeboard\",sMinInletEff:\"minInletEff\",sDefaultClog:\"defaultClog\",sSafety:\"safety\",sCriteriaSource:\"criteriaSource\"};\n  for(const [id,k] of Object.entries(map))$(id).value=s[k]??\"\";\n  $(\"sDiameters\").value=s.diameters.join(\", \");\n  $(\"coeffRows\").innerHTML=s.coefficients.map((x,i)=>`<tr><td><input data-coeff-name=\"${i}\" value=\"${escapeHTML(x.name)}\"><\u002Ftd><td><input type=\"number\" step=\"any\" min=\"0\" max=\"1\" data-coeff-c=\"${i}\" value=\"${x.c}\"><\u002Ftd><td><button class=\"btn small danger\" data-remove-coeff=\"${i}\">×<\u002Fbutton><\u002Ftd><\u002Ftr>`).join(\"\");\n  $(\"manningRows\").innerHTML=s.mannings.map((x,i)=>`<tr><td><input data-man-name=\"${i}\" value=\"${escapeHTML(x.name)}\"><\u002Ftd><td><input type=\"number\" step=\"any\" min=\"0.001\" data-man-n=\"${i}\" value=\"${x.n}\"><\u002Ftd><td><button class=\"btn small danger\" data-remove-man=\"${i}\">×<\u002Fbutton><\u002Ftd><\u002Ftr>`).join(\"\");\n}\n\n/* ===================== VERIFICAÇÕES ===================== */\nfunction getChecks(){\n  calculateNetworkFlows();\n  const list=[],add=(level,category,title,detail,suggestion=\"\")=>list.push({level,category,title,detail,suggestion});\n  const ok=(category,title,detail)=>add(\"ok\",category,title,detail,\"\");\n\n  if(!state.project.name||state.project.name===\"Novo projeto\")add(\"warn\",\"Projeto\",\"Identificação incompleta\",\"O projeto ainda está com o nome padrão.\",\"Preencha a identificação do projeto.\");\n  else ok(\"Projeto\",\"Projeto identificado\",`Projeto: ${state.project.name}.`);\n  if(!state.project.engineer||!state.project.registry)add(\"warn\",\"Projeto\",\"Responsabilidade técnica incompleta\",\"Nome ou registro profissional não informado.\",\"Preencha o responsável e o registro antes de emitir o relatório.\");\n  else ok(\"Projeto\",\"Responsável identificado\",`${state.project.engineer} — ${state.project.registry}.`);\n\n  const i=idfIntensity();\n  if(!Number.isFinite(i)||i<=0)add(\"danger\",\"Hidrologia\",\"Equação IDF inválida\",\"Os parâmetros não resultam em intensidade positiva.\",\"Revise K, a, b, c, Tr e duração.\");\n  else ok(\"Hidrologia\",\"Intensidade calculada\",`i = ${fmt(i,2)} mm/h para Tr = ${fmt(state.idf.tr,1)} anos e t = ${fmt(state.idf.t,1)} min.`);\n  if(!state.idf.source)add(\"warn\",\"Hidrologia\",\"Fonte da IDF não registrada\",\"Sem referência para os parâmetros pluviométricos.\",\"Informe publicação, estação, autor e período de dados.\");\n  else ok(\"Hidrologia\",\"Fonte da IDF registrada\",state.idf.source);\n\n  if(!state.basins.length)add(\"danger\",\"Bacias\",\"Nenhuma bacia cadastrada\",\"Não há área contribuinte para o cálculo.\",\"Cadastre ao menos uma bacia.\");\n  state.basins.forEach(b=>{\n    const A=basinArea(b),As=basinSurfaceArea(b),C=basinC(b),r=rationalForBasin(b);\n    if(A<=0)add(\"danger\",\"Bacias\",`${b.code}: área inválida`,`Área = ${fmt(A,3)} ha.`,\"Informe a área total e as superfícies.\");\n    else ok(\"Bacias\",`${b.code}: área positiva`,`Área de cálculo = ${fmt(A,3)} ha.`);\n    if(Math.abs(A-As)>Math.max(.001,A*.01))add(\"warn\",\"Bacias\",`${b.code}: áreas não fecham`,`Área declarada ${fmt(A,3)} ha; superfícies ${fmt(As,3)} ha.`,\"Ajuste as superfícies ou a área declarada.\");\n    else if(A>0)ok(\"Bacias\",`${b.code}: superfícies compatíveis`,`Diferença = ${fmt(A-As,4)} ha.`);\n    if(C<0||C>1||!Number.isFinite(C))add(\"danger\",\"Bacias\",`${b.code}: coeficiente inválido`,`C = ${fmt(C,3)}.`,\"Adote valor entre 0 e 1.\");\n    else ok(\"Bacias\",`${b.code}: coeficiente válido`,`C ponderado = ${fmt(C,3)}.`);\n    if(asNumber(b.tc)<=0)add(\"danger\",\"Tempo de concentração\",`${b.code}: Tc ausente`,`Tc = ${fmt(b.tc,2)} min.`,\"Calcule ou informe um tempo de concentração.\");\n    else if(asNumber(b.tc)<5)add(\"warn\",\"Tempo de concentração\",`${b.code}: Tc muito baixo`,`Tc = ${fmt(b.tc,2)} min.`,\"Confirme percurso, declividade e limite mínimo da referência local.\");\n    else ok(\"Tempo de concentração\",`${b.code}: Tc definido`,`Tc adotado = ${fmt(b.tc,2)} min.`);\n    if(!Number.isFinite(r.q)||r.q<=0)add(\"danger\",\"Método Racional\",`${b.code}: vazão inválida`,\"Não foi possível obter a vazão de projeto.\",\"Revise área, C, Tc e IDF.\");\n    else ok(\"Método Racional\",`${b.code}: vazão calculada`,`Q = ${fmt(r.q,4)} m³/s.`);\n    if(b.outlet&&!state.pipes.some(p=>p.code===b.outlet||p.id===b.outlet))add(\"warn\",\"Rede\",`${b.code}: trecho receptor inexistente`,`Ponto informado: ${b.outlet}.`,\"Associe a bacia a um código de galeria existente.\");\n  });\n\n  state.gutters.forEach(g=>{\n    const m=gutterMetrics(g);\n    if(asNumber(g.slopeLong)<=0||asNumber(g.crossSlope)<=0)add(\"danger\",\"Sarjetas\",`${g.code}: declividade inválida`,\"Declividades devem ser positivas.\",\"Revise a geometria da sarjeta.\");\n    if(m.util>1)add(\"danger\",\"Sarjetas\",`${g.code}: capacidade insuficiente`,`Q/Qcap = ${pct(m.util,1)}.`,\"Aumente a seção, a declividade ou instale captação a montante.\");\n    else if(m.util>=state.settings.warnUtil/100)add(\"warn\",\"Sarjetas\",`${g.code}: próxima ao limite`,`Q/Qcap = ${pct(m.util,1)}.`,\"Verifique margem de segurança e obstruções.\");\n    else ok(\"Sarjetas\",`${g.code}: capacidade adequada`,`Q/Qcap = ${pct(m.util,1)}.`);\n    if(m.spread>asNumber(g.maxSpread,state.settings.maxSpread))add(\"danger\",\"Sarjetas\",`${g.code}: espalhamento excessivo`,`T = ${fmt(m.spread,2)} m.`,\"Reduza o espaçamento entre captações ou reveja a seção.\");\n    if(m.q>0&&m.velocity<state.settings.minV)add(\"warn\",\"Sarjetas\",`${g.code}: velocidade baixa`,`V = ${fmt(m.velocity,2)} m/s.`,\"Avalie risco de deposição.\");\n    if(m.velocity>state.settings.maxV)add(\"danger\",\"Sarjetas\",`${g.code}: velocidade elevada`,`V = ${fmt(m.velocity,2)} m/s.`,\"Avalie erosão e proteção do pavimento.\");\n  });\n\n  state.inlets.forEach(x=>{\n    const m=inletMetrics(x);\n    if(m.residual>1e-7)add(\"danger\",\"Bocas de lobo\",`${x.code}: vazão residual`,`Q residual = ${fmt(m.residual,4)} m³/s.`,\"Aumente o dispositivo, reduza o espaçamento ou use unidades adicionais.\");\n    else ok(\"Bocas de lobo\",`${x.code}: captação atende`,`Eficiência = ${pct(m.eff,1)}.`);\n    if(m.eff<state.settings.minInletEff/100)add(\"warn\",\"Bocas de lobo\",`${x.code}: baixa eficiência`,`Eficiência = ${pct(m.eff,1)}.`,\"Revise geometria, obstrução e condição de aproximação.\");\n    if(m.clog>.5)add(\"warn\",\"Bocas de lobo\",`${x.code}: obstrução severa`,`Obstrução adotada = ${pct(m.clog,0)}.`,\"Justifique o cenário e preveja manutenção.\");\n  });\n\n  if(!state.pipes.length)add(\"danger\",\"Galerias\",\"Nenhum trecho cadastrado\",\"A rede de galerias está vazia.\",\"Cadastre os trechos ou justifique solução superficial.\");\n  state.pipes.forEach(p=>{\n    const m=p.metrics||pipeMetrics(p),dim=pipeDimension(p);\n    const dimensionOk=p.shape===\"rectangular\"?dim.w>0&&dim.h>0:dim.D>0;\n    if(!p.code||!p.from||!p.to)add(\"danger\",\"Rede\",`${p.code||\"Trecho\"}: conectividade incompleta`,\"Código, nó de montante ou nó de jusante ausente.\",\"Preencha os identificadores.\");\n    if(!dimensionOk)add(\"danger\",\"Galerias\",`${p.code}: seção inválida`,`Dimensão: ${pipeDimLabel(p)}.`,\"Informe diâmetro, largura e altura positivos.\");\n    if(asNumber(p.slope)<=0)add(\"danger\",\"Galerias\",`${p.code}: declividade não positiva`,`S = ${fmt(p.slope,5)} m/m.`,\"Corrija as cotas ou a declividade.\");\n    if(m.util>1)add(\"danger\",\"Galerias\",`${p.code}: capacidade insuficiente`,`Q = ${fmt(m.q,4)} m³/s; capacidade no enchimento-limite = ${fmt(m.cap,4)} m³/s.`,\"Aumente a seção ou a declividade.\");\n    else if(m.util>=state.settings.warnUtil/100)add(\"warn\",\"Galerias\",`${p.code}: utilização elevada`,`Q/Qcap = ${pct(m.util,1)}.`,\"Verifique margem, perdas e condição de jusante.\");\n    else ok(\"Galerias\",`${p.code}: capacidade adequada`,`Q/Qcap = ${pct(m.util,1)}.`);\n    if(m.q>0&&m.velocity<state.settings.minV)add(\"warn\",\"Galerias\",`${p.code}: velocidade abaixo do critério`,`V = ${fmt(m.velocity,2)} m/s; mínimo = ${fmt(state.settings.minV,2)} m/s.`,\"Avalie autolimpeza, declividade e operação.\");\n    if(m.velocity>state.settings.maxV)add(\"danger\",\"Galerias\",`${p.code}: velocidade acima do critério`,`V = ${fmt(m.velocity,2)} m/s; máximo = ${fmt(state.settings.maxV,2)} m/s.`,\"Avalie abrasão, dissipação e material.\");\n    if(Number.isFinite(m.cover)&&m.cover<state.settings.minCover)add(\"danger\",\"Galerias\",`${p.code}: recobrimento insuficiente`,`Recobrimento mínimo calculado = ${fmt(m.cover,2)} m.`,\"Ajuste cotas, seção ou solução estrutural.\");\n    if(hasNumber(p.invertUp)&&hasNumber(p.invertDown)&&asNumber(p.length)>0){\n      const sC=(asNumber(p.invertUp)-asNumber(p.invertDown))/asNumber(p.length);\n      if(Math.abs(sC-asNumber(p.slope))>Math.max(.0005,Math.abs(asNumber(p.slope))*.05))add(\"warn\",\"Cotas\",`${p.code}: declividade e cotas divergem`,`S informada = ${fmt(p.slope,5)}; S pelas cotas = ${fmt(sC,5)}.`,\"Compatibilize cotas e declividade.\");\n      else ok(\"Cotas\",`${p.code}: cotas compatíveis`,`S pelas cotas = ${fmt(sC,5)}.`);\n    }\n    const downs=state.pipes.filter(d=>String(d.from)===String(p.to));\n    downs.forEach(d=>{\n      if(p.shape===\"circular\"&&d.shape===\"circular\"&&asNumber(d.diameter)<asNumber(p.diameter))\n        add(\"warn\",\"Galerias\",`${p.code} → ${d.code}: redução de diâmetro`,`DN ${fmt(p.diameter,0)} para DN ${fmt(d.diameter,0)} mm.`,\"Justifique hidraulicamente ou elimine a redução a jusante.\");\n    });\n  });\n  if(networkCycles.length)add(\"danger\",\"Rede\",\"Ciclo hidráulico detectado\",`Trechos envolvidos: ${networkCycles.join(\", \")}.`,\"Corrija a conectividade para formar um sentido de escoamento acíclico.\");\n\n  state.structures.forEach(st=>{\n    const dep=asNumber(st.ground)-asNumber(st.invert),c=structureConnections(st);\n    if(dep<=0)add(\"danger\",\"Estruturas\",`${st.code}: profundidade inválida`,`Terreno = ${fmt(st.ground,2)} m; fundo = ${fmt(st.invert,2)} m.`,\"Corrija as cotas.\");\n    else ok(\"Estruturas\",`${st.code}: profundidade positiva`,`Profundidade = ${fmt(dep,2)} m.`);\n    if(!c.incoming.length&&!c.outgoing.length)add(\"warn\",\"Estruturas\",`${st.code}: estrutura desconectada`,\"Nenhum trecho usa este código como nó.\",\"Associe a estrutura à rede ou remova o cadastro.\");\n  });\n\n  state.channels.forEach(ch=>{\n    const m=channelMetrics(ch);\n    if(asNumber(ch.slope)<=0||asNumber(ch.n)<=0)add(\"danger\",\"Canais\",`${ch.code}: parâmetros inválidos`,\"Declividade e rugosidade devem ser positivas.\",\"Revise os dados.\");\n    if(Number.isFinite(m.freeboard)&&m.freeboard<0)add(\"danger\",\"Canais\",`${ch.code}: transbordamento`,`Profundidade normal ${fmt(m.yn,3)} m excede a seção ${fmt(ch.designDepth,3)} m.`,\"Amplie a seção ou reduza a vazão.\");\n    else if(Number.isFinite(m.freeboard)&&m.freeboard<state.settings.minFreeboard)add(\"warn\",\"Canais\",`${ch.code}: bordo livre reduzido`,`Bordo livre = ${fmt(m.freeboard,2)} m.`,\"Aumente a profundidade total ou reveja o critério.\");\n    else ok(\"Canais\",`${ch.code}: bordo livre verificado`,`Bordo livre = ${fmt(m.freeboard,2)} m.`);\n    if(m.V>asNumber(ch.maxV,state.settings.maxV))add(\"danger\",\"Canais\",`${ch.code}: velocidade excessiva`,`V = ${fmt(m.V,2)} m/s.`,\"Escolha revestimento compatível ou dissipe energia.\");\n    if(asNumber(ch.tauAdmissible)>0&&m.tau>asNumber(ch.tauAdmissible))add(\"danger\",\"Canais\",`${ch.code}: tensão trativa excessiva`,`τ = ${fmt(m.tau,1)} Pa; admissível = ${fmt(ch.tauAdmissible,1)} Pa.`,\"Reveja revestimento, declividade ou seção.\");\n  });\n  return list;\n}\nfunction renderChecks(){\n  const filter=$(\"checkFilter\")?.value||\"all\",term=($(\"checkSearch\")?.value||\"\").toLowerCase();\n  const view=lastChecks.filter(x=>(filter===\"all\"||x.level===filter)&&(`${x.category} ${x.title} ${x.detail}`.toLowerCase().includes(term)));\n  $(\"cTotal\").textContent=lastChecks.length;$(\"cOk\").textContent=lastChecks.filter(x=>x.level===\"ok\").length;\n  $(\"cWarn\").textContent=lastChecks.filter(x=>x.level===\"warn\").length;$(\"cDanger\").textContent=lastChecks.filter(x=>x.level===\"danger\").length;\n  $(\"checkList\").innerHTML=view.map(x=>`<div class=\"check-item ${x.level}\"><div class=\"check-icon\">${x.level===\"ok\"?\"✓\":x.level===\"warn\"?\"!\":\"×\"}<\u002Fdiv><div><b>${escapeHTML(x.title)}<\u002Fb><div>${escapeHTML(x.detail)}<\u002Fdiv>${x.suggestion?`<small class=\"muted\"><b style=\"display:inline\">Sugestão:<\u002Fb> ${escapeHTML(x.suggestion)}<\u002Fsmall>`:\"\"}<\u002Fdiv><span class=\"badge ${x.level}\">${escapeHTML(x.category)}<\u002Fspan><\u002Fdiv>`).join(\"\")||'<div class=\"muted center\" style=\"padding:30px\">Nenhum item corresponde ao filtro.<\u002Fdiv>';\n}\n\n/* ===================== MEMORIAL E RELATÓRIO ===================== */\nfunction simpleTable(headers,rows){\n  return `<div class=\"table-wrap\"><table><thead><tr>${headers.map(h=>`<th>${escapeHTML(h)}<\u002Fth>`).join(\"\")}<\u002Ftr><\u002Fthead><tbody>${rows.map(r=>`<tr>${r.map(c=>`<td>${c}<\u002Ftd>`).join(\"\")}<\u002Ftr>`).join(\"\")}<\u002Ftbody><\u002Ftable><\u002Fdiv>`;\n}\nfunction memoryHTML(){\n  calculateNetworkFlows();\n  const basinRows=state.basins.map(b=>{const r=rationalForBasin(b);return [escapeHTML(b.code),fmt(r.area,3),fmt(r.C,3),fmt(r.tc,2),fmt(r.i,2),`<b>${fmt(r.q,4)}<\u002Fb>`]});\n  const gutterRows=state.gutters.map(g=>{const m=gutterMetrics(g);return [escapeHTML(g.code),fmt(m.q,4),fmt(m.cap,4),fmt(m.depth,3),fmt(m.spread,2),fmt(m.velocity,2),statusBadge(gutterLevel(g,m),labelForLevel(gutterLevel(g,m)))]});\n  const inletRows=state.inlets.map(x=>{const m=inletMetrics(x);return [escapeHTML(x.code),escapeHTML(x.type),fmt(m.q,4),fmt(m.cap,4),fmt(m.captured,4),fmt(m.residual,4),pct(m.eff,1)]});\n  const pipeRows=state.pipes.map(p=>{const m=p.metrics;return [escapeHTML(p.code),`${escapeHTML(p.from)} → ${escapeHTML(p.to)}`,fmt(p.qAccum,4),pipeDimLabel(p),fmt(p.slope,5),fmt(m.fill*100,1),fmt(m.velocity,2),fmt(m.cap,4),statusBadge(pipeLevel(p,m),labelForLevel(pipeLevel(p,m)))]});\n  const structureRows=state.structures.map(st=>[escapeHTML(st.code),escapeHTML(st.type),fmt(st.ground,2),fmt(st.invert,2),fmt(asNumber(st.ground)-asNumber(st.invert),2),fmt(st.k,2)]);\n  const channelRows=state.channels.map(ch=>{const m=channelMetrics(ch);return [escapeHTML(ch.code),escapeHTML(ch.shape),fmt(ch.q,4),fmt(m.yn,3),fmt(m.yc,3),fmt(m.V,2),fmt(m.Fr,2),m.regime,fmt(m.freeboard,2),statusBadge(channelLevel(ch,m),labelForLevel(channelLevel(ch,m)))]});\n  return `\n  <h1>Memorial de Cálculo — ${escapeHTML(state.project.name)}<\u002Fh1>\n  <p><b>Projeto:<\u002Fb> ${escapeHTML(state.project.code||\"—\")} • <b>Versão:<\u002Fb> ${escapeHTML(state.project.version||\"—\")} • <b>Data:<\u002Fb> ${formatDate(state.project.date)}<\u002Fp>\n  <h2>1. Identificação e objetivo<\u002Fh2>\n  <p>${escapeHTML(state.project.description||\"O presente estudo realiza o pré-dimensionamento hidrológico e hidráulico do sistema de drenagem urbana.\")}<\u002Fp>\n  <p><b>Local:<\u002Fb> ${escapeHTML([state.project.address,state.project.city,state.project.state].filter(Boolean).join(\", \")||\"Não informado\")}<br>\n  <b>Responsável:<\u002Fb> ${escapeHTML(state.project.engineer||\"Não informado\")} — ${escapeHTML(state.project.registry||\"registro não informado\")}<br>\n  <b>Contratante:<\u002Fb> ${escapeHTML(state.project.client||\"Não informado\")}<\u002Fp>\n\n  <h2>2. Critérios pluviométricos<\u002Fh2>\n  <p>Foi empregada a forma configurável <b>i = K × Trᵃ / (t + b)ᶜ<\u002Fb>, com intensidade em mm/h.<\u002Fp>\n  <div class=\"code\">K = ${fmt(state.idf.K,4)}\na = ${fmt(state.idf.a,4)}\nb = ${fmt(state.idf.b,4)}\nc = ${fmt(state.idf.c,4)}\nTr = ${fmt(state.idf.tr,2)} anos\nt de referência = ${fmt(state.idf.t,2)} min\ni = ${fmt(idfIntensity(),3)} mm/h = ${fmt(idfIntensity()/3.6,3)} L/s·ha<\u002Fdiv>\n  <p><b>Estação/localidade:<\u002Fb> ${escapeHTML(state.idf.station||\"Não informada\")}<br><b>Fonte:<\u002Fb> ${escapeHTML(state.idf.source||\"Não registrada\")}<\u002Fp>\n\n  <h2>3. Bacias, coeficientes e tempo de concentração<\u002Fh2>\n  <p>O coeficiente composto de cada bacia foi obtido por <b>C = Σ(CᵢAᵢ) / ΣAᵢ<\u002Fb>. O tempo de concentração adotado controla a duração aplicada à IDF.<\u002Fp>\n  ${simpleTable([\"Bacia\",\"Área (ha)\",\"C ponderado\",\"Tc (min)\",\"i (mm/h)\",\"Q (m³/s)\"],basinRows)}\n  ${state.basins.map(b=>{const r=rationalForBasin(b);return `<h3>${escapeHTML(b.code)} — ${escapeHTML(b.name||\"\")}<\u002Fh3>\n    <div class=\"code\">C = Σ(Cᵢ × Aᵢ) / ΣAᵢ = ${fmt(r.C,4)}\ni(${fmt(r.tc,2)} min; Tr ${fmt(state.idf.tr,1)} anos) = ${fmt(r.i,3)} mm/h\nQ = C × i × A / 360\nQ = ${fmt(r.C,4)} × ${fmt(r.i,3)} × ${fmt(r.area,4)} / 360\nQ = ${fmt(r.q,5)} m³/s = ${fmt(r.ls,2)} L/s<\u002Fdiv>\n    <p><b>Método de Tc:<\u002Fb> ${escapeHTML(b.tcMethod||\"entrada adotada\")} • <b>Justificativa:<\u002Fb> ${escapeHTML(b.tcJustification||\"não registrada\")}<\u002Fp>`}).join(\"\")}\n\n  <h2>4. Sarjetas<\u002Fh2>\n  <p>A capacidade foi determinada pela equação de Manning, <b>Q = (1/n) A R^(2/3) S^(1/2)<\u002Fb>, com solução iterativa da profundidade na seção triangular.<\u002Fp>\n  ${gutterRows.length?simpleTable([\"Código\",\"Q\",\"Capacidade\",\"y (m)\",\"T (m)\",\"V (m/s)\",\"Conclusão\"],gutterRows):\"<p>Nenhuma sarjeta cadastrada.<\u002Fp>\"}\n\n  <h2>5. Bocas de lobo<\u002Fh2>\n  <p>As capacidades preliminares combinam relações simplificadas de vertedouro e/ou orifício, multiplicadas pela quantidade e reduzidas pela obstrução e pelo fator de segurança.<\u002Fp>\n  ${inletRows.length?simpleTable([\"Código\",\"Tipo\",\"Q afluente\",\"Capacidade\",\"Captada\",\"Residual\",\"Eficiência\"],inletRows):\"<p>Nenhuma boca de lobo cadastrada.<\u002Fp>\"}\n\n  <h2>6. Galerias e rede<\u002Fh2>\n  <p>As vazões são acumuladas dos trechos de montante para jusante. A capacidade no enchimento máximo configurado é calculada por Manning. Para seção circular parcialmente cheia são usados área e perímetro do segmento circular.<\u002Fp>\n  ${pipeRows.length?simpleTable([\"Trecho\",\"Nós\",\"Q acum.\",\"Dimensão\",\"S\",\"y/D (%)\",\"V\",\"Qcap.\",\"Conclusão\"],pipeRows):\"<p>Nenhuma galeria cadastrada.<\u002Fp>\"}\n  ${state.pipes.map(p=>{const m=p.metrics;return `<h3>${escapeHTML(p.code)}<\u002Fh3><div class=\"code\">Q acumulada = ${fmt(p.qAccum,5)} m³/s\nSeção = ${pipeDimLabel(p)}\nS = ${fmt(p.slope,6)} m/m; n = ${fmt(p.n,4)}\nQcap (enchimento ${fmt(state.settings.maxFill,0)}%) = ${fmt(m.cap,5)} m³/s\ny = ${fmt(m.depth,4)} m; y/D = ${fmt(m.fill*100,2)}%\nV = Q/A = ${fmt(m.velocity,3)} m/s\nRecobrimento mínimo = ${fmt(m.cover,3)} m\nUtilização = ${fmt(m.util*100,2)}%<\u002Fdiv>`}).join(\"\")}\n\n  <h2>7. Poços de visita e caixas<\u002Fh2>\n  ${structureRows.length?simpleTable([\"Código\",\"Tipo\",\"Terreno\",\"Fundo\",\"Profundidade\",\"K local\"],structureRows):\"<p>Nenhuma estrutura cadastrada.<\u002Fp>\"}\n\n  <h2>8. Canais<\u002Fh2>\n  <p>A profundidade normal é obtida iterativamente por Manning. A profundidade crítica satisfaz Fr = 1 e o regime é classificado pelo número de Froude.<\u002Fp>\n  ${channelRows.length?simpleTable([\"Canal\",\"Seção\",\"Q\",\"yn\",\"yc\",\"V\",\"Fr\",\"Regime\",\"Bordo livre\",\"Conclusão\"],channelRows):\"<p>Nenhum canal cadastrado.<\u002Fp>\"}\n\n  <h2>9. Verificações e conclusão<\u002Fh2>\n  <p>Foram registrados <b>${lastChecks.filter(x=>x.level===\"danger\").length}<\u002Fb> itens críticos, <b>${lastChecks.filter(x=>x.level===\"warn\").length}<\u002Fb> itens de atenção e <b>${lastChecks.filter(x=>x.level===\"ok\").length}<\u002Fb> verificações adequadas.<\u002Fp>\n  ${lastChecks.filter(x=>x.level!==\"ok\").map(x=>`<div class=\"alert ${x.level}\"><b>${escapeHTML(x.category)} — ${escapeHTML(x.title)}<\u002Fb><small>${escapeHTML(x.detail)} ${escapeHTML(x.suggestion||\"\")}<\u002Fsmall><\u002Fdiv>`).join(\"\")||'<div class=\"alert ok\"><b>Sem ressalvas pelos critérios configurados.<\u002Fb><\u002Fdiv>'}\n  <p><b>Referência dos limites:<\u002Fb> ${escapeHTML(state.settings.criteriaSource||\"Não informada\")}<\u002Fp>\n  <p><b>Nota técnica:<\u002Fb> Este memorial é um apoio ao pré-dimensionamento. Perdas localizadas, remanso, transientes, interferências, condições de lançamento, método específico de captação e critérios normativos locais devem ser verificados no projeto executivo.<\u002Fp>`;\n}\nfunction renderMemory(){$(\"memoryContent\").innerHTML=memoryHTML()}\nfunction memoryText(){\n  const d=document.createElement(\"div\");d.innerHTML=memoryHTML();return d.innerText.replace(/\\n{3,}/g,\"\\n\\n\");\n}\nfunction reportHeader(){\n  return `<div class=\"cover\"><div class=\"logo-water\">≈<\u002Fdiv><h1>DrenaPro<\u002Fh1><h2 style=\"border:0\">Relatório de Drenagem Urbana<\u002Fh2><h3>${escapeHTML(state.project.name)}<\u002Fh3><p>${escapeHTML(state.project.code||\"\")} • Versão ${escapeHTML(state.project.version||\"1.0\")}<\u002Fp><p>${escapeHTML([state.project.city,state.project.state].filter(Boolean).join(\" / \"))}<br>${formatDate(state.project.date)}<\u002Fp><div style=\"margin-top:80px\"><b>${escapeHTML(state.project.engineer||\"Responsável técnico não informado\")}<\u002Fb><br>${escapeHTML(state.project.registry||\"Registro não informado\")}<\u002Fdiv><\u002Fdiv>`;\n}\nfunction summaryHTML(){\n  const area=state.basins.reduce((s,b)=>s+basinArea(b),0),flow=state.pipes.length?Math.max(...state.pipes.map(p=>asNumber(p.qAccum))):state.basins.reduce((s,b)=>s+rationalForBasin(b).q,0);\n  return `<h2>Resumo executivo<\u002Fh2><p>O estudo contempla ${state.basins.length} bacia(s), área contribuinte de <b>${fmt(area,2)} ha<\u002Fb>, intensidade de referência de <b>${fmt(idfIntensity(),2)} mm/h<\u002Fb> e vazão máxima acumulada de <b>${fmt(flow,4)} m³/s<\u002Fb>.<\u002Fp>\n  <div class=\"grid g4\"><div class=\"result\"><small>Bacias<\u002Fsmall><div class=\"big\">${state.basins.length}<\u002Fdiv><\u002Fdiv><div class=\"result\"><small>Galerias<\u002Fsmall><div s.minV)){chosen=d;break}\n    }\n    if(chosen){p.diameter=chosen;sized++}else failed++;\n  }\n  persist(true);toast(`${sized} trecho(s) dimensionado(s)${failed?`; ${failed} sem diâmetro compatível`:\"\"}.`);\n}\nfunction exportCurrentJson(){\n  downloadBlob(`${safeName(state.project.name)}.drenapro.json`,JSON.stringify(state,null,2),\"application/json\");\n}\nfunction safeName(s){return String(s||\"DrenaPro\").normalize(\"NFD\").replace(/[\\u0300-\\u036f]/g,\"\").replace(/[^a-zA-Z0-9_-]+/g,\"_\").replace(/^_+|_+$/g,\"\")||\"DrenaPro\"}\nasync function importJsonFile(file){\n  try{\n    const data=JSON.parse(await file.text());\n    if(Array.isArray(data.library)){setLibrary(data.library);if(data.current)state=normalizeState(data.current)}\n    else if(data.project)state=normalizeState(data);\n    else throw new Error(\"estrutura não reconhecida\");\n    safeStorage.setItem(CURRENT_KEY,JSON.stringify(state));renderAll();toast(\"Arquivo importado com sucesso.\");\n  }catch(e){toast(`Falha na importação: ${e.message}`)}\n}\nfunction exportChecksCSV(){\n  const rows=[[\"Nível\",\"Categoria\",\"Título\",\"Detalhe\",\"Sugestão\"],...lastChecks.map(x=>[x.level,x.category,x.title,x.detail,x.suggestion])];\n  downloadBlob(`${safeName(state.project.name)}_verificacoes.csv`,\"\\ufeff\"+rows.map(r=>r.map(csvCell).join(\";\")).join(\"\\r\\n\"),\"text/csv;charset=utf-8\");\n}\n\n/* ===================== EVENTOS ===================== */\ndocument.addEventListener(\"click\",e=>{\n  const nav=e.target.closest(\"[data-page]\");if(nav){showPage(nav.dataset.page);return}\n  const go=e.target.closest(\"[data-go]\");if(go){showPage(go.dataset.go);return}\n  const eb=e.target.closest(\"[data-edit-basin]\");if(eb){openBasin(eb.dataset.editBasin);return}\n  const cb=e.target.closest(\"[data-copy-basin]\");if(cb){const src=state.basins.find(b=>b.id===cb.dataset.copyBasin);if(src){const b=deepClone(src);b.id=uid(\"b\");b.code=`${b.code}-CÓPIA`;b.surfaces.forEach(s=>s.id=uid(\"s\"));state.basins.push(b);persist(true)}return}\n  for(const [attr,type] of [[\"data-edit-gutter\",\"gutter\"],[\"data-edit-inlet\",\"inlet\"],[\"data-edit-pipe\",\"pipe\"],[\"data-edit-structure\",\"structure\"],[\"data-edit-channel\",\"channel\"]]){\n    const el=e.target.closest(`[${attr}]`);if(el){openModal(type,el.getAttribute(attr));return}\n  }\n  const copy=e.target.closest(\"[data-copy-item]\");if(copy){const [type,id]=copy.dataset.copyItem.split(\":\");copyItem(type,id);return}\n  const rs=e.target.closest(\"[data-remove-surface]\");if(rs&&basinDraft){basinDraft.surfaces.splice(Number(rs.dataset.removeSurface),1);renderSurfaceDraft();return}\n  const rc=e.target.closest(\"[data-remove-coeff]\");if(rc){state.settings.coefficients.splice(Number(rc.dataset.removeCoeff),1);renderSettings();return}\n  const rm=e.target.closest(\"[data-remove-man]\");if(rm){state.settings.mannings.splice(Number(rm.dataset.removeMan),1);renderSettings();return}\n  const lo=e.target.closest(\"[data-lib-open]\");if(lo){const item=getLibrary()[Number(lo.dataset.libOpen)];if(item){state=normalizeState(deepClone(item));safeStorage.setItem(CURRENT_KEY,JSON.stringify(state));renderAll();toast(\"Projeto aberto.\");}return}\n  const ld=e.target.closest(\"[data-lib-duplicate]\");if(ld){const item=getLibrary()[Number(ld.dataset.libDuplicate)];if(item){state=normalizeState(deepClone(item));state.project.id=uid(\"prj\");state.project.name=`${state.project.name} — cópia`;saveToLibrary();}return}\n  const le=e.target.closest(\"[data-lib-export]\");if(le){const item=getLibrary()[Number(le.dataset.libExport)];if(item)downloadBlob(`${safeName(item.project?.name)}.drenapro.json`,JSON.stringify(item,null,2),\"application/json\");return}\n  const ldel=e.target.closest(\"[data-lib-delete]\");if(ldel&&confirm(\"Excluir este projeto salvo?\")){const lib=getLibrary();lib.splice(Number(ldel.dataset.libDelete),1);setLibrary(lib);renderSaved();toast(\"Projeto removido da biblioteca.\");return}\n});\n$(\"nav\").addEventListener(\"click\",e=>{if(e.target.closest(\"button\"))$(\"sidebar\").classList.remove(\"open\")});\n$(\"menuBtn\").addEventListener(\"click\",()=>$(\"sidebar\").classList.toggle(\"open\"));\n$(\"themeBtn\").addEventListener(\"click\",()=>{\n  const next=document.documentElement.dataset.theme===\"dark\"?\"light\":\"dark\";document.documentElement.dataset.theme=next;safeStorage.setItem(\"drenapro_theme\",next);\n  requestAnimationFrame(()=>{drawBasinChart();drawIdfChart();drawNetwork();drawProfile()});\n});\n$(\"btnSave\").onclick=$(\"topSaveBtn\").onclick=()=>saveToLibrary();\n$(\"saveProjectForm\").onclick=collectProjectForm;\n$(\"duplicateProject\").onclick=()=>saveToLibrary(true);\n$(\"btnNew\").onclick=()=>{if(confirm(\"Criar um novo projeto? O autosave atual continuará disponível.\")){state=blankState();safeStorage.setItem(CURRENT_KEY,JSON.stringify(state));renderAll();showPage(\"project\")}};\n$(\"btnSample\").onclick=$(\"dashSample\").onclick=loadSampleProject;\n$(\"btnExportJson\").onclick=exportCurrentJson;\n$(\"saveSnapshot\").onclick=()=>saveToLibrary();\n$(\"jsonImport\").addEventListener(\"change\",e=>{const f=e.target.files?.[0];if(f)importJsonFile(f);e.target.value=\"\"});\n$(\"backupAll\").onclick=()=>downloadBlob(`DrenaPro_biblioteca_${todayISO()}.json`,JSON.stringify({current:state,library:getLibrary(),exportedAt:new Date().toISOString()},null,2),\"application/json\");\n$(\"restoreLast\").onclick=()=>{try{const x=safeStorage.getItem(AUTOSAVE_KEY);if(!x)throw Error(\"nenhum autosave\");state=normalizeState(JSON.parse(x));renderAll();toast(\"Último autosave restaurado.\")}catch(e){toast(`Não foi possível restaurar: ${e.message}`)}};\n$(\"clearLibrary\").onclick=()=>{if(confirm(\"Excluir todos os projetos da biblioteca local?\")){safeStorage.removeItem(LIB_KEY);renderSaved();toast(\"Biblioteca excluída.\")}};\n\n$(\"applyIdf\").onclick=applyIdfForm;\n$(\"idfCompare\").onclick=()=>{drawIdfChart();$(\"idfChart\").scrollIntoView({behavior:\"smooth\"});toast(\"O gráfico compara Tr de 2, 5, 10, 25, 50 e 100 anos.\")};\n$(\"downloadIdfChart\").onclick=()=>downloadCanvas(\"idfChart\",\"DrenaPro_curvas_IDF.png\");\n$(\"addBasin\").onclick=()=>openBasin();\n$(\"closeBasinEditor\").onclick=$(\"cancelBasin\").onclick=closeBasin;\n$(\"saveBasin\").onclick=saveBasinDraft;\n$(\"deleteBasin\").onclick=()=>{if(basinDraft&&confirm(\"Excluir esta bacia?\")){state.basins=state.basins.filter(b=>b.id!==basinDraft.id);closeBasin();persist(true)}};\n$(\"addSurface\").onclick=()=>{if(!basinDraft)return;const def=state.settings.coefficients[0]||{name:\"Superfície\",c:.5};basinDraft.surfaces.push({id:uid(\"s\"),type:def.name,area:0,c:def.c});renderSurfaceDraft()};\n$(\"surfaceRows\").addEventListener(\"input\",e=>{\n  if(!basinDraft)return;const el=e.target;\n  if(el.dataset.surfaceType!==undefined){const i=Number(el.dataset.surfaceType);basinDraft.surfaces[i].type=el.value;const ref=state.settings.coefficients.find(x=>x.name===el.value);if(ref){basinDraft.surfaces[i].c=ref.c;renderSurfaceDraft()}}\n  if(el.dataset.surfaceArea!==undefined)basinDraft.surfaces[Number(el.dataset.surfaceArea)].area=asNumber(el.value);\n  if(el.dataset.surfaceC!==undefined)basinDraft.surfaces[Number(el.dataset.surfaceC)].c=asNumber(el.value);\n  if(el.dataset.surfaceArea!==undefined||el.dataset.surfaceC!==undefined)renderSurfaceDraft();\n});\n[\"bArea\",\"bLength\",\"bDrop\",\"bSlope\",\"bTc\"].forEach(id=>$(id).addEventListener(\"input\",()=>{syncBasinDraft();renderSurfaceDraft()}));\n\n$(\"tcBasin\").onchange=loadTcBasin;$(\"calculateTc\").onclick=calculateTcUI;\n$(\"tcResults\").addEventListener(\"change\",e=>{if(e.target.name===\"tcPick\")state.tcSelection=Number(e.target.value)});\n$(\"tcUseSelected\").onclick=applyTcSelection;\n$(\"calculateRational\").onclick=()=>{calculateNetworkFlows();persist(true);toast(\"Vazões recalculadas.\")};\n$(\"syncTcIdf\").onclick=()=>{const v=state.basins.map(b=>asNumber(b.tc)).filter(x=>x>0);if(!v.length){toast(\"Não há tempos de concentração definidos.\");return}state.idf.t=v.reduce((a,b)=>a+b,0)/v.length;persist(true);toast(\"A duração de referência da IDF foi ajustada à média dos Tc; cada bacia continua usando seu próprio Tc.\")};\n$(\"runScenario\").onclick=runScenario;\n\n$(\"addGutter\").onclick=()=>openModal(\"gutter\");$(\"addInlet\").onclick=()=>openModal(\"inlet\");$(\"addPipe\").onclick=()=>openModal(\"pipe\");$(\"addStructure\").onclick=()=>openModal(\"structure\");$(\"addChannel\").onclick=()=>openModal(\"channel\");\n$(\"closeModal\").onclick=$(\"modalCancel\").onclick=closeModal;$(\"modalSave\").onclick=saveModalData;$(\"modalDelete\").onclick=deleteModalItem;\n$(\"editorModal\").addEventListener(\"click\",e=>{if(e.target===$(\"editorModal\"))closeModal()});\n$(\"sizeAllPipes\").onclick=autoSizePipes;\n$(\"autoConnectBasins\").onclick=()=>{if(!state.pipes.length){toast(\"Cadastre galerias primeiro.\");return}state.basins.forEach((b,i)=>{if(!b.outlet)b.outlet=state.pipes[Math.min(i,state.pipes.length-1)].code});persist(true);toast(\"Bacias sem receptor foram associadas aos trechos disponíveis.\")};\n$(\"recalcNetwork\").onclick=()=>{calculateNetworkFlows();persist(true);toast(\"Rede recalculada.\")};\n$(\"profilePath\").onchange=drawProfile;$(\"downloadNetworkChart\").onclick=()=>downloadCanvas(\"networkChart\",\"DrenaPro_rede.png\");\n\n$(\"runChecks\").onclick=()=>{lastChecks=getChecks();renderChecks();renderDashboard();toast(\"Verificações atualizadas.\")};\n$(\"checkFilter\").onchange=renderChecks;$(\"checkSearch\").oninput=renderChecks;$(\"exportChecks\").onclick=exportChecksCSV;\n$(\"copyMemory\").onclick=async()=>{try{await navigator.clipboard.writeText(memoryText());toast(\"Memorial copiado.\")}catch{toast(\"O navegador bloqueou a cópia; use o download TXT.\")}};\n$(\"downloadMemory\").onclick=()=>downloadBlob(`${safeName(state.project.name)}_memorial.txt`,memoryText());\n$(\"refreshReport\").onclick=renderReport;$(\"reportMode\").onchange=renderReport;$(\"printReport\").onclick=()=>{renderReport();window.print()};\n$(\"exportAllCsv\").onclick=()=>downloadBlob(`${safeName(state.project.name)}_dados.csv`,buildAllCSV(),\"text/csv;charset=utf-8\");\n\n$(\"saveSettings\").onclick=collectSettings;\n$(\"restoreDefaults\").onclick=()=>{if(confirm(\"Restaurar os critérios iniciais?\")){state.settings=deepClone(DEFAULT_SETTINGS);persist(true)}};\n$(\"addCoeff\").onclick=()=>{state.settings.coefficients.push({name:\"Nova superfície\",c:.5});renderSettings()};\n$(\"addManning\").onclick=()=>{state.settings.mannings.push({name:\"Novo material\",n:.015});renderSettings()};\n\nwindow.addEventListener(\"resize\",debounce(()=>{const active=document.querySelector(\".section.active\")?.id;if(active===\"sec-dashboard\")drawBasinChart();if(active===\"sec-idf\")drawIdfChart();if(active===\"sec-network\"){drawNetwork();drawProfile()}},180));\ndocument.addEventListener(\"keydown\",e=>{if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()===\"s\"){e.preventDefault();saveToLibrary()}if(e.key===\"Escape\"){closeModal();$(\"sidebar\").classList.remove(\"open\")}});\n\n/* ===================== INICIALIZAÇÃO ===================== */\nloadInitial();\ndocument.documentElement.dataset.theme=safeStorage.getItem(\"drenapro_theme\")||\"light\";\nrenderAll();\nshowPage(\"dashboard\");\n\n/* ===== Splash / Legal flow ===== */\n(function(){\n  document.body.style.overflow=\"hidden\";\n  const splash=document.getElementById(\"splashScreen\"),legal=document.getElementById(\"legalOverlay\"),\n        check=document.getElementById(\"legalCheck\"),accept=document.getElementById(\"legalAccept\");\n  setTimeout(()=>{splash.classList.add(\"hide\");legal.classList.add(\"show\")},5000);\n  check.addEventListener(\"change\",()=>accept.disabled=!check.checked);\n  accept.addEventListener(\"click\",()=>{legal.classList.remove(\"show\");document.body.style.overflow=\"\"});\n})();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
