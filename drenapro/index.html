o ao dimensionamento hidrológico e hidráulico de sistemas de drenagem urbana. Os resultados dependem integralmente dos dados inseridos e das premissas adotadas pelo usuário, não substituindo a análise técnica e o julgamento profissional do engenheiro responsável.<\u002Fp>\n      <p>Esta aplicação não garante conformidade com normas técnicas, legislações municipais, estaduais ou federais, e não assume responsabilidade por danos, perdas ou prejuízos decorrentes do uso dos cálculos, relatórios ou memoriais gerados.<\u002Fp>\n      <p>Todos os resultados devem ser revisados, validados e assinados por profissional habilitado (CREA/CAU), conforme legislação vigente, antes de qualquer aplicação prática, aprovação em órgãos públicos ou execução de obra.<\u002Fp>\n      <p>Ao continuar, você declara estar ciente destas condições e concorda em utilizar o sistema exclusivamente como ferramenta de apoio técnico, sob sua responsabilidade.<\u002Fp>\n    <\u002Fdiv>\n    <label class=\"legal-agree\"><input type=\"checkbox\" id=\"legalCheck\"><span>Li e estou de acordo com os termos acima.<\u002Fspan><\u002Flabel>\n    <div class=\"legal-actions\"><button class=\"btn primary\" id=\"legalAccept\" disabled=\"\">Entrar no sistema<\u002Fbutton><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<div class=\"app\">\n<aside class=\"sidebar\" id=\"sidebar\">\n  <div class=\"brand\"><div class=\"logo\">≈<\u002Fdiv><div><h1>DrenaPro<\u002Fh1><small>Drenagem urbana<\u002Fsmall><\u002Fdiv><\u002Fdiv>\n  <div class=\"project-mini\"><span>Projeto ativo<\u002Fspan><b id=\"sideProjectName\">Novo projeto<\u002Fb><span id=\"sideProjectMeta\">Não salvo<\u002Fspan><\u002Fdiv>\n  <nav class=\"nav\" id=\"nav\">\n    <div class=\"nav-divider\">Projeto<\u002Fdiv>\n    <button class=\"active\" data-page=\"dashboard\"><span class=\"nav-ico\">⌂<\u002Fspan> Visão geral<\u002Fbutton>\n    <button data-page=\"project\"><span class=\"nav-ico\">▣<\u002Fspan> Dados do projeto<\u002Fbutton>\n    <button data-page=\"saved\"><span class=\"nav-ico\">◫<\u002Fspan> Projetos salvos<\u002Fbutton>\n    <div class=\"nav-divider\">Hidrologia<\u002Fdiv>\n    <button data-page=\"idf\"><span class=\"nav-ico\">☂<\u002Fspan> Chuva e IDF<\u002Fbutton>\n    <button data-page=\"basins\"><span class=\"nav-ico\">◇<\u002Fspan> Bacias<\u002Fbutton>\n    <button data-page=\"tc\"><span class=\"nav-ico\">◷<\u002Fspan> Tempo de concentração<\u002Fbutton>\n    <button data-page=\"rational\"><span class=\"nav-ico\">Σ<\u002Fspan> Método racional<\u002Fbutton>\n    <div class=\"nav-divider\">Hidráulica<\u002Fdiv>\n    <button data-page=\"gutters\"><span class=\"nav-ico\">⌁<\u002Fspan> Sarjetas<\u002Fbutton>\n    <button data-page=\"inlets\"><span class=\"nav-ico\">▥<\u002Fspan> Bocas de lobo<\u002Fbutton>\n    <button data-page=\"pipes\"><span class=\"nav-ico\">◉<\u002Fspan> Galerias<\u002Fbutton>\n    <button data-page=\"structures\"><span class=\"nav-ico\">▦<\u002Fspan> Poços e caixas<\u002Fbutton>\n    <button data-page=\"channels\"><span class=\"nav-ico\">∪<\u002Fspan> Canais<\u002Fbutton>\n    <button data-page=\"network\"><span class=\"nav-ico\">⌘<\u002Fspan> Rede integrada<\u002Fbutton>\n    <div class=\"nav-divider\">Entrega<\u002Fdiv>\n    <button data-page=\"checks\"><span class=\"nav-ico\">✓<\u002Fspan> Verificações<\u002Fbutton>\n    <button data-page=\"memory\"><span class=\"nav-ico\">¶<\u002Fspan> Memorial<\u002Fbutton>\n    <button data-page=\"report\"><span class=\"nav-ico\">▤<\u002Fspan> Relatório<\u002Fbutton>\n    <button data-page=\"settings\"><span class=\"nav-ico\">⚙<\u002Fspan> Configurações<\u002Fbutton>\n  <\u002Fnav>\n  <div class=\"side-actions\">\n    <button id=\"btnNew\">Novo<\u002Fbutton><button id=\"btnSave\">Salvar<\u002Fbutton>\n    <button id=\"btnSample\">Exemplo<\u002Fbutton><button id=\"btnExportJson\">JSON<\u002Fbutton>\n  <\u002Fdiv>\n<\u002Faside>\n\n<main class=\"main\">\n<header class=\"topbar\">\n  <div style=\"display:flex;align-items:center;gap:11px\">\n    <button class=\"icon-btn menu-btn\" id=\"menuBtn\">☰<\u002Fbutton>\n    <div><h2 id=\"pageTitle\">Visão geral<\u002Fh2><p id=\"pageSubtitle\">Resumo técnico do projeto e andamento dos dados<\u002Fp><\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"top-actions\">\n    <span class=\"muted\" id=\"saveState\"><span class=\"status-dot\"><\u002Fspan>Dados locais<\u002Fspan>\n    <button class=\"icon-btn\" id=\"themeBtn\" title=\"Alternar tema\">◐<\u002Fbutton>\n    <button class=\"btn primary\" id=\"topSaveBtn\">Salvar projeto<\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<div class=\"content\">\n<section class=\"section active\" id=\"sec-dashboard\">\n  <div class=\"hero\">\n    <div>\n      <div class=\"badge\" style=\"background:rgba(255,255,255,.16);color:#fff\">Aplicação offline • arquivo único<\u002Fdiv>\n      <h2>Dimensionamento hidrológico e hidráulico em um fluxo integrado.<\u002Fh2>\n      <p>Cadastre as bacias, determine a chuva de projeto, dimensione dispositivos e gere um memorial auditável com fórmulas, unidades e verificações automáticas.<\u002Fp>\n      <div class=\"actions mt\"><button class=\"btn\" data-go=\"project\">Começar projeto<\u002Fbutton><button class=\"btn ghost\" style=\"color:#fff;border-color:rgba(255,255,255,.5)\" id=\"dashSample\">Carregar exemplo<\u002Fbutton><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"hero-side\">\n      <div style=\"display:flex;justify-content:space-between\"><b>Completude do estudo<\u002Fb><b id=\"completionPct\">0%<\u002Fb><\u002Fdiv>\n      <div class=\"progress mt\"><i id=\"completionBar\"><\u002Fi><\u002Fdiv>\n      <div id=\"completionSteps\" class=\"step-list mt\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"grid g5 mt\">\n    <div class=\"metric\"><small>Área contribuinte<\u002Fsmall><strong id=\"mArea\">0,00 ha<\u002Fstrong><span>Soma das bacias<\u002Fspan><\u002Fdiv>\n    <div class=\"metric\"><small>Vazão de pico<\u002Fsmall><strong id=\"mFlow\">0,000 m³/s<\u002Fstrong><span>Maior vazão acumulada<\u002Fspan><\u002Fdiv>\n    <div class=\"metric\"><small>Galerias<\u002Fsmall><strong id=\"mPipe\">0 m<\u002Fstrong><span>Extensão cadastrada<\u002Fspan><\u002Fdiv>\n    <div class=\"metric\"><small>Dispositivos<\u002Fsmall><strong id=\"mDevices\">0<\u002Fstrong><span>Sarjetas, captações e estruturas<\u002Fspan><\u002Fdiv>\n    <div class=\"metric\"><small>Alertas críticos<\u002Fsmall><strong id=\"mCritical\">0<\u002Fstrong><span>Requerem revisão<\u002Fspan><\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"grid g2 mt\">\n    <div class=\"card\"><div class=\"card-head\"><h3>Distribuição das áreas<\u002Fh3><span class=\"badge info\">Bacias<\u002Fspan><\u002Fdiv><canvas id=\"basinChart\" class=\"chart\"><\u002Fcanvas><\u002Fdiv>\n    <div class=\"card\"><div class=\"card-head\"><h3>Resumo de consistência<\u002Fh3><button class=\"btn small\" data-go=\"checks\">Abrir verificações<\u002Fbutton><\u002Fdiv><div id=\"dashboardChecks\"><\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section class=\"section\" id=\"sec-project\">\n  <div class=\"page-head\"><div><h2>Dados do projeto<\u002Fh2><p>Informações de identificação, localização, responsável e critérios gerais do estudo.<\u002Fp><\u002Fdiv><div class=\"actions\"><button class=\"btn\" id=\"duplicateProject\">Duplicar<\u002Fbutton><button class=\"btn primary\" id=\"saveProjectForm\">Aplicar dados<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n  <div class=\"card\">\n    <div class=\"form-grid\">\n      <div class=\"field span2\"><label>Nome do projeto *<\u002Flabel><input id=\"pName\" placeholder=\"Ex.: Microdrenagem do Loteamento Primavera\"><\u002Fdiv>\n      <div class=\"field\"><label>Código<\u002Flabel><input id=\"pCode\" placeholder=\"DRN-001\"><\u002Fdiv>\n      <div class=\"field\"><label>Versão<\u002Flabel><input id=\"pVersion\" placeholder=\"1.0\"><\u002Fdiv>\n      <div class=\"field\"><label>Responsável técnico<\u002Flabel><input id=\"pEngineer\"><\u002Fdiv>\n      <div class=\"field\"><label>Registro profissional<\u002Flabel><input id=\"pRegistry\"><\u002Fdiv>\n      <div class=\"field\"><label>Contratante<\u002Flabel><input id=\"pClient\"><\u002Fdiv>\n      <div class=\"field\"><label>Data do estudo<\u002Flabel><input type=\"date\" id=\"pDate\"><\u002Fdiv>\n      <div class=\"field\"><label>Município<\u002Flabel><input id=\"pCity\"><\u002Fdiv>\n      <div class=\"field\"><label>Estado<\u002Flabel><input id=\"pState\" maxlength=\"2\" placeholder=\"UF\"><\u002Fdiv>\n      <div class=\"field span2\"><label>Endereço/localização<\u002Flabel><input id=\"pAddress\"><\u002Fdiv>\n      <div class=\"field\"><label>Tipo de ocupação<\u002Flabel><select id=\"pOccupation\"><option>Residencial<\u002Foption><option>Comercial<\u002Foption><option>Industrial<\u002Foption><option>Mista<\u002Foption><option>Viária<\u002Foption><option>Outro<\u002Foption><\u002Fselect><\u002Fdiv>\n      <div class=\"field\"><label>Sistema de coordenadas<\u002Flabel><input id=\"pCrs\" placeholder=\"SIRGAS 2000 / UTM\"><\u002Fdiv>\n      <div class=\"field span2\"><label>Descrição<\u002Flabel><textarea id=\"pDescription\"><\u002Ftextarea><\u002Fdiv>\n      <div class=\"field span2\"><label>Observações gerais<\u002Flabel><textarea id=\"pNotes\"><\u002Ftextarea><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"alert warn mt\"><b>Responsabilidade técnica<\u002Fb><small>Os resultados são de apoio ao pré-dimensionamento. A seleção de critérios, dados pluviométricos e faixas admissíveis deve ser validada pelo profissional habilitado e pelo órgão competente.<\u002Fsmall><\u002Fdiv>\n<\u002Fsection>\n\n<section class=\"section\" id=\"sec-saved\">\n  <div class=\"page-head\"><div><h2>Projetos salvos<\u002Fh2><p>Biblioteca local armazenada neste navegador. Exporte JSON para criar uma cópia externa.<\u002Fp><\u002Fdiv><div class=\"actions\"><label class=\"btn\" for=\"jsonImport\">Importar JSON<\u002Flabel><input class=\"hidden\" type=\"file\" accept=\".json,application/json\" id=\"jsonImport\"><button class=\"btn primary\" id=\"saveSnapshot\">Salvar versão atual<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n  <div class=\"card\"><div id=\"savedProjects\"><\u002Fdiv><\u002Fdiv>\n  <div class=\"card mt\"><h3>Cópia de segurança<\u002Fh3><div class=\"grid g3\"><button class=\"btn full\" id=\"backupAll\">Exportar biblioteca completa<\u002Fbutton><button class=\"btn full\" id=\"restoreLast\">Restaurar último autosave<\u002Fbutton><button class=\"btn danger full\" id=\"clearLibrary\">Excluir biblioteca local<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n<\u002Fsection>\n\n<section class=\"section\" id=\"sec-idf\">\n  <div class=\"page-head\"><div><h2>Chuva de projeto e equação IDF<\u002Fh2><p>Equação genérica configurável: i = K × Trᵃ ÷ (t + b)ᶜ. Registre sempre a fonte dos parâmetros locais.<\u002Fp><\u002Fdiv><div class=\"actions\"><button class=\"btn\" id=\"idfCompare\">Comparar períodos<\u002Fbutton><button class=\"btn primary\" id=\"applyIdf\">Aplicar IDF<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n  <div class=\"grid g2\">\n    <div class=\"card\">\n      <h3>Parâmetros<\u002Fh3>\n      <div class=\"form-grid\">\n        <div class=\"field\"><label>K<\u002Flabel><input type=\"number\" step=\"any\" id=\"idfK\"><\u002Fdiv>\n        <div class=\"field\"><label>Expoente a<\u002Flabel><input type=\"number\" step=\"any\" id=\"idfA\"><\u002Fdiv>\n        <div class=\"field\"><label>Parâmetro b<\u002Flabel><input type=\"number\" step=\"any\" id=\"idfB\"><\u002Fdiv>\n        <div class=\"field\"><label>Expoente c<\u002Flabel><input type=\"number\" step=\"any\" id=\"idfC\"><\u002Fdiv>\n        <div class=\"field\"><label>Período de retorno<\u002Flabel><div class=\"input-unit\"><input type=\"number\" step=\"any\" min=\"0.1\" id=\"idfTr\"><span>anos<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <div class=\"field\"><label>Duração da chuva<\u002Flabel><div class=\"input-unit\"><input type=\"number\" step=\"any\" min=\"0.1\" id=\"idfT\"><span>min<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <div class=\"field span2\"><label>Município / estação<\u002Flabel><input id=\"idfStation\" placeholder=\"Identificação da equação\"><\u002Fdiv>\n        <div class=\"field span4\"><label>Fonte e referência<\u002Flabel><textarea id=\"idfSource\" placeholder=\"Publicação, autor, ano, órgão, estação e período de dados\"><\u002Ftextarea><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"result mt\" id=\"idfResult\"><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"card\"><div class=\"card-head\"><h3>Curvas intensidade × duração<\u002Fh3><button class=\"btn small\" id=\"downloadIdfChart\">Exportar imagem<\u002Fbutton><\u002Fdiv><canvas class=\"chart\" id=\"idfChart\"><\u002Fcanvas><div class=\"legend mt\" id=\"idfLegend\"><\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"card mt\"><h3>Critérios orientativos<\u002Fh3><div class=\"grid g3\"><div class=\"alert\"><b>Período de retorno<\u002Fb><small>Defina por criticidade, uso da via, consequências da falha e diretriz local.<\u002Fsmall><\u002Fdiv><div class=\"alert\"><b>Duração<\u002Fb><small>No Método Racional, a duração de cálculo costuma ser associada ao tempo de concentração adotado.<\u002Fsmall><\u002Fdiv><div class=\"alert\"><b>Unidades<\u002Fb><small>O resultado é apresentado em mm/h e convertido para L/s·ha por divisão por 3,6.<\u002Fsmall><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n<\u002Fsection>\n\n<section class=\"section\" id=\"sec-basins\">\n  <div class=\"page-head\"><div><h2>Bacias e superfícies<\u002Fh2><p>Cadastre sub-bacias e decomponha cada uma em superfícies para obter o coeficiente de escoamento ponderado.<\u002Fp><\u002Fdiv><div class=\"actions\"><button class=\"btn primary\" id=\"addBasin\">+ Nova bacia<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n  <div class=\"card\">\n    <div class=\"table-wrap\"><table><thead><tr><th>Código<\u002Fth><th>Nome<\u002Fth><th>Área (ha)<\u002Fth><th>C ponderado<\u002Fth><th>L (m)<\u002Fth><th>ΔH (m)<\u002Fth><th>Tc adotado (min)<\u002Fth><th>Ponto/trecho<\u002Fth><th>Situação<\u002Fth><th><\u002Fth><\u002Ftr><\u002Fthead><tbody id=\"basinRows\"><\u002Ftbody><\u002Ftable><\u002Fdiv>\n  <\u002Fdiv>\n  <div id=\"basinEditor\" class=\"card mt hidden\">\n    <div class=\"card-head\"><h3 id=\"basinEditorTitle\">Editar bacia<\u002Fh3><button class=\"icon-btn\" id=\"closeBasinEditor\">×<\u002Fbutton><\u002Fdiv>\n    <div class=\"form-grid\">\n      <input type=\"hidden\" id=\"bId\">\n      <div class=\"field\"><label>Código *<\u002Flabel><input id=\"bCode\"><\u002Fdiv>\n      <div class=\"field span2\"><label>Nome<\u002Flabel><input id=\"bName\"><\u002Fdiv>\n      <div class=\"field\"><label>Área declarada<\u002Flabel><div class=\"input-unit\"><input type=\"number\" step=\"any\" id=\"bArea\"><span>ha<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"field\"><label>Comprimento hidráulico<\u002Flabel><div class=\"input-unit\"><input type=\"number\" step=\"any\" id=\"bLength\"><span>m<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"field\"><label>Desnível<\u002Flabel><div class=\"input-unit\"><input type=\"number\" step=\"any\" id=\"bDrop\"><span>m<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"field\"><label>Declividade informada<\u002Flabel><div class=\"input-unit\"><input type=\"number\" step=\"any\" id=\"bSlope\"><span>m/m<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"field\"><label>Tc adotado<\u002Flabel><div class=\"input-unit\"><input type=\"number\" step=\"any\" id=\"bTc\"><span>min<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"field\"><label>Cota inicial<\u002Flabel><div class=\"input-unit\"><input type=\"number\" step=\"any\" id=\"bElevUp\"><span>m<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"field\"><label>Cota final<\u002Flabel><div class=\"input-unit\"><input type=\"number\" step=\"any\" id=\"bElevDown\"><span>m<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"field\"><label>Ponto de lançamento<\u002Flabel><input id=\"bOutlet\"><\u002Fdiv>\n      <div class=\"field span2\"><label>Observações<\u002Flabel><input id=\"bNotes\"><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"card-head mt\"><h3>Superfícies contribuintes<\u002Fh3><button class=\"btn small\" id=\"addSurface\">+ Superfície<\u002Fbutton><\u002Fdiv>\n    <div class=\"table-wrap\"><table><thead><tr><th>Tipo<\u002Fth><th>Área (ha)<\u002Fth><th>C<\u002Fth><th>Participação<\u002Fth><th><\u002Fth><\u002Ftr><\u002Fthead><tbody id=\"surfaceRows\"><\u002Ftbody><\u002Ftable><\u002Fdiv>\n    <div class=\"grid g3 mt\"><div class=\"result\"><small>Área das superfícies<\u002Fsmall><div class=\"big\" id=\"surfaceAreaSum\">0,00 ha<\u002Fdiv><\u002Fdiv><div class=\"result\"><small>Coeficiente ponderado<\u002Fsmall><div class=\"big\" id=\"surfaceC\">0,000<\u002Fdiv><\u002Fdiv><div class=\"result\"><small>Diferença declarada<\u002Fsmall><div class=\"big\" id=\"surfaceDiff\">0,00 ha<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n    <div class=\"actions mt\"><button class=\"btn danger\" id=\"deleteBasin\">Excluir bacia<\u002Fbutton><span style=\"flex:1\"><\u002Fspan><button class=\"btn\" id=\"cancelBasin\">Cancelar<\u002Fbutton><button class=\"btn primary\" id=\"saveBasin\">Salvar bacia<\u002Fbutton><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section class=\"section\" id=\"sec-tc\">\n  <div class=\"page-head\"><div><h2>Tempo de concentração<\u002Fh2><p>Compare diferentes formulações, verifique a faixa de aplicação e registre a justificativa do valor adotado em cada bacia.<\u002Fp><\u002Fdiv><div class=\"actions\"><button class=\"btn primary\" id=\"calculateTc\">Calcular métodos<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n  <div class=\"grid g2\">\n    <div class=\"card\">\n      <h3>Dados de cálculo<\u002Fh3>\n      <div class=\"form-grid\">\n        <div class=\"field span2\"><label>Bacia<\u002Flabel><select id=\"tcBasin\"><\u002Fselect><\u002Fdiv>\n        <div class=\"field\"><label>Comprimento L<\u002Flabel><div class=\"input-unit\"><input type=\"number\" step=\"any\" id=\"tcL\"><span>m<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <div class=\"field\"><label>Declividade S<\u002Flabel><div class=\"input-unit\"><input type=\"number\" step=\"any\" id=\"tcS\"><span>m/m<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <div class=\"field\"><label>Área A<\u002Flabel><div class=\"input-unit\"><input type=\"number\" step=\"any\" id=\"tcArea\"><span>km²<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <div class=\"field\"><label>Coeficiente C<\u002Flabel><input type=\"number\" min=\"0\" max=\"1\" step=\"any\" id=\"tcC\"><\u002Fdiv>\n        <div class=\"field\"><label>Velocidade cinemática<\u002Flabel><div class=\"input-unit\"><input type=\"number\" step=\"any\" id=\"tcV\"><span>m/s<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <div class=\"field\"><label>Tc manual<\u002Flabel><div class=\"input-unit\"><input type=\"number\" step=\"any\" id=\"tcManual\"><span>min<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <div class=\"field\"><label>K do método DNOS<\u002Flabel><input type=\"number\" min=\"2\" max=\"5.5\" step=\"0.1\" id=\"tcK\" value=\"4\"><small>Valor de referência editável: 2,0 a 5,5; condição média: 4,0.<\u002Fsmall><\u002Fdiv>\n        <div class=\"field span4\"><label>Justificativa da seleção<\u002Flabel><textarea id=\"tcJustification\"><\u002Ftextarea><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"actions mt\"><button class=\"btn\" id=\"tcUseSelected\">Aplicar resultado selecionado à bacia<\u002Fbutton><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"card\"><h3>Comparação<\u002Fh3><div id=\"tcResults\"><div class=\"muted center\">Preencha os dados e calcule.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"card mt\">\n    <h3>Expressões implementadas<\u002Fh3>\n    <details><summary>Kirpich<\u002Fsummary><div class=\"code\">Tc = 0,0195 × L^0,77 × S^-0,385<\u002Fdiv><\u002Fdetails>\n    <details><summary>California Culverts Practice<\u002Fsummary><div class=\"code\">Tc = 57 × (L³ / ΔH)^0,385, com L em km e ΔH em m<\u002Fdiv><\u002Fdetails>\n    <details><summary>Ven Te Chow<\u002Fsummary><div class=\"code\">Tc = 25,2 × (L / √I)^0,64, com L em km e I em %<\u002Fdiv><\u002Fdetails>\n    <details><summary>George Ribeiro<\u002Fsummary><div class=\"code\">Tc = 16 × L / ((1,05 − 0,2p) × (100S)^0,04), com L em km e p = fração vegetada<\u002Fdiv><\u002Fdetails>\n    <details><summary>DNOS<\u002Fsummary><div class=\"code\">Tc = (10 / K) × A^0,3 × L^0,2 / I^0,4, com A em ha, L em m, I em % e K conforme as características da bacia<\u002Fdiv><\u002Fdetails>\n    <details><summary>FAA e cinemático<\u002Fsummary><div class=\"code\">FAA: Tc = 3,260334 × (1,1 − C) × √L / I^(1/3), com L em m e I em %\nCinemático: Tc = L / (60 × V)<\u002Fdiv><\u002Fdetails>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section class=\"section\" id=\"sec-rational\">\n  <div class=\"page-head\"><div><h2>Método Racional e vazões de projeto<\u002Fh2><p>Q = C × i × A ÷ 360, para Q em m³/s, i em mm/h e A em hectares.<\u002Fp><\u002Fdiv><div class=\"actions\"><button class=\"btn\" id=\"syncTcIdf\">Usar Tc como duração<\u002Fbutton><button class=\"btn primary\" id=\"calculateRational\">Recalcular todas<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n  <div class=\"grid g4\">\n    <div class=\"metric\"><small>Área total<\u002Fsmall><strong id=\"rArea\">0,00 ha<\u002Fstrong><span>Área das bacias<\u002Fspan><\u002Fdiv>\n    <div class=\"metric\"><small>Vazão local total<\u002Fsmall><strong id=\"rFlow\">0,000 m³/s<\u002Fstrong><span>Soma sem considerar simultaneidade<\u002Fspan><\u002Fdiv>\n    <div class=\"metric\"><small>Maior intensidade<\u002Fsmall><strong id=\"rIntensity\">0,0 mm/h<\u002Fstrong><span>Entre as bacias<\u002Fspan><\u002Fdiv>\n    <div class=\"metric\"><small>Tr adotado<\u002Fsmall><strong id=\"rTr\">0 anos<\u002Fstrong><span>Equação IDF ativa<\u002Fspan><\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"card mt\">\n    <div class=\"table-wrap\"><table><thead><tr><th>Bacia<\u002Fth><th>Área (ha)<\u002Fth><th>C<\u002Fth><th>Tc (min)<\u002Fth><th>i (mm/h)<\u002Fth><th>Q (m³/s)<\u002Fth><th>Q (L/s)<\u002Fth><th>Substituição numérica<\u002Fth><\u002Ftr><\u002Fthead><tbody id=\"rationalRows\"><\u002Ftbody><\u002Ftable><\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"card mt\"><h3>Análise de cenários de impermeabilização<\u002Fh3><div class=\"form-grid\"><div class=\"field\"><label>Aumento relativo de C<\u002Flabel><div class=\"input-unit\"><input type=\"number\" id=\"scenarioC\" value=\"15\" step=\"any\"><span>%<\u002Fspan><\u002Fdiv><\u002Fdiv><div class=\"field\"><label>Período de retorno alternativo<\u002Flabel><div class=\"input-unit\"><input type=\"number\" id=\"scenarioTr\" value=\"25\" step=\"any\"><span>anos<\u002Fspan><\u002Fdiv><\u002Fdiv><div class=\"field\"><label>Fator de segurança<\u002Flabel><input type=\"number\" id=\"scenarioFs\" value=\"1\" min=\"0.1\" step=\"any\"><\u002Fdiv><div class=\"field\" style=\"justify-content:end\"><button class=\"btn primary\" id=\"runScenario\">Comparar cenário<\u002Fbutton><\u002Fdiv><\u002Fdiv><div id=\"scenarioResult\" class=\"mt\"><\u002Fdiv><\u002Fdiv>\n<\u002Fsection>\n\n<section class=\"section\" id=\"sec-gutters\">\n  <div class=\"page-head\"><div><h2>Sarjetas<\u002Fh2><p>Verificação pela equação de Manning aplicada à seção triangular junto ao meio-fio, com cálculo iterativo da profundidade.<\u002Fp><\u002Fdiv><div class=\"actions\"><button class=\"btn primary\" id=\"addGutter\">+ Nova sarjeta<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n  <div class=\"card\">\n    <div class=\"table-wrap\"><table><thead><tr><th>Código<\u002Fth><th>Q projeto<\u002Fth><th>S longitudinal<\u002Fth><th>S transversal<\u002Fth><th>n<\u002Fth><th>Profundidade<\u002Fth><th>Espalhamento<\u002Fth><th>Velocidade<\u002Fth><th>Capacidade<\u002Fth><th>Situação<\u002Fth><th><\u002Fth><\u002Ftr><\u002Fthead><tbody id=\"gutterRows\"><\u002Ftbody><\u002Ftable><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section class=\"section\" id=\"sec-inlets\">\n  <div class=\"page-head\"><div><h2>Bocas de lobo<\u002Fh2><p>Estimativa de captação por abertura lateral, grelha ou dispositivo combinado, com redução por obstrução e cálculo da vazão residual.<\u002Fp><\u002Fdiv><div class=\"actions\"><button class=\"btn primary\" id=\"addInlet\">+ Nova boca de lobo<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n  <div class=\"card\">\n    <div class=\"table-wrap\"><table><thead><tr><th>Código<\u002Fth><th>Tipo<\u002Fth><th>Q afluente<\u002Fth><th>Dimensões<\u002Fth><th>Obstrução<\u002Fth><th>Capacidade<\u002Fth><th>Captada<\u002Fth><th>Residual<\u002Fth><th>Eficiência<\u002Fth><th>Situação<\u002Fth><th><\u002Fth><\u002Ftr><\u002Fthead><tbody id=\"inletRows\"><\u002Ftbody><\u002Ftable><\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"alert warn mt\"><b>Modelo simplificado<\u002Fb><small>A capacidade é estimada por relações de vertedouro e orifício. Fatores de geometria, depressão local, aproximação pela sarjeta e ensaios do dispositivo devem ser verificados no manual adotado.<\u002Fsmall><\u002Fdiv>\n<\u002Fsection>\n\n<section class=\"section\" id=\"sec-pipes\">\n  <div class=\"page-head\"><div><h2>Galerias de águas pluviais<\u002Fh2><p>Dimensionamento de seções circulares e retangulares, verificação parcial, diâmetro comercial, velocidade, recobrimento e cotas.<\u002Fp><\u002Fdiv><div class=\"actions\"><button class=\"btn\" id=\"sizeAllPipes\">Dimensionar automaticamente<\u002Fbutton><button class=\"btn primary\" id=\"addPipe\">+ Novo trecho<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n  <div class=\"card\">\n    <div class=\"table-wrap\"><table><thead><tr><th>Trecho<\u002Fth><th>De → Para<\u002Fth><th>Q local<\u002Fth><th>Q acumulada<\u002Fth><th>Seção<\u002Fth><th>Dimensão<\u002Fth><th>S<\u002Fth><th>n<\u002Fth><th>L<\u002Fth><th>y/D<\u002Fth><th>V<\u002Fth><th>Capacidade<\u002Fth><th>Recobr.<\u002Fth><th>Situação<\u002Fth><th><\u002Fth><\u002Ftr><\u002Fthead><tbody id=\"pipeRows\"><\u002Ftbody><\u002Ftable><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section class=\"section\" id=\"sec-structures\">\n  <div class=\"page-head\"><div><h2>Poços de visita e caixas<\u002Fh2><p>Controle de nós, profundidades, perdas localizadas e compatibilidade das cotas de entrada e saída.<\u002Fp><\u002Fdiv><div class=\"actions\"><button class=\"btn primary\" id=\"addStructure\">+ Nova estrutura<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n  <div class=\"card\">\n    <div class=\"table-wrap\"><table><thead><tr><th>Código<\u002Fth><th>Tipo<\u002Fth><th>Cota terreno<\u002Fth><th>Cota fundo<\u002Fth><th>Profundidade<\u002Fth><th>Dimensões<\u002Fth><th>K local<\u002Fth><th>Entradas<\u002Fth><th>Saídas<\u002Fth><th>Situação<\u002Fth><th><\u002Fth><\u002Ftr><\u002Fthead><tbody id=\"structureRows\"><\u002Ftbody><\u002Ftable><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section class=\"section\" id=\"sec-channels\">\n  <div class=\"page-head\"><div><h2>Canais abertos<\u002Fh2><p>Seções retangulares, trapezoidais e triangulares com profundidade normal e crítica, número de Froude, bordo livre e tensão trativa.<\u002Fp><\u002Fdiv><div class=\"actions\"><button class=\"btn primary\" id=\"addChannel\">+ Novo canal<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n  <div class=\"card\">\n    <div class=\"table-wrap\"><table><thead><tr><th>Código<\u002Fth><th>Seção<\u002Fth><th>Q<\u002Fth><th>b<\u002Fth><th>z<\u002Fth><th>S<\u002Fth><th>n<\u002Fth><th>yn<\u002Fth><th>yc<\u002Fth><th>V<\u002Fth><th>Fr<\u002Fth><th>Regime<\u002Fth><th>Bordo livre<\u002Fth><th>Situação<\u002Fth><th><\u002Fth><\u002Ftr><\u002Fthead><tbody id=\"channelRows\"><\u002Ftbody><\u002Ftable><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section class=\"section\" id=\"sec-network\">\n  <div class=\"page-head\"><div><h2>Rede integrada de drenagem<\u002Fh2><p>Acumulação automática de vazões por conectividade, visualização esquemática e perfil longitudinal simplificado.<\u002Fp><\u002Fdiv><div class=\"actions\"><button class=\"btn\" id=\"autoConnectBasins\">Associar bacias por trecho<\u002Fbutton><button class=\"btn primary\" id=\"recalcNetwork\">Recalcular rede<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n  <div class=\"grid g4\">\n    <div class=\"metric\"><small>Nós<\u002Fsmall><strong id=\"nNodes\">0<\u002Fstrong><span>Estruturas e extremidades<\u002Fspan><\u002Fdiv>\n    <div class=\"metric\"><small>Trechos<\u002Fsmall><strong id=\"nEdges\">0<\u002Fstrong><span>Galerias cadastradas<\u002Fspan><\u002Fdiv>\n    <div class=\"metric\"><small>Q de saída<\u002Fsmall><strong id=\"nOutletFlow\">0,000 m³/s<\u002Fstrong><span>Maior vazão acumulada<\u002Fspan><\u002Fdiv>\n    <div class=\"metric\"><small>Capacidade mínima<\u002Fsmall><strong id=\"nMinUtil\">0%<\u002Fstrong><span>Maior utilização Q/Qcap.<\u002Fspan><\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"grid g2 mt\">\n    <div class=\"card\"><div class=\"card-head\"><h3>Esquema topológico<\u002Fh3><button class=\"btn small\" id=\"downloadNetworkChart\">Exportar imagem<\u002Fbutton><\u002Fdiv><canvas class=\"chart network-canvas\" id=\"networkChart\"><\u002Fcanvas><div class=\"legend mt\"><span><i style=\"background:#18864b\"><\u002Fi>Adequado<\u002Fspan><span><i style=\"background:#b56a00\"><\u002Fi>Próximo ao limite<\u002Fspan><span><i style=\"background:#c93737\"><\u002Fi>Insuficiente<\u002Fspan><span><i style=\"background:#627189\"><\u002Fi>Incompleto<\u002Fspan><\u002Fdiv><\u002Fdiv>\n    <div class=\"card\"><div class=\"card-head\"><h3>Perfil longitudinal<\u002Fh3><select id=\"profilePath\"><\u002Fselect><\u002Fdiv><canvas class=\"chart network-canvas\" id=\"profileChart\"><\u002Fcanvas><div id=\"profileSummary\" class=\"mt\"><\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"card mt\"><h3>Resumo dos trechos<\u002Fh3><div class=\"table-wrap\"><table><thead><tr><th>Trecho<\u002Fth><th>Nó montante<\u002Fth><th>Nó jusante<\u002Fth><th>Bacias<\u002Fth><th>Q local<\u002Fth><th>Q acumulada<\u002Fth><th>Capacidade<\u002Fth><th>Utilização<\u002Fth><th>Tempo percurso<\u002Fth><th>Situação<\u002Fth><\u002Ftr><\u002Fthead><tbody id=\"networkRows\"><\u002Ftbody><\u002Ftable><\u002Fdiv><\u002Fdiv>\n<\u002Fsection>\n\n<section class=\"section\" id=\"sec-checks\">\n  <div class=\"page-head\"><div><h2>Verificações automáticas<\u002Fh2><p>Consistência de entradas, capacidade, velocidade, cotas, conectividade e critérios configuráveis.<\u002Fp><\u002Fdiv><div class=\"actions\"><button class=\"btn\" id=\"exportChecks\">Exportar CSV<\u002Fbutton><button class=\"btn primary\" id=\"runChecks\">Atualizar verificações<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n  <div class=\"grid g4\">\n    <div class=\"metric\"><small>Total<\u002Fsmall><strong id=\"cTotal\">0<\u002Fstrong><span>Itens verificados<\u002Fspan><\u002Fdiv>\n    <div class=\"metric\"><small>Adequados<\u002Fsmall><strong id=\"cOk\">0<\u002Fstrong><span>Sem ressalvas<\u002Fspan><\u002Fdiv>\n    <div class=\"metric\"><small>Atenção<\u002Fsmall><strong id=\"cWarn\">0<\u002Fstrong><span>Revisão recomendada<\u002Fspan><\u002Fdiv>\n    <div class=\"metric\"><small>Críticos<\u002Fsmall><strong id=\"cDanger\">0<\u002Fstrong><span>Correção necessária<\u002Fspan><\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"card mt\"><div class=\"toolbar\"><select id=\"checkFilter\"><option value=\"all\">Todos os níveis<\u002Foption><option value=\"danger\">Somente críticos<\u002Foption><option value=\"warn\">Somente atenção<\u002Foption><option value=\"ok\">Somente adequados<\u002Foption><\u002Fselect><input id=\"checkSearch\" placeholder=\"Filtrar por texto\" style=\"min-width:260px;border:1px solid var(--line);background:var(--surface);color:var(--text);border-radius:8px;padding:8px\"><\u002Fdiv><div id=\"checkList\"><\u002Fdiv><\u002Fdiv>\n<\u002Fsection>\n\n<section class=\"section\" id=\"sec-memory\">\n  <div class=\"page-head\"><div><h2>Memorial de cálculo<\u002Fh2><p>Documento técnico gerado a partir dos dados ativos, com fórmulas, substituições, resultados e conclusões.<\u002Fp><\u002Fdiv><div class=\"actions\"><button class=\"btn\" id=\"copyMemory\">Copiar texto<\u002Fbutton><button class=\"btn\" id=\"downloadMemory\">Baixar TXT<\u002Fbutton><button class=\"btn primary\" data-go=\"report\">Montar relatório<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n  <div class=\"card\"><div id=\"memoryContent\"><\u002Fdiv><\u002Fdiv>\n<\u002Fsection>\n\n<section class=\"section\" id=\"sec-report\">\n  <div class=\"page-head\"><div><h2>Relatório técnico<\u002Fh2><p>Selecione a abrangência e use a impressão do navegador para salvar em PDF.<\u002Fp><\u002Fdiv><div class=\"actions\"><select id=\"reportMode\"><option value=\"complete\">Relatório completo<\u002Foption><option value=\"summary\">Relatório resumido<\u002Foption><option value=\"memory\">Apenas memorial<\u002Foption><option value=\"tables\">Apenas tabelas<\u002Foption><option value=\"critical\">Apenas itens críticos<\u002Foption><\u002Fselect><button class=\"btn\" id=\"refreshReport\">Atualizar<\u002Fbutton><button class=\"btn\" id=\"exportAllCsv\">Exportar CSV<\u002Fbutton><button class=\"btn primary\" id=\"printReport\">Imprimir / PDF<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n  <div class=\"card\"><article class=\"report-sheet\" id=\"reportContent\"><\u002Farticle><\u002Fdiv>\n<\u002Fsection>\n\n<section class=\"section\" id=\"sec-settings\">\n  <div class=\"page-head\"><div><h2>Configurações e critérios<\u002Fh2><p>Valores iniciais editáveis. Registre na memória técnica a referência adotada para cada limite.<\u002Fp><\u002Fdiv><div class=\"actions\"><button class=\"btn\" id=\"restoreDefaults\">Restaurar padrões<\u002Fbutton><button class=\"btn primary\" id=\"saveSettings\">Aplicar configurações<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n  <div class=\"grid g2\">\n    <div class=\"card\"><h3>Galerias e sarjetas<\u002Fh3><div class=\"form-grid\">\n      <div class=\"field\"><label>Velocidade mínima<\u002Flabel><div class=\"input-unit\"><input type=\"number\" step=\"any\" id=\"sMinV\"><span>m/s<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"field\"><label>Velocidade máxima<\u002Flabel><div class=\"input-unit\"><input type=\"number\" step=\"any\" id=\"sMaxV\"><span>m/s<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"field\"><label>Enchimento máximo<\u002Flabel><div class=\"input-unit\"><input type=\"number\" step=\"any\" id=\"sMaxFill\"><span>%<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"field\"><label>Recobrimento mínimo<\u002Flabel><div class=\"input-unit\"><input type=\"number\" step=\"any\" id=\"sMinCover\"><span>m<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"field\"><label>Espalhamento máx. sarjeta<\u002Flabel><div class=\"input-unit\"><input type=\"number\" step=\"any\" id=\"sMaxSpread\"><span>m<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"field\"><label>Profundidade máx. sarjeta<\u002Flabel><div class=\"input-unit\"><input type=\"number\" step=\"any\" id=\"sMaxGutterDepth\"><span>m<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"field\"><label>Utilização de atenção<\u002Flabel><div class=\"input-unit\"><input type=\"number\" step=\"any\" id=\"sWarnUtil\"><span>%<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"field\"><label>Casas decimais<\u002Flabel><input type=\"number\" min=\"1\" max=\"6\" id=\"sDecimals\"><\u002Fdiv>\n    <\u002Fdiv><\u002Fdiv>\n    <div class=\"card\"><h3>Canais e captações<\u002Fh3><div class=\"form-grid\">\n      <div class=\"field\"><label>Bordo livre mínimo<\u002Flabel><div class=\"input-unit\"><input type=\"number\" step=\"any\" id=\"sMinFreeboard\"><span>m<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"field\"><label>Eficiência mínima da boca<\u002Flabel><div class=\"input-unit\"><input type=\"number\" step=\"any\" id=\"sMinInletEff\"><span>%<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"field\"><label>Obstrução padrão<\u002Flabel><div class=\"input-unit\"><input type=\"number\" step=\"any\" id=\"sDefaultClog\"><span>%<\u002Fspan><\u002Fdiv><\u002Fdiv>\n      <div class=\"field\"><label>Fator de segurança<\u002Flabel><input type=\"number\" step=\"any\" id=\"sSafety\"><\u002Fdiv>\n      <div class=\"field span4\"><label>Referência dos critérios<\u002Flabel><textarea id=\"sCriteriaSource\"><\u002Ftextarea><\u002Fdiv>\n    <\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"card mt\"><h3>Diâmetros comerciais (mm)<\u002Fh3><div class=\"field\"><input id=\"sDiameters\" placeholder=\"300, 400, 500, 600, 800...\"><span class=\"help\">Separar por vírgulas. A seleção automática usa o primeiro diâmetro que atende aos critérios.<\u002Fspan><\u002Fdiv><\u002Fdiv>\n  <div class=\"card mt\"><h3>Biblioteca de coeficientes de escoamento<\u002Fh3><div class=\"table-wrap\"><table><thead><tr><th>Superfície<\u002Fth><th>C sugerido<\u002Fth><th><\u002Fth><\u002Ftr><\u002Fthead><tbody id=\"coeffRows\"><\u002Ftbody><\u002Ftable><\u002Fdiv><button class=\"btn small mt\" id=\"addCoeff\">+ Coeficiente<\u002Fbutton><\u002Fdiv>\n  <div class=\"card mt\"><h3>Coeficientes de Manning<\u002Fh3><div class=\"table-wrap\"><table><thead><tr><th>Material<\u002Fth><th>n sugerido<\u002Fth><th><\u002Fth><\u002Ftr><\u002Fthead><tbody id=\"manningRows\"><\u002Ftbody><\u002Ftable><\u002Fdiv><button class=\"btn small mt\" id=\"addManning\">+ Material<\u002Fbutton><\u002Fdiv>\n<\u002Fsection>\n<\u002Fdiv>\n<\u002Fmain>\n<\u002Fdiv>\n\n<div class=\"modal\" id=\"editorModal\"><div class=\"modal-box\"><div class=\"card-head\"><h3 id=\"modalTitle\">Editar item<\u002Fh3><button class=\"icon-btn\" id=\"closeModal\">×<\u002Fbutton><\u002Fdiv><div id=\"modalBody\"><\u002Fdiv><div class=\"actions mt\"><button class=\"btn danger\" id=\"modalDelete\">Excluir<\u002Fbutton><span style=\"flex:1\"><\u002Fspan><button class=\"btn\" id=\"modalCancel\">Cancelar<\u002Fbutton><button class=\"btn primary\" id=\"modalSave\">Salvar<\u002Fbutton><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n<div class=\"toast-wrap\" id=\"toasts\"><\u002Fdiv>\n\n<script>\n\"use strict\";\nconst safeStorage = {\n  getItem(key){try{return window.localStorage.getItem(key)}catch{return null}},\n  setItem(key,value){try{window.localStorage.setItem(key,value);return true}catch{return false}},\n  removeItem(key){try{window.localStorage.removeItem(key);return true}catch{return false}},\n  clear(){try{window.localStorage.clear();return true}catch{return false}}\n};\n\nconst $ = id => document.getElementById(id);\nconst $$ = (sel, root=document) => [...root.querySelectorAll(sel)];\nconst deepClone = obj => JSON.parse(JSON.stringify(obj));\nconst uid = (prefix=\"id\") => `${prefix}_${Date.now().toString(36)}_${Math.random().toString(36).slice(2,8)}`;\nconst clamp = (v,a,b) => Math.min(b,Math.max(a,v));\nconst hasNumber = v => v !== null && v !== \"\" && v !== undefined && Number.isFinite(Number(v));\nconst asNumber = (v, fallback=0) => {\n  if (v === null || v === undefined || v === \"\") return fallback;\n  const n = Number(String(v).replace(\",\", \".\"));\n  return Number.isFinite(n) ? n : fallback;\n};\nconst nval = (id, fallback=0) => asNumber($(id)?.value, fallback);\nconst sval = id => String($(id)?.value ?? \"\").trim();\nconst escapeHTML = s => String(s ?? \"\").replace(/[&<>\"']/g,m=>({\"&\":\"&amp;\",\"<\":\"&lt;\",\">\":\"&gt;\",'\"':\"&quot;\",\"'\":\"&#039;\"}[m]));\nconst formatDate = d => {\n  if(!d) return \"—\";\n  const x = new Date(`${d}T12:00:00`);\n  return Number.isNaN(x.getTime()) ? d : x.toLocaleDateString(\"pt-BR\");\n};\nconst todayISO = () => new Date().toISOString().slice(0,10);\nconst fmt = (v,d) => Number.isFinite(Number(v)) ? Number(v).toLocaleString(\"pt-BR\",{minimumFractionDigits:d ?? state.settings.decimals,maximumFractionDigits:d ?? state.settings.decimals}) : \"—\";\nconst pct = (v,d=1) => Number.isFinite(Number(v)) ? `${fmt(Number(v)*100,d)}%` : \"—\";\nconst statusBadge = (level,label) => `<span class=\"badge ${level}\">${level===\"ok\"?\"✓\":level===\"danger\"?\"!\":\"•\"} ${escapeHTML(label)}<\u002Fspan>`;\nconst calcStatus = (util) => !Number.isFinite(util) ? [\"info\",\"Incompleto\"] : util>1 ? [\"danger\",\"Insuficiente\"] : util>=state.settings.warnUtil/100 ? [\"warn\",\"Próximo ao limite\"] : [\"ok\",\"Adequado\"];\nconst debounce = (fn,ms=350) => {let t;return (...a)=>{clearTimeout(t);t=setTimeout(()=>fn(...a),ms)}};\nconst downloadBlob = (name, content, type=\"text/plain;charset=utf-8\") => {\n  const blob = content instanceof Blob ? content : new Blob([content],{type});\n  const url = URL.createObjectURL(blob), a=document.createElement(\"a\");\n  a.href=url;a.download=name;document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(url),1000);\n};\nconst csvCell = v => `\"${String(v ?? \"\").replace(/\"/g,'\"\"')}\"`;\nconst toast = (msg) => {\n  const el=document.createElement(\"div\");el.className=\"toast\";el.textContent=msg;$(\"toasts\").appendChild(el);\n  setTimeout(()=>el.remove(),2800);\n};\n\nconst DEFAULT_SETTINGS = {\n  minV:0.75,maxV:5,maxFill:85,minCover:0.60,maxSpread:3,maxGutterDepth:0.15,warnUtil:80,decimals:3,\n  minFreeboard:0.30,minInletEff:60,defaultClog:30,safety:1.10,\n  criteriaSource:\"Critérios preliminares editáveis. Substituir pelos limites do manual municipal, órgão contratante e normas aplicáveis.\",\n  diameters:[300,400,500,600,800,1000,1200,1500,1800,2000],\n  coefficients:[\n    {name:\"Telhado\",c:0.90},{name:\"Pavimento asfáltico\",c:0.85},{name:\"Concreto\",c:0.90},\n    {name:\"Calçada\",c:0.75},{name:\"Estacionamento pavimentado\",c:0.80},{name:\"Solo compactado\",c:0.55},\n    {name:\"Área verde\",c:0.25},{name:\"Terreno natural\",c:0.20},{name:\"Residencial\",c:0.60},{name:\"Comercial\",c:0.80}\n  ],\n  mannings:[\n    {name:\"Concreto liso\",n:0.013},{name:\"Concreto comum\",n:0.015},{name:\"PVC/PEAD liso\",n:0.011},\n    {name:\"Alvenaria revestida\",n:0.015},{name:\"Canal de terra regular\",n:0.025},{name:\"Canal vegetado\",n:0.035}\n  ]\n};\nfunction blankState(){\n  return {\n    schema:2,modified:new Date().toISOString(),\n    project:{id:uid(\"prj\"),name:\"Novo projeto\",code:\"\",version:\"1.0\",engineer:\"\",registry:\"\",client:\"\",date:todayISO(),city:\"\",state:\"\",address:\"\",occupation:\"Residencial\",crs:\"\",description:\"\",notes:\"\"},\n    idf:{K:1100,a:0.15,b:12,c:0.75,tr:10,t:15,station:\"\",source:\"\"},\n    basins:[],gutters:[],inlets:[],pipes:[],structures:[],channels:[],\n    settings:deepClone(DEFAULT_SETTINGS),tcSelection:null\n  };\n}\nlet state=blankState();\nlet lastChecks=[];\nlet modalContext=null;\nlet tcComparison=[];\nconst CURRENT_KEY=\"drenapro_current_v2\";\nconst LIB_KEY=\"drenapro_library_v2\";\nconst AUTOSAVE_KEY=\"drenapro_autosave_v2\";\n\nfunction normalizeState(raw){\n  const base=blankState(), s=Object.assign(base,raw||{});\n  s.project=Object.assign(base.project,raw?.project||{});\n  s.idf=Object.assign(base.idf,raw?.idf||{});\n  s.settings=Object.assign(deepClone(DEFAULT_SETTINGS),raw?.settings||{});\n  for(const k of [\"basins\",\"gutters\",\"inlets\",\"pipes\",\"structures\",\"channels\"]) if(!Array.isArray(s[k])) s[k]=[];\n  s.settings.coefficients=Array.isArray(s.settings.coefficients)?s.settings.coefficients:deepClone(DEFAULT_SETTINGS.coefficients);\n  s.settings.mannings=Array.isArray(s.settings.mannings)?s.settings.mannings:deepClone(DEFAULT_SETTINGS.mannings);\n  s.settings.diameters=(s.settings.diameters||DEFAULT_SETTINGS.diameters).map(Number).filter(v=>v>0).sort((a,b)=>a-b);\n  return s;\n}\nfunction getLibrary(){\n  try{const x=JSON.parse(safeStorage.getItem(LIB_KEY)||\"[]\");return Array.isArray(x)?x:[]}catch{return []}\n}\nfunction setLibrary(lib){safeStorage.setItem(LIB_KEY,JSON.stringify(lib))}\nconst autosave=debounce(()=>{\n  state.modified=new Date().toISOString();\n  safeStorage.setItem(CURRENT_KEY,JSON.stringify(state));\n  safeStorage.setItem(AUTOSAVE_KEY,JSON.stringify(state));\n  $(\"saveState\").innerHTML='<span class=\"status-dot\"><\u002Fspan>Salvo automaticamente';\n  updateSideProject();\n},250);\nfunction persist(render=false){autosave();if(render) renderAll()}\nfunction saveToLibrary(asCopy=false){\n  let lib=getLibrary();\n  if(asCopy){state.project.id=uid(\"prj\");state.project.name=`${state.project.name} — cópia`}\n  const snapshot=deepClone(state);snapshot.modified=new Date().toISOString();\n  const idx=lib.findIndex(x=>x.project?.id===snapshot.project.id);\n  if(idx>=0) lib[idx]=snapshot; else lib.unshift(snapshot);\n  setLibrary(lib);state=snapshot;safeStorage.setItem(CURRENT_KEY,JSON.stringify(state));renderAll();toast(\"Projeto salvo na biblioteca local.\");\n}\nfunction updateSideProject(){\n  $(\"sideProjectName\").textContent=state.project.name||\"Novo projeto\";\n  $(\"sideProjectMeta\").textContent=`${state.project.code||\"Sem código\"} • v${state.project.version||\"1.0\"}`;\n}\nfunction loadInitial(){\n  try{\n    const saved=safeStorage.getItem(CURRENT_KEY);\n    state=saved?normalizeState(JSON.parse(saved)):blankState();\n  }catch{state=blankState()}\n}\n\n/* ===================== CÁLCULOS HIDROLÓGICOS ===================== */\nfunction idfIntensity(duration=state.idf.t,tr=state.idf.tr,idf=state.idf){\n  const K=asNumber(idf.K),a=asNumber(idf.a),b=asNumber(idf.b),c=asNumber(idf.c),t=asNumber(duration),T=asNumber(tr);\n  if(K<=0||T<=0||t+b<=0) return NaN;\n  return K*Math.pow(T,a)/Math.pow(t+b,c);\n}\nfunction basinArea(b){\n  const sum=(b.surfaces||[]).reduce((a,s)=>a+Math.max(0,asNumber(s.area)),0);\n  return asNumber(b.area)>0?asNumber(b.area):sum;\n}\nfunction basinSurfaceArea(b){return (b.surfaces||[]).reduce((a,s)=>a+Math.max(0,asNumber(s.area)),0)}\nfunction basinC(b){\n  const items=(b.surfaces||[]).filter(s=>asNumber(s.area)>0);\n  const A=items.reduce((a,s)=>a+asNumber(s.area),0);\n  if(A>0) return items.reduce((a,s)=>a+asNumber(s.area)*asNumber(s.c),0)/A;\n  return clamp(asNumber(b.c,0),0,1);\n}\nfunction basinSlope(b){\n  const s=asNumber(b.slope);\n  if(s>0)return s;\n  const L=asNumber(b.length),dh=asNumber(b.drop);\n  return L>0&&dh>0?dh/L:NaN;\n}\nfunction rationalForBasin(b,tr=state.idf.tr,cMultiplier=1){\n  const area=basinArea(b),C=clamp(basinC(b)*cMultiplier,0,1),tc=asNumber(b.tc,state.idf.t);\n  const i=idfIntensity(tc>0?tc:state.idf.t,tr);\n  const q=C*i*area/360;\n  return {area,C,tc,i,q,ls:q*1000};\n}\nfunction tcMethods({L,S,areaKm2,C,V,manual,Kdnos=4}){\n  const out=[],Lkm=L/1000,dh=L*S,areaHa=areaKm2*100,Ipercent=100*S,pVeg=clamp(1-C,0,1);\n  const push=(name,value,formula,note,valid=true)=>out.push({name,value:Number.isFinite(value)&&value>0?value:NaN,formula,note,valid});\n  push(\"Kirpich\",0.0195*Math.pow(L,.77)*Math.pow(S,-.385),\"0,0195 × L^0,77 × S^-0,385\",\"Mais associado a pequenas bacias com percurso definido.\",L>0&&S>0);\n  push(\"California Culverts\",57*Math.pow(Math.pow(Lkm,3)/dh,.385),\"57 × (Lkm³/ΔH)^0,385\",\"Forma baseada em comprimento e desnível.\",Lkm>0&&dh>0);\n  push(\"Ven Te Chow\",25.2*Math.pow(Lkm/Math.sqrt(Ipercent),.64),\"25,2 × (Lkm/√I%)^0,64\",\"A declividade da expressão é usada em porcentagem.\",Lkm>0&&Ipercent>0);\n  push(\"George Ribeiro\",16*Lkm/((1.05-.2*pVeg)*Math.pow(100*S,.04)),\"16 Lkm / [(1,05−0,2p)(100S)^0,04]\",\"p estimado como fração não impermeabilizada.\",Lkm>0&&S>0);\n  push(\"DNOS\",(10/Kdnos)*Math.pow(areaHa,.3)*Math.pow(L,.2)/Math.pow(Ipercent,.4),\"(10/K) × Aha^0,3 × Lm^0,2 / I%^0,4\",\"K representa as características e a capacidade de absorção da bacia.\",areaHa>0&&L>0&&Ipercent>0&&Kdnos>=2&&Kdnos<=5.5);\n  push(\"FAA\",3.260334*(1.1-C)*Math.sqrt(L)*Math.pow(Ipercent,-.333),\"3,260334 × (1,1−C) × √Lm / I%^(1/3)\",\"A declividade da expressão é usada em porcentagem.\",L>0&&Ipercent>0&&C>=0&&C<=1);\n  push(\"Cinemático\",L/(60*V),\"L / (60V)\",\"Tempo de percurso com velocidade informada.\",L>0&&V>0);\n  push(\"Manual\",manual,\"Entrada direta\",\"Valor informado e justificado pelo usuário.\",manual>0);\n  return out;\n}\n\n/* ===================== MANNING E SEÇÕES ===================== */\nfunction manningQ(A,R,S,n){\n  return n>0&&A>0&&R>0&&S>0 ? (1/n)*A*Math.pow(R,2/3)*Math.sqrt(S) : 0;\n}\nfunction gutterGeometry(y,sx){\n  if(y<=0||sx<=0)return {A:0,P:0,R:0,T:0};\n  const T=y/sx,A=y*T/2,P=Math.sqrt(T*T+y*y)+y;\n  return {A,P,R:A/P,T};\n}\nfunction solveBisection(fn,target,lo,hi,iterations=7 ular\"?{w:asNumber(p.width),h:asNumber(p.height)}:{D:asNumber(p.diameter)/1000};\n}\nfunction pipeMetrics(p,qOverride){\n  const q=Math.max(0,hasNumber(qOverride)?Number(qOverride):asNumber(p.qAccum,asNumber(p.qManual)));\n  const S=asNumber(p.slope),n=asNumber(p.n,.013),dim=pipeDimension(p);\n  let full,design,maxDepth,depth,section;\n  if(p.shape===\"rectangular\"){\n    full=rectangularSection(dim.w,dim.h,dim.h);maxDepth=dim.h*state.settings.maxFill/100;\n    design=rectangularSection(dim.w,dim.h,maxDepth);\n    const qAt=y=>{const z=rectangularSection(dim.w,dim.h,y);return manningQ(z.A,z.R,S,n)};\n    depth=solveBisection(qAt,q,0,dim.h);section=rectangularSection(dim.w,dim.h,depth);\n  }else{\n    full=circularSection(dim.D,dim.D);maxDepth=dim.D*state.settings.maxFill/100;\n    design=circularSection(dim.D,maxDepth);\n    const upper=Math.min(dim.D*.938,dim.D);\n    const qAt=y=>{const z=circularSection(dim.D,y);return manningQ(z.A,z.R,S,n)};\n    depth=solveBisection(qAt,q,0,upper);section=circularSection(dim.D,Math.min(depth,dim.D));\n  }\n  const qFull=manningQ(full.A,full.R,S,n),cap=manningQ(design.A,design.R,S,n),velocity=section.A>0?q/section.A:0;\n  const totalDepth=p.shape===\"rectangular\"?dim.h:dim.D,fill=totalDepth>0?depth/totalDepth:NaN,util=cap>0?q/cap:NaN;\n  const coverUp=hasNumber(p.groundUp)&&hasNumber(p.invertUp)?asNumber(p.groundUp)-asNumber(p.invertUp)-totalDepth:NaN;\n  const coverDown=hasNumber(p.groundDown)&&hasNumber(p.invertDown)?asNumber(p.groundDown)-asNumber(p.invertDown)-totalDepth:NaN;\n  const cover=Math.min(coverUp,coverDown),travel=velocity>0?asNumber(p.length)/velocity/60:NaN;\n  return {q,qFull,cap,depth,fill,velocity,util,cover,coverUp,coverDown,travel,area:section.A,radius:section.R,totalDepth};\n}\nfunction channelSection(ch,y){\n  const b=Math.max(0,asNumber(ch.width)),z=Math.max(0,asNumber(ch.z));\n  let A,P,T;\n  if(ch.shape===\"rectangular\"){A=b*y;P=b+2*y;T=b}\n  else if(ch.shape===\"triangular\"){A=z*y*y;P=2*y*Math.sqr or(const p of pipes){p.qAccum=acc(p);p.metrics=pipeMetrics(p,p.qAccum)}\n  return pipes;\n}\nfunction networkPaths(){\n  const pipes=state.pipes;\n  if(!pipes.length)return [];\n  const toNodes=new Set(pipes.map(p=>String(p.to).trim()).filter(Boolean));\n  let starts=pipes.filter(p=>!toNodes.has(String(p.from).trim()));\n  if(!starts.length)starts=[...pipes];\n  const paths=[];\n  function walk(pipe,path,seen){\n    if(seen.has(pipe.id)){paths.push(path);return}\n    const nexts=pipes.filter(p=>String(p.from).trim()===String(pipe.to).trim());\n    const nextPath=[...path,pipe];\n    if(!nexts.length){paths.push(nextPath);return}\n    for(const n of nexts)walk(n,nextPath,new Set([...seen,pipe.id]));\n  }\n  for(const s of starts)walk(s,[],new Set());\n  const unique=[];const keys=new Set();\n  for(const p of paths){const k=p.map(x=>x.id).join(\">\");if(k&&!keys.has(k)){keys.add(k);unique.push(p)}}\n  return unique;\n}\nfunction makeSample(){\n  const s=blankState();\n  s.project={...s.project,id:uid(\"prj\"),name:\"Loteamento Primavera — exemplo\",code:\"DRN-EX-01\",version:\"1.0\",\n    engineer:\"Eng. Responsável (exemplo)\",registry:\"CREA/CAU — preencher\",client:\"Município Exemplo\",date:todayISO(),\n    city:\"Município Exemplo\",state:\"CE\",address:\"Avenida das Águas, s/n\",occupation:\"Residencial\",crs:\"SIRGAS 2000 / UTM\",\n    description:\"Estudo demonstrativo de microdrenagem para loteamento residencial.\",notes:\"Dados exclusivamente ilustrativos; substituir pelas informações locais.\"};\n  s.idf={K:1080,a:.16,b:12,c:.75,tr:10,t:15,station:\"Estação demonstrativa\",source:\"Parâmetros ilustrativos. Inserir a equação IDF oficial da localidade e sua referência bibliográfica.\"};\n  s.basins=[\n    {id:uid(\"b\"),code:\"B-01\",name:\"Quadra Norte\",area:.80,length:420,drop:8.4,slope:.02,tc:12,elevUp:102,elevDown:93.6,outlet:\"P-01\",notes:\"\",\n      tcMethod:\"Kirpich\",tcJustification:\"Valor selecionado para demonstração.\",surfaces:[{id:uid(\"s\")
