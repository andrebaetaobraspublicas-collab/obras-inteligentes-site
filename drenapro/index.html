  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

255,.08)}\n.project-mini b{display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}\n.project-mini span{font-size:11px;opacity:.74}\n.nav{padding:3px 9px 14px;overflow:auto;flex:1}\n.nav button{width:100%;border:0;background:transparent;color:rgba(255,255,255,.82);padding:9px 11px;margin:1px 0;\n  border-radius:9px;text-align:left;display:flex;align-items:center;gap:10px;transition:.16s}\n.nav button:hover{background:rgba(255,255,255,.09);color:#fff}\n.nav button.active{background:#fff;color:#074557;font-weight:800}\n.nav .nav-divider{font-size:10px;text-transform:uppercase;letter-spacing:.12em;opacity:.55;padding:13px 11px 4px}\n.nav-ico{width:19px;text-align:center}\n.side-actions{display:grid;grid-template-columns:1fr 1fr;gap:7px;padding:11px 12px 14px;background:rgba(0,0,0,.12)}\n.side-actions button{border:1px solid rgba(255,255,255,.26);background:rgba(255,255,255,.08);color:#fff;border-radius:8px;padding:8px}\n.main{margin-left:var(--sidebar);min-height:100vh}\n.topbar{position:sticky;z-index:30;top:0;height:68px;background:color-mix(in srgb,var(--surface) 92%,transparent);\n  backdrop-filter:blur(12px);border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 27px}\n.topbar h2{margin:0;font-size:19px}.topbar p{margin:2px 0 0;color:var(--muted);font-size:12px}\n.top-actions{display:flex;align-items:center;gap:8px}\n.icon-btn,.btn{border:1px solid var(--line);background:var(--surface);color:var(--text);border-radius:9px;padding:9px 12px;font-weight:700;transition:.16s}\n.icon-btn{padding:9px 11px}.btn:hover,.icon-btn:hover{transform:translateY(-1px);box-shadow:0 5px 12px rgba(0,0,0,.08)}\n.btn.primary{background:var(--primary);border-color:var(--primary);color:#fff}\n[data-theme=\"dark\"] .btn.primary{color:#072d35}\n.btn.danger{background:var(--danger);border-color:var(--danger);color:#fff}\n.btn.ghost{background:transparent}.btn.small{padding:6px 9px;font-size:12px}.btn.full{width:100%}\n.menu-btn{display:none}\n.content{padding:25px;max-width:1600px;margin:auto}\n.section{display:none}.section.active{display:block;animation:fade .18s ease}\n@keyframes fade{from{opacity:.35;transform:translateY(3px)}to{opacity:1;transform:none}}\n.page-head{display:flex;align-items:flex-start;justify-content:space-between;gap:18px;margin-bottom:18px}\n.page-head h2{margin:0 0 4px;font-size:26px}.page-head p{margin:0;color:var(--muted);max-width:800px}\n.actions{display:flex;gap:8px;flex-wrap:wrap}\n.grid{display:grid;gap:16px}.g2{grid-template-columns:repeat(2,minmax(0,1fr))}.g3{grid-template-columns:repeat(3,minmax(0,1fr))}\n.g4{grid-template-columns:repeat(4,minmax(0,1fr))}.g5{grid-template-columns:repeat(5,minmax(0,1fr))}\n.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;min-width:0}\n.card h3{margin:0 0 14px;font-size:16px}.card h4{margin:15px 0 8px}.card-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:13px}\n.card-head h3{margin:0}\n.metric{padding:17px;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);position:relative;overflow:hidden}\n.metric:before{content:\"\";position:absolute;inset:0 auto 0 0;width:4px;background:var(--primary)}\n.metric small{color:var(--muted);display:block}.metric strong{display:block;font-size:25px;margin-top:5px}.metric span{font-size:11px;color:var(--muted)}\n.field{display:flex;flex-direction:column;gap:5px;min-width:0}.field label{font-size:12px;font-weight:750;color:var(--muted)}\n.field input,.field select,.field textarea{width:100%;border:1px solid var(--line);background:var(--surface);color:var(--text);border-radius:8px;padding:9px 10px;outline:0}\n.field textarea{resize:vertical;min-height:80px}.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px color-mix(in srgb,var(--primary) 15%,transparent)}\n.input-unit{position:relative}.input-unit input{padding-right:55px}.input-unit span{position:absolute;right:10px;bottom:9px;color:var(--muted);font-size:11px;pointer-events:none}\n.help{font-size:11px;color:var(--muted)}\n.form-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}\n.form-grid .span2{grid-column:span 2}.form-grid .span3{grid-column:span 3}.form-grid .span4{grid-column:1/-1}\n.toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:12px}\n.table-wrap{overflow:auto;border:1px solid var(--line);border-radius:10px}\ntable{width:100%;border-collapse:collapse;min-width:720px;background:var(--surface)}\nth,td{padding:9px 10px;border-bottom:1px solid var(--line);text-align:left;vertical-align:middle}\nth{font-size:11px;text-transform:uppercase;letter-spacing:.045em;color:var(--muted);background:var(--surface2);position:sticky;top:0;z-index:1}\ntr:last-child td{border-bottom:0}tbody tr:hover{background:color-mix(in srgb,var(--primary) 4%,var(--surface))}\ntd input,td select{width:100%;min-width:78px;border:1px solid var(--line);background:var(--surface);color:var(--text);border-radius:6px;padding:6px}\n.t-actions{white-space:nowrap}.t-actions button{border:0;background:transparent;color:var(--primary);padding:3px 5px;font-weight:800}\n.badge{display:inline-flex;align-items:center;gap:5px;border-radius:999px;padding:4px 8px;font-size:11px;font-weight:800;background:var(--surface2)}\n.badge.ok{color:var(--ok);background:color-mix(in srgb,var(--ok) 13%,transparent)}\n.badge.warn{color:var(--warn);background:color-mix(in srgb,var(--warn) 13%,transparent)}\n.badge.danger{color:var(--danger);background:color-mix(in srgb,var(--danger) 13%,transparent)}\n.badge.info{color:var(--info);background:color-mix(in srgb,var(--info) 13%,transparent)}\n.alert{padding:11px 12px;border-radius:9px;border-left:4px solid var(--info);background:color-mix(in srgb,var(--info) 8%,var(--surface));margin:9px 0}\n.alert.ok{border-color:var(--ok)}.alert.warn{border-color:var(--warn)}.alert.danger{border-color:var(--danger)}\n.alert b{display:block}.alert small{color:var(--muted)}\n.result{border:1px solid var(--line);border-radius:10px;padding:13px;background:var(--surface2)}\n.result .big{font-size:28px;font-weight:850;color:var(--primary)}.result .formula{font:12px/1.55 ui-monospace,SFMono-Regular,Menlo,monospace;white-space:pre-wrap}\n.kpi-row{display:flex;gap:16px;flex-wrap:wrap}.kpi-row>div{min-width:120px}.kpi-row b{font-size:18px;display:block}.kpi-row small{color:var(--muted)}\ncanvas.chart{width:100%;height:280px;border:1px solid var(--line);border-radius:10px;background:var(--surface)}\n.network-canvas{height:480px!important}\n.muted{color:var(--muted)}.center{text-align:center}.right{text-align:right}.nowrap{white-space:nowrap}\n.hidden{display:none!important}.mt{margin-top:15px}.mb{margin-bottom:15px}\n.code{font:12px/1.55 ui-monospace,SFMono-Regular,Menlo,monospace;background:var(--surface2);border:1px solid var(--line);padding:12px;border-radius:9px;white-space:pre-wrap}\n.progress{height:8px;background:var(--surface2);border-radius:999px;overflow:hidden}.progress i{display:block;height:100%;background:var(--primary);width:0}\n.hero{display:grid;grid-template-columns:1.5fr 1fr;gap:18px;background:linear-gradient(135deg,#064b5d,#0d8192);color:#fff;border-radius:18px;padding:28px;box-shadow:var(--shadow);overflow:hidden;position:relative}\n.hero:after{content:\"\";position:absolute;width:240px;height:240px;border:55px solid rgba(255,255,255,.08);border-radius:50%;right:-85px;top:-110px}\n.hero h2{font-size:31px;margin:0 0 10px}.hero p{opacity:.85;max-width:700px}.hero .btn{position:relative;z-index:2}\n.hero-side{align-self:center;position:relative;z-index:1}.hero-side .progress{background:rgba(255,255,255,.17)}.hero-side .progress i{background:#fff}\n.step-list{display:grid;gap:8px}.step{display:flex;align-items:center;gap:9px}.step i{width:24px;height:24px;border-radius:50%;display:grid;place-items:center;background:var(--surface2);font-style:normal;font-size:11px}.step.done i{background:var(--ok);color:#fff}\n.check-item{display:grid;grid-template-columns:30px 1fr auto;gap:10px;align-items:start;padding:12px;border-bottom:1px solid var(--line)}\n.check-item:last-child{border-bottom:0}.check-icon{width:27px;height:27px;border-radius:50%;display:grid;place-items:center;font-weight:900}\n.check-item.ok .check-icon{background:color-mix(in srgb,var(--ok) 15%,transparent);color:var(--ok)}\n.check-item.warn .check-icon{background:color-mix(in srgb,var(--warn) 15%,transparent);color:var(--warn)}\n.check-item.danger .check-icon{background:color-mix(in srgb,var(--danger) 15%,transparent);color:var(--danger)}\n.report-sheet{background:#fff;color:#172033;max-width:980px;margin:auto;padding:38px 48px;min-height:700px;box-shadow:var(--shadow);border-radius:4px}\n.report-sheet h1{font-size:30px;color:#07576a}.report-sheet h2{font-size:21px;border-bottom:2px solid #07576a;padding-bottom:5px;margin-top:28px}.report-sheet h3{margin-top:20px}\n.report-sheet table{color:#172033;background:#fff}.report-sheet th{background:#eef3f8;color:#43516a;position:static}\n.report-sheet .cover{min-height:520px;display:flex;flex-direction:column;justify-content:center;text-align:center}.report-sheet .cover h1{font-size:40px}\n.modal{position:fixed;inset:0;z-index:100;background:rgba(3,12,21,.65);display:none;place-items:center;padding:20px}.modal.open{display:grid}\n.modal-box{width:min(800px,100%);max-height:90vh;overflow:auto;background:var(--surface);border-radius:14px;padding:20px;box-shadow:0 20px 70px rgba(0,0,0,.35)}\n.toast-wrap{position:fixed;right:18px;bottom:18px;z-index:120;display:grid;gap:8px}\n.toast{background:var(--text);color:var(--bg);padding:11px 14px;border-radius:9px;box-shadow:var(--shadow);animation:toast .2s}\n@keyframes toast{from{transform:translateY(8px);opacity:0}}\n.logo-water{font-size:56px;text-align:center}\n.legend{display:flex;gap:12px;flex-wrap:wrap;font-size:11px;color:var(--muted)}.legend i{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:4px}\n.status-dot{width:8px;height:8px;border-radius:50%;background:var(--ok);display:inline-block;margin-right:5px}\ndetails{border:1px solid var(--line);border-radius:9px;padding:9px 11px;background:var(--surface);margin:8px 0}summary{font-weight:800;cursor:pointer}\n@media(max-width:1180px){.g4,.g5{grid-template-columns:repeat(2,minmax(0,1fr))}.form-grid{grid-template-columns:repeat(2,minmax(0,1fr))}.form-grid .span3,.form-grid .span4{grid-column:1/-1}}\n@media(max-width:820px){\n  :root{--sidebar:270px}.sidebar{transform:translateX(-102%);transition:.2s}.sidebar.open{transform:none}.main{margin-left:0}.menu-btn{display:inline-block}\n  .content{padding:16px}.topbar{padding:0 15px}.g2,.g3,.g4,.g5,.hero{grid-template-columns:1fr}.form-grid{grid-template-columns:1fr}.form-grid .span2,.form-grid .span3,.form-grid .span4{grid-column:auto}\n  .page-head{flex-direction:column}.topbar p{display:none}.report-sheet{padding:24px 18px}.hero h2{font-size:25px}\n}\n@media print{\n  body{background:#fff}.sidebar,.topbar,.page-head,.no-print,.toast-wrap{display:none!important}.main{margin:0}.content{padding:0;max-width:none}\n  .section{display:none!important}#sec-report{display:block!important}.card{box-shadow:none;border:0;padding:0}.report-sheet{box-shadow:none;max-width:none;padding:0}\n  .report-sheet .page-break{break-before:page}.report-sheet table{font-size:10px}.report-sheet h2{break-after:avoid}\n}\n\n/* ===== Splash & Legal ===== */\n.splash-screen{position:fixed;inset:0;z-index:9999;background:radial-gradient(ellipse at 50% 18%,#0f95a3 0%,#0a6b78 45%,#052f3a 78%,#02181f 100%);display:flex;align-items:center;justify-content:center;overflow:hidden;transition:opacity .7s ease,visibility .7s ease}\n.splash-screen.hide{opacity:0;visibility:hidden;pointer-events:none}\n.splash-svg-wrap{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}\n.splash-svg-wrap svg{width:min(1100px,100%);height:100%}\n.splash-ring{transform-origin:400px 260px;animation:ringPulse 3.4s ease-in-out infinite}\n.splash-ring.r1{animation-delay:0s}.splash-ring.r2{animation-delay:.25s}.splash-ring.r3{animation-delay:.5s}.splash-ring.r4{animation-delay:.75s}.splash-ring.r5{animation-delay:1s}.splash-ring.r6{animation-delay:1.25s}\n@keyframes ringPulse{0%,100%{opacity:.28}50%{opacity:.75}}\n.splash-wave{animation:waveShift 3.2s linear infinite}\n.splash-wave.w2{animation-duration:5.4s;opacity:.55}\n@keyframes waveShift{from{transform:translateX(0)}to{transform:translateX(-400px)}}\n.splash-drop{animation:dropFall 1.8s cubic-bezier(.5,0,.8,1) infinite}\n.splash-drop:nth-child(2){animation-delay:.4s}.splash-drop:nth-child(3){animation-delay:.8s}.splash-drop:nth-child(4){animation-delay:1.2s}.splash-drop:nth-child(5){animation-delay:1.6s}\n@keyframes dropFall{0%{transform:translateY(0);opacity:0}10%{opacity:1}92%{opacity:.9}100%{transform:translateY(150px);opacity:0}}\n.splash-bubble{animation:bubbleRise 3s ease-in infinite}\n.splash-bubble:nth-child(2){animation-delay:.7s}.splash-bubble:nth-child(3){animation-delay:1.4s}.splash-bubble:nth-child(4){animation-delay:2.1s}\n@keyframes bubbleRise{0%{transform:translate(0,0) scale(.6);opacity:0}15%{opacity:.9}100%{transform:translate(6px,-70px) scale(1.1);opacity:0}}\n.splash-debris{animation:debrisFlow 2.6s linear infinite}\n.splash-debris:nth-child(2){animation-delay:.9s}.splash-debris:nth-child(3){animation-delay:1.8s}\n@keyframes debrisFlow{0%{transform:translate(0,-40px) scale(.4);opacity:0}20%{opacity:1}100%{transform:translate(340px,180px) scale(1.5);opacity:0}}\n.splash-copy{position:relative;z-index:2;text-align:center;color:#fff}\n.splash-logo{width:84px;height:84px;border-radius:22px;margin:0 auto 18px;background:linear-gradient(145deg,#4fd1c5,#e0fbfc);color:#073b4c;display:grid;place-items:center;font-size:44px;font-weight:900;box-shadow:0 10px 30px rgba(0,0,0,.35);animation:logoIn .9s ease both}\n.splash-title{font-size:52px;font-weight:900;letter-spacing:-.02em;margin:0;animation:riseIn .8s .25s ease both}\n.splash-sub{font-size:18px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;opacity:.88;margin:8px 0 0;animation:riseIn .8s .5s ease both}\n@keyframes logoIn{from{opacity:0;transform:translateY(-14px) scale(.8)}to{opacity:1;transform:none}}\n@keyframes riseIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}\n.splash-progress-wrap{position:absolute;left:50%;bottom:56px;transform:translateX(-50%);width:min(360px,70vw);z-index:2}\n.splash-progress{height:5px;border-radius:999px;background:rgba(255,255,255,.22);overflow:hidden}\n.splash-progress i{display:block;height:100%;background:linear-gradient(90deg,#ffb703,#4fd1c5);width:0%;animation:splashFill 5s linear forwards}\n@keyframes splashFill{to{width:100%}}\n.splash-caption{margin:10px 0 0;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.65);text-align:center}\n.legal-overlay{position:fixed;inset:0;z-index:9998;background:rgba(2,15,20,.72);display:none;align-items:center;justify-content:center;padding:20px}\n.legal-overlay.show{display:flex;animation:fade .3s ease}\n.legal-box{width:min(640px,100%);max-height:86vh;overflow:auto;background:var(--surface);color:var(--text);border-radius:16px;padding:30px 32px;box-shadow:0 24px 70px rgba(0,0,0,.4)}\n.legal-box h2{margin:0 0 4px;font-size:22px;color:var(--primary2)}\n.legal-box p.legal-lead{color:var(--muted);margin:0 0 16px;font-size:13px}\n.legal-box .legal-text{font-size:13px;line-height:1.6;color:var(--text);border:1px solid var(--line);background:var(--surface2);border-radius:10px;padding:14px 16px;max-height:260px;overflow:auto}\n.legal-text p{margin:0 0 10px}.legal-text p:last-child{margin-bottom:0}\n.legal-agree{display:flex;align-items:flex-start;gap:10px;margin:16px 0 6px;font-size:13px;cursor:pointer}\n.legal-agree input{margin-top:2px}\n.legal-actions{display:flex;justify-content:flex-end;margin-top:14px}\n\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<div class=\"splash-screen\" id=\"splashScreen\">\n  <div class=\"splash-svg-wrap\">\n    <svg viewBox=\"0 0 800 520\" preserveAspectRatio=\"xMidYMid slice\">\n      <defs>\n        <linearGradient id=\"waterGrad\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\">\n          <stop offset=\"0%\" stop-color=\"#38d9c9\"><\u002Fstop>\n          <stop offset=\"100%\" stop-color=\"#075566\"><\u002Fstop>\n        <\u002FlinearGradient>\n        <linearGradient id=\"waterGrad2\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\">\n          <stop offset=\"0%\" stop-color=\"#7ce8dc\"><\u002Fstop>\n          <stop offset=\"100%\" stop-color=\"#0a6b78\"><\u002Fstop>\n        <\u002FlinearGradient>\n      <\u002Fdefs>\n      <g stroke=\"#bdf3ee\" stroke-width=\"3\" fill=\"none\">\n        <rect class=\"splash-ring r6\" x=\"120\" y=\"20\" width=\"560\" height=\"480\" rx=\"140\" opacity=\".22\"><\u002Frect>\n        <rect class=\"splash-ring r5\" x=\"165\" y=\"55\" width=\"470\" height=\"410\" rx=\"120\" opacity=\".32\"><\u002Frect>\n        <rect class=\"splash-ring r4\" x=\"210\" y=\"90\" width=\"380\" height=\"340\" rx=\"100\" opacity=\".42\"><\u002Frect>\n        <rect class=\"splash-ring r3\" x=\"255\" y=\"125\" width=\"290\" height=\"270\" rx=\"80\" opacity=\".55\"><\u002Frect>\n        <rect class=\"splash-ring r2\" x=\"300\" y=\"160\" width=\"200\" height=\"200\" rx=\"60\" opacity=\".7\"><\u002Frect>\n        <rect class=\"splash-ring r1\" x=\"340\" y=\"195\" width=\"120\" height=\"130\" rx=\"40\" opacity=\".9\"><\u002Frect>\n      <\u002Fg>\n      <g stroke=\"#ffd166\" stroke-width=\"4\" stroke-linecap=\"round\" opacity=\".85\">\n        <line class=\"splash-drop\" x1=\"330\" y1=\"40\" x2=\"330\" y2=\"80\"><\u002Fline>\n        <line class=\"splash-drop\" x1=\"380\" y1=\"30\" x2=\"380\" y2=\"70\"><\u002Fline>\n        <line class=\"splash-drop\" x1=\"430\" y1=\"45\" x2=\"430\" y2=\"85\"><\u002Fline>\n
