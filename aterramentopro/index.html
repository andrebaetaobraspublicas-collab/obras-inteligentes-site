  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"d88ad83e-7275-4159-92f8-ba336d0c4a9c\"><\u002Fscript>\n\n\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n<meta name=\"theme-color\" content=\"#05080f\">\n<style>\nhtml,body{margin:0;padding:0;background:#05080f;overflow:hidden}\na{color:#7dd3fc}a:hover{color:#e0f2fe}\n@keyframes modalIn{from{opacity:0;transform:translateY(18px) scale(.97)}to{opacity:1;transform:none}}\n@keyframes backdropIn{from{opacity:0}to{opacity:1}}\n@keyframes pulseGlow{0%,100%{text-shadow:0 0 22px rgba(125,211,252,.35)}50%{text-shadow:0 0 46px rgba(125,211,252,.75)}}\n<\u002Fstyle>\n<\u002Fhelmet>\n<div sc-camel-on-click=\"{{ skip }}\" style=\"position:fixed;inset:0;background:#05080f;font-family:Inter,ui-sans-serif,system-ui,'Segoe UI',sans-serif;cursor:pointer;user-select:none\">\n  <canvas ref=\"{{ canvasRef }}\" style=\"position:absolute;inset:0;width:100%;height:100%;display:block\"><\u002Fcanvas>\n  <div style=\"position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;opacity:{{ titleOpacity }};transition:opacity 1.1s ease;padding-bottom:10vh\">\n    <div style=\"width:66px;height:66px;border-radius:18px;background:linear-gradient(145deg,#f7b955,#d97706);display:grid;place-items:center;font-size:36px;color:#2c1903;box-shadow:0 14px 44px rgba(217,119,6,.45);margin-bottom:18px\">⏚<\u002Fdiv>\n    <div style=\"font-size:46px;font-weight:850;letter-spacing:-.02em;color:#f2fbff;animation:pulseGlow 3s ease-in-out infinite\">AterramentoPro<\u002Fdiv>\n    <div style=\"font-size:16px;color:#9fc6d4;margin-top:9px;letter-spacing:.16em;text-transform:uppercase\">Calculadora de Aterramento<\u002Fdiv>\n  <\u002Fdiv>\n  <sc-if value=\"{{ skipVisible }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:absolute;bottom:24px;left:0;right:0;text-align:center;color:#4f7381;font-size:12px;letter-spacing:.12em;text-transform:uppercase\">Clique para pular a animação<\u002Fdiv>\n  <\u002Fsc-if>\n  <sc-if value=\"{{ showModal }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:absolute;inset:0;background:rgba(3,9,15,.6);backdrop-filter:blur(7px);display:flex;align-items:center;justify-content:center;padding:24px;animation:backdropIn .6s ease;cursor:default\">\n      <div style=\"background:#ffffff;border-radius:16px;max-width:680px;width:100%;max-height:86vh;display:flex;flex-direction:column;box-shadow:0 30px 80px rgba(0,0,0,.5);animation:modalIn .5s cubic-bezier(.2,.9,.3,1);overflow:hidden\">\n        <div style=\"display:flex;align-items:center;gap:12px;padding:18px 24px;background:linear-gradient(180deg,#0c2633,#123d4e);color:#eef8fb\">\n          <div style=\"width:40px;height:40px;border-radius:11px;background:linear-gradient(145deg,#f7b955,#d97706);display:grid;place-items:center;font-size:21px;color:#2c1903;flex:none\">⏚<\u002Fdiv>\n          <div>\n            <div style=\"font-size:17px;font-weight:800\">Aviso legal e termos de uso<\u002Fdiv>\n            <div style=\"font-size:12px;color:#9fc6d4\">AterramentoPro — Calculadora de Aterramento<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding:20px 24px;overflow:auto;color:#334155;font-size:13.5px;line-height:1.6;display:grid;gap:12px\">\n          <p style=\"margin:0\">O <strong>AterramentoPro<\u002Fstrong> é uma ferramenta de apoio destinada a <strong>cálculos preliminares<\u002Fstrong> de sistemas de aterramento — resistividade do solo, hastes, malhas, tensões de passo e de toque, materiais e custos.<\u002Fp>\n          <p style=\"margin:0\">Os resultados apresentados são <strong>estimativas<\u002Fstrong> baseadas em modelos simplificados e nos dados informados pelo usuário. Eles <strong>não substituem<\u002Fstrong> medições de campo, projeto executivo, memorial de cálculo nem a análise de <strong>profissional legalmente habilitado<\u002Fstrong> (engenheiro eletricista com registro no CREA), observadas as normas aplicáveis, como <strong>NBR 5410<\u002Fstrong>, <strong>NBR 5419<\u002Fstrong>, <strong>NBR 15751<\u002Fstrong> e <strong>IEEE Std 80<\u002Fstrong>.<\u002Fp>\n          <p style=\"margin:0\">O usuário é o <strong>único responsável<\u002Fstrong> pela verificação, validação e aplicação dos resultados em qualquer instalação real. Os desenvolvedores não se responsabilizam por danos diretos ou indiretos, materiais ou pessoais, decorrentes do uso desta ferramenta.<\u002Fp>\n          <p style=\"margin:0\">Ao prosseguir, você declara ter lido e compreendido este aviso e concorda em utilizar o sistema <strong>exclusivamente como apoio preliminar<\u002Fstrong> ao dimensionamento.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"padding:16px 24px 20px;border-top:1px solid #d9e2ec;background:#f8fafc;display:grid;gap:12px\">\n          <label style=\"display:flex;align-items:center;gap:10px;font-size:13.5px;font-weight:700;color:#142033;cursor:pointer\">\n            <input type=\"checkbox\" checked=\"{{ agreed }}\" sc-camel-on-change=\"{{ toggleAgree }}\" style=\"width:18px;height:18px;accent-color:#0b5f7a;flex:none\">\n            Li e concordo com os termos acima\n          <\u002Flabel>\n          <sc-if value=\"{{ declined }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"border-left:4px solid #b42318;background:#fff1f2;color:#7f1d1d;border-radius:8px;padding:10px 13px;font-size:12.5px\">É necessário concordar com os termos para acessar o sistema.<\u002Fdiv>\n          <\u002Fsc-if>\n          <div style=\"display:flex;gap:10px;justify-content:flex-end\">\n            <button sc-camel-on-click=\"{{ decline }}\" style=\"border:1px solid #cbd5e1;background:#fff;color:#334155;border-radius:9px;padding:10px 16px;font-weight:750;font-size:13.5px;cursor:pointer\">Recusar<\u002Fbutton>\n            <button sc-camel-on-click=\"{{ accept }}\" disabled=\"{{ acceptDisabled }}\" style=\"border:1px solid transparent;background:#0b5f7a;color:#fff;border-radius:9px;padding:10px 18px;font-weight:750;font-size:13.5px;opacity:{{ acceptOpacity }};cursor:{{ acceptCursor }}\">Concordar e acessar o sistema<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;duracaoAnimacao&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:5,&quot;min&quot;:3,&quot;max&quot;:10,&quot;step&quot;:1,&quot;unit&quot;:&quot;s&quot;,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Animação&quot;},&quot;corDaDescarga&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;default&quot;:&quot;Azul elétrico&quot;,&quot;options&quot;:[&quot;Azul elétrico&quot;,&quot;Violeta&quot;,&quot;Verde neon&quot;],&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Animação&quot;},&quot;pularAnimacao&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Animação&quot;}}\">\nclass Component extends DCLogic {\n  state = { showModal: false, titleOn: false, agreed: false, declined: false };\n  canvasRef = React.createRef();\n\n  componentDidMount() {\n    this.D = Math.max(3, this.props.duracaoAnimacao ?? 5);\n    const hues = { 'Azul elétrico': 205, 'Violeta': 272, 'Verde neon': 145 };\n    this.hue = hues[this.props.corDaDescarga] ?? 205;\n    this.strikes = [0.13, 0.38, 0.60].map(f => ({ t: f * this.D, spawned: false }));\n    this.rings = []; this.parts = []; this.boltPts = null; this.boltUntil = 0; this.lastAmbient = 0;\n    this.specks = Array.from({ length: 150 }, () => ({ x: Math.random(), y: Math.random(), a: .04 + Math.random() * .11, r: .6 + Math.random() * 1.5 }));\n    this._resize = () => {\n      const c = this.canvasRef.current; if (!c) return;\n      this.dpr = Math.min(2.5, window.devicePixelRatio || 1);\n      this.W = c.clientWidth; this.H = c.clientHeight;\n      c.width = Math.round(this.W * this.dpr); c.height = Math.round(this.H * this.dpr);\n    };\n    window.addEventListener('resize', this._resize);\n    this._resize();\n    this.t0 = performance.now();\n    if (this.props.pularAnimacao) this.t0 -= this.D * 1000;\n    this._dead = false;\n    this._tick = (now) => {\n      if (this._dead) return;\n      this.raf = requestAnimationFrame(this._tick);\n      try { this.frame(now); } catch (e) { /* keep loop alive */ }\n    };\n    this.raf = requestAnimationFrame(this._tick);\n    // triggers independent of the draw loop\n    const left = Math.max(0, this.D * 1000 - (performance.now() - this.t0));\n    this._tm1 = setTimeout(() => { if (!this._dead && !this.state.titleOn) this.setState({ titleOn: true }); }, Math.max(0, left - 1400));\n    this._tm2 = setTimeout(() => { if (!this._dead && !this.state.showModal) this.setState({ showModal: true }); }, left);\n  }\n  componentWillUnmount() {\n    this._dead = true;\n    cancelAnimationFrame(this.raf);\n    clearTimeout(this._tm1); clearTimeout(this._tm2);\n    window.removeEventListener('resize', this._resize);\n  }\n\n  genBolt(x1, y1, x2, y2, off) {\n    let pts = [{ x: x1, y: y1 }, { x: x2, y: y2 }];\n    while (off > 4) {\n      const np = [pts[0]];\n      for (let i = 1; i < pts.length; i++) {\n        const a = pts[i - 1], b = pts[i];\n        np.push({ x: (a.x + b.x) / 2 + (Math.random() - .5) * off, y: (a.y + b.y) / 2 + (Math.random() - .5) * off * .35 }, b);\n      }\n      pts = np; off *= .5;\n    }\n    return pts;\n  }\n  makeBolt(cx, topY, tipX, tipY) {\n    const main = this.genBolt(cx + (Math.random() - .5) * 90, topY, tipX, tipY, this.W * .16);\n    const branches = [];\n    for (let i = 0; i < 3; i++) {\n      const p = main[8 + Math.floor(Math.random() * Math.max(1, main.length - 20))];\n      if (p) branches.push(this.genBolt(p.x, p.y, p.x + (Math.random() - .5) * 190, p.y + 70 + Math.random() * 130, this.W * .05));\n    }\n    return { main, branches };\n  }\n  strokePath(ctx, pts, w, style, blur, blurColor) {\n    ctx.beginPath(); ctx.moveTo(pts[0].x, pts[0].y);\n    for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);\n    ctx.lineWidth = w; ctx.strokeStyle = style; ctx.lineJoin = 'round'; ctx.lineCap = 'round';\n    ctx.shadowBlur = blur || 0; ctx.shadowColor = blurColor || 'transparent'; ctx.stroke(); ctx.shadowBlur = 0;\n  }\n\n  frame(now) {\n    const c = this.canvasRef.current; if (!c) return;\n    if (!this.W) { this._resize(); if (!this.W) return; }\n    const t = (now - this.t0) / 1000, D = this.D, H = this.H, W = this.W, hue = this.hue;\n    if (!this.state.titleOn && t > D - 1.4) this.setState({ titleOn: true });\n    if (!this.state.showModal && t >= D) this.setState({ showModal: true });\n    const modal = this.state.showModal;\n    const ctx = c.getContext('2d');\n    ctx.setTransform(this.dpr, 0, 0, this.dpr, 0, 0);\n    const cx = W / 2, gy = H * .56, rodBot = gy + H * .27, mastTop = gy - Math.min(64, H * .09);\n\n    // flash envelope\n    let flash = 0, activeStrike = null;\n    for (const s of this.strikes) {\n      const dt = t - s.t;\n      if (dt >= 0 && dt < .5) {\n        flash = Math.max(flash, Math.exp(-dt * 5.5) * (.62 + .38 * Math.sin(dt * 95 + s.t * 7)));\n        if (dt < .42) activeStrike = s;\n      }\n      if (!s.spawned && dt > .34) {\n        s.spawned = true;\n        for (let i = 0; i < 3; i++) this.rings.push({ t0: t + i * .17, faint: false });\n        for (let i = 0; i < 42; i++) {\n          const ang = Math.random() * Math.PI, sp = 20 + Math.random() * 80;\n          this.parts.push({ x: cx + (Math.random() - .5) * 10, y: gy + Math.random() * (rodBot - gy), vx: Math.cos(ang) * sp * (Math.random() < .5 ? -1 : 1), vy: Math.abs(Math.sin(ang)) * sp * .6, t0: t, life: .9 + Math.random() * 1.1 });\n        }\n      }\n    }\n    if (modal && t - this.lastAmbient > 2.8) { this.lastAmbient = t; this.rings.push({ t0: t, faint: true }); }\n\n    // sky\n    const sky = ctx.createLinearGradient(0, 0, 0, gy);\n    sky.addColorStop(0, `hsl(${hue},45%,${5 + flash * 9}%)`);\n    sky.addColorStop(1, `hsl(${hue},35%,${9 + flash * 7}%)`);\n    ctx.fillStyle = sky; ctx.fillRect(0, 0, W, gy);\n    // clouds\n    for (let i = 0; i < 4; i++) {\n      const cxx = W * (.16 + i * .23), cyy = H * .05 + (i % 2) * H * .03;\n      const g = ctx.createRadialGradient(cxx, cyy, 0, cxx, cyy, W * .17);\n      g.addColorStop(0, `hsla(${hue},60%,${30 + flash * 45}%,${.30 + flash * .5})`);\n      g.addColorStop(1, 'transparent');\n      ctx.fillStyle = g; ctx.fillRect(0, 0, W, gy);\n    }\n    // soil\n    const soil = ctx.createLinearGradient(0, gy, 0, H);\n    soil.addColorStop(0, '#181209'); soil.addColorStop(.5, '#100b06'); soil.addColorStop(1, '#080503');\n    ctx.fillStyle = soil; ctx.fillRect(0, gy, W, H - gy);\n    ctx.strokeStyle = 'rgba(217,150,60,.10)'; ctx.lineWidth = 1;\n    for (const f of [.32, .62]) { ctx.beginPath(); ctx.moveTo(0, gy + (H - gy) * f); ctx.lineTo(W, gy + (H - gy) * f); ctx.stroke(); }\n    for (const s of this.specks) {\n      ctx.fillStyle = `rgba(232,205,158,${s.a})`;\n      ctx.beginPath(); ctx.arc(s.x * W, gy + s.y * (H - gy), s.r, 0, 7); ctx.fill();\n    }\n    // surface ellipse grid (3D read)\n    for (let i = 1; i <= 5; i++) {\n      ctx.strokeStyle = `hsla(${hue},60%,62%,${.13 - i * .017})`; ctx.lineWidth = 1.2;\n      ctx.beginPath(); ctx.ellipse(cx, gy, i / 5 * W * .42, i / 5 * W * .42 * .16, 0, 0, Math.PI * 2); ctx.stroke();\n    }\n    // surface line\n    const sl = ctx.createLinearGradient(0, 0, W, 0);\n    sl.addColorStop(0, 'transparent'); sl.addColorStop(.5, `hsla(${hue},70%,65%,${.5 + flash * .4})`); sl.addColorStop(1, 'transparent');\n    ctx.strokeStyle = sl; ctx.lineWidth = 1.6;\n    ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(W, gy); ctx.stroke();\n\n    // dissipation rings (hemispheres in soil + surface ellipse)\n    ctx.globalCompositeOperation = 'lighter';\n    const life = 1.9;\n    this.rings = this.rings.filter(r => t - r.t0 < life && t >= r.t0 - .01);\n    for (const r of this.rings) {\n      const age = Math.max(0, t - r.t0), k = age / life;\n      if (k <= 0) continue;\n      const R = 14 + k * W * .30, al = (1 - k) * (r.faint ? .22 : .8);\n      const h = hue + (40 - hue) * k * k; // shift toward amber as it dissipates\n      ctx.strokeStyle = `hsla(${h},95%,66%,${al})`;\n      ctx.lineWidth = 2.4 * (1 - k) + .6;\n      ctx.shadowBlur = 18; ctx.shadowColor = `hsla(${h},95%,60%,${al})`;\n      ctx.beginPath(); ctx.ellipse(cx, gy, R, R * .82, 0, 0, Math.PI); ctx.stroke();      // hemisphere below\n      ctx.beginPath(); ctx.ellipse(cx, gy, R, R * .16, 0, 0, Math.PI * 2); ctx.stroke();  // surface ellipse\n      ctx.shadowBlur = 0;\n    }\n    // particles\n    this.parts = this.parts.filter(p => t - p.t0 < p.life);\n    for (const p of this.parts) {\n      const age = t - p.t0, k = age / p.life;\n      const h = hue + (40 - hue) * k;\n      ctx.fillStyle = `hsla(${h},95%,70%,${(1 - k) * .85})`;\n      ctx.beginPath(); ctx.arc(p.x + p.vx * age, Math.min(H - 4, p.y + p.vy * age), 1.6 * (1 - k) + .4, 0, 7); ctx.fill();\n    }\n    ctx.globalCompositeOperation = 'source-over';\n\n    // mast + buried rod\n    ctx.strokeStyle = '#cbd5e1'; ctx.lineWidth = 3;\n    ctx.beginPath(); ctx.moveTo(cx, mastTop); ctx.lineTo(cx, gy); ctx.stroke();\n    ctx.fillStyle = '#e2e8f0'; ctx.beginPath(); ctx.arc(cx, mastTop, 3.4, 0, 7); ctx.fill();\n    const rod = ctx.createLinearGradient(0, gy, 0, rodBot);\n    rod.addColorStop(0, '#f7b955'); rod.addColorStop(1, '#8a4a08');\n    ctx.fillStyle = rod; ctx.fillRect(cx - 3.5, gy, 7, rodBot - gy);\n    ctx.fillStyle = '#64748b'; ctx.fillRect(cx - 8, gy - 4, 16, 8); // clamp\n\n    ctx.globalCompositeOperation = 'lighter';\n    // pulse traveling down the rod\n    if (activeStrike) {\n      const dt = t - activeStrike.t;\n      if (dt > .06) {\n        const k = Math.min(1, (dt - .06) / .32), py = gy + (rodBot - gy) * k;\n        const g = ctx.createRadialGradient(cx, py, 0, cx, py, 26);\n        g.addColorStop(0, `hsla(${hue},100%,80%,.95)`); g.addColorStop(1, 'transparent');\n        ctx.fillStyle = g; ctx.beginPath(); ctx.arc(cx, py, 26, 0, 7); ctx.fill();\n        ctx.strokeStyle = `hsla(${hue},100%,75%,.7)`; ctx.lineWidth = 3;\n        ctx.beginPath(); ctx.moveTo(cx, gy); ctx.lineTo(cx, py); ctx.stroke();\n      }\n      // bolt\n      if (now > this.boltUntil) { this.bolt = this.makeBolt(cx, H * .04, cx, mastTop); this.boltUntil = now + 55; }\n      if (this.bolt) {\n        const a = Math.min(1, flash * 1.5);\n        for (const br of this.bolt.branches) this.strokePath(ctx, br, 1.4, `hsla(${hue},95%,75%,${a * .55})`, 12, `hsl(${hue},95%,60%)`);\n        this.strokePath(ctx, this.bolt.main, 9, `hsla(${hue},95%,60%,${a * .18})`, 0);\n        this.strokePath(ctx, this.bolt.main, 3.6, `hsla(${hue},95%,70%,${a * .6})`, 26, `hsl(${hue},95%,60%)`);\n        this.strokePath(ctx, this.bolt.main, 1.5, `rgba(255,255,255,${a})`, 14, `hsl(${hue},95%,75%)`);\n        // impact glow at mast tip\n        const g = ctx.createRadialGradient(cx, mastTop, 0, cx, mastTop, 60);\n        g.addColorStop(0, `hsla(${hue},100%,85%,${a * .9})`); g.addColorStop(1, 'transparent');\n        ctx.fillStyle = g; ctx.beginPath(); ctx.arc(cx, mastTop, 60, 0, 7); ctx.fill();\n      }\n    }\n    // full-screen flash tint\n    if (flash > .02) { ctx.fillStyle = `hsla(${hue},80%,80%,${flash * .10})`; ctx.fillRect(0, 0, W, H); }\n    ctx.globalCompositeOperation = 'source-over';\n    // vignette\n    const vg = ctx.createRadialGradient(cx, H * .5, H * .3, cx, H * .5, H * .95);\n    vg.addColorStop(0, 'transparent'); vg.addColorStop(1, `rgba(2,6,10,${modal ? .75 : .55})`);\n    ctx.fillStyle = vg; ctx.fillRect(0, 0, W, H);\n  }\n\n  renderVals() {\n    const agreed = this.state.agreed;\n    return {\n      canvasRef: this.canvasRef,\n      showModal: this.state.showModal,\n      skipVisible: !this.state.showModal,\n      titleOpacity: this.state.titleOn ? 1 : 0,\n      skip: () => { if (!this.state.showModal) { this.t0 = performance.now() - this.D * 1000; this.setState({ titleOn: true, showModal: true }); } },\n      agreed,\n      toggleAgree: (e) => this.setState({ agreed: e.target.checked, declined: false }),\n      declined: this.state.declined,\n      accept: () => { if (this.state.agreed) window.location.href = (window.__resources && window.__resources.appHtml) || 'uploads/AterramentoPro_Dimensionamento.html'; },\n      decline: () => this.setState({ declined: true, agreed: false }),\n      acceptDisabled: !agreed,\n      acceptOpacity: agreed ? 1 : .45,\n      acceptCursor: agreed ? 'pointer' : 'not-allowed'\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
