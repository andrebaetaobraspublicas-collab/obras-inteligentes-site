>${localDate(h.createdAt)}<\u002Ftd><td>${esc(moduleNames[h.module]||h.module)}<\u002Ftd><td>${esc(h.title)}<\u002Ftd><td>${esc(h.summary||\"\")}<\u002Ftd><td>${h.utilization?fmt(h.utilization*100,1)+\"%\":\"\"}<\u002Ftd><td>${esc(h.status||\"\")}<\u002Ftd><\u002Ftr>`).join(\"\")}<\u002Ftable><h2>Quantitativos<\u002Fh2><table><tr><th>Descrição<\u002Fth><th>Perfil<\u002Fth><th>Comprimento (m)<\u002Fth><th>Quantidade<\u002Fth><th>Peso (kg)<\u002Fth><\u002Ftr>${items.map(i=>`<tr><td>${esc(i.description)}<\u002Ftd><td>${esc(getProfile(i.profileId)?.name||\"\")}<\u002Ftd><td>${fmt(i.length,2)}<\u002Ftd><td>${fmt(i.qty,0)}<\u002Ftd><td>${fmt(itemWeight(i),1)}<\u002Ftd><\u002Ftr>`).join(\"\")}<tr><th colspan=\"4\">Peso com perdas<\u002Fth><th>${fmt(cost.weight,1)}<\u002Fth><\u002Ftr><tr><th colspan=\"4\">Custo estimado<\u002Fth><th>${money(cost.total)}<\u002Fth><\u002Ftr><\u002Ftable><\u002Fbody><\u002Fhtml>`;\n  downloadText(`steelpro_${slug(p.name).replace(/\\s+/g,\"_\")||\"projeto\"}.xls`,html,\"application/vnd.ms-excel;charset=utf-8\");\n}\n\nfunction loadSettingsForm(){const s=state.settings;$(\"#settingNorm\").value=s.norm;$(\"#settingGammaM\").value=s.gammaM;$(\"#settingGammaU\").value=s.gammaU;$(\"#settingGammaG\").value=s.gammaG;$(\"#settingGammaQ\").value=s.gammaQ;$(\"#settingDefLimit\").value=String(s.defLimit);$(\"#settingSteelPrice\").value=s.steelPrice;$(\"#settingUnits\").value=s.units;$(\"#settingDecimals\").value=String(s.decimals);}\nfunction saveSettings(){state.settings={norm:$(\"#settingNorm\").value,gammaM:n($(\"#settingGammaM\").value,1.1),gammaU:n($(\"#settingGammaU\").value,1.35),gammaG:n($(\"#settingGammaG\").value,1.4),gammaQ:n($(\"#settingGammaQ\").value,1.4),defLimit:n($(\"#settingDefLimit\").value,250),steelPrice:n($(\"#settingSteelPrice\").value,12),units:$(\"#settingUnits\").value,decimals:n($(\"#settingDecimals\").value,2)};saveState();toast(\"Configurações salvas.\");renderDashboard();}\nfunction backupState(){downloadText(`steelpro_backup_${new Date().toISOString().slice(0,10)}.json`,JSON.stringify(state,null,2),\"application/json\");}\nfunction restoreBackup(file){const reader=new FileReader();reader.onload=()=>{try{const obj=JSON.parse(reader.result);if(!obj.projects||!obj.profiles||!obj.materials)throw new Error(\"Arquivo incompatível\");state=obj;state.settings={...defaultSettings,...state.settings};state.profiles=state.profiles.map(normalizeProfile);saveState();applyTheme();fillSelects();renderDashboard();closeModal(\"genericConfirm\");toast(\"Backup restaurado.\");}catch(err){toast(\"Falha ao restaurar: \"+err.message,\"error\");}};reader.readAsText(file);}\nfunction loadExample(kind){\n  if(kind===\"beam\"){$(\"#beamL\").value=6;$(\"#beamLb\").value=3;$(\"#beamG\").value=8;$(\"#beamQ\").value=12;$(\"#beamPG\").value=0;$(\"#beamPQ\").value=30;$(\"#beamA\").value=3;$(\"#beamSupport\").value=\"simple\";const p=state.profiles.find(x=>x.type===\"W\"&&x.mass>35);if(p)$(\"#beamProfile\").value=p.id;}\n  if(kind===\"column\"){$(\"#columnL\").value=4;$(\"#columnKx\").value=1;$(\"#columnKy\").value=1;$(\"#columnNG\").value=300;$(\"#columnNQ\").value=180;$(\"#columnMxG\").value=12;$(\"#columnMxQ\").value=8;const p=state.profiles.find(x=>[\"HP\",\"W\"].includes(x.type)&&x.mass>50);if(p)$(\"#columnProfile\").value=p.id;}\n  if(kind===\"truss\"){$(\"#trussType\").value=\"pratt\";$(\"#trussSpan\").value=18;$(\"#trussHeight\").value=3;$(\"#trussPanels\").value=8;$(\"#trussLoad\").value=12;const p=state.profiles.find(x=>[\"SHS\",\"CHS\",\"L\"].includes(x.type)&&x.mass>8);if(p)$(\"#trussProfile\").value=p.id;}\n  toast(\"Exemplo carregado. Revise os dados antes de calcular.\",\"warning\");\n}\nfunction renderCommandList(term=\"\"){\n  const entries=Object.entries(viewMeta).filter(([k])=>k!==\"dashboard\"||true).filter(([,v])=>slug(v.join(\" \")).includes(slug(term)));\n  $(\"#commandList\").innerHTML=entries.map(([k,v])=>`<div class=\"command-item\" data-command-view=\"${k}\"><span><strong>${esc(v[0])}<\u002Fstrong><span class=\"tiny muted\" style=\"display:block\">${esc(v[1])}<\u002Fspan><\u002Fspan><span class=\"kbd\">Enter<\u002Fspan><\u002Fdiv>`).join(\"\")||'<div class=\"empty\">Nenhum módulo encontrado.<\u002Fdiv>';\n}\nfunction openCommand(){renderCommandList();$(\"#commandPalette\").classList.add(\"open\");$(\"#commandInput\").value=\"\";setTimeout(()=>$(\"#commandInput\").focus(),30);}\nfunction closeCommand(){$(\"#commandPalette\").classList.remove(\"open\");}\nfunction resetDemoProfiles(){confirmDialog(\"Restaurar base demonstrativa\",\"Os perfis demonstrativos atuais serão substituídos. Perfis personalizados e importados serão mantidos.\",()=>{state.profiles=[...state.profiles.filter(p=>p.source!==\"demo\"),...defaultProfiles()];saveState();fillSelects();renderProfiles();toast(\"Base demonstrativa restaurada.\");});}\nfunction resetAll(){confirmDialog(\"Apagar todos os dados\",\"Todos os projetos, cálculos, perfis personalizados e configurações locais serão apagados.\",()=>{localStorage.removeItem(APP_KEY);state=defaultState();saveState();applyTheme();fillSelects();navigate(\"dashboard\");toast(\"Dados redefinidos.\");});}\n\nfunction initEvents(){\n  $$(\".nav-item[data-view]\").forEach(btn=>btn.addEventListener(\"click\",()=>navigate(btn.dataset.view)));\n  document.addEventListener(\"click\",e=>{\n    const link=e.target.closest(\"[data-view-link]\");if(link){navigate(link.dataset.viewLink);return;}\n    const openP=e.target.closest(\"[data-open-project]\");if(openP){openProjectForm();return;}\n    const sel=e.target.closest(\"[data-project-select]\");if(sel){selectProject(sel.dataset.projectSelect);renderProjects();return;}\n    const edit=e.target.closest(\"[data-project-edit]\");if(edit){openProjectForm(edit.dataset.projectEdit);return;}\n    const del=e.target.closest(\"[data-project-delete]\");if(del){deleteProject(del.dataset.projectDelete);return;}\n    const pe=e.target.closest(\"[data-profile-edit]\");if(pe){openProfileForm(pe.dataset.profileEdit);return;}\n    const pd=e.target.closest(\"[data-profile-delete]\");if(pd){deleteProfile(pd.dataset.profileDelete);return;}\n    const me=e.target.closest(\"[data-material-edit]\");if(me){openMaterialForm(me.dataset.materialEdit);return;}\n    const md=e.target.closest(\"[data-material-delete]\");if(md){deleteMaterial(md.dataset.materialDelete);return;}\n    const ab=e.target.closest(\"[data-analysis-budget]\");if(ab){addAnalysisToBudget(ab.dataset.analysisBudget);return;}\n    const bd=e.target.closest(\"[data-budget-delete]\");if(bd){deleteBudgetItem(bd.dataset.budgetDelete);return;}\n    const hd=e.target.closest(\"[data-history-delete]\");if(hd){deleteHistory(hd.dataset.historyDelete);return;}\n    const ex=e.target.closest(\"[data-load-example]\");if(ex){loadExample(ex.dataset.loadExample);return;}\n    const backup=e.target.closest(\"[data-action='backup']\");if(backup){backupState();return;}\n    const close=e.target.closest(\"[data-close-modal]\");if(close){closeModal(close.dataset.closeModal);return;}\n    const cmd=e.target.closest(\"[data-command-view]\");if(cmd){closeCommand();navigate(cmd.dataset.commandView);return;}\n  });\n  $$(\".modal-backdrop\").forEach(b=>b.addEventListener(\"mousedown\",e=>{if(e.target===b)closeModal(b.id);}));\n  $(\"#menuToggle\").addEventListener(\"click\",()=>$(\"#sidebar\").classList.toggle(\"open\"));\n  $(\"#themeToggle\").addEventListener(\"click\",()=>{state.theme=state.theme===\"dark\"?\"light\":\"dark\";applyTheme();saveState();});\n  $(\"#currentProjectBtn\").addEventListener(\"click\",()=>navigate(\"projects\"));\n  $(\"#commandBtn\").addEventListener(\"click\",openCommand);$(\"#commandInput\").addEventListener(\"input\",e=>renderCommandList(e.target.value));\n  document.addEventListener(\"keydown\",e=>{if((e.ctrlKey||e.metaKey)&&e.key.toLowerCase()===\"k\"){e.preventDefault();openCommand();}if(e.key===\"Escape\"){$$(\".modal-backdrop.open\").forEach(m=>closeModal(m.id));closeCommand();}});\n  document.addEventListener(\"mousedown\",e=>{if($(\"#commandPalette\").classList.contains(\"open\")&&!e.target.closest(\"#commandPalette\")&&!e.target.closest(\"#commandBtn\"))closeCommand();});\n  $(\"#saveProjectBtn\").addEventListener(\"click\",saveProject);$(\"#addProfileBtn\").addEventListener(\"click\",()=>openProfileForm());$(\"#saveProfileBtn\").addEventListener(\"click\",saveProfile);$(\"#addMaterialBtn\").addEventListener(\"click\",()=>openMaterialForm());$(\"#saveMaterialBtn\").addEventListener(\"click\",saveMaterial);\n  [\"profileSearch\",\"profileTypeFilter\",\"profileSourceFilter\",\"profilePageSize\"].forEach(id=>$(\"#\"+id).addEventListener(id===\"profileSearch\"?\"input\":\"change\",renderProfiles));\n  $(\"#exportProfilesCsv\").addEventListener(\"click\",exportProfiles);$(\"#importProfilesBtn\").addEventListener(\"click\",()=>$(\"#profileCsvFile\").click());$(\"#profileCsvFile\").addEventListener(\"change\",e=>{if(e.target.files[0])importProfilesCSV(e.target.files[0]);e.target.value=\"\";});\n  $(\"#paramFamily\").addEventListener(\"change\",()=>{updateParamFields();previewParametric();});$(\"#previewParamBtn\").addEventListener(\"click\",previewParametric);\n  $(\"#beamLTMode\").addEventListener(\"change\",()=>$(\"#beamChiField\").classList.toggle(\"hidden\",$(\"#beamLTMode\").value!==\"custom\"));\n  $(\"#columnB2\").addEventListener(\"change\",()=>$(\"#columnBField\").classList.toggle(\"hidden\",$(\"#columnB2\").value!==\"custom\"));$(\"#barMode\").addEventListener(\"change\",updateBarMode);\n  [\"beamCalcBtn\",\"beamCalcBtn2\"].forEach(id=>$(\"#\"+id).addEventListener(\"click\",calculateBeam));[\"columnCalcBtn\",\"columnCalcBtn2\"].forEach(id=>$(\"#\"+id).addEventListener(\"click\",calculateColumn));[\"barCalcBtn\",\"barCalcBtn2\"].forEach(id=>$(\"#\"+id).addEventListener(\"click\",calculateBar));$(\"#trussCalcBtn\").addEventListener(\"click\",calculateTruss);[\"purlinCalcBtn\",\"purlinCalcBtn2\"].forEach(id=>$(\"#\"+id).addEventListener(\"click\",calculatePurlin));$(\"#connectionCalcBtn\").addEventListener(\"click\",calculateConnection);$(\"#compareBtn\").addEventListener(\"click\",calculateCompare);\n  $(\"#exportTrussCsv\").addEventListener(\"click\",exportTruss);\n  $(\"#compareProfileChecks\").addEventListener(\"change\",e=>{if(e.target.matches(\".compare-profile\")&&$$(\".compare-profile:checked\").length>5){e.target.checked=false;toast(\"Selecione no máximo cinco perfis.\",\"warning\");}});\n  $(\"#addBudgetItem\").addEventListener(\"click\",()=>{$(\"#budgetItemDesc\").value=\"\";$(\"#budgetItemLength\").value=6;$(\"#budgetItemQty\").value=1;$(\"#budgetItemNote\").value=\"\";openModal(\"budgetItemModal\");});$(\"#saveBudgetItem\").addEventListener(\"click\",addManualBudgetItem);$(\"#calculateBudget\").addEventListener(\"click\",()=>{saveCostInputs();renderBudget();toast(\"Orçamento atualizado.\");});$$('.cost-input').forEach(i=>i.addEventListener('change',()=>{saveCostInputs();renderBudget();}));$(\"#exportBudgetCsv\").addEventListener(\"click\",exportBudget);\n  $(\"#exportHistoryCsv\").addEventListener(\"click\",exportHistory);$(\"#clearHistoryBtn\").addEventListener(\"click\",clearHistory);$(\"#refreshReport\").addEventListener(\"click\",()=>{renderReport();toast(\"Relatório atualizado.\");});$(\"#exportExcelBtn\").addEventListener(\"click\",exportProjectExcel);$(\"#printReport\").addEventListener(\"click\",()=>{renderReport();window.print();});\n  $(\"#saveSettingsBtn\").addEventListener(\"click\",saveSettings);$(\"#restoreBackupBtn\").addEventListener(\"click\",()=>$(\"#backupFile\").click());$(\"#backupFile\").addEventListener(\"change\",e=>{if(e.target.files[0])restoreBackup(e.target.files[0]);e.target.value=\"\";});$(\"#resetDemoBtn\").addEventListener(\"click\",resetDemoProfiles);$(\"#resetAllBtn\").addEventListener(\"click\",resetAll);\n  $(\"#confirmActionBtn\").addEventListener(\"click\",()=>{const fn=confirmCallback;confirmCallback=null;closeModal(\"genericConfirm\");if(fn)fn();});\n}\nfunction init(){\n  applyTheme();setupTabs();fillSelects();initEvents();updateParamFields();updateBarMode();updateNavCounts();loadSettingsForm();renderDashboard();renderProjects();renderProfiles();renderMaterials();renderCompareChecks();renderBudget();renderHistory();renderReport();\n}\ninit();\n<\u002Fscript>\n<script>\n/* ===== Tela de abertura: estrutura metálica 3D + aviso legal ===== */\n(function(){\n  var overlay=document.getElementById(\"splashScreen\");\n  if(!overlay) return;\n  var canvas=document.getElementById(\"splashCanvas\"), ctx=canvas.getContext(\"2d\");\n  var bar=document.getElementById(\"splashBar\"), brand=document.getElementById(\"splashBrand\");\n  var legal=document.getElementById(\"splashLegal\"), agree=document.getElementById(\"legalAgree\"), enterBtn=document.getElementById(\"legalEnter\");\n  var DURATION=5000;\n\n  /* ---- Geometria de um galpão metálico (pórticos + treliça + terças + contraventos) ---- */\n  var W=9, H=5, Hp=2.7, PAN=8, BAYS=4, S=3.4, half=W/2;\n  var nodes=[], edges=[], nodeMap={};\n  function rafterY(x){ return H + Hp*(1-Math.abs(x)/half); }\n  function nd(x,y,z){ var k=x.toFixed(3)+\",\"+y.toFixed(3)+\",\"+z.toFixed(3); if(nodeMap[k]==null){nodeMap[k]=nodes.length;nodes.push({x:x,y:y,z:z});} return nodeMap[k]; }\n  function ed(a,b,t){ edges.push({a:a,b:b,t:t}); }\n  var COL={col:\"#38bdf8\",tie:\"#22d3ee\",raf:\"#a78bfa\",web:\"#f472b6\",pur:\"#34d399\",brc:\"#fbbf24\"};\n  var frames=[];\n  for(var bi=0;bi<BAYS;bi++){\n    var z=-(BAYS-1)*S/2 + bi*S, bot=[], top=[];\n    for(var k=0;k<=PAN;k++){ var x=-half+k*(W/PAN); bot.push(nd(x,H,z)); top.push(nd(x,rafterY(x),z)); }\n    var gL=nd(-half,0,z), gR=nd(half,0,z);\n    frames.push({bot:bot,top:top,gL:gL,gR:gR});\n    ed(gL,bot[0],\"col\"); ed(gR,bot[PAN],\"col\");\n    for(var k2=0;k2<PAN;k2++){ ed(bot[k2],bot[k2+1],\"tie\"); ed(top[k2],top[k2+1],\"raf\"); }\n    for(var k3=0;k3<=PAN;k3++) ed(bot[k3],top[k3],\"web\");\n    for(var k4=0;k4<PAN;k4++){ if(k4<PAN/2) ed(bot[k4],top[k4+1],\"web\"); else ed(bot[k4+1],top[k4],\"web\"); }\n  }\n  for(var bi2=0;bi2<BAYS-1;bi2++){\n    var f=frames[bi2], g=frames[bi2+1];\n    for(var k5=0;k5<=PAN;k5++) ed(f.top[k5],g.top[k5],\"pur\");\n    ed(f.bot[0],g.bot[0],\"pur\"); ed(f.bot[PAN],g.bot[PAN],\"pur\");\n    ed(f.gL,g.gL,\"col\"); ed(f.gR,g.gR,\"col\");\n  }\n  /* contraventos nas extremidades */\n  [0,BAYS-2].forEach(function(bi3){\n    var f=frames[bi3], g=frames[bi3+1];\n    ed(f.gL,g.bot[0],\"brc\"); ed(g.gL,f.bot[0],\"brc\");\n    ed(f.gR,g.bot[PAN],\"brc\"); ed(g.gR,f.bot[PAN],\"brc\");\n    ed(f.top[2],g.top[PAN-2],\"brc\"); ed(g.top[2],f.top[PAN-2],\"brc\");\n  });\n  /* ordem de construção -> tempo de aparição */\n  var ord={col:0,tie:1,raf:1,web:2,pur:3,brc:4};\n  edges.forEach(function(e){ e.rank=ord[e.t]; });\n  edges.sort(function(a,b){ return a.rank-b.rank; });\n  var BUILD_START=350, BUILD_DUR=2650, EDUR=360;\n  edges.forEach(function(e,i){ e.appear=BUILD_START + (i/edges.length)*BUILD_DUR; });\n\n  /* ---- projeção 3D ---- */\n  var w=0,h=0,dpr=1,cx=0,cy=0,scale=1;\n  function resize(){\n    dpr=Math.min(window.devicePixelRatio||1,2);\n    w=overlay.clientWidth; h=overlay.clientHeight;\n    canvas.width=w*dpr; canvas.height=h*dpr;\n    ctx.setTransform(dpr,0,0,dpr,0,0);\n    cx=w/2; cy=h*0.46; scale=Math.min(w,h)/15;\n  }\n  window.addEventListener(\"resize\",resize); resize();\n  var TILT=-0.36, cyShift=(H+Hp)/2, camZ=23;\n  function proj(p,ang){\n    var y=p.y-cyShift;\n    var ca=Math.cos(ang), sa=Math.sin(ang);\n    var X=p.x*ca-p.z*sa, Z=p.x*sa+p.z*ca, Y=y;\n    var ct=Math.cos(TILT), st=Math.sin(TILT);\n    var Y2=Y*ct-Z*st, Z2=Y*st+Z*ct;\n    var f=camZ/(camZ-Z2);\n    return {x:cx+X*scale*f, y:cy-Y2*scale*f, f:f, d:Z2};\n  }\n\n  var start=null, raf=null, legalShown=false;\n  function frame(ts){\n    if(start==null) start=ts;\n    var t=ts-start, ang=0.55 + t*0.00034;\n    /* fundo */\n    var g=ctx.createRadialGradient(cx,cy-30,40,cx,cy,Math.max(w,h)*0.72);\n    g.addColorStop(0,\"#0b2138\"); g.addColorStop(.55,\"#061726\"); g.addColorStop(1,\"#030d18\");\n    ctx.fillStyle=g; ctx.fillRect(0,0,w,h);\n    /* piso em grade */\n    ctx.lineWidth=1; ctx.strokeStyle=\"rgba(90,170,220,.10)\";\n    for(var gx=-6;gx<=6;gx+=2){ var p1=proj({x:gx,y:0,z:-6},ang),p2=proj({x:gx,y:0,z:6},ang); ctx.beginPath();ctx.moveTo(p1.x,p1.y);ctx.lineTo(p2.x,p2.y);ctx.stroke(); }\n    for(var gz=-6;gz<=6;gz+=2){ var q1=proj({x:-6,y:0,z:gz},ang),q2=proj({x:6,y:0,z:gz},ang); ctx.beginPath();ctx.moveTo(q1.x,q1.y);ctx.lineTo(q2.x,q2.y);ctx.stroke(); }\n    /* arestas (ordenadas por profundidade) */\n    ctx.lineCap=\"round\"; ctx.lineJoin=\"round\";\n    var vis=[];\n    for(var i=0;i<edges.length;i++){\n      var e=edges[i];\n      var prog=Math.max(0,Math.min(1,(t-e.appear)/EDUR));\n      if(prog<=0) continue;\n      var A=proj(nodes[e.a],ang), B=proj(nodes[e.b],ang);\n      vis.push({A:A,B:B,prog:prog,t:e.t,d:(A.d+B.d)/2});\n    }\n    vis.sort(function(a,b){ return a.d-b.d; });\n    for(var j=0;j<vis.length;j++){\n      var v=vis[j], ex=v.A.x+(v.B.x-v.A.x)*v.prog, ey=v.A.y+(v.B.y-v.A.y)*v.prog;\n      var depthA=Math.max(.4,Math.min(1,(v.d+6)/12));\n      ctx.globalAlpha=depthA*(0.35+0.65*v.prog);\n      ctx.strokeStyle=COL[v.t]; ctx.shadowColor=COL[v.t]; ctx.shadowBlur=9;\n      ctx.lineWidth=1.5*((v.A.f+v.B.f)/2);\n      ctx.beginPath(); ctx.moveTo(v.A.x,v.A.y); ctx.lineTo(ex,ey); ctx.stroke();\n      if(v.prog>=1){\n        ctx.shadowBlur=12; ctx.fillStyle=\"#eaf7ff\"; ctx.globalAlpha=depthA;\n        ctx.beginPath(); ctx.arc(v.B.x,v.B.y,1.9*v.B.f,0,7); ctx.fill();\n        ctx.beginPath(); ctx.arc(v.A.x,v.A.y,1.9*v.A.f,0,7); ctx.fill();\n      }\n    }\n    ctx.globalAlpha=1; ctx.shadowBlur=0;\n    /* progresso */\n    if(bar) bar.style.width=Math.min(100,(t/DURATION)*100)+\"%\";\n    if(t>=DURATION && !legalShown){ legalShown=true; if(brand) brand.classList.add(\"dim\"); if(legal) legal.classList.add(\"show\"); }\n    raf=requestAnimationFrame(frame);\n  }\n  raf=requestAnimationFrame(frame);\n\n  /* ---- aviso legal ---- */\n  if(localStorage.getItem(\"steelpro_legal_ok\")===\"1\"){ if(agree) agree.checked=true; if(enterBtn) enterBtn.disabled=false; }\n  if(agree) agree.addEventListener(\"change\",function(){ enterBtn.disabled=!agree.checked; });\n  if(enterBtn) enterBtn.addEventListener(\"click\",function(){\n    if(agree && !agree.checked) return;\n    try{ localStorage.setItem(\"steelpro_legal_ok\",\"1\"); }catch(e){}\n    overlay.classList.add(\"leaving\");\n    setTimeout(function(){ if(raf) cancelAnimationFrame(raf); overlay.parentNode && overlay.parentNode.removeChild(overlay); },600);\n  });\n})();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
