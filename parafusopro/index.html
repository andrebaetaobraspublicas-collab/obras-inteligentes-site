  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

"<!DOCTYPE html>\n<html lang=\"pt-BR\"><head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<title>ParafusoPro — Dimensionamento de Ligações Parafusadas<\u002Ftitle>\n<style>\n:root{\n  --ink:#101418;\n  --steel:#1d2833;\n  --steel-2:#2a3946;\n  --zinc:#8b98a5;\n  --paper:#eceff2;\n  --paper-2:#dde3e8;\n  --thread:#c8501e;\n  --thread-soft:#f0d9cd;\n  --ok:#1d7a4a;\n  --warn:#b8860b;\n  --fail:#b3261e;\n  --mono:\"SFMono-Regular\",Consolas,\"Liberation Mono\",Menlo,monospace;\n  --sans:\"Inter\",\"Helvetica Neue\",Arial,sans-serif;\n}\n*{box-sizing:border-box}\nbody{margin:0;background:var(--paper);color:var(--ink);font-family:var(--sans);font-size:15px;line-height:1.5}\nheader{background:var(--steel);color:var(--paper);padding:22px 24px 0}\n.brand{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap}\n.brand h1{margin:0;font-size:26px;font-weight:800;letter-spacing:-.4px}\n.brand h1 span{color:var(--thread)}\n.brand small{color:var(--zinc);font-family:var(--mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase}\nnav{display:flex;gap:2px;margin-top:18px;flex-wrap:wrap}\nnav button{background:var(--steel-2);color:var(--zinc);border:0;border-bottom:3px solid transparent;padding:11px 18px;font:600 13px var(--sans);cursor:pointer;border-radius:6px 6px 0 0}\nnav button:hover{color:var(--paper)}\nnav button.on{background:var(--paper);color:var(--ink);border-bottom-color:var(--thread)}\nnav button:focus-visible{outline:2px solid var(--thread);outline-offset:-2px}\nmain{max-width:1180px;margin:0 auto;padding:24px}\n.panel{display:none}\n.panel.on{display:block}\n.grid{display:grid;grid-template-columns:minmax(300px,380px) 1fr;gap:22px;align-items:start}\n@media(max-width:840px){.grid{grid-template-columns:1fr}}\n.card{background:#fff;border:1px solid var(--paper-2);border-radius:10px;padding:18px 20px;margin-bottom:18px}\n.card h2{margin:0 0 4px;font-size:15px;font-weight:700}\n.card h2+.sub{margin:0 0 14px;color:#5c6b7a;font-size:12.5px}\nlabel{display:block;margin:12px 0 4px;font-size:12px;font-weight:600;color:#3c4a58}\ninput,select{width:100%;padding:9px 10px;border:1px solid #c3ccd5;border-radius:6px;font:14px var(--mono);background:#fbfcfd}\ninput:focus,select:focus{outline:2px solid var(--thread);outline-offset:-1px;border-color:var(--thread)}\ninput[aria-invalid=true]{border-color:var(--fail);background:#fdf3f2}\n.row{display:grid;grid-template-columns:1fr 1fr;gap:12px}\n.hint{font-size:11.5px;color:#6b7986;margin-top:4px;font-family:var(--mono)}\n.err{font-size:11.5px;color:var(--fail);margin-top:4px;min-height:14px}\nbutton.go{width:100%;margin-top:18px;background:var(--thread);color:#fff;border:0;border-radius:6px;padding:12px;font:700 14px var(--sans);cursor:pointer}\nbutton.go:hover{background:#a8410f}\nbutton.ghost{background:transparent;color:var(--steel);border:1px solid #c3ccd5;border-radius:6px;padding:9px 14px;font:600 12.5px var(--sans);cursor:pointer;margin-right:8px}\nbutton.ghost:hover{border-color:var(--thread);color:var(--thread)}\ntable{width:100%;border-collapse:collapse;font-size:13px;margin-top:8px}\nth,td{text-align:left;padding:7px 9px;border-bottom:1px solid var(--paper-2)}\nth{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:#6b7986;font-weight:700}\ntd.n{font-family:var(--mono);text-align:right;white-space:nowrap}\ntr.hl td{background:var(--thread-soft)}\n.verdict{border-radius:8px;padding:14px 16px;margin-bottom:16px;border-left:5px solid}\n.verdict.ok{background:#eaf6ef;border-color:var(--ok)}\n.verdict.warn{background:#fdf6e3;border-color:var(--warn)}\n.verdict.fail{background:#fdeceb;border-color:var(--fail)}\n.verdict b{display:block;font-size:15px;margin-bottom:3px}\n.verdict small{font-family:var(--mono);font-size:12px;color:#48555f}\n.bars{margin-top:6px}\n.bar{margin:9px 0}\n.bar .lbl{display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px}\n.bar .lbl span:last-child{font-family:var(--mono);font-weight:700}\n.track{height:9px;background:var(--paper-2);border-radius:5px;overflow:hidden}\n.fill{height:100%;border-radius:5px;transition:width .35s ease}\n.fill.ok{background:var(--ok)}.fill.warn{background:var(--warn)}.fill.fail{background:var(--fail)}\ndetails{margin-top:14px;border-top:1px solid var(--paper-2);padding-top:10px}\nsummary{cursor:pointer;font-size:12.5px;font-weight:600;color:var(--thread)}\n.calc{font-family:var(--mono);font-size:12px;background:#f7f9fb;border:1px solid var(--paper-2);border-radius:6px;padding:12px;margin-top:10px;white-space:pre-wrap;line-height:1.7;overflow-x:auto}\n.empty{color:#7a8794;font-size:13.5px;padding:30px 0;text-align:center}\n.bib-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border:1px solid var(--paper-2);border-radius:6px;margin-bottom:7px;background:#fbfcfd}\n.bib-item:hover{border-color:var(--thread)}\n.bib-info{flex:1;min-width:0}\n.bib-nome{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}\n.bib-meta{font-family:var(--mono);font-size:10.5px;color:#6b7986;margin-top:2px}\n.bib-acao{background:transparent;border:1px solid #c3ccd5;border-radius:4px;padding:4px 9px;font:600 11px var(--sans);cursor:pointer;color:var(--steel);white-space:nowrap}\n.bib-acao:hover{border-color:var(--thread);color:var(--thread)}\n.bib-acao.del:hover{border-color:var(--fail);color:var(--fail)}\n.bib-vazia{color:#7a8794;font-size:12.5px;padding:14px 0;text-align:center}\n.bib-status{font-size:11.5px;color:var(--ok);margin-top:8px;min-height:14px}\n.tag{display:inline-block;font-family:var(--mono);font-size:10.5px;background:var(--steel);color:var(--paper);padding:2px 7px;border-radius:3px;letter-spacing:.04em}\n.tag.n{background:var(--paper-2);color:#4b5966}\nfooter{max-width:1180px;margin:0 auto;padding:10px 24px 40px;color:#6b7986;font-size:11.5px;line-height:1.7}\nsvg.geo{width:100%;height:auto;background:#fbfcfd;border:1px solid var(--paper-2);border-radius:6px;margin-top:10px}\n.rel-cab{border-bottom:2px solid var(--steel);padding-bottom:14px;margin-bottom:18px}\n.rel-cab h1{margin:0 0 6px;font-size:20px;font-weight:800;letter-spacing:-.3px}\n.rel-meta{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:8px 18px;font-size:12px;margin-top:10px}\n.rel-meta div{color:#5c6b7a}\n.rel-meta b{display:block;font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;color:#8b98a5;font-weight:700}\n.rel-bloco{border-top:1px solid var(--paper-2);padding-top:16px;margin-top:20px}\n.rel-bloco h3{margin:0 0 3px;font-size:14px;font-weight:700}\n.rel-bloco .cfg{font-family:var(--mono);font-size:11.5px;color:#6b7986;margin-bottom:10px}\n.sit{display:inline-block;font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:3px;letter-spacing:.03em}\n.sit.ok{background:#eaf6ef;color:var(--ok)}\n.sit.warn{background:#fdf6e3;color:var(--warn)}\n.sit.fail{background:#fdeceb;color:var(--fail)}\n.minibar{height:6px;background:var(--paper-2);border-radius:3px;overflow:hidden;min-width:70px}\n.minibar div{height:100%;border-radius:3px}\n@media print{\n  nav,button,.card.input,footer,header nav{display:none!important}\n  body{background:#fff;font-size:11pt}\n  header{background:#fff;color:#000;border-bottom:2px solid #000;padding:0 0 8px}\n  header .brand h1{font-size:16pt}\n  header .brand h1 span,header .brand small{color:#000}\n  main{padding:0;max-width:100%}\n  .panel{display:none!important}\n  .panel#tab-rel{display:block!important}\n  .card{border:0;padding:0;margin-bottom:12pt;break-inside:avoid}\n  .rel-bloco{break-inside:avoid}\n  table{font-size:9.5pt}\n  details{display:none}\n}\n@media (prefers-reduced-motion:reduce){*{transition:none!important}}\n<\u002Fstyle>\n\n<\u002Fhead>\n<body>\n\n<header>\n  <div class=\"brand\">\n    <h1>Parafuso<span>Pro<\u002Fspan><\u002Fh1>\n    <small>NBR 8800:2008 · NBR 14762:2010 · ACI 318-19 Cap. 17<\u002Fsmall>\n  <\u002Fdiv>\n  <nav role=\"tablist\">\n    <button class=\"on\" data-tab=\"tracao\" role=\"tab\">Tração<\u002Fbutton>\n    <button data-tab=\"cisalha\" role=\"tab\">Cisalhamento<\u002Fbutton>\n    <button data-tab=\"comb\" role=\"tab\">Combinado<\u002Fbutton>\n    <button data-tab=\"anc\" role=\"tab\">Ancoragem em concreto<\u002Fbutton>\n    <button data-tab=\"base\" role=\"tab\">Metal-base<\u002Fbutton>\n    <button data-tab=\"geo\" role=\"tab\">Geometria da ligação<\u002Fbutton>\n    <button data-tab=\"tor\" role=\"tab\">Torque e protensão<\u002Fbutton>\n    <button data-tab=\"fad\" role=\"tab\">Fadiga<\u002Fbutton>\n    <button data-tab=\"apr\" role=\"tab\">Aperto e compra<\u002Fbutton>\n    <button data-tab=\"fina\" role=\"tab\">Chapa fina<\u002Fbutton>\n    <button data-tab=\"furos\" role=\"tab\">Furos especiais<\u002Fbutton>\n    <button data-tab=\"sens\" role=\"tab\">Sensibilidade<\u002Fbutton>\n    <button data-tab=\"exc\" role=\"tab\">Excentricidade<\u002Fbutton>\n    <button data-tab=\"cap\" role=\"tab\">Capacidade da ligação<\u002Fbutton>\n    <button data-tab=\"uni\" role=\"tab\">Ligação única<\u002Fbutton>\n    <button data-tab=\"rel\" role=\"tab\">Relatório<\u002Fbutton>\n  <\u002Fnav>\n<\u002Fheader>\n\n<main>\n\n<!-- ============ TRAÇÃO ============ -->\n<section class=\"panel on\" id=\"tab-tracao\">\n<div class=\"grid\">\n  <div>\n    <div class=\"card input\">\n      <h2>Ligação tracionada<\u002Fh2>\n      <p class=\"sub\">Estado-limite último de ruptura da parte rosqueada — NBR 8800 item 6.3.3.2.<\u002Fp>\n      <label for=\"t_ft\">Força de tração solicitante de cálculo · F<sub>t,Sd<\u002Fsub> (kN)<\u002Flabel>\n      <input id=\"t_ft\" type=\"number\" value=\"150\" min=\"0.1\" step=\"1\">\n      <div class=\"err\" id=\"e_t_ft\"><\u002Fdiv>\n      <div class=\"row\">\n        <div>\n          <label for=\"t_cls\">Classe do parafuso<\u002Flabel>\n          <select id=\"t_cls\"><\u002Fselect>\n        <\u002Fdiv>\n        <div>\n          <label for=\"t_d\">Diâmetro nominal<\u002Flabel>\n          <select id=\"t_d\"><\u002Fselect>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <label for=\"t_n\">Número de parafusos<\u002Flabel>\n      <input id=\"t_n\" type=\"number\" value=\"2\" min=\"1\" step=\"1\">\n      <div class=\"err\" id=\"e_t_n\"><\u002Fdiv>\n      <label for=\"t_alav\">Efeito alavanca (prying)<\u002Flabel>\n      <select id=\"t_alav\">\n        <option value=\"calc\" selected=\"\">Calcular pela geometria (AISC Parte 9)<\u002Foption>\n        <option value=\"1.00\">Desprezar — chapa rígida<\u002Foption>\n        <option value=\"1.20\">Estimar +20%<\u002Foption>\n        <option value=\"1.35\">Estimar +35%<\u002Foption>\n      <\u002Fselect>\n      <div id=\"t_prybox\">\n        <div class=\"row\">\n          <div><label for=\"t_tc\">Espessura da chapa de topo · t (mm)<\u002Flabel><input id=\"t_tc\" type=\"number\" value=\"16\" min=\"1\" step=\"0.5\"><div class=\"err\" id=\"e_t_tc\"><\u002Fdiv><\u002Fdiv>\n          <div><label for=\"t_fuc\">f<sub>u<\u002Fsub> da chapa (MPa)<\u002Flabel><select id=\"t_fuc\">\n            <option value=\"400\" selected=\"\">A36 — 400<\u002Foption><option value=\"450\">MR250 — 450<\u002Foption>\n            <option value=\"485\">AR350 — 485<\u002Foption><option value=\"500\">A572 G50 — 500<\u002Foption><\u002Fselect><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"row\">\n          <div><label for=\"t_b\">Distância parafuso–alma · b (mm)<\u002Flabel><input id=\"t_b\" type=\"number\" value=\"50\" min=\"5\" step=\"5\"><div class=\"err\" id=\"e_t_b\"><\u002Fdiv><\u002Fdiv>\n          <div><label for=\"t_a\">Distância parafuso–borda · a (mm)<\u002Flabel><input id=\"t_a\" type=\"number\" value=\"40\" min=\"5\" step=\"5\"><div class=\"err\" id=\"e_t_a\"><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <label for=\"t_ptrib\">Largura tributária por parafuso · p (mm)<\u002Flabel>\n        <input id=\"t_ptrib\" type=\"number\" value=\"80\" min=\"10\" step=\"5\">\n        <div class=\"hint\">Espaçamento entre parafusos da linha, ou largura da mesa dividida pelo número de parafusos.<\u002Fdiv>\n      <\u002Fdiv>\n      <button class=\"go\" id=\"t_go\">Calcular tração<\u002Fbutton>\n      <div style=\"margin-top:12px\"><button class=\"ghost\" id=\"t_auto\">Sugerir diâmetro mínimo<\u002Fbutton><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div id=\"t_out\"><div class=\"card\"><div class=\"empty\">Informe os dados e calcule.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ CISALHAMENTO ============ -->\n<section class=\"panel\" id=\"tab-cisalha\">\n<div class=\"grid\">\n  <div>\n    <div class=\"card input\">\n      <h2>Ligação cisalhada<\u002Fh2>\n      <p class=\"sub\">Corte no parafuso (6.3.3.3) e pressão de contato no furo (6.3.3.3-b).<\u002Fp>\n      <label for=\"v_fv\">Força cortante solicitante de cálculo · F<sub>v,Sd<\u002Fsub> (kN)<\u002Flabel>\n      <input id=\"v_fv\" type=\"number\" value=\"200\" min=\"0.1\" step=\"1\">\n      <div class=\"err\" id=\"e_v_fv\"><\u002Fdiv>\n      <div class=\"row\">\n        <div><label for=\"v_cls\">Classe do parafuso<\u002Flabel><select id=\"v_cls\"><\u002Fselect><\u002Fdiv>\n        <div><label for=\"v_d\">Diâmetro nominal<\u002Flabel><select id=\"v_d\"><\u002Fselect><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"row\">\n        <div><label for=\"v_n\">Número de parafusos<\u002Flabel><input id=\"v_n\" type=\"number\" value=\"4\" min=\"1\" step=\"1\"><div class=\"err\" id=\"e_v_n\"><\u002Fdiv><\u002Fdiv>\n        <div><label for=\"v_p\">Planos de corte por parafuso<\u002Flabel><select id=\"v_p\"><option value=\"1\">1 — corte simples<\u002Foption><option value=\"2\" selected=\"\">2 — corte duplo<\u002Foption><\u002Fselect><\u002Fdiv>\n      <\u002Fdiv>\n      <label for=\"v_rosca\">Posição do plano de corte<\u002Flabel>\n      <select id=\"v_rosca\">\n        <option value=\"0.4\" selected=\"\">Rosca no plano de corte (0,40·A<sub>b<\u002Fsub>·f<sub>ub<\u002Fsub>)<\u002Foption>\n        <option value=\"0.5\">Parte lisa no plano de corte (0,50·A<sub>b<\u002Fsub>·f<sub>ub<\u002Fsub>)<\u002Foption>\n      <\u002Fselect>\n      <div class=\"row\">\n        <div><label for=\"v_t\">Espessura crítica da chapa · t (mm)<\u002Flabel><input id=\"v_t\" type=\"number\" value=\"12.5\" min=\"0.5\" step=\"0.5\"><div class=\"err\" id=\"e_v_t\"><\u002Fdiv><\u002Fdiv>\n        <div><label for=\"v_fu\">f<sub>u<\u002Fsub> da chapa (MPa)<\u002Flabel><select id=\"v_fu\"><option value=\"400\" selected=\"\">ASTM A36 — 400<\u002Foption><option value=\"450\">MR250 — 450<\u002Foption><option value=\"485\">AR350 — 485<\u002Foption><option value=\"500\">A572 G50 — 500<\u002Foption><\u002Fselect><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"row\">\n        <div><label for=\"v_e\">Distância à borda na direção da força · e (mm)<\u002Flabel><input id=\"v_e\" type=\"number\" value=\"35\" min=\"1\" step=\"1\"><\u002Fdiv>\n        <div><label for=\"v_pp\">Espaçamento entre furos · p (mm)<\u002Flabel><input id=\"v_pp\" type=\"number\" value=\"60\" min=\"1\" step=\"1\"><\u002Fdiv>\n      <\u002Fdiv>\n      <label for=\"v_defo\">Deformação no furo em serviço<\u002Flabel>\n      <select id=\"v_defo\">\n        <option value=\"1\" selected=\"\">Limitada — considerar (α = 1,2 / 2,4)<\u002Foption>\n        <option value=\"0\">Não considerada (α = 1,5 / 3,0)<\u002Foption>\n      <\u002Fselect>\n      <button class=\"go\" id=\"v_go\">Calcular cisalhamento<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div id=\"v_out\"><div class=\"card\"><div class=\"empty\">Informe os dados e calcule.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ COMBINADO ============ -->\n<section class=\"panel\" id=\"tab-comb\">\n<div class=\"grid\">\n  <div>\n    <div class=\"card input\">\n      <h2>Tração e cisalhamento combinados<\u002Fh2>\n      <p class=\"sub\">Interação elíptica da NBR 8800 item 6.3.3.4: (F<sub>t,Sd<\u002Fsub>/F<sub>t,Rd<\u002Fsub>)² + (F<sub>v,Sd<\u002Fsub>/F<sub>v,Rd<\u002Fsub>)² ≤ 1,0.<\u002Fp>\n      <div class=\"row\">\n        <div><label for=\"c_ft\">F<sub>t,Sd<\u002Fsub> total (kN)<\u002Flabel><input id=\"c_ft\" type=\"number\" value=\"120\" min=\"0\" step=\"1\"><\u002Fdiv>\n        <div><label for=\"c_fv\">F<sub>v,Sd<\u002Fsub> total (kN)<\u002Flabel><input id=\"c_fv\" type=\"number\" value=\"180\" min=\"0\" step=\"1\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"row\">\n        <div><label for=\"c_cls\">Classe<\u002Flabel><select id=\"c_cls\"><\u002Fselect><\u002Fdiv>\n        <div><label for=\"c_d\">Diâmetro<\u002Flabel><select id=\"c_d\"><\u002Fselect><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"row\">\n        <div><label for=\"c_n\">Número de parafusos<\u002Flabel><input id=\"c_n\" type=\"number\" value=\"6\" min=\"1\" step=\"1\"><\u002Fdiv>\n        <div><label for=\"c_p\">Planos de corte<\u002Flabel><select id=\"c_p\"><option value=\"1\">1<\u002Foption><option value=\"2\" selected=\"\">2<\u002Foption><\u002Fselect><\u002Fdiv>\n      <\u002Fdiv>\n      <label for=\"c_rosca\">Posição do plano de corte<\u002Flabel>\n      <select id=\"c_rosca\"><option value=\"0.4\" selected=\"\">Rosca no plano<\u002Foption><option value=\"0.5\">Parte lisa no plano<\u002Foption><\u002Fselect>\n      <button class=\"go\" id=\"c_go\">Verificar interação<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div id=\"c_out\"><div class=\"card\"><div class=\"empty\">Informe os dados e verifique.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ ANCORAGEM ============ -->\n<section class=\"panel\" id=\"tab-anc\">\n<div class=\"grid\">\n  <div>\n    <div class=\"card input\">\n      <h2>Chumbador em concreto<\u002Fh2>\n      <p class=\"sub\">Método do cone de concreto (CCD) — ACI 318-19 Cap. 17. Chumbador isolado, sem armadura suplementar.<\u002Fp>\n      <div class=\"row\">\n        <div><label for=\"a_nu\">N<sub>ua<\u002Fsub> — tração (kN)<\u002Flabel><input id=\"a_nu\" type=\"number\" value=\"40\" min=\"0\" step=\"1\"><\u002Fdiv>\n        <div><label for=\"a_vu\">V<sub>ua<\u002Fsub> — cortante (kN)<\u002Flabel><input id=\"a_vu\" type=\"number\" value=\"25\" min=\"0\" step=\"1\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"row\">\n        <div><label for=\"a_tipo\">Tipo de chumbador<\u002Flabel><select id=\"a_tipo\">\n          <option value=\"pos_exp\">Pós-instalado — expansão<\u002Foption>\n          <option value=\"pos_qui\" selected=\"\">Pós-instalado — químico (adesivo)<\u002Foption>\n          <option value=\"chumbado\">Pré-instalado — chumbado (headed)<\u002Foption>\n        <\u002Fselect><\u002Fdiv>\n        <div><label for=\"a_d\">Diâmetro<\u002Flabel><select id=\"a_d\"><\u002Fselect><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"row\">\n        <div><label for=\"a_hef\">Profundidade efetiva · h<sub>ef<\u002Fsub> (mm)<\u002Flabel><input id=\"a_hef\" type=\"number\" value=\"110\" min=\"20\" step=\"5\"><div class=\"err\" id=\"e_a_hef\"><\u002Fdiv><\u002Fdiv>\n        <div><label for=\"a_fck\">f<sub>ck<\u002Fsub> do concreto (MPa)<\u002Flabel><input id=\"a_fck\" type=\"number\" value=\"30\" min=\"15\" step=\"5\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"row\">\n        <div><label for=\"a_c1\">Menor distância à borda · c<sub>a1<\u002Fsub> (mm)<\u002Flabel><input id=\"a_c1\" type=\"number\" value=\"200\" min=\"10\" step=\"5\"><\u002Fdiv>\n        <div><label for=\"a_c2\">Segunda distância à borda · c<sub>a2<\u002Fsub> (mm)<\u002Flabel><input id=\"a_c2\" type=\"number\" value=\"400\" min=\"10\" step=\"5\"><\u002Fdiv>\n      <\u002Fdiv>\n      <label for=\"a_fis\">Condição do concreto<\u002Flabel>\n      <select id=\"a_fis\"><option value=\"1\" selected=\"\">Fissurado (situação usual em serviço)<\u002Foption><option value=\"0\">Não fissurado (comprovado em projeto)<\u002Foption><\u002Fselect>\n      <label for=\"a_cls\">Classe do aço do chumbador<\u002Flabel>\n      <select id=\"a_cls\"><\u002Fselect>\n      <label for=\"a_arranjo\">Arranjo dos chu   <input id=\"b_n\" type=\"number\" value=\"300\" min=\"0.1\" step=\"1\">\n      <div class=\"err\" id=\"e_b_n\"><\u002Fdiv>\n      <div class=\"row\">\n        <div><label for=\"b_t\">Espessura da chapa · t (mm)<\u002Flabel><input id=\"b_t\" type=\"number\" value=\"12.5\" min=\"0.5\" step=\"0.5\"><div class=\"err\" id=\"e_b_t\"><\u002Fdiv><\u002Fdiv>\n        <div><label for=\"b_larg\">Largura da chapa · b (mm)<\u002Flabel><input id=\"b_larg\" type=\"number\" value=\"150\" min=\"10\" step=\"5\"><div class=\"err\" id=\"e_b_larg\"><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"row\">\n        <div><label for=\"b_aco\">Aço da chapa<\u002Flabel><select id=\"b_aco\">\n          <option value=\"250|400\" selected=\"\">ASTM A36 — f<sub>y<\u002Fsub> 250 / f<sub>u<\u002Fsub> 400<\u002Foption>\n          <option value=\"250|450\">MR250 — 250 / 450<\u002Foption>\n          <option value=\"345|485\">AR350 — 345 / 485<\u002Foption>\n          <option value=\"345|500\">A572 G50 — 345 / 500<\u002Foption>\n        <\u002Fselect><\u002Fdiv>\n        <div><label for=\"b_d\">Diâmetro do parafuso<\u002Flabel><select id=\"b_d\"><\u002Fselect><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"row\">\n        <div><label for=\"b_nl\">Furos por linha transversal · n<sub>t<\u002Fsub><\u002Flabel><input id=\"b_nl\" type=\"number\" value=\"2\" min=\"1\" step=\"1\"><div class=\"err\" id=\"e_b_nl\"><\u002Fdiv><\u002Fdiv>\n        <div><label for=\"b_nc\">Furos por linha longitudinal · n<sub>l<\u002Fsub><\u002Flabel><input id=\"b_nc\" type=\"number\" value=\"2\" min=\"1\" step=\"1\"><div class=\"err\" id=\"e_b_nc\"><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"row\">\n        <div><label for=\"b_p\">Espaçamento longitudinal · p (mm)<\u002Flabel><input id=\"b_p\" type=\"number\" value=\"60\" min=\"1\" step=\"5\"><\u002Fdiv>\n        <div><label for=\"b_g\">Gabarito transversal · g (mm)<\u002Flabel><input id=\"b_g\" type=\"number\" value=\"70\" min=\"1\" step=\"5\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"row\">\n        <div><label for=\"b_e\">Distância à borda longitudinal · e (mm)<\u002Flabel><input id=\"b_e\" type=\"number\" value=\"35\" min=\"1\" step=\"5\"><\u002Fdiv>\n        <div><label for=\"b_eg\">Distância à borda transversal · e<sub>g<\u002Fsub> (mm)<\u002Flabel><input id=\"b_eg\" type=\"number\" value=\"40\" min=\"1\" step=\"5\"><\u002Fdiv>\n      <\u002Fdiv>\n      <label for=\"b_ct\">Coeficiente de redução da área líquida · C<sub>t<\u002Fsub><\u002Flabel>\n      <select id=\"b_ct\">\n        <option value=\"1.00\">1,00 — todos os elementos ligados (chapa plana)<\u002Foption>\n        <option value=\"0.90\">0,90 — perfil I, ligação pelas mesas, b<sub>f<\u002Fsub> ≥ 2/3·d<\u002Foption>\n        <option value=\"0.85\" selected=\"\">0,85 — caso geral com excentricidade moderada<\u002Foption>\n        <option value=\"0.75\">0,75 — cantoneira ligada por uma aba, ligação curta<\u002Foption>\n      <\u002Fselect>\n      <label for=\"b_cts\">Distribuição de tensões no bloco de rasgamento · C<sub>ts<\u002Fsub><\u002Flabel>\n      <select id=\"b_cts\">\n        <option value=\"1.0\" selected=\"\">1,0 — tensão de tração uniforme<\u002Foption>\n        <option value=\"0.5\">0,5 — tensão de tração não uniforme<\u002Foption>\n      <\u002Fselect>\n      <button class=\"go\" id=\"b_go\">Verificar metal-base<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div id=\"b_out\"><div class=\"card\"><div class=\"empty\">Informe os dados e verifique.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ GEOMETRIA ============ -->\n<section class=\"panel\" id=\"tab-geo\">\n<div class=\"grid\">\n  <div>\n    <div class=\"card input\">\n      <h2>Espaçamentos e distâncias<\u002Fh2>\n      <p class=\"sub\">Limites da NBR 8800 itens 6.3.10 a 6.3.12, com furo-padrão.<\u002Fp>\n      <div class=\"row\">\n        <div><label for=\"g_d\">Diâmetro do parafuso<\u002Flabel><select id=\"g_d\"><\u002Fselect><\u002Fdiv>\n        <div><label for=\"g_t\">Espessura da chapa externa · t (mm)<\u002Flabel><input id=\"g_t\" type=\"number\" value=\"12.5\" min=\"0.5\" step=\"0.5\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"row\">\n        <div><label for=\"g_p\">Espaçamento adotado · p (mm)<\u002Flabel><input id=\"g_p\" type=\"number\" value=\"60\" min=\"1\" step=\"1\"><\u002Fdiv>\n        <div><label for=\"g_e\">Distância à borda adotada · e (mm)<\u002Flabel><input id=\"g_e\" type=\"number\" value=\"35\" min=\"1\" step=\"1\"><\u002Fdiv>\n      <\u002Fdiv>\n      <label for=\"g_borda\">Tipo de borda<\u002Flabel>\n      <select id=\"g_borda\"><option value=\"cort\" selected=\"\">Cortada a serra ou tesoura<\u002Foption><option value=\"lam\">Laminada ou cortada a maçarico<\u002Foption><\u002Fselect>\n      <label for=\"g_amb\">Exposição<\u002Flabel>\n      <select id=\"g_amb\"><option value=\"0\" selected=\"\">Protegida da corrosão<\u002Foption><option value=\"1\">Sujeita a corrosão atmosférica<\u002Foption><\u002Fselect>\n      <button class=\"go\" id=\"g_go\">Verificar geometria<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div id=\"g_out\"><div class=\"card\"><div class=\"empty\">Informe os dados e verifique.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ TORQUE ============ -->\n<section class=\"panel\" id=\"tab-tor\">\n<div class=\"grid\">\n  <div>\n    <div class=\"card input\">\n      <h2>Protensão e torque de instalação<\u002Fh2>\n      <p class=\"sub\">Ligações por atrito. F<sub>p<\u002Fsub> = 0,70·A<sub>b<\u002Fsub>·f<sub>ub<\u002Fsub> (NBR 8800 Tab. 13). Torque estimado por T = K·F<sub>p<\u002Fsub>·d.<\u002Fp>\n      <div class=\"row\">\n        <div><label for=\"k_cls\">Classe do parafuso<\u002Flabel><select id=\"k_cls\"><\u002Fselect><\u002Fdiv>\n        <div><label for=\"k_d\">Diâmetro<\u002Flabel><select id=\"k_d\"><\u002Fselect><\u002Fdiv>\n      <\u002Fdiv>\n      <label for=\"k_k\">Coeficiente de atrito da rosca · K<\u002Flabel>\n      <select id=\"k_k\">\n        <option value=\"0.20\" selected=\"\">0,20 — rosca seca, galvanizada a fogo<\u002Foption>\n        <option value=\"0.18\">0,18 — rosca preta, levemente oleada<\u002Foption>\n        <option value=\"0.15\">0,15 — rosca lubrificada (cera/dissulfeto)<\u002Foption>\n      <\u002Fselect>\n      <label for=\"k_mu\">Coeficiente de atrito das superfícies · μ (deslizamento crítico)<\u002Flabel>\n      <select id=\"k_mu\">\n        <option value=\"0.35\" selected=\"\">0,35 — Classe A: superfície limpa, com carepa<\u002Foption>\n        <option value=\"0.50\">0,50 — Classe B: jateada, sem pintura<\u002Foption>\n        <option value=\"0.30\">0,30 — galvanizada a fogo e escovada<\u002Foption>\n      <\u002Fselect>\n      <div class=\"row\">\n        <div><label for=\"k_n\">Número de parafusos<\u002Flabel><input id=\"k_n\" type=\"number\" value=\"4\" min=\"1\" step=\"1\"><\u002Fdiv>\n        <div><label for=\"k_ns\">Superfícies de atrito<\u002Flabel><select id=\"k_ns\"><option value=\"1\">1<\u002Foption><option value=\"2\" selected=\"\">2<\u002Foption><\u002Fselect><\u002Fdiv>\n      <\u002Fdiv>\n      <button class=\"go\" id=\"k_go\">Calcular protensão e torque<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div id=\"k_out\"><div class=\"card\"><div class=\"empty\">Informe os dados e calcule.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ FADIGA ============ -->\n<section class=\"panel\" id=\"tab-fad\">\n<div class=\"grid\">\n  <div>\n    <div class=\"card input\">\n      <h2>Verificação à fadiga<\u002Fh2>\n      <p class=\"sub\">Curvas S-N da NBR 8800 Anexo K (equivalentes ao AISC 360 Ap. 3). Aplicável a carga cíclica de amplitude aproximadamente constante.<\u002Fp>\n      <label for=\"fd_alvo\">Elemento verificado<\u002Flabel>\n      <select id=\"fd_alvo\">\n        <option value=\"PAR\" selected=\"\">Parafuso tracionado (inclui alavanca)<\u002Foption>\n        <option value=\"chapa\">Metal-base junto à ligação<\u002Foption>\n      <\u002Fselect>\n      <div id=\"fd_catbox\" style=\"display:none\">\n        <label for=\"fd_cat\">Categoria de detalhe (Tabela K.1)<\u002Flabel>\n        <select id=\"fd_cat\">\n          <option value=\"A\">A — metal-base laminado, superfície limpa<\u002Foption>\n          <option value=\"B\">B — chapas ligadas por parafusos de alta resistência<\u002Foption>\n          <option value=\"B1\">B' — metal-base em seções soldadas de chapa<\u002Foption>\n          <option value=\"C\" selected=\"\">C — ligações com enrijecedores transversais<\u002Foption>\n          <option value=\"D\">D — ligações parafusadas com pressão de contato<\u002Foption>\n          <option value=\"E\">E — extremidades de cobrejuntas longas<\u002Foption>\n          <option value=\"E1\">E' — detalhes severos em chapas espessas<\u002Foption>\n        <\u002Fselect>\n      <\u002Fdiv>\n      <div class=\"row\">\n        <div><label for=\"fd_smax\">Esforço máximo do ciclo (kN)<\u002Flabel><input id=\"fd_smax\" type=\"number\" value=\"90\" min=\"0\" step=\"5\"><div class=\"err\" id=\"e_fd_smax\"><\u002Fdiv><\u002Fdiv>\n        <div><label for=\"fd_smin\">Esforço mínimo do ciclo (kN)<\u002Flabel><input id=\"fd_smin\" type=\"number\" value=\"20\" min=\"-9999\" step=\"5\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"row\">\n        <div><label for=\"fd_cls\">Classe do parafuso<\u002Flabel><select id=\"fd_cls\"><\u002Fselect><\u002Fdiv>\n        <div><label for=\"fd_d\">Diâmetro<\u002Flabel><select id=\"fd_d\"><\u002Fselect><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"row\">\n        <div><label for=\"fd_n\">Número de parafusos<\u002Flabel><input id=\"fd_n\" type=\"number\" value=\"4\" min=\"1\" step=\"1\"><div class=\"err\" id=\"e_fd_n\"><\u002Fdiv><\u002Fdiv>\n        <div><label for=\"fd_area\" id=\"fd_arealb\">Área da chapa (mm²) — só p/ metal-base<\u002Flabel><input id=\"fd_area\" type=\"number\" value=\"2500\" min=\"1\" step=\"50\"><\u002Fdiv>\n      <\u002Fdiv>\n      <label for=\"fd_ciclos\">Número de ciclos previsto na vida útil<\u002Flabel>\n      <select id=\"fd_ciclos\">\n        <option value=\"20000\">2 × 10⁴ — eventual (pontes rolantes leves)<\u002Foption>\n        <option value=\"100000\">10⁵ — uso moderado<\u002Foption>\n        <option value=\"500000\">5 × 10⁵ — uso intenso<\u002Foption>\n        <option value=\"2000000\" selected=\"\">2 × 10⁶ — referência de projeto<\u002Foption>\n        <option value=\"10000000\">10⁷ — vida quase infinita<\u002Foption>\n        <option value=\"outro\">Informar diretamente<\u002Foption>\n      <\u002Fselect>\n      <div id=\"fd_nbox\" style=\"display:none\">\n        <label for=\"fd_nlivre\">Ciclos (N)<\u002Flabel>\n        <input id=\"fd_nlivre\" type=\"number\" value=\"2000000\" min=\"1000\" step=\"10000\">\n      <\u002Fdiv>\n      <label for=\"fd_prot\">Condição de protensão (parafuso tracionado)<\u002Flabel>\n      <select id=\"fd_prot\">\n        <option value=\"1.00\">Sem protensão — parafuso absorve toda a variação<\u002Foption>\n        <option value=\"0.20\" selected=\"\">Protendido — junta rígida absorve ~80% da variação<\u002Foption>\n        <option value=\"0.35\">Protendido — junta com juntas flexíveis (~65%)<\u002Foption>\n      <\u002Fselect>\n      <button class=\"go\" id=\"fd_go\">Verificar fadiga<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div id=\"fd_out\"><div class=\"card\"><div class=\"empty\">Informe o ciclo de carga e verifique.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ APERTO E SELEÇÃO COMERCIAL ============ -->\n<section class=\"panel\" id=\"tab-apr\">\n<div class=\"grid\">\n  <div>\n    <div class=\"card input\">\n      <h2>Comprimento de aperto e compra<\u002Fh2>\n      <p class=\"sub\">Determina o comprimento comercial do parafuso a partir do pacote de chapas, com porca ISO 4032, arruelas ISO 7089 e rosca parcial DIN 931.<\u002Fp>\n      <div class=\"row\">\n        <div><label for=\"ap_d\">Diâmetro<\u002Flabel><select id=\"ap_d\"><\u002Fselect><\u002Fdiv>\n        <div><label for=\"ap_cls\">Classe<\u002Flabel><select id=\"ap_cls\"><\u002Fselect><\u002Fdiv>\n      <\u002Fdiv>\n      <label for=\"ap_chapas\">Espessuras do pacote (mm, separadas por \"+\")<\u002Flabel>\n      <input id=\"ap_chapas\" type=\"text\" value=\"12.5 + 12.5\" style=\"font-family:var(--mono)\">\n      <div class=\"err\" id=\"e_ap_chapas\"><\u002Fdiv>\n      <div class=\"hint\">Separe com \"+\" ou \";\". Vírgula é o decimal: \"12,5 + 16 + 12,5\". A ordem informa onde ficam os planos de corte.<\u002Fdiv>\n      <div class=\"row\">\n        <div><label for=\"ap_arr\">Arruelas<\u002Flabel><select id=\"ap_arr\">\n          <option value=\"1\">1 — sob a porca<\u002Foption>\n          <option value=\"2\" selected=\"\">2 — sob cabeça e porca<\u002Foption>\n          <option value=\"0\">Nenhuma<\u002Foption>\n        <\u002Fselect><\u002Fdiv>\n        <div><label for=\"ap_sobra\">Sobra de rosca além da porca<\u002Flabel><select id=\"ap_sobra\">\n          <option value=\"2\" selected=\"\">2 passos (mínimo usual)<\u002Foption>\n          <option value=\"3\">3 passos (conservador)<\u002Foption>\n        <\u002Fselect><\u002Fdiv>\n      <\u002Fdiv>\n      <label for=\"ap_plano\">Exigência sobre os planos de corte<\u002Flabel>\n      <select id=\"ap_plano\">\n        <option value=\"livre\" selected=\"\">Indiferente — verificar e informar<\u002Foption>\n        <option value=\"liso\">Fuste liso nos planos de corte (coef. 0,50)<\u002Foption>\n      <\u002Fselect>\n      <div class=\"row\">\n        <div><label for=\"ap_qtd\">Quantidade de ligações iguais<\u002Flabel><input id=\"ap_qtd\" type=\"number\" value=\"1\" min=\"1\" step=\"1\"><\u002Fdiv>\n        <div><label for=\"ap_npar\">Parafusos por ligação<\u002Flabel><input id=\"ap_npar\" type=\"number\" value=\"4\" min=\"1\" step=\"1\"><div class=\"err\" id=\"e_ap_npar\"><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <button class=\"go\" id=\"ap_go\">Determinar comprimento<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div id=\"ap_out\"><div class=\"card\"><div class=\"empty\">Informe o pacote de chapas e determine.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ CHAPA FINA (NBR 14762) ============ -->\n<section class=\"panel\" id=\"tab-fina\">\n<div class=\"grid\">\n  <div>\n    <div class=\"card input\">\n      <h2>Perfis formados a frio<\u002Fh2>\n      <p class=\"sub\">Ligação parafusada em chapa fina — NBR 14762:2010, item 10.4.3. O coeficiente de esmagamento varia com d/t.<\u002Fp>\n      <label for=\"cf_fv\">Força de cisalhamento · F<sub>v,Sd<\u002Fsub> (kN)<\u002Flabel>\n      <input id=\"cf_fv\" type=\"number\" value=\"20\" min=\"0.1\" step=\"1\">\n      <div class=\"err\" id=\"e_cf_fv\"><\u002Fdiv>\n      <div class=\"row\">\n        <div><label for=\"cf_cls\">Classe do parafuso<\u002Flabel><select id=\"cf_cls\"><\u002Fselect><\u002Fdiv>\n        <div><label for=\"cf_d\">Diâmetro<\u002Flabel><select id=\"cf_d\"><\u002Fselect><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"row\">\n        <div><label for=\"cf_n\">Número de parafusos<\u002Flabel><input id=\"cf_n\" type=\"number\" value=\"4\" min=\"1\" step=\"1\"><div class=\"err\" id=\"e_cf_n\"><\u002Fdiv><\u002Fdiv>\n        <div><label for=\"cf_t\">Espessura da chapa · t (mm)<\u002Flabel><input id=\"cf_t\" type=\"number\" value=\"1.25\" min=\"0.4\" max=\"8\" step=\"0.05\"><div class=\"err\" id=\"e_cf_t\"><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <label for=\"cf_aco\">Aço da chapa<\u002Flabel>\n      <select id=\"cf_aco\">\n        <option value=\"230|310\" selected=\"\">ZAR 230 — f<sub>y<\u002Fsub> 230 / f<sub>u<\u002Fsub> 310<\u002Foption>\n        <option value=\"280|380\">ZAR 280 — 280 / 380<\u002Foption>\n        <option value=\"345|430\">ZAR 345 — 345 / 430<\u002Foption>\n        <option value=\"250|400\">ASTM A36 — 250 / 400<\u002Foption>\n      <\u002Fselect>\n      <div class=\"row\">\n        <div><label for=\"cf_e\">Distância furo–borda na direção da força · e (mm)<\u002Flabel><input id=\"cf_e\" type=\"number\" value=\"25\" min=\"5\" step=\"1\"><\u002Fdiv>\n        <div><label for=\"cf_larg\">Largura da chapa · b (mm)<\u002Flabel><input id=\"cf_larg\" type=\"number\" value=\"120\" min=\"20\" step=\"5\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"row\">\n        <div><label for=\"cf_nt\">Parafusos por seção transversal<\u002Flabel><input id=\"cf_nt\" type=\"number\" value=\"2\" min=\"1\" step=\"1\"><\u002Fdiv>\n        <div><label for=\"cf_nl\">Linhas na direção da força<\u002Flabel><input id=\"cf_nl\" type=\"number\" value=\"2\" min=\"1\" step=\"1\"><\u002Fdiv>\n      <\u002Fdiv>\n      <label for=\"cf_g\">Gabarito transversal entre furos · g (mm)<\u002Flabel>\n      <input id=\"cf_g\" type=\"number\" value=\"60\" min=\"10\" step=\"5\">\n      <label for=\"cf_arr\">Arruelas sob cabeça e porca<\u002Flabel>\n      <select id=\"cf_arr\">\n        <option value=\"1.00\" selected=\"\">Sim — α<sub>e<\u002Fsub> = 1,00<\u002Foption>\n        <option value=\"0.75\">Não — α<sub>e<\u002Fsub> = 0,75<\u002Foption>\n      <\u002Fselect>\n      <button class=\"go\" id=\"cf_go\">Verificar chapa fina<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div id=\"cf_out\"><div class=\"card\"><div class=\"empty\">Informe os dados e verifique.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ FUROS ESPECIAIS ============ -->\n<section class=\"panel\" id=\"tab-furos\">\n<div class=\"grid\">\n  <div>\n    <div class=\"card input\">\n      <h2>Furos alargados e alongados<\u002Fh2>\n      <p class=\"sub\">Dimensões máximas (NBR 8800 Tabela 14), restrições de uso e efeitos sobre escorregamento e pressão de contato.<\u002Fp>\n      <div class=\"row\">\n        <div><label for=\"fu_d\">Diâmetro do parafuso<\u002Flabel><select id=\"fu_d\"><\u002Fselect><\u002Fdiv>\n        <div><label for=\"fu_tipo\">Tipo de furo<\u002Flabel><select id=\"fu_tipo\">\n          <option value=\"padrao\">Padrão<\u002Foption>\n          <option value=\"alargado\" selected=\"\">Pouco alargado<\u002Foption>\n          <option value=\"curto\">Alongado curto<\u002Foption>\n          <option value=\"longo\">Alongado longo<\u002Foption>\n        <\u002Fselect><\u002Fdiv>\n      <\u002Fdiv>\n      <div id=\"fu_oribox\">\n        <label for=\"fu_ori\">Orientação do rasgo em relação à força<\u002Flabel>\n        <select id=\"fu_ori\">\n          <option value=\"perp\" selected=\"\">Perpendicular à força<\u002Foption>\n          <option value=\"par\">Paralelo à força<\u002Foption>\n        <\u002Fselect>\n      <\u002Fdiv>\n      <div class=\"row\">\n        <div><label for=\"fu_fv\">Cortante por parafuso · F<sub>v,Sd<\u002Fsub> (kN)<\u002Flabel><input id=\"fu_fv\" type=\"number\" value=\"40\" min=\"0\" step=\"5\"><\u002Fdiv>\n        <div><label for=\"fu_cls\">Classe<\u002Flabel><select id=\"fu_cls\"><\u002Fselect><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"row\">\n        <div><label for=\"fu_t\">Espessura crítica · t (mm)<\u002Flabel><input id=\"fu_t\" type=\"number\" value=\"12.5\" min=\"0.5\" step=\"0.5\"><div class=\"err\" id=\"e_fu_t\"><\u002Fdiv><\u002Fdiv>\n        <div><label for=\"fu_fu\">f<sub>u<\u002Fsub> da chapa (MPa)<\u002Flabel><select id=\"fu_fu\"><option value=\"400\" selected=\"\">A36 — 400<\u002Foption><option value=\"450\">MR250 — 450<\u002Foption><option value=\"485\">AR350 — 485<\u002Foption><option value=\"500\">A572 G50 — 500<\u002Foption><\u002Fselect><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"row\">\n        <div><label for=\"fu_e\">Distância à borda · e (mm)<\u002Flabel><input id=\"fu_e\" type=\"number\" value=\"40\" min=\"5\" step=\"5\"><\u002Fdiv>\n        <div><label for=\"fu_mu\">μ das superfícies (atrito)<\u002Flabel><select id=\"fu_mu\">\n          <option value=\"0.35\" selected=\"\">0,35 — Classe A<\u002Foption><option value=\"0.50\">0,50 — Classe B<\u002Foption><option value=\"0.30\">0,30 — galvanizada escovada<\u002Foption><\u002Fselect><\u002Fdiv>\n      <\u002Fdiv>\n      <button class=\"go\" id=\"fu_go\">Analisar furo<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div id=\"fu_out\"><div class=\"card\"><div class=\"empty\">Escolha o tipo de furo e analise.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ SENSIBILIDADE ============ -->\n<section class=\"panel\" id=\"tab-sens\">\n<div class=\"card input\" style=\"max-width:100%\">\n  <h2>Análise de sensibilidade<\u002Fh2>\n  <p class=\"sub\">Varre o diâmetro do parafuso e a espessura da chapa sobre a ligação configurada na aba “Ligação única”, mostrando onde está a folga e qual estado-limite governa em cada ponto.<\u002Fp>\n  <button class=\"ghost\" id=\"se_go\">Gerar análise da ligação atual<\u002Fbutton>\n<\u002Fdiv>\n<div id=\"se_out\"><div class=\"card\"><div class=\"empty\">Configure a ligação na aba “Ligação única” e gere a análise.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ EXCENTRICIDADE ============ -->\n<section class=\"panel\" id=\"tab-exc\">\n<div class=\"grid\">\n  <div>\n    <div class=\"card input\">\n      <h2>Grupo com esforço excêntrico<\u002Fh2>\n      <p class=\"sub\">Quando a força não passa pelo centroide do grupo, os parafusos recebem parcelas desiguais. Método elástico vetorial para cortante e distribuição linear para momento.<\u002Fp>\n      <label for=\"x_modo\">Tipo de solicitação<\u002Flabel>\n      <select id=\"x_modo\">\n        <option value=\"cort\" selected=\"\">Cortante excêntrico no plano (chapa de cisalhamento)<\u002Foption>\n        <option value=\"mom\">Momento fora do plano (chapa de topo)<\u002Foption>\n      <\u002Fselect>\n\n      <div id=\"x_cortbox\">\n        <div class=\"row\">\n          <div><label for=\"x_v\">Cortante · V<sub>Sd<\u002Fsub> (kN)<\u002Flabel><input id=\"x_v\" type=\"number\" value=\"300\" min=\"0.1\" step=\"10\"><div class=\"err\" id=\"e_x_v\"><\u002Fdiv><\u002Fdiv>\n          <div><label for=\"x_e\">Excentricidade · e (mm)<\u002Flabel><input id=\"x_e\" type=\"number\" value=\"100\" min=\"0\" step=\"5\"><div class=\"err\" id=\"e_x_e\"><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div id=\"x_mombox\" style=\"display:none\">\n        <div class=\"row\">\n          <div><label for=\"x_m\">Momento · M<sub>Sd<\u002Fsub> (kN·m)<\u002Flabel><input id=\"x_m\" type=\"number\" value=\"45\" min=\"0\" step=\"1\"><\u002Fdiv>\n          <div><label for=\"x_nx2\">Tração axial concomitante (kN)<\u002Flabel><input id=\"x_nx2\" type=\"number\" value=\"0\" min=\"0\" step=\"10\"><\u002Fdiv>\n        <\u002Fdiv>\n        <label for=\"x_dc\">Altura do centro de compressão à borda inferior (mm)<\u002Flabel>\n        <input id=\"x_dc\" type=\"number\" value=\"30\" min=\"0\" step=\"5\">\n        <div class=\"hint\">Usualmente na mesa comprimida da viga.<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"row\">\n        <div><label for=\"x_nc\">Colunas de parafusos · n<sub>c<\u002Fsub><\u002Flabel><input id=\"x_nc\" type=\"number\" value=\"2\" min=\"1\" max=\"6\" step=\"1\"><div class=\"err\" id=\"e_x_nc\"><\u002Fdiv><\u002Fdiv>\n        <div><label for=\"x_nr\">Linhas de parafusos · n<sub>r<\u002Fsub><\u002Flabel><input id=\"x_nr\" type=\"number\" value=\"3\" min=\"1\" max=\"10\" step=\"1\"><div class=\"err\" id=\"e_x_nr\"><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"row\">\n        <div><label for=\"x_sx\">Espaçamento horizontal · s<sub>x<\u002Fsub> (mm)<\u002Flabel><input id=\"x_sx\" type=\"number\" value=\"80\" min=\"10\" step=\"5\"><\u002Fdiv>\n        <div><label for=\"x_sy\">Espaçamento vertical · s<sub>y<\u002Fsub> (mm)<\u002Flabel><input id=\"x_sy\" type=\"number\" value=\"70\" min=\"10\" step=\"5\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"row\">\n        <div><label for=\"x_cls\">Classe do parafuso<\u002Flabel><select id=\"x_cls\"><\u002Fselect><\u002Fdiv>\n        <div><label for=\"x_d\">Diâmetro<\u002Flabel><select id=\"x_d\"><\u002Fselect><\u002Fdiv>\n      <\u002Fdiv>\n      <label for=\"x_pl\">Planos de corte<\u002Flabel>\n      <select id=\"x_pl\"><option value=\"1\" selected=\"\">1 — corte simples<\u002Foption><option value=\"2\">2 — corte duplo<\u002Foption><\u002Fselect>\n      <label for=\"x_rosca\">Posição do plano de corte<\u002Flabel>\n      <select id=\"x_rosca\"><option value=\"0.4\" selected=\"\">Rosca no plano<\u002Foption><option value=\"0.5\">Parte lisa no plano<\u002Foption><\u002Fselect>\n      <button class=\"go\" id=\"x_go\">Calcular distribuição<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div id=\"x_out\"><div class=\"card\"><div class=\"empty\">Informe o grupo e calcule.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ CAPACIDADE (VERIFICAÇÃO INVERSA) ============ -->\n<section class=\"panel\" id=\"tab-cap\">\n<div class=\"grid\">\n  <div>\n    <div class=\"card input\">\n      <h2>Capacidade da ligação existente<\u002Fh2>\n      <p class=\"sub\">Modo inverso: dada a ligação projetada ou executada, retorna o esforço máximo admissível e o modo que governa. Útil na conferência de projeto de terceiro.<\u002Fp>\n      <div class=\"row\">\n        <div><label for=\"p_cls\">Classe do parafuso<\u002Flabel><select id=\"p_cls\"><\u002Fselect><\u002Fdiv>\n        <div><label for=\"p_d\">Diâmetro<\u002Flabel><select id=\"p_d\"><\u002Fselect><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"row\">\n        <div><label for=\"p_n\">Número de parafusos<\u002Flabel><input id=\"p_n\" type=\"number\" value=\"6\" min=\"1\" step=\"1\"><div class=\"err\" id=\"e_p_n\"><\u002Fdiv><\u002Fdiv>\n        <div><label for=\"p_pl\">Planos de corte<\u002Flabel><select id=\"p_pl\"><option value=\"1\">1<\u002Foption><option value=\"2\" selected=\"\">2<\u002Foption><\u002Fselect><\u002Fdiv>\n      <\u002Fdiv>\n      <label for=\"p_rosca\">Posição do plano de corte<\u002Flabel>\n      <select id=\"p_rosca\"><option value=\"0.4\" selected=\"\">Rosca no plano<\u002Foption><option value=\"0.5\">Parte lisa no plano<\u002Foption><\u002Fselect>\n      <div class=\"row\">\n        <div><label for=\"p_t\">Espessura crítica · t (mm)<\u002Flabel><input id=\"p_t\" type=\"number\" value=\"12.5\" min=\"0.5\" step=\"0.5\"><div class=\"err\" id=\"e_p_t\"><\u002Fdiv><\u002Fdiv>\n        <div><label for=\"p_aco\">Aço da chapa<\u002Flabel><select id=\"p_aco\">\n          <option value=\"250|400\" selected=\"\">ASTM A36 — 250 / 400<\u002Foption>\n          <option value=\"250|450\">MR250 — 250 / 450<\u002Foption>\n          <option value=\"345|485\">AR350 — 345 / 485<\u002Foption>\n          <option value=\"345|500\">A572 G50 — 345 / 500<\u002Foption>\n        <\u002Fselect><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"row\">\n        <div><label for=\"p_larg\">Largura da chapa · b (mm)<\u002Flabel><input id=\"p_larg\" type=\"number\" value=\"150\" min=\"10\" step=\"5\"><\u002Fdiv>\n        <div><label for=\"p_nl\">Furos por linha transversal<\u002Flabel><input id=\"p_nl\" type=\"number\" value=\"2\" min=\"1\" step=\"1\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"row\">\n        <div><label for=\"p_e\">Distância à borda · e (mm)<\u002Flabel><input id=\"p_e\" type=\"number\" value=\"35\" min=\"1\" step=\"5\"><\u002Fdiv>\n        <div><label for=\"p_p\">Espaçamento · p (mm)<\u002Flabel><input id=\"p_p\" type=\"number\" value=\"60\" min=\"1\" step=\"5\"><\u002Fdiv>\n      <\u002Fdiv>\n      <label for=\"p_eg\">Distância à borda transversal · e<sub>g<\u002Fsub> (mm)<\u002Flabel>\n      <input id=\"p_eg\" type=\"number\" value=\"40\" min=\"1\" step=\"5\">\n      <label for=\"p_lig\">Comprimento da ligação na direção da força · L (mm)<\u002Flabel>\n      <input id=\"p_lig\" type=\"number\" value=\"60\" min=\"0\" step=\"5\">\n      <div class=\"hint\">Acima de 5·d aplica-se redutor de ligação longa.<\u002Fdiv>\n      <button class=\"go\" id=\"p_go\">Determinar capacidade<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div id=\"p_out\"><div class=\"card\"><div class=\"empty\">Informe a ligação e determine a capacidade.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ LIGAÇÃO ÚNICA ============ -->\n<section class=\"panel\" id=\"tab-uni\">\n<div class=\"grid\">\n  <div>\n    <div class=\"card input\">\n      <h2>Verificação integrada<\u002Fh2>\n      <p class=\"sub\">Define uma ligação única e verifica todos os estados-limite com o mesmo parafuso e a mesma chapa, eliminando divergências entre abas.<\u002Fp>\n      <label for=\"u_nome\">Identificação da ligação<\u002Flabel>\n      <input id=\"u_nome\" type=\"text\" value=\"Ligação viga-pilar eixo 3\" style=\"font-family:var(--sans)\">\n      <div class=\"row\">\n        <div><label for=\"u_ft\">F<sub>t,Sd<\u002Fsub> — tração (kN)<\u002Flabel><input id=\"u_ft\" type=\"number\" value=\"120\" min=\"0\" step=\"10\"><\u002Fdiv>\n        <div><label for=\"u_fv\">F<sub>v,Sd<\u002Fsub> — cortante (kN)<\u002Flabel><input id=\"u_fv\" type=\"number\" value=\"250\" min=\"0\" step=\"10\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"row\">\n        <div><label for=\"u_cls\">Classe do parafuso<\u002Flabel><select id=\"u_cls\"><\u002Fselect><\u002Fdiv>\n        <div><label for=\"u_d\">Diâmetro<\u002Flabel><select id=\"u_d\"><\u002Fselect><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"row\">\n        <div><label for=\"u_nc\">Colunas · n<sub>c<\u002Fsub><\u002Flabel><input id=\"u_nc\" type=\"number\" value=\"2\" min=\"1\" max=\"6\" step=\"1\"><div class=\"err\" id=\"e_u_nc\"><\u002Fdiv><\u002Fdiv>\n        <div><label for=\"u_nr\">Linhas · n<sub>r<\u002Fsub><\u002Flabel><input id=\"u_nr\" type=\"number\" value=\"3\" min=\"1\" max=\"10\" step=\"1\"><div class=\"err\" id=\"e_u_nr\"><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"row\">\n        <div><label for=\"u_pl\">Planos de corte<\u002Flabel><select id=\"u_pl\"><option value=\"1\">1<\u002Foption><option value=\"2\" selected=\"\">2<\u002Foption><\u002Fselect><\u002Fdiv>\n        <div><label for=\"u_rosca\">Plano de corte<\u002Flabel><select id=\"u_rosca\"><option value=\"0.4\" selected=\"\">Rosca no plano<\u002Foption><option value=\"0.5\">Parte lisa<\u002Foption><\u002Fselect><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"row\">\n        <div><label for=\"u_t\">Espessura da chapa · t (mm)<\u002Flabel><input id=\"u_t\" type=\"number\" value=\"12.5\" min=\"0.5\" step=\"0.5\"><div class=\"err\" id=\"e_u_t\"><\u002Fdiv><\u002Fdiv>\n        <div><label for=\"u_larg\">Largura da chapa · b (mm)<\u002Flabel><input id=\"u_larg\" type=\"number\" value=\"200\" min=\"10\" step=\"5\"><\u002Fdiv>\n      <\u002Fdiv>\n      <label for=\"u_aco\">Aço da chapa<\u002Flabel>\n      <select id=\"u_aco\">\n        <option value=\"250|400\" selected=\"\">ASTM A36 — 250 / 400<\u002Foption>\n        <option value=\"250|450\">MR250 — 250 / 450<\u002Foption>\n        <option value=\"345|485\">AR350 — 345 / 485<\u002Foption>\n        <option value=\"345|500\">A572 G50 — 345 / 500<\u002Foption>\n      <\u002Fselect>\n      <div class=\"row\">\n        <div><label for=\"u_sx\">Espaçamento s<sub>x<\u002Fsub> (mm)<\u002Flabel><input id=\"u_sx\" type=\"number\" value=\"80\" min=\"10\" step=\"5\"><\u002Fdiv>\n        <div><label for=\"u_sy\">Espaçamento s<sub>y<\u002Fsub> (mm)<\u002Flabel><input id=\"u_sy\" type=\"number\" value=\"70\" min=\"10\" step=\"5\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"row\">\n        <div><label for=\"u_e\">Borda longitudinal · e (mm)<\u002Flabel><input id=\"u_e\" type=\"number\" value=\"40\" min=\"5\" step=\"5\"><\u002Fdiv>\n        <div><label for=\"u_eg\">Borda transversal · e<sub>g<\u002Fsub> (mm)<\u002Flabel><input id=\"u_eg\" type=\"number\" value=\"40\" min=\"5\" step=\"5\"><\u002Fdiv>\n      <\u002Fdiv>\n      <label for=\"u_exc\">Excentricidade do cortante · e<sub>v<\u002Fsub> (mm)<\u002Flabel>\n      <input id=\"u_exc\" type=\"number\" value=\"0\" min=\"0\" step=\"5\">\n      <div class=\"hint\">Zero para força centrada no centroide do grupo.<\u002Fdiv>\n      <button class=\"go\" id=\"u_go\">Verificar ligação completa<\u002Fbutton>\n    <\u002Fdiv>\n\n    <div class=\"card input\">\n      <h2>Biblioteca de ligações<\u002Fh2>\n      <p class=\"sub\">Guarda configurações nomeadas no navegador. Exporte para transferir entre máquinas ou anexar ao processo.<\u002Fp>\n      <div style=\"display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px\">\n        <button class=\"ghost\" id=\"u_salvar\">Salvar esta ligação<\u002Fbutton>\n        <button class=\"ghost\" id=\"u_exportar\">Exportar tudo<\u002Fbutton>\n        <button class=\"ghost\" id=\"u_importar\">Importar<\u002Fbutton>\n      <\u002Fdiv>\n      <input type=\"file\" id=\"u_arquivo\" accept=\".json,application/json\" style=\"display:none\">\n      <div id=\"u_bib\"><\u002Fdiv>\n      <div class=\"err\" id=\"e_u_bib\" style=\"min-height:0\"><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div id=\"u_out\"><div class=\"card\"><div class=\"empty\">Defina a ligação e verifique.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============ RELATÓRIO CONSOLIDADO ============ -->\n<section class=\"panel\" id=\"tab-rel\">\n<div class=\"card input\" style=\"max-width:100%\">\n  <h2>Relatório de conferência<\u002Fh2>\n  <p class=\"sub\">Reúne as ligações da biblioteca num documento único, com quadro comparativo de aproveitamentos. Use a impressão do navegador para gerar PDF.<\u002Fp>\n  <div class=\"row\" style=\"max-width:640px\">\n    <div><label for=\"r_obra\">Obra ou empreendimento<\u002Flabel><input id=\"r_obra\" type=\"text\" value=\"\" placeholder=\"Ex.: Galpão industrial — Bloco A\" style=\"font-family:var(--sans)\"><\u002Fdiv>\n    <div><label for=\"r_resp\">Responsável pela conferência<\u002Flabel><input id=\"r_resp\" type=\"text\" value=\"\" placeholder=\"Nome e registro profissional\" style=\"font-family:var(--sans)\"><\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"row\" style=\"max-width:640px\">\n    <div><label for=\"r_doc\">Documento de referência<\u002Flabel><input id=\"r_doc\" type=\"text\" value=\"\" placeholder=\"Projeto, processo ou contrato\" style=\"font-family:var(--sans)\"><\u002Fdiv>\n    <div><label for=\"r_detalhe\">Nível de detalhamento<\u002Flabel><select id=\"r_detalhe\">\n      <option value=\"resumo\" selected=\"\">Resumo — quadro comparativo<\u002Foption>\n      <option value=\"completo\">Completo — quadro e verificações por ligação<\u002Foption>\n    <\u002Fselect><\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"display:flex;gap:8px;flex-wrap:wrap;margin-top:16px\">\n    <button class=\"ghost\" id=\"r_gerar\">Gerar relatório<\u002Fbutton>\n    <button class=\"ghost\" id=\"r_imprimir\">Imprimir ou salvar em PDF<\u002Fbutton>\n  <\u002Fdiv>\n<\u002Fdiv>\n<div id=\"r_out\"><div class=\"card\"><div class=\"empty\">Salve ligações na aba “Ligação única” e gere o relatório.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n<\u002Fsection>\n\n<\u002Fmain>\n\n<footer>\n  <b>Base normativa.<\u002Fb> ABNT NBR 8800:2008 (itens 6.2.1, 6.2.2, 6.3.3, 6.3.10–6.3.12, 6.5.6, Tabelas 9, 12 e 13) · ABNT NBR 14762:2010 · ABNT NBR ISO 898-1 · ACI 318-19 Capítulo 17 (método CCD).<br>\n  γ<sub>a1<\u002Fsub> = 1,10 para escoamento e γ<sub>a2<\u002Fsub> = 1,35 para ruptura (NBR 8800 Tabela 3, combinações normais). A ancoragem trata chumbador isolado ou grupo retangular sem armadura suplementar — efeito de alavanca na chapa-base, armadura de suspensão e chumbadores em grupo irregular exigem verificação complementar. Os valores de τ<sub>cr<\u002Fsub> e N<sub>p<\u002Fsub> são referenciais: adote os do ETA do fabricante. Ferramenta de apoio: não substitui a responsabilidade técnica do projetista.\n<\u002Ffooter>\n\n<script>\n\"use strict\";\n\n/* ---------- Base de dados ---------- */\n// Ab = área bruta (mm²); Ae = área efetiva resistente da rosca ISO passo grosso (mm²)\nconst PARAF = [\n  {d:8,  Ab:50.27,  Ae:36.6,  ch:13},\n  {d:10, Ab:78.54,  Ae:58.0,  ch:17},\n  {d:12, Ab:113.10, Ae:84.3,  ch:19},\n  {d:16, Ab:201.06, Ae:157.0, ch:24},\n  {d:20, Ab:314.16, Ae:245.0, ch:30},\n  {d:22, Ab:380.13, Ae:303.0, ch:32},\n  {d:24, Ab:452.39, Ae:353.0, ch:36},\n  {d:27, Ab:572.56, Ae:459.0, ch:41},\n  {d:30, Ab:706.86, Ae:561.0, ch:46},\n  {d:36, Ab:1017.88,Ae:817.0, ch:55}\n];\nconst CLASSES = [\n  {id:\"4.6\",   nome:\"ISO 898-1 classe 4.6\",  fyb:240,  fub:400},\n  {id:\"5.8\",   nome:\"ISO 898-1 classe 5.8\",  fyb:400,  fub:520},\n  {id:\"8.8\",   nome:\"ISO 898-1 classe 8.8\",  fyb:640,  fub:800},\n  {id:\"10.9\",  nome:\"ISO 898-1 classe 10.9\", fyb:900,  fub:1000},\n  {id:\"A307\",  nome:\"ASTM A307 (comum)\",     fyb:null, fub:415},\n  {id:\"A325\",  nome:\"ASTM A325 (alta res.)\", fyb:635,  fub:825},\n  {id:\"A490\",  nome:\"ASTM A490 (alta res.)\", fyb:895,  fub:1035}\n];\nconst GA2 = 1.35;   // ELU ruptura, combinações normais\nconst GA1 = 1.10;   // ELU escoamento\nconst cls = id => CLASSES.find(c=>c.id===id);\nconst par = d  => PARAF.find(p=>p.d===+d);\n// furo-padrão NBR 8800: d+1,5mm até M22; d+2mm acima\nconst dFuro = d => (+d <= 22 ? +d + 1.5 : +d + 2);\n\n/* ---------- Utilidades ---------- */\nconst $ = id => document.getElementById(id);\nconst f = (v,n=1) => Number(v).toLocaleString(\"pt-BR\",{minimumFractionDigits:n,maximumFractionDigits:n});\nconst grau = r => r <= 0.85 ? \"ok\" : (r <= 1.0 ? \"warn\" : \"fail\");\n\nfunction bar(rotulo, ratio){\n  const g = grau(ratio), pct = Math.min(ratio*100,100);\n  return `<div class=\"bar\"><div class=\"lbl\"><span>${rotulo}<\u002Fspan><span>${f(ratio*100,1)}%<\u002Fspan><\u002Fdiv>\n    <div class=\"track\"><div class=\"fill ${g}\" style=\"width:${pct}%\"><\u002Fdiv><\u002Fdiv><\u002Fdiv>`;\n}\nfunction veredito(ratio, textoOk, textoFail, detalhe){\n  const g = grau(ratio);\n  const t = g===\"fail\" ? textoFail : (g===\"warn\" ? \"Atende, com aproveitamento acima de 85%\" : textoOk);\n  return `<div class=\"verdict ${g}\"><b>${t}<\u002Fb><small>${detalhe}<\u002Fsmall><\u002Fdiv>`;\n}\nfunction preencher(sel, tipo){\n  const el = $(sel);\n  el.innerHTML = tipo===\"cls\"\n    ? CLASSES.map(c=>`<option value=\"${c.id}\"${c.id===\"8.8\"?\" selected\":\"\"}>${c.nome}<\u002Foption>`).join(\"\")\n    : PARAF.map(p=>`<option value=\"${p.d}\"${p.d===20?\" selected\":\"\"}>M${p.d}<\u002Foption>`).join(\"\");\n}\nfunction num(id, {min=null, max=null, inteiro=false, nome=\"\"}={}){\n  const el = $(id), erro = $(\"e_\"+id);\n  const v = parseFloat(el.value);\n  let msg = \"\";\n  if (!isFinite(v)) msg = \"Informe um valor numérico.\";\n  else if (min!==null && v < min) msg = `Valor mínimo: ${min}.`;\n  else if (max!==null && v > max) msg = `Valor máximo: ${max}.`;\n  else if (inteiro && !Number.isInteger(v)) msg = \"Informe um número inteiro.\";\n  el.setAttribute(\"aria-invalid\", msg ? \"true\":\"false\");\n  if (erro) erro.textContent = msg;\n  if (msg) throw new Error(nome ? `${nome}: ${msg}` : msg);\n  return v;\n}\n\n/* ---------- Núcleo de cálculo (NBR 8800:2008) ---------- */\n// 6.3.3.2 — tração: Ft,Rd = 0,75·Ab·fub / γa2\nconst FtRd = (Ab, fub) => 0.75*Ab*fub/GA2/1000;\n// 6.3.3.3-a — corte: Fv,Rd = coef·Ab·fub / γa2   (0,40 rosca no plano; 0,50 parte lisa)\nconst FvRd = (Ab, fub, coef) => coef*Ab*fub/GA2/1000;\n// 6.3.3.3-b — pressão de contato: Fc,Rd = α·lf·t·fu/γa2 ≤ β·d·t·fu/γa2\nfunction FcRd(lf, d, t, fu, defoLimitada){\n  const a = defoLimitada ? 1.2 : 1.5;\n  const b = defoLimitada ? 2.4 : 3.0;\n  const rasgo = a*lf*t*fu/GA2/1000;\n  const esmag = b*d*t*fu/GA2/1000;\n  return {rasgo, esmag, valor: Math.min(rasgo, esmag), governa: rasgo < esmag ? \"rasgamento\" : \"esmagamento\"};\n}\n\n/* ---------- Metal-base — NBR 8800:2008 ---------- */\n// 6.2.1 — escoamento da seção bruta: Nt,Rd = Ag·fy/γa1\nconst NtEscoa = (Ag, fy) => Ag*fy/GA1/1000;\n// 6.2.2 — ruptura da seção líquida: Nt,Rd = Ct·An·fu/γa2\nconst NtRuptura = (An, fu, Ct) => Ct*An*fu/GA2/1000;\n// 6.5.6 — rasgamento em bloco (block shear)\n// Rn = 0,60·fu·Anv + Cts·fu·Ant ≤ 0,60·fy·Agv + Cts·fu·Ant\nfunction blockShear(Agv, Anv, Ant, fy, fu, Cts){\n  const rupturaCis  = 0.60*fu*Anv + Cts*fu*Ant;\n  const escoamCis   = 0.60*fy*Agv + Cts*fu*Ant;\n  const governa = rupturaCis <= escoamCis ? \"ruptura ao cisalhamento\" : \"escoamento ao cisalhamento\";\n  return {rupturaCis: rupturaCis/GA2/1000, escoamCis: escoamCis/GA2/1000,\n          valor: Math.min(rupturaCis, escoamCis)/GA2/1000, governa};\n}\n// 6.3.3.3 — redutor de ligação longa: L > 5d reduz linearmente até 0,75 em L = 65d\nfunction redutorLongo(L, d){\n  if (L <= 5*d) return 1.0;\n  return Math.max(1 - 0.25*(L - 5*d)/(60*d), 0.75);\n}\n// ACI 318-19 17.6.2.1 — área projetada do cone para grupo retangular\nfunction ANcGrupo(nx, ny, sx, sy, hef, ca1, ca2){\n  const L1 = Math.min(ca1, 1.5*hef) + (nx-1)*sx + 1.5*hef;\n  const L2 = Math.min(ca2, 1.5*hef) + (ny-1)*sy + 1.5*hef;\n  return L1*L2;\n}\n\n/* ---------- Fadiga — NBR 8800 Anexo K / AISC 360 Ap. 3 ---------- */\n// Constantes Cf e limiares F_TH por categoria de detalhe (curvas S-N idênticas)\nconst FAD_CAT = {\n  A:  {Cf:250e8, TH:165, nome:\"A\"},\n  B:  {Cf:120e8, TH:110, nome:\"B\"},\n  B1: {Cf:61e8,  TH:83,  nome:\"B'\"},\n  C:  {Cf:44e8,  TH:69,  nome:\"C\"},\n  D:  {Cf:22e8,  TH:48,  nome:\"D\"},\n  E:  {Cf:11e8,  TH:31,  nome:\"E\"},\n  E1: {Cf:3.9e8, TH:18,  nome:\"E'\"},\n  PAR:{Cf:3.9e8, TH:48,  nome:\"parafuso tracionado\"}\n};\n// Faixa admissível de variação de tensão (MPa) para N ciclos\nfunction fadFSR(cat, N){\n  const c = FAD_CAT[cat];\n  return Math.max(Math.pow(c.Cf*329/N, 1/3), c.TH);\n}\n// Vida admissível (ciclos) para uma faixa de tensão; Infinity abaixo do limiar\nfunction fadVida(cat, sigmaSR){\n  const c = FAD_CAT[cat];\n  return sigmaSR <= c.TH ? Infinity : c.Cf*329/Math.pow(sigmaSR, 3);\n}\n\n/* ---------- Aperto — porca ISO 4032, arruela ISO 7089, rosca DIN 931 ---------- */\n// m = altura da porca; h = espessura da arruela; P = passo grosso ISO 261\n
