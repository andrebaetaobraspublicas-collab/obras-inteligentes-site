const APERTO_DIM = {\n  8:{m:6.8,h:1.6,P:1.25}, 10:{m:8.4,h:2.0,P:1.5}, 12:{m:10.8,h:2.5,P:1.75},\n  16:{m:14.8,h:3.0,P:2.0}, 20:{m:18.0,h:3.0,P:2.5}, 22:{m:19.4,h:3.0,P:2.5},\n  24:{m:21.5,h:4.0,P:3.0}, 27:{m:23.8,h:4.0,P:3.0}, 30:{m:25.6,h:4.0,P:3.5},\n  36:{m:31.0,h:5.0,P:4.0}\n};\n// Comprimento de rosca b em parafuso de rosca parcial (DIN 931)\nfunction roscaParcialB(d, L){\n  return L <= 125 ? 2*d+6 : (L <= 200 ? 2*d+12 : 2*d+25);\n}\n// Comprimentos comerciais usuais: passo 5 até 80, passo 10 até 300\nconst COMPRIMENTOS_COMERCIAIS = (()=>{\n  const v=[]; for(let L=20;L<=80;L+=5)v.push(L); for(let L=90;L<=300;L+=10)v.push(L); return v;\n})();\n// Resolve o comprimento comercial para um pacote de chapas.\n// chapas: array de espessuras na ordem de montagem (cabeça → porca)\nfunction resolverAperto(d, chapas, nArr, sobras){\n  const dim = APERTO_DIM[d];\n  if(!dim || !chapas.length || chapas.some(t=>!isFinite(t)||t<=0)) return null;\n  const pacote = chapas.reduce((s,t)=>s+t, 0);\n  const grip = pacote + nArr*dim.h;\n  const Lmin = grip + dim.m + sobras*dim.P;\n  const L = COMPRIMENTOS_COMERCIAIS.find(x=>x>=Lmin) || null;\n  if(!L) return {dim, pacote, grip, Lmin, L:null};\n  const b = roscaParcialB(d, L);\n  const liso = Math.max(L - b, 0);\n  // posições dos planos de corte medidas a partir da face da cabeça:\n  // arruela sob a cabeça (se houver 2 arruelas) desloca o pacote\n  const arrCabeca = nArr === 2 ? dim.h : 0;\n  let acum = arrCabeca;\n  const planos = [];\n  for(let i=0;i<chapas.length-1;i++){ acum += chapas[i]; planos.push(acum); }\n  // rosca começa em (L - b) a partir da cabeça\n  const inicioRosca = liso;\n  const planosNaRosca = planos.filter(z=>z > inicioRosca);\n  return {dim, pacote, grip, Lmin, L, b, liso, inicioRosca, planos, planosNaRosca,\n          roscaNoAperto: inicioRosca < grip};\n}\n// Tenta um comprimento maior que deixe todos os planos de corte no fuste liso\nfunction apertoComFusteLiso(d, chapas, nArr, sobras){\n  const base = resolverAperto(d, chapas, nArr, sobras);\n  if(!base || !base.L) return null;\n  if(!base.planosNaRosca.length) return base;   // já atende\n  for(const L of COMPRIMENTOS_COMERCIAIS){\n    if(L < base.L) continue;\n    const b = roscaParcialB(d, L);\n    const liso = L - b;\n    const ultimoPlano = base.planos.length ? Math.max(...base.planos) : 0;\n    // rosca deve engajar a porca: rosca disponível além do aperto ≥ porca + sobras\n    const roscaUtil = L - Math.max(liso, base.grip);\n    if(liso >= ultimoPlano && roscaUtil >= base.dim.m + sobras*base.dim.P){\n      return {...base, L, b, liso, inicioRosca:liso,\n              planosNaRosca: base.planos.filter(z=>z>liso), roscaNoAperto: liso < base.grip};\n    }\n  }\n  return null;  // nenhum comercial resolve\n}\n\n/* ---------- Chapa fina — NBR 14762:2010 item 10.4.3 ---------- */\n// Coeficiente de esmagamento em função de d/t\nfunction cfC(d, t){\n  const r = d/t;\n  return r < 10 ? 3.0 : (r <= 22 ? 4 - 0.1*r : 1.8);\n}\n// Esmagamento: Fc,Rd = αe·C·d·t·fu/γ  (γ = 1,35)\nconst cfEsmag = (d, t, fu, alfaE) => alfaE*cfC(d,t)*d*t*fu/GA2/1000;\n// Rasgamento entre furo e borda: Fc,Rd = t·e·fu/γ\nconst cfRasgo = (t, e, fu) => t*e*fu/GA2/1000;\n// Coeficiente Ct de chapa plana parafusada: 1 − 0,9r + 3r·d/g ≤ 1\nfunction cfCt(r, d, g){\n  return Math.min(1 - 0.9*r + 3*r*d/g, 1.0);\n}\n\n/* ---------- Furos especiais — NBR 8800 Tabela 14 ---------- */\n// Dimensões máximas por tipo (largura × comprimento, mm)\nfunction furoDim(d, tipo){\n  const padrao = dFuro(d);\n  const alarg  = d<=22 ? d+4 : (d<=24 ? d+6 : d+8);\n  const curtoL = d<=22 ? d+6 : (d<=24 ? d+8 : d+10);\n  switch(tipo){\n    case \"padrao\":   return {larg:padrao, comp:padrao, nome:\"padrão\"};\n    case \"alargado\": return {larg:alarg,  comp:alarg,  nome:\"pouco alargado\"};\n    case \"curto\":    return {larg:padrao, comp:curtoL, nome:\"alongado curto\"};\n    case \"longo\":    return {larg:padrao, comp:2.5*d,  nome:\"alongado longo\"};\n  }\n  return null;\n}\n// Fator de furo hf para resistência ao escorregamento\nfunction furoHf(tipo){\n  return tipo===\"padrao\" ? 1.00 : (tipo===\"longo\" ? 0.70 : 0.85);\n}\n// Coeficientes de pressão de contato: rasgo alongado perpendicular usa 1,0/2,0\nfunction furoCoefContato(tipo, ori){\n  if((tipo===\"curto\"||tipo===\"longo\") && ori===\"perp\") return {a:1.0, b:2.0};\n  return {a:1.2, b:2.4};   // deformação limitada, demais casos\n}\n// Restrições normativas de uso por tipo\nfunction furoRestricoes(tipo, ori){\n  const r = [];\n  if(tipo===\"alargado\"){\n    r.push(\"Permitido apenas em ligações por atrito (protendidas) — vedado em ligações por contato.\");\n    r.push(\"Arruela endurecida cobrindo o furo, sob cabeça e porca.\");\n  }\n  if(tipo===\"curto\"){\n    r.push(\"Em ligação por contato, o rasgo deve ser perpendicular à direção da força.\");\n    r.push(\"Arruela cobrindo integralmente o rasgo.\");\n  }\n  if(tipo===\"longo\"){\n    r.push(\"Admitido em apenas uma das partes ligadas por plano de contato.\");\n    r.push(\"Em ligação por contato, somente perpendicular à força; por atrito, qualquer direção com h<sub>f<\u002Fsub> = 0,70.\");\n    r.push(\"Chapa-arruela contínua com espessura mínima de 8 mm cobrindo o rasgo.\");\n  }\n  if((tipo===\"curto\"||tipo===\"longo\") && ori===\"par\")\n    r.push(\"Rasgo paralelo à força: admissível somente em ligação por atrito; a folga permite deslizamento da ordem do comprimento do rasgo.\");\n  return r;\n}\n\n/* ---------- Efeito alavanca — AISC Manual Parte 9 ---------- */\n// Retorna o fator de amplificação da tração no parafuso em função da geometria.\n// t ≥ tc → chapa rígida, sem alavanca. t < tc → alavanca proporcional à flexibilidade.\nfunction prying(b, a, df, ptrib, t, fu, T){\n  const bp = b - df/2;                       // braço efetivo até a alma\n  const ap = Math.min(a, 1.25*b) + df/2;     // braço efetivo até a borda (limite 1,25b)\n  const rho = bp/ap;\n  const delta = 1 - df/ptrib;                // razão de área líquida da chapa\n  const tc = Math.sqrt(4.44*T*bp/(ptrib*fu));// espessura que anula a alavanca\n  let alpha, fator;\n  if (t >= tc){ alpha = 0; fator = 1; }\n  else {\n    alpha = Math.min((Math.pow(tc/t,2) - 1)/(delta*(1+rho)), 1);\n    fator = 1 + delta*alpha*rho;\n  }\n  return {bp, ap, rho, delta, tc, alpha, fator};\n}\n\n/* ---------- Grupo excêntrico ---------- */\n// Gera coordenadas de um grupo retangular centrado na origem.\nfunction gerarGrupo(nc, nr, sx, sy){\n  const pts = [];\n  for(let i=0;i<nc;i++) for(let j=0;j<nr;j++)\n    pts.push({x:(i-(nc-1)/2)*sx, y:(j-(nr-1)/2)*sy});\n  return pts;\n}\n// Método elástico vetorial: cortante V com excentricidade e no plano do grupo.\nfunction elasticoVetorial(pts, V, exc){\n  const n = pts.length;\n  const Ip = pts.reduce((s,p)=>s+p.x*p.x+p.y*p.y, 0);   // momento polar unitário\n  const M = V*exc;\n  const media = V/n;\n  const res = pts.map(p=>{\n    const fx = Ip>0 ? -M*p.y/Ip : 0;\n    const fy = media + (Ip>0 ? M*p.x/Ip : 0);\n    return {x:p.x, y:p.y, fx, fy, r:Math.hypot(fx,fy)};\n  });\n  const max = Math.max(...res.map(o=>o.r));\n  return {Ip, M, media, res, max, fator: media>0 ? max/media : 1};\n}\n// Momento fora do plano: distribuição linear de tração a partir do centro de compressão.\nfunction distribuicaoMomento(pts, M, N, dc){\n  const ys = [...new Set(pts.map(p=>+p.y.toFixed(3)))].sort((a,b)=>a-b);\n  const yBase = Math.min(...ys) - dc;                  // centro de compressão\n  const linhas = ys.map(y=>({y, d:y-yBase, n:pts.filter(p=>Math.abs(p.y-y)<1e-6).length}));\n  const somaNd2 = linhas.reduce((s,l)=>s+l.n*l.d*l.d, 0);\n  const nTot = pts.length;\n  return linhas.map(l=>{\n    const porMomento = somaNd2>0 ? M*1000*l.d/somaNd2 : 0;  // kN·m → kN·mm\n    const porAxial = N/nTot;\n    return {...l, T: porMomento + porAxial};\n  }).sort((a,b)=>b.d-a.d);\n}\n\n/* ---------- TRAÇÃO ---------- */\nfunction calcTracao(){\n  try{\n    const Ft = num(\"t_ft\",{min:0.1,nome:\"Ft,Sd\"});\n    const n  = num(\"t_n\",{min:1,inteiro:true,nome:\"Número de parafusos\"});\n    const c  = cls($(\"t_cls\").value), p = par($(\"t_d\").value);\n    const modoAlav = $(\"t_alav\").value;\n\n    const Rd = FtRd(p.Ab, c.fub);\n    let al, pry = null;\n    if (modoAlav === \"calc\"){\n      const tc  = num(\"t_tc\",{min:1,nome:\"Espessura da chapa\"});\n      const bb  = num(\"t_b\",{min:5,nome:\"Distância b\"});\n      const aa  = num(\"t_a\",{min:5,nome:\"Distância a\"});\n      const ptr = +$(\"t_ptrib\").value;\n      const fuc = +$(\"t_fuc\").value;\n      pry = prying(bb, aa, dFuro(p.d), ptr, tc, fuc, Ft/n*1000);\n      al = pry.fator;\n    } else {\n      al = parseFloat(modoAlav);\n    }\n\n    const FtSd = Ft*al/n;                 // por parafuso, majorado pela alavanca\n    const r    = FtSd/Rd;\n    const nMin = Math.ceil(Ft*al/Rd);\n\n    $(\"t_out\").innerHTML =\n      veredito(r,\n        \"Ligação verificada à tração\",\n        \"Ligação insuficiente à tração\",\n        `F<sub>t,Sd<\u002Fsub>/parafuso = ${f(FtSd)} kN · F<sub>t,Rd<\u002Fsub> = ${f(Rd)} kN · aproveitamento ${f(r*100)}%`) +\n      `<div class=\"card\">\n        <h2>Resultado por parafuso<\u002Fh2>\n        <table>\n          <tr><th>Grandeza<\u002Fth><th>Valor<\u002Fth><\u002Ftr>\n          <tr><td>Parafuso adotado<\u002Ftd><td class=\"n\">M${p.d} · ${c.nome}<\u002Ftd><\u002Ftr>\n          <tr><td>Área bruta A<sub>b<\u002Fsub><\u002Ftd><td class=\"n\">${f(p.Ab,2)} mm²<\u002Ftd><\u002Ftr>\n          <tr><td>f<sub>ub<\u002Fsub><\u002Ftd><td class=\"n\">${c.fub} MPa<\u002Ftd><\u002Ftr>\n          <tr><td>Solicitação com alavanca (×${f(al,3)})<\u002Ftd><td class=\"n\">${f(Ft*al)} kN<\u002Ftd><\u002Ftr>\n          <tr><td>F<sub>t,Sd<\u002Fsub> por parafuso<\u002Ftd><td class=\"n\">${f(FtSd)} kN<\u002Ftd><\u002Ftr>\n          <tr class=\"hl\"><td>F<sub>t,Rd<\u002Fsub> por parafuso<\u002Ftd><td class=\"n\">${f(Rd)} kN<\u002Ftd><\u002Ftr>\n          <tr><td>Resistência total (n = ${n})<\u002Ftd><td class=\"n\">${f(Rd*n)} kN<\u002Ftd><\u002Ftr>\n          <tr><td>Número mínimo de parafusos<\u002Ftd><td class=\"n\">${nMin}<\u002Ftd><\u002Ftr>\n        <\u002Ftable>\n        <div class=\"bars\">${bar(\"Aproveitamento à tração\", r)}<\u002Fdiv>\n        ${pry ? `<h2 style=\"margin-top:18px\">Efeito alavanca calculado<\u002Fh2>\n        <p class=\"sub\">${pry.alpha===0\n          ? `Chapa rígida: t = ${f($(\"t_tc\").value,1)} mm ≥ t<sub>c<\u002Fsub> = ${f(pry.tc,1)} mm. Não há alavanca.`\n          : `Chapa flexível: t = ${f($(\"t_tc\").value,1)} mm < t<sub>c<\u002Fsub> = ${f(pry.tc,1)} mm. A tração no parafuso é amplificada em ${f((pry.fator-1)*100)}%.`}<\u002Fp>\n        <table>\n          <tr><th>Parâmetro<\u002Fth><th>Valor<\u002Fth><\u002Ftr>\n          <tr><td>b' = b − d<sub>f<\u002Fsub>/2<\u002Ftd><td class=\"n\">${f(pry.bp,1)} mm<\u002Ftd><\u002Ftr>\n          <tr><td>a' = min(a; 1,25b) + d<sub>f<\u002Fsub>/2<\u002Ftd><td class=\"n\">${f(pry.ap,1)} mm<\u002Ftd><\u002Ftr>\n          <tr><td>ρ = b'/a'<\u002Ftd><td class=\"n\">${f(pry.rho,3)}<\u002Ftd><\u002Ftr>\n          <tr><td>δ = 1 − d<sub>f<\u002Fsub>/p<\u002Ftd><td class=\"n\">${f(pry.delta,3)}<\u002Ftd><\u002Ftr>\n          <tr><td>α — mecanismo de plastificação<\u002Ftd><td class=\"n\">${f(pry.alpha,3)}<\u002Ftd><\u002Ftr>\n          <tr class=\"hl\"><td>Espessura que anula a alavanca · t<sub>c<\u002Fsub><\u002Ftd><td class=\"n\">${f(pry.tc,1)} mm<\u002Ftd><\u002Ftr>\n          <tr class=\"hl\"><td>Fator de amplificação<\u002Ftd><td class=\"n\">${f(pry.fator,3)}<\u002Ftd><\u002Ftr>\n        <\u002Ftable>` : \"\"}\n        <details><summary>Memória de cálculo<\u002Fsummary>\n          <div class=\"calc\">NBR 8800:2008 — item 6.3.3.2\nF<sub>t,Rd<\u002Fsub> = 0,75 · A<sub>b<\u002Fsub> · f<sub>ub<\u002Fsub> / γ<sub>a2<\u002Fsub>\nF<sub>t,Rd<\u002Fsub> = 0,75 · ${f(p.Ab,2)} · ${c.fub} / ${f(GA2,2)}\nF<sub>t,Rd<\u002Fsub> = ${f(Rd*1000,0)} N = ${f(Rd)} kN\n\nO fator 0,75 representa a razão entre a área efetiva\nda parte rosqueada e a área bruta, já embutida na\nformulação normativa — não aplicar A<sub>e<\u002Fsub> em duplicidade.\n\nSolicitação\nF<sub>t,Sd<\u002Fsub> = ${f(Ft)} kN × ${f(al,3)} (alavanca) / ${n} parafusos = ${f(FtSd)} kN\n${pry ? `\nEfeito alavanca — AISC Manual Parte 9\nt<sub>c<\u002Fsub> = √(4,44·T·b'/(p·f<sub>u<\u002Fsub>)) = √(4,44·${f(Ft/n*1000,0)}·${f(pry.bp,1)}/(${f(+$(\"t_ptrib\").value,0)}·${f(+$(\"t_fuc\").value,0)})) = ${f(pry.tc,1)} mm\n${pry.alpha===0\n ? `t = ${f(+$(\"t_tc\").value,1)} mm ≥ t<sub>c<\u002Fsub> → chapa rígida, sem alavanca (fator 1,000)`\n : `α = [(t<sub>c<\u002Fsub>/t)² − 1]/[δ(1+ρ)] = [(${f(pry.tc,1)}/${f(+$(\"t_tc\").value,1)})² − 1]/[${f(pry.delta,3)}·${f(1+pry.rho,3)}] = ${f(pry.alpha,3)}\nfator = 1 + δ·α·ρ = 1 + ${f(pry.delta,3)}·${f(pry.alpha,3)}·${f(pry.rho,3)} = ${f(pry.fator,3)}\n\nPara eliminar a alavanca, adote chapa de topo com t ≥ ${f(pry.tc,1)} mm.`}\n` : \"\"}\nVerificação\n${f(FtSd)} kN ${r<=1?\"≤\":\">\"} ${f(Rd)} kN → ${r<=1?\"ATENDE\":\"NÃO ATENDE\"}<\u002Fdiv>\n        <\u002Fdetails>\n      <\u002Fdiv>`;\n  }catch(e){ /* mensagem já exibida no campo */ }\n}\n\nfunction sugerirDiametro(){\n  try{\n    const Ft = num(\"t_ft\",{min:0.1}), n = num(\"t_n\",{min:1,inteiro:true});\n    const c = cls($(\"t_cls\").value);\n    const modoAlav = $(\"t_alav\").value;\n    // na sugestão usa fator neutro quando calculado, pois o prying depende do diâmetro escolhido\n    const al = modoAlav === \"calc\" ? 1.0 : parseFloat(modoAlav);\n    const alvo = Ft*al/n;\n    // adota o menor diâmetro com aproveitamento ≤ 85%, evitando ligação no limite\n    const escolha = PARAF.find(p => alvo/FtRd(p.Ab,c.fub) <= 0.85);\n    if(!escolha){\n      $(\"t_out\").innerHTML = `<div class=\"card\"><div class=\"verdict fail\"><b>Nenhum diâmetro tabelado atende com folga<\u002Fb><small>Nenhum parafuso de M8 a M36 na classe ${c.nome} fica abaixo de 85% de aproveitamento. Aumente o número de parafusos ou eleve a classe do aço.<\u002Fsmall><\u002Fdiv><\u002Fdiv>`;\n      return;\n    }\n    $(\"t_d\").value = escolha.d;\n    calcTracao();\n  }catch(e){}\n}\n\n/* ---------- CISALHAMENTO ---------- */\nfunction calcCisalha(){\n  try{\n    const Fv = num(\"v_fv\",{min:0.1,nome:\"Fv,Sd\"});\n    const n  = num(\"v_n\",{min:1,inteiro:true,nome:\"Número de parafusos\"});\n    const t  = num(\"v_t\",{min:0.5,nome:\"Espessura\"});\n    const c = cls($(\"v_cls\").value), p = par($(\"v_d\").value);\n    const planos = +$(\"v_p\").value, coef = parseFloat($(\"v_rosca\").value);\n    const fu = +$(\"v_fu\").value, e = +$(\"v_e\").value, pp = +$(\"v_pp\").value;\n    const defo = $(\"v_defo\").value === \"1\";\n\n    const FvSd = Fv/n;\n    const Rd_corte = FvRd(p.Ab, c.fub, coef)*planos;\n\n    const df = dFuro(p.d);\n    const lf_borda  = e - df/2;\n    const lf_interno= pp - df;\n    const lf = Math.max(Math.min(lf_borda, lf_interno), 0.1);\n    const cont = FcRd(lf, p.d, t, fu, defo);\n\n    const Rd = Math.min(Rd_corte, cont.valor);\n    const gov = Rd_corte <= cont.valor ? \"corte no parafuso\" : `pressão de contato (${cont.governa})`;\n    const r = FvSd/Rd;\n    const nMin = Math.ceil(Fv/Rd);\n\n    $(\"v_out\").innerHTML =\n      veredito(r,\"Ligação verificada ao cisalhamento\",\"Ligação insuficiente ao cisalhamento\",\n        `F<sub>v,Sd<\u002Fsub>/parafuso = ${f(FvSd)} kN · resistência governante = ${f(Rd)} kN (${gov})`) +\n      `<div class=\"card\">\n        <h2>Resistências por parafuso<\u002Fh2>\n        <table>\n          <tr><th>Modo de falha<\u002Fth><th>Resistência<\u002Fth><th>Aproveit.<\u002Fth><\u002Ftr>\n          <tr${Rd_corte<=cont.valor?' class=\"hl\"':''}><td>Corte no parafuso — ${planos} plano(s)<\u002Ftd><td class=\"n\">${f(Rd_corte)} kN<\u002Ftd><td class=\"n\">${f(FvSd/Rd_corte*100)}%<\u002Ftd><\u002Ftr>\n          <tr${cont.rasgo<cont.esmag&&cont.valor<Rd_corte?' class=\"hl\"':''}><td>Rasgamento da chapa<\u002Ftd><td class=\"n\">${f(cont.rasgo)} kN<\u002Ftd><td class=\"n\">${f(FvSd/cont.rasgo*100)}%<\u002Ftd><\u002Ftr>\n          <tr${cont.esmag<=cont.rasgo&&cont.valor<Rd_corte?' class=\"hl\"':''}><td>Esmagamento no furo<\u002Ftd><td class=\"n\">${f(cont.esmag)} kN<\u002Ftd><td class=\"n\">${f(FvSd/cont.esmag*100)}%<\u002Ftd><\u002Ftr>\n        <\u002Ftable>\n        <div class=\"bars\">${bar(\"Modo governante — \"+gov, r)}<\u002Fdiv>\n        <table style=\"margin-top:14px\">\n          <tr><th>Parâmetro<\u002Fth><th>Valor<\u002Fth><\u002Ftr>\n          <tr><td>Parafuso<\u002Ftd><td class=\"n\">M${p.d} · ${c.nome}<\u002Ftd><\u002Ftr>\n          <tr><td>Diâmetro do furo-padrão<\u002Ftd><td class=\"n\">${f(df,1)} mm<\u002Ftd><\u002Ftr>\n          <tr><td>l<sub>f<\u002Fsub> — borda (e − d<sub>f<\u002Fsub>/2)<\u002Ftd><td class=\"n\">${f(lf_borda,1)} mm<\u002Ftd><\u002Ftr>\n          <tr><td>l<sub>f<\u002Fsub> — interno (p − d<sub>f<\u002Fsub>)<\u002Ftd><td class=\"n\">${f(lf_interno,1)} mm<\u002Ftd><\u002Ftr>\n          <tr><td>l<sub>f<\u002Fsub> crítico adotado<\u002Ftd><td class=\"n\">${f(lf,1)} mm<\u002Ftd><\u002Ftr>\n          <tr><td>Resistência total (n = ${n})<\u002Ftd><td class=\"n\">${f(Rd*n)} kN<\u002Ftd><\u002Ftr>\n          <tr><td>Número mínimo de parafusos<\u002Ftd><td class=\"n\">${nMin}<\u002Ftd><\u002Ftr>\n        <\u002Ftable>\n        <details><summary>Memória de cálculo<\u002Fsummary>\n          <div class=\"calc\">NBR 8800:2008 — item 6.3.3.3\n\na) Corte no parafuso\nF<sub>v,Rd<\u002Fsub> = ${f(coef,2)} · A<sub>b<\u002Fsub> · f<sub>ub<\u002Fsub> / γ<sub>a2<\u002Fsub> × n<sub>planos<\u002Fsub>\nF<sub>v,Rd<\u002Fsub> = ${f(coef,2)} · ${f(p.Ab,2)} · ${c.fub} / ${f(GA2,2)} × ${planos}\nF<sub>v,Rd<\u002Fsub> = ${f(Rd_corte)} kN\n\nb) Pressão de contato na parede do furo\nF<sub>c,Rd<\u002Fsub> = ${defo?\"1,2\":\"1,5\"} · l<sub>f<\u002Fsub> · t · f<sub>u<\u002Fsub> / γ<sub>a2<\u002Fsub> ≤ ${defo?\"2,4\":\"3,0\"} · d · t · f<sub>u<\u002Fsub> / γ<sub>a2<\u002Fsub>\nrasgamento    = ${defo?\"1,2\":\"1,5\"} · ${f(lf,1)} · ${f(t,1)} · ${fu} / ${f(GA2,2)} = ${f(cont.rasgo)} kN\nesmagamento   = ${defo?\"2,4\":\"3,0\"} · ${p.d} · ${f(t,1)} · ${fu} / ${f(GA2,2)} = ${f(cont.esmag)} kN\ngoverna: ${cont.governa} → ${f(cont.valor)} kN\n\nResistência de cálculo governante = ${f(Rd)} kN (${gov})\nF<sub>v,Sd<\u002Fsub> = ${f(Fv)} / ${n} = ${f(FvSd)} kN → ${r<=1?\"ATENDE\":\"NÃO ATENDE\"}<\u002Fdiv>\n        <\u002Fdetails>\n      <\u002Fdiv>`;\n  }catch(e){}\n}\n\n/* ---------- COMBINADO ---------- */\nfunction calcComb(){\n  try{\n    const Ft = num(\"c_ft\",{min:0}), Fv = num(\"c_fv\",{min:0});\n    const n = num(\"c_n\",{min:1,inteiro:true});\n    const c = cls($(\"c_cls\").value), p = par($(\"c_d\").value);\n    const planos = +$(\"c_p\").value, coef = parseFloat($(\"c_rosca\").value);\n\n    const ftSd = Ft/n, fvSd = Fv/n;\n    const ftRd = FtRd(p.Ab,c.fub), fvRd = FvRd(p.Ab,c.fub,coef)*planos;\n    const rt = ftSd/ftRd, rv = fvSd/fvRd;\n    const inter = rt*rt + rv*rv;\n\n    // pontos da elipse para o gráfico\n    let pts = \"\";\n    for(let i=0;i<=60;i++){\n      const th = i/60*Math.PI/2;\n      pts += `${(40+Math.cos(th)*260).toFixed(1)},${(240-Math.sin(th)*200).toFixed(1)} `;\n    }\n    const px = 40+Math.min(rv,1.35)*260, py = 240-Math.min(rt,1.35)*200;\n    const g = grau(inter);\n    const cor = g===\"ok\"?\"#1d7a4a\":(g===\"warn\"?\"#b8860b\":\"#b3261e\");\n\n    $(\"c_out\").innerHTML =\n      veredito(inter,\"Interação verificada\",\"Interação excedida — redimensionar\",\n        `(F<sub>t,Sd<\u002Fsub>/F<sub>t,Rd<\u002Fsub>)² + (F<sub>v,Sd<\u002Fsub>/F<sub>v,Rd<\u002Fsub>)² = ${f(inter,3)} ${inter<=1?\"≤\":\">\"} 1,000`) +\n      `<div class=\"card\">\n        <h2>Curva de interação<\u002Fh2>\n        <p class=\"sub\">Domínio seguro abaixo da elipse. O marcador indica o ponto de trabalho da ligação.<\u002Fp>\n        <svg class=\"geo\" viewBox=\"0 0 340 280\" role=\"img\" aria-label=\"Curva de interação tração-cisalhamento\">\n          <line x1=\"40\" y1=\"240\" x2=\"330\" y2=\"240\" stroke=\"#8b98a5\" stroke-width=\"1\"/>\n          <line x1=\"40\" y1=\"240\" x2=\"40\" y2=\"20\" stroke=\"#8b98a5\" stroke-width=\"1\"/>\n          <polyline points=\"${pts}\" fill=\"none\" stroke=\"#1d2833\" stroke-width=\"2\"/>\n          <polyline points=\"${pts}\" fill=\"#1d2833\" opacity=\".06\" stroke=\"none\"/>\n          <circle cx=\"${px.toFixed(1)}\" cy=\"${py.toFixed(1)}\" r=\"6\" fill=\"${cor}\" stroke=\"#fff\" stroke-width=\"2\"/>\n          <text x=\"300\" y=\"258\" font-size=\"10\" fill=\"#6b7986\" font-family=\"monospace\">Fv/FvRd<\u002Ftext>\n          <text x=\"4\" y=\"26\" font-size=\"10\" fill=\"#6b7986\" font-family=\"monospace\">Ft/FtRd<\u002Ftext>\n          <text x=\"34\" y=\"256\" font-size=\"9\" fill=\"#6b7986\" font-family=\"monospace\">0<\u002Ftext>\n          <text x=\"292\" y=\"256\" font-size=\"9\" fill=\"#6b7986\" font-family=\"monospace\">1,0<\u002Ftext>\n          <text x=\"24\" y=\"44\" font-size=\"9\" fill=\"#6b7986\" font-family=\"monospace\">1,0<\u002Ftext>\n        <\u002Fsvg>\n        <table style=\"margin-top:12px\">\n          <tr><th>Grandeza<\u002Fth><th>Solicitante<\u002Fth><th>Resistente<\u002Fth><th>Razão<\u002Fth><\u002Ftr>\n          <tr><td>Tração<\u002Ftd><td class=\"n\">${f(ftSd)} kN<\u002Ftd><td class=\"n\">${f(ftRd)} kN<\u002Ftd><td class=\"n\">${f(rt,3)}<\u002Ftd><\u002Ftr>\n          <tr><td>Cisalhamento<\u002Ftd><td class=\"n\">${f(fvSd)} kN<\u002Ftd><td class=\"n\">${f(fvRd)} kN<\u002Ftd><td class=\"n\">${f(rv,3)}<\u002Ftd><\u002Ftr>\n          <tr class=\"hl\"><td>Índice de interação<\u002Ftd><td class=\"n\">—<\u002Ftd><td class=\"n\">1,000<\u002Ftd><td class=\"n\">${f(inter,3)}<\u002Ftd><\u002Ftr>\n        <\u002Ftable>\n        <details><summary>Memória de cálculo<\u002Fsummary>\n          <div class=\"calc\">NBR 8800:2008 — item 6.3.3.4\nParafuso M${p.d} · ${c.nome} · ${n} unidades · ${planos} plano(s) de corte\n\nF<sub>t,Rd<\u002Fsub> = 0,75 · ${f(p.Ab,2)} · ${c.fub} / ${f(GA2,2)} = ${f(ftRd)} kN\nF<sub>v,Rd<\u002Fsub> = ${f(coef,2)} · ${f(p.Ab,2)} · ${c.fub} / ${f(GA2,2)} × ${planos} = ${f(fvRd)} kN\n\n(${f(ftSd)}/${f(ftRd)})² + (${f(fvSd)}/${f(fvRd)})²\n= ${f(rt*rt,3)} + ${f(rv*rv,3)} = ${f(inter,3)}\n\n${inter<=1?\"ATENDE\":\"NÃO ATENDE\"} ao critério de interação elíptica.<\u002Fdiv>\n        <\u002Fdetails>\n      <\u002Fdiv>`;\n  }catch(e){}\n}\n\n/* ---------- METAL-BASE ---------- */\nfunction calcBase(){\n  try{\n    const N  = num(\"b_n\",{min:0.1,nome:\"Nt,Sd\"});\n    const t  = num(\"b_t\",{min:0.5,nome:\"Espessura\"});\n    const b  = num(\"b_larg\",{min:10,nome:\"Largura\"});\n    const nt = num(\"b_nl\",{min:1,inteiro:true,nome:\"Furos por linha transversal\"});\n    const nl = num(\"b_nc\",{min:1,inteiro:true,nome:\"Furos por linha longitudinal\"});\n    const [fy,fu] = $(\"b_aco\").value.split(\"|\").map(Number);\n    const p = par($(\"b_d\").value);\n    const pl = +$(\"b_p\").value, g = +$(\"b_g\").value;\n    const e = +$(\"b_e\").value, eg = +$(\"b_eg\").value;\n    const Ct = parseFloat($(\"b_ct\").value), Cts = parseFloat($(\"b_cts\").value);\n    const df = dFuro(p.d);\n\n    // 1) escoamento da seção bruta\n    const Ag = b*t;\n    const Rd1 = NtEscoa(Ag, fy);\n\n    // 2) ruptura da seção líquida — desconto dos furos da linha crítica\n    const An = Ag - nt*df*t;\n    const Rd2 = NtRuptura(An, fu, Ct);\n\n    // 3) rasgamento em bloco — bloco em U, dois planos de cisalhamento longitudinais\n    const nPlanos = 2;\n    const Lgv = e + (nl-1)*pl;                 // por plano\n    const Lnv = Lgv - (nl-0.5)*df;\n    const Agv = nPlanos*Lgv*t, Anv = nPlanos*Math.max(Lnv,0.1)*t;\n    const Lgt = (nt-1)*g;                      // largura tracionada entre furos extremos\n    const Lnt = Math.max(Lgt - (nt-1)*df, 0.1);\n    const Ant = Lnt*t;\n    const bs = blockShear(Agv, Anv, Ant, fy, fu, Cts);\n\n    const modos = [\n      {m:\"Escoamento da seção bruta\",  v:Rd1, ref:\"6.2.1\"},\n      {m:\"Ruptura da seção líquida\",   v:Rd2, ref:\"6.2.2\"},\n      {m:\"Rasgamento em bloco\",        v:bs.valor, ref:\"6.5.6\"}\n    ];\n    const Rd = Math.min(...modos.map(x=>x.v));\n    const gov = modos.find(x=>x.v===Rd).m;\n    const r = N/Rd;\n\n    // desenho do bloco de rasgamento\n    const esc = Math.min(280/b, 90/(e+(nl-1)*pl+30));\n    const W = b*esc, H = (e+(nl-1)*pl+30)*esc;\n    let furos = \"\";\n    for(let i=0;i<nl;i++) for(let j=0;j<nt;j++){\n      const cx = (b/2 - (nt-1)*g/2 + j*g)*esc + 20;\n      const cy = (e + i*pl)*esc + 15;\n      furos += `<circle cx=\"${cx.toFixed(1)}\" cy=\"${cy.toFixed(1)}\" r=\"${(df*esc/2).toFixed(1)}\" fill=\"#fff\" stroke=\"#c8501e\" stroke-width=\"1.5\"/>`;\n    }\n    const bx1 = (b/2 - (nt-1)*g/2 - eg)*esc + 20;\n    const bx2 = (b/2 + (nt-1)*g/2 + eg)*esc + 20;\n    const by  = (e + (nl-1)*pl)*esc + 15;\n\n    $(\"b_out\").innerHTML =\n      veredito(r,\"Metal-base verificado\",\"Metal-base insuficiente — revisar espessura, largura ou espaçamentos\",\n        `N<sub>t,Sd<\u002Fsub> = ${f(N)} kN · N<sub>t,Rd<\u002Fsub> = ${f(Rd)} kN · governa: ${gov}`) +\n      `<div class=\"card\">\n        <h2>Estados-limite da chapa<\u002Fh2>\n        <table>\n          <tr><th>Estado-limite<\u002Fth><th>Item<\u002Fth><th>N<sub>t,Rd<\u002Fsub><\u002Fth><th>Aproveit.<\u002Fth><\u002Ftr>\n          ${modos.map(x=>`<tr${x.v===Rd?' class=\"hl\"':''}><td>${x.m}<\u002Ftd><td class=\"n\">${x.ref}<\u002Ftd>\n            <td class=\"n\">${f(x.v)} kN<\u002Ftd><td class=\"n\">${f(N/x.v*100)}%<\u002Ftd><\u002Ftr>`).join(\"\")}\n        <\u002Ftable>\n        <div class=\"bars\">${bar(\"Modo governante — \"+gov, r)}<\u002Fdiv>\n        <h2 style=\"margin-top:18px\">Bloco de rasgamento<\u002Fh2>\n        <p class=\"sub\">Contorno tracejado: perímetro de arrancamento considerado.<\u002Fp>\n        <svg class=\"geo\" viewBox=\"0 0 ${(W+40).toFixed(0)} ${(H+30).toFixed(0)}\" role=\"img\" aria-label=\"Bloco de rasgamento\">\n          <rect x=\"20\" y=\"15\" width=\"${W.toFixed(1)}\" height=\"${H.toFixed(1)}\" fill=\"#eceff2\" stroke=\"#1d2833\" stroke-width=\"1.5\"/>\n          <path d=\"M ${bx1.toFixed(1)} 15 L ${bx1.toFixed(1)} ${by.toFixed(1)} L ${bx2.toFixed(1)} ${by.toFixed(1)} L ${bx2.toFixed(1)} 15\"\n                fill=\"#c8501e\" fill-opacity=\".10\" stroke=\"#c8501e\" stroke-width=\"1.8\" stroke-dasharray=\"5 3\"/>\n          ${furos}\n        <\u002Fsvg>\n        <table style=\"margin-top:14px\">\n          <tr><th>Parâmetro<\u002Fth><th>Valor<\u002Fth><\u002Ftr>\n          <tr><td>Aço<\u002Ftd><td class=\"n\">f<sub>y<\u002Fsub> ${fy} / f<sub>u<\u002Fsub> ${fu} MPa<\u002Ftd><\u002Ftr>\n          <tr><td>Área bruta A<sub>g<\u002Fsub><\u002Ftd><td class=\"n\">${f(Ag,0)} mm²<\u002Ftd><\u002Ftr>\n          <tr><td>Área líquida A<sub>n<\u002Fsub> (${nt} furo(s) descontado(s))<\u002Ftd><td class=\"n\">${f(An,0)} mm²<\u002Ftd><\u002Ftr>\n          <tr><td>A<sub>gv<\u002Fsub> / A<sub>nv<\u002Fsub> — cisalhamento<\u002Ftd><td class=\"n\">${f(Agv,0)} / ${f(Anv,0)} mm²<\u002Ftd><\u002Ftr>\n          <tr><td>A<sub>nt<\u002Fsub> — tração<\u002Ftd><td class=\"n\">${f(Ant,0)} mm²<\u002Ftd><\u002Ftr>\n        <\u002Ftable>\n        <details><summary>Memória de cálculo<\u002Fsummary>\n          <div class=\"calc\">NBR 8800:2008 — chapa ${f(b,0)} × ${f(t,1)} mm · furo-padrão ${f(df,1)} mm\n\n1) Escoamento da seção bruta — 6.2.1\nA<sub>g<\u002Fsub> = ${f(b,0)} × ${f(t,1)} = ${f(Ag,0)} mm²\nN<sub>t,Rd<\u002Fsub> = A<sub>g<\u002Fsub>·f<sub>y<\u002Fsub>/γ<sub>a1<\u002Fsub> = ${f(Ag,0)}·${fy}/${f(GA1,2)} = ${f(Rd1)} kN\n\n2) Ruptura da seção líquida — 6.2.2\nA<sub>n<\u002Fsub> = A<sub>g<\u002Fsub> − n<sub>t<\u002Fsub>·d<sub>f<\u002Fsub>·t = ${f(Ag,0)} − ${nt}·${f(df,1)}·${f(t,1)} = ${f(An,0)} mm²\nN<sub>t,Rd<\u002Fsub> = C<sub>t<\u002Fsub>·A<sub>n<\u002Fsub>·f<sub>u<\u002Fsub>/γ<sub>a2<\u002Fsub> = ${f(Ct,2)}·${f(An,0)}·${fu}/${f(GA2,2)} = ${f(Rd2)} kN\n\n3) Rasgamento em bloco — 6.5.6\nPlanos de cisalhamento: ${nPlanos} · comprimento bruto por plano = ${f(Lgv,1)} mm\nA<sub>gv<\u002Fsub> = ${nPlanos}·${f(Lgv,1)}·${f(t,1)} = ${f(Agv,0)} mm²\nA<sub>nv<\u002Fsub> = ${nPlanos}·(${f(Lgv,1)} − ${f(nl-0.5,1)}·${f(df,1)})·${f(t,1)} = ${f(Anv,0)} mm²\nA<sub>nt<\u002Fsub> = (${f(Lgt,1)} − ${nt-1}·${f(df,1)})·${f(t,1)} = ${f(Ant,0)} mm²\n\nR<sub>n1<\u002Fsub> = 0,60·f<sub>u<\u002Fsub>·A<sub>nv<\u002Fsub> + C<sub>ts<\u002Fsub>·f<sub>u<\u002Fsub>·A<sub>nt<\u002Fsub> → ${f(bs.rupturaCis)} kN\nR<sub>n2<\u002Fsub> = 0,60·f<sub>y<\u002Fsub>·A<sub>gv<\u002Fsub> + C<sub>ts<\u002Fsub>·f<sub>u<\u002Fsub>·A<sub>nt<\u002Fsub> → ${f(bs.escoamCis)} kN\ngoverna: ${bs.governa} → ${f(bs.valor)} kN\n\nResistência governante da chapa = ${f(Rd)} kN (${gov})\nN<sub>t,Sd<\u002Fsub> = ${f(N)} kN → ${r<=1?\"ATENDE\":\"NÃO ATENDE\"}\n\nO rasgamento em bloco é frequentemente o estado-limite crítico\nem chapas de extremidade e cantoneiras com poucas linhas de\nparafusos e pequena distância à borda.<\u002Fdiv>\n        <\u002Fdetails>\n      <\u002Fdiv>`;\n  }catch(e){}\n}\n\n/* ---------- ANCORAGEM (ACI 318-19 Cap. 17, método CCD) ---------- */\nfunction calcAnc(){\n  try{\n    const Nua = num(\"a_nu\",{min:0}), Vua = num(\"a_vu\",{min:0});\n    const hef = num(\"a_hef\",{min:20,nome:\"hef\"});\n    const fck = num(\"a_fck\",{min:15});\n    const ca1 = num(\"a_c1\",{min:10}), ca2 = num(\"a_c2\",{min:10});\n    const p = par($(\"a_d\").value), c = cls($(\"a_cls\").value);\n    const tipo = $(\"a_tipo\").value, fissurado = $(\"a_fis\").value===\"1\";\n    const emGrupo = $(\"a_arranjo\").value === \"grupo\";\n    const nx = emGrupo ? num(\"a_nx\",{min:1,max:6,inteiro:true,nome:\"nx\"}) : 1;\n    const ny = emGrupo ? num(\"a_ny\",{min:1,max:6,inteiro:true,nome:\"ny\"}) : 1;\n    const sx = emGrupo ? +$(\"a_sx\").value : 0;\n    const sy = emGrupo ? +$(\"a_sy\").value : 0;\n    const nAnc = nx*ny;\n    // esforços por chumbador para os modos de aço (falha individual)\n    const NuaUnit = Nua/nAnc, VuaUnit = Vua/nAnc;\n\n    // --- 1) Ruptura do aço (17.6.1 / 17.7.1) — resistência do grupo = n × individual\n    const phiAcoT = 0.75, phiAcoV = 0.65;\n    const Nsa1 = p.Ae*c.fub/1000;                // por chumbador\n    const Vsa1 = 0.6*p.Ae*c.fub/1000;\n    const Nsa = Nsa1*nAnc, Vsa = Vsa1*nAnc;\n    const NsaRd = phiAcoT*Nsa, VsaRd = phiAcoV*Vsa;\n\n    // --- 2) Arrancamento do cone de concreto à tração (17.6.2)\n    const kc = (tipo===\"chumbado\") ? 10 : 7;     // pré-instalado 10; pós-instalado 7 (default ACI)\n    const phiC = 0.65;                            // Condição B, sem armadura suplementar\n    const Nb = kc*Math.sqrt(fck)*Math.pow(hef,1.5)/1000;\n    const cmin = Math.min(ca1,ca2);\n    const ANco = 9*hef*hef;\n    // área projetada: isolado ou grupo retangular, limitada pelas bordas\n    const larg1 = Math.min(ca1,1.5*hef) + (nx-1)*sx + 1.5*hef;\n    const larg2 = Math.min(ca2,1.5*hef) + (ny-1)*sy + 1.5*hef;\n    const ANc = larg1*larg2;\n    const somaIsolados = nAnc*ANco;\n    const sobrepoe = emGrupo && (ANc < somaIsolados);\n    const psiEdN = cmin >= 1.5*hef ? 1.0 : (0.7 + 0.3*cmin/(1.5*hef));\n    const psiCN  = fissurado ? 1.0 : (tipo===\"chumbado\" ? 1.25 : 1.4);\n    const psiCpN = (tipo===\"chumbado\" || !fissurado) ? 1.0\n                   : Math.max(Math.min(cmin/(1.5*hef),1.0), 0.6);\n    const Ncb = (ANc/ANco)*psiEdN*psiCN*psiCpN*Nb;\n    const NcbRd = phiC*Ncb;\n\n    // --- 3) Arrancamento por aderência (adesivo) — 17.6.5, τcr referencial\n    let NaRd = null, tau = null;\n    if(tipo===\"pos_qui\"){\n      tau = fissurado ? 4.5 : 10.0;              // MPa — valor referencial; usar ETA do fabricante\n      const Na = Math.PI*p.d*hef*tau/1000*nAnc;\n      NaRd = 0.65*Na;\n    }\n\n    // --- 4) Arrancamento por deslizamento (expansão) — 17.6.3, referencial\n    let NpRd = null;\n    if(tipo===\"pos_exp\"){\n      const Np = 8*p.Ab*fck/1000*0.6*nAnc;       // estimativa conservadora; usar ETA do fabricante\n      NpRd = 0.65*(fissurado?1.0:1.4)*Np;\n    }\n\n    // --- 5) Ruptura do concreto por borda ao cortante (17.7.2)\n    const le = Math.min(hef, 8*p.d);\n    const Vb = 0.66*Math.pow(le/p.d,0.2)*Math.sqrt(p.d)*Math.sqrt(fck)*Math.pow(ca1,1.5)/1000;\n    const AVco = 4.5*ca1*ca1;\n    const AVc  = (Math.min(ca2,1.5*ca1) + (ny-1)*sy + 1.5*ca1)*1.5*ca1;\n    const psiEdV = ca2 >= 1.5*ca1 ? 1.0 : (0.7+0.3*ca2/(1.5*ca1));\n    const psiCV  = fissurado ? 1.0 : 1.4;\n    const Vcb = (AVc/AVco)*psiEdV*psiCV*Vb;\n    const VcbRd = 0.70*Vcb;\n\n    // --- 6) Arrancamento do concreto por alavanca (pryout) — 17.7.3\n    const kcp = hef < 65 ? 1.0 : 2.0;\n    const VcpRd = 0.70*kcp*Ncb;\n\n    /* governantes */\n    const modosT = [\n      {m:\"Ruptura do aço à tração\",           v:NsaRd},\n      {m:\"Cone de concreto à tração\",         v:NcbRd},\n      ...(NaRd!==null?[{m:\"Aderência do adesivo\",  v:NaRd}]:[]),\n      ...(NpRd!==null?[{m:\"Deslizamento do expansor\", v:NpRd}]:[])\n    ];\n    const modosV = [\n      {m:\"Ruptura do aço ao cortante\", v:VsaRd},\n      {m:\"Ruptura de borda do concreto\", v:VcbRd},\n      {m:\"Alavanca (pryout)\", v:VcpRd}\n    ];\n    const NRd = Math.min(...modosT.map(x=>x.v));\n    const VRd = Math.min(...modosV.map(x=>x.v));\n    const govT = modosT.find(x=>x.v===NRd).m, govV = modosV.find(x=>x.v===VRd).m;\n    const rN = Nua/NRd, rV = Vua/VRd;\n    // interação trilinear ACI 17.8\n    let inter, regra;\n    if(rN <= 0.2){ inter = rV; regra=\"N<sub>ua<\u002Fsub> ≤ 0,2·φN<sub>n<\u002Fsub> → só cortante governa\"; }\n    else if(rV <= 0.2){ inter = rN; regra=\"V<sub>ua<\u002Fsub> ≤ 0,2·φV<sub>n<\u002Fsub> → só tração governa\"; }\n    else { inter = (rN+rV)/1.2; regra=\"ambos > 0,2 → (N/φN<sub>n<\u002Fsub> + V/φV<sub>n<\u002Fsub>) ≤ 1,2\"; }\n\n    const linhas = arr => arr.map(x=>`<tr${x.v===Math.min(...arr.map(y=>y.v))?' class=\"hl\"':''}><td>${x.m}<\u002Ftd><td class=\"n\">${f(x.v)} kN<\u002Ftd><\u002Ftr>`).join(\"\");\n\n    $(\"a_out\").innerHTML =\n      veredito(inter,\"Ancoragem verificada\",\"Ancoragem insuficiente — revisar h<sub>ef<\u002Fsub>, diâmetro ou distâncias de borda\",\n        `Tração ${f(rN*100)}% · Cortante ${f(rV*100)}% · Índice de interação ${f(inter,3)}`) +\n      `<div class=\"card\">\n        ${sobrepoe?`<div class=\"verdict warn\" style=\"margin-bottom:14px\"><b>Cones de concreto sobrepostos<\u002Fb>\n          <small>A<sub>Nc<\u002Fsub> do grupo = ${f(ANc,0)} mm², contra ${f(somaIsolados,0)} mm² se os cones fossem independentes — apenas ${f(ANc/somaIsolados*100)}% da área. Aumente s<sub>x<\u002Fsub>/s<sub>y<\u002Fsub> para ≥ 3·h<sub>ef<\u002Fsub> = ${f(3*hef,0)} mm para eliminar a interação.<\u002Fsmall><\u002Fdiv>`:\"\"}\n        <h2>Modos de falha à tração<\u002Fh2>\n        <table><tr><th>Modo<\u002Fth><th>φN<sub>n<\u002Fsub><\u002Fth><\u002Ftr>${linhas(modosT)}<\u002Ftable>\n        <h2 style=\"margin-top:18px\">Modos de falha ao cortante<\u002Fh2>\n        <table><tr><th>Modo<\u002Fth><th>φV<sub>n<\u002Fsub><\u002Fth><\u002Ftr>${linhas(modosV)}<\u002Ftable>\n        <div class=\"bars\" style=\"margin-top:14px\">\n          ${bar(\"Tração — governa: \"+govT, rN)}\n          ${bar(\"Cortante — governa: \"+govV, rV)}\n          ${bar(\"Interação tração-cortante\", inter)}\n        <\u002Fdiv>\n        <table style=\"margin-top:14px\">\n          <tr><th>Parâmetro<\u002Fth><th>Valor<\u002Fth><\u002Ftr>\n          <tr><td>Chumbador<\u002Ftd><td class=\"n\">M${p.d} · ${c.nome}<\u002Ftd><\u002Ftr>\n          <tr><td>Arranjo<\u002Ftd><td class=\"n\">${emGrupo?`grupo ${nx}×${ny} = ${nAnc} un. · s<sub>x<\u002Fsub> ${f(sx,0)} / s<sub>y<\u002Fsub> ${f(sy,0)} mm`:\"isolado\"}<\u002Ftd><\u002Ftr>\n          <tr><td>h<sub>ef<\u002Fsub> / f<sub>ck<\u002Fsub><\u002Ftd><td class=\"n\">${f(hef,0)} mm / ${f(fck,0)} MPa<\u002Ftd><\u002Ftr>\n          <tr><td>Distância de borda mínima c<sub>a,min<\u002Fsub><\u002Ftd><td class=\"n\">${f(cmin,0)} mm<\u002Ftd><\u002Ftr>\n          <tr><td>Borda crítica 1,5·h<sub>ef<\u002Fsub><\u002Ftd><td class=\"n\">${f(1.5*hef,0)} mm ${cmin<1.5*hef?\"— borda influente\":\"— sem influência\"}<\u002Ftd><\u002Ftr>\n          <tr><td>Ψ<sub>ed,N<\u002Fsub> / Ψ<sub>c,N<\u002Fsub> / Ψ<sub>cp,N<\u002Fsub><\u002Ftd><td class=\"n\">${f(psiEdN,3)} / ${f(psiCN,2)} / ${f(psiCpN,2)}<\u002Ftd><\u002Ftr>\n          <tr><td>A<sub>Nc<\u002Fsub> / A<sub>Nco<\u002Fsub><\u002Ftd><td class=\"n\">${f(ANc/ANco,3)}<\u002Ftd><\u002Ftr>\n        <\u002Ftable>\n        <details><summary>Memória de cálculo<\u002Fsummary>\n          <div class=\"calc\">ACI 318-19 Capítulo 17 — método CCD\n${emGrupo?`Grupo retangular ${nx}×${ny} (${nAnc} chumbadores), Condição B`:\"Chumbador isolado, Condição B (sem armadura suplementar)\"}\n\n1) Aço à tração — 17.6.1\nN<sub>sa<\u002Fsub> = n·A<sub>se<\u002Fsub>·f<sub>uta<\u002Fsub> = ${nAnc}·${f(p.Ae,1)}·${c.fub} = ${f(Nsa)} kN\nφN<sub>sa<\u002Fsub> = 0,75 · ${f(Nsa)} = ${f(NsaRd)} kN\n\n2) Cone de concreto à tração — 17.6.2\nN<sub>b<\u002Fsub> = k<sub>c<\u002Fsub>·√f<sub>ck<\u002Fsub>·h<sub>ef<\u002Fsub>^1,5 = ${kc}·√${f(fck,0)}·${f(hef,0)}^1,5 = ${f(Nb)} kN\nA<sub>Nco<\u002Fsub> = 9·h<sub>ef<\u002Fsub>² = ${f(ANco,0)} mm²\nA<sub>Nc<\u002Fsub>  = ${f(larg1,0)} × ${f(larg2,0)} = ${f(ANc,0)} mm²${emGrupo?`\n   (soma de cones independentes seria ${f(somaIsolados,0)} mm²\n    → razão ${f(ANc/somaIsolados*100)}%${sobrepoe?\" — HÁ SOBREPOSIÇÃO\":\"\"})`:\"\"}\nΨ<sub>ed,N<\u002Fsub> = ${f(psiEdN,3)}   Ψ<sub>c,N<\u002Fsub> = ${f(psiCN,2)}   Ψ<sub>cp,N<\u002Fsub> = ${f(psiCpN,2)}\nN<sub>cb<\u002Fsub> = (${f(ANc/ANco,3)})·${f(psiEdN,3)}·${f(psiCN,2)}·${f(psiCpN,2)}·${f(Nb)} = ${f(Ncb)} kN\nφN<sub>cb<\u002Fsub> = 0,65 · ${f(Ncb)} = ${f(NcbRd)} kN\n${tau!==null?`\n3) Aderência do adesivo — 17.6.5\nτ<sub>cr<\u002Fsub> adotado = ${f(tau,1)} MPa (VALOR REFERENCIAL — substituir pelo ETA/relatório do fabricante)\nN<sub>a<\u002Fsub> = π·d·h<sub>ef<\u002Fsub>·τ = π·${p.d}·${f(hef,0)}·${f(tau,1)} = ${f(NaRd/0.65)} kN\nφN<sub>a<\u002Fsub> = ${f(NaRd)} kN\n`:\"\"}${NpRd!==null?`\n3) Deslizamento do expansor — 17.6.3\nEstimativa conservadora — substituir pelo N<sub>p<\u002Fsub> do ETA do fabricante.\nφN<sub>p<\u002Fsub> = ${f(NpRd)} kN\n`:\"\"}\n4) Borda do concreto ao cortante — 17.7.2\nl<sub>e<\u002Fsub> = min(h<sub>ef<\u002Fsub>; 8d) = ${f(le,0)} mm\nV<sub>b<\u002Fsub> = 0,66·(l<sub>e<\u002Fsub>/d)^0,2·√d·√f<sub>ck<\u002Fsub>·c<sub>a1<\u002Fsub>^1,5 = ${f(Vb)} kN\nφV<sub>cb<\u002Fsub> = 0,70 · ${f(Vcb)} = ${f(VcbRd)} kN\n\n5) Alavanca (pryout) — 17.7.3\nk<sub>cp<\u002Fsub> = ${kcp} (h<sub>ef<\u002Fsub> ${hef<65?\"<\":\"≥\"} 65 mm)\nφV<sub>cp<\u002Fsub> = 0,70 · ${kcp} · ${f(Ncb)} = ${f(VcpRd)} kN\n\n6) Interação — 17.8\n${regra}\nN<sub>ua<\u002Fsub>/φN<sub>n<\u002Fsub> = ${f(rN,3)}   V<sub>ua<\u002Fsub>/φV<sub>n<\u002Fsub> = ${f(rV,3)}\nÍndice = ${f(inter,3)} → ${inter<=1?\"ATENDE\":\"NÃO ATENDE\"}<\u002Fdiv>\n        <\u002Fdetails>\n      <\u002Fdiv>`;\n  }catch(e){}\n}\n\n/* ---------- GEOMETRIA ---------- */\nfunction calcGeo(){\n  try{\n    const p = par($(\"g_d\").value);\n    const t = num(\"g_t\",{min:0.5});\n    const pAd = num(\"g_p\",{min:1}), eAd = num(\"g_e\",{min:1});\n    const borda = $(\"g_borda\").value, corrosao = $(\"g_amb\").value===\"1\";\n    const df = dFuro(p.d);\n\n    const pMin = 3*p.d;                                   // 6.3.10\n    const pMax = corrosao ? Math.min(14*t,180) : Math.min(24*t,300); // 6.3.11\n    const eMin = borda===\"cort\" ? 1.25*df : 1.75*df;      // Tabela 12 (aprox. usual)\n    const eMax = Math.min(12*t,150);                      // 6.3.12\n\n    const checks = [\n      {n:\"Espaçamento mínimo entre furos\", req:`p ≥ 3d = ${f(pMin,1)} mm`, val:pAd, ok:pAd>=pMin},\n      {n:\"Espaçamento máximo entre furos\", req:`p ≤ ${f(pMax,1)} mm`, val:pAd, ok:pAd<=pMax},\n      {n:\"Distância mínima à borda\",       req:`e ≥ ${f(eMin,1)} mm`, val:eAd, ok:eAd>=eMin},\n      {n:\"Distância máxima à borda\",       req:`e ≤ ${f(eMax,1)} mm`, val:eAd, ok:eAd<=eMax}\n    ];\n    const falhas = checks.filter(c=>!c.ok).length;\n\n    // desenho esquemático\n    const esc = 260/(2*eAd+pAd);\n    const x1=(eAd*esc)+40, x2=x1+pAd*esc, xr=x2+eAd*esc;\n    $(\"g_out\").innerHTML =\n      `<div class=\"verdict ${falhas?'fail':'ok'}\"><b>${falhas? `${falhas} limite(s) não atendido(s)` : \"Geometria conforme\"}<\u002Fb>\n        <small>M${p.d} · furo-padrão ${f(df,1)} mm · chapa ${f(t,1)} mm<\u002Fsmall><\u002Fdiv>\n      <div class=\"card\">\n        <h2>Verificação dos limites<\u002Fh2>\n        <table>\n          <tr><th>Critério<\u002Fth><th>Exigência<\u002Fth><th>Adotado<\u002Fth><th>Situação<\u002Fth><\u002Ftr>\n          ${checks.map(c=>`<tr><td>${c.n}<\u002Ftd><td class=\"n\">${c.req}<\u002Ftd><td class=\"n\">${f(c.val,1)} mm<\u002Ftd>\n            <td class=\"n\" style=\"color:${c.ok?'var(--ok)':'var(--fail)'}\">${c.ok?\"conforme\":\"não conforme\"}<\u002Ftd><\u002Ftr>`).join(\"\")}\n        <\u002Ftable>\n        <svg class=\"geo\" viewBox=\"0 0 340 130\" role=\"img\" aria-label=\"Esquema de espaçamentos\">\n          <rect x=\"30\" y=\"30\" width=\"${(xr-30).toFixed(0)}\" height=\"70\" fill=\"#eceff2\" stroke=\"#1d2833\" stroke-width=\"1.5\"/>\n          <circle cx=\"${x1.toFixed(1)}\" cy=\"65\" r=\"${(df*esc/2).toFixed(1)}\" fill=\"#fff\" stroke=\"#c8501e\" stroke-width=\"1.8\"/>\n          <circle cx=\"${x2.toFixed(1)}\" cy=\"65\" r=\"${(df*esc/2).toFixed(1)}\" fill=\"#fff\" stroke=\"#c8501e\" stroke-width=\"1.8\"/>\n          <line x1=\"30\" y1=\"115\" x2=\"${x1.toFixed(1)}\" y2=\"115\" stroke=\"#5c6b7a\" stroke-width=\"1\" marker-start=\"url(#m)\" marker-end=\"url(#m)\"/>\n          <line x1=\"${x1.toFixed(1)}\" y1=\"115\" x2=\"${x2.toFixed(1)}\" y2=\"115\" stroke=\"#5c6b7a\" stroke-width=\"1\"/>\n          <text x=\"${((30+x1)/2).toFixed(0)}\" y=\"128\" font-size=\"9\" text-anchor=\"middle\" fill=\"#5c6b7a\" font-family=\"monospace\">e=${f(eAd,0)}<\u002Ftext>\n          <text x=\"${((x1+x2)/2).toFixed(0)}\" y=\"128\" font-size=\"9\" text-anchor=\"middle\" fill=\"#5c6b7a\" font-family=\"monospace\">p=${f(pAd,0)}<\u002Ftext>\n          <text x=\"${(xr+8).toFixed(0)}\" y=\"68\" font-size=\"9\" fill=\"#5c6b7a\" font-family=\"monospace\">t=${f(t,1)}<\u002Ftext>\n        <\u002Fsvg>\n        <details><summary>Base normativa<\u002Fsummary>\n          <div class=\"calc\">NBR 8800:2008\n6.3.10 — espaçamento mínimo: p ≥ 3d (medido entre centros)\n6.3.11 — espaçamento máximo em elementos ligados continuamente:\n         p ≤ 24t ou 300 mm (protegido); p ≤ 14t ou 180 mm (sujeito a corrosão)\n6.3.12 — distância máxima à borda: e ≤ 12t ou 150 mm\nTabela 12 — distância mínima à borda em função do diâmetro e do\nprocesso de corte. Adotado ${borda===\"cort\"?\"1,25\":\"1,75\"}·d<sub>f<\u002Fsub> para borda ${borda===\"cort\"?\"cortada a serra/tesoura\":\"laminada/maçarico\"}.\n\nFuro-padrão: d + 1,5 mm até M22; d + 2,0 mm acima → ${f(df,1)} mm<\u002Fdiv>\n        <\u002Fdetails>\n      <\u002Fdiv>`;\n  }catch(e){}\n}\n\n/* ---------- TORQUE ---------- */\nfunction calcTorque(){\n  try{\n    const c = cls($(\"k_cls\").value), p = par($(\"k_d\").value);\n    const K = parseFloat($(\"k_k\").value), mu = parseFloat($(\"k_mu\").value);\n    const n = num(\"k_n\",{min:1,inteiro:true}), ns = +$(\"k_ns\").value;\n\n    const altaRes = [\"A325\",\"A490\",\"8.8\",\"10.9\"].includes(c.id);\n    const Fp = 0.70*p.Ab*c.fub/1000;      // kN — protensão mínima NBR 8800 Tabela 13\n    const T  = K*Fp*1000*p.d/1000;        // N·m\n    const Tmin = T*0.9, Tmax = T*1.1;\n    const giro = p.d <= 20 ? \"1/3 de volta\" : (p.d <= 27 ? \"1/2 volta\" : \"2/3 de volta\");\n    // deslizamento crítico — resistência ao escorregamento (ELS)\n    const Fs = 1.13*mu*Fp*ns*1.0;         // hf=1,0 furo-padrão\n    const FsRd = Fs/1.20;                 // γ para ELS de escorregamento\n\n    $(\"k_out\").innerHTML =\n      `<div class=\"verdict ${altaRes?'ok':'warn'}\"><b>${altaRes?\"Parafuso apto à protensão\":\"Classe não recomendada para ligações protendidas\"}<\u002Fb>\n        <small>${altaRes?`M${p.d} · ${c.nome} — protensão mínima ${f(Fp)} kN`:\"Use classes 8.8, 10.9, A325 ou A490 em ligações por atrito.\"}<\u002Fsmall><\u002Fdiv>\n      <div class=\"card\">\n        <h2>Protensão e aperto<\u002Fh2>\n        <table>\n          <tr><th>Grandeza<\u002Fth><th>Valor<\u002Fth><\u002Ftr>\n          <tr class=\"hl\"><td>Protensão mínima F<sub>p<\u002Fsub> = 0,70·A<sub>b<\u002Fsub>·f<sub>ub<\u002Fsub><\u002Ftd><td class=\"n\">${f(Fp)} kN<\u002Ftd><\u002Ftr>\n          <tr><td>Torque nominal estimado T = K·F<sub>p<\u002Fsub>·d<\u002Ftd><td class=\"n\">${f(T,0)} N·m<\u002Ftd><\u002Ftr>\n          <tr><td>Faixa de aceitação (±10%)<\u002Ftd><td class=\"n\">${f(Tmin,0)} – ${f(Tmax,0)} N·m<\u002Ftd><\u002Ftr>\n          <tr><td>Giro da porca após aperto inicial<\u002Ftd><td class=\"n\">${giro}<\u002Ftd><\u002Ftr>\n          <tr><td>Chave / boca hexagonal<\u002Ftd><td class=\"n\">${p.ch} mm<\u002Ftd><\u002Ftr>\n          <tr><td>Protensão total (n = ${n})<\u002Ftd><td class=\"n\">${f(Fp*n)} kN<\u002Ftd><\u002Ftr>\n        <\u002Ftable>\n        <h2 style=\"margin-top:18px\">Resistência ao escorregamento<\u002Fh2>\n        <table>\n          <tr><th>Grandeza<\u002Fth><th>Valor<\u002Fth><\u002Ftr>\n          <tr><td>Por parafuso — ${ns} superfície(s), μ = ${f(mu,2)}<\u002Ftd><td class=\"n\">${f(FsRd)} kN<\u002Ftd><\u002Ftr>\n          <tr class=\"hl\"><td>Total da ligação (n = ${n})<\u002Ftd><td class=\"n\">${f(FsRd*n)} kN<\u002Ftd><\u002Ftr>\n        <\u002Ftable>\n        <details><summary>Memória de cálculo e observações de execução<\u002Fsummary>\n          <div class=\"calc\">Protensão — NBR 8800:2008 Tabela 13\nF<sub>p<\u002Fsub> = 0,70 · A<sub>b<\u002Fsub> · f<sub>ub<\u002Fsub> = 0,70 · ${f(p.Ab,2)} · ${c.fub} = ${f(Fp)} kN\n\nTorque — relação empírica T = K · F<sub>p<\u002Fsub> · d\nT = ${f(K,2)} · ${f(Fp*1000,0)} N · ${p.d} mm = ${f(T,0)} N·m\n\nO coeficiente K depende do acabamento, da lubrificação e do\nestado da rosca. O torquímetro é método indireto: quando a\nprotensão for crítica, usar o método do giro da porca\n(NBR 8800 item 6.2.5) ou indicador direto de tração (DTI).\n\nEscorregamento — ELS\nF<sub>s,Rd<\u002Fsub> = 1,13 · μ · F<sub>p<\u002Fsub> · n<sub>s<\u002Fsub> · h<sub>f<\u002Fsub> / γ\nF<sub>s,Rd<\u002Fsub> = 1,13 · ${f(mu,2)} · ${f(Fp)} · ${ns} · 1,00 / 1,20 = ${f(FsRd)} kN\n\nExecução: apertar do centro da ligação para as bordas, em pelo\nmenos duas passadas. Superfícies de atrito não devem receber\npintura, óleo ou galvanização não escovada.<\u002Fdiv>\n        <\u002Fdetails>\n      <\u002Fdiv>`;\n  }catch(e){}\n}\n\n/* ---------- FADIGA ---------- */\nfunction calcFadiga(){\n  try{\n    const alvo = $(\"fd_alvo\").value;\n    const Fmax = num(\"fd_smax\",{min:0,nome:\"Esforço máximo\"});\n    const Fmin = +$(\"fd_smin\").value;\n    const n = num(\"fd_n\",{min:1,inteiro:true,nome:\"Número de parafusos\"});\n    const c = cls($(\"fd_cls\").value), p = par($(\"fd_d\").value);\n    const N = $(\"fd_ciclos\").value===\"outro\" ? Math.max(+$(\"fd_nlivre\").value,1000) : +$(\"fd_ciclos\").value;\n    const parafuso = alvo===\"PAR\";\n    const cat = parafuso ? \"PAR\" : $(\"fd_cat\").value;\n    const kProt = parafuso ? parseFloat($(\"fd_prot\").value) : 1.0;\n    const area = parafuso ? p.Ae*n : Math.max(+$(\"fd_area\").value, 1);\n\n    const dF = (Fmax - Fmin)*kProt;                  // variação efetiva de esforço (kN)\n    if(dF <= 0){\n      $(\"fd_out\").innerHTML = `<div class=\"card\"><div class=\"verdict ok\"><b>Sem variação de esforço<\u002Fb>\n        <small>Fadiga não se aplica a carga estática ou quando o mínimo iguala o máximo.<\u002Fsmall><\u002Fdiv><\u002Fdiv>`;\n      return;\n    }\n    const sigmaSR = dF*1000/area;                    // MPa\n    const FSR = fadFSR(cat, N);\n    const r = sigmaSR/FSR;\n    const vida = fadVida(cat, sigmaSR);\n    const catInfo = FAD_CAT[cat];\n    const limiarGoverna = FSR === catInfo.TH;\n\n    // pontos da curva S-N para o gráfico (log N de 10^4 a 10^8)\n    let pts=\"\";\n    for(let i=0;i<=60;i++){\n      const logN = 4 + i/60*4;\n      const s = fadFSR(cat, Math.pow(10,logN));\n      const X = 40 + (logN-4)/4*280, Y = 230 - Math.min(s/250,1)*190;\n      pts += `${X.toFixed(1)},${Y.toFixed(1)} `;\n    }\n    const pX = 40 + (Math.log10(N)-4)/4*280;\n    const pY = 230 - Math.min(sigmaSR/250,1)*190;\n    const corP = r<=0.85?\"#1d7a4a\":(r<=1?\"#b8860b\":\"#b3261e\");\n\n    $(\"fd_out\").innerHTML =\n      veredito(r,\"Verificação à fadiga atendida\",\"Faixa de tensão excede a admissível\",\n        `Δσ = ${f(sigmaSR)} MPa · admissível ${f(FSR)} MPa (${limiarGoverna?\"limiar governa\":\"curva S-N governa\"}) · categoria ${catInfo.nome}`) +\n      `<div class=\"card\">\n        ${parafuso && kProt<1 ? `<div class=\"verdict ok\" style=\"margin-bottom:14px\"><b>Benefício da protensão considerado<\u002Fb>\n          <small>Junta protendida: o parafuso absorve apenas ${f(kProt*100,0)}% da variação externa (${f(Fmax-Fmin)} → ${f(dF)} kN). A junta rígida transmite o restante por descompressão do pacote. Válido enquanto a tração máxima não descolar as chapas.<\u002Fsmall><\u002Fdiv>`:\"\"}\n        ${parafuso && kProt===1 ? `<div class=\"verdict warn\" style=\"margin-bottom:14px\"><b>Parafuso sem protensão sob fadiga<\u002Fb>\n          <small>Sem protensão, toda a variação passa pelo parafuso. Em ligação tracionada cíclica, protender é a medida mais eficaz contra fadiga — reavalie a execução.<\u002Fsmall><\u002Fdiv>`:\"\"}\n        <h2>Curva S-N — categoria ${catInfo.nome}<\u002Fh2>\n        <p class=\"sub\">O ponto marca a condição de projeto (N, Δσ). Abaixo da curva: vida atendida.<\u002Fp>\n        <svg class=\"geo\" viewBox=\"0 0 360 260\" role=\"img\" aria-label=\"Curva S-N\">\n          <line x1=\"40\" y1=\"230\" x2=\"330\" y2=\"230\" stroke=\"#8b98a5\" stroke-width=\"1\"/>\n          <line x1=\"40\" y1=\"230\" x2=\"40\" y2=\"20\" stroke=\"#8b98a5\" stroke-width=\"1\"/>\n          <polyline points=\"${pts}\" fill=\"none\" stroke=\"#1d2833\" stroke-width=\"2\"/>\n          <line x1=\"40\" y1=\"${(230-Math.min(catInfo.TH/250,1)*190).toFixed(1)}\" x2=\"330\" y2=\"${(230-Math.min(catInfo.TH/250,1)*190).toFixed(1)}\" stroke=\"#c8501e\" stroke-width=\"1\" stroke-dasharray=\"5 3\"/>\n          <circle cx=\"${pX.toFixed(1)}\" cy=\"${pY.toFixed(1)}\" r=\"6\" fill=\"${corP}\" stroke=\"#fff\" stroke-width=\"2\"/>\n          <text x=\"44\" y=\"${(226-Math.min(catInfo.TH/250,1)*190).toFixed(1)}\" font-size=\"9\" fill=\"#c8501e\" font-family=\"monospace\">limiar ${f(catInfo.TH,0)} MPa<\u002Ftext>\n          <text x=\"150\" y=\"252\" font-size=\"10\" fill=\"#6b7986\" font-family=\"monospace\">log N (10⁴ → 10⁸)<\u002Ftext>\n          <text x=\"4\" y=\"26\" font-size=\"10\" fill=\"#6b7986\" font-family=\"monospace\">Δσ<\u002Ftext>\n        <\u002Fsvg>\n        <table style=\"margin-top:12px\">\n          <tr><th>Grandeza<\u002Fth><th>Valor<\u002Fth><\u002Ftr>\n          <tr><td>Elemento<\u002Ftd><td class=\"n\">${parafuso?`${n} × M${p.d} ${c.id} (A<sub>e<\u002Fsub> total ${f(area,0)} mm²)`:`metal-base, ${f(area,0)} mm²`}<\u002Ftd><\u002Ftr>\n          <tr><td>Variação de esforço externa<\u002Ftd><td class=\"n\">${f(Fmax)} − ${f(Fmin)} = ${f(Fmax-Fmin)} kN<\u002Ftd><\u002Ftr>\n          ${parafuso?`<tr><td>Variação efetiva no parafuso (×${f(kProt,2)})<\u002Ftd><td class=\"n\">${f(dF)} kN<\u002Ftd><\u002Ftr>`:\"\"}\n          <tr class=\"hl\"><td>Faixa de tensão Δσ<\u002Ftd><td class=\"n\">${f(sigmaSR)} MPa<\u002Ftd><\u002Ftr>\n          <tr class=\"hl\"><td>Faixa admissível F<sub>SR<\u002Fsub> (N = ${N.toLocaleString(\"pt-BR\")})<\u002Ftd><td class=\"n\">${f(FSR)} MPa<\u002Ftd><\u002Ftr>\n          <tr><td>Vida admissível nesta faixa<\u002Ftd><td class=\"n\">${vida===Infinity?\"ilimitada — abaixo do limiar\":Math.round(vida).toLocaleString(\"pt-BR\")+\" ciclos\"}<\u002Ftd><\u002Ftr>\n          ${vida!==Infinity?`<tr><td>Margem de vida (N<sub>adm<\u002Fsub>/N)<\u002Ftd><td class=\"n\">${f(vida/N,2)}×<\u002Ftd><\u002Ftr>`:\"\"}\n        <\u002Ftable>\n        <div class=\"bars\">${bar(\"Faixa de tensão vs admissível\", r)}<\u002Fdiv>\n        <details><summary>Memória de cálculo<\u002Fsummary>\n          <div class=\"calc\">NBR 8800:2008 Anexo K — categoria ${catInfo.nome}\nC<sub>f<\u002Fsub> = ${(catInfo.Cf/1e8).toLocaleString(\"pt-BR\")} × 10⁸ · limiar F<sub>TH<\u002Fsub> = ${f(catInfo.TH,0)} MPa\n\nVariação de esforço: ΔF = ${f(Fmax)} − ${f(Fmin)} = ${f(Fmax-Fmin)} kN${parafuso?`\nFração no parafuso (protensão): ${f(kProt,2)} → ΔF<sub>ef<\u002Fsub> = ${f(dF)} kN\nÁrea resistente: ${n} × A<sub>e<\u002Fsub>(M${p.d}) = ${n} × ${f(p.Ae,1)} = ${f(area,0)} mm²`:`\nÁrea do metal-base: ${f(area,0)} mm²`}\n\nΔσ = ΔF/A = ${f(dF)}·10³/${f(area,0)} = ${f(sigmaSR)} MPa\n\nF<sub>SR<\u002Fsub> = max[ (C<sub>f<\u002Fsub>·329/N)^⅓ ; F<sub>TH<\u002Fsub> ]\nF<sub>SR<\u002Fsub> = max[ (${(catInfo.Cf/1e8).toLocaleString(\"pt-BR\")}×10⁸·329/${N.toLocaleString(\"pt-BR\")})^⅓ ; ${f(catInfo.TH,0)} ] = ${f(FSR)} MPa\n${limiarGoverna?\"O limiar de amplitude constante governa: abaixo dele a vida é ilimitada.\":\"\"}\n${f(sigmaSR)} MPa ${r<=1?\"≤\":\">\"} ${f(FSR)} MPa → ${r<=1?\"ATENDE\":\"NÃO ATENDE\"}\n\nVida admissível: ${vida===Infinity?\"ilimitada\":`N = C<sub>f<\u002Fsub>·329/Δσ³ = ${Math.round(vida).toLocaleString(\"pt-BR\")} ciclos`}\n\nHipóteses: amplitude aproximadamente constante; para espectro\nvariável, converta pelo dano acumulado (Palmgren-Miner) antes\nde usar este módulo. Tensões nominais na área efetiva; o efeito\nalavanca deve estar embutido no esforço máximo informado.<\u002Fdiv>\n        <\u002Fdetails>\n      <\u002Fdiv>`;\n  }catch(e){}\n}\n\n/* ---------- APERTO E SELEÇÃO COMERCIAL ---------- */\nfunction lerChapas(texto){\n  // separadores: + ; e quebra de linha. Vírgula é decimal (padrão brasileiro).\n  return String(texto).split(/[+;\\n]/).map(s=>parseFloat(s.trim().replace(\",\",\".\")))\n    .filter(v=>isFinite(v)&&v>0);\n}\nfunction calcAperto(){\n  try{\n    const d = +$(\"ap_d\").value, c = cls($(\"ap_cls\").value);\n    const chapas = lerChapas($(\"ap_chapas\").value);\n    const el = $(\"ap_chapas\"), erro = $(\"e_ap_chapas\");\n    if(!chapas.length){\n      el.setAttribute(\"aria-invalid\",\"true\");\n      erro.textContent = \"Informe ao menos uma espessura válida (ex.: 12,5 + 16).\";\n      return;\n    }\n    el.setAttribute(\"aria-invalid\",\"false\"); erro.textContent=\"\";\n    const nArr = +$(\"ap_arr\").value, sobras = +$(\"ap_sobra\").value;\n    const exigeLiso = $(\"ap_plano\").value===\"liso\";\n    const qtd = Math.max(+$(\"ap_qtd\").value,1);\n    const npar = num(\"ap_npar\",{min:1,inteiro:true,nome:\"Parafusos por ligação\"});\n\n    const base = resolverAperto(d, chapas, nArr, sobras);\n    if(!base || !base.L){\n      $(\"ap_out\").innerHTML = `<div class=\"card\"><div class=\"verdict fail\"><b>Pacote excede os comprimentos comerciais<\u002Fb>\n        <small>Aperto de ${f(base?base.grip:0,1)} mm não é atendido até L = 300 mm. Considere barra rosqueada ou parafuso sob encomenda.<\u002Fsmall><\u002Fdiv><\u002Fdiv>`;\n      return;\n    }\n    const escolha = exigeLiso ? apertoComFusteLiso(d, chapas, nArr, sobras) : base;\n    if(exigeLiso && !escolha){\n      $(\"ap_out\").innerHTML = `<div class=\"card\"><div class=\"verdict fail\"><b>Nenhum comprimento comercial deixa todos os planos no fuste liso<\u002Fb>\n        <small>Com este pacote e M${d}, a rosca parcial DIN 931 sempre invade algum plano de corte. Alternativas: parafuso de comprimento de rosca reduzido sob encomenda, ou dimensionar com rosca no plano (coef. 0,40) na aba de cisalhamento.<\u002Fsmall><\u002Fdiv><\u002Fdiv>`;\n      return;\n    }\n    const R = escolha;\n    const dim = R.dim;\n    const totalPecas = qtd*npar;\n    const descricao = `Parafuso sextavado M${d} × ${R.L} mm, classe ${c.id}, rosca parcial (DIN 931 / ISO 4014)`;\n\n    // desenho longitudinal do parafuso no pacote\n    const escX = 300/(R.L+dim.m+10);\n    const x0=30, yc=70;\n    const xLiso = x0 + R.liso*escX, xFim = x0 + R.L*escX;\n    let chapasSvg=\"\", acum = (nArr===2?dim.h:0);\n    const cores=[\"#dde3e8\",\"#cfd7de\"];\n    chapas.forEach((t,i)=>{\n      chapasSvg += `<rect x=\"${(x0+acum*escX).toFixed(1)}\" y=\"40\" width=\"${(t*escX).toFixed(1)}\" height=\"60\" fill=\"${cores[i%2]}\" stroke=\"#8b98a5\" stroke-width=\".8\"/>`;\n      acum += t;\n    });\n    const planosSvg = R.planos.map(z=>{\n      const naRosca = z > R.liso;\n      return `<line x1=\"${(x0+z*escX).toFixed(1)}\" y1=\"34\" x2=\"${(x0+z*escX).toFixed(1)}\" y2=\"106\" stroke=\"${naRosca?\"#b3261e\":\"#1d7a4a\"}\" stroke-width=\"2\" stroke-dasharray=\"4 3\"/>`;\n    }).join(\"\");\n\n    $(\"ap_out\").innerHTML =\n      `<div class=\"verdict ${R.planosNaRosca.length && !exigeLiso ? \"warn\":\"ok\"}\">\n        <b>${descricao}<\u002Fb>\n        <small>Aperto ${f(R.grip,1)} mm · mínimo teórico ${f(R.Lmin,1)} mm → comercial ${R.L} mm · rosca b = ${R.b} mm · fuste liso ${f(R.liso,0)} mm<\u002Fsmall><\u002Fdiv>\n      ${R.planosNaRosca.length ? `<div class=\"verdict ${exigeLiso?\"ok\":\"warn\"}\" style=\"margin-bottom:0\">\n        <b>${exigeLiso?\"—\":\"Rosca no(s) plano(s) de corte\"}<\u002Fb>\n        <small>${exigeLiso?\"\":`${R.planosNaRosca.length} de ${R.planos.length} plano(s) de corte cai(em) na região rosqueada. No cisalhamento, use o coeficiente 0,40 (rosca no plano) — não 0,50. Para fuste liso nos planos, selecione a exigência acima e recalcule.`}<\u002Fsmall><\u002Fdiv>`:\n      (R.planos.length?`<div class=\"verdict ok\" style=\"margin-bottom:0\"><b>Fuste liso em todos os planos de corte<\u002Fb>\n        <small>Pode-se adotar o coeficiente 0,50 no cisalhamento, com ganho de ${f(25,0)}% na resistência ao corte por parafuso.<\u002Fsmall><\u002Fdiv>`:\"\")}\n      <div class=\"card\" style=\"margin-top:16px\">\n        <h2>Posição da rosca no pacote<\u002Fh2>\n        <p class=\"sub\">Linhas tracejadas: planos de corte. Verde = no fuste liso; vermelho = na rosca.<\u002Fp>\n        <svg class=\"geo\" viewBox=\"0 0 360 140\" role=\"img\" aria-label=\"Parafuso no pacote de chapas\">\n          <rect x=\"${(x0-12).toFixed(1)}\" y=\"52\" width=\"12\" height=\"36\" fill=\"#2a3946\"/>\n          <rect x=\"${x0}\" y=\"58\" width=\"${(R.liso*escX).toFixed(1)}\" height=\"24\" fill=\"#4b5966\"/>\n          <rect x=\"${xLiso.toFixed(1)}\" y=\"58\" width=\"${((R.L-R.liso)*escX).toFixed(1)}\" height=\"24\" fill=\"#8b98a5\"/>\n          ${Array.from({length:Math.floor((R.L-R.liso)/3)},(_,i)=>\n            `<line x1=\"${(xLiso+i*3*escX).toFixed(1)}\" y1=\"58\" x2=\"${(xLiso+i*3*escX).toFixed(1)}\" y2=\"82\" stroke=\"#f0f2f4\" stroke-width=\".7\"/>`).join(\"\")}\n          ${chapasSvg}\n          ${planosSvg}\n          <rect x=\"${(x0+R.grip*escX).toFixed(1)}\" y=\"50\" width=\"${(dim.m*escX).toFixed(1)}\" height=\"40\" fill=\"#2a3946\"/>\n          <text x=\"${(x0+R.grip*escX+dim.m*escX/2).toFixed(1)}\" y=\"120\" font-size=\"9\" text-anchor=\"middle\" fill=\"#6b7986\" font-family=\"monospace\">porca<\u002Ftext>\n          <text x=\"${((x0+xLiso)/2).toFixed(0)}\" y=\"120\" font-size=\"9\" text-anchor=\"middle\" fill=\"#6b7986\" font-family=\"monospace\">liso ${f(R.liso,0)}<\u002Ftext>\n          <text x=\"${((xLiso+xFim)/2).toFixed(0)}\" y=\"132\" font-size=\"9\" text-anchor=\"middle\" fill=\"#6b7986\" font-family=\"monospace\">rosca ${R.b}<\u002Ftext>\n        <\u002Fsvg>\n        <table style=\"margin-top:12px\">\n          <tr><th>Componente<\u002Fth><th>Dimensão<\u002Fth><\u002Ftr>\n          <tr><td>Pacote de chapas (${chapas.length})<\u002Ftd><td class=\"n\">${chapas.map(t=>f(t,1)).join(\" + \")} = ${f(R.pacote,1)} mm<\u002Ftd><\u002Ftr>\n          <tr><td>Arruelas ISO 7089 (${nArr} × ${f(dim.h,1)} mm)<\u002Ftd><td class=\"n\">${f(nArr*dim.h,1)} mm<\u002Ftd><\u002Ftr>\n          <tr class=\"hl\"><td>Comprimento de aperto (grip)<\u002Ftd><td class=\"n\">${f(R.grip,1)} mm<\u002Ftd><\u002Ftr>\n          <tr><td>Porca ISO 4032 (m)<\u002Ftd><td class=\"n\">${f(dim.m,1)} mm<\u002Ftd><\u002Ftr>\n          <tr><td>Sobra de rosca (${sobras} passos de ${f(dim.P,2)})<\u002Ftd><td class=\"n\">${f(sobras*dim.P,1)} mm<\u002Ftd><\u002Ftr>\n          <tr><td>Mínimo teórico<\u002Ftd><td class=\"n\">${f(R.Lmin,1)} mm<\u002Ftd><\u002Ftr>\n          <tr class=\"hl\"><td>Comprimento comercial<\u002Ftd><td class=\"n\">${R.L} mm<\u002Ftd><\u002Ftr>\n        <\u002Ftable>\n        <h2 style=\"margin-top:18px\">Lista de compra<\u002Fh2>\n        <table>\n          <tr><th>Item<\u002Fth><th>Especificação<\u002Fth><th>Quantidade<\u002Fth><\u002Ftr>\n          <tr><td>Parafuso<\u002Ftd><td class=\"n\">M${d} × ${R.L} classe ${c.id} DIN 931<\u002Ftd><td class=\"n\">${totalPecas} un.${totalPecas>=20?` (+10% reposição: ${Math.ceil(totalPecas*1.1)})`:\"\"}<\u002Ftd><\u002Ftr>\n          <tr><td>Porca<\u002Ftd><td class=\"n\">M${d} classe ${c.id===\"10.9\"?\"10\":\"8\"} ISO 4032<\u002Ftd><td class=\"n\">${totalPecas} un.<\u002Ftd><\u002Ftr>\n          ${nArr?`<tr><td>Arruela<\u002Ftd><td class=\"n\">M${d} ISO 7089, dureza compatível<\u002Ftd><td class=\"n\">${totalPecas*nArr} un.<\u002Ftd><\u002Ftr>`:\"\"}\n        <\u002Ftable>\n        <details><summary>Memória e observações de compra<\u002Fsummary>\n          <div class=\"calc\">Comprimento requerido\nL<sub>min<\u002Fsub> = aperto + porca + sobra\nL<sub>min<\u002Fsub> = ${f(R.grip,1)} + ${f(dim.m,1)} + ${f(sobras*dim.P,1)} = ${f(R.Lmin,1)} mm\nComercial imediatamente superior: L = ${R.L} mm\n\nRosca parcial DIN 931: b = ${R.L<=125?\"2d+6\":(R.L<=200?\"2d+12\":\"2d+25\")} = ${R.b} mm\nFuste liso = L − b = ${f(R.liso,0)} mm\n${R.planos.length?`\nPlanos de corte (a partir da face da cabeça):\n${R.planos.map((z,i)=>`  plano ${i+1}: ${f(z,1)} mm — ${z>R.liso?\"NA ROSCA (coef. 0,40)\":\"no fuste liso (coef. 0,50)\"}`).join(\"\\n\")}\n`:\"\"}\nObservações de compra:\n- Classes 8.8/10.9 exigem porca de classe compatível (8/10) e\n  arruela temperada; não misturar com elementos comuns.\n- Em ligação protendida, prefira o conjunto parafuso-porca-arruela\n  fornecido em lote único e ensaiado (rastreabilidade do fator K).\n- Galvanização a fogo acresce ~0,1 mm por face na rosca: porca\n  com rosca repassada (sobretarraxada) é obrigatória.<\u002Fdiv>\n        <\u002Fdetails>\n      <\u002Fdiv>`;\n  }catch(e){}\n}\n\n/* ---------- CHAPA FINA ---------- */\nfunction calcChapaFina(){\n  try{\n    const Fv = num(\"cf_fv\",{min:0.1,nome:\"Fv,Sd\"});\n    const n  = num(\"cf_n\",{min:1,inteiro:true,nome:\"Número de parafusos\"});\n    const t  = num(\"cf_t\",{min:0.4,max:8,nome:\"Espessura\"});\n    const c = cls($(\"cf_cls\").value), p = par($(\"cf_d\").value);\n    const [fy,fu] = $(\"cf_aco\").value.split(\"|\").map(Number);\n    const e = +$(\"cf_e\").value, b = +$(\"cf_larg\").value, g = +$(\"cf_g\").value;\n    const nt = Math.max(+$(\"cf_nt\").value,1), nl = Math.max(+$(\"cf_nl\").value,1);\n    const alfaE = parseFloat($(\"cf_arr\").value);\n    const df = dFuro(p.d);\n    const dt = p.d/t, C = cfC(p.d, t);\n\n    const FvSd = Fv/n;\n    const corte  = FvRd(p.Ab, c.fub, 0.4);           // rosca no plano (conservador em chapa fina)\n    const esmag  = cfEsmag(p.d, t, fu, alfaE);\n    const rasgo  = cfRasgo(t, e, fu);\n    const r_ = 1/nl;\n    const Ct = cfCt(r_, p.d, g);\n    const An = (b - nt*df)*t;\n    const liquida = Ct*An*fu/GA2/1000;               // total da chapa\n    const rLiq = Fv/liquida;\n\n    const porParafuso = [\n      {m:\"Corte no parafuso\",            v:corte},\n      {m:`Esmagamento (C = ${f(C,2)})`,  v:esmag},\n      {m:\"Rasgamento furo–borda\",        v:rasgo}\n    ];\n    const RdUnit = Math.min(...porParafuso.map(x=>x.v));\n    const govUnit = porParafuso.find(x=>x.v===RdUnit).m;\n    const rUnit = FvSd/RdUnit;\n    const rGlobal = Math.max(rUnit, rLiq);\n\n    $(\"cf_out\").innerHTML =\n      veredito(rGlobal,\"Ligação em chapa fina verificada\",\"Ligação insuficiente\",\n        `d/t = ${f(dt,1)} · governa ${rUnit>=rLiq?govUnit:\"seção líquida\"} · aproveitamento ${f(rGlobal*100)}%`) +\n      `<div class=\"card\">\n        ${dt>22?`<div class=\"verdict warn\" style=\"margin-bottom:14px\"><b>Chapa muito fina para a bitola (d/t = ${f(dt,1)})<\u002Fb>\n          <small>Acima de d/t = 22 o coeficiente de esmagamento cai ao piso C = 1,8 — 25% abaixo do valor da NBR 8800. Usar a formulação de chapa grossa aqui superestimaria a resistência.<\u002Fsmall><\u002Fdiv>`:\"\"}\n        <h2>Verificações por parafuso<\u002Fh2>\n        <table>\n          <tr><th>Modo de falha<\u002Fth><th>F<sub>Rd<\u002Fsub><\u002Fth><th>Aproveit.<\u002Fth><\u002Ftr>\n          ${porParafuso.map(x=>`<tr${x.v===RdUnit?' class=\"hl\"':''}><td>${x.m}<\u002Ftd>\n            <td class=\"n\">${f(x.v)} kN<\u002Ftd><td class=\"n\">${f(FvSd/x.v*100)}%<\u002Ftd><\u002Ftr>`).join(\"\")}\n        <\u002Ftable>\n        <h2 style=\"margin-top:18px\">Seção líquida da chapa<\u002Fh2>\n        <table>\n          <tr><th>Grandeza<\u002Fth><th>Valor<\u002Fth><\u002Ftr>\n          <tr><td>r = 1/n<sub>linhas<\u002Fsub><\u002Ftd><td class=\"n\">${f(r_,3)}<\u002Ftd><\u002Ftr>\n          <tr><td>C<sub>t<\u002Fsub> = 1 − 0,9r + 3r·d/g ≤ 1<\u002Ftd><td class=\"n\">${f(Ct,3)}<\u002Ftd><\u002Ftr>\n          <tr><td>A<sub>n<\u002Fsub> = (b − n<sub>t<\u002Fsub>·d<sub>f<\u002Fsub>)·t<\u002Ftd><td class=\"n\">${f(An,1)} mm²<\u002Ftd><\u002Ftr>\n          <tr class=\"hl\"><td>N<sub>t,Rd<\u002Fsub> da chapa<\u002Ftd><td class=\"n\">${f(liquida)} kN<\u002Ftd><\u002Ftr>\n        <\u002Ftable>\n        <div class=\"bars\">\n          ${bar(\"Parafuso/contato — \"+govUnit, rUnit)}\n          ${bar(\"Seção líquida da chapa\", rLiq)}\n        <\u002Fdiv>\n        <details><summary>Memória de cálculo<\u002Fsummary>\n          <div class=\"calc\">NBR 14762:2010 — item 10.4.3 · chapa ${f(t,2)} mm, aço f<sub>y<\u002Fsub> ${fy} / f<sub>u<\u002Fsub> ${fu}\n\nRelação d/t = ${p.d}/${f(t,2)} = ${f(dt,1)}\nC = ${dt<10?\"3,0 (d/t < 10)\":(dt<=22?`4 − 0,1·(d/t) = ${f(C,2)}`:\"1,8 (d/t > 22)\")}\n\nEsmagamento\nF<sub>c,Rd<\u002Fsub> = α<sub>e<\u002Fsub>·C·d·t·f<sub>u<\u002Fsub>/γ = ${f(alfaE,2)}·${f(C,2)}·${p.d}·${f(t,2)}·${fu}/${f(GA2,2)} = ${f(esmag)} kN\n${alfaE<1?\"Sem arruelas: α<sub>e<\u002Fsub> = 0,75 penaliza em 25%.\":\"\"}\n\nRasgamento furo–borda\nF<sub>c,Rd<\u002Fsub> = t·e·f<sub>u<\u002Fsub>/γ = ${f(t,2)}·${f(e,0)}·${fu}/${f(GA2,2)} = ${f(rasgo)} kN\n\nCorte no parafuso (idêntico à NBR 8800, rosca no plano)\nF<sub>v,Rd<\u002Fsub> = 0,40·${f(p.Ab,2)}·${c.fub}/${f(GA2,2)} = ${f(corte)} kN\n\nSeção líquida com concentração de tensões (chapa parafusada)\nC<sub>t<\u002Fsub> = 1 − 0,9·${f(r_,3)} + 3·${f(r_,3)}·${p.d}/${f(g,0)} = ${f(Ct,3)}\nN<sub>t,Rd<\u002Fsub> = C<sub>t<\u002Fsub>·A<sub>n<\u002Fsub>·f<sub>u<\u002Fsub>/γ = ${f(Ct,3)}·${f(An,1)}·${fu}/${f(GA2,2)} = ${f(liquida)} kN\n\nF<sub>v,Sd<\u002Fsub>/parafuso = ${f(FvSd)} kN → ${rGlobal<=1?\"ATENDE\":\"NÃO ATENDE\"}<\u002Fdiv>\n        <\u002Fdetails>\n      <\u002Fdiv>`;\n  }catch(e){}\n}\n\n/* ---------- FUROS ESPECIAIS ---------- */\nfunction calcFuros(){\n  try{\n    const p = par($(\"fu_d\").value), c = cls($(\"fu_cls\").value);\n    const tipo = $(\"fu_tipo\").value, ori = $(\"fu_ori\").value;\n    const t = num(\"fu_t\",{min:0.5,nome:\"Espessura\"});\n    const fuChapa = +$(\"fu_fu\").value, e = +$(\"fu_e\").value;\n    const mu = parseFloat($(\"fu_mu\").value);\n    const Fv = +$(\"fu_fv\").value;\n\n    const dim = furoDim(p.d, tipo);\n    const hf = furoHf(tipo);\n    const coefs = furoCoefContato(tipo, ori);\n    const restr = furoRestricoes(tipo, ori);\n    const dimPadrao = furoDim(p.d, \"padrao\");\n\n    // pressão de contato: lf usa a dimensão do furo na direção da força\n    const dimNaForca = (tipo===\"curto\"||tipo===\"longo\") ? (ori===\"perp\" ? dim.larg : dim.comp) : dim.larg;\n    const lf = Math.max(e - dimNaForca/2, 0.1);\n    const rasgo = coefs.a*lf*t*fuChapa/GA2/1000;\n    const esmag = coefs.b*p.d*t*fuChapa/GA2/1000;\n    const contato = Math.min(rasgo, esmag);\n    // referência com furo-padrão\n    const lfP = Math.max(e - dimPadrao.larg/2, 0.1);\n    const contatoPadrao = Math.min(1.2*lfP*t*fuChapa/GA2/1000, 2.4*p.d*t*fuChapa/GA2/1000);\n    const perda = (1 - contato/contatoPadrao)*100;\n\n    // escorregamento (por parafuso, 1 superfície) com hf\n    const Fp = 0.70*p.Ab*c.fub/1000;\n    const FsRd = 1.13*mu*Fp*1*hf/1.20;\n    const FsRdPadrao = 1.13*mu*Fp*1*1.0/1.20;\n\n    const rCont = Fv>0 ? Fv/contato : 0;\n\n    $(\"fu_out\").innerHTML =\n      `<div class=\"verdict ${restr.length?\"warn\":\"ok\"}\">\n        <b>Furo ${dim.nome} — ${tipo===\"padrao\"?`Ø ${f(dim.larg,1)} mm`:`${f(dim.larg,1)} × ${f(dim.comp,1)} mm`}<\u002Fb>\n        <small>h<sub>f<\u002Fsub> = ${f(hf,2)} · coeficientes de contato ${f(coefs.a,1)} / ${f(coefs.b,1)}${Fv>0?` · aproveitamento ao contato ${f(rCont*100)}%`:\"\"}<\u002Fsmall><\u002Fdiv>\n      ${restr.length?`<div class=\"verdict warn\" style=\"margin-bottom:0\"><b>Condições de uso obrigatórias<\u002Fb>\n        <small>${restr.join(\"<br>\")}<\u002Fsmall><\u002Fdiv>`:\"\"}\n      <div class=\"card\" style=\"margin-top:16px\">\n        <h2>Efeitos em relação ao furo-padrão<\u002Fh2>\n        <table>\n          <tr><th>Grandeza<\u002Fth><th>Furo-padrão<\u002Fth><th>Furo ${dim.nome}<\u002Fth><th>Variação<\u002Fth><\u002Ftr>\n          <tr><td>Dimensões<\u002Ftd><td class=\"n\">Ø ${f(dimPadrao.larg,1)}<\u002Ftd>\n            <td class=\"n\">${tipo===\"padrao\"?`Ø ${f(dim.larg,1)}`:`${f(dim.larg,1)} × ${f(dim.comp,1)}`}<\u002Ftd><td class=\"n\">—<\u002Ftd><\u002Ftr>\n          <tr><td>Fator h<sub>f<\u002Fsub> (escorregamento)<\u002Ftd><td class=\"n\">1,00<\u002Ftd><td class=\"n\">${f(hf,2)}<\u002Ftd>\n            <td class=\"n\">${hf<1?\"−\"+f((1-hf)*100,0)+\"%\":\"—\"}<\u002Ftd><\u002Ftr>\n          <tr><td>F<sub>s,Rd<\u002Fsub> por parafuso (μ = ${f(mu,2)}, 1 sup.)<\u002Ftd>\n            <td class=\"n\">${f(FsRdPadrao)} kN<\u002Ftd><td class=\"n\">${f(FsRd)} kN<\u002Ftd>\n            <td class=\"n\">${hf<1?\"−\"+f((1-FsRd/FsRdPadrao)*100,0)+\"%\":\"—\"}<\u002Ftd><\u002Ftr>\n          <tr class=\"hl\"><td>Pressão de contato governante<\u002Ftd>\n            <td class=\"n\">${f(contatoPadrao)} kN<\u002Ftd><td class=\"n\">${f(contato)} kN<\u002Ftd>\n            <td class=\"n\">${perda>0.5?\"−\"+f(perda,0)+\"%\":\"—\"}<\u002Ftd><\u002Ftr>\n        <\u002Ftable>\n        ${Fv>0?`<div class=\"bars\">${bar(\"Contato com o furo escolhido\", rCont)}<\u002Fdiv>`:\"\"}\n        <details><summary>Memória de cálculo<\u002Fsummary>\n          <div class=\"calc\">NBR 8800:2008 — Tabela 14 e itens 6.3.3.3 / 6.3.4\n\nFuro ${dim.nome}: ${tipo===\"padrao\"?`Ø ${f(dim.larg,1)} mm`:`${f(dim.larg,1)} × ${f(dim.comp,1)} mm`}\nDimensão na direção da força: ${f(dimNaForca,1)} mm${(tipo===\"curto\"||tipo===\"longo\")?` (rasgo ${ori===\"perp\"?\"perpendicular\":\"paralelo\"})`:\"\"}\n\nPressão de contato (coeficientes ${f(coefs.a,1)} / ${f(coefs.b,1)})\nl<sub>f<\u002Fsub> = e − dim/2 = ${f(e,0)} − ${f(dimNaForca/2,1)} = ${f(lf,1)} mm\nrasgamento  = ${f(coefs.a,1)}·${f(lf,1)}·${f(t,1)}·${fuChapa}/${f(GA2,2)} = ${f(rasgo)} kN\nesmagamento = ${f(coefs.b,1)}·${p.d}·${f(t,1)}·${fuChapa}/${f(GA2,2)} = ${f(esmag)} kN\ngovernante = ${f(contato)} kN (padrão daria ${f(contatoPadrao)} kN)\n\nEscorregamento com h<sub>f<\u002Fsub> = ${f(hf,2)}\nF<sub>s,Rd<\u002Fsub> = 1,13·μ·F<sub>p<\u002Fsub>·n<sub>s<\u002Fsub>·h<sub>f<\u002Fsub>/1,20 = 1,13·${f(mu,2)}·${f(Fp)}·1·${f(hf,2)}/1,20 = ${f(FsRd)} kN\n\nFuros especiais existem para tolerância de montagem e ajuste\nde campo. O preço é pago em resistência ao escorregamento\n(h<sub>f<\u002Fsub>) e, nos rasgos, em pressão de contato — além das\nrestrições construtivas listadas.<\u002Fdiv>\n        <\u002Fdetails>\n      <\u002Fdiv>`;\n  }catch(e){}\n}\n\n/* ---------- SENSIBILIDADE ---------- */\nconst SENS_ESPESSURAS = [4.75, 6.3, 8, 9.5, 12.5, 16, 19, 22.4, 25, 31.5];\nconst SENS_SIGLA = {\n  \"Tração no parafuso\":\"T\", \"Cisalhamento no parafuso\":\"V\", \"Interação tração-cortante\":\"I\",\n  \"Pressão de contato no furo\":\"C\", \"Escoamento da seção bruta\":\"E\",\n  \"Ruptura da seção líquida\":\"R\", \"Rasgamento em bloco\":\"B\"\n};\nfunction sensGrafico(titulo, rotulos, resultados, marcadoIdx){\n  const W = 700, H = 200, x0 = 46, y0 = 168, larg = (W-70)/rotulos.length;\n  const teto = Math.max(1.2, ...resultados.map(r=>r?Math.min(r.rGlobal,2):0));\n  const barras = resultados.map((r,i)=>{\n    if(!r) return \"\";\n    const v = Math.min(r.rGlobal, teto);\n    const h = v/teto*(y0-30);\n    const X = x0 + i*larg + larg*0.15, BW = larg*0.7;\n    const g = grau(r.rGlobal);\n    const cor = g===\"ok\"?\"var(--ok)\":(g===\"warn\"?\"var(--warn)\":\"var(--fail)\");\n    const sig = SENS_SIGLA[r.critico.m]||\"?\";\n    return `<rect x=\"${X.toFixed(1)}\" y=\"${(y0-h).toFixed(1)}\" width=\"${BW.toFixed(1)}\" height=\"${h.toFixed(1)}\"\n              fill=\"${cor}\" opacity=\"${i===marcadoIdx?1:0.72}\" ${i===marcadoIdx?'stroke=\"#101418\" stroke-width=\"1.5\"':''}/>\n            <text x=\"${(X+BW/2).toFixed(1)}\" y=\"${(y0-h-6).toFixed(1)}\" font-size=\"9\" text-anchor=\"middle\" fill=\"#3c4a58\" font-family=\"monospace\">${sig}<\u002Ftext>\n            <text x=\"${(X+BW/2).toFixed(1)}\" y=\"${y0+13}\" font-size=\"9\" text-anchor=\"middle\" fill=\"#6b7986\" font-family=\"monospace\">${rotulos[i]}<\u002Ftext>`;\n  }).join(\"\");\n  const y100 = y0 - (1/teto)*(y0-30);\n  return `<h2 style=\"margin-top:18px\">${titulo}<\u002Fh2>\n    <svg class=\"geo\" viewBox=\"0 0 ${W} ${H}\" role=\"img\" aria-label=\"${titulo}\">\n      <line x1=\"${x0-6}\" y1=\"${y0}\" x2=\"${W-16}\" y2=\"${y0}\" stroke=\"#8b98a5\" stroke-width=\"1\"/>\n      <line x1=\"${x0-6}\" y1=\"${y100.toFixed(1)}\" x2=\"${W-16}\" y2=\"${y100.toFixed(1)}\" stroke=\"#b3261e\" stroke-width=\"1\" stroke-dasharray=\"5 3\"/>\n      <text x=\"${x0-10}\" y=\"${(y100+3).toFixed(1)}\" font-size=\"9\" text-anchor=\"end\" fill=\"#b3261e\" font-family=\"monospace\">100%<\u002Ftext>\n      ${barras}\n    <\u002Fsvg>`;\n}\nfunction calcSensibilidade(){\n  const dados = bibCapturar();\n  const base = avaliarLigacao(dados);\n  if(!base){\n    $(\"se_out\").innerHTML = `<div class=\"card\"><div class=\"verdict warn\"><b>Ligação não configurada<\u002Fb>\n      <small>Preencha a aba “Ligação única” antes de gerar a análise.<\u002Fsmall><\u002Fdiv><\u002Fdiv>`;\n    return;\n  }\n  // varredura de diâmetro\n  const porD = PARAF.map(p=>avaliarLigacao({...dados, u_d:String(p.d)}));\n  const idxD = PARAF.findIndex(p=>String(p.d)===String(dados.u_d));\n  // varredura de espessura\n  const porT = SENS_ESPESSURAS.map(t=>avaliarLigacao({...dados, u_t:String(t)}));\n  const tAtual = +dados.u_t;\n  let idxT = SENS_ESPESSURAS.findIndex(t=>Math.abs(t-tAtual)<0.01);\n\n  // menor opção que atende com folga (≤85%) em cada varredura\n  const dFolga = PARAF.find((p,i)=>porD[i] && porD[i].rGlobal<=0.85 && porD[i].geoFalhas.length===0);\n  const tFolga = SENS_ESPESSURAS.find((t,i)=>porT[i] && porT[i].rGlobal<=0.85 && porT[i].geoFalhas.length===0);\n\n  const legenda = Object.entries(SENS_SIGLA).map(([m,s])=>`<b>${s}<\u002Fb> ${m}`).join(\" · \");\n\n  $(\"se_out\").innerHTML = `<div class=\"card\">\n    <div class=\"verdict ${grau(base.rGlobal)}\">\n      <b>Configuração atual: ${f(base.rGlobal*100)}% — governa ${base.critico.m}<\u002Fb>\n      <small>${base.n} × M${base.p.d} ${base.c.id} · chapa ${f(base.b,0)}×${f(base.t,1)} mm · a barra contornada é a configuração atual<\u002Fsmall>\n    <\u002Fdiv>\n    ${sensGrafico(\"Variação do diâmetro (chapa fixa em \"+f(base.t,1)+\" mm)\",\n      PARAF.map(p=>\"M\"+p.d), porD, idxD)}\n    <p class=\"sub\" style=\"margin-top:6px\">${dFolga\n      ? `Menor bitola com folga (≤ 85%) e geometria regular: <b>M${dFolga.d}<\u002Fb>.`\n      : \"Nenhuma bitola isolada leva a ligação a folga de 15% — atue também na chapa ou no número de parafusos.\"}\n      A letra sobre cada barra indica o estado-limite governante.<\u002Fp>\n    ${sensGrafico(\"Variação da espessura da chapa (parafuso fixo em M\"+base.p.d+\")\",\n      SENS_ESPESSURAS.map(t=>f(t,1)), porT, idxT)}\n    <p class=\"sub\" style=\"margin-top:6px\">${tFolga\n      ? `Menor espessura comercial com folga: <b>${f(tFolga,1)} mm<\u002Fb>.`\n      : \"Nenhuma espessura da série resolve sozinha — o modo governante não depende da chapa.\"}<\u002Fp>\n    <p class=\"sub\" style=\"margin-top:10px;font-family:var(--mono);font-size:11px\">${legenda}<\u002Fp>\n    <details><summary>Leitura da análise<\u002Fsummary>\n      <div class=\"calc\">Cada barra reavalia a ligação completa (sete estados-limite,\nexcentricidade e geometria) trocando apenas o parâmetro varrido.\n\nComo interpretar:\n- Barras que mudam de letra revelam transição de modo governante:\n  aumentar o parafuso além desse ponto não ganha resistência,\n  porque a chapa passa a governar (e vice-versa).\n- Se a letra é E (escoamento) no ponto escolhido, o modo é dúctil —\n  situação preferível sob carga cíclica ou sísmica.\n- Folga de 15% (linha de 85%) é o critério usado pela sugestão\n  automática de bitola nas demais abas.<\u002Fdiv>\n    <\u002Fdetails>\n  <\u002Fdiv>`;\n}\n\n/* ---------- EXCENTRICIDADE ---------- */\nfunction calcExc(){\n  try{\n    const modo = $(\"x_modo\").value;\n    const nc = num(\"x_nc\",{min:1,max:6,inteiro:true,nome:\"Colunas\"});\n    const nr = num(\"x_nr\",{min:1,max:10,inteiro:true,nome:\"Linhas\"});\n    const sx = +$(\"x_sx\").value, sy = +$(\"x_sy\").value;\n    const c = cls($(\"x_cls\").value), p = par($(\"x_d\").value);\n    const planos = +$(\"x_pl\").value, coef = parseFloat($(\"x_rosca\").value);\n    const pts = gerarGrupo(nc, nr, sx, sy);\n    const n = pts.length;\n\n    if (modo === \"cort\"){\n      const V = num(\"x_v\",{min:0.1,nome:\"Cortante\"});\n      const exc = num(\"x_e\",{min:0,nome:\"Excentricidade\"});\n      const el = elasticoVetorial(pts, V, exc);\n      const Rd = FvRd(p.Ab, c.fub, coef)*planos;\n      const r = el.max/Rd;\n      const rMedia = el.media/Rd;\n\n      // desenho do grupo com vetores\n      const mx = Math.max(...pts.map(o=>Math.abs(o.x)))+40, my = Math.max(...pts.map(o=>Math.abs(o.y)))+40;\n      const esc = Math.min(150/mx, 110/my);\n      const cxc = 180, cyc = 130;\n      const vmax = el.max;\n      const marks = el.res.map(o=>{\n        const X = cxc+o.x*esc, Y = cyc-o.y*esc;\n        const L = 34*(o.r/vmax);\n        const ang = Math.atan2(-o.fy, o.fx);\n        const critico = Math.abs(o.r-el.max)<1e-6;\n        return `<line x1=\"${X.toFixed(1)}\" y1=\"${Y.toFixed(1)}\" x2=\"${(X+Math.cos(ang)*L).toFixed(1)}\" y2=\"${(Y+Math.sin(ang)*L).toFixed(1)}\"\n                  stroke=\"${critico?'#b3261e':'#8b98a5'}\" stroke-width=\"${critico?2.2:1.4}\"/>\n                <circle cx=\"${X.toFixed(1)}\" cy=\"${Y.toFixed(1)}\" r=\"5\" fill=\"${critico?'#b3261e':'#fff'}\" stroke=\"#1d2833\" stroke-width=\"1.5\"/>`;\n      }).join(\"\");\n\n      $(\"x_out\").innerHTML =\n        veredito(r,\"Grupo verificado ao cortante excêntrico\",\"Parafuso crítico sobrecarregado\",\n          `Parafuso crítico: ${f(el.max)} kN · média: ${f(el.media)} kN · amplificação ${f(el.fator,3)}×`) +\n        `<div class=\"card\">\n          ${el.fator>1.15?`<div class=\"verdict warn\" style=\"margin-bottom:14px\"><b>Distribuição desigual relevante<\u002Fb>\n            <small>O parafuso mais solicitado recebe ${f((el.fator-1)*100)}% acima da média. Dimensionar pela média subestimaria o esforço em ${f((1-1/el.fator)*100)}%.<\u002Fsmall><\u002Fdiv>`:\"\"}\n          <h2>Distribuição no grupo<\u002Fh2>\n          <p class=\"sub\">Vetores proporcionais à resultante em cada parafuso. O crítico está destacado.<\u002Fp>\n          <svg class=\"geo\" viewBox=\"0 0 360 260\" role=\"img\" aria-label=\"Distribuição de esforços no grupo\">\n            <line x1=\"${cxc}\" y1=\"20\" x2=\"${cxc}\" y2=\"240\" stroke=\"#dde3e8\" stroke
