-width=\"1\" stroke-dasharray=\"4 3\"/>\n            <line x1=\"30\" y1=\"${cyc}\" x2=\"330\" y2=\"${cyc}\" stroke=\"#dde3e8\" stroke-width=\"1\" stroke-dasharray=\"4 3\"/>\n            <line x1=\"${cxc}\" y1=\"${cyc}\" x2=\"${(cxc+exc*esc).toFixed(1)}\" y2=\"${cyc}\" stroke=\"#c8501e\" stroke-width=\"1.6\"/>\n            <circle cx=\"${(cxc+exc*esc).toFixed(1)}\" cy=\"${cyc}\" r=\"4\" fill=\"#c8501e\"/>\n            <text x=\"${(cxc+exc*esc+8).toFixed(0)}\" y=\"${cyc-8}\" font-size=\"10\" fill=\"#c8501e\" font-family=\"monospace\">V, e=${f(exc,0)}<\u002Ftext>\n            ${marks}\n          <\u002Fsvg>\n          <table style=\"margin-top:12px\">\n            <tr><th>Grandeza<\u002Fth><th>Valor<\u002Fth><\u002Ftr>\n            <tr><td>Arranjo<\u002Ftd><td class=\"n\">${nc} × ${nr} = ${n} parafusos<\u002Ftd><\u002Ftr>\n            <tr><td>Momento polar I<sub>p<\u002Fsub><\u002Ftd><td class=\"n\">${f(el.Ip,0)} mm²<\u002Ftd><\u002Ftr>\n            <tr><td>Momento induzido M = V·e<\u002Ftd><td class=\"n\">${f(el.M/1000,1)} kN·m<\u002Ftd><\u002Ftr>\n            <tr><td>Cortante médio V/n<\u002Ftd><td class=\"n\">${f(el.media)} kN<\u002Ftd><\u002Ftr>\n            <tr class=\"hl\"><td>Parafuso crítico<\u002Ftd><td class=\"n\">${f(el.max)} kN<\u002Ftd><\u002Ftr>\n            <tr><td>Fator de amplificação<\u002Ftd><td class=\"n\">${f(el.fator,3)}<\u002Ftd><\u002Ftr>\n            <tr><td>F<sub>v,Rd<\u002Fsub> por parafuso<\u002Ftd><td class=\"n\">${f(Rd)} kN<\u002Ftd><\u002Ftr>\n          <\u002Ftable>\n          <div class=\"bars\">\n            ${bar(\"Parafuso crítico\", r)}\n            ${bar(\"Cálculo pela média (subestimado)\", rMedia)}\n          <\u002Fdiv>\n          <details><summary>Memória de cálculo<\u002Fsummary>\n            <div class=\"calc\">Método elástico vetorial — grupo ${nc}×${nr}, s<sub>x<\u002Fsub> ${f(sx,0)} / s<sub>y<\u002Fsub> ${f(sy,0)} mm\n\nI<sub>p<\u002Fsub> = Σ(x² + y²) = ${f(el.Ip,0)} mm²\nM = V·e = ${f(V)} × ${f(exc,0)} = ${f(el.M/1000,1)} kN·m\n\nEm cada parafuso, superpõem-se:\n  parcela direta   f<sub>y<\u002Fsub> = V/n = ${f(el.media)} kN\n  parcela de momento f<sub>x<\u002Fsub> = −M·y/I<sub>p<\u002Fsub> ; f<sub>y<\u002Fsub> = M·x/I<sub>p<\u002Fsub>\n  resultante r = √(f<sub>x<\u002Fsub>² + f<sub>y<\u002Fsub>²)\n\nParafuso crítico: r = ${f(el.max)} kN (posição x=${f(el.res.find(o=>Math.abs(o.r-el.max)<1e-6).x,0)}, y=${f(el.res.find(o=>Math.abs(o.r-el.max)<1e-6).y,0)} mm)\nAmplificação sobre a média: ${f(el.fator,3)}×\n\nF<sub>v,Rd<\u002Fsub> = ${f(coef,2)}·${f(p.Ab,2)}·${c.fub}/${f(GA2,2)} × ${planos} = ${f(Rd)} kN\n${f(el.max)} kN ${r<=1?\"≤\":\">\"} ${f(Rd)} kN → ${r<=1?\"ATENDE\":\"NÃO ATENDE\"}\n\nO método elástico é conservador. O centro instantâneo de rotação\nfornece resultados mais econômicos, com maior complexidade.<\u002Fdiv>\n          <\u002Fdetails>\n        <\u002Fdiv>`;\n    } else {\n      const M = +$(\"x_m\").value, N = +$(\"x_nx2\").value, dc = +$(\"x_dc\").value;\n      const dist = distribuicaoMomento(pts, M, N, dc);\n      const Rd = FtRd(p.Ab, c.fub);\n      const Tmax = Math.max(...dist.map(l=>l.T));\n      const r = Tmax/Rd;\n\n      $(\"x_out\").innerHTML =\n        veredito(r,\"Grupo verificado ao momento\",\"Linha superior sobrecarregada\",\n          `Linha mais tracionada: ${f(Tmax)} kN/parafuso · F<sub>t,Rd<\u002Fsub> = ${f(Rd)} kN`) +\n        `<div class=\"card\">\n          <h2>Tração por linha de parafusos<\u002Fh2>\n          <p class=\"sub\">Distribuição linear a partir do centro de compressão, situado ${f(dc,0)} mm abaixo da linha inferior.<\u002Fp>\n          <table>\n            <tr><th>Linha<\u002Fth><th>Braço d<\u002Fth><th>Parafusos<\u002Fth><th>T por parafuso<\u002Fth><th>Aproveit.<\u002Fth><\u002Ftr>\n            ${dist.map((l,i)=>`<tr${l.T===Tmax?' class=\"hl\"':''}><td>${i+1}${i===0?\" (superior)\":\"\"}<\u002Ftd>\n              <td class=\"n\">${f(l.d,0)} mm<\u002Ftd><td class=\"n\">${l.n}<\u002Ftd>\n              <td class=\"n\">${f(l.T)} kN<\u002Ftd><td class=\"n\">${f(l.T/Rd*100)}%<\u002Ftd><\u002Ftr>`).join(\"\")}\n          <\u002Ftable>\n          <div class=\"bars\">${bar(\"Linha mais tracionada\", r)}<\u002Fdiv>\n          <details><summary>Memória de cálculo<\u002Fsummary>\n            <div class=\"calc\">Distribuição linear de tração — chapa de topo\nGrupo ${nc}×${nr} · M = ${f(M,1)} kN·m · N = ${f(N)} kN\n\nCentro de compressão a ${f(dc,0)} mm abaixo da linha inferior.\nBraço de cada linha medido a partir desse ponto.\n\nΣ(n<sub>i<\u002Fsub>·d<sub>i<\u002Fsub>²) = ${f(dist.reduce((s,l)=>s+l.n*l.d*l.d,0),0)} mm²\n\nT<sub>i<\u002Fsub> = M·d<sub>i<\u002Fsub>/Σ(n·d²) + N/n\n\nLinha superior: T = ${f(Tmax)} kN\nF<sub>t,Rd<\u002Fsub> = 0,75·${f(p.Ab,2)}·${c.fub}/${f(GA2,2)} = ${f(Rd)} kN\n${f(Tmax)} kN ${r<=1?\"≤\":\">\"} ${f(Rd)} kN → ${r<=1?\"ATENDE\":\"NÃO ATENDE\"}\n\nEsta distribuição não inclui o efeito alavanca. Verifique-o na\naba de tração com a espessura real da chapa de topo.<\u002Fdiv>\n          <\u002Fdetails>\n        <\u002Fdiv>`;\n    }\n  }catch(e){}\n}\n\n/* ---------- CAPACIDADE (VERIFICAÇÃO INVERSA) ---------- */\nfunction calcCapacidade(){\n  try{\n    const n = num(\"p_n\",{min:1,inteiro:true,nome:\"Número de parafusos\"});\n    const t = num(\"p_t\",{min:0.5,nome:\"Espessura\"});\n    const c = cls($(\"p_cls\").value), p = par($(\"p_d\").value);\n    const planos = +$(\"p_pl\").value, coef = parseFloat($(\"p_rosca\").value);\n    const [fy,fu] = $(\"p_aco\").value.split(\"|\").map(Number);\n    const b = +$(\"p_larg\").value, nt = +$(\"p_nl\").value;\n    const e = +$(\"p_e\").value, pp = +$(\"p_p\").value, eg = +$(\"p_eg\").value;\n    const L = +$(\"p_lig\").value;\n    const df = dFuro(p.d);\n    const nl = Math.max(Math.round(n/nt),1);\n    const red = redutorLongo(L, p.d);\n\n    /* --- capacidade ao cisalhamento --- */\n    const corte = FvRd(p.Ab,c.fub,coef)*planos*n*red;\n    const lf = Math.max(Math.min(e - df/2, pp - df), 0.1);\n    const cont = FcRd(lf, p.d, t, fu, true);\n    const contato = cont.valor*n;\n\n    /* --- capacidade do metal-base --- */\n    const Ag = b*t, An = Ag - nt*df*t;\n    const escoa = NtEscoa(Ag, fy);\n    const rupt  = NtRuptura(An, fu, 0.85);\n    const Lgv = e + (nl-1)*pp, Lnv = Lgv - (nl-0.5)*df;\n    const Agv = 2*Lgv*t, Anv = 2*Math.max(Lnv,0.1)*t;\n    const Ant = Math.max((nt-1)*70 - (nt-1)*df, 0.1)*t;\n    const bs = blockShear(Agv, Anv, Ant, fy, fu, 1.0);\n\n    /* --- capacidade à tração --- */\n    const tracao = FtRd(p.Ab,c.fub)*n;\n\n    const modosV = [\n      {m:\"Corte nos parafusos\",        v:corte,      ref:\"6.3.3.3-a\"},\n      {m:\"Pressão de contato no furo\", v:contato,    ref:\"6.3.3.3-b\"},\n      {m:\"Escoamento da seção bruta\",  v:escoa,      ref:\"6.2.1\"},\n      {m:\"Ruptura da seção líquida\",   v:rupt,       ref:\"6.2.2\"},\n      {m:\"Rasgamento em bloco\",        v:bs.valor,   ref:\"6.5.6\"}\n    ];\n    const Vmax = Math.min(...modosV.map(x=>x.v));\n    const govV = modosV.find(x=>x.v===Vmax).m;\n\n    $(\"p_out\").innerHTML =\n      `<div class=\"verdict ok\"><b>Capacidade da ligação: ${f(Vmax)} kN à força axial<\u002Fb>\n        <small>Modo governante: ${govV} · tração pura isolada: ${f(tracao)} kN${red<1?` · redutor de ligação longa aplicado: ${f(red,3)}`:\"\"}<\u002Fsmall><\u002Fdiv>\n      <div class=\"card\">\n        <h2>Capacidade por estado-limite<\u002Fh2>\n        <p class=\"sub\">O menor valor define a capacidade da ligação. A diferença entre ele e o segundo colocado indica a folga real do projeto.<\u002Fp>\n        <table>\n          <tr><th>Estado-limite<\u002Fth><th>Item<\u002Fth><th>Capacidade<\u002Fth><th>Reserva<\u002Fth><\u002Ftr>\n          ${modosV.slice().sort((a,z)=>a.v-z.v).map(x=>`<tr${x.v===Vmax?' class=\"hl\"':''}>\n            <td>${x.m}<\u002Ftd><td class=\"n\">${x.ref}<\u002Ftd><td class=\"n\">${f(x.v)} kN<\u002Ftd>\n            <td class=\"n\">${x.v===Vmax?\"—\":\"+\"+f((x.v/Vmax-1)*100)+\"%\"}<\u002Ftd><\u002Ftr>`).join(\"\")}\n        <\u002Ftable>\n        <div class=\"bars\" style=\"margin-top:12px\">\n          ${modosV.slice().sort((a,z)=>a.v-z.v).map(x=>bar(x.m, Vmax/x.v)).join(\"\")}\n        <\u002Fdiv>\n        <table style=\"margin-top:14px\">\n          <tr><th>Configuração conferida<\u002Fth><th>Valor<\u002Fth><\u002Ftr>\n          <tr><td>Parafusos<\u002Ftd><td class=\"n\">${n} × M${p.d} · ${c.nome}<\u002Ftd><\u002Ftr>\n          <tr><td>Arranjo estimado<\u002Ftd><td class=\"n\">${nl} linha(s) × ${nt} coluna(s)<\u002Ftd><\u002Ftr>\n          <tr><td>Chapa<\u002Ftd><td class=\"n\">${f(b,0)} × ${f(t,1)} mm · f<sub>y<\u002Fsub> ${fy} / f<sub>u<\u002Fsub> ${fu}<\u002Ftd><\u002Ftr>\n          <tr><td>Comprimento da ligação<\u002Ftd><td class=\"n\">${f(L,0)} mm ${L>5*p.d?`(> 5d = ${f(5*p.d,0)} mm)`:`(≤ 5d)`}<\u002Ftd><\u002Ftr>\n          <tr><td>Capacidade à tração pura<\u002Ftd><td class=\"n\">${f(tracao)} kN<\u002Ftd><\u002Ftr>\n        <\u002Ftable>\n        <details><summary>Memória de cálculo<\u002Fsummary>\n          <div class=\"calc\">Verificação inversa — capacidade máxima da ligação\n\nCorte nos parafusos\nF<sub>v,Rd<\u002Fsub> = ${f(coef,2)}·${f(p.Ab,2)}·${c.fub}/${f(GA2,2)} × ${planos} × ${n} × ${f(red,3)} = ${f(corte)} kN\n\nPressão de contato (l<sub>f<\u002Fsub> = ${f(lf,1)} mm, governa ${cont.governa})\nF<sub>c,Rd<\u002Fsub> = ${f(cont.valor)} × ${n} = ${f(contato)} kN\n\nMetal-base\nescoamento bruta   = ${f(Ag,0)}·${fy}/${f(GA1,2)} = ${f(escoa)} kN\nruptura líquida    = 0,85·${f(An,0)}·${fu}/${f(GA2,2)} = ${f(rupt)} kN\nrasgamento bloco   = ${f(bs.valor)} kN (${bs.governa})\n\nCAPACIDADE = min(...) = ${f(Vmax)} kN\nGoverna: ${govV}\n\nReserva sobre o segundo modo mais crítico:\n${(()=>{const s=modosV.slice().sort((a,z)=>a.v-z.v);return f((s[1].v/s[0].v-1)*100)+\"% (\"+s[1].m+\")\";})()}\n\nLeitura de conferência: quando a reserva entre o primeiro e o\nsegundo modo é pequena, a ligação não tem hierarquia clara de\nfalha. Em projeto sismo-resistente ou com carga cíclica,\nprefira que o modo dúctil (escoamento) governe sobre os\nmodos frágeis (ruptura, rasgamento).<\u002Fdiv>\n        <\u002Fdetails>\n      <\u002Fdiv>`;\n  }catch(e){}\n}\n\n/* ---------- LIGAÇÃO ÚNICA (VERIFICAÇÃO INTEGRADA) ---------- */\n/* ---------- Núcleo de avaliação da ligação (puro, reutilizável) ---------- */\n// Recebe os valores brutos de uma ligação e devolve todos os resultados,\n// sem tocar no DOM. Usado tanto pela aba integrada quanto pelo relatório.\nfunction avaliarLigacao(d){\n  const nc = +d.u_nc, nr = +d.u_nr, t = +d.u_t;\n  const c = cls(d.u_cls), p = par(d.u_d);\n  if(!c || !p || !isFinite(nc) || !isFinite(nr) || !isFinite(t)) return null;\n  const Ft = +d.u_ft || 0, Fv = +d.u_fv || 0;\n  const planos = +d.u_pl, coef = parseFloat(d.u_rosca);\n  const [fy,fu] = String(d.u_aco||\"250|400\").split(\"|\").map(Number);\n  const b = +d.u_larg, sx = +d.u_sx, sy = +d.u_sy;\n  const e = +d.u_e, eg = +d.u_eg, exc = +d.u_exc || 0;\n  const n = nc*nr, df = dFuro(p.d);\n\n  /* excentricidade */\n  const pts = gerarGrupo(nc, nr, sx, sy);\n  const el = elasticoVetorial(pts, Fv, exc);\n  const FvCrit = el.max, FtUnit = Ft/n;\n\n  /* parafuso */\n  const ftRd = FtRd(p.Ab, c.fub);\n  const fvRd = FvRd(p.Ab, c.fub, coef)*planos;\n  const rT = FtUnit/ftRd, rV = FvCrit/fvRd;\n  const interacao = rT*rT + rV*rV;\n\n  /* pressão de contato */\n  const lf = Math.max(Math.min(e - df/2, sy - df), 0.1);\n  const cont = FcRd(lf, p.d, t, fu, true);\n  const rC = FvCrit/cont.valor;\n\n  /* metal-base */\n  const Ag = b*t, An = Ag - nc*df*t;\n  const escoa = NtEscoa(Ag, fy), rupt = NtRuptura(An, fu, 0.85);\n  const Lgv = e + (nr-1)*sy, Lnv = Lgv - (nr-0.5)*df;\n  const Agv = 2*Lgv*t, Anv = 2*Math.max(Lnv,0.1)*t;\n  const Ant = Math.max((nc-1)*sx - (nc-1)*df, 0.1)*t;\n  const bs = blockShear(Agv, Anv, Ant, fy, fu, 1.0);\n  const rEsc = Ft/escoa, rRup = Ft/rupt, rBS = Fv/bs.valor;\n\n  /* geometria */\n  const pMin = 3*p.d, eMin = 1.25*df, eMax = Math.min(12*t,150), pMax = Math.min(24*t,300);\n  const geoFalhas = [];\n  if(sy < pMin) geoFalhas.push(`s<sub>y<\u002Fsub> = ${f(sy,0)} mm < 3d = ${f(pMin,0)} mm`);\n  if(sx < pMin) geoFalhas.push(`s<sub>x<\u002Fsub> = ${f(sx,0)} mm < 3d = ${f(pMin,0)} mm`);\n  if(e < eMin)  geoFalhas.push(`e = ${f(e,0)} mm < ${f(eMin,1)} mm`);\n  if(eg < eMin) geoFalhas.push(`e<sub>g<\u002Fsub> = ${f(eg,0)} mm < ${f(eMin,1)} mm`);\n  if(e > eMax)  geoFalhas.push(`e = ${f(e,0)} mm > ${f(eMax,0)} mm`);\n  if(sy > pMax) geoFalhas.push(`s<sub>y<\u002Fsub> = ${f(sy,0)} mm > ${f(pMax,0)} mm`);\n\n  const verif = [\n    {m:\"Tração no parafuso\",         r:rT,        lim:`${f(ftRd)} kN/paraf.`, tipo:\"frágil\"},\n    {m:\"Cisalhamento no parafuso\",   r:rV,        lim:`${f(fvRd)} kN/paraf.`, tipo:\"frágil\"},\n    {m:\"Interação tração-cortante\",  r:interacao, lim:\"1,000\",                tipo:\"frágil\"},\n    {m:\"Pressão de contato no furo\", r:rC,        lim:`${f(cont.valor)} kN/paraf.`, tipo:\"dúctil\"},\n    {m:\"Escoamento da seção bruta\",  r:rEsc,      lim:`${f(escoa)} kN`,       tipo:\"dúctil\"},\n    {m:\"Ruptura da seção líquida\",   r:rRup,      lim:`${f(rupt)} kN`,        tipo:\"frágil\"},\n    {m:\"Rasgamento em bloco\",        r:rBS,       lim:`${f(bs.valor)} kN`,    tipo:\"frágil\"}\n  ].sort((a,z)=>z.r-a.r);\n\n  const critico = verif[0];\n  return {\n    nc, nr, n, t, b, sx, sy, e, eg, exc, c, p, planos, coef, fy, fu, df, Ft, Fv,\n    el, FvCrit, FtUnit, ftRd, fvRd, rT, rV, interacao, lf, cont, rC,\n    Ag, An, escoa, rupt, bs, rEsc, rRup, rBS, geoFalhas, verif,\n    critico, rGlobal: critico.r,\n    reprovados: verif.filter(v=>v.r>1),\n    fragilGoverna: critico.tipo === \"frágil\",\n    atende: critico.r <= 1 && geoFalhas.length === 0\n  };\n}\n\nfunction calcUnica(){\n  try{\n    const nome = esc($(\"u_nome\").value || \"Ligação sem identificação\");\n    const dados = bibCapturar();\n    const A = avaliarLigacao(dados);\n    if(!A){ $(\"u_out\").innerHTML = `<div class=\"card\"><div class=\"verdict fail\"><b>Dados incompletos<\u002Fb><small>Verifique os campos da ligação.<\u002Fsmall><\u002Fdiv><\u002Fdiv>`; return; }\n    const {nc,nr,n,t,b,sx,sy,e,eg,exc,c,p,planos,coef,fy,fu,Ft,Fv,el,FvCrit,\n           ftRd,fvRd,rT,rV,interacao,lf,cont,rC,Ag,An,escoa,rupt,bs,rEsc,rRup,rBS,\n           geoFalhas,verif,critico,rGlobal,reprovados,fragilGoverna} = A;\n    // valida os campos numéricos para exibir mensagens de erro nos inputs\n    num(\"u_nc\",{min:1,max:6,inteiro:true,nome:\"Colunas\"});\n    num(\"u_nr\",{min:1,max:10,inteiro:true,nome:\"Linhas\"});\n    num(\"u_t\",{min:0.5,nome:\"Espessura\"});\n\n    $(\"u_out\").innerHTML =\n      veredito(rGlobal,`${nome} — verificada`,`${nome} — ${reprovados.length} verificação(ões) não atendida(s)`,\n        `Governa: ${critico.m} (${f(rGlobal*100)}%) · ${n} × M${p.d} ${c.nome} · chapa ${f(b,0)}×${f(t,1)} mm`) +\n      `<div class=\"card\">\n        ${geoFalhas.length?`<div class=\"verdict fail\" style=\"margin-bottom:14px\"><b>Geometria fora dos limites<\u002Fb>\n          <small>${geoFalhas.join(\" · \")}<\u002Fsmall><\u002Fdiv>`:\"\"}\n        ${fragilGoverna && rGlobal<=1 ?`<div class=\"verdict warn\" style=\"margin-bottom:14px\"><b>Modo frágil governa<\u002Fb>\n          <small>O estado-limite crítico é ${critico.m}, de natureza frágil. Em estrutura sujeita a carga cíclica ou sísmica, prefira que um modo dúctil (escoamento da seção bruta ou pressão de contato) governe, garantindo aviso antes da ruína.<\u002Fsmall><\u002Fdiv>`:\"\"}\n        ${el.fator>1.15?`<div class=\"verdict warn\" style=\"margin-bottom:14px\"><b>Cortante excêntrico<\u002Fb>\n          <small>e<sub>v<\u002Fsub> = ${f(exc,0)} mm amplifica o esforço no parafuso crítico em ${f((el.fator-1)*100)}% sobre a média (${f(el.media)} → ${f(el.max)} kN).<\u002Fsmall><\u002Fdiv>`:\"\"}\n\n        <h2>Quadro-resumo de verificações<\u002Fh2>\n        <p class=\"sub\">Todos os estados-limite avaliados com o mesmo parafuso e a mesma chapa. Ordenados do mais crítico ao menos.<\u002Fp>\n        <table>\n          <tr><th>Estado-limite<\u002Fth><th>Natureza<\u002Fth><th>Resistência<\u002Fth><th>Aproveit.<\u002Fth><th>Situação<\u002Fth><\u002Ftr>\n          ${verif.map(v=>`<tr${v===critico?' class=\"hl\"':''}>\n            <td>${v.m}<\u002Ftd>\n            <td><span class=\"tag ${v.tipo===\"dúctil\"?\"n\":\"\"}\">${v.tipo}<\u002Fspan><\u002Ftd>\n            <td class=\"n\">${v.lim}<\u002Ftd>\n            <td class=\"n\">${f(v.r*100)}%<\u002Ftd>\n            <td class=\"n\" style=\"color:${v.r<=0.85?'var(--ok)':(v.r<=1?'var(--warn)':'var(--fail)')}\">${v.r<=1?\"atende\":\"não atende\"}<\u002Ftd>\n          <\u002Ftr>`).join(\"\")}\n        <\u002Ftable>\n        <div class=\"bars\" style=\"margin-top:12px\">${verif.map(v=>bar(v.m, v.r)).join(\"\")}<\u002Fdiv>\n\n        <h2 style=\"margin-top:18px\">Configuração verificada<\u002Fh2>\n        <table>\n          <tr><th>Item<\u002Fth><th>Valor<\u002Fth><\u002Ftr>\n          <tr><td>Identificação<\u002Ftd><td class=\"n\">${nome}<\u002Ftd><\u002Ftr>\n          <tr><td>Parafusos<\u002Ftd><td class=\"n\">${nc} × ${nr} = ${n} un. M${p.d} · ${c.nome}<\u002Ftd><\u002Ftr>\n          <tr><td>Espaçamentos s<sub>x<\u002Fsub> / s<sub>y<\u002Fsub><\u002Ftd><td class=\"n\">${f(sx,0)} / ${f(sy,0)} mm<\u002Ftd><\u002Ftr>\n          <tr><td>Bordas e / e<sub>g<\u002Fsub><\u002Ftd><td class=\"n\">${f(e,0)} / ${f(eg,0)} mm<\u002Ftd><\u002Ftr>\n          <tr><td>Chapa<\u002Ftd><td class=\"n\">${f(b,0)} × ${f(t,1)} mm · f<sub>y<\u002Fsub> ${fy} / f<sub>u<\u002Fsub> ${fu}<\u002Ftd><\u002Ftr>\n          <tr><td>Esforços F<sub>t,Sd<\u002Fsub> / F<sub>v,Sd<\u002Fsub><\u002Ftd><td class=\"n\">${f(Ft)} / ${f(Fv)} kN<\u002Ftd><\u002Ftr>\n          <tr><td>Excentricidade do cortante<\u002Ftd><td class=\"n\">${f(exc,0)} mm<\u002Ftd><\u002Ftr>\n          <tr><td>Cortante no parafuso crítico<\u002Ftd><td class=\"n\">${f(FvCrit)} kN<\u002Ftd><\u002Ftr>\n        <\u002Ftable>\n\n        <details><summary>Memória de cálculo consolidada<\u002Fsummary>\n          <div class=\"calc\">${nome}\nGrupo ${nc}×${nr} · M${p.d} ${c.nome} · chapa ${f(b,0)}×${f(t,1)} mm (f<sub>y<\u002Fsub> ${fy} / f<sub>u<\u002Fsub> ${fu})\nF<sub>t,Sd<\u002Fsub> = ${f(Ft)} kN · F<sub>v,Sd<\u002Fsub> = ${f(Fv)} kN · e<sub>v<\u002Fsub> = ${f(exc,0)} mm\n\nDISTRIBUIÇÃO NO GRUPO\nI<sub>p<\u002Fsub> = ${f(el.Ip,0)} mm² · M = V·e = ${f(el.M/1000,1)} kN·m\ncortante médio = ${f(el.media)} kN · crítico = ${f(el.max)} kN (fator ${f(el.fator,3)})\n\nPARAFUSO\nF<sub>t,Rd<\u002Fsub> = 0,75·${f(p.Ab,2)}·${c.fub}/${f(GA2,2)} = ${f(ftRd)} kN → ${f(rT*100)}%\nF<sub>v,Rd<\u002Fsub> = ${f(coef,2)}·${f(p.Ab,2)}·${c.fub}/${f(GA2,2)}×${planos} = ${f(fvRd)} kN → ${f(rV*100)}%\ninteração = ${f(rT*rT,3)} + ${f(rV*rV,3)} = ${f(interacao,3)}\n\nPRESSÃO DE CONTATO\nl<sub>f<\u002Fsub> = ${f(lf,1)} mm · governa ${cont.governa} → ${f(cont.valor)} kN → ${f(rC*100)}%\n\nMETAL-BASE\nescoamento bruta = ${f(Ag,0)}·${fy}/${f(GA1,2)} = ${f(escoa)} kN → ${f(rEsc*100)}%\nruptura líquida  = 0,85·${f(An,0)}·${fu}/${f(GA2,2)} = ${f(rupt)} kN → ${f(rRup*100)}%\nrasgamento bloco = ${f(bs.valor)} kN (${bs.governa}) → ${f(rBS*100)}%\n\nGEOMETRIA\n${geoFalhas.length ? geoFalhas.map(g=>\"  ✗ \"+g.replace(/<[^>]+>/g,\"\")).join(\"\\n\") : \"  todos os limites atendidos\"}\n\nCONCLUSÃO\nEstado-limite governante: ${critico.m} (${f(rGlobal*100)}%, natureza ${critico.tipo})\n${rGlobal<=1 ? \"A ligação atende a todos os estados-limite verificados.\" : `NÃO ATENDE — revisar: ${reprovados.map(v=>v.m).join(\", \")}`}\n${fragilGoverna && rGlobal<=1 ? \"\\nAtenção: o modo governante é frágil. Sob carga cíclica ou sísmica,\\nredimensione para que um modo dúctil governe.\" : \"\"}<\u002Fdiv>\n        <\u002Fdetails>\n      <\u002Fdiv>`;\n  }catch(e){}\n}\n\n/* ---------- BIBLIOTECA DE LIGAÇÕES ---------- */\nconst BIB_CHAVE = \"parafusopro.biblioteca.v1\";\n// campos que definem uma ligação da aba integrada\nconst BIB_CAMPOS = [\"u_nome\",\"u_ft\",\"u_fv\",\"u_cls\",\"u_d\",\"u_nc\",\"u_nr\",\"u_pl\",\"u_rosca\",\n  \"u_t\",\"u_larg\",\"u_aco\",\"u_sx\",\"u_sy\",\"u_e\",\"u_eg\",\"u_exc\"];\n\n// escapa conteúdo de origem externa antes de inserir no DOM\nfunction esc(s){\n  return String(s).replace(/[&<>\"']/g, ch =>\n    ({\"&\":\"&amp;\",\"<\":\"&lt;\",\">\":\"&gt;\",'\"':\"&quot;\",\"'\":\"&#39;\"}[ch]));\n}\nfunction bibLer(){\n  try{ const v = JSON.parse(localStorage.getItem(BIB_CHAVE)||\"[]\"); return Array.isArray(v)?v:[]; }\n  catch(e){ return []; }\n}\nfunction bibGravar(lista){\n  try{ localStorage.setItem(BIB_CHAVE, JSON.stringify(lista)); return true; }\n  catch(e){ return false; }\n}\nfunction bibStatus(msg, erro){\n  const el = $(\"e_u_bib\");\n  el.textContent = msg;\n  el.style.color = erro ? \"var(--fail)\" : \"var(--ok)\";\n  if(!erro) setTimeout(()=>{ if(el.textContent===msg) el.textContent=\"\"; }, 4000);\n}\n// coleta o estado atual dos campos da ligação\nfunction bibCapturar(){\n  const dados = {};\n  BIB_CAMPOS.forEach(id=>{ if($(id)) dados[id]=$(id).value; });\n  return dados;\n}\n// resumo curto para exibir na lista, tolerante a registros incompletos\nfunction bibResumo(d){\n  const p = par(d.u_d), c = cls(d.u_cls);\n  const nc = +d.u_nc, nr = +d.u_nr;\n  const partes = [];\n  const bitola = p ? `M${p.d}` : (d.u_d ? `M${esc(d.u_d)}` : \"bitola n/d\");\n  const classe = c ? c.id : (d.u_cls ? esc(d.u_cls) : \"\");\n  partes.push(isFinite(nc)&&isFinite(nr) ? `${nc*nr} × ${bitola}${classe?\" \"+classe:\"\"}` : `${bitola}${classe?\" \"+classe:\"\"}`);\n  if(isFinite(+d.u_larg) && isFinite(+d.u_t)) partes.push(`chapa ${f(+d.u_larg,0)}×${f(+d.u_t,1)} mm`);\n  const ft = +d.u_ft, fv = +d.u_fv;\n  if(isFinite(ft) || isFinite(fv))\n    partes.push(`F<sub>t<\u002Fsub> ${isFinite(ft)?f(ft,0):\"—\"} / F<sub>v<\u002Fsub> ${isFinite(fv)?f(fv,0):\"—\"} kN`);\n  return partes.join(\" · \") || \"registro incompleto\";\n}\nfunction bibRenderizar(){\n  const lista = bibLer();\n  const cx = $(\"u_bib\");\n  if(!lista.length){\n    cx.innerHTML = `<div class=\"bib-vazia\">Nenhuma ligação salva. Configure uma ligação acima e use “Salvar esta ligação”.<\u002Fdiv>`;\n    return;\n  }\n  cx.innerHTML = lista.map((it,i)=>`\n    <div class=\"bib-item\">\n      <div class=\"bib-info\">\n        <div class=\"bib-nome\">${esc(it.nome)}<\u002Fdiv>\n        <div class=\"bib-meta\">${bibResumo(it.dados)}<\u002Fdiv>\n      <\u002Fdiv>\n      <button class=\"bib-acao\" data-carregar=\"${i}\">Carregar<\u002Fbutton>\n      <button class=\"bib-acao del\" data-excluir=\"${i}\" aria-label=\"Excluir ${esc(it.nome)}\">Excluir<\u002Fbutton>\n    <\u002Fdiv>`).join(\"\");\n  cx.querySelectorAll(\"[data-carregar]\").forEach(b=>\n    b.addEventListener(\"click\",()=>bibCarregar(+b.dataset.carregar)));\n  cx.querySelectorAll(\"[data-excluir]\").forEach(b=>\n    b.addEventListener(\"click\",()=>bibExcluir(+b.dataset.excluir)));\n}\nfunction bibSalvar(){\n  const nome = ($(\"u_nome\").value||\"\").trim();\n  if(!nome){ bibStatus(\"Informe uma identificação para a ligação antes de salvar.\", true); return; }\n  const lista = bibLer();\n  const dados = bibCapturar();\n  const existente = lista.findIndex(it=>it.nome===nome);\n  const registro = {nome, dados, salvo:new Date().toISOString()};\n  if(existente>=0) lista[existente] = registro; else lista.push(registro);\n  if(bibGravar(lista)){\n    bibRenderizar();\n    bibStatus(existente>=0 ? `“${nome}” atualizada.` : `“${nome}” salva na biblioteca.`);\n  } else {\n    bibStatus(\"Não foi possível gravar. Armazenamento do navegador indisponível ou cheio.\", true);\n  }\n}\nfunction bibCarregar(i){\n  const it = bibLer()[i];\n  if(!it) return;\n  Object.entries(it.dados).forEach(([id,v])=>{ if($(id)) $(id).value = v; });\n  calcUnica();\n  salvar();\n  bibStatus(`“${it.nome}” carregada.`);\n}\nfunction bibExcluir(i){\n  const lista = bibLer();\n  const it = lista[i];\n  if(!it) return;\n  lista.splice(i,1);\n  bibGravar(lista);\n  bibRenderizar();\n  bibStatus(`“${it.nome}” removida.`);\n}\nfunction bibExportar(){\n  const lista = bibLer();\n  if(!lista.length){ bibStatus(\"Nada a exportar: a biblioteca está vazia.\", true); return; }\n  const pacote = {aplicacao:\"ParafusoPro\", formato:\"biblioteca-ligacoes\", versao:1,\n                  exportado:new Date().toISOString(), ligacoes:lista};\n  try{\n    const blob = new Blob([JSON.stringify(pacote,null,2)], {type:\"application/json\"});\n    const url = URL.createObjectURL(blob);\n    const a = document.createElement(\"a\");\n    const carimbo = new Date().toISOString().slice(0,10);\n    a.href = url; a.download = `parafusopro-ligacoes-${carimbo}.json`;\n    document.body.appendChild(a); a.click(); document.body.removeChild(a);\n    setTimeout(()=>URL.revokeObjectURL(url), 1000);\n    bibStatus(`${lista.length} ligação(ões) exportada(s).`);\n  }catch(e){\n    bibStatus(\"Exportação indisponível neste navegador.\", true);\n  }\n}\n// valida e mescla um pacote importado; retorna {ok, msg}\nfunction bibImportarPacote(texto){\n  let pacote;\n  try{ pacote = JSON.parse(texto); }\n  catch(e){ return {ok:false, msg:\"Arquivo inválido: não é um JSON legível.\"}; }\n  const entradas = Array.isArray(pacote) ? pacote : pacote.ligacoes;\n  if(!Array.isArray(entradas)) return {ok:false, msg:\"Arquivo sem lista de ligações reconhecível.\"};\n  const validas = entradas.filter(it=>it && typeof it.nome===\"string\" && it.dados && typeof it.dados===\"object\");\n  if(!validas.length) return {ok:false, msg:\"Nenhuma ligação válida encontrada no arquivo.\"};\n  const lista = bibLer();\n  let novas=0, atualizadas=0;\n  validas.forEach(it=>{\n    // mantém apenas campos conhecidos, descartando conteúdo estranho\n    const limpos = {};\n    BIB_CAMPOS.forEach(id=>{ if(it.dados[id]!==undefined) limpos[id]=String(it.dados[id]); });\n    const reg = {nome:it.nome, dados:limpos, salvo:it.salvo||new Date().toISOString()};\n    const j = lista.findIndex(x=>x.nome===reg.nome);\n    if(j>=0){ lista[j]=reg; atualizadas++; } else { lista.push(reg); novas++; }\n  });\n  if(!bibGravar(lista)) return {ok:false, msg:\"Não foi possível gravar as ligações importadas.\"};\n  const partes = [];\n  if(novas) partes.push(`${novas} nova(s)`);\n  if(atualizadas) partes.push(`${atualizadas} atualizada(s)`);\n  const ignoradas = entradas.length - validas.length;\n  return {ok:true, msg:`Importação concluída: ${partes.join(\" e \")}${ignoradas?` · ${ignoradas} entrada(s) ignorada(s)`:\"\"}.`};\n}\nfunction bibImportar(evt){\n  const arq = evt.target.files && evt.target.files[0];\n  if(!arq) return;\n  const leitor = new FileReader();\n  leitor.onload = ()=>{\n    const r = bibImportarPacote(String(leitor.result));\n    if(r.ok) bibRenderizar();\n    bibStatus(r.msg, !r.ok);\n    evt.target.value = \"\";\n  };\n  leitor.onerror = ()=>{ bibStatus(\"Falha ao ler o arquivo.\", true); evt.target.value=\"\"; };\n  leitor.readAsText(arq);\n}\n\n/* ---------- RELATÓRIO CONSOLIDADO ---------- */\nfunction relDataHora(){\n  const d = new Date();\n  return d.toLocaleDateString(\"pt-BR\") + \" às \" + d.toLocaleTimeString(\"pt-BR\",{hour:\"2-digit\",minute:\"2-digit\"});\n}\nfunction relSituacao(A){\n  if(!A) return {cls:\"fail\", txt:\"dados incompletos\"};\n  if(A.geoFalhas.length) return {cls:\"fail\", txt:\"geometria irregular\"};\n  if(A.rGlobal > 1) return {cls:\"fail\", txt:\"não atende\"};\n  if(A.rGlobal > 0.85) return {cls:\"warn\", txt:\"atende no limite\"};\n  return {cls:\"ok\", txt:\"atende\"};\n}\nfunction relMiniBar(r){\n  const g = grau(r), pct = Math.min(r*100,100);\n  return `<div class=\"minibar\"><div class=\"fill ${g}\" style=\"width:${pct}%;background:var(--${g===\"ok\"?\"ok\":(g===\"warn\"?\"warn\":\"fail\")})\"><\u002Fdiv><\u002Fdiv>`;\n}\nfunction gerarRelatorio(){\n  const lista = bibLer();\n  if(!lista.length){\n    $(\"r_out\").innerHTML = `<div class=\"card\"><div class=\"verdict warn\"><b>Biblioteca vazia<\u002Fb>\n      <small>Salve ao menos uma ligação na aba “Ligação única” antes de gerar o relatório.<\u002Fsmall><\u002Fdiv><\u002Fdiv>`;\n    return;\n  }\n  const obra = esc(($(\"r_obra\").value||\"\").trim()) || \"Obra não identificada\";\n  const resp = esc(($(\"r_resp\").value||\"\").trim()) || \"—\";\n  const docref = esc(($(\"r_doc\").value||\"\").trim()) || \"—\";\n  const completo = $(\"r_detalhe\").value === \"completo\";\n\n  // avalia todas as ligações\n  const itens = lista.map(it=>({nome:esc(it.nome), dados:it.dados, A:avaliarLigacao(it.dados)}));\n  const validos = itens.filter(i=>i.A);\n  const invalidos = itens.filter(i=>!i.A);\n\n  // estatísticas do conjunto\n  const naoAtende = validos.filter(i=>!i.A.atende);\n  const noLimite  = validos.filter(i=>i.A.atende && i.A.rGlobal > 0.85);\n  const fragil    = validos.filter(i=>i.A.atende && i.A.fragilGoverna);\n  const maisCrit  = validos.slice().sort((a,z)=>z.A.rGlobal-a.A.rGlobal)[0];\n\n  // distribuição dos modos governantes\n  const modos = {};\n  validos.forEach(i=>{ modos[i.A.critico.m] = (modos[i.A.critico.m]||0)+1; });\n  const modosOrd = Object.entries(modos).sort((a,z)=>z[1]-a[1]);\n\n  const conclusao = naoAtende.length\n    ? `<div class=\"verdict fail\"><b>${naoAtende.length} de ${validos.length} ligação(ões) não atende(m)<\u002Fb>\n        <small>Requerem revisão: ${naoAtende.map(i=>i.nome).join(\" · \")}<\u002Fsmall><\u002Fdiv>`\n    : (noLimite.length\n      ? `<div class=\"verdict warn\"><b>Todas as ligações atendem; ${noLimite.length} opera(m) acima de 85%<\u002Fb>\n          <small>Com pouca folga: ${noLimite.map(i=>i.nome).join(\" · \")}<\u002Fsmall><\u002Fdiv>`\n      : `<div class=\"verdict ok\"><b>Todas as ${validos.length} ligações verificadas atendem<\u002Fb>\n          <small>Aproveitamento máximo do conjunto: ${f(maisCrit.A.rGlobal*100)}% em “${maisCrit.nome}”.<\u002Fsmall><\u002Fdiv>`);\n\n  const quadro = `\n    <table>\n      <tr><th>#<\u002Fth><th>Ligação<\u002Fth><th>Configuração<\u002Fth><th>Estado-limite governante<\u002Fth><th>Natureza<\u002Fth><th>Aproveit.<\u002Fth><th><\u002Fth><th>Situação<\u002Fth><\u002Ftr>\n      ${validos.map((i,k)=>{\n        const s = relSituacao(i.A);\n        return `<tr${i===maisCrit?' class=\"hl\"':''}>\n          <td class=\"n\">${k+1}<\u002Ftd>\n          <td>${i.nome}<\u002Ftd>\n          <td class=\"n\">${i.A.n}×M${i.A.p.d} ${i.A.c.id}<br><span style=\"font-size:11px;color:#6b7986\">chapa ${f(i.A.b,0)}×${f(i.A.t,1)}<\u002Fspan><\u002Ftd>\n          <td>${i.A.critico.m}<\u002Ftd>\n          <td><span class=\"tag ${i.A.critico.tipo===\"dúctil\"?\"n\":\"\"}\">${i.A.critico.tipo}<\u002Fspan><\u002Ftd>\n          <td class=\"n\">${f(i.A.rGlobal*100)}%<\u002Ftd>\n          <td style=\"width:80px\">${relMiniBar(i.A.rGlobal)}<\u002Ftd>\n          <td><span class=\"sit ${s.cls}\">${s.txt}<\u002Fspan><\u002Ftd>\n        <\u002Ftr>`;\n      }).join(\"\")}\n    <\u002Ftable>`;\n\n  const detalhes = completo ? validos.map((i,k)=>{\n    const A = i.A, s = relSituacao(A);\n    return `<div class=\"rel-bloco\">\n      <h3>${k+1}. ${i.nome} <span class=\"sit ${s.cls}\">${s.txt}<\u002Fspan><\u002Fh3>\n      <div class=\"cfg\">${A.n} × M${A.p.d} ${A.c.nome} · ${A.nc} col. × ${A.nr} linhas · ${A.planos} plano(s) de corte ·\n        chapa ${f(A.b,0)}×${f(A.t,1)} mm (f<sub>y<\u002Fsub> ${A.fy} / f<sub>u<\u002Fsub> ${A.fu}) ·\n        s<sub>x<\u002Fsub> ${f(A.sx,0)} / s<sub>y<\u002Fsub> ${f(A.sy,0)} · e ${f(A.e,0)} / e<sub>g<\u002Fsub> ${f(A.eg,0)} mm ·\n        F<sub>t,Sd<\u002Fsub> ${f(A.Ft)} / F<sub>v,Sd<\u002Fsub> ${f(A.Fv)} kN${A.exc?` · e<sub>v<\u002Fsub> ${f(A.exc,0)} mm`:\"\"}<\u002Fdiv>\n      ${A.geoFalhas.length?`<div class=\"verdict fail\" style=\"margin-bottom:10px\"><b>Geometria fora dos limites<\u002Fb><small>${A.geoFalhas.join(\" · \")}<\u002Fsmall><\u002Fdiv>`:\"\"}\n      ${A.el.fator>1.15?`<div class=\"verdict warn\" style=\"margin-bottom:10px\"><b>Cortante excêntrico<\u002Fb>\n        <small>Amplificação de ${f((A.el.fator-1)*100)}% no parafuso crítico: ${f(A.el.media)} → ${f(A.el.max)} kN.<\u002Fsmall><\u002Fdiv>`:\"\"}\n      ${A.fragilGoverna && A.rGlobal<=1?`<div class=\"verdict warn\" style=\"margin-bottom:10px\"><b>Modo frágil governa<\u002Fb>\n        <small>${A.critico.m} é de natureza frágil. Sob carga cíclica, prefira que um modo dúctil governe.<\u002Fsmall><\u002Fdiv>`:\"\"}\n      <table>\n        <tr><th>Estado-limite<\u002Fth><th>Natureza<\u002Fth><th>Resistência<\u002Fth><th>Aproveit.<\u002Fth><th><\u002Fth><\u002Ftr>\n        ${A.verif.map(v=>`<tr${v===A.critico?' class=\"hl\"':''}>\n          <td>${v.m}<\u002Ftd><td><span class=\"tag ${v.tipo===\"dúctil\"?\"n\":\"\"}\">${v.tipo}<\u002Fspan><\u002Ftd>\n          <td class=\"n\">${v.lim}<\u002Ftd><td class=\"n\">${f(v.r*100)}%<\u002Ftd>\n          <td style=\"width:80px\">${relMiniBar(v.r)}<\u002Ftd><\u002Ftr>`).join(\"\")}\n      <\u002Ftable>\n    <\u002Fdiv>`;\n  }).join(\"\") : \"\";\n\n  $(\"r_out\").innerHTML = `<div class=\"card\">\n    <div class=\"rel-cab\">\n      <h1>Relatório de conferência de ligações parafusadas<\u002Fh1>\n      <div class=\"rel-meta\">\n        <div><b>Obra<\u002Fb>${obra}<\u002Fdiv>\n        <div><b>Documento de referência<\u002Fb>${docref}<\u002Fdiv>\n        <div><b>Responsável<\u002Fb>${resp}<\u002Fdiv>\n        <div><b>Emitido em<\u002Fb>${relDataHora()}<\u002Fdiv>\n        <div><b>Ligações verificadas<\u002Fb>${validos.length}${invalidos.length?` (${invalidos.length} com dados incompletos)`:\"\"}<\u002Fdiv>\n        <div><b>Base normativa<\u002Fb>NBR 8800:2008<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    ${conclusao}\n\n    <h2 style=\"margin-top:18px\">Quadro comparativo<\u002Fh2>\n    <p class=\"sub\">Ordenado conforme a biblioteca. A linha destacada é a ligação com maior aproveitamento do conjunto.<\u002Fp>\n    ${quadro}\n\n    <h2 style=\"margin-top:20px\">Leitura do conjunto<\u002Fh2>\n    <table>\n      <tr><th>Indicador<\u002Fth><th>Resultado<\u002Fth><\u002Ftr>\n      <tr><td>Ligações que atendem<\u002Ftd><td class=\"n\">${validos.length-naoAtende.length} de ${validos.length}<\u002Ftd><\u002Ftr>\n      <tr><td>Ligações acima de 85% de aproveitamento<\u002Ftd><td class=\"n\">${noLimite.length}<\u002Ftd><\u002Ftr>\n      <tr><td>Ligações com modo frágil governante<\u002Ftd><td class=\"n\">${fragil.length}<\u002Ftd><\u002Ftr>\n      <tr class=\"hl\"><td>Maior aproveitamento do conjunto<\u002Ftd><td class=\"n\">${f(maisCrit.A.rGlobal*100)}% — ${maisCrit.nome}<\u002Ftd><\u002Ftr>\n    <\u002Ftable>\n\n    <h2 style=\"margin-top:18px\">Modos governantes no conjunto<\u002Fh2>\n    <table>\n      <tr><th>Estado-limite<\u002Fth><th>Ligações<\u002Fth><\u002Ftr>\n      ${modosOrd.map(([m,q])=>`<tr><td>${m}<\u002Ftd><td class=\"n\">${q}<\u002Ftd><\u002Ftr>`).join(\"\")}\n    <\u002Ftable>\n\n    ${fragil.length?`<div class=\"verdict warn\" style=\"margin-top:16px\"><b>${fragil.length} ligação(ões) com modo frágil governante<\u002Fb>\n      <small>${fragil.map(i=>i.nome).join(\" · \")}. Em estrutura sujeita a carga cíclica ou sísmica, redimensione para que um modo dúctil governe, garantindo aviso antes da ruína.<\u002Fsmall><\u002Fdiv>`:\"\"}\n\n    ${invalidos.length?`<div class=\"verdict fail\" style=\"margin-top:16px\"><b>${invalidos.length} registro(s) não avaliado(s)<\u002Fb>\n      <small>Dados incompletos ou inconsistentes: ${invalidos.map(i=>i.nome).join(\" · \")}. Abra cada um na aba “Ligação única”, complete os campos e salve novamente.<\u002Fsmall><\u002Fdiv>`:\"\"}\n\n    ${detalhes}\n\n    <div class=\"rel-bloco\" style=\"font-size:11.5px;color:#6b7986\">\n      <b>Observações.<\u002Fb> Verificações conforme ABNT NBR 8800:2008, itens 6.2.1, 6.2.2, 6.3.3 e 6.5.6,\n      com γ<sub>a1<\u002Fsub> = 1,10 para escoamento e γ<sub>a2<\u002Fsub> = 1,35 para ruptura.\n      A distribuição de esforços em grupos excêntricos adota o método elástico vetorial, de caráter conservador.\n      Não estão contempladas verificações de fadiga, flambagem local da chapa, soldas e elementos adjacentes à ligação.\n      Documento de apoio à conferência: não substitui a responsabilidade técnica do projetista nem a análise integral do projeto estrutural.\n    <\u002Fdiv>\n  <\u002Fdiv>`;\n}\n\n/* ---------- Abas e persistência ---------- */\ndocument.querySelectorAll(\"nav button\").forEach(b=>{\n  b.addEventListener(\"click\",()=>{\n    document.querySelectorAll(\"nav button\").forEach(x=>x.classList.remove(\"on\"));\n    document.querySelectorAll(\".panel\").forEach(x=>x.classList.remove(\"on\"));\n    b.classList.add(\"on\");\n    $(\"tab-\"+b.dataset.tab).classList.add(\"on\");\n    salvar();\n  });\n});\n\nconst CAMPOS = [\"t_ft\",\"t_cls\",\"t_d\",\"t_n\",\"t_alav\",\"v_fv\",\"v_cls\",\"v_d\",\"v_n\",\"v_p\",\"v_rosca\",\"v_t\",\"v_fu\",\"v_e\",\"v_pp\",\"v_defo\",\n  \"c_ft\",\"c_fv\",\"c_cls\",\"c_d\",\"c_n\",\"c_p\",\"c_rosca\",\"a_nu\",\"a_vu\",\"a_tipo\",\"a_d\",\"a_hef\",\"a_fck\",\"a_c1\",\"a_c2\",\"a_fis\",\"a_cls\",\n  \"a_arranjo\",\"a_nx\",\"a_ny\",\"a_sx\",\"a_sy\",\n  \"t_tc\",\"t_fuc\",\"t_b\",\"t_a\",\"t_ptrib\",\n  \"x_modo\",\"x_v\",\"x_e\",\"x_m\",\"x_nx2\",\"x_dc\",\"x_nc\",\"x_nr\",\"x_sx\",\"x_sy\",\"x_cls\",\"x_d\",\"x_pl\",\"x_rosca\",\n  \"u_nome\",\"u_ft\",\"u_fv\",\"u_cls\",\"u_d\",\"u_nc\",\"u_nr\",\"u_pl\",\"u_rosca\",\"u_t\",\"u_larg\",\"u_aco\",\"u_sx\",\"u_sy\",\"u_e\",\"u_eg\",\"u_exc\",\n  \"r_obra\",\"r_resp\",\"r_doc\",\"r_detalhe\",\n  \"fd_alvo\",\"fd_cat\",\"fd_smax\",\"fd_smin\",\"fd_cls\",\"fd_d\",\"fd_n\",\"fd_area\",\"fd_ciclos\",\"fd_nlivre\",\"fd_prot\",\n  \"ap_d\",\"ap_cls\",\"ap_chapas\",\"ap_arr\",\"ap_sobra\",\"ap_plano\",\"ap_qtd\",\"ap_npar\",\n  \"cf_fv\",\"cf_cls\",\"cf_d\",\"cf_n\",\"cf_t\",\"cf_aco\",\"cf_e\",\"cf_larg\",\"cf_nt\",\"cf_nl\",\"cf_g\",\"cf_arr\",\n  \"fu_d\",\"fu_tipo\",\"fu_ori\",\"fu_fv\",\"fu_cls\",\"fu_t\",\"fu_fu\",\"fu_e\",\"fu_mu\",\n  \"b_n\",\"b_t\",\"b_larg\",\"b_aco\",\"b_d\",\"b_nl\",\"b_nc\",\"b_p\",\"b_g\",\"b_e\",\"b_eg\",\"b_ct\",\"b_cts\",\n  \"p_cls\",\"p_d\",\"p_n\",\"p_pl\",\"p_rosca\",\"p_t\",\"p_aco\",\"p_larg\",\"p_nl\",\"p_e\",\"p_p\",\"p_eg\",\"p_lig\",\n  \"g_d\",\"g_t\",\"g_p\",\"g_e\",\"g_borda\",\"g_amb\",\"k_cls\",\"k_d\",\"k_k\",\"k_mu\",\"k_n\",\"k_ns\"];\n\nfunction salvar(){\n  try{\n    const s = {aba:document.querySelector(\"nav button.on\").dataset.tab};\n    CAMPOS.forEach(id=>{ if($(id)) s[id]=$(id).value; });\n    localStorage.setItem(\"parafusopro.v1\", JSON.stringify(s));\n  }catch(e){}\n}\nfunction restaurar(){\n  try{\n    const s = JSON.parse(localStorage.getItem(\"parafusopro.v1\")||\"{}\");\n    CAMPOS.forEach(id=>{ if(s[id]!==undefined && $(id)) $(id).value=s[id]; });\n    if(s.aba){ const b=document.querySelector(`nav button[data-tab=\"${s.aba}\"]`); if(b) b.click(); }\n  }catch(e){}\n}\n\n/* ---------- Inicialização ---------- */\n[\"t_cls\",\"v_cls\",\"c_cls\",\"a_cls\",\"k_cls\",\"p_cls\",\"x_cls\",\"u_cls\",\"fd_cls\",\"ap_cls\",\"cf_cls\",\"fu_cls\"].forEach(id=>preencher(id,\"cls\"));\n[\"t_d\",\"v_d\",\"c_d\",\"a_d\",\"g_d\",\"k_d\",\"b_d\",\"p_d\",\"x_d\",\"u_d\",\"fd_d\",\"ap_d\",\"cf_d\",\"fu_d\"].forEach(id=>preencher(id,\"d\"));\n\n// orientação do rasgo só interessa a furos alongados\nfunction alternarFuro(){\n  const tipo = $(\"fu_tipo\").value;\n  $(\"fu_oribox\").style.display = (tipo===\"curto\"||tipo===\"longo\") ? \"block\" : \"none\";\n}\n$(\"fu_tipo\").addEventListener(\"change\",()=>{alternarFuro();salvar();});\n\n// alternâncias da aba de fadiga\nfunction alternarFadiga(){\n  const parafuso = $(\"fd_alvo\").value===\"PAR\";\n  $(\"fd_catbox\").style.display = parafuso ? \"none\" : \"block\";\n  $(\"fd_prot\").parentNode ? ($(\"fd_prot\").style.display = parafuso ? \"\" : \"none\") : null;\n  $(\"fd_prot\").previousElementSibling.style.display = parafuso ? \"\" : \"none\";\n  $(\"fd_nbox\").style.display = $(\"fd_ciclos\").value===\"outro\" ? \"block\" : \"none\";\n}\n$(\"fd_alvo\").addEventListener(\"change\",()=>{alternarFadiga();salvar();});\n$(\"fd_ciclos\").addEventListener(\"change\",()=>{alternarFadiga();salvar();});\n\n// mostra/oculta os campos de grupo conforme o arranjo escolhido\nfunction alternarGrupo(){\n  $(\"a_grupo\").style.display = $(\"a_arranjo\").value===\"grupo\" ? \"block\" : \"none\";\n}\n$(\"a_arranjo\").addEventListener(\"change\",()=>{alternarGrupo();salvar();});\n\n// mostra/oculta a caixa de geometria do efeito alavanca\nfunction alternarPry(){\n  $(\"t_prybox\").style.display = $(\"t_alav\").value===\"calc\" ? \"block\" : \"none\";\n}\n$(\"t_alav\").addEventListener(\"change\",()=>{alternarPry();salvar();});\n\n// alterna entre cortante excêntrico e momento\nfunction alternarExc(){\n  const m = $(\"x_modo\").value===\"cort\";\n  $(\"x_cortbox\").style.display = m ? \"block\" : \"none\";\n  $(\"x_mombox\").style.display  = m ? \"none\" : \"block\";\n}\n$(\"x_modo\").addEventListener(\"change\",()=>{alternarExc();salvar();});\n\n$(\"t_go\").addEventListener(\"click\",()=>{calcTracao();salvar();});\n$(\"t_auto\").addEventListener(\"click\",()=>{sugerirDiametro();salvar();});\n$(\"v_go\").addEventListener(\"click\",()=>{calcCisalha();salvar();});\n$(\"c_go\").addEventListener(\"click\",()=>{calcComb();salvar();});\n$(\"a_go\").addEventListener(\"click\",()=>{calcAnc();salvar();});\n$(\"b_go\").addEventListener(\"click\",()=>{calcBase();salvar();});\n$(\"g_go\").addEventListener(\"click\",()=>{calcGeo();salvar();});\n$(\"k_go\").addEventListener(\"click\",()=>{calcTorque();salvar();});\n$(\"fd_go\").addEventListener(\"click\",()=>{calcFadiga();salvar();});\n$(\"ap_go\").addEventListener(\"click\",()=>{calcAperto();salvar();});\n$(\"cf_go\").addEventListener(\"click\",()=>{calcChapaFina();salvar();});\n$(\"fu_go\").addEventListener(\"click\",()=>{calcFuros();salvar();});\n$(\"se_go\").addEventListener(\"click\",()=>{calcSensibilidade();salvar();});\n$(\"x_go\").addEventListener(\"click\",()=>{calcExc();salvar();});\n$(\"p_go\").addEventListener(\"click\",()=>{calcCapacidade();salvar();});\n$(\"u_go\").addEventListener(\"click\",()=>{calcUnica();salvar();});\n$(\"u_salvar\").addEventListener(\"click\",bibSalvar);\n$(\"u_exportar\").addEventListener(\"click\",bibExportar);\n$(\"u_importar\").addEventListener(\"click\",()=>$(\"u_arquivo\").click());\n$(\"u_arquivo\").addEventListener(\"change\",bibImportar);\n$(\"r_gerar\").addEventListener(\"click\",()=>{gerarRelatorio();salvar();});\n$(\"r_imprimir\").addEventListener(\"click\",()=>{\n  if(!$(\"r_out\").textContent.includes(\"Relatório de conferência\")) gerarRelatorio();\n  setTimeout(()=>window.print(), 100);\n});\nCAMPOS.forEach(id=>{ if($(id)) $(id).addEventListener(\"change\",salvar); });\n\nrestaurar();\nalternarGrupo();\nalternarPry();\nalternarExc();\nalternarFadiga();\nalternarFuro();\nbibRenderizar();\ncalcTracao();\n\n/* expõe núcleo para testes em Node/jsdom */\nif(typeof window!==\"undefined\") window.ParafusoPro={FtRd,FvRd,FcRd,NtEscoa,NtRuptura,blockShear,redutorLongo,ANcGrupo,\n  prying,gerarGrupo,elasticoVetorial,distribuicaoMomento,PARAF,CLASSES,GA1,GA2,dFuro,par,cls,\n  bibLer,bibGravar,bibCapturar,bibImportarPacote,BIB_CAMPOS,BIB_CHAVE,esc,\n  avaliarLigacao,relSituacao,gerarRelatorio,\n  fadFSR,fadVida,FAD_CAT,resolverAperto,apertoComFusteLiso,roscaParcialB,APERTO_DIM,COMPRIMENTOS_COMERCIAIS,lerChapas,\n  cfC,cfEsmag,cfRasgo,cfCt,furoDim,furoHf,furoCoefContato,furoRestricoes,SENS_ESPESSURAS};\n<\u002Fscript>\n\n<!-- ===== ParafusoPro — Tela de abertura ===== -->\n<style id=\"spl-css\">\n#spl{position:fixed;inset:0;z-index:9999;background:#0b1118;display:flex;align-items:center;justify-content:center;transition:opacity .6s ease}\n#spl.out{opacity:0;pointer-events:none}\n#spl-cv{position:absolute;inset:0;width:100%;height:100%}\nbody.spl-lock{overflow:hidden}\n#spl-modal{position:relative;z-index:2;width:min(560px,calc(100% - 40px));background:#fff;border-radius:12px;box-shadow:0 30px 80px rgba(0,0,0,.55);padding:28px 30px;opacity:0;transform:translateY(24px) scale(.97);transition:opacity .5s ease,transform .5s cubic-bezier(.2,.9,.3,1.2);visibility:hidden}\n#spl-modal.show{opacity:1;transform:none;visibility:visible}\n#spl-modal h2{margin:0 0 2px;font:800 22px/1.2 \"Inter\",\"Helvetica Neue\",Arial,sans-serif;color:#101418;letter-spacing:-.3px}\n#spl-modal h2 span{color:#c8501e}\n#spl-modal .spl-sub{font:600 11px \"SFMono-Regular\",Consolas,Menlo,monospace;letter-spacing:.09em;text-transform:uppercase;color:#8b98a5;margin:0 0 16px}\n#spl-modal h3{margin:0 0 8px;font:700 13px \"Inter\",\"Helvetica Neue\",Arial,sans-serif;color:#b3261e;letter-spacing:.04em;text-transform:uppercase}\n#spl-legal{max-height:200px;overflow:auto;border:1px solid #dde3e8;border-radius:8px;background:#f7f9fb;padding:14px 16px;font:13px/1.65 \"Inter\",\"Helvetica Neue\",Arial,sans-serif;color:#3c4a58}\n#spl-legal p{margin:0 0 10px}\n#spl-legal p:last-child{margin:0}\n#spl-check{display:flex;gap:10px;align-items:flex-start;margin:16px 0 18px;cursor:pointer;font:600 13.5px/1.45 \"Inter\",\"Helvetica Neue\",Arial,sans-serif;color:#101418}\n#spl-check input{width:18px;height:18px;margin:1px 0 0;accent-color:#c8501e;cursor:pointer;flex:none}\n#spl-actions{display:flex;gap:10px;justify-content:flex-end}\n#spl-decline{background:transparent;color:#1d2833;border:1px solid #c3ccd5;border-radius:6px;padding:11px 18px;font:600 13px \"Inter\",Arial,sans-serif;cursor:pointer}\n#spl-decline:hover{border-color:#b3261e;color:#b3261e}\n#spl-agree{background:#c8501e;color:#fff;border:0;border-radius:6px;padding:11px 22px;font:700 13.5px \"Inter\",Arial,sans-serif;cursor:pointer}\n#spl-agree:hover{background:#a8410f}\n#spl-agree:disabled{background:#c3ccd5;cursor:not-allowed}\n#spl-msg{font:12px \"Inter\",Arial,sans-serif;color:#b3261e;min-height:16px;margin:10px 0 0;text-align:right}\n@media (prefers-reduced-motion:reduce){#spl-modal{transition:opacity .3s ease}}\n<\u002Fstyle>\n<div id=\"spl\" role=\"dialog\" aria-modal=\"true\" aria-label=\"Abertura e aviso legal\">\n  <canvas id=\"spl-cv\"><\u002Fcanvas>\n  <div id=\"spl-modal\">\n    <h2>Parafuso<span>Pro<\u002Fspan><\u002Fh2>\n    <p class=\"spl-sub\">Calculadora de Parafusos<\u002Fp>\n    <h3>Aviso legal<\u002Fh3>\n    <div id=\"spl-legal\">\n      <p><b>1. Natureza da ferramenta.<\u002Fb> O ParafusoPro é uma ferramenta computacional de <b>auxílio<\u002Fb> ao dimensionamento e à verificação de ligações parafusadas. Os resultados apresentados têm caráter indicativo e educacional.<\u002Fp>\n      <p><b>2. Responsabilidade técnica.<\u002Fb> Esta ferramenta <b>não substitui<\u002Fb> o julgamento, a análise e a responsabilidade de profissional legalmente habilitado (engenheiro responsável técnico). Todo dimensionamento deve ser verificado e assinado por profissional competente, conforme a legislação vigente.<\u002Fp>\n      <p><b>3. Normas e dados.<\u002Fb> Cabe ao usuário verificar a adequação dos critérios, coeficientes e propriedades adotados às normas aplicáveis ao seu projeto (ex.: ABNT NBR 8800, ISO 898-1, VDI 2230) e às condições reais de uso, montagem e manutenção.<\u002Fp>\n      <p><b>4. Isenção de garantias.<\u002Fb> O software é fornecido \"no estado em que se encontra\", sem garantias de qualquer natureza, expressas ou implícitas, incluindo exatidão, adequação a finalidade específica ou ausência de erros.<\u002Fp>\n      <p><b>5. Limitação de responsabilidade.<\u002Fb> Os autores e distribuidores não se responsabilizam por quaisquer danos, diretos ou indiretos, perdas materiais, acidentes ou prejuízos decorrentes do uso ou da impossibilidade de uso desta ferramenta ou de decisões nela baseadas.<\u002Fp>\n      <p><b>6. Aceite.<\u002Fb> Ao prosseguir, você declara ter lido e compreendido este aviso e concorda integralmente com seus termos.<\u002Fp>\n    <\u002Fdiv>\n    <label id=\"spl-check\"><input type=\"checkbox\" id=\"spl-ck\"> Li e concordo com o aviso legal acima e assumo integral responsabilidade pelo uso dos resultados.<\u002Flabel>\n    <div id=\"spl-actions\">\n      <button id=\"spl-decline\" type=\"button\">Não concordo<\u002Fbutton>\n      <button id=\"spl-agree\" type=\"button\" disabled=\"\">Acessar o sistema<\u002Fbutton>\n    <\u002Fdiv>\n    <p id=\"spl-msg\"><\u002Fp>\n  <\u002Fdiv>\n<\u002Fdiv>\n<script>\n(function(){\n\"use strict\";\ndocument.body.classList.add('spl-lock');\nvar cv=document.getElementById('spl-cv'),ctx=cv.getContext('2d');\nvar W=0,H=0,dpr=1;\nfunction fit(){dpr=Math.min(window.devicePixelRatio||1,2.5);W=cv.clientWidth;H=cv.clientHeight;cv.width=Math.round(W*dpr);cv.height=Math.round(H*dpr);ctx.setTransform(dpr,0,0,dpr,0,0);}\nwindow.addEventListener('resize',fit);fit();\n\nvar T_BREAK=3.9,T_END=5.0;\nvar t0=performance.now(),last=t0,rot=0,broken=false,parts=[],flash=0,done=false;\nvar sepY=0,sepRot=0,titleA=0;\n\nfunction ease(x){return x<0?0:x>1?1:x*x*(3-2*x);}\nfunction heat(s){\n  var stops=[[110,150,190],[235,160,60],[224,82,30],[200,40,32]];\n  var p=Math.max(0,Math.min(.999,s))*3,i=Math.floor(p),f=p-i,a=stops[i],b=stops[i+1];\n  return 'rgb('+Math.round(a[0]+(b[0]-a[0])*f)+','+Math.round(a[1]+(b[1]-a[1])*f)+','+Math.round(a[2]+(b[2]-a[2])*f)+')';\n}\nfunction spawnSparks(cx,cy){\n  for(var i=0;i<70;i++){\n    var a=Math.random()*Math.PI*2,v=120+Math.random()*520;\n    parts.push({x:cx+(Math.random()-.5)*30,y:cy+(Math.random()-.5)*10,vx:Math.cos(a)*v,vy:Math.sin(a)*v-120,life:.5+Math.random()*.9,age:0,r:1+Math.random()*3,hot:Math.random()});\n  }\n}\n\nfunction draw(now){\n  var t=Math.max(0,(now-t0)/1000),dt=Math.max(0,Math.min(.05,(now-last)/1000));last=now;\n  var stress=broken?1:Math.pow(Math.min(1,t/T_BREAK),1.7);\n  var pulse=.45+.55*Math.abs(Math.sin(t*3.2));\n  if(!broken)rot+=dt*(30+260*stress)*pulse;\n  var justBroke=false;\n  if(!broken&&t>=T_BREAK){broken=true;flash=1;justBroke=true;}\n  if(broken){sepY=Math.min(46,sepY+dt*180);sepRot=Math.min(.10,sepRot+dt*.5);}\n  if(t>T_BREAK+.35)titleA=Math.min(1,titleA+dt*2.2);\n\n  var S=Math.min(W,H)/760;\n  var cx=W/2,cy=H/2+10*S;\n  var jit=broken?0:stress*stress*3.5*S;\n  var jx=(Math.random()-.5)*2*jit,jy=(Math.random()-.5)*2*jit;\n\n  var bg=ctx.createRadialGradient(cx,cy,60*S,cx,cy,Math.max(W,H)*.75);\n  bg.addColorStop(0,'#17222e');bg.addColorStop(.6,'#0d141c');bg.addColorStop(1,'#070b10');\n  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);\n  var g1=ctx.createRadialGradient(cx-W*.32,cy-H*.18,0,cx-W*.32,cy-H*.18,W*.45);\n  g1.addColorStop(0,'rgba(45,170,190,.16)');g1.addColorStop(1,'rgba(45,170,190,0)');\n  ctx.fillStyle=g1;ctx.fillRect(0,0,W,H);\n  var g2=ctx.createRadialGradient(cx+W*.34,cy+H*.2,0,cx+W*.34,cy+H*.2,W*.45);\n  g2.addColorStop(0,'rgba(200,80,30,'+(.10+.22*stress)+')');g2.addColorStop(1,'rgba(200,80,30,0)');\n  ctx.fillStyle=g2;ctx.fillRect(0,0,W,H);\n\n  ctx.save();ctx.translate(jx,jy);\n\n  var w0=74*S,L=340*S,topY=cy-L/2,botY=cy+L/2,yBreak=cy+18*S,sigma=34*S;\n  var headH=54*S,headW=128*S;\n\n  function halfW(y){\n    var neck=broken?0:stress*.30;\n    return (w0/2)*(1-neck*Math.exp(-((y-yBreak)*(y-yBreak))/(2*sigma*sigma)));\n  }\n  function shankPath(y1,y2){\n    ctx.beginPath();var steps=26,i,y;\n    for(i=0;i<=steps;i++){y=y1+(y2-y1)*i/steps;ctx.lineTo(cx-halfW(y),y);}\n    for(i=steps;i>=0;i--){y=y1+(y2-y1)*i/steps;ctx.lineTo(cx+halfW(y),y);}\n    ctx.closePath();\n  }\n  function metal(x1,x2){\n    var g=ctx.createLinearGradient(x1,0,x2,0);\n    g.addColorStop(0,'#39434e');g.addColorStop(.22,'#727f8c');g.addColorStop(.42,'#dfe7ee');g.addColorStop(.55,'#9aa7b3');g.addColorStop(.8,'#4c5762');g.addColorStop(1,'#2b333c');\n    return g;\n  }\n  function threads(y1,y2){\n    if(y2<=y1)return;\n    ctx.save();shankPath(y1,y2);ctx.clip();\n    var pitch=13*S,off=(rot*S*.9)%pitch,y;\n    for(y=y1-pitch+off;y<y2+pitch;y+=pitch){\n      var tw=broken?0:stress*10*S*Math.exp(-((y-yBreak)*(y-yBreak))/(2*sigma*sigma));\n      var hw=halfW(y)+2;\n      ctx.beginPath();ctx.moveTo(cx-hw,y+tw);\n      ctx.quadraticCurveTo(cx,y+5*S-tw,cx+hw,y-tw);\n      ctx.strokeStyle='rgba(15,20,26,.55)';ctx.lineWidth=2.6*S;ctx.stroke();\n      ctx.beginPath();ctx.moveTo(cx-hw,y+tw-2.2*S);\n      ctx.quadraticCurveTo(cx,y+5*S-tw-2.2*S,cx+hw,y-tw-2.2*S);\n      ctx.strokeStyle='rgba(255,255,255,.28)';ctx.lineWidth=1.3*S;ctx.stroke();\n    }\n    ctx.restore();\n  }\n  function jagged(y,dir){\n    ctx.beginPath();var hw=halfW(y),n=7,i;\n    ctx.moveTo(cx-hw,y);\n    for(i=1;i<n;i++){var xx=cx-hw+2*hw*i/n;ctx.lineTo(xx,y+dir*(i%2?7:2)*S);}\n    ctx.lineTo(cx+hw,y);ctx.closePath();\n  }\n\n  // clamped plates + nut (fixed)\n  ctx.fillStyle='#1a232d';ctx.fillRect(cx-190*S,botY-6*S,380*S,16*S);\n  ctx.fillStyle='#141c25';ctx.fillRect(cx-190*S,botY+10*S,380*S,12*S);\n  var ng=ctx.createLinearGradient(cx-80*S,0,cx+80*S,0);\n  ng.addColorStop(0,'#333d47');ng.addColorStop(.45,'#b9c4cd');ng.addColorStop(.6,'#7d8a96');ng.addColorStop(1,'#28303a');\n  ctx.fillStyle=ng;\n  ctx.beginPath();ctx.moveTo(cx-72*S,botY+22*S);ctx.lineTo(cx-58*S,botY+62*S);ctx.lineTo(cx+58*S,botY+62*S);ctx.lineTo(cx+72*S,botY+22*S);ctx.closePath();ctx.fill();\n  ctx.strokeStyle='rgba(0,0,0,.4)';ctx.lineWidth=1.5*S;ctx.stroke();\n\n  // lower shank (fixed)\n  shankPath(broken?yBreak+2*S:topY+headH,botY+22*S);\n  ctx.fillStyle=metal(cx-w0/2,cx+w0/2);ctx.fill();\n  threads(Math.max(broken?yBreak+2*S:topY+headH,cy-40*S),botY+20*S);\n  if(broken){jagged(yBreak+2*S,1);ctx.fillStyle='#5c3324';ctx.fill();}\n\n  // upper part: head + upper shank\n  ctx.save();\n  if(broken){ctx.translate(0,-sepY);ctx.translate(cx,topY);ctx.rotate(-sepRot);ctx.translate(-cx,-topY);}\n  shankPath(topY+headH-4*S,broken?yBreak-2*S:yBreak);\n  ctx.fillStyle=metal(cx-w0/2,cx+w0/2);ctx.fill();\n  if(broken)threads(topY+headH+6*S,yBreak-4*S);\n  if(broken){jagged(yBreak-2*S,-1);ctx.fillStyle='#6b3b28';ctx.fill();}\n  var hg=ctx.createLinearGradient(cx-headW/2,0,cx+headW/2,0);\n  hg.addColorStop(0,'#2e3742');hg.addColorStop(.35,'#c8d2da');hg.addColorStop(.55,'#8b98a5');hg.addColorStop(1,'#232b34');\n  ctx.fillStyle=hg;\n  ctx.beginPath();ctx.moveTo(cx-headW/2,topY+10*S);ctx.lineTo(cx-headW/2+10*S,topY);ctx.lineTo(cx+headW/2-10*S,topY);ctx.lineTo(cx+headW/2,topY+10*S);ctx.lineTo(cx+headW/2-6*S,topY+headH);ctx.lineTo(cx-headW/2+6*S,topY+headH);ctx.closePath();ctx.fill();\n  ctx.strokeStyle='rgba(0,0,0,.35)';ctx.lineWidth=1.5*S;ctx.stroke();\n  ctx.save();ctx.beginPath();ctx.rect(cx-headW/2+6*S,topY,headW-12*S,headH);ctx.clip();\n  var fw=headW/3,fo=((rot*1.3*S)%fw);\n  for(var fx=cx-headW/2-fw+fo;fx<cx+headW/2+fw;fx+=fw){\n    ctx.beginPath();ctx.moveTo(fx,topY);ctx.lineTo(fx,topY+headH);\n    ctx.strokeStyle='rgba(10,14,18,.4)';ctx.lineWidth=2.2*S;ctx.stroke();\n  }\n  ctx.restore();\n  ctx.restore();\n\n  // heat glow at break zone\n  if(stress>.12&&!done){\n    var hgl=ctx.createRadialGradient(cx,yBreak,0,cx,yBreak,90*S);\n    var hc=heat(stress);\n    hgl.addColorStop(0,hc.replace('rgb','rgba').replace(')',','+(0.55*stress)+')'));\n    hgl.addColorStop(1,'rgba(0,0,0,0)');\n    ctx.fillStyle=hgl;ctx.fillRect(cx-120*S,yBreak-110*S,240*S,220*S);\n  }\n\n  // torque arrows around head\n  if(!broken){\n    var ar=110*S,aa=t*(2+stress*7);\n    ctx.save();ctx.translate(cx,topY+headH/2);\n    for(var k=0;k<2;k++){\n      var a0=aa+k*Math.PI;\n      ctx.beginPath();ctx.ellipse(0,0,ar,ar*.34,0,a0,a0+1.5);\n      ctx.strokeStyle='rgba(80,200,220,'+(.5+.4*pulse)+')';ctx.lineWidth=4*S;ctx.lineCap='round';ctx.stroke();\n      var ax=Math.cos(a0+1.5)*ar,ay=Math.sin(a0+1.5)*ar*.34;\n      ctx.beginPath();ctx.moveTo(ax,ay);ctx.lineTo(ax-11*S*Math.cos(a0+1.1),ay-11*S*Math.sin(a0+1.1)*.34-6*S);ctx.lineTo(ax-11*S*Math.cos(a0+2.0),ay-11*S*Math.sin(a0+2.0)*.34+6*S);ctx.closePath();\n      ctx.fillStyle='rgba(80,200,220,.9)';ctx.fill();\n    }\n    ctx.restore();\n  }\n\n  if(justBroke)spawnSparks(cx,yBreak);\n  for(var i=parts.length-1;i>=0;i--){\n    var p=parts[i];p.age+=dt;\n    if(p.age>p.life){parts.splice(i,1);continue;}\n    p.vy+=900*dt;p.x+=p.vx*dt;p.y+=p.vy*dt;\n    var lf=1-p.age/p.life;\n    ctx.beginPath();ctx.arc(p.x,p.y,p.r*S*lf,0,7);\n    ctx.fillStyle=p.hot>.5?'rgba(255,'+Math.round(150+100*lf)+',60,'+lf+')':'rgba(220,230,240,'+(lf*.9)+')';\n    ctx.fill();\n  }\n  if(flash>0){ctx.fillStyle='rgba(255,240,225,'+(flash*.85)+')';ctx.fillRect(-20,-20,W+40,H+40);flash=Math.max(0,flash-dt*3.2);}\n\n  ctx.restore();\n\n  // HUD\n  ctx.textAlign='center';\n  ctx.font='700 '+Math.round(15*S)+'px Consolas,Menlo,monospace';\n  var tq=Math.round(stress*612);\n  ctx.fillStyle=broken?'#ff5a48':'rgba(180,200,215,.9)';\n  ctx.fillText(broken?'RUPTURA — 612 N·m':'M20 · CLASSE 8.8 · TORQUE '+tq+' N·m',cx,H-64*S);\n  var bw=280*S;\n  ctx.fillStyle='rgba(255,255,255,.12)';ctx.fillRect(cx-bw/2,H-48*S,bw,6*S);\n  ctx.fillStyle=heat(stress);ctx.fillRect(cx-bw/2,H-48*S,bw*stress,6*S);\n\n  if(titleA>0){\n    ctx.globalAlpha=ease(titleA);\n    ctx.font='800 '+Math.round(46*S)+'px Inter,\"Helvetica Neue\",Arial,sans-serif';\n    ctx.fillStyle='#eceff2';\n    ctx.fillText('ParafusoPro',cx,90*S);\n    ctx.font='600 '+Math.round(13*S)+'px Consolas,Menlo,monospace';\n    ctx.fillStyle='#e07a4a';\n    ctx.fillText('C A L C U L A D O R A   D E   P A R A F U S O S',cx,116*S);\n    ctx.globalAlpha=1;\n  }\n\n  if(t>=T_END&&!done){done=true;document.getElementById('spl-modal').classList.add('show');}\n  if(!document.getElementById('spl').classList.contains('out'))requestAnimationFrame(draw);\n}\nrequestAnimationFrame(draw);\n\nvar ck=document.getElementById('spl-ck'),agree=document.getElementById('spl-agree'),msg=document.getElementById('spl-msg');\nck.addEventListener('change',function(){agree.disabled=!ck.checked;msg.textContent='';});\nagree.addEventListener('click',function(){\n  var spl=document.getElementById('spl');\n  spl.classList.add('out');document.body.classList.remove('spl-lock');\n  setTimeout(function(){spl.remove();var c=document.getElementById('spl-css');if(c)c.remove();},700);\n});\ndocument.getElementById('spl-decline').addEventListener('click',function(){\n  msg.textContent='É necessário concordar com o aviso legal para acessar o sistema.';\n});\n})();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
