chor=\"middle\" fill=\"${stroke}\" font-size=\"11\">Icc máx.: ${r.shortData.checked?fmt(r.shortData.maxKA)+' kA':'não verificada'} · Ib: ${fmt(r.basis.designCurrent)} A · Iz: ${fmt(r.ampacity.corrected)} A<\u002Ftext><\u002Fsvg>`;\n $('diagramLegend').innerHTML=`<b>Origem:<\u002Fb> ${escapeHtml(r.board||'—')}<br><b>Configuração:<\u002Fb> ${escapeHtml(systemConfigs[r.system].label)}<br><b>Proteção:<\u002Fb> ${r.protection.rating} A, curva ${r.protection.curve}, ${r.protection.poles}, Icn ${fmtSmart(r.protection.icn)} kA<br><b>Circuito:<\u002Fb> ${escapeHtml(conductorDescription(r))} ${r.material==='copper'?'Cu':'Al'}, ${r.insulation==='pvc'?'PVC':'HEPR/XLPE'}, método ${r.method}<br><b>DR:<\u002Fb> ${escapeHtml(r.rcdRecommendation)}<br><b>Nota:<\u002Fb> diagrama funcional simplificado, sem representação completa de DPS, seccionamento, barramentos e esquema de aterramento.`;\n}\nfunction renderReportSelectors(){\n const rs=circuits().map(circuitResult);const old=$('reportCircuit').value;$('reportCircuit').innerHTML=rs.length?rs.map(r=>`<option value=\"${r.id}\">${escapeHtml(r.name)}<\u002Foption>`).join(''):'<option value=\"\">Sem circuitos salvos<\u002Foption>';if(rs.some(r=>r.id===old))$('reportCircuit').value=old;else if(currentResult&&rs.some(r=>r.id===currentResult.id))$('reportCircuit').value=currentResult.id;\n $('reportCircuit').disabled=$('reportScope').value!=='circuit';\n}\nfunction reportHeader(title,subtitle=''){const p=projectData();return `<div style=\"display:flex;justify-content:space-between;gap:20px;border-bottom:3px solid #0b63ce;padding-bottom:16px\"><div><h1>CircuitoPro<\u002Fh1><div style=\"font-size:11px;color:#64748b\">Memória de dimensionamento de condutores<\u002Fdiv><\u002Fdiv><div style=\"text-align:right\"><b>${escapeHtml(title)}<\u002Fb><br><small>${escapeHtml(subtitle)}<\u002Fsmall><\u002Fdiv><\u002Fdiv><div class=\"report-meta\"><div><b>Projeto:<\u002Fb> ${escapeHtml(p.name||'—')}<\u002Fdiv><div><b>Data:<\u002Fb> ${safeDate(p.date)}<\u002Fdiv><div><b>Cliente:<\u002Fb> ${escapeHtml(p.client||'—')}<\u002Fdiv><div><b>Local:<\u002Fb> ${escapeHtml(p.location||'—')}<\u002Fdiv><div><b>Responsável:<\u002Fb> ${escapeHtml(p.engineer||'—')}<\u002Fdiv><div><b>Registro:<\u002Fb> ${escapeHtml(p.registry||'—')}<\u002Fdiv><\u002Fdiv>`;}\nfunction reportFooter(){const p=projectData();return `<div class=\"report-sign\"><div class=\"sign-line\">${escapeHtml(p.engineer||'Responsável técnico')}<br>${escapeHtml(p.registry||'Registro profissional')}<\u002Fdiv><div class=\"sign-line\">Contratante / aprovação<\u002Fdiv><\u002Fdiv><p class=\"report-note\" style=\"margin-top:35px\"><b>Limitações:<\u002Fb> relatório gerado por ferramenta de apoio. A biblioteca inicial combina referências públicas de fabricante para cobre com valores estimados para alumínio e extrapolação identificada em 630 mm². A seleção final deve ser conferida pelo responsável técnico com a edição normativa aplicável, dados do fabricante, condições reais de instalação, proteção escolhida, esquema de aterramento e estudo de curto-circuito.<\u002Fp>`;}\nfunction projectReportHtml(){\n const rs=circuits().map(circuitResult),t=projectTotals();return `${reportHeader('Relatório consolidado','Projeto ativo')}<h2>1. Resumo executivo<\u002Fh2><table class=\"report-table\"><tbody><tr><th>Circuitos cadastrados<\u002Fth><td>${t.count}<\u002Ftd><th>Circuitos sem erros<\u002Fth><td>${t.valid}<\u002Ftd><\u002Ftr><tr><th>Potência instalada<\u002Fth><td>${fmt(t.power/1000)} kW<\u002Ftd><th>Demanda estimada<\u002Fth><td>${fmt(t.demand/1000)} kW<\u002Ftd><\u002Ftr><tr><th>Perdas simultâneas<\u002Fth><td>${fmt(t.loss/1000)} kW<\u002Ftd><th>Alertas / erros<\u002Fth><td>${t.warnings} / ${t.errors}<\u002Ftd><\u002Ftr><\u002Ftbody><\u002Ftable><h2>2. Quadro de circuitos<\u002Fh2>${rs.length?`<table class=\"report-table\"><thead><tr><th>Circuito<\u002Fth><th>Sistema<\u002Fth><th>Ib<\u002Fth><th>Condutor<\u002Fth><th>Disjuntor<\u002Fth><th>ΔV<\u002Fth><th>Icc máx.<\u002Fth><th>Situação<\u002Fth><\u002Ftr><\u002Fthead><tbody>${rs.map(r=>`<tr><td><b>${escapeHtml(r.name)}<\u002Fb><br>${escapeHtml(r.board||'—')}<\u002Ftd><td>${systemConfigs[r.system].short}<br>${fmtSmart(r.basis.voltage)} V<\u002Ftd><td>${fmt(r.basis.designCurrent)} A<\u002Ftd><td>${escapeHtml(conductorDescription(r))}<br>${r.material==='copper'?'Cu':'Al'} · ${r.method}<\u002Ftd><td>${r.protection.rating||'—'} A · ${r.protection.curve}<br>${r.protection.poles}<\u002Ftd><td>${fmt(r.drop.percent)}%<\u002Ftd><td>${r.shortData.checked?fmt(r.shortData.maxKA)+' kA':'não verificada'}<\u002Ftd><td>${statusForResult(r).text}<\u002Ftd><\u002Ftr>`).join('')}<\u002Ftbody><\u002Ftable>`:'<p>Nenhum circuito cadastrado.<\u002Fp>'}<h2>3. Premissas e rastreabilidade<\u002Fh2><p class=\"report-note\">As ampacidades são selecionadas por material, isolação, método, número/disposição de condutores, temperatura, agrupamento e paralelos. Cada memória individual identifica a qualidade do dado usado. A coordenação da proteção verifica, no modelo simplificado, Ib ≤ In ≤ Iz, corrente convencional, poder de interrupção e limiar magnético superior.<\u002Fp>${reportFooter()}`;\n}\nfunction circuitReportHtml(r){\n if(!r)return `${reportHeader('Memória individual','Sem circuito selecionado')}<p>Nenhum circuito salvo.<\u002Fp>`;const st=statusForResult(r);return `${reportHeader('Memória individual de circuito',r.name)}<h2>1. Identificação e resultado<\u002Fh2><table class=\"report-table\"><tbody><tr><th>Circuito<\u002Fth><td>${escapeHtml(r.name)}<\u002Ftd><th>Quadro<\u002Fth><td>${escapeHtml(r.board||'—')}<\u002Ftd><\u002Ftr><tr><th>Categoria<\u002Fth><td>${escapeHtml(categoryLabels[r.category]||r.category)}<\u002Ftd><th>Situação<\u002Fth><td>${st.text}<\u002Ftd><\u002Ftr><tr><th>Condutor de fase<\u002Fth><td><b>${escapeHtml(conductorDescription(r))}<\u002Fb><\u002Ftd><th>Material / isolação<\u002Fth><td>${r.material==='copper'?'Cobre':'Alumínio'} · ${r.insulation==='pvc'?'PVC 70 °C':'HEPR/XLPE 90 °C'}<\u002Ftd><\u002Ftr><\u002Ftbody><\u002Ftable><h2>2. Dados de entrada e corrente<\u002Fh2><table class=\"report-table\"><tbody><tr><th>Configuração<\u002Fth><td>${escapeHtml(systemConfigs[r.system].label)}<\u002Ftd><th>Tensão<\u002Fth><td>${fmtSmart(r.basis.voltage)} V<\u002Ftd><\u002Ftr><tr><th>Potência ativa de entrada<\u002Fth><td>${fmt(r.basis.inputActiveW/1000)} kW<\u002Ftd><th>Potência aparente<\u002Fth><td>${fmt(r.basis.apparentVA/1000)} kVA<\u002Ftd><\u002Ftr><tr><th>Fator de potência<\u002Fth><td>${fmtSmart(r.pf)}<\u002Ftd><th>Rendimento<\u002Fth><td>${fmtSmart(r.efficiency)}<\u002Ftd><\u002Ftr><tr><th>Corrente nominal<\u002Fth><td>${fmt(r.basis.nominalCurrent)} A<\u002Ftd><th>Corrente de projeto Ib<\u002Fth><td><b>${fmt(r.basis.designCurrent)} A<\u002Fb><\u002Ftd><\u002Ftr><\u002Ftbody><\u002Ftable><h2>3. Seção exigida por critério<\u002Fh2><table class=\"report-table\"><thead><tr><th>Critério<\u002Fth><th>Seção<\u002Fth><th>Condição<\u002Fth><th>Governante<\u002Fth><\u002Ftr><\u002Fthead><tbody>${r.criteria.rows.map(row=>`<tr><td>${escapeHtml(row.label)}<\u002Ftd><td>${Number.isFinite(row.section)?fmtSmart(row.section)+' mm²':row.optional?'Não verificado':'Não encontrada'}<\u002Ftd><td>${escapeHtml(row.detail)}<\u002Ftd><td>${r.criteria.governing.includes(row.key)?'Sim':'Não'}<\u002Ftd><\u002Ftr>`).join('')}<\u002Ftbody><\u002Ftable><h2>4. Ampacidade, queda de tensão e proteção<\u002Fh2><table class=\"report-table\"><tbody><tr><th>Método / disposição<\u002Fth><td>${r.method} · ${escapeHtml(r.ampacity.variant)}<\u002Ftd><th>Qualidade do dado<\u002Fth><td>${qualityLabels[r.ampacity.quality]}<\u002Ftd><\u002Ftr><tr><th>Ampacidade base por cabo<\u002Fth><td>${fmt(r.ampacity.basePerCable)} A<\u002Ftd><th>Fatores Ft / Fg / paralelos<\u002Fth><td>${fmtSmart(r.ampacity.tempFactor)} / ${fmtSmart(r.ampacity.groupFactor)} / ${r.parallel}<\u002Ftd><\u002Ftr><tr><th>Iz corrigida<\u002Fth><td><b>${fmt(r.ampacity.corrected)} A<\u002Fb><\u002Ftd><th>Queda<\u002Fth><td>${fmt(r.drop.volts)} V · <b>${fmt(r.drop.percent)}%<\u002Fb><\u002Ftd><\u002Ftr><tr><th>Disjuntor<\u002Fth><td>${r.protection.rating||'—'} A · curva ${r.protection.curve} · ${r.protection.poles}<\u002Ftd><th>Poder de interrupção<\u002Fth><td>${r.protection.icn||'—'} kA · ${r.protection.breakingOk===null?'não verificado':r.protection.breakingOk?'atende':'não atende'}<\u002Ftd><\u002Ftr><tr><th>Coordenação<\u002Fth><td>Ib ${fmt(r.basis.designCurrent)} ≤ In ${r.protection.rating||'—'} ≤ Iz ${fmt(r.ampacity.corrected)}<\u002Ftd><th>Atuação magnética<\u002Fth><td>${r.protection.magneticOk===null?'não verificada':r.protection.magneticOk?'triagem atendida':'requer análise de curva'}<\u002Ftd><\u002Ftr><\u002Ftbody><\u002Ftable><h2>5. Curto-circuito e infraestrutura<\u002Fh2><table class=\"report-table\"><tbody><tr><th>Icc máxima / mínima<\u002Fth><td>${r.shortData.checked?`${fmt(r.shortData.maxKA)} / ${fmt(r.shortData.minKA)} kA`:'não verificadas'}<\u002Ftd><th>Origem<\u002Fth><td>${escapeHtml(r.shortData.source)}<\u002Ftd><\u002Ftr><tr><th>Critério adiabático<\u002Fth><td>${r.shortData.checked?`${fmt(r.shortAdiabatic.requiredRaw)} mm² → ${fmtSmart(r.shortAdiabatic.required)} mm²`:'não verificado'}<\u002Ftd><th>Tempo / k<\u002Fth><td>${r.shortData.checked?`${fmtSmart(r.tripTime)} s / ${r.shortAdiabatic.k}`:'—'}<\u002Ftd><\u002Ftr><tr><th>Neutro / PE<\u002Fth><td>${r.neutral?fmtSmart(r.neutral):'—'} / ${fmtSmart(r.pe)} mm²<\u002Ftd><th>Eletroduto indicativo<\u002Fth><td>${r.conduit?.chosen?`${r.conduit.routes} × Ø ${r.conduit.chosen.d} mm`:'não encontrado'}<\u002Ftd><\u002Ftr><tr><th>Perdas<\u002Fth><td>${fmt(r.losses.lossW)} W · ${fmt(r.losses.monthlyKwh)} kWh/mês<\u002Ftd><th>Custo mensal<\u002Fth><td>${money(r.losses.monthlyCost)}<\u002Ftd><\u002Ftr><\u002Ftbody><\u002Ftable><h2>6. Alertas e observações<\u002Fh2><div class=\"report-note\">${[...r.validation.errors.map(x=>'ERRO: '+x),...r.validation.warnings.map(x=>'RESSALVA: '+x),...r.validation.infos.map(x=>'INFO: '+x)].map(escapeHtml).join('<br>')||'Nenhum alerta registrado.'}<\u002Fdiv>${reportFooter()}`;\n}\nfunction renderReport(){renderReportSelectors();if($('reportScope').value==='circuit'){const r=circuits().map(circuitResult).find(x=>x.id===$('reportCircuit').value);$('reportSheet').innerHTML=circuitReportHtml(r);}else $('reportSheet').innerHTML=projectReportHtml();}\nfunction openCircuitReport(id){$('reportScope').value='circuit';renderReportSelectors();$('reportCircuit').value=id;renderReport();showView('reportView');}\n\nfunction variantsForMethod(method){\n if(['A1','A2','B1','B2','C','D','E'].includes(method))return [{key:'2',label:'2 carregados'},{key:'3',label:'3 carregados'}];\n if(method==='F')return [{key:'2',label:'2 carregados'},{key:'3_trifolium',label:'3 · trifólio'},{key:'3_flat',label:'3 · plano justaposto'}];\n return [{key:'3_horizontal',label:'3 · plano horizontal'},{key:'3_vertical',label:'3 · plano vertical'}];\n}\n\nfunction recalculateActiveProject(){\n const rec=activeRecord();rec.circuits=(rec.circuits||[]).map(c=>calculateData(circuitRaw(c)));if(currentResult){currentResult=calculateData(circuitRaw(currentResult));rec.currentResult=currentResult;}saveState();renderDashboard();renderCircuits();renderDiagramSelectors();renderReportSelectors();if(currentResult)renderCalculation(currentResult);\n}\nfunction renderLibrary(){\n $('methodTable').innerHTML=Object.entries(methodInfo).map(([m,x])=>`<tr><td><b>${m}<\u002Fb><\u002Ftd><td>${escapeHtml(x.desc)}<\u002Ftd><td>${escapeHtml(x.coverage)}<\u002Ftd><\u002Ftr>`).join('');\n $('priceTable').innerHTML=sections.map(s=>{const p=state.prices[sectionKey(s)]||[0,0,0];return `<tr><td><b>${fmtSmart(s)} mm²<\u002Fb><\u002Ftd><td><input class=\"table-input\" type=\"number\" min=\"0\" step=\"0.01\" data-price=\"${sectionKey(s)}\" data-index=\"0\" value=\"${p[0]}\"><\u002Ftd><td><input class=\"table-input\" type=\"number\" min=\"0\" step=\"0.01\" data-price=\"${sectionKey(s)}\" data-index=\"1\" value=\"${p[1]}\"><\u002Ftd><td><input class=\"table-input\" type=\"number\" min=\"0\" step=\"0.1\" data-price=\"${sectionKey(s)}\" data-index=\"2\" value=\"${p[2]}\"> mm<\u002Ftd><\u002Ftr>`;}).join('');renderAmpacityLibrary();\n}\nfunction renderAmpacityLibrary(){\n const material=$('libMaterial').value,insulation=$('libInsulation').value,method=$('libMethod').value,variants=variantsForMethod(method);const root=material==='copper'?AMPACITY_COPPER:AMPACITY_ALUMINUM;\n $('librarySource').textContent=material==='copper'?'Cobre: referências técnicas públicas organizadas por método e isolação; 630 mm² extrapolado.':'Alumínio: valores iniciais derivados de forma conservadora; substitua pelos dados do cabo/fabricante especificado.';\n $('ampacityLibrary').innerHTML=`<div class=\"table-wrap\" style=\"max-height:520px\"><table><thead><tr><th>Seção<\u002Fth>${variants.map(v=>`<th>${escapeHtml(v.label)} (A)<\u002Fth>`).join('')}<th>Rastreabilidade<\u002Fth><\u002Ftr><\u002Fthead><tbody>${sections.map(s=>{let qualities=[];const cells=variants.map(v=>{const base=root?.[insulation]?.[method]?.[v.key]?.[sectionKey(s)];if(base===undefined)return'<td>—<\u002Ftd>';const key=overrideKey(material,insulation,method,v.key,s),custom=state.ampacityOverrides[key],value=custom??base;const quality=custom!==undefined?'custom':Number(s)===630?'extrapolated':material==='aluminum'?'derived':'reference';qualities.push(quality);return `<td><input class=\"table-input\" type=\"number\" min=\"0.1\" step=\"0.5\" data-amp-key=\"${key}\" data-default=\"${base}\" value=\"${value}\" title=\"${qualityLabels[quality]}\"><\u002Ftd>`;}).join('');const q=qualities.includes('custom')?'custom':qualities.includes('extrapolated')?'extrapolated':qualities.includes('derived')?'derived':qualities.length?'reference':'missing';return `<tr><td><b>${fmtSmart(s)} mm²<\u002Fb><\u002Ftd>${cells}<td class=\"quality-${q}\">${qualityLabels[q]}<\u002Ftd><\u002Ftr>`;}).join('')}<\u002Ftbody><\u002Ftable><\u002Fdiv><div class=\"notice\" style=\"margin-top:12px\">Edite uma célula para criar uma personalização local. Digitar novamente o valor original remove a personalização daquela célula. Os fatores de temperatura e agrupamento são aplicados depois da ampacidade base.<\u002Fdiv>`;\n}\nfunction resetSelectedAmpacity(){const prefix=[$('libMaterial').value,$('libInsulation').value,$('libMethod').value].join('|')+'|';Object.keys(state.ampacityOverrides).filter(k=>k.startsWith(prefix)).forEach(k=>delete state.ampacityOverrides[k]);recalculateActiveProject();renderAmpacityLibrary();toast('Personalizações da combinação removidas.');}\nfunction renderSettings(){setValue('setDefaultDrop',state.settings.defaultDrop);setValue('setTariff',state.settings.tariff);setValue('setYears',state.settings.years);setValue('setEscalation',state.settings.escalation);}\nfunction exportBackup(){const payload={format:'eletrocabos-workspace',schemaVersion:SCHEMA_VERSION,exportedAt:new Date().toISOString(),...state};downloadText(JSON.stringify(payload,null,2),'application/json',`EletroCabos_Backup_${today()}.json`);toast('Backup completo exportado.');}\nfunction importPayload(payload){\n if(payload?.format==='eletrocabos-project'&&payload.project){const p=normalizeProjectRecord(payload.project);p.id=uuid();p.project.name=p.project.name||'Projeto importado';state.projects.push(p);state.activeProjectId=p.id;return;}\n if(Array.isArray(payload?.projects)){state=normalizeWorkspace(payload);return;}\n if(payload?.project&&Array.isArray(payload?.circuits)){state=migrateLegacy(payload);return;}\n if(payload?.id&&payload?.project){const p=normalizeProjectRecord(payload);p.id=uuid();state.projects.push(p);state.activeProjectId=p.id;return;}\n throw new Error('Formato de arquivo não reconhecido.');\n}\nasync function importFileSelected(file){try{const text=await file.text();importPayload(JSON.parse(text));saveState(false);loadActiveProjectContext();toast('Dados importados com sucesso.');}catch(e){console.error(e);alert(`Não foi possível importar o arquivo: ${e.message}`);}finally{$('importFile').value='';}}\nfunction runSelfTests(){\n const tests=[];const test=(name,fn)=>{try{const detail=fn();tests.push({name,ok:detail===true||detail?.ok!==false,detail:detail===true?'':String(detail?.detail??detail??'')});}catch(e){tests.push({name,ok:false,detail:e.message});}};\n test('Tabela PVC · B1 · 2,5 mm² · 2 carregados',()=>({ok:rawAmpacity('copper','pvc','B1','2',2.5).value===24,detail:`obtido ${rawAmpacity('copper','pvc','B1','2',2.5).value} A; esperado 24 A`}));\n test('Tabela HEPR · F · 16 mm² · trifólio',()=>({ok:rawAmpacity('copper','xlpe','F','3_trifolium',16).value===101,detail:`obtido ${rawAmpacity('copper','xlpe','F','3_trifolium',16).value} A; esperado 101 A`}));\n const base={name:'Teste',board:'QD-T',category:'tue',system:'3f',voltageChoice:'380',voltageCustom:380,frequency:60,power:10,powerUnit:'kW',powerBasis:'input',pf:.9,efficiency:.95,demand:1,length:30,material:'copper',insulation:'pvc',method:'B1',installation:'Eletroduto aparente',arrangement:'auto',temperature:30,grouped:1,groupingMode:'bundle',loaded:3,parallel:1,parallelRouting:'common',parallelVerified:true,shortMode:'direct',tripTime:.1,breakerCurve:'C',breakingCapacity:'10',shortCurrent:3,shortMinCurrent:1.5,transformerSystem:'three',transformerKva:300,transformerUk:5,upstreamLength:20,upstreamSection:95,upstreamMaterial:'copper',maxDrop:4,rcd:'auto',hours:8,days:22,tariff:.95,reserve:0};\n test('Corrente trifásica de referência',()=>{const i=electricalBasis(base).nominalCurrent;return {ok:Math.abs(i-16.88)<.05,detail:`obtido ${fmt(i)} A; esperado aproximadamente 16,88 A`};});\n test('Queda diminui com o aumento da seção',()=>({ok:voltageDrop(16,base).percent<voltageDrop(10,base).percent,detail:`10 mm²: ${fmt(voltageDrop(10,base).percent)}%; 16 mm²: ${fmt(voltageDrop(16,base).percent)}%`}));\n test('Coordenação encontra disjuntor padronizado',()=>{const r=calculateData(base);return {ok:!!r.protection?.rating&&r.protection.overloadOk,detail:r.protection?`${r.protection.rating} A; Ib ${fmt(r.basis.designCurrent)} A; Iz ${fmt(r.ampacity.corrected)} A`:'sem resultado'};});\n test('Qualidade de 630 mm² identificada',()=>({ok:rawAmpacity('copper','pvc','B1','2',630).quality==='extrapolated',detail:qualityLabels[rawAmpacity('copper','pvc','B1','2',630).quality]}));\n test('Paralelos em rotas separadas ampliam Iz',()=>{const d={...base,parallel:2,parallelRouting:'separate',parallelVerified:true};const a1=getAmpacityInfo(16,base),a2=getAmpacityInfo(16,d);return {ok:Math.abs(a2.corrected-2*a1.corrected)<.01,detail:`simples ${fmt(a1.corrected)} A; paralelo ${fmt(a2.corrected)} A`};});\n test('Estimativa de curto produz Icc máx. > Icc mín.',()=>{const sd=shortCircuitData({...base,shortMode:'transformer'},electricalBasis(base));return {ok:sd.maxKA>sd.minKA&&sd.minKA>0,detail:`${fmt(sd.maxKA)} / ${fmt(sd.minKA)} kA`};});\n test('Serialização do espaço de trabalho',()=>{const n=normalizeWorkspace(JSON.parse(JSON.stringify(state)));return {ok:n.projects.length===state.projects.length&&!!n.activeProjectId,detail:`${n.projects.length} projeto(s) preservado(s)`};});\n const passed=tests.filter(t=>t.ok).length;$('selfTestResults').innerHTML=`<div class=\"notice ${passed===tests.length?'success':'danger'}\"><b>${passed} de ${tests.length} testes aprovados.<\u002Fb><\u002Fdiv><div class=\"validation-list\" style=\"margin-top:10px\">${tests.map(t=>`<div class=\"validation-item ${t.ok?'info':'error'}\"><span class=\"mark\">${t.ok?'✓':'✕'}<\u002Fspan><span><b>${escapeHtml(t.name)}<\u002Fb>${t.detail?`<br>${escapeHtml(t.detail)}`:''}<\u002Fspan><\u002Fdiv>`).join('')}<\u002Fdiv>`;return {passed,total:tests.length,tests};\n}\nfunction renderAll(){renderProjectSwitcher();renderProjects();renderProjectFields();renderDashboard();renderCircuits();renderComparisonSelectors();renderComparison();renderDiagramSelectors();renderReportSelectors();renderReport();renderLibrary();renderSettings();if(currentResult)renderCalculation(currentResult);}\nconst viewMeta={projectsView:['Projetos locais','Portfólio armazenado no navegador'],dashboardView:['Visão geral','Resumo técnico do projeto ativo'],projectView:['Dados do projeto','Identificação, premissas e responsável'],circuitView:['Dimensionar circuito','Critérios simultâneos e memória auditável'],circuitsView:['Quadro de circuitos','Consolidação dos dimensionamentos'],compareView:['Comparar bitolas','Desempenho técnico e custo indicativo'],diagramView:['Diagrama unifilar','Representação simplificada do circuito'],reportView:['Relatório técnico','Resumo de projeto ou memória individual'],libraryView:['Biblioteca técnica','Ampacidades, métodos, preços e rastreabilidade'],settingsView:['Configurações','Parâmetros, backup e autodiagnóstico']};\nfunction showView(id){\n activeView=id;document.querySelectorAll('.view').forEach(v=>v.classList.toggle('active',v.id===id));document.querySelectorAll('.nav-btn[data-view]').forEach(b=>b.classList.toggle('active',b.dataset.view===id));const [title,sub]=viewMeta[id]||['EletroCabos Pro',''];$('pageTitle').textContent=title;$('pageSubtitle').textContent=sub;$('sidebar').classList.remove('open');\n if(id==='dashboardView')renderDashboard();if(id==='compareView'){renderComparisonSelectors();renderComparison();}if(id==='diagramView')renderDiagramSelectors();if(id==='reportView')renderReport();if(id==='libraryView')renderLibrary();if(id==='projectsView')renderProjects();window.scrollTo({top:0,behavior:'smooth'});\n}\nfunction handleDelegatedClick(e){\n const go=e.target.closest('[data-go]');if(go){showView(go.dataset.go);return;}\n const pa=e.target.closest('[data-project-action]');if(pa){const {projectAction:a,id}=pa.dataset;if(a==='activate')activateProject(id);if(a==='duplicate')duplicateProject(id);if(a==='export')exportProject(id);if(a==='delete')deleteProject(id);return;}\n const ca=e.target.closest('[data-circuit-action]');if(ca){const {circuitAction:a,id}=ca.dataset;if(a==='edit')editCircuit(id);if(a==='duplicate')duplicateCircuit(id);if(a==='report')openCircuitReport(id);if(a==='delete')deleteCircuit(id);return;}\n const close=e.target.closest('[data-close]');if(close)$(close.dataset.close).classList.remove('open');\n}\nfunction bindEvents(){\n document.addEventListener('click',handleDelegatedClick);document.querySelectorAll('.nav-btn[data-view]').forEach(b=>b.addEventListener('click',()=>showView(b.dataset.view)));\n $('menuToggle').addEventListener('click',()=>$('sidebar').classList.toggle('open'));$('projectSwitcher').addEventListener('change',e=>activateProject(e.target.value));$('newProjectBtn').addEventListener('click',createNewProject);$('newCircuitTop').addEventListener('click',()=>{resetForm();showView('circuitView');});$('addCircuitBtn').addEventListener('click',()=>{resetForm();showView('circuitView');});\n document.querySelectorAll('[data-project]').forEach(el=>el.addEventListener('input',()=>{const key=el.dataset.project;projectData()[key]=el.type==='number'||key==='defaultVoltage'?Number(el.value):el.value;saveState();renderProjectSwitcher();renderProjects();renderProjectFields();}));\n const formIds=['cName','cBoard','cCategory','cSystem','cVoltage','cVoltageCustom','cFrequency','cPower','cPowerUnit','cPowerBasis','cPF','cEfficiency','cDemand','cLength','cMaterial','cInsulation','cMethod','cInstallation','cArrangement','cTemperature','cGrouped','cGroupingMode','cLoaded','cParallel','cParallelRouting','cParallelVerified','cShortMode','cTripTime','cBreakerCurve','cBreakingCapacity','cShortCurrent','cShortMinCurrent','cTransformerSystem','cTransformerKva','cTransformerUk','cUpstreamLength','cUpstreamSection','cUpstreamMaterial','cMaxDrop','cRCD','cHours','cDays','cTariff','cReserve'];\n formIds.forEach(id=>$(id).addEventListener('input',syncFormUI));$('cSystem').addEventListener('change',()=>{$('cLoaded').value=systemConfigs[$('cSystem').value].loaded;syncFormUI();});\n $('calculateBtn').addEventListener('click',()=>calculateCurrent());$('saveCircuitBtn').addEventListener('click',saveCurrentCircuit);$('clearCircuitBtn').addEventListener('click',resetForm);$('detailsBtn').addEventListener('click',openDetails);$('exportCsvBtn').addEventListener('click',exportCircuitsCsv);\n $('compareCircuit').addEventListener('change',renderComparison);$('diagramCircuit').addEventListener('change',renderDiagram);$('diagramReportBtn').addEventListener('click',()=>{const r=selectedDiagramResult();if(r&&circuits().some(c=>c.id===r.id))openCircuitReport(r.id);else toast('Salve o circuito antes de gerar o relatório individual.');});\n $('reportScope').addEventListener('change',renderReport);$('reportCircuit').addEventListener('change',renderReport);$('refreshReportBtn').addEventListener('click',renderReport);$('printReportBtn').addEventListener('click',()=>{renderReport();window.print();});\n ['libMaterial','libInsulation','libMethod'].forEach(id=>$(id).addEventListener('change',renderAmpacityLibrary));$('resetAmpacityBtn').addEventListener('click',resetSelectedAmpacity);$('resetPricesBtn').addEventListener('click',()=>{if(confirm('Restaurar todos os preços e diâmetros de referência?')){state.prices=clone(defaultPrices);recalculateActiveProject();renderLibrary();toast('Biblioteca de custos restaurada.');}});\n $('priceTable').addEventListener('change',e=>{const el=e.target.closest('[data-price]');if(!el)return;const key=el.dataset.price,index=Number(el.dataset.index);state.prices[key]=state.prices[key]||[0,0,0];state.prices[key][index]=Number(el.value);recalculateActiveProject();toast('Valor de referência atualizado.');});\n $('ampacityLibrary').addEventListener('change',e=>{const el=e.target.closest('[data-amp-key]');if(!el)return;const value=Number(el.value),def=Number(el.dataset.default);if(!Number.isFinite(value)||value<=0){el.value=def;delete state.ampacityOverrides[el.dataset.ampKey];}else if(Math.abs(value-def)<1e-9)delete state.ampacityOverrides[el.dataset.ampKey];else state.ampacityOverrides[el.dataset.ampKey]=value;recalculateActiveProject();renderAmpacityLibrary();toast('Ampacidade personalizada salva localmente.');});\n const settingsMap={setDefaultDrop:'defaultDrop',setTariff:'tariff',setYears:'years',setEscalation:'escalation'};Object.entries(settingsMap).forEach(([id,key])=>$(id).addEventListener('change',()=>{state.settings[key]=Number($(id).value);if(['years','escalation'].includes(key))recalculateActiveProject();else saveState();toast('Configuração atualizada.');}));\n $('themeBtn').addEventListener('click',()=>{state.theme=document.body.classList.toggle('dark')?'dark':'light';saveState(false);renderDiagram();renderDashboard();});$('exportBtn').addEventListener('click',exportBackup);$('exportSettingsBtn').addEventListener('click',exportBackup);$('importBtn').addEventListener('click',()=>$('importFile').click());$('importProjectTop').addEventListener('click',()=>$('importFile').click());$('importFile').addEventListener('change',e=>{if(e.target.files[0])importFileSelected(e.target.files[0]);});\n $('wipeBtn').addEventListener('click',()=>{if(confirm('Apagar definitivamente todos os projetos, configurações e personalizações deste navegador?')){localStorage.removeItem(STORAGE_KEY);localStorage.removeItem(LEGACY_KEY);state=createDefaultWorkspace();saveState(false);loadActiveProjectContext();toast('Dados locais reiniciados.');}});$('runTestsBtn').addEventListener('click',runSelfTests);\n $('newProjectBtn').addEventListener('dblclick',e=>e.preventDefault());window.addEventListener('resize',()=>{if(activeView==='dashboardView')renderDashboard();});$('detailsModal').addEventListener('click',e=>{if(e.target===$('detailsModal'))$('detailsModal').classList.remove('open');});\n}\nfunction init(){\n $('cUpstreamSection').innerHTML=sections.filter(s=>s>=1.5).map(s=>`<option value=\"${s}\" ${s===95?'selected':''}>${fmtSmart(s)} mm²<\u002Foption>`).join('');document.body.classList.toggle('dark',state.theme==='dark');renderSettings();bindEvents();\n const saved=activeRecord().currentResult;if(saved){currentResult=saved.criteria?saved:calculateData(circuitRaw(saved));fillForm(currentResult);}else resetForm();renderAll();showView('dashboardView');runSplash();\n}\nfunction runSplash(){\n const splash=$('splash'),cv=$('boltCanvas'),ctx=cv.getContext('2d');\n const dpr=Math.min(window.devicePixelRatio||1,2);let W=0,H=0;\n function resize(){W=cv.width=innerWidth*dpr;H=cv.height=innerHeight*dpr;}\n resize();window.addEventListener('resize',resize);\n const palette=['#4cc9f0','#7b5cff','#f72585','#ffd166','#3aefff','#b5179e','#8affc1'];\n // midpoint-displacement lightning path with branches\n function makePath(a,b,detail,offset){\n  let segs=[[a,b]];\n  for(let i=0;i<detail;i++){\n   const next=[];\n   for(const [p,q] of segs){\n    const mid={x:(p.x+q.x)/2,y:(p.y+q.y)/2};\n    const dx=q.x-p.x,dy=q.y-p.y,len=Math.hypot(dx,dy)||1;\n    const disp=(Math.random()-.5)*offset;\n    mid.x+=(-dy/len)*disp;mid.y+=(dx/len)*disp;\n    next.push([p,mid],[mid,q]);\n   }\n   segs=next;offset*=.55;\n  }\n  return segs;\n }\n let bolts=[];\n function spawn(x0){\n  const startX=x0!=null?x0:Math.random()*W;\n  const end={x:startX+(Math.random()-.5)*W*.55,y:H*(.72+Math.random()*.28)};\n  const segs=makePath({x:startX,y:-40},end,7,W*.16);\n  const color=palette[(Math.random()*palette.length)|0];\n  const width=(1.4+Math.random()*2.2)*dpr;\n  const bolt={segs,color,width,life:1,branches:[]};\n  // side branches\n  for(let i=0;i<segs.length;i+=1){\n   if(Math.random()<.14){\n    const [p]=segs[i];\n    const bend={x:p.x+(Math.random()-.5)*W*.3,y:p.y+H*(.12+Math.random()*.22)};\n    bolt.branches.push(makePath(p,bend,4,W*.08));\n   }\n  }\n  bolts.push(bolt);\n }\n function stroke(segs,color,width,alpha){\n  ctx.beginPath();ctx.moveTo(segs[0][0].x,segs[0][0].y);\n  for(const [,q] of segs)ctx.lineTo(q.x,q.y);\n  ctx.lineJoin='round';ctx.lineCap='round';\n  ctx.shadowBlur=22*dpr;ctx.shadowColor=color;\n  ctx.strokeStyle=color;ctx.globalAlpha=alpha*.5;ctx.lineWidth=width*2.6;ctx.stroke();\n  ctx.globalAlpha=alpha;ctx.lineWidth=width;ctx.strokeStyle='#f4faff';ctx.shadowColor=color;ctx.stroke();\n }\n let running=true,slowMode=false,frame=0;\n function loop(){\n  if(!running)return;\n  frame++;\n  ctx.globalAlpha=1;ctx.shadowBlur=0;\n  ctx.fillStyle='rgba(4,8,22,'+(slowMode?0.30:0.24)+')';\n  ctx.fillRect(0,0,W,H);\n  const rate=slowMode?0.03:0.16;\n  if(Math.random()<rate)spawn();\n  for(const b of bolts){\n   stroke(b.segs,b.color,b.width,b.life);\n   for(const br of b.branches)stroke(br,b.color,b.width*.6,b.life*.8);\n   b.life-=slowMode?0.05:0.09;\n  }\n  bolts=bolts.filter(b=>b.life>0);\n  ctx.globalAlpha=1;ctx.shadowBlur=0;\n  requestAnimationFrame(loop);\n }\n spawn(W*.5);loop();\n // progress bar over ~4.6s\n const bar=$('splashBar'),loadEl=$('splashLoading');\n const msgs=['Energizando o motor de c\\u00e1lculo\\u2026','Carregando tabelas de condutores\\u2026','Preparando crit\\u00e9rios NBR 5410\\u2026','Pronto.'];\n const t0=performance.now(),DUR=4600;\n (function tick(){\n  const p=Math.min(1,(performance.now()-t0)/DUR);\n  bar.style.width=(p*100)+'%';\n  loadEl.textContent=msgs[Math.min(msgs.length-1,Math.floor(p*msgs.length))];\n  if(p<1)requestAnimationFrame(tick);\n })();\n // after 5s -> show legal notice, calm the storm\n setTimeout(()=>{\n  slowMode=true;\n  $('splashHero').classList.add('gone');\n  $('splashLegal').classList.add('show');\n },5000);\n // legal gate\n const chk=$('legalAgree'),btn=$('legalEnter');\n chk.addEventListener('change',()=>{btn.disabled=!chk.checked;});\n btn.addEventListener('click',()=>{\n  if(!chk.checked)return;\n  running=false;\n  splash.classList.add('hide');\n  setTimeout(()=>splash.remove(),700);\n });\n}\nif(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init);else init();\n<\u002Fscript>\n\n<\u002Fbody><\u002Fhtml>"
  </script>
