  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

nearGradient id=\"boltGrad\" x1=\"0\" y1=\"0\" x2=\"1\" y2=\"1\"><stop offset=\"0\" stop-color=\"#9be6ff\"><\u002Fstop><stop offset=\"1\" stop-color=\"#c9b6ff\"><\u002Fstop><\u002FlinearGradient><\u002Fdefs><\u002Fsvg><\u002Fdiv>\n   <h1>CircuitoPro<\u002Fh1>\n   <p class=\"subtitle\">Calculadora de Cabos e Circuitos Elétricos<\u002Fp>\n   <div class=\"splash-progress\"><i id=\"splashBar\"><\u002Fi><\u002Fdiv>\n   <div class=\"splash-loading\" id=\"splashLoading\">Energizando o motor de cálculo…<\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"splash-legal\" id=\"splashLegal\">\n   <h2><span class=\"lg-dot\"><\u002Fspan>Aviso Legal e Termo de Responsabilidade<\u002Fh2>\n   <p class=\"lg-sub\">Leia atentamente antes de utilizar o CircuitoPro.<\u002Fp>\n   <div class=\"legal-body\">\n    <p>O <strong>CircuitoPro<\u002Fstrong> é uma ferramenta de apoio ao dimensionamento de cabos e circuitos elétricos. Os resultados têm caráter <strong>orientativo<\u002Fstrong> e não substituem a análise, o julgamento e a assinatura de um profissional legalmente habilitado (engenheiro eletricista ou técnico com atribuição correspondente).<\u002Fp>\n    <p>Todo projeto elétrico deve observar a <strong>ABNT NBR 5410 / NBR 14039<\u002Fstrong>, as normas da concessionária local e a legislação vigente. O usuário é o único responsável por conferir os dados de entrada, as premissas adotadas e a adequação dos resultados à instalação real.<\u002Fp>\n    <p>O CircuitoPro é fornecido \"no estado em que se encontra\", sem garantias de qualquer natureza. Os autores <strong>não se responsabilizam<\u002Fstrong> por danos diretos ou indiretos, prejuízos, acidentes ou não conformidades decorrentes do uso desta ferramenta.<\u002Fp>\n    <p>Todos os dados de projetos ficam armazenados <strong>localmente<\u002Fstrong> neste navegador. Recomenda-se realizar backups periódicos.<\u002Fp>\n   <\u002Fdiv>\n   <label class=\"legal-check\"><input type=\"checkbox\" id=\"legalAgree\"><span>Li, compreendi e concordo com o aviso legal acima, assumindo total responsabilidade técnica pela utilização dos resultados.<\u002Fspan><\u002Flabel>\n   <div class=\"legal-actions\"><button class=\"btn\" id=\"legalEnter\" disabled=\"\">Concordo e entrar no sistema<\u002Fbutton><\u002Fdiv>\n  <\u002Fdiv>\n <\u002Fdiv>\n<\u002Fdiv>\n<div class=\"app\">\n<aside class=\"sidebar\" id=\"sidebar\">\n <div class=\"brand\"><div class=\"brand-icon\">⚡<\u002Fdiv><div><strong>CircuitoPro<\u002Fstrong><span>Cabos e circuitos elétricos<\u002Fspan><div class=\"version-pill\">versão 2.0 offline<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n <div class=\"nav-label\">Portfólio<\u002Fdiv>\n <button class=\"nav-btn\" data-view=\"projectsView\"><span class=\"ico\">▦<\u002Fspan>Projetos locais<\u002Fbutton>\n <div class=\"nav-label\">Projeto ativo<\u002Fdiv>\n <button class=\"nav-btn active\" data-view=\"dashboardView\"><span class=\"ico\">◫<\u002Fspan>Visão geral<\u002Fbutton>\n <button class=\"nav-btn\" data-view=\"projectView\"><span class=\"ico\">▤<\u002Fspan>Dados do projeto<\u002Fbutton>\n <button class=\"nav-btn\" data-view=\"circuitView\"><span class=\"ico\">⎍<\u002Fspan>Dimensionar circuito<\u002Fbutton>\n <button class=\"nav-btn\" data-view=\"circuitsView\"><span class=\"ico\">☷<\u002Fspan>Quadro de circuitos<\u002Fbutton>\n <div class=\"nav-label\">Análises<\u002Fdiv>\n <button class=\"nav-btn\" data-view=\"compareView\"><span class=\"ico\">⇄<\u002Fspan>Comparar bitolas<\u002Fbutton>\n <button class=\"nav-btn\" data-view=\"diagramView\"><span class=\"ico\">⌁<\u002Fspan>Diagrama unifilar<\u002Fbutton>\n <button class=\"nav-btn\" data-view=\"reportView\"><span class=\"ico\">▧<\u002Fspan>Relatório técnico<\u002Fbutton>\n <div class=\"nav-label\">Sistema<\u002Fdiv>\n <button class=\"nav-btn\" data-view=\"libraryView\"><span class=\"ico\">▥<\u002Fspan>Biblioteca técnica<\u002Fbutton>\n <button class=\"nav-btn\" data-view=\"settingsView\"><span class=\"ico\">⚙<\u002Fspan>Configurações<\u002Fbutton>\n <div class=\"sidebar-footer\">Aplicação offline. Projetos, tabelas personalizadas e configurações ficam no LocalStorage deste navegador.<\u002Fdiv>\n<\u002Faside>\n<main class=\"main\">\n<header class=\"topbar\">\n <div class=\"top-left\"><button class=\"menu-toggle\" id=\"menuToggle\">☰<\u002Fbutton><div class=\"page-title\"><h2 id=\"pageTitle\">Visão geral<\u002Fh2><small id=\"pageSubtitle\">Resumo técnico do projeto ativo<\u002Fsmall><\u002Fdiv><\u002Fdiv>\n <div class=\"top-actions\">\n  <select class=\"project-switcher\" id=\"projectSwitcher\" title=\"Trocar projeto ativo\"><\u002Fselect>\n  <button class=\"icon-btn\" id=\"themeBtn\" title=\"Alternar tema\">◐<\u002Fbutton>\n  <button class=\"btn\" id=\"exportBtn\">⇩ <span>Backup<\u002Fspan><\u002Fbutton>\n  <button class=\"btn primary\" id=\"newCircuitTop\">＋ <span>Novo circuito<\u002Fspan><\u002Fbutton>\n <\u002Fdiv>\n<\u002Fheader>\n<div class=\"content\">\n<section class=\"view\" id=\"projectsView\">\n <div class=\"card\"><div class=\"card-head\"><div><h3>Projetos armazenados neste navegador<\u002Fh3><div style=\"font-size:11px;color:var(--muted)\">Crie, duplique, exporte e alterne entre projetos independentes.<\u002Fdiv><\u002Fdiv><div><button class=\"btn small\" id=\"importProjectTop\">Importar<\u002Fbutton> <button class=\"btn small primary\" id=\"newProjectBtn\">＋ Novo projeto<\u002Fbutton><\u002Fdiv><\u002Fdiv><div id=\"projectsGrid\" class=\"project-grid\"><\u002Fdiv><\u002Fdiv>\n<\u002Fsection>\n<section class=\"view active\" id=\"dashboardView\">\n <div class=\"grid grid-5\" id=\"dashboardMetrics\"><\u002Fdiv>\n <div class=\"grid grid-2\" style=\"margin-top:16px\">\n  <div class=\"card\"><div class=\"card-head\"><h3>Distribuição da carga instalada<\u002Fh3><span class=\"badge\">por circuito<\u002Fspan><\u002Fdiv><div class=\"chart\"><canvas id=\"loadChart\"><\u002Fcanvas><\u002Fdiv><\u002Fdiv>\n  <div class=\"card\"><div class=\"card-head\"><h3>Queda de tensão dos circuitos<\u002Fh3><span class=\"badge\">% calculado<\u002Fspan><\u002Fdiv><div class=\"chart\"><canvas id=\"dropChart\"><\u002Fcanvas><\u002Fdiv><\u002Fdiv>\n <\u002Fdiv>\n <div class=\"grid grid-2\" style=\"margin-top:16px\"><div class=\"card\"><div class=\"card-head\"><h3>Últimos circuitos<\u002Fh3><button class=\"btn small\" data-go=\"circuitsView\">Ver todos<\u002Fbutton><\u002Fdiv><div id=\"recentCircuits\"><\u002Fdiv><\u002Fdiv><div class=\"card\"><h3>Diagnóstico do projeto<\u002Fh3><div id=\"diagnostics\"><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n<\u002Fsection>\n<section class=\"view\" id=\"projectView\">\n <div class=\"card\"><div class=\"card-head\"><h3>Identificação do projeto ativo<\u002Fh3><span class=\"status ok\">Salvamento automático<\u002Fspan><\u002Fdiv>\n  <div class=\"form-grid\">\n   <div class=\"field span-6\"><label>Nome do projeto / obra<\u002Flabel><input data-project=\"name\" id=\"projName\" placeholder=\"Ex.: Edifício Administrativo — QGBT\"><\u002Fdiv>\n   <div class=\"field span-6\"><label>Cliente / contratante<\u002Flabel><input data-project=\"client\" id=\"projClient\"><\u002Fdiv>\n   <div class=\"field span-4\"><label>Responsável técnico<\u002Flabel><input data-project=\"engineer\" id=\"projEngineer\"><\u002Fdiv>\n   <div class=\"field span-4\"><label>CREA / CFT<\u002Flabel><input data-project=\"registry\" id=\"projRegistry\"><\u002Fdiv>\n   <div class=\"field span-4\"><label>Data de referência<\u002Flabel><input data-project=\"date\" id=\"projDate\" type=\"date\"><\u002Fdiv>\n   <div class=\"field span-6\"><label>Local da instalação<\u002Flabel><input data-project=\"location\" id=\"projLocation\"><\u002Fdiv>\n   <div class=\"field span-3\"><label>Tipo de instalação<\u002Flabel><select data-project=\"type\" id=\"projType\"><option>Residencial<\u002Foption><option>Comercial<\u002Foption><option>Industrial<\u002Foption><option>Hospitalar<\u002Foption><option>Escolar<\u002Foption><option>Predial<\u002Foption><option>Iluminação pública<\u002Foption><option>Outro<\u002Foption><\u002Fselect><\u002Fdiv>\n   <div class=\"field span-3\"><label>Tensão nominal do projeto<\u002Flabel><select data-project=\"defaultVoltage\" id=\"projVoltage\"><option value=\"127\">127 V<\u002Foption><option value=\"220\">220 V<\u002Foption><option value=\"380\">380 V<\u002Foption><option value=\"440\">440 V<\u002Foption><\u002Fselect><\u002Fdiv>\n   <div class=\"field span-12\"><label>Observações gerais<\u002Flabel><textarea data-project=\"notes\" id=\"projNotes\" rows=\"4\" placeholder=\"Premissas, critérios, origem da alimentação, condições especiais...\"><\u002Ftextarea><\u002Fdiv>\n  <\u002Fdiv>\n <\u002Fdiv>\n <div class=\"grid grid-3\" style=\"margin-top:16px\"><div class=\"card metric\"><span class=\"label\">Circuitos cadastrados<\u002Fspan><div class=\"value\" id=\"projCircuitCount\">0<\u002Fdiv><span class=\"sub\">alimentadores e circuitos terminais<\u002Fspan><div class=\"bubble\"><\u002Fdiv><\u002Fdiv><div class=\"card metric\"><span class=\"label\">Potência instalada<\u002Fspan><div class=\"value\" id=\"projPower\">0 kW<\u002Fdiv><span class=\"sub\">soma das cargas cadastradas<\u002Fspan><div class=\"bubble\"><\u002Fdiv><\u002Fdiv><div class=\"card metric\"><span class=\"label\">Demanda estimada<\u002Fspan><div class=\"value\" id=\"projDemand\">0 kW<\u002Fdiv><span class=\"sub\">após fatores individuais<\u002Fspan><div class=\"bubble\"><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n<\u002Fsection>\n<section class=\"view\" id=\"circuitView\">\n <div class=\"stepper\"><span class=\"step active\">1. Carga e sistema<\u002Fspan><span class=\"step active\">2. Instalação<\u002Fspan><span class=\"step active\">3. Curto e proteção<\u002Fspan><span class=\"step active\">4. Critérios<\u002Fspan><\u002Fdiv>\n <div class=\"grid\" style=\"grid-template-columns:minmax(0,1.38fr) minmax(360px,.62fr)\">\n  <div>\n   <div class=\"card\"><div class=\"card-head\"><h3>Dados elétricos do circuito<\u002Fh3><span class=\"badge\" id=\"editingBadge\">novo circuito<\u002Fspan><\u002Fdiv>\n    <div class=\"form-grid\">\n     <div class=\"field span-6\"><label>Identificação do circuito<\u002Flabel><input id=\"cName\" value=\"Circuito 1\"><\u002Fdiv>\n     <div class=\"field span-3\"><label>Quadro de origem<\u002Flabel><input id=\"cBoard\" value=\"QD-01\"><\u002Fdiv>\n     <div class=\"field span-3\"><label>Categoria<\u002Flabel><select id=\"cCategory\"><option value=\"lighting\">Iluminação<\u002Foption><option value=\"tug\">Tomadas de uso geral<\u002Foption><option value=\"tue\">Tomada de uso específico<\u002Foption><option value=\"motor\">Motor / bomba<\u002Foption><option value=\"hvac\">Ar-condicionado<\u002Foption><option value=\"shower\">Chuveiro / aquecimento<\u002Foption><option value=\"feeder\">Alimentador / quadro<\u002Foption><option value=\"elevator\">Elevador<\u002Foption><option value=\"other\">Outro<\u002Foption><\u002Fselect><\u002Fdiv>\n     <div class=\"field span-4\"><label>Configuração do circuito<\u002Flabel><select id=\"cSystem\"><option value=\"fn\">Fase + neutro (F+N)<\u002Foption><option value=\"ff\">Duas fases, sem neutro (2F)<\u002Foption><option value=\"2fn\">Duas fases + neutro (2F+N, carga distribuída)<\u002Foption><option value=\"3f\">Três fases, sem neutro (3F)<\u002Foption><option value=\"3fn\">Três fases + neutro (3F+N)<\u002Foption><\u002Fselect><small id=\"systemHelp\"><\u002Fsmall><\u002Fdiv>\n     <div class=\"field span-2\"><label>Tensão<\u002Flabel><select id=\"cVoltage\"><option value=\"127\">127 V<\u002Foption><option value=\"220\">220 V<\u002Foption><option value=\"380\">380 V<\u002Foption><option value=\"440\">440 V<\u002Foption><option value=\"custom\">Personalizada<\u002Foption><\u002Fselect><\u002Fdiv>\n     <div class=\"field span-2\"><label>Tensão personalizada (V)<\u002Flabel><input id=\"cVoltageCustom\" type=\"number\" min=\"12\" step=\"1\" value=\"220\" disabled=\"\"><\u002Fdiv>\n     <div class=\"field span-2\"><label>Frequência (Hz)<\u002Flabel><input id=\"cFrequency\" type=\"number\" value=\"60\" min=\"0\"><\u002Fdiv>\n     <div class=\"field span-4 inline\"><div><label>Potência / corrente<\u002Flabel><input id=\"cPower\" type=\"number\" min=\"0\" step=\"0.01\" value=\"2500\"><\u002Fdiv><div style=\"max-width:105px\"><label>Unidade<\u002Flabel><select id=\"cPowerUnit\"><option value=\"W\">W<\u002Foption><option value=\"kW\">kW<\u002Foption><option value=\"kVA\">kVA<\u002Foption><option value=\"CV\">CV<\u002Foption><option value=\"HP\">HP<\u002Foption><option value=\"A\">A<\u002Foption><\u002Fselect><\u002Fdiv><\u002Fdiv>\n     <div class=\"field span-2\"><label>Base da potência<\u002Flabel><select id=\"cPowerBasis\"><option value=\"auto\">Automática<\u002Foption><option value=\"input\">Elétrica de entrada<\u002Foption><option value=\"output\">Útil de saída<\u002Foption><\u002Fselect><\u002Fdiv>\n     <div class=\"field span-2\"><label>Fator de potência<\u002Flabel><input id=\"cPF\" type=\"number\" min=\"0.1\" max=\"1\" step=\"0.01\" value=\"0.92\"><\u002Fdiv>\n     <div class=\"field span-2\"><label>Rendimento<\u002Flabel><input id=\"cEfficiency\" type=\"number\" min=\"0.1\" max=\"1\" step=\"0.01\" value=\"0.95\"><\u002Fdiv>\n     <div class=\"field span-2\"><label>Fator de demanda<\u002Flabel><input id=\"cDemand\" type=\"number\" min=\"0.01\" max=\"2\" step=\"0.01\" value=\"1\"><\u002Fdiv>\n     <div class=\"field span-2\"><label>Comprimento (m)<\u002Flabel><input id=\"cLength\" type=\"number\" min=\"0.1\" step=\"0.1\" value=\"30\"><small>distância entre origem e carga<\u002Fsmall><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"section-title\">Condições de instalação e paralelismo<\u002Fdiv>\n    <div class=\"form-grid\">\n     <div class=\"field span-3\"><label>Material do condutor<\u002Flabel><select id=\"cMaterial\"><option value=\"copper\">Cobre<\u002Foption><option value=\"aluminum\">Alumínio<\u002Foption><\u002Fselect><\u002Fdiv>\n     <div class=\"field span-3\"><label>Isolação<\u002Flabel><select id=\"cInsulation\"><option value=\"pvc\">PVC 70 °C<\u002Foption><option value=\"xlpe\">HEPR / XLPE 90 °C<\u002Foption><\u002Fselect><\u002Fdiv>\n     <div class=\"field span-3\"><label>Método de referência<\u002Flabel><select id=\"cMethod\"><option value=\"A1\">A1 — condutores em eletroduto na parede isolante<\u002Foption><option value=\"A2\">A2 — cabo multipolar em eletroduto na parede isolante<\u002Foption><option value=\"B1\">B1 — condutores em eletroduto aparente/alvenaria<\u002Foption><option value=\"B2\">B2 — cabo multipolar em eletroduto<\u002Foption><option value=\"C\">C — cabos fixados diretamente<\u002Foption><option value=\"D\">D — eletroduto ou cabo enterrado<\u002Foption><option value=\"E\">E — cabo multipolar ao ar<\u002Foption><option value=\"F\">F — cabos unipolares justapostos ao ar<\u002Foption><option value=\"G\">G — cabos unipolares espaçados ao ar<\u002Foption><\u002Fselect><\u002Fdiv>\n     <div class=\"field span-3\"><label>Forma de instalação<\u002Flabel><select id=\"cInstallation\"><option>Eletroduto embutido<\u002Foption><option>Eletroduto aparente<\u002Foption><option>Eletrocalha<\u002Foption><option>Bandeja perfurada<\u002Foption><option>Bandeja não perfurada<\u002Foption><option>Leito<\u002Foption><option>Enterrado<\u002Foption><option>Canaleta<\u002Foption><option>Sob piso<\u002Foption><option>Sob forro<\u002Foption><option>Ao ar livre<\u002Foption><\u002Fselect><\u002Fdiv>\n     <div class=\"field span-3\"><label>Disposição dos cabos<\u002Flabel><select id=\"cArrangement\"><option value=\"auto\">Automática / conservadora<\u002Foption><option value=\"trifolium\">Trifólio<\u002Foption><option value=\"flat_touching\">Plano justaposto<\u002Foption><option value=\"flat_horizontal\">Plano espaçado horizontal<\u002Foption><option value=\"flat_vertical\">Plano espaçado vertical<\u002Foption><\u002Fselect><small>aplicável principalmente aos métodos F e G<\u002Fsmall><\u002Fdiv>\n     <div class=\"field span-3\"><label>Temperatura ambiente/solo (°C)<\u002Flabel><input id=\"cTemperature\" type=\"number\" min=\"10\" max=\"80\" value=\"30\"><small id=\"temperatureHelp\"><\u002Fsmall><\u002Fdiv>\n     <div class=\"field span-3\"><label>Circuitos ou cabos agrupados<\u002Flabel><input id=\"cGrouped\" type=\"number\" min=\"1\" max=\"30\" step=\"1\" value=\"1\"><\u002Fdiv>\n     <div class=\"field span-3\"><label>Forma de agrupamento<\u002Flabel><select id=\"cGroupingMode\"><option value=\"auto\">Automática pelo método<\u002Foption><option value=\"bundle\">Feixe / conduto fechado<\u002Foption><option value=\"wall\">Camada única sobre parede/piso<\u002Foption><option value=\"ceiling\">Camada única no teto<\u002Foption><option value=\"perforated\">Bandeja perfurada<\u002Foption><option value=\"ladder\">Leito / suporte<\u002Foption><\u002Fselect><\u002Fdiv>\n     <div class=\"field span-3\"><label>Condutores carregados<\u002Flabel><select id=\"cLoaded\"><option value=\"2\">2 condutores<\u002Foption><option value=\"3\">3 condutores<\u002Foption><\u002Fselect><\u002Fdiv>\n     <div class=\"field span-3\"><label>Cabos em paralelo por fase<\u002Flabel><input id=\"cParallel\" type=\"number\" min=\"1\" max=\"8\" step=\"1\" value=\"1\"><\u002Fdiv>\n     <div class=\"field span-3\"><label>Encaminhamento dos paralelos<\u002Flabel><select id=\"cParallelRouting\"><option value=\"common\">Todos no mesmo encaminhamento<\u002Foption><option value=\"separate\">Um conjunto por eletroduto/rota<\u002Foption><\u002Fselect><\u002Fdiv>\n     <div class=\"field span-3\"><label>Condições de paralelismo<\u002Flabel><div class=\"check-field\"><input id=\"cParallelVerified\" type=\"checkbox\"><span>Mesmo material, seção, comprimento, isolação, percurso e terminações<\u002Fspan><\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"section-title\">Curto-circuito e dispositivo de proteção<\u002Fdiv>\n    <div class=\"form-grid\">\n     <div class=\"field span-3\"><label>Modo do estudo de curto-circuito<\u002Flabel><select id=\"cShortMode\"><option value=\"direct\">Informar correntes no ponto<\u002Foption><option value=\"transformer\">Estimar por transformador + alimentador<\u002Foption><option value=\"skip\">Não verificar nesta etapa<\u002Foption><\u002Fselect><\u002Fdiv>\n     <div class=\"field span-3\"><label>Tempo de eliminação (s)<\u002Flabel><input id=\"cTripTime\" type=\"number\" min=\"0.01\" max=\"5\" step=\"0.01\" value=\"0.1\"><\u002Fdiv>\n     <div class=\"field span-3\"><label>Curva do disjuntor<\u002Flabel><select id=\"cBreakerCurve\"><option value=\"auto\">Automática pela carga<\u002Foption><option value=\"B\">Curva B<\u002Foption><option value=\"C\">Curva C<\u002Foption><option value=\"D\">Curva D<\u002Foption><\u002Fselect><\u002Fdiv>\n     <div class=\"field span-3\"><label>Poder de interrupção Icn<\u002Flabel><select id=\"cBreakingCapacity\"><option value=\"auto\">Automático<\u002Foption><option value=\"3\">3 kA<\u002Foption><option value=\"4.5\">4,5 kA<\u002Foption><option value=\"6\">6 kA<\u002Foption><option value=\"10\">10 kA<\u002Foption><option value=\"15\">15 kA<\u002Foption><option value=\"25\">25 kA<\u002Foption><option value=\"36\">36 kA<\u002Foption><option value=\"50\">50 kA<\u002Foption><\u002Fselect><\u002Fdiv>\n    <\u002Fdiv>\n    <div id=\"shortDirectFields\" class=\"form-grid\" style=\"margin-top:13px\">\n     <div class=\"field span-3\"><label>Corrente de curto máxima (kA)<\u002Flabel><input id=\"cShortCurrent\" type=\"number\" min=\"0\" step=\"0.1\" value=\"3\"><\u002Fdiv>\n     <div class=\"field span-3\"><label>Corrente de curto mínima (kA)<\u002Flabel><input id=\"cShortMinCurrent\" type=\"number\" min=\"0\" step=\"0.1\" value=\"1.5\"><small>usada na verificação da atuação magnética<\u002Fsmall><\u002Fdiv>\n    <\u002Fdiv>\n    <div id=\"shortTransformerFields\" class=\"form-grid hidden\" style=\"margin-top:13px\">\n     <div class=\"field span-2\"><label>Transformador<\u002Flabel><select id=\"cTransformerSystem\"><option value=\"three\">Trifásico<\u002Foption><option value=\"single\">Monofásico<\u002Foption><\u002Fselect><\u002Fdiv>\n     <div class=\"field span-2\"><label>Potência (kVA)<\u002Flabel><input id=\"cTransformerKva\" type=\"number\" min=\"1\" step=\"1\" value=\"300\"><\u002Fdiv>\n     <div class=\"field span-2\"><label>Impedância uk (%)<\u002Flabel><input id=\"cTransformerUk\" type=\"number\" min=\"0.1\" max=\"20\" step=\"0.1\" value=\"5\"><\u002Fdiv>\n     <div class=\"field span-2\"><label>Trecho a montante (m)<\u002Flabel><input id=\"cUpstreamLength\" type=\"number\" min=\"0\" step=\"0.1\" value=\"20\"><\u002Fdiv>\n     <div class=\"field span-2\"><label>Seção a montante (mm²)<\u002Flabel><select id=\"cUpstreamSection\"><\u002Fselect><\u002Fdiv>\n     <div class=\"field span-2\"><label>Material a montante<\u002Flabel><select id=\"cUpstreamMaterial\"><option value=\"copper\">Cobre<\u002Foption><option value=\"aluminum\">Alumínio<\u002Foption><\u002Fselect><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"section-title\">Demais critérios<\u002Fdiv>\n    <div class=\"form-grid\">\n     <div class=\"field span-3\"><label>Queda de tensão máxima (%)<\u002Flabel><input id=\"cMaxDrop\" type=\"number\" min=\"0.5\" max=\"10\" step=\"0.1\" value=\"4\"><\u002Fdiv>\n     <div class=\"field span-3\"><label>Dispositivo DR<\u002Flabel><select id=\"cRCD\"><option value=\"auto\">Recomendação automática<\u002Foption><option value=\"30\">DR 30 mA<\u002Foption><option value=\"300\">DR 300 mA<\u002Foption><option value=\"none\">Sem DR<\u002Foption><\u002Fselect><\u002Fdiv>\n     <div class=\"field span-2\"><label>Horas por dia<\u002Flabel><input id=\"cHours\" type=\"number\" min=\"0\" max=\"24\" step=\"0.5\" value=\"8\"><\u002Fdiv>\n     <div class=\"field span-2\"><label>Dias por mês<\u002Flabel><input id=\"cDays\" type=\"number\" min=\"0\" max=\"31\" value=\"22\"><\u002Fdiv>\n     <div class=\"field span-2\"><label>Tarifa (R$/kWh)<\u002Flabel><input id=\"cTariff\" type=\"number\" min=\"0\" step=\"0.01\" value=\"0.95\"><\u002Fdiv>\n     <div class=\"field span-2\"><label>Reserva (%)<\u002Flabel><input id=\"cReserve\" type=\"number\" min=\"0\" max=\"100\" step=\"1\" value=\"0\"><\u002Fdiv>\n    <\u002Fdiv>\n    <div id=\"formValidation\" style=\"margin-top:16px\"><\u002Fdiv>\n    <div class=\"actions-row\"><button class=\"btn primary\" id=\"calculateBtn\">⚡ Calcular dimensionamento<\u002Fbutton><button class=\"btn success\" id=\"saveCircuitBtn\">✓ Salvar circuito<\u002Fbutton><button class=\"btn\" id=\"clearCircuitBtn\">Limpar<\u002Fbutton><\u002Fdiv>\n   <\u002Fdiv>\n   <div class=\"card\" style=\"margin-top:16px\"><div class=\"card-head\"><h3>Memória de cálculo resumida<\u002Fh3><button class=\"btn small\" id=\"detailsBtn\">Ver detalhamento<\u002Fbutton><\u002Fdiv><div id=\"memorySummary\" class=\"notice\">Preencha os dados e execute o cálculo.<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n  <div><div class=\"card\" style=\"position:sticky;top:94px\"><div class=\"card-head\"><h3>Resultado do dimensionamento<\u002Fh3><span id=\"resultStatus\" class=\"status warn\">Aguardando<\u002Fspan><\u002Fdiv><div id=\"resultPanel\"><div class=\"empty\">Execute o cálculo para visualizar as seções exigidas por cada critério, a proteção, o curto-circuito e a infraestrutura.<\u002Fdiv><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n <\u002Fdiv>\n<\u002Fsection>\n<section class=\"view\" id=\"circuitsView\"><div class=\"card\"><div class=\"card-head\"><h3>Quadro consolidado de circuitos<\u002Fh3><div><button class=\"btn small\" id=\"exportCsvBtn\">CSV<\u002Fbutton> <button class=\"btn small primary\" id=\"addCircuitBtn\">＋ Adicionar<\u002Fbutton><\u002Fdiv><\u002Fdiv><div id=\"circuitsTable\"><\u002Fdiv><\u002Fdiv><\u002Fsection>\n<section class=\"view\" id=\"compareView\"><div class=\"grid grid-2\"><div class=\"card\"><h3>Critérios da comparação<\u002Fh3><p style=\"color:var(--muted);font-size:12px;line-height:1.6\">Selecione um circuito do projeto para avaliar as seções comerciais quanto à ampacidade corrigida, coordenação da proteção, queda de tensão, perdas e custo indicativo.<\u002Fp><div class=\"field\" style=\"margin:14px 0 12px\"><label for=\"compareCircuit\">Circuito a comparar<\u002Flabel><select id=\"compareCircuit\"><option value=\"\">Sem circuitos disponíveis<\u002Foption><\u002Fselect><\u002Fdiv><div id=\"compareBase\" class=\"notice\">Nenhum circuito selecionado.<\u002Fdiv><\u002Fdiv><div class=\"card\"><h3>Recomendação econômica<\u002Fh3><div id=\"economicRecommendation\" class=\"empty\">Selecione um circuito para comparar alternativas.<\u002Fdiv><\u002Fdiv><\u002Fdiv><div class=\"card\" style=\"margin-top:16px\"><div class=\"card-head\"><h3>Comparativo técnico-econômico<\u002Fh3><span class=\"badge\">seções comerciais<\u002Fspan><\u002Fdiv><div id=\"comparisonTable\"><\u002Fdiv><\u002Fdiv><\u002Fsection>\n<section class=\"view\" id=\"diagramView\"><div class=\"grid grid-2\"><div class=\"card\"><div class=\"card-head\"><h3>Diagrama unifilar simplificado<\u002Fh3><select id=\"diagramCircuit\" style=\"max-width:280px\"><\u002Fselect><\u002Fdiv><div class=\"unifilar\" id=\"unifilar\"><\u002Fdiv><\u002Fdiv><div class=\"card\"><h3>Legenda técnica<\u002Fh3><div id=\"diagramLegend\" class=\"notice\">Selecione um circuito dimensionado.<\u002Fdiv><div class=\"actions-row\"><button class=\"btn\" id=\"diagramReportBtn\">Abrir relatório do circuito<\u002Fbutton><\u002Fdiv><\u002Fdiv><\u002Fdiv><\u002Fsection>\n<section class=\"view\" id=\"reportView\"><div class=\"no-print card\" style=\"margin-bottom:14px\"><div class=\"form-grid\"><div class=\"field span-4\"><label>Escopo do relatório<\u002Flabel><select id=\"reportScope\"><option value=\"project\">Resumo do projeto<\u002Foption><option value=\"circuit\">Memória individual do circuito<\u002Foption><\u002Fselect><\u002Fdiv><div class=\"field span-5\"><label>Circuito<\u002Flabel><select id=\"reportCircuit\"><\u002Fselect><\u002Fdiv><div class=\"field span-3\" style=\"display:flex;align-items:end;justify-content:flex-end\"><div class=\"actions-row\" style=\"margin:0\"><button class=\"btn\" id=\"refreshReportBtn\">Atualizar<\u002Fbutton><button class=\"btn primary\" id=\"printReportBtn\">Imprimir / PDF<\u002Fbutton><\u002Fdiv><\u002Fdiv><\u002Fdiv><\u002Fdiv><div class=\"report-sheet\" id=\"reportSheet\"><\u002Fdiv><\u002Fsection>\n<section class=\"view\" id=\"libraryView\">\n <div class=\"notice warning\" style=\"margin-bottom:16px\"><b>Rastreabilidade da biblioteca:<\u002Fb> os valores iniciais de cobre são organizados por método, isolação, quantidade e disposição de condutores a partir de tabelas técnicas públicas do fabricante Corfio. Valores de alumínio são estimativas conservadoras derivadas e a seção de 630 mm² é extrapolada; ambos exigem validação ou substituição por dados do fabricante selecionado. As células podem ser personalizadas localmente.<\u002Fdiv>\n <div class=\"grid grid-2\"><div class=\"card\"><div class=\"card-head\"><h3>Métodos de instalação<\u002Fh3><span class=\"badge\">cobertura por tabela<\u002Fspan><\u002Fdiv><div class=\"table-wrap\"><table><thead><tr><th>Método<\u002Fth><th>Descrição resumida<\u002Fth><th>Disposições<\u002Fth><\u002Ftr><\u002Fthead><tbody id=\"methodTable\"><\u002Ftbody><\u002Ftable><\u002Fdiv><\u002Fdiv><div class=\"card\"><div class=\"card-head\"><h3>Seções comerciais, preços e diâmetros<\u002Fh3><button class=\"btn small\" id=\"resetPricesBtn\">Restaurar<\u002Fbutton><\u002Fdiv><div class=\"table-wrap\" style=\"max-height:460px\"><table><thead><tr><th>Seção<\u002Fth><th>Cobre R$/m<\u002Fth><th>Alumínio R$/m<\u002Fth><th>Ø externo ref.<\u002Fth><\u002Ftr><\u002Fthead><tbody id=\"priceTable\"><\u002Ftbody><\u002Ftable><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n <div class=\"card\" style=\"margin-top:16px\"><div class=\"card-head\"><div><h3>Capacidade de condução por combinação<\u002Fh3><div id=\"librarySource\" style=\"font-size:10px;color:var(--muted)\"><\u002Fdiv><\u002Fdiv><div style=\"display:flex;gap:8px;flex-wrap:wrap\"><select id=\"libMaterial\"><option value=\"copper\">Cobre<\u002Foption><option value=\"aluminum\">Alumínio<\u002Foption><\u002Fselect><select id=\"libInsulation\"><option value=\"pvc\">PVC 70 °C<\u002Foption><option value=\"xlpe\">HEPR / XLPE 90 °C<\u002Foption><\u002Fselect><select id=\"libMethod\"><option>A1<\u002Foption><option>A2<\u002Foption><option selected=\"\">B1<\u002Foption><option>B2<\u002Foption><option>C<\u002Foption><option>D<\u002Foption><option>E<\u002Foption><option>F<\u002Foption><option>G<\u002Foption><\u002Fselect><button class=\"btn small\" id=\"resetAmpacityBtn\">Limpar personalizações<\u002Fbutton><\u002Fdiv><\u002Fdiv><div id=\"ampacityLibrary\"><\u002Fdiv><\u002Fdiv>\n<\u002Fsection>\n<section class=\"view\" id=\"settingsView\">\n <div class=\"grid grid-2\"><div class=\"card\"><h3>Parâmetros gerais<\u002Fh3><div class=\"setting-row\"><label>Queda de tensão padrão<small>Preenchimento inicial de novos circuitos<\u002Fsmall><\u002Flabel><input id=\"setDefaultDrop\" type=\"number\" min=\"0.5\" max=\"10\" step=\"0.1\"><\u002Fdiv><div class=\"setting-row\"><label>Tarifa de energia padrão<small>Utilizada nas análises de perdas<\u002Fsmall><\u002Flabel><input id=\"setTariff\" type=\"number\" min=\"0\" step=\"0.01\"><\u002Fdiv><div class=\"setting-row\"><label>Horizonte econômico (anos)<small>Período indicativo para custo das perdas<\u002Fsmall><\u002Flabel><input id=\"setYears\" type=\"number\" min=\"1\" max=\"30\"><\u002Fdiv><div class=\"setting-row\"><label>Reajuste anual da energia (%)<small>Aplicado de forma simplificada<\u002Fsmall><\u002Flabel><input id=\"setEscalation\" type=\"number\" min=\"0\" max=\"50\" step=\"0.1\"><\u002Fdiv><\u002Fdiv>\n <div class=\"card\"><h3>Dados e segurança<\u002Fh3><p style=\"font-size:12px;color:var(--muted);line-height:1.6\">O backup completo inclui todos os projetos, preços, personalizações das tabelas e configurações. A importação reconhece também o formato da versão anterior.<\u002Fp><div class=\"actions-row\"><button class=\"btn\" id=\"importBtn\">Importar backup<\u002Fbutton><button class=\"btn\" id=\"exportSettingsBtn\">Expo  dados para exibir.',15,25);return;}const max=Math.max(...values.map(x=>x.value),limit||0,1);const pad={l:38,r:12,t:16,b:48};const chartW=w-pad.l-pad.r,chartH=h-pad.t-pad.b;ctx.strokeStyle=border;ctx.beginPath();ctx.moveTo(pad.l,pad.t);ctx.lineTo(pad.l,pad.t+chartH);ctx.lineTo(pad.l+chartW,pad.t+chartH);ctx.stroke();const bw=Math.max(8,Math.min(42,chartW/(values.length*1.7)));const gap=chartW/values.length;\n values.forEach((x,i)=>{const bh=chartH*x.value/max;const bx=pad.l+i*gap+(gap-bw)/2,by=pad.t+chartH-bh;ctx.fillStyle=primary;ctx.fillRect(bx,by,bw,bh);ctx.fillStyle=text;ctx.textAlign='center';ctx.fillText(`${fmtSmart(x.value)}${suffix}`,bx+bw/2,Math.max(10,by-5));ctx.save();ctx.translate(bx+bw/2,pad.t+chartH+8);ctx.rotate(-.45);ctx.textAlign='right';ctx.fillText(String(x.label).slice(0,14),0,0);ctx.restore();});\n if(limit){const y=pad.t+chartH-chartH*limit/max;ctx.setLineDash([5,4]);ctx.strokeStyle=getComputedStyle(document.body).getPropertyValue('--warning').trim()||'#b45309';ctx.beginPath();ctx.moveTo(pad.l,y);ctx.lineTo(pad.l+chartW,y);ctx.stroke();ctx.setLineDash([]);}\n}\nfunction renderDashboard(){\n const t=projectTotals();const rs=circuits().map(circuitResult);const metrics=[['Potência instalada',`${fmt(t.power/1000,2)} kW`,`${t.count} circuitos`],['Demanda estimada',`${fmt(t.demand/1000,2)} kW`,'demanda + reserva'],['Circuitos conformes',`${t.valid}/${t.count}`,t.errors?`${t.errors} erros registrados`:'sem erros'],['Perdas simultâneas',`${fmt(t.loss/1000,2)} kW`,'em corrente de projeto'],['Ressalvas técnicas',String(t.warnings),'avisos nos cálculos']];\n $('dashboardMetrics').innerHTML=metrics.map(([l,v,s])=>`<div class=\"card metric\"><span class=\"label\">${l}<\u002Fspan><div class=\"value\">${v}<\u002Fdiv><span class=\"sub\">${s}<\u002Fspan><div class=\"bubble\"><\u002Fdiv><\u002Fdiv>`).join('');\n $('recentCircuits').innerHTML=rs.length?`<div class=\"table-wrap\"><table><thead><tr><th>Circuito<\u002Fth><th>Seção<\u002Fth><th>Situação<\u002Fth><\u002Ftr><\u002Fthead><tbody>${rs.slice(-5).reverse().map(r=>{const st=statusForResult(r);return `<tr><td><b>${escapeHtml(r.name)}<\u002Fb><br><small>${escapeHtml(r.board||'—')}<\u002Fsmall><\u002Ftd><td>${r.section?conductorDescription(r):'—'}<\u002Ftd><td><span class=\"status ${st.cls}\">${st.text}<\u002Fspan><\u002Ftd><\u002Ftr>`;}).join('')}<\u002Ftbody><\u002Ftable><\u002Fdiv>`:'<div class=\"empty\">Cadastre o primeiro circuito para formar o quadro.<\u002Fdiv>';\n const messages=[];if(!rs.length)messages.push(['info','Cadastre circuitos para consolidar a carga do projeto.']);if(t.errors)messages.push(['bad',`${t.errors} erro(s) técnico(s) exigem revisão.`]);if(t.warnings)messages.push(['warn',`${t.warnings} ressalva(s) estão registradas nas memórias.`]);if(rs.some(r=>r.ampacity?.quality==='derived'))messages.push(['warn','Há circuitos usando ampacidade de alumínio estimada.']);if(rs.some(r=>!r.shortData?.checked))messages.push(['warn','Há circuitos sem verificação de curto-circuito.']);if(rs.length&&!messages.length)messages.push(['ok','Todos os circuitos cadastrados estão sem alertas no modelo atual.']);\n $('diagnostics').innerHTML=messages.map(([cls,text])=>`<div class=\"notice ${cls==='bad'?'danger':cls==='warn'?'warning':cls==='ok'?'success':''}\" style=\"margin-bottom:8px\">${escapeHtml(text)}<\u002Fdiv>`).join('');\n setTimeout(()=>{drawBars($('loadChart'),rs.slice(0,12).map(r=>({label:r.name,value:Number(r.basis?.inputActiveW||0)/1000})),{suffix:' kW'});drawBars($('dropChart'),rs.slice(0,12).map(r=>({label:r.name,value:Number(r.drop?.percent||0)})),{suffix:'%',limit:Math.max(...rs.map(r=>Number(r.data?.maxDrop||r.maxDrop||0)),0)});},40);\n}\nfunction saveCurrentCircuit(){\n const r=calculateCurrent(false);if(!r.valid){toast('O circuito não foi salvo porque há erros impeditivos.');return;}\n const arr=circuits();const idx=arr.findIndex(c=>c.id===r.id);if(idx>=0)arr[idx]=r;else arr.push(r);editingId=r.id;currentResult=r;saveState();renderAll();fillForm(r);toast(idx>=0?'Circuito atualizado.':'Circuito salvo.');\n}\nfunction editCircuit(id){const c=circuits().find(x=>x.id===id);if(!c)return;fillForm(c);showView('circuitView');}\nfunction duplicateCircuit(id){const c=circuits().find(x=>x.id===id);if(!c)return;const raw=circuitRaw(c);fillForm({...raw,id:undefined,name:`${raw.name} — cópia`});showView('circuitView');toast('Cópia preparada; revise e salve.');}\nfunction deleteCircuit(id){const c=circuits().find(x=>x.id===id);if(!c||!confirm(`Excluir o circuito “${c.name}”?`))return;activeRecord().circuits=circuits().filter(x=>x.id!==id);if(editingId===id)resetForm();saveState();renderAll();toast('Circuito excluído.');}\nfunction renderCircuits(){\n const rs=circuits().map(circuitResult);if(!rs.length){$('circuitsTable').innerHTML='<div class=\"empty\">Nenhum circuito cadastrado.<\u002Fdiv>';return;}\n $('circuitsTable').innerHTML=`<div class=\"table-wrap\"><table><thead><tr><th>Identificação<\u002Fth><th>Sistema<\u002Fth><th>Ib<\u002Fth><th>Condutor<\u002Fth><th>Iz<\u002Fth><th>Proteção<\u002Fth><th>ΔV<\u002Fth><th>Curto<\u002Fth><th>Situação<\u002Fth><th>Ações<\u002Fth><\u002Ftr><\u002Fthead><tbody>${rs.map(r=>{const st=statusForResult(r);return `<tr><td><b>${escapeHtml(r.name)}<\u002Fb><br><small>${escapeHtml(r.board||'—')} · ${escapeHtml(categoryLabels[r.category]||r.category)}<\u002Fsmall><\u002Ftd><td>${systemConfigs[r.system]?.short||'—'}<br><small>${fmtSmart(r.basis?.voltage)} V<\u002Fsmall><\u002Ftd><td>${fmt(r.basis?.designCurrent)} A<\u002Ftd><td><b>${r.section?conductorDescription(r):'—'}<\u002Fb><br><small>${r.material==='copper'?'Cu':'Al'} · ${r.method}<\u002Fsmall><\u002Ftd><td>${fmt(r.ampacity?.corrected)} A<\u002Ftd><td>${r.protection?.rating||'—'} A · ${r.protection?.curve||'—'}<br><small>${r.protection?.poles||'—'} · ${r.protection?.icn||'—'} kA<\u002Fsmall><\u002Ftd><td>${fmt(r.drop?.percent)}%<\u002Ftd><td>${r.shortData?.checked?fmt(r.shortData.maxKA)+' kA':'—'}<\u002Ftd><td><span class=\"status ${st.cls}\">${st.text}<\u002Fspan><\u002Ftd><td><div style=\"display:flex;gap:4px;flex-wrap:wrap\"><button class=\"btn tiny\" data-circuit-action=\"edit\" data-id=\"${r.id}\">Editar<\u002Fbutton><button class=\"btn tiny\" data-circuit-action=\"report\" data-id=\"${r.id}\">Relatório<\u002Fbutton><button class=\"btn tiny\" data-circuit-action=\"duplicate\" data-id=\"${r.id}\">Duplicar<\u002Fbutton><button class=\"btn tiny danger\" data-circuit-action=\"delete\" data-id=\"${r.id}\">Excluir<\u002Fbutton><\u002Fdiv><\u002Ftd><\u002Ftr>`;}).join('')}<\u002Ftbody><\u002Ftable><\u002Fdiv>`;\n}\nfunction exportCircuitsCsv(){\n const headers=['Circuito','Quadro','Categoria','Sistema','Tensão (V)','Potência entrada (kW)','Ib (A)','Seção fase (mm²)','Paralelos','Iz (A)','Disjuntor (A)','Curva','Polos','Icn (kA)','Queda (%)','Icc máx (kA)','PE (mm²)','Neutro (mm²)','Situação'];const rows=circuits().map(circuitResult).map(r=>[r.name,r.board,categoryLabels[r.category],systemConfigs[r.system]?.short,r.basis?.voltage,r.basis?.inputActiveW/1000,r.basis?.designCurrent,r.section,r.parallel,r.ampacity?.corrected,r.protection?.rating,r.protection?.curve,r.protection?.poles,r.protection?.icn,r.drop?.percent,r.shortData?.maxKA,r.pe,r.neutral,statusForResult(r).text]);const esc=x=>`\"${String(x??'').replaceAll('\"','\"\"')}\"`;downloadText('\\ufeff'+[headers,...rows].map(row=>row.map(esc).join(';')).join('\\n'),'text/csv;charset=utf-8',`${(projectData().name||'projeto').replace(/[^a-z0-9]+/gi,'_')}_circuitos.csv`);\n}\n\nfunction candidateComparison(r){\n if(!r?.section)return[];const data=r.data,basis=r.basis,shortData=r.shortData,min=minSections[data.category]||1.5;const start=Math.max(0,sections.findIndex(s=>s>=min));const finalIndex=sections.indexOf(r.section);const end=Math.min(sections.length-1,Math.max(finalIndex+5,start+8));\n return sections.slice(start,end+1).map(section=>{const amp=getAmpacityInfo(section,data),drop=voltageDrop(section,data,basis),prot=breakerFor(basis.designCurrent,amp.corrected||0,data,shortData),loss=lossResult(section,data,basis),shortOk=!shortData.checked||section+1e-9>=r.shortAdiabatic.requiredRaw;const technical=section>=min&&amp.corrected>=basis.designCurrent&&drop.percent<=Number(data.maxDrop)&&prot.overloadOk&&shortOk&&(!shortData.checked||prot.breakingOk);return {section,amp,drop,prot,loss,shortOk,technical,governing:section===r.section};});\n}\nfunction renderComparisonSelectors(){\n const select=$('compareCircuit');if(!select)return;const items=allSelectableResults();const previous=select.value;select.innerHTML=items.length?items.map(({id,r})=>`<option value=\"${id}\">${escapeHtml(r.name)} · ${r.board?escapeHtml(r.board)+' · ':''}${r.section?conductorDescription(r):'sem seção'}<\u002Foption>`).join(''):'<option value=\"\">Sem circuitos disponíveis<\u002Foption>';\n if(items.some(x=>x.id===previous))select.value=previous;else if(currentResult?.id&&items.some(x=>x.id===currentResult.id))select.value=currentResult.id;else if(items.some(x=>x.id==='current'))select.value='current';\n}\nfunction selectedComparisonResult(){const select=$('compareCircuit');if(!select)return currentResult;const id=select.value;if(id==='current')return currentResult;return circuits().map(circuitResult).find(x=>x.id===id)||allSelectableResults()[0]?.r||null;}\nfunction renderComparison(r=selectedComparisonResult()){\n if(!r?.section){$('compareBase').innerHTML='Nenhum circuito selecionado.';$('economicRecommendation').innerHTML='<div class=\"empty\">Selecione um circuito para comparar alternativas.<\u002Fdiv>';$('comparisonTable').innerHTML='';return;}\n const rows=candidateComparison(r);$('compareBase').innerHTML=`<b>${escapeHtml(r.name)}<\u002Fb><br>Ib ${fmt(r.basis.designCurrent)} A · seção normativa/técnica adotada ${conductorDescription(r)} · horizonte ${state.settings.years} anos.`;\n const compliant=rows.filter(x=>x.technical&&x.loss);const best=compliant.reduce((a,b)=>!a||b.loss.totalLife<a.loss.totalLife?b:a,null);\n $('economicRecommenda álise econômica é comparativa e simplificada: usa preços editáveis, horas/dias informados, reajuste anual e não inclui mão de obra, terminações, infraestrutura, manutenção, tributos nem taxa de desconto.<\u002Fdiv>`;\n}\nfunction allSelectableResults(){const map=new Map();circuits().map(circuitResult).forEach(r=>map.set(r.id,r));if(currentResult?.section&&!map.has(currentResult.id))map.set('current',currentResult);return [...map.entries()].map(([id,r])=>({id,r}));}\nfunction renderDiagramSelectors(){\n const items=allSelectableResults();const currentValue=$('diagramCircuit').value;$('diagramCircuit').innerHTML=items.length?items.map(({id,r})=>`<option value=\"${id}\">${escapeHtml(r.name)} · ${r.section?conductorDescription(r):'sem seção'}<\u002Foption>`).join(''):'<option value=\"\">Sem circuitos<\u002Foption>';if(items.some(x=>x.id===currentValue))$('diagramCircuit').value=currentValue;renderDiagram();\n}\nfunction selectedDiagramResult(){const id=$('diagramCircuit').value;if(id==='current')return currentResult;return circuits().map(circuitResult).find(x=>x.id===id)||allSelectableResults()[0]?.r||null;}\nfunction renderDiagram(){\n const r=selectedDiagramResult();if(!r?.section){$('unifilar').innerHTML='<div class=\"empty\">Selecione um circuito dimensionado.<\u002Fdiv>';$('diagramLegend').innerHTML='Nenhum circuito disponível.';return;}\n const stroke=document.body.classList.contains('dark')?'#dbeafe':'#12345a';const accent='#0b63ce',warn=r.valid?'#15803d':'#c62828';\n $('unifilar').innerHTML=`<svg viewBox=\"0 0 820 300\" role=\"img\" aria-label=\"Diagrama unifilar do circuito ${escapeHtml(r.name)}\"><defs><marker id=\"arrow\" markerWidth=\"8\" markerHeight=\"8\" refX=\"7\" refY=\"4\" orient=\"auto\"><path d=\"M0,0 L8,4 L0,8 Z\" fill=\"${accent}\"/><\u002Fmarker><\u002Fdefs><text x=\"410\" y=\"28\" text-anchor=\"middle\" font-size=\"17\" font-weight=\"700\" fill=\"${stroke}\">${escapeHtml(r.name)}<\u002Ftext><line x1=\"90\" y1=\"145\" x2=\"730\" y2=\"145\" stroke=
