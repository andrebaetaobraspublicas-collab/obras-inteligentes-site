Fbutton><\u002Fdiv>`);\n}\nfunction saveBudget(id){\n  const p=getProject(),obj={id:id||uid(),code:v(\"o_code\"),desc:v(\"o_desc\")||\"Item\",unit:v(\"o_unit\"),qty:num(v(\"o_qty\")),\n    material:num(v(\"o_mat\")),labor:num(v(\"o_lab\")),equipment:num(v(\"o_eq\")),system:v(\"o_sys\")};\n  const i=p.budget.findIndex(x=>x.id===id);if(i>=0)p.budget[i]=obj;else p.budget.push(obj);\n  closeModal();saveState(false);render();toast(\"Item salvo\");\n}\n\nfunction renderReports(){\n  const p=getProject(),c=calcProject(p),sec=document.getElementById(\"reports\");\n  const lower=p.tanks.lower.chosen,upper=p.tanks.upper.chosen,ra=residentialAssessment(p,c);\n  const opFormula=reserveFormulaText(\"operacional\",p.reserves.operationalMode,p.reserves.operationalValue,c.dailyM3,c.consumptionM3,c.operationalM3);\n  const secFormula=reserveFormulaText(\"segurança\",p.reserves.securityMode,p.reserves.securityValue,c.dailyM3,c.consumptionM3,c.securityM3);\n  sec.innerHTML=pageHead(\"Relatório técnico detalhado\",\"Memória de cálculo explicada em linguagem acessível, pronta para impressão em PDF.\",`<button class=\"btn\" onclick=\"exportExcel()\">Exportar Excel<\u002Fbutton><button class=\"btn\" onclick=\"downloadProjectReport()\">Exportar texto<\u002Fbutton><button class=\"btn primary\" onclick=\"window.print()\">Imprimir / PDF<\u002Fbutton>`)\n  +`<div class=\"card\"><div class=\"report-sheet\" id=\"reportSheet\">\n    <div style=\"display:flex;justify-content:space-between;align-items:flex-start;border-bottom:3px solid #0f766e;padding-bottom:16px\">\n      <div><h1 style=\"margin:0\">ReservaPro<\u002Fh1><p>Relatório explicativo e memória de cálculo de reservatórios<\u002Fp><\u002Fdiv>\n      <div style=\"text-align:right\"><b>${esc(p.name)}<\u002Fb><br><small>Emitido em ${new Date().toLocaleDateString(\"pt-BR\")}<\u002Fsmall><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"report-section\"><h2>1. Resumo para leitura rápida<\u002Fh2>\n      <div class=\"explain-box\"><b>O que este relatório calculou?<\u002Fb><br>O sistema estimou quanta água a edificação consome por dia, por quanto tempo deve existir autonomia, quais reservas adicionais foram adotadas, como o volume foi distribuído entre reservatórios e quais dimensões e bombas foram preliminarmente selecionadas.<\u002Fdiv>\n      <div class=\"report-grid\">${reportItem(\"População considerada\",fmt(c.population,0)+\" pessoas\")}${reportItem(\"Consumo diário\",fmt(c.dailyM3)+\" m³/dia\")}${reportItem(\"Autonomia\",fmt(c.autonomyHours,0)+\" horas\")}${reportItem(\"Volume útil total\",fmt(c.usefulTotalM3)+\" m³\")}${reportItem(\"Volume geométrico\",fmt(c.geomM3)+\" m³\")}${reportItem(\"Reserva de incêndio\",fmt(c.fireM3)+\" m³\")}<\u002Fdiv>\n      <p><b>Em linguagem simples:<\u002Fb> o volume útil é a água que se pretende efetivamente reservar para consumo, contingências, crescimento e incêndio. O volume geométrico é maior porque também inclui volume morto e margem construtiva.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"report-section\"><h2>2. Identificação e parâmetros gerais<\u002Fh2><div class=\"report-grid\">\n      ${reportItem(\"Cliente\",p.client||\"—\")}${reportItem(\"Local\",[p.city,p.state].filter(Boolean).join(\"/\")||\"—\")}${reportItem(\"Tipo de edificação\",p.buildingType)}${reportItem(\"Área construída\",fmt(p.area)+\" m²\")}${reportItem(\"Pavimentos\",fmt(p.floors,0))}${reportItem(\"Unidades\",fmt(p.units,0))}${reportItem(\"Regime de abastecimento\",p.supplyRegime)}${reportItem(\"Interrupções\",p.interruptions)}${reportItem(\"Pressão informada\",fmt(p.pressure)+\" mca\")}${reportItem(\"Subsolo\",p.basement?\"Sim\":\"Não\")}\n    <\u002Fdiv><p>Esses parâmetros influenciam a necessidade de autonomia, a conveniência de reservatório inferior e a capacidade de abastecimento por gravidade.<\u002Fp><\u002Fdiv>\n\n    <div class=\"report-section\"><h2>3. População e consumo diário<\u002Fh2>\n      <div class=\"formula-box\">Para cada grupo: População efetiva = quantidade × fator de ocupação × fator de simultaneidade.<br>Consumo do grupo = população efetiva × consumo unitário.<\u002Fdiv>\n      <table style=\"min-width:0\"><thead><tr><th>Grupo<\u002Fth><th>Quantidade<\u002Fth><th>Ocupação<\u002Fth><th>Simultaneidade<\u002Fth><th>População efetiva<\u002Fth><th>Consumo unitário<\u002Fth><th>Consumo diário<\u002Fth><\u002Ftr><\u002Fthead><tbody>${c.groupRows.map(g=>`<tr><td>${esc(g.desc)}<\u002Ftd><td>${fmt(g.qty,0)}<\u002Ftd><td>${fmt(g.occupancy,2)}<\u002Ftd><td>${fmt(g.simultaneity,2)}<\u002Ftd><td>${fmt(g.effective,2)}<\u002Ftd><td>${fmt(g.unitConsumption,2)} L/dia<\u002Ftd><td>${fmt(g.daily/1000,3)} m³/dia<\u002Ftd><\u002Ftr>`).join(\"\")||`<tr><td colspan=\"7\">Nenhum grupo populacional cadastrado.<\u002Ftd><\u002Ftr>`}<\u002Ftbody><\u002Ftable>\n      ${c.sectorRows.length?`<h3>Consumos por setores<\u002Fh3><table style=\"min-width:0\"><thead><tr><th>Setor<\u002Fth><th>População<\u002Fth><th>Consumo unitário<\u002Fth><th>Fator de correção<\u002Fth><th>Adicional<\u002Fth><th>Total<\u002Fth><\u002Ftr><\u002Fthead><tbody>${c.sectorRows.map(s=>`<tr><td>${esc(s.name)}<\u002Ftd><td>${fmt(s.population,0)}<\u002Ftd><td>${fmt(s.unitConsumption,2)} L/dia<\u002Ftd><td>${fmt(s.correction,2)}<\u002Ftd><td>${fmt(s.additionalL,0)} L/dia<\u002Ftd><td>${fmt(s.daily/1000,3)} m³/dia<\u002Ftd><\u002Ftr>`).join(\"\")}<\u002Ftbody><\u002Ftable>`:\"\"}\n      ${c.specificRows.length?`<h3>Usos específicos<\u002Fh3><table style=\"min-width:0\"><thead><tr><th>Uso<\u002Fth><th>Consumo diário<\u002Fth><th>Observação<\u002Fth><\u002Ftr><\u002Fthead><tbody>${c.specificRows.map(s=>`<tr><td>${esc(s.desc)}<\u002Ftd><td>${fmt(s.daily/1000,3)} m³/dia<\u002Ftd><td>${esc(s.notes||\"\")}<\u002Ftd><\u002Ftr>`).join(\"\")}<\u002Ftbody><\u002Ftable>`:\"\"}\n      <div class=\"formula-box\">Consumo diário total = ${fmt(c.groupL,0)} L + ${fmt(c.sectorL,0)} L + ${fmt(c.specificL,0)} L = <b>${fmt(c.dailyL,0)} L/dia = ${fmt(c.dailyM3,3)} m³/dia<\u002Fb>.<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"report-section\"><h2>4. Autonomia e reservas<\u002Fh2>\n      <div class=\"explain-box\"><b>Autonomia<\u002Fb> é o período durante o qual a edificação poderá ser abastecida pela água armazenada. Reservas operacional e de segurança são parcelas adicionais escolhidas para absorver variações, manutenção ou falhas de fornecimento.<\u002Fdiv>\n      <div class=\"formula-box\">Volume para autonomia = consumo diário × autonomia / 24<br>= ${fmt(c.dailyM3,3)} × ${fmt(c.autonomyHours,2)} / 24 = <b>${fmt(c.consumptionM3,3)} m³<\u002Fb>.<\u002Fdiv>\n      <div class=\"formula-box\">${opFormula}<\u002Fdiv><div class=\"formula-box\">${secFormula}<\u002Fdiv>\n      <div class=\"formula-box\">Crescimento futuro = (consumo para autonomia + operacional + segurança) × ${fmt(p.reserves.growthPct,2)}%<br>= (${fmt(c.consumptionM3,3)} + ${fmt(c.operationalM3,3)} + ${fmt(c.securityM3,3)}) × ${fmt(p.reserves.growthPct/100,4)} = <b>${fmt(c.growthM3,3)} m³<\u002Fb>.<\u002Fdiv>\n      <table style=\"min-width:0\"><thead><tr><th>Parcela<\u002Fth><th>Parâmetro<\u002Fth><th>Volume calculado<\u002Fth><\u002Ftr><\u002Fthead><tbody><tr><td>Consumo para autonomia<\u002Ftd><td>${fmt(c.autonomyHours,0)} horas<\u002Ftd><td>${fmt(c.consumptionM3,3)} m³<\u002Ftd><\u002Ftr><tr><td>Reserva operacional<\u002Ftd><td>${esc(p.reserves.operationalMode)} / ${fmt(p.reserves.operationalValue,2)}<\u002Ftd><td>${fmt(c.operationalM3,3)} m³<\u002Ftd><\u002Ftr><tr><td>Reserva de segurança<\u002Ftd><td>${esc(p.reserves.securityMode)} / ${fmt(p.reserves.securityValue,2)}<\u002Ftd><td>${fmt(c.securityM3,3)} m³<\u002Ftd><\u002Ftr><tr><td>Crescimento<\u002Ftd><td>${fmt(p.reserves.growthPct,2)}%<\u002Ftd><td>${fmt(c.growthM3,3)} m³<\u002Ftd><\u002Ftr><\u002Ftbody><\u002Ftable>\n    <\u002Fdiv>\n\n    <div class=\"report-section page-break\"><h2>5. Reserva técnica de incêndio<\u002Fh2>\n      <div class=\"explain-box\">A reserva de incêndio não deve ser presumida como obrigatória ou dispensada apenas pelo tipo da edificação. O sistema utiliza os dados fornecidos pelo usuário e produz uma avaliação preliminar, que precisa ser confirmada nas regras locais e no projeto de segurança contra incêndio.<\u002Fdiv>\n      ${fireFormulaReport(p,c)}\n      ${isSingleFamily(p)?`<div class=\"criteria-box\"><b>Avaliação da residência unifamiliar: ${esc(ra.fireTitle)}<\u002Fb><br>${esc(ra.fireRecommendation)}${ra.reasons.length?`<ul>${ra.reasons.map(x=>`<li>${esc(x)}<\u002Fli>`).join(\"\")}<\u002Ful>`:\"\"}<\u002Fdiv>`:\"\"}\n      <div class=\"report-grid\">${reportItem(\"Método\",methodLabel(p.fire.method))}${reportItem(\"Volume-base\",fmt(c.fireBase)+\" m³\")}${reportItem(\"Margem\",fmt(p.fire.marginPct,2)+\"%\")}${reportItem(\"Volume adotado\",fmt(c.fireM3)+\" m³\")}${reportItem(\"Armazenamento\",p.fire.location)}<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"report-section\"><h2>6. Consolidação dos volumes<\u002Fh2>\n      <table style=\"min-width:0\"><thead><tr><th>Conceito<\u002Fth><th>Significado<\u002Fth><th>Volume<\u002Fth><\u002Ftr><\u002Fthead><tbody><tr><td>Volume útil de consumo<\u002Ftd><td>Autonomia + reservas + crescimento, sem incêndio<\u002Ftd><td>${fmt(c.usefulConsumptionM3,3)} m³<\u002Ftd><\u002Ftr><tr><td>Reserva de incêndio<\u002Ftd><td>Parcela intangível ou exclusiva<\u002Ftd><td>${fmt(c.fireM3,3)} m³<\u002Ftd><\u002Ftr><tr><td><b>Volume útil total<\u002Fb><\u002Ftd><td>Água efetivamente reservada<\u002Ftd><td><b>${fmt(c.usefulTotalM3,3)} m³<\u002Fb><\u002Ftd><\u002Ftr><tr><td>Volume morto<\u002Ftd><td>Parcela abaixo do nível útil ou não aproveitável<\u002Ftd><td>${fmt(c.deadM3,3)} m³<\u002Ftd><\u002Ftr><tr><td>Margem geométrica<\u002Ftd><td>Folga construtiva aplicada ao volume<\u002Ftd><td>${fmt(c.geomExtraM3,3)} m³<\u002Ftd><\u002Ftr><tr><td><b>Volume geométrico<\u002Fb><\u002Ftd><td>Capacidade interna total preliminar<\u002Ftd><td><b>${fmt(c.geomM3,3)} m³<\u002Fb><\u002Ftd><\u002Ftr><\u002Ftbody><\u002Ftable>\n      <div class=\"formula-box\">Volume útil total = ${fmt(c.consumptionM3,3)} + ${fmt(c.operationalM3,3)} + ${fmt(c.securityM3,3)} + ${fmt(c.growthM3,3)} + ${fmt(c.fireM3,3)} = <b>${fmt(c.usefulTotalM3,3)} m³<\u002Fb>.<br>Volume geométrico = (volume útil total + volume morto) × (1 + margem geométrica)<br>= (${fmt(c.usefulTotalM3,3)} + ${fmt(c.deadM3,3)}) × (1 + ${fmt(p.reserves.geomMarginPct/100,4)}) = <b>${fmt(c.geomM3,3)} m³<\u002Fb>.<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"report-section\"><h2>7. Distribuição entre reservatórios<\u002Fh2>\n      <div class=\"report-grid\">${reportItem(\"Método\",p.distribution.mode)}${reportItem(\"Reservatório inferior\",fmt(c.dist.lower)+\" m³\")}${reportItem(\"Reservatório superior\",fmt(c.dist.upper)+\" m³\")}${reportItem(\"Intermediário\",fmt(c.dist.intermediate)+\" m³\")}${reportItem(\"Exclusivo de incêndio\",fmt(c.dist.separate)+\" m³\")}${reportItem(\"Diferença\",fmt(c.dist.deficit)+\" m³\")}<\u002Fdiv>\n      ${distributionFormulaReport(p,c)}\n      ${isSingleFamily(p)?`<div class=\"criteria-box\"><b>${esc(ra.distributionTitle)}<\u002Fb><br>${esc(ra.distributionText)}<br>Percentuais orientativos resultantes: inferior ${fmt(ra.lowerPct,0)}% e superior ${fmt(ra.upperPct,0)}% do volume de consumo.<\u002Fdiv>`:\"\"}\n    <\u002Fdiv>\n\n    <div class=\"report-section\"><h2>8. Dimensões preliminares<\u002Fh2>\n      ${dimensionReport(\"Reservatório inferior\",lower,c.dist.lower,p.tanks.lower)}${dimensionReport(\"Reservatório superior\",upper,c.dist.upper,p.tanks.upper)}\n      <div class=\"explain-box\">As dimensões são internas e preliminares. Espessuras de paredes, impermeabilização, acessos, lajes, apoios e cargas estruturais devem ser dimensionados separadamente.<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"report-section\"><h2>9. Bombeamento<\u002Fh2>\n      <div class=\"formula-box\">Vazão de enchimento = volume do reservatório superior / tempo de enchimento<br>= ${fmt(c.dist.upper,3)} / ${fmt(p.pumping.fillHours,2)} = <b>${fmt(c.pump.qM3h,3)} m³/h<\u002Fb>.<br>Altura manométrica = desnível geométrico + perdas estimadas = ${fmt(p.pumping.staticHead,2)} + ${fmt(p.pumping.lossHead,2)} = <b>${fmt(c.pump.head,2)} mca<\u002Fb>.<br>Potência hidráulica = ρ × g × Q × H / 1000 = ${fmt(appState.settings.waterDensity,0)} × ${fmt(appState.settings.gravity,2)} × ${fmt(c.pump.qM3h/3600,6)} × ${fmt(c.pump.head,2)} / 1000 = <b>${fmt(c.pump.hydraulicKw,3)} kW<\u002Fb>.<br>Potência no eixo = potência hidráulica / rendimento = ${fmt(c.pump.hydraulicKw,3)} / ${fmt(p.pumping.efficiencyPct/100,3)} = <b>${fmt(c.pump.shaftKw,3)} kW<\u002Fb>.<\u002Fdiv>\n      <div class=\"report-grid\">${reportItem(\"Vazão\",fmt(c.pump.qM3h)+\" m³/h\")}${reportItem(\"Altura manométrica\",fmt(c.pump.head)+\" mca\")}${reportItem(\"Rendimento\",fmt(p.pumping.efficiencyPct,2)+\"%\")}${reportItem(\"Motor comercial sugerido\",fmt(c.pump.motor)+\" kW\")}${reportItem(\"Ciclos equivalentes\",fmt(c.pump.cycles,2)+\" por dia\")}<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"report-section page-break\"><h2>10. Alertas, limitações e conclusões<\u002Fh2><ul>${c.alerts.map(a=>`<li>${esc(a.text)}<\u002Fli>`).join(\"\")}<\u002Ful>\n      <h3>Glossário simples<\u002Fh3><ul><li><b>m³:<\u002Fb> metro cúbico; equivale a 1.000 litros.<\u002Fli><li><b>Volume útil:<\u002Fb> água que pode ser utilizada para as finalidades previstas.<\u002Fli><li><b>Volume morto:<\u002Fb> parcela que permanece abaixo do nível de utilização ou sucção.<\u002Fli><li><b>Autonomia:<\u002Fb> tempo durante o qual a água armazenada atende ao consumo estimado.<\u002Fli><li><b>mca:<\u002Fb> metros de coluna d'água, unidade usual de pressão/altura manométrica.<\u002Fli><li><b>P50/P80:<\u002Fb> percentis usados na simulação probabilística; P80 é superado em apenas 20% das simulações.<\u002Fli><\u002Ful>\n      <h3>Aviso de responsabilidade<\u002Fh3><p><b>Este relatório é uma estimativa e um pré-dimensionamento.<\u002Fb> Não substitui projeto hidrossanitário, projeto estrutural, projeto de incêndio, verificação das regras da concessionária, aprovação dos órgãos competentes ou responsabilidade técnica de profissional legalmente habilitado.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv><\u002Fdiv>`;\n}\nfunction reserveFormulaText(name,mode,value,daily,autonomy,result){\n  const m={percent:`Reserva de ${name} = consumo diário × ${fmt(value,2)}% = ${fmt(daily,3)} × ${fmt(value/100,4)} = ${fmt(result,3)} m³.`,percentTotal:`Reserva de ${name} = volume para autonomia × ${fmt(value,2)}% = ${fmt(autonomy,3)} × ${fmt(value/100,4)} = ${fmt(result,3)} m³.`,hours:`Reserva de ${name} = consumo diário × ${fmt(value,2)} horas / 24 = ${fmt(daily,3)} × ${fmt(value,2)} / 24 = ${fmt(result,3)} m³.`,days:`Reserva de ${name} = consumo diário × ${fmt(value,2)} dias = ${fmt(daily,3)} × ${fmt(value,2)} = ${fmt(result,3)} m³.`,fixed:`Reserva de ${name} = volume fixo informado = ${fmt(result,3)} m³.`}; return m[mode]||`${name}: ${fmt(result,3)} m³.`;\n}\nfunction fireFormulaReport(p,c){ if(p.fire.method===\"direct\") return `<div class=\"formula-box\">Volume de incêndio-base = volume informado diretamente = ${fmt(p.fire.directVolumeM3,3)} m³.<br>Volume adotado = volume-base × (1 + margem) = ${fmt(c.fireBase,3)} × (1 + ${fmt(p.fire.marginPct/100,4)}) = <b>${fmt(c.fireM3,3)} m³<\u002Fb>.<\u002Fdiv>`; const h=num(p.fire.hydrantFlowLmin)*num(p.fire.hydrants)*num(p.fire.hydrantDurationMin)/1000, s=num(p.fire.sprinklerFlowLmin)*num(p.fire.sprinklerDurationMin)/1000; return `<div class=\"formula-box\">Hidrantes = ${fmt(p.fire.hydrantFlowLmin,2)} L/min × ${fmt(p.fire.hydrants,0)} × ${fmt(p.fire.hydrantDurationMin,2)} min / 1000 = ${fmt(h,3)} m³.<br>Sprinklers = ${fmt(p.fire.sprinklerFlowLmin,2)} L/min × ${fmt(p.fire.sprinklerDurationMin,2)} min / 1000 = ${fmt(s,3)} m³.<br>Parcela considerada pelo método ${esc(methodLabel(p.fire.method))} = ${fmt(c.fireBase,3)} m³.<br>Com margem de ${fmt(p.fire.marginPct,2)}%: <b>${fmt(c.fireM3,3)} m³<\u002Fb>.<\u002Fdiv>`; }\nfunction distributionFormulaReport(p,c){ if(p.distribution.mode===\"percent\") return `<div class=\"formula-box\">Distribuição percentual do volume útil de consumo: inferior = ${fmt(c.usefulConsumptionM3,3)} × ${fmt(p.distribution.lowerPct,2)} / (${fmt(p.distribution.lowerPct,2)} + ${fmt(p.distribution.upperPct,2)}); superior calculado de forma análoga. A reserva de incêndio é acrescentada conforme a localização escolhida.<\u002Fdiv>`; if(p.distribution.mode===\"autonomy\") return `<div class=\"formula-box\">Volume superior de consumo = consumo diário × ${fmt(p.distribution.upperHours,2)} horas / 24. O restante do volume útil de consumo é direcionado ao reservatório inferior. A reserva de incêndio é acrescentada conforme sua localização.<\u002Fdiv>`; return `<div class=\"formula-box\">Os volumes foram informados manualmente. O sistema compara a soma informada com o volume útil requerido e apresenta a diferença.<\u002Fdiv>`; }\nfunction dimensionReport(title,x,target,t){ if(!x) return `<h3>${title}<\u002Fh3><p>Nenhuma dimensão foi formalmente adotada. Volume-alvo: ${fmt(target,3)} m³.<\u002Fp>`; if(x.shape===\"rect\") return `<h3>${title}<\u002Fh3><div class=\"formula-box\">Formato retangular: V útil = comprimento × largura × altura útil.<br>= ${fmt(x.l,3)} × ${fmt(x.w,3)} × ${fmt(x.usefulH,3)} = <b>${fmt(x.volume,3)} m³<\u002Fb>.<br>Altura total = altura útil + volume morto em altura + folga superior = ${fmt(x.usefulH,3)} + ${fmt(t.deadHeight,3)} + ${fmt(t.freeboard,3)} = ${fmt(x.h,3)} m.<\u002Fdiv><p>Dimensões adotadas: ${dimText(x)}. Excedente sobre o alvo: ${fmt(x.volume-target,3)} m³. Área de base: ${fmt(x.area,3)} m².<\u002Fp>`; return `<h3>${title}<\u002Fh3><div class=\"formula-box\">Formato cilíndrico: V útil = π × (diâmetro/2)² × altura útil.<br>= π × (${fmt(x.d,3)}/2)² × ${fmt(x.usefulH,3)} = <b>${fmt(x.volume,3)} m³<\u002Fb>.<br>Altura total = ${fmt(x.usefulH,3)} + ${fmt(t.deadHeight,3)} + ${fmt(t.freeboard,3)} = ${fmt(x.h,3)} m.<\u002Fdiv><p>Dimensões adotadas: ${dimText(x)}. Excedente sobre o alvo: ${fmt(x.volume-target,3)} m³. Área de base: ${fmt(x.area,3)} m².<\u002Fp>`; }\nfunction reportItem(k,v){return `<div style=\"padding:10px;border:1px solid #d1d5db;border-radius:8px\"><small style=\"color:#64748b\">${k}<\u002Fsmall><br><b>${esc(v)}<\u002Fb><\u002Fdiv>`}\nfunction downloadProjectReport(){\n  const text=document.getElementById(\"reportSheet\").innerText;downloadBlob(`${safeName(getProject().name)}_memorial.txt`,new Blob([text],{type:\"text/plain;charset=utf-8\"}))\n}\n\nfunction renderSettings(){\n  const s=appState.settings,sec=document.getElementById(\"settings\");\n  sec.innerHTML=pageHead(\"Configurações\",\"Parâmetros globais, biblioteca técnica e perfis de consumo.\",`<button class=\"btn danger\" onclick=\"resetApp()\">Restaurar demonstração<\u002Fbutton><button class=\"btn primary\" onclick=\"saveSettings()\">Salvar configurações<\u002Fbutton>`)\n  +`<div class=\"grid cols-2\">\n    <div class=\"card\"><h3>Parâmetros gerais<\u002Fh3><div class=\"form-grid\">\n      ${field(\"set_density\",\"Massa específica da água (kg/m³)\",s.waterDensity,\"number\",\"span-2\",\"Usada no cálculo simplificado do peso da água e do bombeamento.\")}\n      ${field(\"set_gravity\",\"Gravidade (m/s²)\",s.gravity,\"number\",\"span-2\")}\n      ${field(\"set_margin\",\"Margem geométrica padrão (%)\",s.geomMarginPct,\"number\",\"span-2\")}\n      ${field(\"set_bdi\",\"BDI do orçamento (%)\",s.bdiPct,\"number\",\"span-2\")}\n    <\u002Fdiv><\u002Fdiv>\n    <div class=\"card\"><h3>Dados e segurança<\u002Fh3><div class=\"actions\">\n      <button class=\"btn\" onclick=\"exportAll()\">Exportar backup<\u002Fbutton><button class=\"btn\" onclick=\"triggerImport()\">Importar backup<\u002Fbutton>\n      <button class=\"btn danger\" onclick=\"clearStorage()\">Apagar dados locais<\u002Fbutton>\n    <\u002Fdiv><div class=\"notice warn\" style=\"margin-top:14px\">O Local Storage pertence a este navegador. Faça backups periódicos em JSON.<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"card\" style=\"margin-top:16px\"><div style=\"display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap\"><div><h3>Biblioteca técnica por tipo de edificação<\u002Fh3><div class=\"sub\">Melhoria implementada: valores de referência editáveis por tipologia, com autonomia e reservas sugeridas.<\u002Fdiv><\u002Fdiv><div class=\"actions\"><button class=\"btn primary\" onclick=\"openLibraryItemModal()\">+ Perfil técnico<\u002Fbutton><\u002Fdiv><\u002Fdiv><div class=\"table-wrap\"><table><thead><tr><th>Tipo<\u002Fth><th>Base<\u002Fth><th>Consumo unit.<\u002Fth><th>Autonomia<\u002Fth><th>Operac.<\u002Fth><th>Segurança<\u002Fth><th>Cresc.<\u002Fth><th>Incêndio<\u002Fth><th>Ações<\u002Fth><\u002Ftr><\u002Fthead><tbody>\n  ${(s.buildingLibrary||[]).map(x=>`<tr><td><b>${esc(x.buildingType)}<\u002Fb><br><small>${esc(x.note||\"\")}<\u002Fsmall><\u002Ftd><td>${esc(x.populationBasis)}<\u002Ftd><td>${fmt(x.unitConsumption,1)} L/dia<\u002Ftd><td>${fmt(x.autonomyHours,0)} h<\u002Ftd><td>${fmt(x.operationalPct,0)}%<\u002Ftd><td>${fmt(x.securityPct,0)}%<\u002Ftd><td>${fmt(x.growthPct,0)}%<\u002Ftd><td>${fmt(x.fireVolumeM3)} m³<\u002Ftd><td><button class=\"btn small\" onclick=\"openLibraryItemModal('${x.id}')\">Editar<\u002Fbutton> <button class=\"btn small danger\" onclick=\"removeLibraryItem('${x.id}')\">Excluir<\u002Fbutton><\u002Ftd><\u002Ftr>`).join(\"\")}\n  <\u002Ftbody><\u002Ftable><\u002Fdiv><\u002Fdiv>\n  <div class=\"card\" style=\"margin-top:16px\"><h3>Perfis de consumo<\u002Fh3><div class=\"table-wrap\"><table><thead><tr><th>Nome<\u002Fth><th>Tipo<\u002Fth><th>Valor<\u002Fth><th>Unidade<\u002Fth><th>Fonte<\u002Fth><\u002Ftr><\u002Fthead><tbody>\n  ${s.profiles.map(x=>`<tr><td>${esc(x.name)}<\u002Ftd><td>${esc(x.type)}<\u002Ftd><td>${fmt(x.value,1)}<\u002Ftd><td>${esc(x.unit)}<\u002Ftd><td>${esc(x.source)}<\u002Ftd><\u002Ftr>`).join(\"\")}<\u002Ftbody><\u002Ftable><\u002Fdiv><\u002Fdiv>`;\n}\nfunction saveSettings(){\n  Object.assign(appState.settings,{waterDensity:num(v(\"set_density\"),1000),gravity:num(v(\"set_gravity\"),9.81),geomMarginPct:num(v(\"set_margin\"),5),bdiPct:num(v(\"set_bdi\"),20)});\n  saveState(false);render();toast(\"Configurações salvas\");\n}\n\nfunction field(id,label,value,type=\"text\",span=\"\",help=\"\"){return `<div class=\"field ${span}\"><label for=\"${id}\"><span class=\"label-row\"><span>${label}<\u002Fspan>${help?'<span class=\"help-pill\">i<\u002Fspan>':''}<\u002Fspan><\u002Flabel><input id=\"${id}\" type=\"${type}\" value=\"${esc(value)}\" ${type===\"number\"?'step=\"any\"':\"\"}>${help?`<div class=\"help\">${help}<\u002Fdiv>`:\"\"}<\u002Fdiv>`}\nfunction textArea(id,label,value,span=\"\",help=\"\"){return `<div class=\"field ${span}\"><label for=\"${id}\"><span class=\"label-row\"><span>${label}<\u002Fspan>${help?'<span class=\"help-pill\">i<\u002Fspan>':''}<\u002Fspan><\u002Flabel><textarea id=\"${id}\">${esc(value)}<\u002Ftextarea>${help?`<div class=\"help\">${help}<\u002Fdiv>`:\"\"}<\u002Fdiv>`}\nfunction selectField(id,label,options,value,span=\"\",help=\"\"){\n  const opts=options.map(o=>typeof o===\"string\"?{value:o,label:o}:o);\n  return `<div class=\"field ${span}\"><label for=\"${id}\"><span class=\"label-row\"><span>${label}<\u002Fspan>${help?'<span class=\"help-pill\">i<\u002Fspan>':''}<\u002Fspan><\u002Flabel><select id=\"${id}\">${opts.map(o=>`<option value=\"${esc(o.value)}\" ${String(o.value)===String(value)?\"selected\":\"\"}>${esc(o.label)}<\u002Foption>`).join(\"\")}<\u002Fselect>${help?`<div class=\"help\">${help}<\u002Fdiv>`:\"\"}<\u002Fdiv>`;\n}\nfunction v(id){return document.getElementById(id)?.value??\"\"}\nfunction removeRow(arr,id){\n  if(!confirm(\"Excluir este item?\")) return;\n  const p=getProject();p[arr]=(p[arr]||[]).filter(x=>x.id!==id);saveState(false);render();toast(\"Item excluído\");\n}\n\nfunction openProjectModal(){\n  openModal(`<div class=\"modal-head\"><h3>Novo projeto<\u002Fh3><button class=\"icon-btn\" onclick=\"closeModal()\">✕<\u002Fbutton><\u002Fdiv>\n  <div class=\"form-grid\">${field(\"np_name\",\"Nome\",\"Novo projeto\",\"text\",\"span-2\")}${selectField(\"np_type\",\"Tipo\",[\"Residência unifamiliar\",\"Condomínio residencial\",\"Edifício administrativo\",\"Escola\",\"Hospital\",\"Outro\"],\"Edifício administrativo\",\"span-2\")}<\u002Fdiv>\n  <div class=\"actions\" style=\"margin-top:16px;justify-content:flex-end\"><button class=\"btn\" onclick=\"closeModal()\">Cancelar<\u002Fbutton><button class=\"btn primary\" onclick=\"createProject()\">Criar projeto<\u002Fbutton><\u002Fdiv>`);\n}\nfunction createProject(){\n  const p=blankProject(v(\"np_name\")||\"Novo projeto\");p.buildingType=v(\"np_type\");appState.projects.push(p);appState.activeProjectId=p.id;\n  closeModal();saveState(false);go(\"building\");toast(\"Projeto criado\");\n}\nfunction openModal(html){document.getElementById(\"modalBox\").innerHTML=html;document.getElementById(\"modal\").classList.add(\"open\")}\nfunction closeModal(){document.getElementById(\"modal\").classList.remove(\"open\")}\ndocument.getElementById(\"modal\").addEventListener(\"click\",e=>{if(e.target.id===\"modal\")closeModal()});\nfunction toast(msg){\n  const d=document.createElement(\"div\");d.className=\"toast\";d.textContent=msg;document.getElementById(\"toasts\").appendChild(d);setTimeout(()=>d.remove(),2800);\n}\nfunction toggleSidebar(force){const el=document.getElementById(\"sidebar\");if(force===false)el.classList.remove(\"open\");else el.classList.toggle(\"open\")}\nfunction toggleTheme(){appState.settings.theme=appState.settings.theme===\"dark\"?\"light\":\"dark\";saveState(false);render()}\nfunction safeName(s){return String(s||\"reservapro\").normalize(\"NFD\").replace(/[\\u0300-\\u036f]/g,\"\").replace(/[^a-zA-Z0-9_-]+/g,\"_\")}\n\nfunction exportProject(id){\n  const p=appState.projects.find(x=>x.id===id);downloadBlob(`${safeName(p.name)}.json`,new Blob([JSON.stringify({type:\"ReservaProProject\",version:1,project:p},null,2)],{type:\"application/json\"}));\n}\nfunction exportAll(){downloadBlob(`ReservaPro_backup_${today()}.json`,new Blob([JSON.stringify({type:\"ReservaProBackup\",...appState},null,2)],{type:\"application/json\"}))}\nfunction downloadBlob(name,blob){const a=document.createElement(\"a\");a.href=URL.createObjectURL(blob);a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1500)}\nfunction triggerImport(){const input=document.getElementById(\"fileInput\");input.value=\"\";input.click()}\ndocument.getElementById(\"fileInput\").addEventListener(\"change\",async e=>{\n  const file=e.target.files[0];if(!file)return;\n  try{\n    const obj=JSON.parse(await file.text());\n    if(obj.type===\"ReservaProProject\"&&obj.project){obj.project.id=uid();appState.projects.push(obj.project);appState.activeProjectId=obj.project.id}\n    else if(obj.type===\"ReservaProBackup\"&&obj.projects){appState={version:obj.version||1,settings:{...defaultSettings,...obj.settings},projects:obj.projects,activeProjectId:obj.activeProjectId||obj.projects[0].id}}\n    else if(obj.projects){appState=obj}else throw new Error(\"Arquivo incompatível\");\n    saveState(false);render();toast(\"Arquivo importado com sucesso\");\n  }catch(err){alert(\"Não foi possível importar: \"+err.message)}\n});\n\nfunction xmlEsc(v){return String(v??\"\").replace(/&/g,\"&amp;\").replace(/<\u002Fg,\"&lt;\").replace(/>/g,\"&gt;\").replace(/\"/g,\"&quot;\");}\nfunction excelCell(v){const n=typeof v===\"number\"&&Number.isFinite(v);return `<Cell><Data ss:Type=\"${n?\"Number\":\"String\"}\">${xmlEsc(v)}<\u002FData><\u002FCell>`;}\nfunction excelSheet(name,rows){return `<Worksheet ss:Name=\"${xmlEsc(name.slice(0,31))}\"><Table>${rows.map(r=>`<Row>${r.map(excelCell).join(\"\")}<\u002FRow>`).join(\"\")}<\u002FTable><\u002FWorksheet>`;}\nfunction exportExcel(){\n  const p=getProject(),c=calcProject(p),ra=residentialAssessment(p,c),lower=p.tanks.lower.chosen,upper=p.tanks.upper.chosen;\n  const sheets=[];\n  sheets.push(excelSheet(\"Resumo\",[[\"RESERVAPRO - RESUMO\"],[\"Projeto\",p.name],[\"Cliente\",p.client],[\"Tipo\",p.buildingType],[\"População\",c.population],[\"Consumo diário (m³/dia)\",c.dailyM3],[\"Autonomia (h)\",c.autonomyHours],[\"Volume útil total (m³)\",c.usefulTotalM3],[\"Volume geométrico (m³)\",c.geomM3],[\"Reservatório inferior (m³)\",c.dist.lower],[\"Reservatório superior (m³)\",c.dist.upper],[\"Reserva de incêndio (m³)\",c.fireM3]]));\n  sheets.push(excelSheet(\"Parâmetros\",[[\"PARÂMETRO\",\"VALOR\",\"UNIDADE / OBSERVAÇÃO\"],[\"Área construída\",p.area,\"m²\"],[\"Pavimentos\",p.floors,\"un\"],[\"Unidades\",p.units,\"un\"],[\"Regime de abastecimento\",p.supplyRegime,\"\"],[\"Interrupções\",p.interruptions,\"\"],[\"Pressão\",p.pressure,\"mca\"],[\"Autonomia\",p.reserves.autonomyHours,\"h\"],[\"Reserva operacional - modo\",p.reserves.operationalMode,\"\"],[\"Reserva operacional - valor\",p.reserves.operationalValue,\"\"],[\"Reserva segurança - modo\",p.reserves.securityMode,\"\"],[\"Reserva segurança - valor\",p.reserves.securityValue,\"\"],[\"Crescimento\",p.reserves.growthPct,\"%\"],[\"Volume morto\",p.reserves.deadVolumeM3,\"m³\"],[\"Margem geométrica\",p.reserves.geomMarginPct,\"%\"],[\"Método incêndio\",methodLabel(p.fire.method),\"\"],[\"Local incêndio\",p.fire.location,\"\"]]));\n  sheets.push(excelSheet(\"População\",[[\"GRUPO\",\"QUANTIDADE\",\"OCUPAÇÃO\",\"SIMULTANEIDADE\",\"POPULAÇÃO EFETIVA\",\"CONSUMO UNITÁRIO L/DIA\",\"CONSUMO M³/DIA\"],...c.groupRows.map(g=>[g.desc,g.qty,g.occupancy,g.simultaneity,g.effective,g.unitConsumption,g.daily/1000])]));\n  sheets.push(excelSheet(\"Setores e usos\",[[\"TIPO\",\"DESCRIÇÃO\",\"BASE\",\"CONSUMO M³/DIA\",\"OBSERVAÇÃO\"],...c.sectorRows.map(s=>[\"Setor\",s.name,s.population,s.daily/1000,s.notes||\"\"]),...c.specificRows.map(s=>[\"Uso específico\",s.desc,\"Valor direto\",s.daily/1000,s.notes||\"\"])]));\n  sheets.push(excelSheet(\"Memória de cálculo\",[[\"ETAPA\",\"FÓRMULA / CRITÉRIO\",\"RESULTADO\"],[\"Consumo diário\",\"Grupos + setores + usos específicos\",c.dailyM3],[\"Consumo para autonomia\",`${c.dailyM3} × ${c.autonomyHours} / 24`,c.consumptionM3],[\"Reserva operacional\",reserveFormulaText(\"operacional\",p.reserves.operationalMode,p.reserves.operationalValue,c.dailyM3,c.consumptionM3,c.operationalM3),c.operationalM3],[\"Reserva de segurança\",reserveFormulaText(\"segurança\",p.reserves.securityMode,p.reserves.securityValue,c.dailyM3,c.consumptionM3,c.securityM3),c.securityM3],[\"Crescimento\",`(${c.consumptionM3} + ${c.operationalM3} + ${c.securityM3}) × ${p.reserves.growthPct}%`,c.growthM3],[\"Incêndio\",methodLabel(p.fire.method),c.fireM3],[\"Volume útil total\",\"Consumo + operacional + segurança + crescimento + incêndio\",c.usefulTotalM3],[\"Volume geométrico\",\"(volume útil + volume morto) × (1 + margem)\",c.geomM3]]));\n  sheets.push(excelSheet(\"Distribuição\",[[\"ITEM\",\"VALOR\",\"OBSERVAÇÃO\"],[\"Método\",p.distribution.mode,\"\"],[\"Inferior\",c.dist.lower,\"m³\"],[\"Superior\",c.dist.upper,\"m³\"],[\"Intermediário\",c.dist.intermediate,\"m³\"],[\"Exclusivo incêndio\",c.dist.separate,\"m³\"],[\"Diferença\",c.dist.deficit,\"m³\"],[\"Avaliação residencial\",ra.distributionTitle,ra.distributionText],[\"Percentual inferior sugerido\",ra.lowerPct,\"%\"],[\"Percentual superior sugerido\",ra.upperPct,\"%\"]]));\n  sheets.push(excelSheet(\"Dimensões\",[[\"RESERVATÓRIO\",\"FORMATO\",\"DIMENSÕES\",\"VOLUME ÚTIL M³\",\"ÁREA BASE M²\",\"EXCEDENTE M³\"],[\"Inferior\",lower?.shape||\"\",lower?dimText(lower):\"Não adotada\",lower?.volume||0,lower?.area||0,lower?lower.volume-c.dist.lower:0],[\"Superior\",upper?.shape||\"\",upper?dimText(upper):\"Não adotada\",upper?.volume||0,upper?.area||0,upper?upper.volume-c.dist.upper:0]]));\n  sheets.push(excelSheet(\"Bombeamento\",[[\"PARÂMETRO\",\"VALOR\",\"UNIDADE\"],[\"Volume superior\",c.dist.upper,\"m³\"],[\"Tempo de enchimento\",p.pumping.fillHours,\"h\"],[\"Vazão\",c.pump.qM3h,\"m³/h\"],[\"Desnível\",p.pumping.staticHead,\"m\"],[\"Perdas\",p.pumping.lossHead,\"m\"],[\"Altura manométrica\",c.pump.head,\"mca\"],[\"Rendimento\",p.pumping.efficiencyPct,\"%\"],[\"Potência hidráulica\",c.pump.hydraulicKw,\"kW\"],[\"Potência no eixo\",c.pump.shaftKw,\"kW\"],[\"Motor sugerido\",c.pump.motor,\"kW\"]]));\n  sheets.push(excelSheet(\"Orçamento\",[[\"CÓDIGO\",\"DESCRIÇÃO\",\"UNIDADE\",\"QUANTIDADE\",\"MATERIAL\",\"MÃO DE OBRA\",\"EQUIPAMENTO\",\"TOTAL\"],...p.budget.map(x=>[x.code,x.desc,x.unit,x.qty,x.material,x.labor,x.equipment,num(x.qty)*(num(x.material)+num(x.labor)+num(x.equipment))])]));\n  sheets.push(excelSheet(\"Alertas\",[[\"TIPO\",\"DESCRIÇÃO\"],...c.alerts.map(a=>[a.type,a.text]),[\"Avaliação incêndio residencial\",ra.fireTitle+\" - \"+ra.fireRecommendation]]));\n  const xml=`<?xml version=\"1.0\"?><Workbook xmlns=\"urn:schemas-microsoft-com:office:spreadsheet\" xmlns:o=\"urn:schemas-microsoft-com:office:office\" xmlns:x=\"urn:schemas-microsoft-com:office:excel\" xmlns:ss=\"urn:schemas-microsoft-com:office:spreadsheet\">${sheets.join(\"\")}<\u002FWorkbook>`;\n  downloadBlob(`${safeName(p.name)}_ReservaPro.xls`,new Blob([\"\\ufeff\"+xml],{type:\"application/vnd.ms-excel;charset=utf-8\"}));toast(\"Planilha Excel exportada\");\n}\nfunction downloadCSV(type){\n  let rows=[];\n  if(type===\"quantities\") rows=[[\"Código\",\"Descrição\",\"Unidade\",\"Quantidade\",\"Sistema\"],...autoQuantities().map(x=>[x.code,x.desc,x.unit,x.qty,x.system])];\n  else rows=[[\"Código\",\"Descrição\",\"Unidade\",\"Quantidade\",\"Material\",\"Mão de obra\",\"Equipamento\",\"Total\"],...getProject().budget.map(x=>[x.code,x.desc,x.unit,x.qty,x.material,x.labor,x.equipment,num(x.qty)*(num(x.material)+num(x.labor)+num(x.equipment))])];\n  const csv=rows.map(r=>r.map(x=>`\"${String(x??\"\").replace(/\"/g,'\"\"')}\"`).join(\";\")).join(\"\\n\");\n  downloadBlob(`${type}_${safeName(getProject().name)}.csv`,new Blob([\"\\ufeff\"+csv],{type:\"text/csv;charset=utf-8\"}));\n}\nfunction resetApp(){\n  if(!confirm(\"Restaurar projetos demonstrativos e configurações padrão?\"))return;\n  const projects=makeDemoProjects();appState={version:1,settings:structuredClone(defaultSettings),projects,activeProjectId:projects[0].id};saveState(false);go(\"dashboard\");toast(\"Demonstração restaurada\");\n}\nfunction clearStorage(){\n  if(!confirm(\"Apagar todos os dados locais do ReservaPro?\"))return;\n  localStorage.removeItem(STORAGE_KEY);location.reload();\n}\n\nrender();\n<\u002Fscript>\n\n<\u002Fbody><\u002Fhtml>"
  </script>
