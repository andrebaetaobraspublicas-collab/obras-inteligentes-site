  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

"<!DOCTYPE html>\n<html lang=\"pt-BR\"><head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>ReservatórioPro — Calculadora de Reservatório de Edificações<\u002Ftitle>\n<style>\n:root{\n  --bg:#f4f7fb;--panel:#ffffff;--panel-2:#f8fafc;--text:#172033;--muted:#64748b;\n  --primary:#0f766e;--primary-2:#14b8a6;--accent:#2563eb;--danger:#dc2626;\n  --warning:#d97706;--success:#15803d;--border:#dce5ef;--shadow:0 14px 40px rgba(15,23,42,.09);\n  --sidebar:270px;--radius:18px;\n}\n[data-theme=\"dark\"]{\n  --bg:#0f172a;--panel:#111c31;--panel-2:#17233a;--text:#e5eefc;--muted:#9db0c8;\n  --border:#2b3952;--shadow:0 16px 40px rgba(0,0,0,.25);\n}\n*{box-sizing:border-box}\nhtml{scroll-behavior:smooth}\nbody{margin:0;font-family:Inter,Segoe UI,Arial,sans-serif;background:var(--bg);color:var(--text)}\nbutton,input,select,textarea{font:inherit}\nbutton{cursor:pointer}\n.hidden{display:none!important}\n.app{min-height:100vh}\n.sidebar{\n  width:var(--sidebar);position:fixed;left:0;top:0;bottom:0;background:linear-gradient(180deg,#0f766e,#115e59);\n  color:#fff;padding:18px 14px;overflow-y:auto;z-index:30;transition:.25s\n}\n.brand{display:flex;gap:12px;align-items:center;padding:10px 10px 18px;border-bottom:1px solid rgba(255,255,255,.18)}\n.brand-mark{width:48px;height:48px;border-radius:15px;display:grid;place-items:center;background:rgba(255,255,255,.16);font-size:27px}\n.brand h1{font-size:20px;margin:0}.brand small{opacity:.78}\n.menu{margin-top:14px;display:grid;gap:4px}\n.menu button{\n  width:100%;border:0;background:transparent;color:rgba(255,255,255,.83);padding:10px 12px;\n  border-radius:12px;display:flex;gap:10px;align-items:center;text-align:left\n}\n.menu button:hover,.menu button.active{background:rgba(255,255,255,.16);color:#fff}\n.menu .icon{width:22px;text-align:center}\n.main{margin-left:var(--sidebar);min-height:100vh}\n.topbar{\n  position:sticky;top:0;z-index:20;background:color-mix(in srgb,var(--bg) 86%,transparent);backdrop-filter:blur(12px);\n  border-bottom:1px solid var(--border);padding:12px 24px;display:flex;justify-content:space-between;align-items:center;gap:12px\n}\n.top-left,.top-actions{display:flex;align-items:center;gap:10px}\n.mobile-menu{display:none}\n.project-chip{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:9px 12px;min-width:220px}\n.project-chip b{display:block;font-size:13px}.project-chip span{font-size:11px;color:var(--muted)}\n.icon-btn,.btn{\n  border:1px solid var(--border);background:var(--panel);color:var(--text);border-radius:12px;padding:9px 12px\n}\n.btn.primary{background:var(--primary);border-color:var(--primary);color:#fff}\n.btn.accent{background:var(--accent);border-color:var(--accent);color:#fff}\n.btn.danger{background:var(--danger);border-color:var(--danger);color:#fff}\n.btn.ghost{background:transparent}\n.btn.small{padding:7px 9px;font-size:12px}\n.content{padding:24px;max-width:1680px;margin:auto}\n.section{display:none}.section.active{display:block}\n.page-head{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;margin-bottom:18px}\n.page-head h2{margin:0 0 5px;font-size:27px}.page-head p{margin:0;color:var(--muted)}\n.actions{display:flex;gap:8px;flex-wrap:wrap}\n.grid{display:grid;gap:16px}.grid.cols-2{grid-template-columns:repeat(2,minmax(0,1fr))}\n.grid.cols-3{grid-template-columns:repeat(3,minmax(0,1fr))}\n.grid.cols-4{grid-template-columns:repeat(4,minmax(0,1fr))}\n.card{\n  background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px\n}\n.card.flat{box-shadow:none}.card h3{margin:0 0 14px;font-size:16px}.card .sub{color:var(--muted);font-size:13px;margin-top:-8px;margin-bottom:14px}\n.kpi{padding:17px;position:relative;overflow:hidden}\n.kpi:after{content:\"\";position:absolute;right:-24px;top:-24px;width:80px;height:80px;border-radius:50%;background:color-mix(in srgb,var(--primary-2) 18%,transparent)}\n.kpi .label{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}\n.kpi .value{font-size:25px;font-weight:800;margin-top:7px}.kpi .hint{font-size:12px;color:var(--muted);margin-top:4px}\n.form-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:13px}\n.field{display:grid;gap:6px}.field.span-2{grid-column:span 2}.field.span-3{grid-column:span 3}.field.span-4{grid-column:1/-1}\nlabel{font-size:12px;font-weight:700;color:var(--muted)}\ninput,select,textarea{\n  width:100%;border:1px solid var(--border);background:var(--panel-2);color:var(--text);\n  border-radius:11px;padding:10px 11px;outline:none\n}\ninput:focus,select:focus,textarea:focus{border-color:var(--primary-2);box-shadow:0 0 0 3px color-mix(in srgb,var(--primary-2) 15%,transparent)}\ntextarea{min-height:84px;resize:vertical}\nhr{border:0;border-top:1px solid var(--border);margin:18px 0}\n.table-wrap{overflow:auto;border:1px solid var(--border);border-radius:14px}\ntable{width:100%;border-collapse:collapse;min-width:800px;background:var(--panel)}\nth,td{padding:10px 11px;border-bottom:1px solid var(--border);font-size:12px;text-align:left;vertical-align:middle}\nth{background:var(--panel-2);color:var(--muted);text-transform:uppercase;font-size:10px;letter-spacing:.04em;position:sticky;top:0}\ntr:last-child td{border-bottom:0}.table-actions{display:flex;gap:5px}\n.badge{display:inline-flex;align-items:center;border-radius:999px;padding:4px 8px;font-size:10px;font-weight:800}\n.badge.ok{background:#dcfce7;color:#166534}.badge.warn{background:#fef3c7;color:#92400e}\n.badge.danger{background:#fee2e2;color:#991b1b}.badge.info{background:#dbeafe;color:#1e40af}\n.notice{border-left:4px solid var(--accent);background:color-mix(in srgb,var(--accent) 9%,var(--panel));padding:12px 14px;border-radius:10px;font-size:12px}\n.notice.warn{border-color:var(--warning);background:color-mix(in srgb,var(--warning) 9%,var(--panel))}\n.notice.danger{border-color:var(--danger);background:color-mix(in srgb,var(--danger) 8%,var(--panel))}\n.toolbar{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:12px}\n.toolbar .spacer{flex:1}\n.empty{padding:32px;text-align:center;color:var(--muted)}\n.progress{height:10px;border-radius:999px;background:var(--panel-2);overflow:hidden;border:1px solid var(--border)}\n.progress>span{display:block;height:100%;background:linear-gradient(90deg,var(--primary),var(--primary-2));border-radius:inherit}\n.chart-bars{display:grid;gap:10px}\n.bar-row{display:grid;grid-template-columns:150px 1fr 90px;gap:10px;align-items:center;font-size:12px}\n.bar-track{height:12px;background:var(--panel-2);border-radius:999px;overflow:hidden;border:1px solid var(--border)}\n.bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--primary-2));border-radius:999px}\n.donut{width:180px;height:180px;border-radius:50%;display:grid;place-items:center;margin:auto;position:relative}\n.donut:after{content:\"\";width:112px;height:112px;border-radius:50%;background:var(--panel);position:absolute}\n.donut-center{z-index:1;text-align:center}.donut-center b{font-size:23px}.donut-center small{display:block;color:var(--muted)}\n.tank-viz{display:grid;grid-template-columns:repeat(2,minmax(240px,1fr));gap:18px}\n.tank{\n  height:280px;border:4px solid #64748b;border-radius:12px 12px 24px 24px;position:relative;overflow:hidden;\n  background:linear-gradient(90deg,rgba(255,255,255,.2),transparent 40%,rgba(255,255,255,.18))\n}\n.tank-water{position:absolute;left:0;right:0;bottom:0;background:linear-gradient(180deg,#38bdf8,#0284c7);transition:.4s}\n.tank-fire{position:absolute;left:0;right:0;bottom:0;background:linear-gradient(180deg,#fb7185,#e11d48)}\n.tank-dead{position:absolute;left:0;right:0;bottom:0;background:#475569}\n.tank-label{position:absolute;z-index:2;left:12px;top:12px;background:rgba(15,23,42,.75);color:#fff;border-radius:8px;padding:6px 8px;font-size:11px}\n.tank-level{position:absolute;right:10px;z-index:2;color:white;font-size:10px;text-shadow:0 1px 2px #000}\n.metric-list{display:grid;gap:7px}.metric{display:flex;justify-content:space-between;gap:10px;padding:8px 0;border-bottom:1px dashed var(--border);font-size:12px}\n.metric:last-child{border:0}.metric b{text-align:right}\n.alert-list{display:grid;gap:8px}.alert-item{border:1px solid var(--border);border-radius:12px;padding:10px 12px;font-size:12px}\n.alert-item.danger{border-left:4px solid var(--danger)}.alert-item.warn{border-left:4px solid var(--warning)}.alert-item.info{border-left:4px solid var(--accent)}\n.tabs{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px}.tab{border:1px solid var(--border);background:var(--panel-2);color:var(--text);padding:8px 11px;border-radius:10px}\n.tab.active{background:var(--primary);border-color:var(--primary);color:white}\n.modal{position:fixed;inset:0;background:rgba(2,6,23,.62);display:none;align-items:center;justify-content:center;padding:20px;z-index:100}\n.modal.open{display:flex}.modal-box{width:min(850px,96vw);max-height:90vh;overflow:auto;background:var(--panel);border-radius:20px;border:1px solid var(--border);box-shadow:var(--shadow);padding:20px}\n.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}.modal-head h3{margin:0}\n.toast-wrap{position:fixed;right:18px;bottom:18px;z-index:120;display:grid;gap:8px}.toast{background:#0f172a;color:#fff;border-radius:12px;padding:11px 14px;box-shadow:var(--shadow);font-size:12px}\n.report-sheet{background:white;color:#111827;padding:30px;border-radius:16px;border:1px solid #d1d5db}\n.report-sheet h1,.report-sheet h2,.report-sheet h3{color:#0f766e}.report-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}\n.code{font-family:ui-monospace,Consolas,monospace;background:var(--panel-2);border:1px solid var(--border);padding:10px;border-radius:10px;font-size:12px}\n.footer-note{font-size:11px;color:var(--muted);margin-top:16px}\n@media(max-width:1100px){\n  .grid.cols-4{grid-template-columns:repeat(2,1fr)}.grid.cols-3{grid-template-columns:repeat(2,1fr)}\n  .form-grid{grid-template-columns:repeat(2,1fr)}.field.span-3,.field.span-4{grid-column:1/-1}\n}\n@media(max-width:820px){\n  .sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}.main{margin-left:0}.mobile-menu{display:inline-flex}\n  .topbar{padding:10px 14px}.content{padding:16px}.project-chip{min-width:0}\n  .grid.cols-2,.grid.cols-3,.grid.cols-4,.tank-viz{grid-template-columns:1fr}.form-grid{grid-template-columns:1fr}\n  .field.span-2,.field.span-3,.field.span-4{grid-column:1}.page-head{flex-direction:column}\n}\n\n.help{font-size:11px;color:var(--muted);line-height:1.45;margin-top:2px}\n.help b{color:var(--text)}\n.label-row{display:flex;align-items:center;gap:6px;flex-wrap:wrap}\n.help-pill{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;border-radius:999px;background:var(--panel-2);border:1px solid var(--border);color:var(--muted);font-size:11px;font-weight:800;padding:0 6px}\n.legend-list{display:grid;gap:8px;margin-top:12px}\n.legend-item{display:flex;align-items:center;justify-content:space-between;gap:10px;border-bottom:1px dashed var(--border);padding:6px 0;font-size:12px}\n.legend-left{display:flex;align-items:center;gap:8px}\n.swatch{width:12px;height:12px;border-radius:3px;display:inline-block;border:1px solid rgba(15,23,42,.15)}\n.wizard{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:14px 16px;box-shadow:var(--shadow);margin:0 0 16px}\n.wizard-top{display:flex;justify-content:space-between;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:12px}\n.wizard-steps{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:10px}\n.wizard-step{border:1px solid var(--border);border-radius:12px;padding:10px;background:var(--panel-2);cursor:pointer}\n.wizard-step.active{border-color:var(--primary);box-shadow:0 0 0 3px color-mix(in srgb,var(--primary-2) 18%,transparent)}\n.wizard-step.done{background:color-mix(in srgb,var(--success) 10%,var(--panel));}\n.wizard-step small{display:block;color:var(--muted);font-size:10px;margin-bottom:3px;text-transform:uppercase;letter-spacing:.03em}\n.wizard-step b{font-size:12px}\n.mini-note{font-size:12px;color:var(--muted)}\n.sim-grid{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:10px}\n.hist-bars{display:flex;align-items:flex-end;gap:6px;height:120px;margin-top:10px}\n.hist-bar{flex:1;background:linear-gradient(180deg,var(--primary-2),var(--accent));border-radius:8px 8px 0 0;min-height:4px}\n.callout-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}\n.library-card{border:1px solid var(--border);border-radius:14px;padding:12px;background:var(--panel-2)}\n.volume-stack{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}\n@media(max-width:1100px){.wizard-steps{grid-template-columns:repeat(3,1fr)}.sim-grid{grid-template-columns:repeat(3,1fr)}.callout-grid,.volume-stack{grid-template-columns:1fr}}\n@media(max-width:820px){.wizard-steps{grid-template-columns:repeat(2,1fr)}.sim-grid{grid-template-columns:repeat(2,1fr)}}\n\n\n.report-section{margin-top:22px;break-inside:avoid}\n.report-section h2{border-bottom:2px solid #0f766e;padding-bottom:6px;margin-bottom:12px}\n.report-section h3{margin:16px 0 8px}\n.formula-box{background:#eef8f7;border:1px solid #99d5cf;border-left:5px solid #0f766e;border-radius:10px;padding:12px;margin:10px 0;font-family:ui-monospace,Consolas,monospace;font-size:12px;line-height:1.55}\n.explain-box{background:#eff6ff;border:1px solid #bfdbfe;border-left:5px solid #2563eb;border-radius:10px;padding:12px;margin:10px 0;font-size:12px;line-height:1.55}\n.criteria-box{background:#fff7ed;border:1px solid #fed7aa;border-left:5px solid #ea580c;border-radius:10px;padding:12px;margin:10px 0;font-size:12px;line-height:1.55}\n.report-sheet table{font-size:11px;margin:8px 0 16px}\n.report-sheet th{position:static;background:#edf6f5;color:#134e4a}\n.report-sheet td,.report-sheet th{border:1px solid #d1d5db}\n.report-sheet p,.report-sheet li{font-size:12px;line-height:1.55}\n.report-sheet .report-grid{margin:8px 0 14px}\n.report-sheet .page-break{break-before:page;page-break-before:always}\n.assessment-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}\n.assessment-card{border:1px solid var(--border);border-radius:14px;padding:14px;background:var(--panel-2)}\n.assessment-card h4{margin:0 0 8px}\n@media(max-width:820px){.assessment-grid{grid-template-columns:1fr}}\n\n@media print{\n  body{background:white}.sidebar,.topbar,.page-head,.no-print,.toast-wrap{display:none!important}.main{margin:0}.content{padding:0;max-width:none}\n  .section{display:none!important}#reports.section{display:block!important}.card{box-shadow:none;border:0;padding:0}.report-sheet{border:0;padding:0}\n  .report-sheet table{font-size:9.5px}.report-sheet p,.report-sheet li{font-size:10.5px}.formula-box,.explain-box,.criteria-box{font-size:10px}\n  @page{size:A4;margin:14mm}\n}\n<\u002Fstyle>\n<style id=\"rp-splash-style\">\n#rpSplash{position:fixed;inset:0;z-index:99999;display:grid;place-items:center;overflow:hidden;\n  font-family:Inter,Segoe UI,Arial,sans-serif;color:#e9fbff;\n  background:radial-gradient(1200px 820px at 50% 18%,#155e57 0%,#0c2f4a 55%,#071427 100%);\n  transition:opacity .7s ease,visibility .7s ease}\n#rpSplash.rp-hide{opacity:0;visibility:hidden;pointer-events:none}\n#rpSplash *{box-sizing:border-box}\n.rp-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.05) 1px,transparent 1px);background-size:46px 46px;-webkit-mask-image:radial-gradient(circle at 50% 42%,#000,transparent 72%);mask-image:radial-gradient(circle at 50% 42%,#000,transparent 72%)}\n.rp-blob{position:absolute;border-radius:50%;filter:blur(70px);opacity:.55;pointer-events:none}\n.rp-blob.a{width:440px;height:440px;background:#0891b2;left:-130px;top:-90px;animation:rpFloat 9s ease-in-out infinite}\n.rp-blob.b{width:380px;height:380px;background:#14b8a6;right:-110px;bottom:-70px;animation:rpFloat 12s ease-in-out infinite reverse}\n.rp-blob.c{width:320px;height:320px;background:#6366f1;right:16%;top:-140px;animation:rpFloat 14s ease-in-out infinite}\n@keyframes rpFloat{0%,100%{transform:translate(0,0)}50%{transform:translate(34px,44px)}}\n\n.rp-stage{position:relative;z-index:3;display:flex;flex-direction:column;align-items:center;gap:22px;padding:26px;text-align:center;transition:opacity .5s ease,filter .5s ease,transform .5s ease}\n#rpSplash.rp-reveal .rp-stage{opacity:.28;filter:blur(3px);transform:scale(.96)}\n.rp-brand{display:flex;align-items:center;gap:13px}\n.rp-brand .drop{width:34px;height:34px;position:relative;transform:rotate(45deg);border-radius:6px 50% 50% 50%;background:linear-gradient(135deg,#5eead4,#38bdf8);box-shadow:0 0 24px rgba(56,189,248,.7)}\n.rp-title{margin:0;font-size:clamp(30px,5.4vw,54px);font-weight:800;letter-spacing:-.025em;line-height:1;\n  background:linear-gradient(92deg,#5eead4,#38bdf8 55%,#a78bfa);-webkit-background-clip:text;background-clip:text;color:transparent}\n.rp-sub{margin:0;font-size:clamp(13px,1.7vw,17px);color:#a7dcea;letter-spacing:.05em}\n\n.rp-tankwrap{position:relative;margin-top:4px}\n.rp-tank{width:min(272px,66vw);height:auto;display:block;filter:drop-shadow(0 26px 54px rgba(2,132,199,.55))}\n.rp-pct{position:absolute;inset:0;display:grid;place-items:center;font-weight:800;font-size:clamp(28px,6vw,40px);\n  color:#fff;text-shadow:0 2px 12px rgba(3,20,40,.6);pointer-events:none;letter-spacing:-.02em}\n\n.rp-bar{width:min(320px,68vw);height:8px;border-radius:999px;background:rgba(255,255,255,.14);overflow:hidden}\n.rp-bar>span{display:block;height:100%;width:0;border-radius:inherit;background:linear-gradient(90deg,#5eead4,#38bdf8);animation:rpFill 5s linear forwards}\n@keyframes rpFill{to{width:100%}}\n.rp-loading{margin:0;font-size:11px;letter-spacing:.24em;text-transform:uppercase;color:#79c3da}\n\n/* water motion */\n.rp-water{animation:rpRise 5s cubic-bezier(.42,.06,.28,1) forwards}\n@keyframes rpRise{from{transform:translateY(302px)}to{transform:translateY(0)}}\n.rp-wave{animation:rpWaveX 3.1s linear infinite}\n.rp-wave.w2{animation-duration:4.6s;animation-direction:reverse}\n@keyframes rpWaveX{from{transform:translateX(0)}to{transform:translateX(-180px)}}\n.rp-bub{animation:rpBub 3.6s ease-in infinite}\n@keyframes rpBub{0%{transform:translateY(0);opacity:0}12%{opacity:.85}100%{transform:translateY(-236px);opacity:0}}\n.rp-fall{animation:rpFall 1.5s ease-in infinite}\n@keyframes rpFall{0%{transform:translateY(0);opacity:0}10%{opacity:1}80%{opacity:1}100%{transform:translateY(64px);opacity:0}}\n\n/* legal */\n.rp-legal{position:absolute;z-index:5;width:min(560px,92vw);max-height:88vh;display:flex;flex-direction:column;\n  background:rgba(9,28,50,.9);backdrop-filter:blur(14px);border:1px solid rgba(94,234,212,.28);border-radius:20px;\n  box-shadow:0 30px 80px rgba(0,0,0,.5);padding:26px 26px 22px;opacity:0;transform:translateY(24px) scale(.97);\n  visibility:hidden;transition:opacity .55s ease,transform .55s ease,visibility .55s ease}\n#rpSplash.rp-reveal .rp-legal{opacity:1;transform:none;visibility:visible}\n.rp-legal h2{margin:0 0 4px;font-size:22px;font-weight:800;color:#e9fbff;display:flex;align-items:center;gap:10px}\n.rp-legal h2 .ico{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;background:rgba(94,234,212,.16);font-size:16px}\n.rp-legal .lead{margin:0 0 12px;font-size:12.5px;color:#8fb9cc}\n.rp-legal-body{overflow:auto;padding:14px 16px;border:1px solid rgba(255,255,255,.1);border-radius:13px;background:rgba(255,255,255,.03);\n  font-size:12.5px;line-height:1.6;color:#c9e4ef}\n.rp-legal-body p{margin:0 0 10px}.rp-legal-body p:last-child{margin:0}.rp-legal-body b{color:#eafcff}\n.rp-agree{display:flex;gap:11px;align-items:flex-start;margin:16px 0 0;font-  \"dashboard\";\n\nfunction normalizeProject(p){\n  const base=blankProject(p?.name||\"Projeto\");\n  const merged={...base,...p,\n    reserves:{...base.reserves,...(p?.reserves||{})},\n    fire:{...base.fire,...(p?.fire||{})},\n    distribution:{...base.distribution,...(p?.distribution||{})},\n    tanks:{lower:{...base.tanks.lower,...(p?.tanks?.lower||{})},upper:{...base.tanks.upper,...(p?.tanks?.upper||{})}},\n    pumping:{...base.pumping,...(p?.pumping||{})},\n    probabilistic:{...base.probabilistic,...(p?.probabilistic||{})},\n    residentialCriteria:{...base.residentialCriteria,...(p?.residentialCriteria||{})}\n  };\n  merged.populationGroups=merged.populationGroups||[];\n  merged.sectors=merged.sectors||[];\n  merged.specificUses=merged.specificUses||[];\n  merged.scenarios=merged.scenarios||[];\n  merged.budget=merged.budget||[];\n  return merged;\n}\nfunction loadState(){\n  try{\n    const raw=localStorage.getItem(STORAGE_KEY);\n    if(raw){\n      const s=JSON.parse(raw);\n      s.settings={...structuredClone(defaultSettings),...s.settings};\n      s.settings.profiles=s.settings.profiles?.length?s.settings.profiles:structuredClone(defaultSettings.profiles);\n      s.settings.buildingLibrary=s.settings.buildingLibrary?.length?s.settings.buildingLibrary:structuredClone(defaultSettings.buildingLibrary);\n      if(!s.projects?.length) s.projects=makeDemoProjects();\n      s.projects=s.projects.map(normalizeProject);\n      if(!s.activeProjectId) s.activeProjectId=s.projects[0].id;\n      return s;\n    }\n  }catch(e){ console.warn(e); }\n  const projects=makeDemoProjects().map(normalizeProject);\n  return {version:1,settings:structuredClone(defaultSettings),projects,activeProjectId:projects[0].id};\n}\nfunction saveState(show=true){\n  const p=getProject(); if(p) p.updatedAt=new Date().toISOString();\n  localStorage.setItem(STORAGE_KEY,JSON.stringify(appState));\n  document.documentElement.dataset.theme=appState.settings.theme||\"light\";\n  const el=document.getElementById(\"saveStatus\");\n  if(el){el.textContent=\"Salvo agora\";setTimeout(()=>el.textContent=\"Salvo localmente\",1300)}\n  if(show) toast(\"Dados salvos no navegador\");\n}\nfunction getProject(){ return appState.projects.find(p=>p.id===appState.activeProjectId)||appState.projects[0]; }\nfunction getBuildingProfile(buildingType){\n  const list=appState.settings.buildingLibrary||[];\n  return list.find(x=>String(x.buildingType).toLowerCase()===String(buildingType).toLowerCase())||null;\n}\nfunction applyBuildingLibrary(id){\n  const p=getProject(), lib=(appState.settings.buildingLibrary||[]).find(x=>x.id===id)||getBuildingProfile(p.buildingType);\n  if(!lib) return toast(\"Nenhum perfil técnico encontrado\");\n  p.appliedLibraryId=lib.id;\n  p.reserves.autonomyHours=num(lib.autonomyHours,p.reserves.autonomyHours);\n  p.reserves.operationalMode=\"percent\"; p.reserves.operationalValue=num(lib.operationalPct,p.reserves.operationalValue);\n  p.reserves.securityMode=\"percent\"; p.reserves.securityValue=num(lib.securityPct,p.reserves.securityValue);\n  p.reserves.growthPct=num(lib.growthPct,p.reserves.growthPct);\n  if(num(lib.fireVolumeM3)>=0){ p.fire.method=\"direct\"; p.fire.directVolumeM3=num(lib.fireVolumeM3); }\n  if(!p.populationGroups.length && num(lib.unitConsumption)>0){\n    p.populationGroups.push({id:uid(),desc:lib.populationBasis||\"Usuários\",qty:Math.max(1,num(p.units)||1),unitConsumption:num(lib.unitConsumption),occupancy:1,simultaneity:1,daysMonth:30,notes:`Perfil técnico aplicado: ${lib.buildingType}`});\n  }\n  saveState(false); render(); toast(\"Perfil técnico aplicado ao projeto\");\n}\n\n\nfunction isSingleFamily(p=getProject()){ return String(p?.buildingType||\"\").toLowerCase().includes(\"residência unifamiliar\"); }\nfunction residentialAssessment(p=getProject(),c=null){\n  c=c||calcProject(p); const r=p.residentialCriteria||{}; const reasons=[]; let fireLevel=\"info\", fireTitle=\"Verificação local necessária\", fireRecommendation=\"Não é possível concluir automaticamente se há exigência de reserva de incêndio.\";\n  const special=r.specialFireRisk||\"none\";\n  if(!isSingleFamily(p)) return {applicable:false,fireLevel:\"info\",fireTitle:\"Avaliação residencial não aplicável\",fireRecommendation:\"O projeto atual não está classificado como residência unifamiliar.\",distributionTitle:\"Aplicam-se os critérios gerais do sistema.\",distributionText:\"Use a autonomia, a confiabilidade do abastecimento e as limitações físicas do projeto.\",lowerPct:p.distribution.lowerPct,upperPct:p.distribution.upperPct,reasons:[]};\n  if(r.localFireRequirement===\"yes\"){\n    fireLevel=\"danger\"; fireTitle=\"Reserva de incêndio deve permanecer no estudo\";\n    fireRecommendation=\"O usuário informou que existe exigência local ou do projeto. Mantenha o volume definido e confirme vazão, duração, localização e dispositivo que impeça seu consumo indevido.\";\n  }else if(special!==\"none\"){\n    fireLevel=\"warn\"; fireTitle=\"Risco especial exige análise profissional\";\n    fireRecommendation=\"A residência possui risco especial cadastrado. Recomenda-se projeto específico e, quando houver reserva, preferência por armazenamento claramente segregado ou intangível.\";\n  }else if(r.localFireRequirement===\"no\"){\n    fireLevel=\"ok\"; fireTitle=\"Sem reserva dedicada indicada pelo critério informado\";\n    fireRecommendation=\"O usuário informou inexistência de exigência local e não cadastrou risco especial. O sistema sugere volume de incêndio igual a zero, mantendo a obrigação de conferir regras locais e condições particulares.\";\n  }\n  if(r.localFireRequirement===\"unknown\") reasons.push(\"A exigência do Corpo de Bombeiros ou da legislação local ainda não foi confirmada.\");\n  if(special!==\"none\") reasons.push(\"Foi informado risco especial: \"+specialFireRiskLabel(special)+\".\");\n  if(num(p.area)>500) reasons.push(\"A área construída é elevada para uma residência unifamiliar e merece análise individualizada.\");\n  if(num(p.floors)>2) reasons.push(\"A edificação possui mais de dois pavimentos, aumentando a complexidade do abastecimento e da evacuação.\");\n  if(p.basement) reasons.push(\"Existe subsolo, condição que pode alterar riscos, acesso e implantação dos reservatórios.\");\n\n  const stable=p.supplyRegime===\"Contínuo\" && p.interruptions===\"Baixa\" && num(p.pressure)>=10;\n  const critical=p.supplyRegime===\"Intermitente\" || p.supplyRegime===\"Crítico\" || p.interruptions===\"Alta\" || num(p.pressure)<5;\n  let lowerPct=0,upperPct=100,distributionTitle=\"Reservatório superior como solução principal\",distributionText=\"Com abastecimento contínuo, baixa frequência de interrupções e pressão razoável, uma residência unifamiliar pode, em princípio, operar apenas com reservatório superior, desde que a estrutura suporte a carga e a concessionária permita o arranjo.\";\n  if(critical){ lowerPct=70; upperPct=30; distributionTitle=\"Reservatórios inferior e superior recomendados\"; distributionText=\"A alimentação é intermitente, crítica ou apresenta baixa pressão. O reservatório inferior recebe a água disponível e o bombeamento recompõe o reservatório superior, preservando abastecimento por gravidade.\"; }\n  else if(!stable){ lowerPct=50; upperPct=50; distributionTitle=\"Divisão equilibrada recomendada\"; distributionText=\"As condições de abastecimento não são plenamente estáveis. A divisão entre reservatório inferior e superior melhora a segurança operacional e reduz o volume concentrado sobre a cobertura.\"; }\n  if(r.preferRedundancy && lowerPct<60){ lowerPct=60; upperPct=40; distributionTitle=\"Divisão com maior redundância\"; distributionText=\"O usuário priorizou redundância operacional. O sistema deslocou maior parcela para o reservatório inferior e manteve volume superior suficiente para consumo por gravidade.\"; }\n  if(r.lowerSpace===\"no\"){\n    lowerPct=0;upperPct=100;distributionTitle=\"Reservatório inferior inviável pelo espaço informado\";distributionText=\"Como não há espaço disponível para reservatório inferior, o sistema mantém a alternativa com reservatório superior. Deve-se verificar capacidade estrutural, acesso para manutenção, volume comercial disponível e confiabilidade do abastecimento.\";\n  }\n  const suggestedUpper=c.usefulConsumptionM3*upperPct/100;\n  if(num(r.upperStructuralLimitM3)>0 && suggestedUpper>num(r.upperStructuralLimitM3)){\n    upperPct=clamp(num(r.upperStructuralLimitM3)/Math.max(.001,c.usefulConsumptionM3)*100,10,90); lowerPct=100-upperPct;\n    distributionTitle=\"Distribuição limitada pela capacidade superior informada\";\n    distributionText=\"O volume máximo admitido na cobertura foi respeitado. O restante do volume de consumo foi direcionado ao reservatório inferior.\";\n  }\n  if(r.directSupplyPossible && stable){ reasons.push(\"O usuário indicou que parte dos pontos pode receber água diretamente da rede; essa decisão deve ser compatibilizada com a concessionária e com a continuidade do serviço.\"); }\n  return {applicable:true,fireLevel,fireTitle,fireRecommendation,distributionTitle,distributionText,lowerPct,upperPct,reasons};\n}\nfunction specialFireRiskLabel(v){ return ({none:\"nenhum risco especial\",lpg:\"central ou armazenamento relevante de GLP\",workshop:\"oficina, combustíveis ou inflamáveis\",ev:\"garagem fechada com carregamento de veículo elétrico\",battery:\"baterias estacionárias ou sistema fotovoltaico com armazenamento\",other:\"outro risco especial\"}[v]||v); }\nfunction applyResidentialDistribution(){\n  const p=getProject(),c=calcProject(p),a=residentialAssessment(p,c); if(!a.applicable) return toast(\"Avaliação disponível apenas para residência unifamiliar\");\n  p.distribution.mode=\"percent\";p.distribution.lowerPct=round(a.lowerPct);p.distribution.upperPct=round(a.upperPct);\n  if(p.residentialCriteria.localFireRequirement===\"no\" && p.residentialCriteria.specialFireRisk===\"none\"){p.fire.method=\"direct\";p.fire.directVolumeM3=0;}\n  saveState(false);render();toast(\"Recomendação residencial aplicada\");\n}\nfunction calcProject(p=getProject()){\n  if(!p) return {};\n  const groupRows=(p.populationGroups||[]).map(g=>{\n    const effective=num(g.qty)*num(g.occupancy,1)*num(g.simultaneity,1);\n    const daily=effective*num(g.unitConsumption);\n    return {...g,effective,daily};\n  });\n  const sectorRows=(p.sectors||[]).map(s=>{\n    const daily=num(s.population)*num(s.unitConsumption)*num(s.correction,1)+num(s.additionalL);\n    return {...s,daily};\n  });\n  const specificRows=(p.specificUses||[]).map(s=>({...s,daily:num(s.dailyL)}));\n  const groupL=groupRows.reduce((a,b)=>a+b.daily,0);\n  const sectorL=sectorRows.reduce((a,b)=>a+b.daily,0);\n  const specificL=specificRows.reduce((a,b)=>a+b.daily,0);\n  const dailyL=groupL+sectorL+specificL;\n  const dailyM3=dailyL/1000;\n  const population=groupRows.reduce((a,b)=>a+b.effective,0)+sectorRows.reduce((a,b)=>a+num(b.population),0);\n  const autonomyHours=num(p.reserves.autonomyHours,24);\n  const consumptionM3=dailyM3*autonomyHours/24;\n  const operationalM3=reserveValue(p.reserves.operationalMode,p.reserves.operationalValue,dailyM3,consumptionM3);\n  const securityM3=reserveValue(p.reserves.securityMode,p.reserves.securityValue,dailyM3,consumptionM3);\n  const growthM3=(consumptionM3+operationalM3+securityM3)*num(p.reserves.growthPct)/100;\n  const fireBase=calcFireBase(p.fire);\n  const fireM3=fireBase*(1+num(p.fire.marginPct)/100);\n  const usefulConsumptionM3=consumptionM3+operationalM3+securityM3+growthM3;\n  const usefulTotalM3=usefulConsumptionM3+fireM3;\n  const deadM3=num(p.reserves.deadVolumeM3);\n  const geomM3=(usefulTotalM3+deadM3)*(1+num(p.reserves.geomMarginPct)/100);\n  const geomExtraM3=Math.max(0,geomM3-usefulTotalM3-deadM3);\n  const dist=calcDistribution(p,dailyM3,usefulConsumptionM3,fireM3);\n  const pump=calcPump(p,dist,dailyM3);\n  const alerts=calcAlerts(p,{dailyM3,population,fireM3,usefulTotalM3,geomM3,dist,pump});\n  const residential=null;\n  return {groupRows,sectorRows,specificRows,groupL,sectorL,specificL,dailyL,dailyM3,population,autonomyHours,\n    consumptionM3,operationalM3,securityM3,growthM3,fireBase,fireM3,usefulConsumptionM3,usefulTotalM3,deadM3,geomExtraM3,geomM3,dist,pump,alerts};\n}\nfunction reserveValue(mode,value,dailyM3,consumptionM3){\n  value=num(value);\n  if(mode===\"days\") return dailyM3*value;\n  if(mode===\"hours\") return dailyM3*value/24;\n  if(mode===\"fixed\") return value;\n  if(mode===\"percentTotal\") return consumptionM3*value/100;\n  return dailyM3*value/100;\n}\nfunction calcFireBase(f){\n  const hydrant=num(f.hydrantFlowLmin)*num(f.hydrants)*num(f.hydrantDurationMin)/1000;\n  const sprinkler=num(f.sprinklerFlowLmin)*num(f.sprinklerDurationMin)/1000;\n  if(f.method===\"hydrants\") return hydrant;\n  if(f.method===\"sprinklers\") return sprinkler;\n  if(f.method===\"combined\") return hydrant+sprinkler;\n  return num(f.directVolumeM3);\n}\nfunction calcDistribution(p,dailyM3,usefulConsumptionM3,fireM3){\n  const d=p.distribution||{};\n  let lower=0,upper=0,intermediate=0;\n  if(d.mode===\"manual\"){\n    lower=num(d.lowerManualM3);upper=num(d.upperManualM3);intermediate=num(d.intermediateManualM3);\n  }else if(d.mode===\"autonomy\"){\n    upper=Math.min(usefulConsumptionM3,dailyM3*num(d.upperHours)/24);\n    lower=Math.max(0,usefulConsumptionM3-upper);\n  }else{\n    const sum=Math.max(1,num(d.lowerPct)+num(d.upperPct));\n    lower=usefulConsumptionM3*num(d.lowerPct)/sum;\n    upper=usefulConsumptionM3*num(d.upperPct)/sum;\n  }\n  let separate=0;\n  const location=p.fire.location||d.fireLocation||\"lower\";\n  if(location===\"upper\") upper+=fireM3;\n  else if(location===\"separate\") separate=fireM3;\n  else if(location===\"split\"){lower+=fireM3/2;upper+=fireM3/2}\n  else lower+=fireM3;\n  const total=lower+upper+intermediate+separate;\n  return {lower,upper,intermediate,separate,total,location,deficit:total-(usefulConsumptionM3+fireM3)};\n}\nfunction calcPump(p,dist,dailyM3){\n  const qM3h=dist.upper/Math.max(.25,num(p.pumping.fillHours,4));\n  const qM3s=qM3h/3600;\n  const head=num(p.pumping.staticHead)+num(p.pumping.lossHead);\n  const hydraulicKw=appState.settings.waterDensity*appState.settings.gravity*qM3s*head/1000;\n  const shaftKw=hydraulicKw/Math.max(.1,num(p.pumping.efficiencyPct,65)/100);\n  const motor=appState.settings.motorStandards.find(v=>v>=shaftKw)||Math.ceil(shaftKw);\n  const cycles=dist.upper>0?dailyM3/dist.upper:0;\n  return {qM3h,qLs:qM3h/3.6,head,hydraulicKw,shaftKw,motor,cycles};\n}\nfunction calcAlerts(p,c){\n  const a=[];\n  if(c.population<=0) a.push({type:\"danger\",text:\"A população calculada é igual a zero.\"});\n  if(c.dailyM3<=0) a.push({type:\"danger\",text:\"O consumo diário ainda não foi informado.\"});\n  if(c.autonomyHours<12) a.push({type:\"warn\",text:\"A autonomia configurada é inferior a 12 horas.\"});\n  if(c.fireM3<=0) a.push({type:\"info\",text:\"Não há reserva de incêndio calculada ou informada.\"});\n  if(c.dist.deficit<-0.01) a.push({type:\"danger\",text:\"A distribuição manual não atende ao volume útil requerido.\"});\n  if(c.pump.cycles>num(p.pumping.maxStartsHour,6)*24) a.push({type:\"warn\",text:\"A estimativa de ciclos de bombeamento é elevada.\"});\n  const lo=optimizeTank(p.tanks.lower,c.dist.lower,1)[0], up=optimizeTank(p.tanks.upper,c.dist.upper,1)[0];\n  if(!lo && c.dist.lower>0) a.push({type:\"danger\",text:\"Não foi encontrada dimensão compatível para o reservatório inferior.\"});\n  if(!up && c.dist.upper>0) a.push({type:\"danger\",text:\"Não foi encontrada dimensão compatível para o reservatório superior.\"});\n  if(c.dist.upper>0 && c.dist.upper<c.dailyM3*4/24) a.push({type:\"warn\",text:\"O reservatório superior oferece menos de quatro horas do consumo diário médio.\"});\n  if(!a.length) a.push({type:\"info\",text:\"Nenhuma inconsistência relevante foi detectada nos dados atuais.\"});\n  return a;\n}\n\nfunction optimizeTank(tank,targetM3,limit=5){\n  targetM3=num(targetM3); if(targetM3<=0) return [];\n  const inc=Math.max(.05,num(tank.increment,.1));\n  const dead=num(tank.deadHeight,.15), free=num(tank.freeboard,.25);\n  const maxH=Math.max(dead+free+inc,num(tank.maxH,3));\n  const candidates=[];\n  if(tank.shape===\"cyl\"){\n    for(let d=Math.max(.5,inc);d<=num(tank.maxL,6)+1e-9;d+=inc){\n      const usefulH=targetM3/(Math.PI*Math.pow(d/2,2));\n      const totalH=Math.ceil((usefulH+dead+free)/inc)*inc;\n      if(totalH<=maxH+1e-9){\n        const area=Math.PI*Math.pow(d/2,2), perimeter=Math.PI*d;\n        candidates.push({shape:\"cyl\",d:round(d),h:round(totalH),usefulH:round(totalH-dead-free),volume:area*Math.max(0,totalH-dead-free),area,perimeter,internal:2*area+perimeter*totalH});\n      }\n    }\n  }else{\n    const maxL=num(tank.maxL,6),maxW=num(tank.maxW,5);\n    for(let l=Math.max(.6,inc);l<=maxL+1e-9;l+=inc){\n      for(let w=Math.max(.6,inc);w<=maxW+1e-9;w+=inc){\n        const usefulH=targetM3/(l*w);\n        const totalH=Math.ceil((usefulH+dead+free)/inc)*inc;\n        if(totalH<=maxH+1e-9){\n          const vol=l*w*Math.max(0,totalH-dead-free);\n          candidates.push({shape:\"rect\",l:round(l),w:round(w),h:round(totalH),usefulH:round(totalH-dead-free),volume:vol,area:l*w,perimeter:2*(l+w),internal:2*(l*w)+2*(l+w)*totalH,square:Math.abs(l-w)});\n        }\n      }\n    }\n  }\n  const obj=tank.objective||\"base\";\n  const score=x=>obj===\"height\"?x.h:obj===\"perimeter\"?x.perimeter:obj===\"internal\"?x.internal:obj===\"square\"?(x.square??0):x.area;\n  candidates.sort((a,b)=>score(a)-score(b)||a.volume-b.volume);\n  const unique=[];const seen=new Set();\n  for(const c of candidates){\n    const key=JSON.stringify(c); if(!seen.has(key)){seen.add(key);unique.push(c)}\n    if(unique.length>=limit) break;\n  }\n  return unique;\n}\nfunction round(v){ return Math.round(v*1000)/1000; }\n\nfunction render(){\n  document.documentElement.dataset.theme=appState.settings.theme||\"light\";\n  renderMenu();updateTop();\n  const map={dashboard:renderDashboard,projects:renderProjects,building:renderBuilding,population:renderPopulation,\n    sectors:renderSectors,consumption:renderConsumption,reserves:renderReserves,fire:renderFire,distribution:renderDistribution,\n    dimensions:renderDimensions,pumping:renderPumping,scenarios:renderScenarios,quantities:renderQuantities,budget:renderBudget,\n    reports:renderReports,settings:renderSettings};\n  map[activeSection]?.();\n}\nfunction renderMenu(){\n  document.getElementById(\"menu\").innerHTML=menuItems.map(([id,ic,label])=>\n    `<button class=\"${activeSection===id?\"active\":\"\"}\" onclick=\"go('${id}')\"><span class=\"icon\">${ic}<\u002Fspan>${label}<\u002Fbutton>`).join(\"\");\n}\nfunction go(id){activeSection=id;document.querySelectorAll(\".section\").forEach(s=>s.classList.toggle(\"active\",s.id===id));render();window.scrollTo({top:0});toggleSidebar(false)}\nfunction updateTop(){\n  const p=getProject();\n  document.getElementById(\"topProjectName\").textContent=p?.name||\"Sem projeto\";\n  document.getElementById(\"topProjectMeta\").textContent=p?`${p.city||\"Município não informado\"} • ${p.buildingType}`:\"Crie um projeto\";\n}\nfunction methodLabel(method){ return ({direct:\"Volume informado\",hydrants:\"Hidrantes\",sprinklers:\"Sprinklers\",combined:\"Hidrantes + sprinklers\"}[method]||method); }\nconst wizardSections=[\n  {id:\"building\",label:\"Edificação\",desc:\"Dados gerais\"},\n  {id:\"population\",label:\"População\",desc:\"Usuários e grupos\"},\n  {id:\"consumption\",label:\"Consumo\",desc:\"Estimativa base\"},\n  {id:\"reserves\",label:\"Reservas\",desc:\"Autonomia e margens\"},\n  {id:\"fire\",label:\"Incêndio\",desc:\"Reserva técnica\"},\n  {id:\"distribution\",label:\"Distribuição\",desc:\"Reservatórios\"}\n];\nfunction wizardStatus(p=getProject()){\n  const c=calcProject(p);\n  const checks={\n    building:!!(p.name&&p.buildingType&&num(p.area)>0),\n    population:(p.populationGroups?.length||0)+(p.sectors?.length||0)>0,\n    consumption:c.dailyM3>0,\n    reserves:num(p.reserves.autonomyHours)>0,\n    fire:p.fire.method!==\"direct\"||num(p.fire.directVolumeM3)>=0,\n    distribution:c.dist.total>0 && c.dist.deficit>=-0.05\n  };\n  const done=Object.values(checks).filter(Boolean).length;\n  return {checks,done,total:Object.keys(checks).length,pct:Math.round(done/Object.keys(checks).length*100)};\n}\nfunction wizardHTML(section=activeSection){\n  const w=wizardStatus(), current=Math.max(0,wizardSections.findIndex(x=>x.id===section));\n  const next=wizardSections.find(x=>!w.checks[x.id])||wizardSections[wizardSections.length-1];\n  return `<div class=\"wizard no-print\"><div class=\"wizard-top\"><div><b>Assistente passo a passo<\u002Fb><div class=\"mini-note\">Concluído: ${w.done}/${w.total} etapas (${w.pct}%). Próximo foco sugerido: <b>${esc(next.label)}<\u002Fb>.<\u002Fdiv><\u002Fdiv><div style=\"min-width:220px;flex:1;max-width:340px\"><div class=\"progress\"><span style=\"width:${w.pct}%\"><\u002Fspan><\u002Fdiv><\u002Fdiv><\u002Fdiv><div class=\"wizard-steps\">${wizardSections.map((s,i)=>`<div class=\"wizard-step ${current===i?\"active\":\"\"} ${w.checks[s.id]?\"done\":\"\"}\" onclick=\"go('${s.id}')\"><small>Etapa ${i+1}<\u002Fsmall><b>${esc(s.label)}<\u002Fb><div class=\"mini-note\">${esc(s.desc)}<\u002Fdiv><\u002Fdiv>`).join(\"\")}<\u002Fdiv><\u002Fdiv>`;\n}\nfunction pageHead(title,sub,actions=\"\"){return `<div class=\"page-head\"><div><h2>${title}<\u002Fh2><p>${sub}<\u002Fp><\u002Fdiv><div class=\"actions no-print\">${actions}<\u002Fdiv><\u002Fdiv>${wizardHTML(activeSection)}`}\nfunction legendHTML(rows,total){ return `<div class=\"legend-list\">${rows.map(r=>`<div class=\"legend-item\"><div class=\"legend-left\"><span class=\"swatch\" style=\"background:${r[2]}\"><\u002Fspan><span>${esc(r[0])}<\u002Fspan><\u002Fdiv><b>${fmt(r[1])} m³${total?` • ${fmt(r[1]/Math.max(.001,total)*100,1)}%`:\"\"}<\u002Fb><\u002Fdiv>`).join(\"\")}<\u002Fdiv>`; }\nfunction triangular(min,mode,max){ min=num(min); mode=num(mode); max=num(max); if(max<=min) return min; mode=clamp(mode,min,max); const u=Math.random(), c=(mode-min)/(max-min); return u<c ? min+Math.sqrt(u*(max-min)*(mode-min)) : max-Math.sqrt((1-u)*(max-min)*(max-mode)); }\nfunction percentile(arr,pct){ if(!arr.length) return 0; const pos=(arr.length-1)*pct, base=Math.floor(pos), rest=pos-base; return arr[base+1]!==undefined ? arr[base]+rest*(arr[base+1]-arr[base]) : arr[base]; }\nfunction calcProbabilisticVolume(p,popMult,consMult){\n  const c=calcProject(p), dailyM3=c.dailyM3*popMult*consMult;\n  const autonomyHours=num(p.reserves.autonomyHours,24);\n  const consumptionM3=dailyM3*autonomyHours/24;\n  const operationalM3=reserveValue(p.reserves.operationalMode,p.reserves.operationalValue,dailyM3,consumptionM3);\n  const securityM3=reserveValue(p.reserves.securityMode,p.reserves.securityValue,dailyM3,consumptionM3);\n  const growthM3=(consumptionM3+operationalM3+securityM3)*num(p.reserves.growthPct)/100;\n  return consumptionM3+operationalM3+securityM3+growthM3+c.fireM3;\n}\nfunction runMonteCarlo(){\n  const p=getProject(), cfg=p.probabilistic||{}; const it=Math.max(300,Math.min(10000,Math.round(num(cfg.iterations,2000))));\n  const vals=[]; for(let i=0;i<it;i++){ vals.push(calcProbabilisticVolume(p, triangular(cfg.populationMin,cfg.populationMode,cfg.populationMax), triangular(cfg.consumptionMin,cfg.consumptionMode,cfg.consumptionMax))); }\n  vals.sort((a,b)=>a-b); const mean=vals.reduce((a,b)=>a+b,0)/vals.length; const min=vals[0], max=vals[vals.length-1];\n  const bins=10, hist=new Array(bins).fill(0), range=Math.max(0.001,max-min);\n  vals.forEach(v=>{ let idx=Math.floor((v-min)/range*bins); if(idx>=bins) idx=bins-1; hist[idx]++; });\n  p.probabilistic.result={iterations:it,mean,min,max,p10:percentile(vals,0.10),p50:percentile(vals,0.50),p80:percentile(vals,0.80),p90:percentile(vals,0.90),hist};\n  saveState(false); renderScenarios(); toast(\"Simulação probabilística concluída\");\n}\nfunction saveProbabilistic(){\n  const pr=getProject().probabilistic;\n  Object.assign(pr,{populationMin:num(v(\"pr_pmin\"),0.9),populationMode:num(v(\"pr_pmode\"),1),populationMax:num(v(\"pr_pmax\"),1.1),consumptionMin:num(v(\"pr_cmin\"),0.9),consumptionMode:num(v(\"pr_cmode\"),1),consumptionMax:num(v(\"pr_cmax\"),1.15),iterations:num(v(\"pr_it\"),2000)});\n  saveState(false); renderScenarios(); toast(\"Parâmetros probabilísticos salvos\");\n}\nfunction openLibraryModal(){ openModal(`<div class=\"modal-head\"><h3>Biblioteca técnica por tipo de edificação<\u002Fh3><button class=\"icon-btn\" onclick=\"closeModal()\">✕<\u002Fbutton><\u002Fdiv><div class=\"grid cols-2\">${(appState.settings.buildingLibrary||[]).map(x=>`<div class=\"library-card\"><h3>${esc(x.buildingType)}<\u002Fh3><div class=\"mini-note\">${esc(x.note||\"\")}<\u002Fdiv><div class=\"metric-list\" style=\"margin-top:8px\"><div class=\"metric\"><span>Consumo unitário<\u002Fspan><b>${fmt(x.unitConsumption,1)} L/dia<\u002Fb><\u002Fdiv><div class=\"metric\"><span>Autonomia<\u002Fspan><b>${fmt(x.autonomyHours,0)} h<\u002Fb><\u002Fdiv><div class=\"metric\"><span>Operacional / segurança<\u002Fspan><b>${fmt(x.operationalPct,0)}% / ${fmt(x.securityPct,0)}%<\u002Fb><\u002Fdiv><div class=\"metric\"><span>Incêndio<\u002Fspan><b>${fmt(x.fireVolumeM3)} m³<\u002Fb><\u002Fdiv><\u002Fdiv><div class=\"actions\" style=\"margin-top:10px\"><button class=\"btn small primary\" onclick=\"applyBuildingLibrary('${x.id}');closeModal()\">Aplicar ao projeto<\u002Fbutton><\u002Fdiv><\u002Fdiv>`).join(\"\")}<\u002Fdiv>`); }\nfunction openLibraryItemModal(id=\"\"){\n  const x=(appState.settings.buildingLibrary||[]).find(y=>y.id===id)||{id:\"\",buildingType:\"\",populationBasis:\"Usuários\",unitConsumption:50,autonomyHours:24,operationalPct:10,securityPct:10,growthPct:10,fireVolumeM3:0,note:\"\"};\n  openModal(`<div class=\"modal-head\"><h3>${id?\"Editar\":\"Novo\"} perfil técnico<\u002Fh3><button class=\"icon-btn\" onclick=\"closeModal()\">✕<\u002Fbutton><\u002Fdiv><div class=\"form-grid\">${field(\"lib_type\",\"Tipo de edificação\",x.buildingType,\"text\",\"span-2\",\"Ex.: Escola, Hospital, Galpão.\")}${field(\"lib_basis\",\"Base populacional\",x.populationBasis,\"text\",\"span-2\",\"Ex.: moradores, alunos, leitos.\")}${field(\"lib_cons\",\"Consumo unitário (L/dia)\",x.unitConsumption,\"number\",\"\",\"Valor demonstrativo editável.\")}${field(\"lib_aut\",\"Autonomia (h)\",x.autonomyHours,\"number\",\"\",\"Sugestão inicial para o projeto.\")}${field(\"lib_op\",\"Reserva operacional (%)\",x.operationalPct,\"number\")}${field(\"lib_sec\",\"Reserva de segurança (%)\",x.securityPct,\"number\")}${field(\"lib_growth\",\"Crescimento (%)\",x.growthPct,\"number\")}${field(\"lib_fire\",\"Reserva de incêndio (m³)\",x.fireVolumeM3,\"number\")}${textArea(\"lib_note\",\"Observação\",x.note,\"span-4\",\"Descreva premissas ou limitações do perfil.\")}<\u002Fdiv><div class=\"actions\" style=\"margin-top:16px;justify-content:flex-end\"><button class=\"btn\" onclick=\"closeModal()\">Cancelar<\u002Fbutton><button class=\"btn primary\" onclick=\"saveLibraryItem('${id}')\">Salvar<\u002Fbutton><\u002Fdiv>`);\n}\nfunction saveLibraryItem(id){\n  const list=appState.settings.buildingLibrary||[];\n  const obj={id:id||uid(),buildingType:v(\"lib_type\")||\"Tipo\",populationBasis:v(\"lib_basis\")||\"Usuários\",unitConsumption:num(v(\"lib_cons\")),autonomyHours:num(v(\"lib_aut\")),operationalPct:num(v(\"lib_op\")),securityPct:num(v(\"lib_sec\")),growthPct:num(v(\"lib_growth\")),fireVolumeM3:num(v(\"lib_fire\")),note:v(\"lib_note\")};\n  const i=list.findIndex(x=>x.id===id); if(i>=0) list[i]=obj; else list.push(obj); closeModal(); saveState(false); renderSettings(); toast(\"Perfil técnico salvo\");\n}\nfunction removeLibraryItem(id){ if(!confirm(\"Excluir este perfil técnico?\")) return; appState.settings.buildingLibrary=(appState.settings.buildingLibrary||[]).filter(x=>x.id!==id); saveState(false); ren ção máx.\",pr.populationMax,\"number\")}\n        ${field(\"pr_cmin\",\"Consumo mín.\",pr.consumptionMin,\"number\",\"\",\"Ex.: 0,90 = 90% do consumo base.\")}\n        ${field(\"pr_cmode\",\"Consumo provável\",pr.consumptionMode,\"number\")}\n        ${field(\"pr_cmax\",\"Consumo máx.\",pr.consumptionMax,\"number\")}\n        ${field(\"pr_it\",\"Iterações\",pr.iterations,\"number\",\"\",\"Recomendado: 1.000 a 5.000.\")}\n      <\u002Fdiv>\n      <div class=\"actions\" style=\"margin-top:12px\"><button class=\"btn\" onclick=\"saveProbabilistic()\">Salvar<\u002Fbutton><button class=\"btn primary\" onclick=\"runMonteCarlo()\">Executar simulação<\u002Fbutton><\u002Fdiv>\n      <div class=\"help\" style=\"margin-top:8px\"><b>Interpretação:<\u002Fb> a simulação gera diferentes combinações de ocupação e consumo usando distribuição triangular e estima faixas de volume útil.<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"card\"><h3>Resultados da simulação<\u002Fh3>${res?`<div class=\"grid cols-3\"><div class=\"card flat kpi\"><div class=\"label\">Média<\u002Fdiv><div class=\"value\">${fmt(res.mean)}<\u002Fdiv><div class=\"hint\">m³ úteis<\u002Fdiv><\u002Fdiv><div class=\"card flat kpi\"><div class=\"label\">P50<\u002Fdiv><div class=\"value\">${fmt(res.p50)}<\u002Fdiv><div class=\"hint\">m³ úteis<\u002Fdiv><\u002Fdiv><div class=\"card flat kpi\"><div class=\"label\">P80<\u002Fdiv><div class=\"value\">${fmt(res.p80)}<\u002Fdiv><div class=\"hint\">m³ úteis<\u002Fdiv><\u002Fdiv><\u002Fdiv><div class=\"metric-list\" style=\"margin-top:10px\"><div class=\"metric\"><span>P10 / P90<\u002Fspan><b>${fmt(res.p10)} / ${fmt(res.p90)} m³<\u002Fb><\u002Fdiv><div class=\"metric\"><span>Mínimo / máximo<\u002Fspan><b>${fmt(res.min)} / ${fmt(res.max)} m³<\u002Fb><\u002Fdiv><div class=\"metric\"><span>Iterações<\u002Fspan><b>${fmt(res.iterations,0)}<\u002Fb><\u002Fdiv><\u002Fdiv><div class=\"hist-bars\">${res.hist.map(h=>`<div class=\"hist-bar\" style=\"height:${Math.max(8,h/Math.max(...res.his udget()\">Enviar ao orçamento<\u002Fbutton>`)\n  +`<div class=\"card\"><div class=\"table-wrap\"><table><thead><tr><th>Código<\u002Fth><th>Descrição<\u002Fth><th>Unidade<\u002Fth><th>Quantidade<\u002Fth><th>Sistema<\u002Fth><\u002Ftr><\u002Fthead><tbody>\n  ${rows.map(r=>`<tr><td>${r.code}<\u002Ftd><td>${r.desc}<\u002Ftd><td>${r.unit}<\u002Ftd><td>${fmt(r.qty,2)}<\u002Ftd><td>${r.system}<\u002Ftd><\u002Ftr>`).join(\"\")}<\u002Ftbody><\u002Ftable><\u002Fdiv><\u002Fdiv>\n  <div class=\"notice\" style=\"margin-top:16px\">Os quantitativos são esquemáticos e devem ser complementados com tubulações, conexões, impermeabilização, estrutura e acessórios do projeto.<\u002Fdiv>`;\n}\nfunction syncBudget(){\n  const p=getProject(),existing=new Map(p.budget.map(x=>[x.code,x]));\n  p.budget=autoQuantities().map(r=>existing.get(r.code)||{id:uid(),...r,material:0,labor:0,equipment:0});\n  saveState(false);go(\"budget\");toast(\"Quantitativos enviados ao orçamento\");\n}\n\nfunction renderBudget(){\n  const p=getProject(),bdi=num(appState.settings.bdiPct),subtotal=p.budget.reduce((a,x)=>a+num(x.qty)*(num(x.material)+num(x.labor)+num(x.equipment)),0),total=subtotal*(1+bdi/100);\n  const sec=document.getElementById(\"budget\");\n  sec.innerHTML=pageHead(\"Orçamento preliminar\",\"Custos editáveis por material, mão de obra e equipamento.\",\n    `<button class=\"btn\" onclick=\"syncBudget()\">Sincronizar quantitativos<\u002Fbutton><button class=\"btn\" onclick=\"downloadCSV('budget')\">Exportar CSV<\u002Fbutton><button class=\"btn primary\" onclick=\"openBudgetModal()\">+ Item<\u002Fbutton>`)\n  +`<div class=\"grid cols-4\">${kpi(\"Custo direto\",money(subtotal),\"Itens cadastrados\")}${kpi(\"BDI\",fmt(bdi,1)+\"%\",\"Configuração global\")}${kpi(\"Preço total\",money(total),\"Com BDI\")}${kpi(\"Custo por m³\",money(total/Math.max(.001,calcProject().usefulTotalM3)),\"Volume útil\")}<\u002Fdiv>\n  <div class=\"card\" style=\"margin-top:16px\"><div class=\"table-wrap\"><table><thead><tr><
