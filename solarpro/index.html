document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

x;top:12px}.solution-card h4{padding-right:90px}.solution-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin:12px 0}.solution-item{background:#f6f9f7;border-radius:9px;padding:8px}.solution-item b{display:block;font-size:13px}.solution-item span{font-size:10px;color:var(--muted)}\n    .progress{height:9px;border-radius:99px;background:#e6ede9;overflow:hidden}.progress > span{display:block;height:100%;background:linear-gradient(90deg,var(--primary),#42b77e);border-radius:99px}\n    .alerts{display:grid;gap:8px}.alert-row{display:grid;grid-template-columns:auto 1fr;gap:10px;padding:11px;border:1px solid var(--border);border-radius:10px;background:#fff}.alert-dot{width:9px;height:9px;border-radius:50%;margin-top:4px;background:var(--info)}.alert-row.warning .alert-dot{background:var(--warning)}.alert-row.critical .alert-dot{background:var(--danger)}.alert-row.ok .alert-dot{background:var(--primary)}.alert-title{font-size:12px;font-weight:800}.alert-text{font-size:11px;color:var(--muted);margin-top:2px;line-height:1.45}\n    canvas{width:100%;height:300px;border-radius:12px;background:#fff}.chart-legend{display:flex;gap:14px;flex-wrap:wrap;font-size:11px;color:var(--muted);margin-top:8px}.legend-dot{display:inline-block;width:9px;height:9px;border-radius:50%;background:currentColor;margin-right:5px}\n    .report{font-size:13px;line-height:1.6}.report h1{font-size:24px}.report h2{font-size:18px;margin-top:28px;border-bottom:1px solid var(--border);padding-bottom:7px}.report h3{font-size:15px;margin-top:20px}.report .formula{background:#f5f8f6;border:1px solid var(--border);border-left:4px solid var(--primary);padding:12px;border-radius:9px;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;overflow:auto}.report table{min-width:0}.report .cover{padding:40px 10px 28px;text-align:center;border-bottom:2px solid var(--primary)}\n    .diagram{overflow:auto;background:#fbfdfc;border:1px solid var(--border);border-radius:13px;padding:12px}.diagram svg{min-  2px}.mobile-nav .nav-btn.active{background:#fff}main{padding:14px 12px 82px}.grid.two,.grid.three,.grid.four{grid-template-columns:1fr}.field,.field.span-2,.field.span-3,.field.span-4,.field.span-6,.field.span-8{grid-column:span 12}.page-head{display:block}.page-head .toolbar{margin-top:12px}.project-select{min-width:160px}.brand h1{font-size:14px}.brand-mark{width:38px;height:38px}}\n    @media print{.topbar,.sidebar,.mobile-nav,.no-print{display:none!important}.layout{display:block;padding:0}main{padding:0}.page{display:none!important}.page.print-target{display:block!important}.card{box-shadow:none;border:0;padding:0}.report{font-size:10.5pt}.report h2{break-after:avoid}.report table{font-size:9pt}.report tr{break-inside:avoid}@page{size:A4;margin:14mm}}\n  <\u002Fstyle>\n\n<\u002Fhead>\n<body>\n\n<!-- ============ TELA DE ABERTURA (SPLASH) ============ -->\n<style>\n  #solarSplash{position:fixed;inset:0;z-index:9999;overflow:hidden;display:flex;align-items:center;justify-content:center;background:#07182b;font-family:Inter,ui-sans-serif,system-ui,-apple-system,\"Segoe UI\",sans-serif;transition:opacity .85s ease,visibility .85s ease}\n  #solarSplash.done{opacity:0;visibility:hidden;pointer-events:none}\n  .ss-sky{position:absolute;inset:0;background:linear-gradient(180deg,#07182b 0%,#12365a 30%,#2f6f8c 52%,#e9814a 78%,#f8bd52 100%);animation:ssSky 3.2s ease forwards}\n  @keyframes ssSky{0%{filter:brightness(.45) saturate(.75)}100%{filter:brightness(1) saturate(1.1)}}\n  .ss-rays{position:absolute;left:50%;top:50%;width:1100px;height:1100px;transform:translate(-50%,-50%);border-radius:50%;background:repeating-conic-gradient(from 0deg,rgba(255,231,150,.30) 0deg 2.6deg,transparent 2.6deg 12deg);-webkit-mask:radial-gradient(circle,#000 6%,rgba(0,0,0,.55) 20%,transparent 58%);mask:radial-gradient(circle,#000 6%,rgba(0,0,0,.55) 20%,transparent 58%);opacity:0;animation:ssRayIn 1.6s ease 1s forwards,ssSpin 70s linear infinite}\n  @keyframes ssRayIn{to{opacity:.85}}\n  @keyframes ssSpin{to{transform:translate(-50%,-50%) rotate(360deg)}}\n  .ss-sun{position:absolute;left:50%;top:50%;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle at 50% 42%,#fff7db,#ffd23f 44%,#ff922e 76%,#ff6a1a);box-shadow:0 0 90px 34px rgba(255,180,70,.55),0 0 200px 70px rgba(255,138,40,.32);transform:translate(-50%,130vh);animation:ssRise 2.4s cubic-bezier(.22,.85,.28,1) .2s forwards}\n  @keyframes ssRise{to{transform:translate(-50%,-64%)}}\n  .ss-ground{position:absolute;left:0;right:0;bottom:0;height:38%;background:linear-gradient(180deg,rgba(9,40,34,0),#0a2b22 62%)}\n  .ss-panels{position:absolute;left:50%;bottom:5%;transform:translateX(-50%) perspective(760px) rotateX(54deg);display:flex;gap:16px;opacity:0;animation:ssPanels 1s ease 1.5s forwards}\n  .ss-panel{width:118px;height:80px;border-radius:6px;background:linear-gradient(135deg,#0f3d6b,#237bbf);border:2px solid #0b2f52;position:relative;overflow:hidden;box-shadow:0 24px 46px rgba(0,0,0,.45)}\n  .ss-panel::before{content:\"\";position:absolute;inset:6px;background-image:linear-gradient(rgba(255,255,255,.16) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.16) 1px,transparent 1px);background-size:26px 24px}\n  .ss-panel::after{content:\"\";position:absolute;inset:-20% -60%;background:linear-gradient(115deg,transparent 38%,rgba(255,255,255,.6) 50%,transparent 62%);transform:translateX(-120%);animation:ssGlint 3.4s ease 2s infinite}\n  @keyframes ssGlint{0%,55%{transform:translateX(-120%)}80%,100%{transform:translateX(120%)}}\n  @keyframes ssPanels{to{opacity:.95}}\n  .ss-brand{position:relative;z-index:3;text-align:center;color:#fff;transform:translateY(22px);opacity:0;animation:ssBrand 1s ease 1.7s forwards}\n  @keyframes ssBrand{to{transform:none;opacity:1}}\n  .ss-mark{width:100px;height:100px;border-radius:28px;margin:0 auto 20px;display:grid;place-items:center;background:linear-gradient(135deg,#0f7a4d,#23a66c);box-shadow:0 20px 54px rgba(15,122,77,.5),0 0 0 6px rgba(255,255,255,.12);animation:ssPulse 2.8s ease 2.2s infinite}\n  .ss-mark svg{width:54px;height:54px;color:#fff}\n  @keyframes ssPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}\n  .ss-title{font-size:clamp(40px,8vw,60px);font-weight:800;letter-spacing:-.025em;margin:0;text-shadow:0 6px 32px rgba(0,0,0,.4)}\n  .ss-title b{color:#ffd23f}\n  .ss-sub{margin:12px 0 0;font-size:clamp(15px,3.4vw,20px);font-weight:600;color:#eafff4;opacity:.94;letter-spacing:.01em}\n  .ss-progress{position:absolute;left:50%;bottom:44px;transform:translateX(-50%);width:min(340px,72vw);z-index:3;text-align:center}\n  .ss-bar{height:6px;border-radius:99px;background:rgba(255,255,255,.22);overflow:hidden}\n  .ss-bar>i{display:block;height:100%;width:0;border-radius:99px;background:linear-gradient(90deg,#ffd23f,#23a66c);animation:ssFill 5s linear forwards}\n  @keyframes ssFill{to{width:100%}}\n  .ss-loading{margin-top:11px;font-size:11px;color:rgba(255,255,255,.82);letter-spacing:.18em;text-transform:uppercase}\n  .ss-particle{position:absolute;bottom:-12px;border-radius:50%;background:#ffe08a;box-shadow:0 0 9px 2px rgba(255,210,80,.7);opacity:0;animation:ssFloat linear infinite}\n  @keyframes ssFloat{0%{transform:translateY(0) scale(.5);opacity:0}12%{opacity:1}100%{transform:translateY(-92vh) scale(1);opacity:0}}\n  .ss-disclaimer{position:absolute;inset:0;display:none;align-items:center;justify-content:center;padding:22px;background:radial-gradient(circle at 50% 28%,rgba(18,53,40,.42),rgba(4,16,13,.85));backdrop-filter:blur(7px);z-index:6}\n  #solarSplash.ask .ss-disclaimer{display:flex;animation:ssFade .5s ease}\n  #solarSplash.ask .ss-progress{opacity:0;transition:opacity .4s}\n  @keyframes ssFade{from{opacity:0}to{opacity:1}}\n  .ss-card{width:min(580px,100%);max-height:88vh;overflow:auto;background:#fff;color:var(--text);border-radius:22px;padding:30px;box-shadow:0 40px 110px rgba(0,0,0,.55);animation:ssCardIn .55s cubic-bezier(.2,.85,.3,1)}\n  @keyframes ssCardIn{from{opacity:0;transform:translateY(26px) scale(.97)}to{opacity:1;transform:none}}\n  .ss-card .ss-cardmark{width:52px;height:52px;border-radius:15px;display:grid;place-items:center;background:linear-gradient(135deg,#0f7a4d,#23a66c);color:#fff;margin-bottom:16px}\n  .ss-card .ss-cardmark svg{width:28px;height:28px}\n  .ss-card h2{margin:0 0 6px;font-size:22px;color:#123528}\n  .ss-card .ss-tag{display:inline-block;font-size:10px;font-weight:750;letter-spacing:.08em;background:#fff4cf;color:#765500;padding:4px 9px;border-radius:99px;margin-bottom:14px}\n  .ss-legal{font-size:12.5px;line-height:1.62;color:#405148;background:#f6f9f7;border:1px solid #dce5e0;border-radius:12px;padding:15px 16px;max-height:230px;overflow:auto}\n  .ss-legal p{margin:0 0 9px}.ss-legal p:last-child{margin:0}.ss-legal b{color:#17211d}\n  .ss-agree{display:flex;align-items:flex-start;gap:11px;margin:18px 0 20px;font-size:13px;color:#17211d;cursor:pointer;user-select:none}\n  .ss-agree input{width:20px;height:20px;margin:1px 0 0;accent-color:#0f7a4d;flex:none;cursor:pointer}\n  .ss-enter{width:100%;border:0;border-radius:12px;padding:14px;font-size:15px;font-weight:750;color:#fff;background:linear-gradient(135deg,#0f7a4d,#0b5d3c);box-shadow:0 14px 30px rgba(15,122,77,.32);transition:.2s;cursor:pointer}\n  .ss-enter:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 18px 38px rgba(15,122,77,.4)}\n  .ss-enter:disabled{background:#c3d3cb;box-shadow:none;cursor:not-allowed}\n  .ss-fine{margin:13px 0 0;text-align:center;font-size:10.5px;color:#8896b0}\n<\u002Fstyle>\n<div id=\"solarSplash\" role=\"dialog\" aria-label=\"Tela de abertura SolarPro\">\n  <div class=\"ss-sky\"><\u002Fdiv>\n  <div class=\"ss-rays\"><\u002Fdiv>\n  <div class=\"ss-sun\"><\u002Fdiv>\n  <div class=\"ss-ground\"><\u002Fdiv>\n  <div class=\"ss-particles\" id=\"ssParticles\"><\u002Fdiv>\n  <div class=\"ss-panels\" aria-hidden=\"true\">\n    <div class=\"ss-panel\"><\u002Fdiv><div class=\"ss-panel\"><\u002Fdiv><div class=\"ss-panel\"><\u002Fdiv>\n    <div class=\"ss-panel\"><\u002Fdiv><div class=\"ss-panel\"><\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"ss-brand\">\n    <div class=\"ss-mark\" aria-hidden=\"true\">\n      <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\"><circle cx=\"12\" cy=\"12\" r=\"4\"><\u002Fcircle><path d=\"M12 2v2M12 20v2M4.93 4.93l1.42 1.42M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.42-1.42M17.66 6.34l1.41-1.41\"><\u002Fpath><path d=\"M3 21h18l-2.6-6H5.6L3 21Z\"><\u002Fpath><\u002Fsvg>\n    <\u002Fdiv>\n    <h1 class=\"ss-title\">Solar<b>Pro<\u002Fb><\u002Fh1>\n    <p class=\"ss-sub\">Geração de Energia Fotovoltaica<\u002Fp>\n  <\u002Fdiv>\n  <div class=\"ss-progress\">\n    <div class=\"ss-bar\"><i><\u002Fi><\u002Fdiv>\n    <div class=\"ss-loading\">Iniciando o sistema<\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"ss-disclaimer\">\n    <div class=\"ss-card\">\n      <div class=\"ss-cardmark\" aria-hidden=\"true\">\n        <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\"><path d=\"M12 3l8 4v5c0 5-3.5 8-8 9-4.5-1-8-4-8-9V7l8-4Z\"><\u002Fpath><path d=\"M9 12l2 2 4-4\"><\u002Fpath><\u002Fsvg>\n      <\u002Fdiv>\n      <span class=\"ss-tag\">AVISO LEGAL<\u002Fspan>\n      <h2>Termo de uso e responsabilidade<\u002Fh2>\n      <div class=\"ss-legal\">\n        <p>O <b>SolarPro<\u002Fb> é uma ferramenta de <b>pré-dimensionamento técnico, físico e econômico<\u002Fb> de sistemas fotovoltaicos. Os resultados apresentados são <b>estimativas preliminares<\u002Fb> geradas a partir dos dados informados pelo usuário e de um <b>catálogo demonstrativo<\u002Fb>, não constituindo projeto executivo, memorial de cálculo definitivo, laudo técnico ou proposta comercial.<\u002Fp>\n        <p>Os valores de geração, economia, retorno de investimento e demais indicadores dependem de fatores externos — irradiação real, condições da instalação, tarifas vigentes, regras de compensação e legislação aplicável — e <b>podem divergir do desempenho efetivo<\u002Fb>. Nenhum resultado é garantido.<\u002Fp>\n        <p>Todo dimensionamento deve ser <b>revisado, validado e assinado por profissional legalmente habilitado<\u002Fb> (com a devida ART/RRT) antes de qualquer contratação, aquisição de equipamentos ou execução de obra, observando as normas técnicas vigentes (ABNT, PRODIST/ANEEL e requisitos da concessionária local).<\u002Fp>\n        <p>Ao prosseguir, o usuário declara estar ciente destas condições e assume integral responsabilidade pelo uso das informações, isentando os desenvolvedores de quaisquer perdas ou danos decorrentes.<\u002Fp>\n      <\u002Fdiv>\n      <label class=\"ss-agree\" for=\"ssAgree\">\n        <input type=\"checkbox\" id=\"ssAgree\">\n        <span>Li e <b>concordo<\u002Fb> com o aviso legal e o termo de uso e responsabilidade acima.<\u002Fspan>\n      <\u002Flabel>\n      <button class=\"ss-enter\" id=\"ssEnter\" disabled=\"\">Aceitar e entrar no sistema<\u002Fbutton>\n      <p class=\"ss-fine\">Uso profissional — resultados sujeitos a validação técnica.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<script>\n(function(){\n  var splash=document.getElementById('solarSplash');\n  if(!splash)return;\n  var pc=document.getElementById('ssParticles');\n  for(var i=0;i<28;i++){\n    var s=document.createElement('span');s.className='ss-particle';\n    var sz=4+Math.random()*7;\n    s.style.left=(Math.random()*100)+'%';\n    s.style.width=s.style.height=sz+'px';\n    s.style.animationDuration=(3+Math.random()*3.5)+'s';\n    s.style.animationDelay=(Math.random()*4)+'s';\n    if(Math.random()>.5)s.style.background='#ffd23f';\n    pc.appendChild(s);\n  }\n  document.documentElement.style.overflow='hidden';\n  setTimeout(function(){splash.classList.add('ask');},5000);\n  var chk=document.getElementById('ssAgree'),btn=document.getElementById('ssEnter');\n  chk.addEventListener('change',function(){btn.disabled=!chk.checked;});\n  btn.addEventListener('click',function(){\n    if(!chk.checked)return;\n    splash.classList.add('done');\n    document.documentElement.style.overflow='';\n    setTimeout(function(){if(splash&&splash.parentNode)splash.parentNode.removeChild(splash);},900);\n  });\n})();\n<\u002Fscript>\n<!-- ========== FIM DA TELA DE ABERTURA ========== -->\n\n<div class=\"app\">\n  <header class=\"topbar\">\n    <div class=\"brand\">\n      <div class=\"brand-mark\" aria-hidden=\"true\">\n        <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\"><circle cx=\"12\" cy=\"12\" r=\"4\"><\u002Fcircle><path d=\"M12 2v2M12 20v2M4.93 4.93l1.42 1.42M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.42-1.42M17.66 6.34l1.41-1.41\"><\u002Fpath><path d=\"M3 21h18l-2.6-6H5.6L3 21Z\"><\u002Fpath><\u002Fsvg>\n      <\u002Fdiv>\n      <div><h1>SolarPro - Geração de Energia Fotovoltaica<\u002Fh1><p>Pré-dimensionamento técnico, físico e econômico<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"top-actions no-print\">\n      <select id=\"projectSelector\" class=\"project-select\" title=\"Projetos salvos\"><\u002Fselect>\n      <button class=\"btn small\" id=\"newProjectBtn\">Novo<\u002Fbutton>\n      <button class=\"btn small primary\" id=\"saveProjectBtn\">Salvar<\u002Fbutton>\n      <button class=\"btn small hide-md\" id=\"importProjectBtn\">Importar<\u002Fbutton>\n      <button class=\"btn small hide-md\" id=\"exportProjectBtn\">Exportar<\u002Fbutton>\n      <button class=\"btn small\" id=\"printReportBtn\">PDF / Imprimir<\u002Fbutton>\n      <input type=\"file\" id=\"projectFileInput\" accept=\".json\" class=\"hidden\">\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <div class=\"layout\">\n    <aside class=\"sidebar no-print\" id=\"sidebarNav\"><\u002Faside>\n    <main>\n      <section class=\"page active\" id=\"page-dashboard\" data-page=\"dashboard\">\n        <div class=\"page-head\"><div><h2>Painel do projeto<\u002Fh2><p>Visão consolidada do consumo, dimensionamento, solução técnica, investimento e alertas.<\u002Fp><\u002Fdiv><div class=\"toolbar\"><span class=\"tag demo\">CATÁLOGO DEMONSTRATIVO<\u002Fspan><button class=\"btn primary\" data-go=\"dimensioning\">Recalcular solução<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n        <div class=\"grid four\" id=\"dashboardMetrics\"><\u002Fdiv>\n        <div class=\"grid two mt\">\n          <div class=\"card\"><div class=\"section-title\"><h3>Consumo x geração mensal<\u002Fh3><span class=\"tag info\">kWh<\u002Fspan><\u002Fdiv><canvas id=\"energyChart\" width=\"900\" height=\"350\"><\u002Fcanvas><div class=\"chart-legend\"><span style=\"color:#66756d\"><i class=\"legend-dot\"><\u002Fi>Consumo<\u002Fspan><span style=\"color:#0f7a4d\"><i class=\"legend-dot\"><\u002Fi>Geração<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <div class=\"card\"><div class=\"section-title\"><h3>Status e alertas<\u002Fh3><span id=\"alertCount\" class=\"tag\"><\u002Fspan><\u002Fdiv><div id=\"dashboardAlerts\" class=\"alerts\"><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"grid two mt\">\n          <div class=\"card\"><div class=\"section-title\"><h3>Solução recomendada<\u002Fh3><button class=\"btn small\" data-go=\"configuration\">Ver configuração<\u002Fbutton><\u002Fdiv><div id=\"recommendedSummary\"><\u002Fdiv><\u002Fdiv>\n          <div class=\"card\"><div class=\"section-title\"><h3>Viabilidade financeira<\u002Fh3><button class=\"btn small\" data-go=\"economics\">Detalhes<\u002Fbutton><\u002Fdiv><canvas id=\"cashChart\" width=\"900\" height=\"350\"><\u002Fcanvas><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <section class=\"page\" id=\"page-project\" data-page=\"project\">\n        <div class=\"page-head\"><div><h2>Dados do projeto<\u002Fh2><p>Identificação da unidade consumidora e parâmetros de conexão usados nos relatórios.<\u002Fp><\u002Fdiv><\u002Fdiv>\n        <div class=\"card\"><div class=\"form-grid\" id=\"projectForm\">\n          <div class=\"field span-6\"><label class=\"required\">Nome do projeto<\u002Flabel><input data-path=\"meta.projectName\" placeholder=\"Ex.: Residência Silva\"><\u002Fdiv>\n          <div class=\"field span-6\"><label>Cliente<\u002Flabel><input data-path=\"meta.clientName\"><\u002Fdiv>\n          <div class=\"field span-8\"><label>Endereço<\u002Flabel><input data-path=\"meta.address\"><\u002Fdiv>\n          <div class=\"field span-2\"><label>Município<\u002Flabel><input data-path=\"meta.city\"><\u002Fdiv>\n          <div class=\"field span-2\"><label>UF<\u002Flabel><input data-path=\"meta.stateCode\" maxlength=\"2\"><\u002Fdiv>\n          <div class=\"field span-4\"><label>Concessionária<\u002Flabel><input data-path=\"project.utility\"><\u002Fdiv>\n          <div class=\"field span-4\"><label>Classe tarifária<\u002Flabel><select data-path=\"project.tariffClass\"><option>Residencial<\u002Foption><option>Comercial<\u002Foption><option>Industrial<\u002Foption><option>Rural<\u002Foption><option>Poder público<\u002Foption><option>Outro<\u002Foption><\u002Fselect><\u002Fdiv>\n          <div class=\"field span-4\"><label>Tipo de unidade<\u002Flabel><select data-path=\"project.consumerType\"><option>Residencial<\u002Foption><option>Comercial<\u002Foption><option>Industrial<\u002Foption><option>Rural<\u002Foption><option>Condomínio<\u002Foption><option>Outro<\u002Foption><\u002Fselect><\u002Fdiv>\n          <div class=\"field span-3\"><label>Ligação<\u002Flabel><select data-path=\"project.connection\"><option value=\"mono\">Monofásica<\u002Foption><option value=\"bi\">Bifásica<\u002Foption><option value=\"tri\">Trifásica<\u002Foption><\u002Fselect><\u002Fdiv>\n          <div class=\"field span-3\"><label>Tensão de atendimento<\u002Flabel><select data-path=\"project.voltage\"><option value=\"127\">127 V<\u002Foption><option value=\"220\">220 V<\u002Foption><option value=\"380\">380 V<\u002Foption><option value=\"440\">440 V<\u002Foption><\u002Fselect><\u002Fdiv>\n          <div class=\"field span-3\"><label>Número de fases<\u002Flabel><select data-path=\"project.phases\"><option value=\"1\">1 fase<\u002Foption><option value=\"2\">2 fases<\u002Foption><option value=\"3\">3 fases<\u002Foption><\u002Fselect><\u002Fdiv>\n          <div class=\"field span-3\"><label>Grupo tarifário<\u002Flabel><select data-path=\"project.tariffGroup\"><option value=\"B\">Grupo B<\u002Foption><option value=\"A\">Grupo A<\u002Foption><\u002Fselect><\u002Fdiv>\n          <div class=\"field span-4\"><label>Responsável pelo estudo<\u002Flabel><input data-path=\"meta.responsible\"><\u002Fdiv>\n          <div class=\"field span-4\"><label>Data do estudo<\u002Flabel><input type=\"date\" data-path=\"meta.studyDate\"><\u002Fdiv>\n          <div class=\"field span-4\"><label>Revisão<\u002Flabel><input data-path=\"meta.revision\"><\u002Fdiv>\n          <div class=\"field span-12\"><label>Observações<\u002Flabel><textarea data-path=\"meta.notes\"><\u002Ftextarea><\u002Fdiv>\n        <\u002Fdiv><\u002Fdiv>\n      <\u002Fsection>\n\n      <section class=\"page\" id=\"page-consumption\" data-page=\"consumption\">\n        <div class=\"page-head\"><div><h2>Consumo de energia<\u002Fh2><p>Informe o histórico mensal ou use o modo simplificado. Cargas futuras entram automaticamente no consumo de projeto.<\u002Fp><\u002Fdiv><div class=\"toolbar\"><button class=\"btn\" id=\"fillDemoConsumption\">Preencher exemplo<\u002Fbutton><button class=\"btn\" id=\"clearConsumption\">Limpar histórico<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n        <div class=\"grid two\">\n          <div class=\"card\"><h3>Parâmetros gerais<\u002Fh3><div class=\"form-grid\">\n            <div class=\"field span-6\"><label>Modo de entrada<\u002Flabel><select data-path=\"consumption.mode\"><option value=\"history\">Histórico mensal<\u002Foption><option value=\"simple\">Média simplificada<\u002Foption><\u002Fselect><\u002Fdiv>\n            <div class=\"field span-6\"><label>Tarifa efetiva atual<\u002Flabel><div class=\"suffix-wrap\"><input type=\"number\" step=\"0.01\" min=\"0\" data-path=\"consumption.tariff\"><span class=\"suffix\">R$/kWh<\u002Fspan><\u002Fdiv><\u002Fdiv>\n            <div class=\"field span-6\"><label>Consumo médio simplificado<\u002Flabel><div class=\"suffix-wrap\"><input type=\"number\" step=\"1\" min=\"0\" data-path=\"consumption.simpleAverage\"><span class=\"suffix\">kWh/mês<\u002Fspan><\u002Fdiv><\u002Fdiv>\n            <div class=\"field span-6\"><label>Fatura média<\u002Flabel><div class=\"suffix-wrap\"><input type=\"number\" step=\"0.01\" min=\"0\" data-path=\"consumption.averageBill\"><span class=\"suffix\">R$/mês<\u002Fspan><\u002Fdiv><\u002Fdiv>\n            <div class=\"field span-6\"><label>Parcela fixa não compensável<\u002Flabel><div class=\"suffix-wrap\"><input type=\"number\" step=\"0.01\" min=\"0\" data-path=\"consumption.nonCompensableMonthly\"><span class=\"suffix\">R$/mês<\u002Fspan><\u002Fdiv><\u002Fdiv>\n            <div class=\"field span-6\"><label>Custo de disponibilidade<\u002Flabel><div class=\"suffix-wrap\"><input type=\"number\" step=\"1\" min=\"0\" data-path=\"consumption.minimumGridKwh\"><span class=\"suffix\">kWh/mês<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv><\u002Fdiv>\n          <div class=\"card\"><h3>Resumo calculado<\u002Fh3><div class=\"grid two\" id=\"consumptionSummary\"><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"card mt\"><div class=\"section-title\"><h3>Histórico de 12 meses<\u002Fh3><span class=\"help\">O consumo informado como zero não entra na média histórica.<\u002Fspan><\u002Fdiv><div class=\"table-wrap\"><table><thead><tr><th>Mês<\u002Fth><th class=\"num\">Consumo (kWh)<\u002Fth><th class=\"num\">Fatura (R$)<\u002Fth><th class=\"num\">Tarifa média<\u002Fth><th class=\"num\">Energia injetada<\u002Fth><th class=\"num\">Créditos<\u002Fth><\u002Ftr><\u002Fthead><tbody id=\"consumptionTable\"><\u002Ftbody><\u002Ftable><\u002Fdiv><\u002Fdiv>\n        <div class=\"card mt\"><div class=\"section-title\"><h3>Cargas futuras<\u002Fh3><button class=\"btn small primary\" id=\"addFutureLoadBtn\">Adicionar carga<\u002Fbutton><\u002Fdiv><div class=\"table-wrap\"><table><thead><tr><th>Descrição<\u002Fth><th class=\"num\">Potência (W)<\u002Fth><th class=\"num\">Qtd.<\u002Fth><th class=\"num\">h/dia<\u002Fth><th class=\"num\">dias/mês<\u002Fth><th class=\"num\">Utilização<\u002Fth><th class=\"num\">kWh/mês<\u002Fth><th><\u002Fth><\u002Ftr><\u002Fthead><tbody id=\"futureLoadsTable\"><\u002Ftbody><\u002Ftable><\u002Fdiv><\u002Fdiv>\n      <\u002Fsection>\n\n      <section class=\"page\" id=\"page-solar\" data-page=\"solar\">\n        <div class=\"page-head\"><div><h2>Localização e recurso solar<\u002Fh2><p>Configure irradiação, temperaturas, orientação e perdas. Os valores padrão são editáveis e devem ser confirmados para cada local.<\u002Fp><\u002Fdiv><\u002Fdiv>\n        <div class=\"grid two\">\n          <div class=\"card\"><h3>Recurso solar e condições<\u002Fh3><div class=\"form-grid\">\n            <div class=\"field span-6\"><label>Irradiação média diária<\u002Flabel><div class=\"suffix-wrap\"><input type=\"number\" min=\"1\" max=\"8\" step=\"0.01\" data-path=\"solar.irradiance\"><span class=\"suffix\">kWh/m²/dia<\u002Fspan><\u002Fdiv><\u002Fdiv>\n            <div class=\"field span-6\"><label>Fonte da irradiação<\u002Flabel><input data-path=\"solar.irradianceSource\"><\u002Fdiv>\n            <div class=\"field span-4\"><label>Temperatura mínima<\u002Flabel><div class=\"suffix-wrap\"><input type=\"number\" step=\"1\" data-path=\"solar.minTemp\"><span class=\"suffix\">°C<\u002Fspan><\u002Fdiv><\u002Fdiv>\n            <div class=\"field span-4\"><label>Temperatura máxima de célula<\u002Flabel><div class=\"suffix-wrap\"><input type=\"number\" step=\"1\" data-path=\"solar.maxCellTemp\"><span class=\"suffix\">°C<\u002Fspan><\u002Fdiv><\u002Fdiv>\n            <div class=\"field span-4\"><label>Altitude<\u002Flabel><div class=\"suffix-wrap\"><input type=\"number\" min=\"0\" step=\"1\" data-path=\"solar.altitude\"><span class=\"suffix\">m<\u002Fspan><\u002Fdiv><\u002Fdiv>\n            <div class=\"field span-4\"><label>Orientação<\u002Flabel><select data-path=\"solar.orientation\"><option>Norte<\u002Foption><option>Nordeste<\u002Foption><option>Noroeste<\u002Foption><option>Leste<\u002Foption><option>Oeste<\u002Foption><option>Sul<\u002Foption><option>Múltiplas<\u002Foption><\u002Fselect><\u002Fdiv>\n            <div class=\"field span-4\"><label>Inclinação<\u002Flabel><div class=\"suffix-wrap\"><input type=\"number\" min=\"0\" max=\"90\" step=\"1\" data-path=\"solar.tilt\"><span class=\"suffix\">graus<\u002Fspan><\u002Fdiv><\u002Fdiv>\n            <div class=\"field span-4\"><label>Desvio azimutal<\u002Flabel><div class=\"suffix-wrap\"><input type=\"number\" min=\"-180\" max=\"180\" step=\"1\" data-path=\"solar.azimuth\"><span class=\"suffix\">graus<\u002Fspan><\u002Fdiv><\u002Fdiv>\n            <div class=\"field span-6\"><label>Compensação desejada<\u002Flabel><div class=\"suffix-wrap\"><input type=\"number\" min=\"10\" max=\"120\" step=\"1\" data-path=\"solar.compensationPct\"><span class=\"suffix\">%<\u002Fspan><\u002Fdiv><\u002Fdiv>\n            <div class=\"field span-6\"><label>Autoconsumo instantâneo<\u002Flabel><div class=\"suffix-wrap\"><input type=\"number\" min=\"0\" max=\"100\" step=\"1\" data-path=\"solar.selfConsumptionPct\"><span class=\"suffix\">%<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv><\u002Fdiv>\n          <div class=\"card\"><h3>Perdas do sistema<\u002Fh3><div class=\"form-grid\" id=\"lossesForm\"><\u002Fdiv><div class=\"notice mt\">As perdas são combinadas de forma multiplicativa, evitando a simples soma de percentuais. O resultado gera o fator de desempenho (PR) usado na produção.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"card mt\"><div class=\"section-title\"><h3>Irradiação mensal<\u002Fh3><button class=\"btn small\" id=\"normalizeIrradianceBtn\">Distribuir a média<\u002Fbutton><\u002Fdiv><div class=\"table-wrap\"><table><thead><tr><th>Mês<\u002Fth><th class=\"num\">Irradiação (kWh/m²/dia)<\u002Fth><th class=\"num\">Dias<\u002Fth><th class=\"num\">Produtividade relativa<\u002Fth><\u002Ftr><\u002Fthead><tbody id=\"irradianceTable\"><\u002Ftbody><\u002Ftable><\u002Fdiv><\u002Fdiv>\n      <\u002Fsection>\n\n      <section class=\"page\" id=\"page-area\" data-page=\"area\">\n        <div class=\"page-head\"><div><h2>Área de instalação<\u002Fh2><p>Cadastre um ou mais planos de cobertura. A ocupação considera área útil, obstáculos e fator de espaçamento.<\u002Fp><\u002Fdiv><div class=\"toolbar\"><button class=\"btn primary\" id=\"addPlaneBtn\">Adicionar plano<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n        <div class=\"grid auto\" id=\"areaSummary\"><\u002Fdiv>\n        <div class=\"card mt\"><div class=\"table-wrap\"><table><thead><tr><th>Plano<\u002Fth><th>Tipo<\u002Fth><th class=\"num\">Comprimento<\u002Fth><th class=\"num\">Largura<\u002Fth><th class=\"num\">Obstáculos<\u002Fth><th class=\"num\">Área útil<\u002Fth><th>Orientação<\u002Fth><th class=\"num\">Inclinação<\u002Fth><th class=\"num\">Carga limite<\u002Fth><th><\u002Fth><\u002Ftr><\u002Fthead><tbody id=\"planesTable\"><\u002Ftbody><\u002Ftable><\u002Fdiv><\u002Fdiv>\n        <div class=\"card mt\"><h3>Croqui esquemático preliminar<\u002Fh3><div id=\"roofSketch\" class=\"diagram\"><\u002Fdiv><p class=\"help\">Representação apenas indicativa. Não substitui levantamento dimensional, projeto de layout, estudo de sombreamento ou avaliação estrutural.<\u002Fp><\u002Fdiv>\n      <\u002Fsection>\n\n      <section class=\"page\" id=\"page-catalogs\" data-page=\"catalogs\">\n        <div class=\"page-head\"><div><h2>Catálogos de equipamentos<\u002Fh2><p>Cadastre ou importe equipamentos de fabricantes. Os itens incluídos inicialmente são apenas demonstrativos e não representam fichas técnicas oficiais.<\u002Fp><\u002Fdiv><div class=\"toolbar\"><button class=\"btn\" id=\"importCatalogBtn\">Importar JSON<\u002Fbutton><button class=\"btn\" id=\"exportCatalogBtn\">Exportar JSON<\u002Fbutton><input type=\"file\" id=\"catalogFileInput\" accept=\".json\" class=\"hidden\"><\u002Fdiv><\u002Fdiv>\n        <div class=\"notice warning mb\"><strong>Rastreabilidade:<\u002Fstrong> antes de usar em projeto real, substitua os itens demonstrativos por dados extraídos de catálogos oficiais, informe a URL ou referência do documento e a data de consulta.<\u002Fdiv>\n        <div class=\"card\">\n          <div class=\"tabs\"><button class=\"tab-btn active\" data-catalog-tab=\"modules\">Módulos<\u002Fbutton><button class=\"tab-btn\" data-catalog-tab=\"inverters\">Inversores string<\u002Fbutton><button class=\"tab-btn\" data-catalog-tab=\"micros\">Microinversores<\u002Fbutton><\u002Fdiv>\n          <div class=\"catalog-panel active\" id=\"catalog-modules\"><div class=\"toolbar mb\"><button class=\"btn small primary\" data-open-equipment=\"module\">Adicionar módulo<\u002Fbutton><span class=\"spacer\"><\u002Fspan><input id=\"moduleSearch\" placeholder=\"Filtrar fabricante ou modelo\" style=\"max-width:280px\"><\u002Fdiv><div id=\"modulesCatalogTable\"><\u002Fdiv><\u002Fdiv>\n          <div class=\"catalog-panel\" id=\"catalog-inverters\"><div class=\"toolbar mb\"><button class=\"btn small primary\" data-open-equipment=\"inverter\">Adicionar inversor<\u002Fbutton><span class=\"spacer\"><\u002Fspan><input id=\"inverterSearch\" placeholder=\"Filtrar fabricante ou modelo\" style=\"max-width:280px\"><\u002Fdiv><div id=\"invertersCatalogTable\"><\u002Fdiv><\u002Fdiv>\n          <div class=\"catalog-panel\" id=\"catalog-micros\"><div class=\"toolbar mb\"><button class=\"btn small primary\" data-open-equipment=\"micro\">Adicionar microinversor<\u002Fbutton><span class=\"spacer\"><\u002Fspan><input id=\"microSearch\" placeholder=\"Filtrar fabricante ou modelo\" style=\"max-width:280px\"><\u002Fdiv><div id=\"microsCatalogTable\"><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <section class=\"page\" id=\"page-dimensioning\" data-page=\"dimensioning\">\n        <div class=\"page-head\"><div><h2>Dimensionamento e seleção automática<\u002Fh2><p>Compare módulos e arquiteturas. O motor verifica área, potência, tensão, corrente, faixa MPPT e relação CC/CA.<\u002Fp><\u002Fdiv><div class=\"toolbar\"><button class=\"btn primary\" id=\"runDimensioningBtn\">Gerar recomendações<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n        <div class=\"grid four\" id=\"dimensionMetrics\"><\u002Fdiv>\n        <div class=\"card mt\"><div class=\"section-title\"><h3>Módulos recomendados<\u002Fh3><span class=\"help\">Econômico, equilibrado e maior eficiência.<\u002Fspan><\u002Fdiv><div class=\"grid three\" id=\"moduleRecommendations\"><\u002Fdiv><\u002Fdiv>\n        <div class=\"grid two mt\">\n          <div class=\"card\"><div class=\"section-title\"><h3>Alternativas com inversor string<\u002Fh3><span class=\"tag info\">Compatibilidade elétrica<\u002Fspan><\u002Fdiv><div id=\"stringRecommendations\"><\u002Fdiv><\u002Fdiv>\n          <div class=\"card\"><div class=\"section-title\"><h3>Alternativas com microinversor<\u002Fh3><span class=\"tag info\">Compatibilidade por entrada<\u002Fspan><\u002Fdiv><div id=\"microRecommendations\"><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <section class=\"page\" id=\"page-configuration\" data-page=\"configuration\">\n        <div class=\"page-head\"><div><h2>Configuração elétrica preliminar<\u002Fh2><p>Arranjo sugerido, verificações de compatibilidade e diagrama unifilar simplificado.<\u002Fp><\u002Fdiv><div class=\"toolbar\"><button class=\"btn\" id=\"toggleArchitectureBtn\">Alternar arquitetura<\u002Fbutton><button class=\"btn primary\" id=\"autoConfigureBtn\">Configurar automaticamente<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n        <div class=\"grid four\" id=\"configurationMetrics\"><\u002Fdiv>\n        <div class=\"grid two mt\">\n          <div class=\"card\"><h3>Arranjo proposto<\u002Fh3><div id=\"configurationText\"><\u002Fdiv><\u002Fdiv>\n          <div class=\"card\"><h3>Verificações técnicas<\u002Fh3><div id=\"compatibilityChecks\" class=\"alerts\"><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"card mt\"><div class=\"section-title\"><h3>Diagrama unifilar simplificado<\u002Fh3><span class=\"tag warn\">PRELIMINAR<\u002Fspan><\u002Fdiv><div id=\"singleLineDiagram\" class=\"diagram\"><\u002Fdiv><\u002Fdiv>\n      <\u002Fsection>\n\n      <section class=\"page\" id=\"page-generation\" data-page=\"generation\">\n        <div class=\"page-head\"><div><h2>Geração de energia<\u002Fh2><p>Produção mensal, produtividade, autoconsumo, injeção e degradação estimada.<\u002Fp><\u002Fdiv><\u002Fdiv>\n        <div class=\"grid four\" id=\"generationMetrics\"><\u002Fdiv>\n        <div class=\"card mt\"><canvas id=\"generationChart\" width=\"1100\" height=\"390\"><\u002Fcanvas><div class=\"chart-legend\"><span style=\"color:#66756d\"><i class=\"legend-dot\"><\u002Fi>Consumo<\u002Fspan><span style=\"color:#0f7a4d\"><i class=\"legend-dot\"><\u002Fi>Geração<\u002Fspan><span style=\"color:#175cd3\"><i class=\"legend-dot\"><\u002Fi>Autoconsumo<\u002Fspan><span style=\"color:#a15c00\"><i class=\"legend-dot\"><\u002Fi>Injeção<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <div class=\"card mt\"><div class=\"table-wrap\"><table><thead><tr><th>Mês<\u002Fth><th class=\"num\">Consumo<\u002Fth><th class=\"num\">Geração<\u002Fth><th class=\"num\">Autoconsumo<\u002Fth><th class=\"num\">Injeção<\u002Fth><th class=\"num\">Saldo energético<\u002Fth><\u002Ftr><\u002Fthead><tbody id=\"generationTable\"><\u002Ftbody><\u002Ftable><\u002Fdiv><\u002Fdiv>\n      <\u002Fsection>\n\n      <section class=\"page\" id=\"page-economics\" data-page=\"economics\">\n        <div class=\"page-head\"><div><h2>Análise econômica<\u002Fh2><p>Investimento detalhado, fluxo de caixa, payback, VPL, TIR e custo nivelado de energia.<\u002Fp><\u002Fdiv><\u002Fdiv>\n        <div class=\"grid two\">\n          <div class=\"card\"><h3>Premissas de custo<\u002Fh3><div class=\"form-grid\" id=\"costForm\"><\u002Fdiv><\u002Fdiv>\n          <div class=\"card\"><h3>Indicadores<\u002Fh3><div class=\"grid two\" id=\"economicMetrics\"><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"grid two mt\">\n          <div class=\"card\"><h3>Composição do investimento<\u002Fh3><div id=\"investmentBreakdown\"><\u002Fdiv><\u002Fdiv>\n          <div class=\"card\"><h3>Fluxo de caixa acumulado<\u002Fh3><canvas id=\"economicChart\" width=\"900\" height=\"350\"><\u002Fcanvas><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"card mt\"><div class=\"section-title\"><h3>Fluxo de caixa anual<\u002Fh3><button class=\"btn small\" id=\"exportCashflowBtn\">Exportar CSV<\u002Fbutton><\u002Fdiv><div class=\"table-wrap\"><table><thead><tr><th>Ano<\u002Fth><th class=\"num\">Geração<\u002Fth><th class=\"num\">Tarifa<\u002Fth><th class=\"num\">Economia bruta<\u002Fth><th class=\"num\">O&amp;M<\u002Fth><th class=\"num\">Reposições<\u002Fth><th class=\"num\">Fluxo líquido<\u002Fth><th class=\"num\">Acumulado<\u002Fth><th class=\"num\">Valor presente<\u002Fth><\u002Ftr><\u002Fthead><tbody id=\"cashflowTable\"><\u002Ftbody><\u002Ftable><\u002Fdiv><\u002Fdiv>\n      <\u002Fsection>\n\n      <section class=\"page\" id=\"page-scenarios\" data-page=\"scenarios\">\n        <div class=\"page-head\"><div><h2>Cenários tarifários<\u002Fh2><p>Compare reajuste de tarifa, compensação da energia exportada, inflação, consumo e taxa de desconto.<\u002Fp><\u002Fdiv><div class=\"toolbar\"><button class=\"btn primary\" id=\"addScenarioBtn\">Adicionar cenário<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n        <div class=\"card\"><div class=\"table-wrap\"><table><thead><tr><th>Cenário<\u002Fth><th class=\"num\">Reajuste tarifa<\u002Fth><th class=\"num\">Energia compensável<\u002Fth><th class=\"num\">Inflação O&amp;M<\u002Fth><th class=\"num\">Crescimento consumo<\u002Fth><th class=\"num\">Taxa desconto<\u002Fth><th class=\"num\">Payback<\u002Fth><th class=\"num\">VPL<\u002Fth><th class=\"num\">TIR<\u002Fth><th><\u002Fth><\u002Ftr><\u002Fthead><tbody id=\"scenarioTable\"><\u002Ftbody><\u002Ftable><\u002Fdiv><\u002Fdiv>\n        <div class=\"card mt\"><h3>Comparação de cenários<\u002Fh3><canvas id=\"scenarioChart\" width=\"1100\" height=\"380\"><\u002Fcanvas><\u002Fdiv>\n      <\u002Fsection>\n\n      <section class=\"page\" id=\"page-comparator\" data-page=\"comparator\">\n        <div class=\"page-head\"><div><h2>Comparador de soluções<\u002Fh2><p>Compare alternativas técnicas e econômicas produzidas pelo catálogo atual.<\u002Fp><\u002Fdiv><div class=\"toolbar\"><button class=\"btn primary\" id=\"buildComparisonBtn\">Atualizar comparação<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n        <div class=\"card\"><div id=\"comparisonTable\"><\u002Fdiv><\u002Fdiv>\n      <\u002Fsection>\n\n      <section class=\"page\" id=\"page-materials\" data-page=\"materials\">\n        <div class=\"page-head\"><div><h2>Lista preliminar de materiais<\u002Fh2><p>Quantitativos indicativos gerados a partir da configuração selecionada e das distâncias informadas.<\u002Fp><\u002Fdiv><div class=\"toolbar\"><button class=\"btn\" id=\"exportMaterialsBtn\">Exportar CSV<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n        <div class=\"grid two\">\n          <div class=\"card\"><h3>Premissas de quantitativos<\u002Fh3><div class=\"form-grid\">\n            <div class=\"field span-6\"><label>Distância média CC<\u002Flabel><div class=\"suffix-wrap\"><input type=\"number\" min=\"1\" step=\"1\" data-path=\"materials.dcDistance\"><span class=\"suffix\">m<\u002Fspan><\u002Fdiv><\u002Fdiv>\n            <div class=\"field span-6\"><label>Distância média CA<\u002Flabel><div class=\"suffix-wrap\"><input type=\"number\" min=\"1\" step=\"1\" data-path=\"materials.acDistance\"><span class=\"suffix\">m<\u002Fspan><\u002Fdiv><\u002Fdiv>\n            <div class=\"field span-6\"><label>Reserva de cabos<\u002Flabel><div class=\"suffix-wrap\"><input type=\"number\" min=\"0\" max=\"50\" step=\"1\" data-path=\"materials.cableReservePct\"><span class=\"suffix\">%<\u002Fspan><\u002Fdiv><\u002Fdiv>\n            <div class=\"field span-6\"><label>Reserva de acessórios<\u002Flabel><div class=\"suffix-wrap\"><input type=\"number\" min=\"0\" max=\"50\" step=\"1\" data-path=\"materials.accessoryReservePct\"><span class=\"suffix\">%<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv><\u002Fdiv>\n          <div class=\"card\"><div class=\"notice warning\">As bitolas, capacidades de interrupção, níveis de DPS, aterramento e dispositivos finais dependem de projeto executivo, método de instalação, corrente, queda de tensão, curto-circuito e regras da concessionária.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"card mt\"><div id=\"materialsTable\"><\u002Fdiv><\u002Fdiv>\n      <\u002Fsection>\n\n      <section class=\"page\" id=\"page-memorial\" data-page=\"memorial\">\n        <div class=\"page-head no-print\"><div><h2>Memorial de cálculo<\u002Fh2><p>Documento gerado automaticamente com premissas, fórmulas, substituições e verificações.<\u002Fp><\u002Fdiv><div class=\"toolbar\"><button class=\"btn\" data-print-section=\"memorial\">PDF / Imprimir memorial<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n        <div class=\"card report\" id=\"memorialReport\"><\u002Fdiv>\n      <\u002Fsection>\n\n      <section class=\"page\" id=\"page-specification\" data-page=\"specification\">\n        <div class=\"page-head no-print\"><div><h2>Especificação técnica básica<\u002Fh2><p>Escopo preliminar do fornecimento, instalação, testes, documentação e garantias.<\u002Fp><\u002Fdiv><div class=\"toolbar\"><button class=\"btn\" data-print-section=\"specification\">PDF / Imprimir especificação<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n        <div class=\"card report\" id=\"specificationReport\"><\u002Fdiv>\n      <\u002Fsection>\n\n      <section class=\"page\" id=\"page-reports\" data-page=\"reports\">\n        <div class=\"page-head\"><div><h2>Relatórios e exportações<\u002Fh2><p>Gere saídas técnicas e comerciais a partir do projeto atual.<\u002Fp><\u002Fdiv><\u002Fdiv>\n        <div class=\"grid three\">\n          <div class=\"card\"><h3>Relatório executivo<\u002Fh3><p class=\"help\">Resumo de consumo, solução, geração, investimento, economia e riscos.<\u002Fp><button class=\"btn primary mt\" data-print-section=\"executive\">Abrir e imprimir<\u002Fbutton><\u002Fdiv>\n          <div class=\"card\"><h3>Memorial de cálculo<\u002Fh3><p class=\"help\">Fórmulas, parâmetros elétricos, produção e análise econômica.<\u002Fp><button class=\"btn primary mt\" data-go=\"memorial\">Abrir memorial<\u002Fbutton><\u002Fdiv>\n          <div class=\"card\"><h3>Especificação técnica<\u002Fh3><p class=\"help\">Requisitos preliminares dos equipamentos e serviços.<\u002Fp><button class=\"btn primary mt\" data-go=\"specification\">Abrir especificação<\u002Fbutton><\u002Fdiv>\n          <div class=\"card\"><h3>Projeto em JSON<\u002Fh3><p class=\"help\">Backup completo para restauração ou transferência.<\u002Fp><button class=\"btn mt\" id=\"reportExportJson\">Exportar JSON<\u002Fbutton><\u002Fdiv>\n          <div class=\"card\"><h3>Resumo em Excel / CSV<\u002Fh3><p class=\"help\">Indicadores e tabelas em formatos compatíveis com planilhas.<\u002Fp><div class=\"toolbar mt\"><button class=\"btn\" id=\"exportExcelBtn\">Exportar Excel (.xls)<\u002Fbutton><button class=\"btn\" id=\"exportSummaryCsvBtn\">Exportar CSV<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n          <div class=\"card\"><h3>Catálogos em JSON<\u002Fh3><p class=\"help\">Equipamentos cadastrados com fonte e status.<\u002Fp><button class=\"btn mt\" id=\"reportExportCatalog\">Exportar catálogos<\u002Fbutton><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"card report mt\" id=\"executiveReport\"><\u002Fdiv>\n      <\u002Fsection>\n\n      <section class=\"page\" id=\"page-settings\" data-page=\"settings\">\n        <div class=\"page-head\"><div><h2>Configurações e referências<\u002Fh2><p>Parâmetros gerais, horizonte de análise, avisos e base regulatória configurável.<\u002Fp><\u002Fdiv><\u002Fdiv>\n        <div class=\"grid two\">\n          <div class=\"card\"><h3>Configurações gerais<\u002Fh3><div class=\"form-grid\">\n            <div class=\"field span-6\"><label>Horizonte de análise<\u002Flabel><div class=\"suffix-wrap\"><input type=\"number\" min=\"5\" max=\"40\" step=\"1\" data-path=\"settings.horizonYears\"><span class=\"suffix\">anos<\u002Fspan><\u002Fdiv><\u002Fdiv>\n            <div class=\"field span-6\"><label>Degradação anual<\u002Flabel><div class=\"suffix-wrap\"><input type=\"number\" min=\"0\" max=\"3\" step=\"0.05\" data-path=\"settings.degradationPct\"><span class=\"suffix\">%<\u002Fspan><\u002Fdiv><\u002Fdiv>\n            <div class=\"field span-6\"><label>Relação CC/CA desejada<\u002Flabel><input type=\"number\" min=\"0.8\" max=\"1.6\" step=\"0.01\" data-path=\"settings.targetDcAc\"><\u002Fdiv>\n            <div class=\"field span-6\"><label>Fator de área bruta<\u002Flabel><input type=\"number\" min=\"1\" max=\"2\" step=\"0.05\" data-path=\"settings.grossAreaFactor\"><\u002Fdiv>\n            <div class=\"field span-6\"><label>Ano de reposição do inversor<\u002Flabel><input type=\"number\" min=\"1\" max=\"30\" step=\"1\" data-path=\"settings.inverterReplacementYear\"><\u002Fdiv>\n            <div class=\"field span-6\"><label>Custo de reposição<\u002Flabel><div class=\"suffix-wrap\"><input type=\"number\" min=\"0\" max=\"100\" step=\"1\" data-path=\"settings.inverterReplacementPct\"><span class=\"suffix\">% do equipamento<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv><\u002Fdiv>\n          <div class=\"card\"><h3>Aviso padrão<\u002Fh3><div class=\"notice warning\">Este estudo é preliminar. Não substitui projeto executivo, inspeção presencial, avaliação estrutural, estudo detalhado de sombreamento, coordenação de proteção, homologação junto à distribuidora ou responsabilidade técnica de profissional habilitado. warning','Conversor demonstrativo','Substitua o equipamento por cadastro oficial antes de emitir um projeto real.');\n  if(c.configuration?.dcAc<.85||c.configuration?.dcAc>1.45)push('warning','Relação CC/CA atípica',`Valor calculado: ${fmt(c.configuration.dcAc,2)}. Revise a estratégia de sobredimensionamento.`);\n  if(c.cashflow?.simplePayback==null)push('critical','Retorno não atingido',`O investimento não se paga no horizonte de ${s.settings.horizonYears} anos no cenário selecionado.`);\n  else if(c.cashflow.simplePayback>12)push('warning','Payback alongado',`Retorno simples estimado em ${fmt(c.cashflow.simplePayback,1)} anos.`);\n  if(c.cashflow?.npv<0)push('warning','VPL negativo',`No cenário e taxa de desconto selecionados, o VPL é ${money(c.cashflow.npv)}.`);\n  if(!(s.references||[]).length)push('warning','Referências não cadastradas','Inclua as normas, regras da distribuidora e referências aplicáveis ao projeto.');\n  push('info','Validação profissional obrigatória','O pré-dimensionamento não substitui projeto executivo, análise estrutural, vistoria, homologação ou responsabilidade técnica.');\n  return alerts;\n}\nfunction buildMaterials(s,c){\n  const reserve=1+n(s.materials.cableReservePct)/100,acc=1+n(s.materials.accessoryReservePct)/100;\n  const config=c.configuration;\n  const strings=config?.type==='string'?sum((config.plans||[]).map(p=>p.strings||0)):0;\n  const dcCable=config?.type==='string'?Math.ceil(strings*n(s.materials.dcDistance)*2*reserve):0;\n  const acRuns=config?.type==='micro'?(config.circuits||1):(config?.units||1);\n  const acCable=Math.ceil(acRuns*n(s.materials.acDistance)*reserve);\n  const rows=[\n    {item:'Módulo fotovoltaico',spec:c.module?`${c.module.manufacturer} ${c.module.model} — ${c.module.pmax} W`:'A definir',unit:'un',qty:c.moduleCount,note:'Confirmar ficha técnica e certificações.'},\n    {item:config?.type==='micro'?'Microinversor':'Inversor string',spec:config?`${config.equipment.manufacturer} ${config.equipment.model}`:'A definir',unit:'un',qty:config?.units||0,note:'Confirmar tensão de rede, proteções e comunicação.'},\n    {item:'Estrutura de fixação',spec:'Compatível com cobertura e módulo',unit:'kit/módulo',qty:Math.ceil(c.moduleCount*acc),note:'Dimensionamento estrutural pelo fornecedor/projetista.'},\n    {item:'Cabo solar CC',spec:'Bitola e isolação a definir em projeto',unit:'m',qty:dcCable,note:'Quantidade preliminar ida e volta.'},\n    {item:'Conectores fotovoltaicos',spec:'Compatíveis e do mesmo sistema/conjunto',unit:'par',qty:config?.type==='string'?Math.ceil(strings*2*acc):0,note:'Evitar mistura de conectores incompatíveis.'},\n    {item:'Cabo CA',spec:'Bitola a definir por corrente e queda de tensão',unit:'m',qty:acCable,note:'Quantidade preliminar por circuito.'},\n    {item:'Quadro/proteção CA',spec:'Disjuntor, DPS e seccionamento a dimensionar',unit:'cj',qty:Math.max(1,acRuns),note:'Coordenação e capacidade de interrupção a verificar.'},\n    {item:'Proteção CC / string box',spec:config?.type==='string'?'Conforme arranjo e inversor':'Não aplicável / conforme fabricante',unit:'cj',qty:config?.type==='string'?Math.max(1,config.units):0,note:'Confirmar proteções incorporadas no inversor.'},\n    {item:'Sistema de aterramento/equipotencialização',spec:'Condutores, terminais e conexões',unit:'cj',qty:1,note:'Dimensionar conforme instalação e requisitos aplicáveis.'},\n    {item:'Monitoramento',spec:'Gateway, datalogger ou comunicação nativa',unit:'cj',qty:1,note:'Validar acesso à internet e plataforma.'},\n    {item:'Sinalização e identificação',spec:'Etiquetas e placas de segurança',unit:'cj',qty:1,note:'Conforme projeto e requisitos locais.'}\n  ];\n  return {rows,strings,dcCable,acCable};\n}\nfunction metricHTML(label,value,sub='',tone=''){\n  return `<div class=\"metric ${tone}\"><div class=\"label\">${escapeHtml(label)}<\u002Fdiv><div class=\"value\">${value}<\u002Fdiv><div class=\"sub\">${sub}<\u002Fdiv><\u002Fdiv>`;\n}\nfunction statusTag(status){\n  const m
