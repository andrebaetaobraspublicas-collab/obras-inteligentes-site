g> ${percent(calc.loss*100,1)} &nbsp; | &nbsp; <strong>Performance Ratio:<\u002Fstrong> ${percent(calc.pr*100,1)}<\u002Fdiv><\u002Fdiv>`;\n}\nfunction renderIrradianceTable(){\n  const avg=mean(state.solar.monthlyIrradiance);\n  $('#irradianceTable').innerHTML=MONTHS.map((m,i)=>`<tr><td><strong>${m}<\u002Fstrong><\u002Ftd><td><input type=\"number\" min=\"1\" max=\"9\" step=\"0.01\" data-path=\"solar.monthlyIrradiance.${i}\" value=\"${n(state.solar.monthlyIrradiance[i]).toFixed(2)}\"><\u002Ftd><td class=\"num\">${DAYS[i]}<\u002Ftd><td class=\"num\">${percent(avg?n(state.solar.monthlyIrradiance[i])/avg*100:0,0)}<\u002Ftd><\u002Ftr>`).join('');\n}\n\nfunction planeUsefulArea(p){return Math.max(0,n(p.length)*n(p.width)-n(p.obstacleArea))}\nfunction renderArea(){\n  const modArea=moduleArea(calc.module),maxModules=modArea?Math.floor(calc.availArea/(modArea*n(state.settings.grossAreaFactor,1.2))):0;\n  const totalWeight=calc.moduleCount*n(calc.module?.weightKg),load=calc.netArea?totalWeight/calc.netArea:0;\n  $('#areaSummary').innerHTML=[\n    metricHTML('Área útil cadastrada',`${fmt(calc.availArea,1)} m²`,`${state.planes.length} plano(s)`,'info'),\n    metricHTML('Área líquida dos módulos',`${fmt(calc.netArea,1)} m²`,`Sem corredores e afastamentos`),\n    metricHTML('Área bruta recomendada',`${fmt(calc.grossArea,1)} m²`,`Fator ${fmt(state.settings.grossAreaFactor,2)}`,calc.grossArea<=calc.availArea?'good':'warn'),\n    metricHTML('Capacidade aproximada',`${maxModules} módulos`,`Modelo atualmente selecionado`),\n    metricHTML('Peso dos módulos',`${intFmt(totalWeight)} kg`,`${fmt(load,1)} kg/m² sobre área dos módulos`,'warn')\n  ].join('');\n  renderPlanesTable();renderRoofSketch();\n}\nfunction renderPlanesTable(){\n  const body=$('#planesTable');if(!state.planes.length){body.innerHTML='<tr><td colspan=\"10\"><div class=\"empty\">Cadastre ao menos um plano de instalação.<\u002Fdiv><\u002Ftd><\u002Ftr>';return}\n  body.innerHTML=state.planes.map((p,i)=>`<tr>\n    <td><input data-path=\"planes.${i}.name\" value=\"${escapeHtml(p.name||'')}\"><\u002Ftd>\n    <td><select data-path=\"planes.${i}.type\">${['Telhado cerâmico','Telhado metálico','Fibrocimento','Laje','Solo','Estacionamento','Fachada','Outro'].map(x=>`<option ${p.type===x?'selected':''}>${x}<\u002Foption>`).join('')}<\u002Fselect><\u002Ftd>\n    <td><input type=\"number\" min=\"0\" step=\"0.1\" data-path=\"planes.${i}.length\" value=\"${n(p.length)}\"><\u002Ftd>\n    <td><input type=\"number\" min=\"0\" step=\"0.1\" data-path=\"planes.${i}.width\" value=\"${n(p.width)}\"><\u002Ftd>\n    <td><input type=\"number\" min=\"0\" step=\"0.1\" data-path=\"planes.${i}.obstacleArea\" value=\"${n(p.obstacleArea)}\"><\u002Ftd>\n    <td class=\"num\"><strong>${fmt(planeUsefulArea(p),1)} m²<\u002Fstrong><\u002Ftd>\n    <td><select data-path=\"planes.${i}.orientation\">${['Norte','Nordeste','Noroeste','Leste','Oeste','Sul','Múltiplas'].map(x=>`<option ${p.orientation===x?'selected':''}>${x}<\u002Foption>`).join('')}<\u002Fselect><\u002Ftd>\n    <td><input type=\"number\" min=\"0\" max=\"90\" step=\"1\" data-path=\"planes.${i}.tilt\" value=\"${n(p.tilt)}\"><\u002Ftd>\n    <td><input type=\"number\" min=\"0\" step=\"1\" data-path=\"planes.${i}.maxLoad\" value=\"${n(p.maxLoad)}\"><\u002Ftd>\n    <td><button class=\"btn small danger\" data-delete-plane=\"${i}\">Excluir<\u002Fbutton><\u002Ftd>\n  <\u002Ftr>`).join('');\n}\nfunction renderRoofSketch(){\n  const planes=state.planes;if(!planes.length){$('#roofSketch').innerHTML='<div class=\"empty\">Sem planos cadastrados.<\u002Fdiv>';return}\n  const total=availableArea(),needed=calc.moduleCount,modW=n(calc.module?.widthMm)/1000,modL=n(calc.module?.lengthMm)/1000;\n  let assigned=0;const blocks=planes.map((p,idx)=>{\n    const area=planeUsefulArea(p),qty=idx===planes.length-1?Math.max(0,needed-assigned):Math.min(Math.max(0,needed-assigned),Math.floor(needed*(area/Math.max(total,1))));assigned+=qty;\n    const cols=Math.max(1,Math.floor(n(p.length)/(modW*n(state.settings.grossAreaFactor,1.2)))),rows=Math.max(1,Math.ceil(qty/cols));\n    let cells='';for(let i=0;i<Math.min(qty,80);i++){const x=18+(i%cols)*22,y=42+Math.floor(i/cols)*30;cells+=`<rect x=\"${x}\" y=\"${y}\" width=\"17\" height=\"25\" rx=\"2\" fill=\"#dcefe5\" stroke=\"#0f7a4d\"/><line x1=\"${x+8.5}\" y1=\"${y}\" x2=\"${x+8.5}\" y2=\"${y+25}\" stroke=\"#8abca3\"/><line x1=\"${x}\" y1=\"${y+12.5}\" x2=\"${x+17}\" y2=\"${y+12.5}\" stroke=\"#8abca3\"/>`}\n    const w=Math.max(280,cols*22+36),h=Math.max(160,rows*30+65);\n    return {w,h,svg:`<g transform=\"translate(0,0)\"><rect x=\"4\" y=\"4\" width=\"${w-8}\" height=\"${h-8}\" rx=\"10\" fill=\"#f8fbf9\" stroke=\"#b9cbc1\"/><text x=\"18\" y=\"25\" font-size=\"13\" font-weight=\"700\" fill=\"#263a31\">${escapeHtml(p.name)} — ${qty} módulo(s)<\u002Ftext>${cells}<\u002Fg>`};\n  });\n  const width=Math.max(...blocks.map(b=>b.w)),height=sum(blocks.map(b=>b.h+12));let y=0;const svg=blocks.map(b=>{const s=`<g transform=\"translate(0,${y})\">${b.svg}<\u002Fg>`;y+=b.h+12;return s}).join('');\n  $('#roofSketch').innerHTML=`<svg viewBox=\"0 0 ${width} ${height}\" role=\"img\" aria-label=\"Croqui esquemático dos módulos\">${svg}<\u002Fsvg>`;\n}\n\nfunction catalogTable(type,filter=''){\n  const query=filter.trim().toLowerCase();\n  if(type==='modules'){\n    const list=state.catalogs.modules.filter(x=>`${x.manufacturer} ${x.model}`.toLowerCase().includes(query));\n    if(!list.length)return '<div class=\"empty\">Nenhum módulo encontrado.<\u002Fdiv>';\n    return `<div class=\"table-wrap\"><table><thead><tr><th>Status<\u002Fth><th>Fabricante / modelo<\u002Fth><th>Tecnologia<\u002Fth><th class=\"num\">Potência<\u002Fth><th class=\"num\">Eficiência<\u002Fth><th class=\"num\">Vmp / Voc<\u002Fth><th class=\"num\">Imp / Isc<\u002Fth><th class=\"num\">Área<\u002Fth><th class=\"num\">Preço<\u002Fth><th>Fonte<\u002Fth><th><\u002Fth><\u002Ftr><\u002Fthead><tbody>${list.map(x=>`<tr><td>${statusTag(x.status)}<\u002Ftd><td><strong>${escapeHtml(x.manufacturer)}<\u002Fstrong><br><span class=\"muted\">${escapeHtml(x.model)}<\u002Fspan>${state.selection.moduleId===x.id?'<br><span class=\"tag ok\">SELECIONADO<\u002Fspan>':''}<\u002Ftd><td>${escapeHtml(x.technology||'—')}<\u002Ftd><td class=\"num\">${intFmt(x.pmax)} W<\u002Ftd><td class=\"num\">${percent(x.efficiency,1)}<\u002Ftd><td class=\"num\">${fmt(x.vmp,1)} / ${fmt(x.voc,1)} V<\u002Ftd><td class=\"num\">${fmt(x.imp,2)} / ${fmt(x.isc,2)} A<\u002Ftd><td class=\"num\">${fmt(moduleArea(x),2)} m²<\u002Ftd><td class=\"num\">${money(x.price)}<\u002Ftd><td class=\"small\">${escapeHtml(x.source||'Não informada')}<\u002Ftd><td><div class=\"toolbar\"><button class=\"btn small\" data-select-module=\"${x.id}\">Usar<\u002Fbutton><button class=\"btn small\" data-edit-equipment=\"module:${x.id}\">Editar<\u002Fbutton><button class=\"btn small danger\" data-delete-equipment=\"module:${x.id}\">Excluir<\u002Fbutton><\u002Fdiv><\u002Ftd><\u002Ftr>`).join('')}<\u002Ftbody><\u002Ftable><\u002Fdiv>`;\n  }\n  if(type==='inverters'){\n    const list=state.catalogs.inverters.filter(x=>`${x.manufacturer} ${x.model}`.toLowerCase().includes(query));\n    if(!list.length)return '<div class=\"empty\">Nenhum inversor encontrado.<\u002Fdiv>';\n    return `<div class=\"table-wrap\"><table><thead><tr><th>Status<\u002Fth><th>Fabricante / modelo<\u002Fth><th class=\"num\">Potência CA<\u002Fth><th class=\"num\">Máx. CC<\u002Fth><th class=\"num\">Faixa MPPT<\u002Fth><th class=\"num\">MPPT / entradas<\u002Fth><th class=\"num\">Corrente/MPPT<\u002Fth><th>Fases<\u002Fth><th class=\"num\">Preço<\u002Fth><th>Fonte<\u002Fth><th><\u002Fth><\u002Ftr><\u002Fthead><tbody>${list.map(x=>`<tr><td>${statusTag(x.status)}<\u002Ftd><td><strong>${escapeHtml(x.manufacturer)}<\u002Fstrong><br><span class=\"muted\">${escapeHtml(x.model)}<\u002Fspan>${state.selection.inverterId===x.id?'<br><span class=\"tag ok\">SELECIONADO<\u002Fspan>':''}<\u002Ftd><td class=\"num\">${fmt(x.pacKw,1)} kW<\u002Ftd><td class=\"num\">${fmt(x.maxDcPowerKw,1)} kW<\u002Ftd><td class=\"num\">${intFmt(x.mpptMin)}–${intFmt(x.mpptMax)} V<\u002Ftd><td class=\"num\">${x.mppts} / ${x.inputsPerMppt}<\u002Ftd><td class=\"num\">${fmt(x.maxCurrentPerMppt,1)} A<\u002Ftd><td>${x.phase==3?'Trifásico':'Monofásico'}<\u002Ftd><td class=\"num\">${money(x.price)}<\u002Ftd><td class=\"small\">${escapeHtml(x.source||'Não informada')}<\u002Ftd><td><div class=\"toolbar\"><button class=\"btn small\" data-select-inverter=\"${x.id}\">Usar<\u002Fbutton><button class=\"btn small\" data-edit-equipment=\"inverter:${x.id}\">Editar<\u002Fbutton><button class=\"btn small danger\" data-delete-equipment=\"inverter:${x.id}\">Excluir<\u002Fbutton><\u002Fdiv><\u002Ftd><\u002Ftr>`).join('')}<\u002Ftbody><\u002Ftable><\u002Fdiv>`;\n  }\n  const list=state.catalogs.micros.filter(x=>`${x.manufacturer} ${x.model}`.toLowerCase().includes(query));\n  if(!list.length)return '<div class=\"empty\">Nenhum microinversor encontrado.<\u002Fdiv>';\n  return `<div class=\"table-wrap\"><table><thead><tr><th>Status<\u002Fth><th>Fabricante / modelo<\u002Fth><th class=\"num\">Canais<\u002Fth><th class=\"num\">Potência CA<\u002Fth><th class=\"num\">Faixa módulo<\u002Fth><th class=\"num\">MPPT<\u002Fth><th class=\"num\">Corrente<\u002Fth><th class=\"num\">Un./circuito<\u002Fth><th class=\"num\">Preço<\u002Fth><th>Fonte<\u002Fth><th><\u002Fth><\u002Ftr><\u002Fthead><tbody>${list.map(x=>`<tr><td>${statusTag(x.status)}<\u002Ftd><td><strong>${escapeHtml(x.manufacturer)}<\u002Fstrong><br><span class=\"muted\">${escapeHtml(x.model)}<\u002Fspan>${state.selection.microId===x.id?'<br><span class=\"tag ok\">SELECIONADO<\u002Fspan>':''}<\u002Ftd><td class=\"num\">${x.channels}<\u002Ftd><td class=\"num\">${intFmt(x.pacW)} W<\u002Ftd><td class=\"num\">${intFmt(x.minModulePower)}–${intFmt(x.maxModulePower)} W<\u002Ftd><td class=\"num\">${intFmt(x.mpptMin)}–${intFmt(x.mpptMax)} V<\u002Ftd><td class=\"num\">${fmt(x.maxInputCurrent,1)} A<\u002Ftd><td class=\"num\">${x.maxUnitsPerCircuit}<\u002Ftd><td class=\"num\">${money(x.price)}<\u002Ftd><td class=\"small\">${escapeHtml(x.source||'Não informada')}<\u002Ftd><td><div class=\"toolbar\"><button class=\"btn small\" data-select-micro=\"${x.id}\">Usar<\u002Fbutton><button class=\"btn small\" data-edit-equipment=\"micro:${x.id}\">Editar<\u002Fbutton><button class=\"btn small danger\" data-delete-equipment=\"micro:${x.id}\">Excluir<\u002Fbutton><\u002Fdiv><\u002Ftd><\u002Ftr>`).join('')}<\u002Ftbody><\u002Ftable><\u002Fdiv>`;\n}\nfunction renderCatalogs(){\n  $('#modulesCatalogTable').innerHTML=catalogTable('modules',$('#moduleSearch')?.value||'');\n  $('#invertersCatalogTable').innerHTML=catalogTable('inverters',$('#inverterSearch')?.value||'');\n  $('#microsCatalogTable').innerHTML=catalogTable('micros',$('#microSearch')?.value||'');\n}\n\nfunction moduleRecCard(item,label,desc){\n  if(!item)return '<div class=\"empty\">Catálogo vazio.<\u002Fdiv>';\n  const m=item.module,selected=m.id===state.selection.moduleId;\n  return `<div class=\"solution-card ${selected?'recommended':''}\"><span class=\"ribbon tag ${selected?'ok':'info'}\">${selected?'SELECIONADO':escapeHtml(label)}<\u002Fspan><h4>${escapeHtml(m.manufacturer)}<br>${escapeHtml(m.model)}<\u002Fh4><p class=\"help\">${escapeHtml(desc)}<\u002Fp>\n    <div class=\"solution-grid\"><div class=\"solution-item\"><span>Potência unitária<\u002Fspan><b>${intFmt(m.pmax)} W<\u002Fb><\u002Fdiv><div class=\"solution-item\"><span>Quantidade<\u002Fspan><b>${item.qty}<\u002Fb><\u002Fdiv><div class=\"solution-item\"><span>Potência total<\u002Fspan><b>${fmt(item.installedKw,2)} kWp<\u002Fb><\u002Fdiv><div class=\"solution-item\"><span>Área bruta<\u002Fspan><b>${fmt(item.grossArea,1)} m²<\u002Fb><\u002Fdiv><div class=\"solution-item\"><span>Eficiência<\u002Fspan><b>${percent(m.efficiency,1)}<\u002Fb><\u002Fdiv><div class=\"solution-item\"><span>Custo módulos<\u002Fspan><b>${money(item.totalPrice)}<\u002Fb><\u002Fdiv><\u002Fdiv>\n    <div class=\"toolbar\"><span class=\"tag ${item.fits?'ok':'bad'}\">${item.fits?'ÁREA COMPATÍVEL':'ÁREA INSUFICIENTE'}<\u002Fspan><span class=\"spacer\"><\u002Fspan><button class=\"btn small primary\" data-select-module=\"${m.id}\">Selecionar<\u002Fbutton><\u002Fdiv><\u002Fdiv>`;\n}\nfunction converterCard(candidate,architecture){\n  if(!candidate)return '<div class=\"empty\">Nenhum equipamento cadastrado.<\u002Fdiv>';\n  const e=candidate.equipment,selected=architecture==='string'?state.selection.architecture==='string'&&state.selection.inverterId===e.id:state.selection.architecture==='micro'&&state.selection.microId===e.id;\n  const reason=architecture==='string'?`${candidate.units} un.; ${candidate.plans?.reduce((a,p)=>a+(p.strings||0),0)||0} string(s)`:`${candidate.units} un.; ${candidate.circuits} circuito(s) CA`;\n  return `<div class=\"solution-card ${selected?'recommended':''} mb\"><span class=\"ribbon tag ${candidate.compatible?'ok':'bad'}\">${candidate.compatible?'COMPATÍVEL':'INCOMPATÍVEL'}<\u002Fspan><h4>${escapeHtml(e.manufacturer)} ${escapeHtml(e.model)}<\u002Fh4><div class=\"solution-grid\"><div class=\"solution-item\"><span>Configuração<\u002Fspan><b>${reason}<\u002Fb><\u002Fdiv><div class=\"solution-item\"><span>Potência CA<\u002Fspan><b>${fmt(candidate.acKw,2)} kW<\u002Fb><\u002Fdiv><div class=\"solution-item\"><span>Relação CC/CA<\u002Fspan><b>${fmt(candidate.dcAc,2)}<\u002Fb><\u002Fdiv><div class=\"solution-item\"><span>Custo conversão<\u002Fspan><b>${money(candidate.totalPrice)}<\u002Fb><\u002Fdiv><\u002Fdiv><div class=\"toolbar\"><span>${statusTag(e.status)}<\u002Fspan><span class=\"spacer\"><\u002Fspan><button class=\"btn small primary\" ${candidate.compatible?'':'disabled'} data-select-converter=\"${architecture}:${e.id}\">Selecionar<\u002Fbutton><\u002Fdiv><\u002Fdiv>`;\n}\nfunction renderDimensioning(){\n  $('#dimensionMetrics').innerHTML=[\n    metricHTML('Consumo a compensar',`${intFmt(calc.targetAnnual)} kWh/ano`,percent(state.solar.compensationPct,0),'info'),\n    metricHTML('Produtividade líquida',`${intFmt(calc.specYield)} kWh/kWp.ano`,`PR ${percent(calc.pr*100,1)}`,'good'),\n    metricHTML('Potência calculada',`${fmt(calc.requiredKw,2)} kWp`,'Antes do arredondamento comercial','warn'),\n    metricHTML('Potência selecionada',`${fmt(calc.installedKw,2)} kWp`,`${calc.moduleCount} módulos`,'good')\n  ].join('');\n  $('#moduleRecommendations').innerHTML=moduleRecCard(calc.recModules.economic,'ECONÔMICO','Prioriza menor custo total dos módulos e aderência de potência.')+moduleRecCard(calc.recModules.balanced,'EQUILIBRADO','Combina custo, eficiência, garantia, área e diferença de potência.')+moduleRecCard(calc.recModules.efficient,'MAIOR EFICIÊNCIA','Prioriza maior eficiência e melhor aproveitamento de área.');\n  $('#stringRecommendations').innerHTML=calc.stringCandidates.slice(0,4).map(x=>converterCard(x,'string')).join('')||'<div class=\"empty\">Cadastre inversores string.<\u002Fdiv>';\n  $('#microRecommendations').innerHTML=calc.microCandidates.slice(0,4).map(x=>converterCard(x,'micro')).join('')||'<div class=\"empty\">Cadastre microinversores.<\u002Fdiv>';\n}\nfunction renderConfiguration(){\n  const cfg=calc.configuration;\n  $('#configurationMetrics').innerHTML=[\n    metricHTML('Arquitetura',cfg?.type==='micro'?'Microinversores':'Inversor string',cfg?.compatible?'Compatível preliminarmente':'Requer revisão',cfg?.compatible?'good':'warn'),\n    metricHTML('Potência CC',`${fmt(calc.installedKw,2)} kWp`,`${calc.moduleCount} módulos`,'info'),\n    metricHTML('Potência CA',`${fmt(cfg?.acKw,2)} kW`,`${cfg?.units||0} unidade(s)`,'info'),\n    metricHTML('Relação CC/CA',fmt(cfg?.dcAc,2),`Alvo: ${fmt(state.settings.targetDcAc,2)}`,cfg?.dcAc>=.9&&cfg?.dcAc<=1.4?'good':'warn')\n  ].join('');\n  if(!cfg){$('#configurationText').innerHTML='<div class=\"empty\">Não há conversor selecionado.<\u002Fdiv>';$('#compatibilityChecks').innerHTML='';$('#singleLineDiagram').innerHTML='';return}\n  if(cfg.type==='string'){\n    const units=(cfg.plans||[]).map((plan,u)=>`<h4>Inversor ${u+1} — ${cfg.counts[u]} módulos<\u002Fh4>${plan.compatible?plan.distribution.map((group,mppt)=>`<div class=\"notice ${group.length?'success':''} mb\"><strong>MPPT ${mppt+1}:<\u002Fstrong> ${group.length?group.map(len=>`1 string com ${len} módulos`).join('; '):'sem string'}<\u002Fdiv>`).join(''):`<div class=\"notice danger\">${escapeHtml((plan.reasons||[]).join(' '))}<\u002Fdiv>`}`).join('');\n    $('#configurationText').innerHTML=`<p><strong>Equipamento:<\u002Fstrong> ${escapeHtml(cfg.equipment.manufacturer)} ${escapeHtml(cfg.equipment.model)} (${cfg.units} unidade(s)).<\u002Fp>${units}<p><strong>Potência CC instalada:<\u002Fstrong> ${fmt(calc.installedKw,2)} kWp. <strong>Potência CA nominal:<\u002Fstrong> ${fmt(cfg.acKw,2)} kW. <strong>Relação CC/CA:<\u002Fstrong> ${fmt(cfg.dcAc,2)}.<\u002Fp>`;\n  }else{\n    const full=Math.floor(calc.moduleCount/n(cfg.equipment.channels)),rem=calc.moduleCount%n(cfg.equipment.channels);\n    $('#configurationText').innerHTML=`<p><strong>Equipamento:<\u002Fstrong> ${escapeHtml(cfg.equipment.manufacturer)} ${escapeHtml(cfg.equipment.model)}.<\u002Fp><div class=\"notice success\"><strong>${cfg.units} microinversor(es)<\u002Fstrong>, com ${cfg.equipment.channels} entrada(s) cada. ${full} unidade(s) totalmente ocupadas${rem?` e 1 unidade com ${rem} entrada(s) utilizada(s)`:''}.<\u002Fdiv><p><strong>Circuitos CA preliminares:<\u002Fstrong> ${cfg.circuits}. <strong>Potência CA:<\u002Fstrong> ${fmt(cfg.acKw,2)} kW. <strong>Relação CC/CA:<\u002Fstrong> ${fmt(cfg.dcAc,2)}.<\u002Fp><p class=\"help\">Distribuir os circuitos e a potência entre as fases conforme a conexão e os limites do fabricante.<\u002Fp>`;\n  }\n  const checks=[];\n  if(cfg.type==='string'){\n    checks.push({level:cfg.phaseOk?'ok':'critical',title:'Compatibilidade de fases',text:cfg.phaseOk?'Arquitetura compatível com o número de fases informado.':'O equipamento trifásico exige conexão trifásica.'});\n    checks.push({level:cfg.voltageOk?'ok':'critical',title:'Compatibilidade com a tensão da rede',text:cfg.voltageOk?`Saída ${cfg.equipment.outputVoltage||'não informada'} compatível com ${state.project.voltage} V.`:`Saída ${cfg.equipment.outputVoltage||'não informada'} incompatível com ${state.project.voltage} V.`});\n    checks.push({level:cfg.powerOk?'ok':'critical',title:'Potência máxima CC',text:cfg.powerOk?`${fmt(calc.installedKw,2)} kWp dentro de ${fmt(cfg.equipment.maxDcPowerKw*cfg.units,2)} kW permitidos.`:'A potência CC excede o limite recomendado do conjunto de inversores.'});\n    (cfg.plans||[]).forEach((p,i)=>{\n      if(!p.compatible){checks.push({level:'critical',title:`Inversor ${i+1}: strings incompatíveis`,text:(p.reasons||[]).join(' ')});return}\n      checks.push({level:'ok',title:`Inversor ${i+1}: faixa de strings`,text:`Mínimo ${p.minModules} e máximo ${p.maxModules} módulos por string nas temperaturas informadas.`});\n      p.checks.forEach(ch=>{\n        const vmpOk=ch.vmp>=n(cfg.equipment.mpptMin)&&ch.vmp<=n(cfg.equipment.mpptMax),vocOk=ch.vocCold<n(cfg.equipment.maxDcVoltage);\n        checks.push({level:vmpOk&&vocOk?'ok':'critical',title:`MPPT ${ch.mppt}, string ${ch.string}`,text:`${ch.modules} módulos; Vmp ${fmt(ch.vmp,1)} V; Voc corrigida ${fmt(ch.vocCold,1)} V; Imp ${fmt(ch.imp,2)} A.`});\n      });\n    });\n  }else{\n    checks.push({level:cfg.powerOk?'ok':'critical',title:'Faixa de potência do módulo',text:`Módulo ${intFmt(calc.module?.pmax)} W; faixa recomendada ${intFmt(cfg.equipment.minModulePower)}–${intFmt(cfg.equipment.maxModulePower)} W.`});\n    checks.push({level:cfg.voltageOk?'ok':'critical',title:'Compatibilidade de tensão',text:`Vmp ${fmt(calc.module?.vmp,1)} V; Voc ${fmt(calc.module?.voc,1)} V; MPPT ${fmt(cfg.equipment.mpptMin,0)}–${fmt(cfg.equipment.mpptMax,0)} V.`});\n    checks.push({level:cfg.currentOk?'ok':'critical',title:'Compatibilidade de corrente',text:`Imp ${fmt(calc.module?.imp,2)} A / limite ${fmt(cfg.equipment.maxInputCurrent,2)} A; Isc ${fmt(calc.module?.isc,2)} A / limite ${fmt(cfg.equipment.maxShortCircuit,2)} A.`});\n    checks.push({level:cfg.gridVoltageOk?'ok':'critical',title:'Compatibilidade com a tensão da rede',text:cfg.gridVoltageOk?`Saída ${cfg.equipment.outputVoltage||'não informada'} compatível com ${state.project.voltage} V.`:`Saída ${cfg.equipment.outputVoltage||'não informada'} incompatível com ${state.project.voltage} V.`});\n    checks.push({level:'info',title:'Circuitos CA',text:`${cfg.units} unidades distribuídas em ${cfg.circuits} circuito(s), limite de ${cfg.equipment.maxUnitsPerCircuit} por circuito.`});\n  }\n  $('#compatibilityChecks').innerHTML=checks.map(alertHTML).join('');\n  $('#singleLineDiagram').innerHTML=buildSingleLineSVG(calc);\n}\nfunction buildSingleLineSVG(c){\n  const cfg=c.configuration;if(!cfg)return '<div class=\"empty\">Sem configuração.<\u002Fdiv>';\n  const box=(x,y,w,h,title,sub,fill='#ffffff')=>`<g><rect x=\"${x}\" y=\"${y}\" width=\"${w}\" height=\"${h}\" rx=\"12\" fill=\"${fill}\" stroke=\"#9bb2a6\"/><text x=\"${x+w/2}\" y=\"${y+27}\" text-anchor=\"middle\" font-size=\"14\" font-weight=\"700\" fill=\"#17382b\">${escapeHtml(title)}<\u002Ftext><text x=\"${x+w/2}\" y=\"${y+48}\" text-anchor=\"middle\" font-size=\"11\" fill=\"#66756d\">${escapeHtml(sub)}<\u002Ftext><\u002Fg>`;\n  const line=(x1,y1,x2,y2,label='')=>`<g><line x1=\"${x1}\" y1=\"${y1}\" x2=\"${x2}\" y2=\"${y2}\" stroke=\"#0f7a4d\" stroke-width=\"3\" marker-end=\"url(#arrow)\"/>${label?`<text x=\"${(x1+x2)/2}\" y=\"${(y1+y2)/2-8}\" text-anchor=\"middle\" font-size=\"10\" fill=\"#5f7067\">${escapeHtml(label)}<\u002Ftext>`:''}<\u002Fg>`;\n  if(cfg.type==='string')return `<svg viewBox=\"0 0 1100 280\"><defs><marker id=\"arrow\" viewBox=\"0 0 10 10\" refX=\"9\" refY=\"5\" markerWidth=\"6\" markerHeight=\"6\" orient=\"auto-start-reverse\"><path d=\"M 0 0 L 10 5 L 0 10 z\" fill=\"#0f7a4d\"/><\u002Fmarker><\u002Fdefs>${box(25,80,160,85,'Módulos FV',`${c.moduleCount} × ${   $('#generationMetrics').innerHTML=[\n    metricHTML('Geração média',`${intFmt(calc.annualGeneration/12)} kWh/mês`,`${intFmt(calc.annualGeneration)} kWh/ano`,'good'),\n    metricHTML('Produtividade específica',`${intFmt(specific)} kWh/kWp.ano`,`PR ${percent(calc.pr*100,1)}`,'info'),\n    metricHTML('Autoconsumo no 1º ano',`${intFmt(totalSelf)} kWh`,percent(calc.annualGeneration?totalSelf/calc.annualGeneration*100:0,1),'good'),\n    metricHTML('Energia injetada',`${intFmt(totalInjection)} kWh`,percent(calc.annualGeneration?totalInjection/calc.annualGeneration*100:0,1),'warn')\n  ].join('');\n  $('#generationTable').innerHTML=MONTHS.map((m,i)=>`<tr><td><strong>${m}<\u002Fstrong><\u002Ftd><td class=\"num\">${intFmt(calc.consumption.profile[i])}<\u002Ftd><td class=\"num\"><strong>${intFmt(calc.monthlyGeneration[i])}<\u002Fstrong><\u002Ftd><td class=\"num\">${intFmt(calc.selfConsumption[i])}<\u002Ftd><td class=\"num\">${intFmt(calc.injection[i])}<\u002Ftd><td class=\"num\">${intFmt(calc.monthlyGeneration[i]-calc.consumption.profile[i])}<\u002Ftd><\u002Ftr>`).join('')+`<tr><td><strong>Total<\u002Fstrong><\u002Ftd><td class=\"num\"><strong>${intFmt(calc.consumption.annual)}<\u002Fstrong><\u002Ftd><td class=\"num\"><strong>${intFmt(calc.annualGeneration)}<\u002Fstrong><\u002Ftd><td class=\"num\"><strong>${intFmt(totalSelf)}<\u002Fstrong><\u002Ftd><td class=\"num\"><strong>${intFmt(totalInjection)}<\u002Fstrong><\u002Ftd><td class=\"num\"><strong>${intFmt(calc.annualGeneration-calc.consumption.annual)}<\u002Fstrong><\u002Ftd><\u002Ftr>`;\n}\n\nconst COST_FIELDS=[\n  ['structurePerModule','Estrutura por módulo','R$/módulo',1],['dcCablingPerKwp','Cabeamento CC','R$/kWp',1],['acCablingPerKwp','Cabeamento CA','R$/kWp',1],['protectionsPerKwp','Proteções e quadros','R$/kWp',1],['laborPerKwp','Mão de obra','R$/kWp',1],['designFixed','Projeto/documentação','R$',1],['freightFixed','Frete/logística','R$',1],['structuralFixed','Adequações','R$',1],['taxPct','Impostos/encargos','%',.1],['marginPct','Margem comercial','%',.1],['contingencyPct','Contingência','%',.1],['omPct','O&M anual','% investimento',.1],['insurancePct','Seguro anual','% investimento',.1]\n];\nfunction renderCostForm(){\n  $('#costForm').innerHTML=COST_FIELDS.map(([key,label,suffix,step])=>`<div class=\"field span-6\"><label>${label}<\u002Flabel><div class=\"suffix-wrap\"><input type=\"number\" min=\"0\" step=\"${step}\" data-path=\"costs.${key}\" value=\"${n(state.costs[key])}\"><span class=\"suffix\">${suffix}<\u002Fspan><\u002Fdiv><\u002Fdiv>`).join('');\n}\nfunction renderEconomics(){\n  const cf=calc.cashflow;\n  $('#economicMetrics').innerHTML=[\n    metricHTML('Investimento total',money(calc.investment.total),`${money(calc.installedKw?calc.investment.total/calc.installedKw:0)}/kWp`,'warn'),\n    metricHTML('Payback simples',formatPayback(cf?.simplePayback),`Descontado: ${formatPayback(cf?.discountedPayback)}`,cf?.simplePayback!=null&&cf.simplePayback<=10?'good':'warn'),\n    metricHTML('Valor Presente Líquido',money(cf?.npv),`Taxa: ${percent(cf?.scenario?.discountRate,1)}`,cf?.npv>=0?'good':'warn'),\n    metricHTML('TIR',cf?.irr==null?'Não calculada':percent(cf.irr*100,1),`ROI: ${percent(cf?.roi,1)}`,cf?.irr>0?'good':'warn'),\n    metricHTML('LCOE',`${money(cf?.lcoe)}/kWh`,'Custo nivelado estimado','info'),\n    metricHTML(`Saldo em ${state.settings.horizonYears} anos`,money(cf?.endingBalance),`Economia bruta: ${money(cf?.totalSavings)}`,cf?.endingBalance>=0?'good':'warn')\n  ].join('');\n  $('#investmentBreakdown').innerHTML=`<div class=\"table-wrap\"><table><thead><tr><th>Componente<\u002Fth><th class=\"num\">Valor<\u002Fth><th class=\"num\">Participação<\u002Fth><\u002Ftr><\u002Fthead><tbody>${calc.investment.rows.map(r=>`<tr><td>${escapeHtml(r[0])}<\u002Ftd><td class=\"num\">${money(r[1])}<\u002Ftd><td class=\"num\">${percent(calc.investment.total?r[1]/calc.investment.total*100:0,1)}<\u002Ftd><\u002Ftr>`).join('')}<tr><td><strong>Total<\u002Fstrong><\u002Ftd><td clas money(r?.npv)}<\u002Ftd><td class=\"num\">${r?.irr==null?'—':percent(r.irr*100,1)}<\u002Ftd><td><button class=\"btn small danger\" data-delete-scenario=\"${i}\">Excluir<\u002Fbutton><\u002Ftd><\u002Ftr>`;\n  }).join('');\n}\n\nlet comparisonAlternatives=[];\nfunction buildComparisonAlternatives(){\n  const uniqueModules=[calc.recModules.economic?.module,calc.recModules.balanced?.module,calc.recModules.efficient?.module].filter(Boolean).filter((m,i,a)=>a.findIndex(x=>x.id===m.id)===i);\n  const specs=[];\n  uniqueModules.forEach((m,idx)=>specs.push({label:['Econômica','Equilibrada','Maior eficiência'][idx]||`Alternativa ${idx+1}`,moduleId:m.id,architecture:'string'}));\n  if(calc.recModules.balanced?.module)specs.push({label:'Microinversores equilibrada',moduleId:calc.recModules.balanced.module.id,architecture:'micro'});\n  if(calc.recModules.efficient?.module&&specs.length<5)specs.push({label:'Microinversores alta eficiência',moduleId:calc.recModules.efficient.module.id,architecture:'micro'});\n  const alts=[];\n  specs.slice(0,5).forEach(spec=>{\n    const temp=deepClone(state);temp.selection.moduleId=spec.moduleId;temp.selection.architecture=spec.architecture;\n    let first=computeSystem(temp);const cfg=spec.architecture==='micro'?first.microCandidates.find(x=>x.compatible):first.stringCandidates.find(x=>x.compatible);\n    if(cfg){if(spec.architecture==='micro')temp.selection.microId=cfg.equipment.id;else temp.selection.inverterId=cfg.equipment.id;first=computeSystem(temp)}\n    alts.push({id:uid('alt'),label:spec.label,stateSelection:deepClone(temp.selection),calc:first});\n  });\n  return alts;\n}\nfunction renderComparator(){\n  comparisonAlternatives=buildComparisonAlternatives();\n  if(!comparisonAlternatives.length){$('#comparisonTable').innerHTML='<div class=\"empty\">Não há alternativas suficientes. Cadastre equipamentos.<\u002Fdiv>';return}\n  $('#comparisonTable').innerHTML=`<div class=\"table-wrap\"><table><thead><tr><th>Alternativa<\u002Fth><th>Arquitetura<\u002Fth><th>Módulo<\u002Fth><th>Conversor<\u002Fth><th class=\"num\">Potência CC<\u002Fth><th class=\"num\">Potência CA<\u002Fth><th class=\"num\">CC/CA<\u002Fth><th class=\"num\">Módulos<\u002Fth><th class=\"num\">Área<\u002Fth><th class=\"num\">Geração<\u002Fth><th class=\"num\">Investimento<\u002Fth><th class=\"num\">Payback<\u002Fth><th class=\"num\">VPL<\u002Fth><th>Compatibilidade<\u002Fth><th><\u002Fth><\u002Ftr><\u002Fthead><tbody>${comparisonAlternatives.map((a,i)=>{const c=a.calc,cfg=c.configuration;return `<tr><td><strong>${escapeHtml(a.label)}<\u002Fstrong><\u002Ftd><td>${cfg?.type==='micro'?'Microinversores':'String'}<\u002Ftd><td>${escapeHtml(c.module?.model||'—')}<\u002Ftd><td>${escapeHtml(cfg?.equipment?.model||'—')}<\u002Ftd><td class=\"num\">${fmt(c.installedKw,2)} kWp<\u002Ftd><td class=\"num\">${fmt(cfg?.acKw,2)} kW<\u002Ftd><td class=\"num\">${fmt(cfg?.dcAc,2)}<\u002Ftd><td class=\"num\">${c.moduleCount}<\u002Ftd><td class=\"num\">${fmt(c.grossArea,1)} m²<\u002Ftd><td class=\"num\">${intFmt(c.annualGeneration)} kWh<\u002Ftd><td class=\"num\">${money(c.investment.total)}<\u002Ftd><td class=\"num\">${formatPayback(c.cashflow?.simplePayback)}<\u002Ftd><td class=\"num\">${money(c.cashflow?.npv)}<\u002Ftd><td>${cfg?.compatible?'<span class=\"tag ok\">COMPATÍVEL<\u002Fspan>':'<span class=\"tag bad\">REVISAR<\u002Fspan>'}<\u002Ftd><td><button class=\"btn small primary\" data-apply-alt=\"${i}\">Aplicar<\u002Fbutton><\u002Ftd><\u002Ftr>`}).join('')}<\u002Ftbody><\u002Ftable><\u002Fdiv>`;\n}\n\nfunction renderMaterials(){\n  $('#materialsTable').innerHTML=`<div class=\"table-wrap\"><table><thead><tr><th>Item<\u002Fth><th>Especificação preliminar<\u002Fth><th>Unidade<\u002Fth><th class=\"num\">Quantidade<\u002Fth><th>Observação<\u002Fth><\u002Ftr><\u002Fthead><tbody>${calc.materials.rows.map(r=>`<tr><td><strong>${escapeHtml(r.item)}<\u002Fstrong><\u002Ftd><td>${escapeHtml(r.spec)}<\u002Ftd><td>${escapeHtml(r.unit)}<\u002Ftd><td class=\"num\">${fmt(r.qty,Number.isInteger(r.qty)?0:1)}<\u002Ftd><td>${escapeHtml(r.note)}<\u002Ftd><\u002Ftr>`).join('')}<\u002Ftbody><\u002Ftable><\u002Fdiv>`;\n}\n\nfunction renderReferences(){\n  const body=$('#referencesTable');if(!state.references.length){body.innerHTML='<tr><td colspan=\"7\"><div class=\"empty\">Nenhuma referência cadastrada. Inclua normas e regras vigentes aplicáveis.<\u002Fdiv><\u002Ftd><\u002Ftr>';return}\n  body.innerHTML=state.references.map((r,i)=>`<tr><td><input data-path=\"references.${i}.code\" value=\"${escapeHtml(r.code||'')}\"><\u002Ftd><td><input data-path=\"references.${i}.title\" value=\"${escapeHtml(r.title||'')}\"><\u002Ftd><td><input data-path=\"references.${i}.version\" value=\"${escapeHtml(r.version||'')}\"><\u002Ftd><td><input data-path=\"references.${i}.scope\" value=\"${escapeHtml(r.scope||'')}\"><\u002Ftd><td><input data-path=\"references.${i}.source\" value=\"${escapeHtml(r.source||'')}\"><\u002Ftd><td><select data-path=\"references.${i}.status\"><option ${r.status==='Vigente'?'selected':''}>Vigente<\u002Foption><option ${r.status==='Verificar'?'selected':''}>Verificar<\u002Foption><option ${r.status==='Substituída'?'selected':''}>Substituída<\u002Foption><\u002Fselect><\u002Ftd><td><button class=\"btn small danger\" data-delete-reference=\"${i}\">Excluir<\u002Fbutton><\u002Ftd><\u002Ftr>`).join('');\n}\nfunction equipmentRef(e){\n  if(!e)return 'Não definido.';\n  return `${escapeHtml(e.manufacturer)} ${escapeHtml(e.model)} — status: ${escapeHtml(e.status||'não informado')}; fonte: ${escapeHtml(e.source||'não informada')}; consulta: ${escapeHtml(e.consultedAt||'não informada')}.`;\n}\nfunction reportHeader(title,subtitle=''){\n  return `<div class=\"cover\"><div class=\"tag demo\">ESTUDO PRELIMINAR<\u002Fdiv><h1>${escapeHtml(title)}<\u002Fh1><p>${escapeHtml(state.meta.projectName)}<\u002Fp><p class=\"muted\">${escapeHtml(subtitle)}<br>Emissão: ${escapeHtml(state.meta.studyDate)} | Revisão: ${escapeHtml(state.meta.revision)}<\u002Fp><\u002Fdiv>`;\n}\nfunction reportProjectTable(){return `<table><tbody><tr><th>Cliente<\u002Fth><td>${escapeHtml(state.meta.clientName||'Não informado')}<\u002Ftd><th>Responsável<\u002Fth><td>${escapeHtml(state.meta.responsible||'Não informado')}<\u002Ftd><\u002Ftr><tr><th>Local<\u002Fth><td>${escapeHtml([state.meta.city,state.meta.stateCode].filter(Boolean).join('/')||'Não informado')}<\u002Ftd><th>Concessionária<\u002Fth><td>${escapeHtml(state.project.utility||'Não informada')}<\u002Ftd><\u002Ftr><tr><th>Conexão<\u002Fth><td>${escapeHtml(state.project.connection)} / ${escapeHtml(state.project.voltage)} V / ${phaseCount(state)} fase(s)<\u002Ftd><th>Classe<\u002Fth><td>${escapeHtml(state.project.tariffClass)}<\u002Ftd><\u002Ftr><\u002Ftbody><\u002Ftable>`}\nfunction renderMemorial(){\n  const c=calc,cfg=c.configuration,cf=c.cashflow;\n  const lossRows=Object.entries(LOSS_LABELS).map(([k,l])=>`<tr><td>${escapeHtml(l)}<\u002Ftd><td class=\"num\">${percent(state.solar.losses[k],1)}<\u002Ftd><\u002Ftr>`).join('');\n  const monthRows=MONTHS.map((m,i)=>`<tr><td>${m}<\u002Ftd><td class=\"num\">${intFmt(c.consumption.profile[i])}<\u002Ftd><td class=\"num\">${fmt(state.solar.monthlyIrradiance[i],2)}<\u002Ftd><td class=\"num\">${intFmt(c.monthlyGeneration[i])}<\u002Ftd><\u002Ftr>`).join('');\n  let electrical='';\n  if(cfg?.type==='string'){\n    electrical=(cfg.plans||[]).map((p,i)=>`<h3>Inversor ${i+1}<\u002Fh3>${p.compatible?`<table><thead><tr><th>MPPT<\u002Fth><th>String<\u002Fth><th class=\"num\">Módulos<\u002Fth><th class=\"num\">Vmp<\u002Fth><th class=\"num\">Voc corrigida<\u002Fth><th class=\"num\">Imp<\u002Fth><\u002Ftr><\u002Fthead><tbody>${p.checks.map(x=>`<tr><td>${x.mppt}<\u002Ftd><td>${x.string}<\u002Ftd><td class=\"num\">${x.modules}<\u002Ftd><td class=\"num\">${fmt(x.vmp,1)} V<\u002Ftd><td class=\"num\">${fmt(x.vocCold,1)} V<\u002Ftd><td class=\"num\">${fmt(x.imp,2)} A<\u002Ftd><\u002Ftr>`).join('')}<\u002Ftbody><\u002Ftable><p>Faixa calculada: mínimo de ${p.minModules} e máximo de ${p.maxModules} módulos por string.<\u002Fp>`:`<div class=\"notice danger\">${escapeHtml((p.reasons||[]).join(' '))}<\u002Fdiv>`}`).join('');\n  }else if(cfg){electrical=`<table><tbody><tr><th>Quantidade de microinversores<\u002Fth><td>${cfg.units}<\u002Ftd><\u002Ftr><tr><th>Entradas por unidade<\u002Fth><td>${cfg.equipment.channels}<\u002Ftd><\u002Ftr><tr><th>Circuitos CA preliminares<\u002Fth><td>${cfg.circuits}<\u002Ftd><\u002Ftr><tr><th>Vmp/Voc do módulo<\u002Fth><td>${fmt(c.module.vmp,1)} V / ${fmt(c.module.voc,1)} V<\u002Ftd><\u002Ftr><tr><th>Imp/Isc do módulo<\u002Fth><td>${fmt(c.module.imp,2)} A / ${fmt(c.module.isc,2)} A<\u002Ftd><\u002Ftr><tr><th>Compatibilidade<\u002Fth><td>${cfg.compatible?'Preliminarmente compatível':'Incompatível — revisar'}<\u002Ftd><\u002Ftr><\u002Ftbody><\u002Ftable>`}\n  const refs=state.references.length?`<table><thead><tr><th>Identificação<\u002Fth><th>Título<\u002Fth><th>Versão<\u002Fth><th>Status<\u002Fth><\u002Ftr><\u002Fthead><tbody>${state.references.map(r=>`<tr><td>${escapeHtml(r.code)}<\u002Ftd><td>${escapeHtml(r.title)}<\u002Ftd><td>${escapeHtml(r.version)}<\u002Ftd><td>${escapeHtml(r.status)}<\u002Ftd><\u002Ftr>`).join('')}<\u002Ftbody><\u002Ftable>`:'<p>Nenhuma referência foi cadastrada. As normas e regras vigentes devem ser confirmadas pelo responsável técnico.<\u002Fp>';\n  $('#memorialReport').innerHTML=reportHeader('Memorial de Cálculo Fotovoltaico','Pré-dimensionamento técnico e econômico')+`\n    <h2>1. Identificação e objetivo<\u002Fh2>${reportProjectTable()}<p>O presente memorial registra as premissas e os cálculos empregados no pré-dimensionamento de um sistema fotovoltaico conectado à rede. Os resultados dependem dos dados informados e não constituem projeto executivo.<\u002Fp>\n    <h2>2. Consumo de projeto<\u002Fh2><p>O consumo médio histórico é de <strong>${intFmt(c.consumption.baseAvg)} kWh/mês<\u002Fstrong>. Foram acrescentados <strong>${intFmt(c.consumption.future)} kWh/mês<\u002Fstrong> de cargas futuras, resultando em <strong>${intFmt(c.consumption.monthlyAvg)} kWh/mês<\u002Fstrong> e <strong>${intFmt(c.consumption.annual)} kWh/ano<\u002Fstrong>.<\u002Fp>\n    <div class=\"formula\">Consumo anual = Σ(consumo mensal + cargas futuras) = ${intFmt(c.consumption.annual)} kWh/ano<\u002Fdiv>\n    <h2>3. Recurso solar e perdas<\u002Fh2><p>Irradiação média informada: <strong>${fmt(state.solar.irradiance,2)} kWh/m²/dia<\u002Fstrong>. Fonte: ${escapeHtml(state.solar.irradianceSource||'não informada')}.<\u002Fp><table><thead><tr><th>Perda<\u002Fth><th class=\"num\">Valor<\u002Fth><\u002Ftr><\u002Fthead><tbody>${lossRows}<tr><td><strong>Perda combinada<\u002Fstrong><\u002Ftd><td class=\"num\"><strong>${percent(c.loss*100,1)}<\u002Fstrong><\u002Ftd><\u002Ftr><tr><td><strong>Performance Ratio<\u002Fstrong><\u002Ftd><td class=\"num\"><strong>${percent(c.pr*100,1)}<\u002Fstrong><\u002Ftd><\u002Ftr><\u002Ftbody><\u002Ftable>\n    <div class=\"formula\">PR = Π(1 − perdaᵢ) = ${fmt(c.pr,4)} (${percent(c.pr*100,1)})<\u002Fdiv>\n    <h2>4. Cálculo da potência fotovoltaica<\u002Fh2><p>Percentual de compensação pretendido: <strong>${percent(state.solar.compensationPct,0)}<\u002Fstrong>. Energia anual-alvo: <strong>${intFmt(c.targetAnnual)} kWh/ano<\u002Fstrong>.<\u002Fp>\n    <div class=\"formula\">Produtividade líquida = Σ(irradiação mensal × dias × PR) = ${intFmt(c.specYield)} kWh/kWp.ano<br>Potência necessária = ${intFmt(c.targetAnnual)} ÷ ${intFmt(c.specYield)} = ${fmt(c.requiredKw,3)} kWp<\u002Fdiv>\n    <h2>5. Seleção dos módulos<\u002Fh2><p><strong>${equipmentRef(c.module)}<\u002Fstrong><\u002Fp><table><tbody><tr><th>Potência unitária<\u002Fth><td>${intFmt(c.module?.pmax)} W<\u002Ftd><th>Quantidade<\u002Fth><td>${c.moduleCount}<\u002Ftd><\u002Ftr><tr><th>Potência instalada<\u002Fth><td>${fmt(c.installedKw,2)} kWp<\u002Ftd><th>Eficiência<\u002Fth><td>${percent(c.module?.efficiency,1)}<\u002Ftd><\u002Ftr><tr><th>Área líquida<\u002Fth><td>${fmt(c.netArea,1)} m²<\u002Ftd><th>Área bruta<\u002Fth><td>${fmt(c.grossArea,1)} m²<\u002Ftd><\u002Ftr><\u002Ftbody><\u002Ftable>\n    <div class=\"formula\">Nº de módulos = teto(${fmt(c.requiredKw,3)} × 1000 ÷ ${intFmt(c.module?.pmax)}) = ${c.moduleCount}<br>Potência adotada = ${c.moduleCount} × ${intFmt(c.module?.pmax)} ÷ 1000 = ${fmt(c.installedKw,2)} kWp<\u002Fdiv>\n    <h2>6. Conversão e configuração elétrica<\u002Fh2><p><strong>${equipmentRef(cfg?.equipment)}<\u002Fstrong><\u002Fp><p>Arquitetura adotada: <strong>${cfg?.type==='micro'?'microinversores':'inversor string'}<\u002Fstrong>. Potência CA: <strong>${fmt(cfg?.acKw,2)} kW<\u002Fstrong>. Relação CC/CA: <strong>${fmt(cfg?.dcAc,2)}<\u002Fstrong>.<\u002Fp>${electrical}\n    <h2>7. Estimativa de geração<\u002Fh2><table><thead><tr><th>Mês<\u002Fth><th class=\"num\">Consumo (kWh)<\u002Fth><th class=\"num\">Irradiação<\u002Fth><th class=\"num\">Geração (kWh)<\u002Fth><\u002Ftr><\u002Fthead><tbody>${monthRows}<tr><td><strong>Total<\u002Fstrong><\u002Ftd><td class=\"num\"><strong>${intFmt(c.consumption.annual)}<\u002Fstrong><\u002Ftd><td><\u002Ftd><td class=\"num\"><strong>${intFmt(c.annualGeneration)}<\u002Fstrong><\u002Ftd><\u002Ftr><\u002Ftbody><\u002Ftable><div class=\"formula\">Geração do mês = ${fmt(c.installedKw,2)} kWp × irradiação diária × dias × ${fmt(c.pr,4)}<\u002Fdiv>\n    <h2>8. Área e carga preliminar<\u002Fh2><p>Área útil cadastrada: <strong>${fmt(c.availArea,1)} m²<\u002Fstrong>. Área bruta estimada: <strong>${fmt(c.grossArea,1)} m²<\u002Fstrong>. Peso total dos módulos: <strong>${intFmt(c.moduleCount*n(c.module?.weightKg))} kg<\u002Fstrong>. A capacidade estrutural não foi validada por este aplicativo.<\u002Fp>\n    <h2>9. Investimento e retorno<\u002Fh2><p>Investimento estimado: <strong>${money(c.investment.total)}<\u002Fstrong>. Cenário econômico: <strong>${escapeHtml(cf?.scenario?.name||'—')}<\u002Fstrong>.<\u002Fp><table><tbody><tr><th>Economia no primeiro ano<\u002Fth><td>${money(cf?.year1Savings)}<\u002Ftd><th>Payback simples<\u002Fth><td>${formatPayback(cf?.simplePayback)}<\u002Ftd><\u002Ftr><tr><th>Payback descontado<\u002Fth><td>${formatPayback(cf?.discountedPayback)}<\u002Ftd><th>VPL<\u002Fth><td>${money(cf?.npv)}<\u002Ftd><\u002Ftr><tr><th>TIR<\u002Fth><td>${cf?.irr==null?'Não calculada':percent(cf.irr*100,1)}<\u002Ftd><th>LCOE<\u002Fth><td>${money(cf?.lcoe)}/kWh<\u002Ftd><\u002Ftr><\u002Ftbody><\u002Ftable><div class=\"formula\">Fluxo líquido anual = economia bruta − O&amp;M − reposições<br>VPL = −investimento + Σ(fluxoₜ ÷ (1 + taxa de desconto)ᵗ)<\u002Fdiv>\n    <h2>10. Alertas e limitações<\u002Fh2><div class=\"alerts\">${c.alerts.map(alertHTML).join('')}<\u002Fdiv>\n    <h2>11. Referências cadastradas<\u002Fh2>${refs}\n    <h2>12. Conclusão<\u002Fh2><p>O sistema preliminar calculado possui <strong>${fmt(c.installedKw,2)} kWp<\u002Fstrong>, com geração estimada de <strong>${intFmt(c.annualGeneration)} kWh no primeiro ano<\u002Fstrong>. A solução deverá ser revisada com dados oficiais dos equipamentos, levantamento de campo, estudo de sombreamento, análise estrutural, projeto elétrico executivo, requisitos da distribuidora e validação por profissional habilitado.<\u002Fp>`;\n}\n\nfunction renderSpecification(){\n  const c=calc,cfg=c.configuration;\n  const configText=cfg?.type==='string'?(cfg.plans||[]).map((p,i)=>p.compatible?`Inversor ${i+1}: ${p.distribution.map((g,m)=>`MPPT ${m+1} — ${g.map(x=>`1×${x}`).join(', ')||'sem string'}`).join('; ')}`:`Inversor ${i+1}: configuração pendente`).join('<br>'):`${cfg?.units||0} microinversor(es), ${cfg?.equipment?.channels||0} entrada(s) por unidade, ${cfg?.circuits||0} circuito(s) CA preliminar(es).`;\n  $('#specificationReport').innerHTML=reportHeader('Especificação Técnica Básica','Sistema fotovoltaico conectado à rede')+`\n    <h2>1. Objeto<\u002Fh2><p>Fornecimento, instalação, testes, comissionamento e documentação de sistema fotovoltaico conectado à rede, com potência CC aproximada de <strong>${fmt(c.installedKw,2)} kWp<\u002Fstrong> e potência CA de <strong>${fmt(cfg?.acKw,2)} kW<\u002Fstrong>.<\u002Fp>\n    <h2>2. Escopo mínimo<\u002Fh2><p>O escopo deverá incluir equipamentos principais, estruturas de fixação, cabeamento, conectores, quadros, dispositivos de proteção, aterramento/equipotencialização, monitoramento, mão de obra, testes, comissionamento, documentação técnica e suporte à homologação, conforme aplicável.<\u002Fp>\n    <h2>3. Módulos fotovoltaicos<\u002Fh2><table><tbody><tr><th>Fabricante/modelo preliminar<\u002Fth><td>${escapeHtml(c.module?.manufacturer)} ${escapeHtml(c.module?.model)}<\u002Ftd><\u002Ftr><tr><th>Quantidade<\u002Fth><td>${c.moduleCount}<\u002Ftd><\u002Ftr><tr><th>Potência unitária<\u002Fth><td>${intFmt(c.module?.pmax)} W<\u002Ftd><\u002Ftr><tr><th>Potência total<\u002Fth><td>${fmt(c.installedKw,2)} kWp<\u002Ftd><\u002Ftr><tr><th>Eficiência<\u002Fth><td>${percent(c.module?.efficiency,1)}<\u002Ftd><\u002Ftr><tr><th>Tensão/corrente<\u002Fth><td>Vmp ${fmt(c.module?.vmp,1)} V; Voc ${fmt(c.module?.voc,1)} V; Imp ${fmt(c.module?.imp,2)} A; Isc ${fmt(c.module?.isc,2)} A<\u002Ftd><\u002Ftr><tr><th>Rastreabilidade<\u002Fth><td>${equipmentRef(c.module)}<\u002Ftd><\u002Ftr><\u002Ftbody><\u002Ftable><p>Os módulos definitivos deverão possuir documentação técnica, garantias, certificações e rastreabilidade compatíveis com a aplicação e a regulamentação vigente.<\u002Fp>\n    <h2>4. Sistema de conversão<\u002Fh2><table><tbody><tr><th>Arquitetura<\u002Fth><td>${cfg?.type==='micro'?'Microinversores':'Inversor string'}<\u002Ftd><\u002Ftr><tr><th>Fabricante/modelo preliminar<\u002Fth><td>${escapeHtml(cfg?.equipment?.manufacturer||'A definir')} ${escapeHtml(cfg?.equipment?.model||'')}<\u002Ftd><\u002Ftr><tr><th>Quantidade<\u002Fth><td>${cfg?.units||0}<\u002Ftd><\u002Ftr><tr><th>Potência CA total<\u002Fth><td>${fmt(cfg?.acKw,2)} kW<\u002Ftd><\u002Ftr><tr><th>Relação CC/CA<\u002Fth><td>${fmt(cfg?.dcAc,2)}<\u002Ftd><\u002Ftr><tr><th>Rastreabilidade<\u002Fth><td>${equipmentRef(cfg?.equipment)}<\u002Ftd><\u002Ftr><\u002Ftbody><\u002Ftable>\n    <h2>5. Configuração elétrica preliminar<\u002Fh2><div class=\"notice\">${configText}<\u002Fdiv><p>A configuração final deverá respeitar tensões corrigidas por temperatura, faixa MPPT, correntes máximas, corrente de curto-circuito admissível, número de entradas e requisitos de proteção do fabricante.<\u002Fp>\n    <h2>6. Estruturas e área de instalação<\u002Fh2><p>Área bruta estimada: <strong>${fmt(c.grossArea,1)} m²<\u002Fstrong>. As estruturas deverão ser compatíveis com o tipo de cobertura, materiais, ambiente, esforços de vento, dilatações, corrosão e cargas da edificação. A liberação estrutural deverá ser realizada por profissional habilitado.<\u002Fp>\n    <h2>7. Cabeamento, conectores e encaminhamento<\u002Fh2><p>Os cabos CC e CA deverão ser dimensionados por corrente, tensão, temperatura, método de instalação, agrupamento, queda de tensão, curto-circuito e condições ambientais. Conectores acoplados deverão pertencer a sistemas comprovadamente compatíveis. O encaminhamento deve evitar abrasão, água acumulada, bordas cortantes e esforços mecânicos.<\u002Fp>\n    <h2>8. Proteções, seccionamento e aterramento<\u002Fh2><p>O projeto executivo deverá definir disjuntores, fusíveis quando necessários, chaves seccionadoras, DPS, coordenação de proteção, capacidade de interrupção, aterramento, equipotencialização e identificação. Proteções incorporadas aos equipamentos devem ser confirmadas em documentação oficial.<\u002Fp>\n    <h2>9. Monitoramento<\u002Fh2><p>O sistema deverá disponibilizar, quando previsto, monitoramento de geração, potência, energia, alarmes e estado dos equipamentos. A contratada deverá entregar credenciais, documentação de acesso e orientação básica ao usuário.<\u002Fp>\n    <h2>10. Instalação e segurança<\u002Fh2><p>A execução deverá ser realizada por equipe qualificada, com procedimentos de segurança, ferramentas adequadas, controle de torque, ensaios e registros. Os serviços deverão respeitar o projeto aprovado, as instruções dos fabricantes e as normas e regras vigentes.<\u002Fp>\n    <h2>11. Testes e comissionamento<\u002Fh2><p>Deverão ser realizados, conforme aplicável: inspeção visual, conferência de polaridade, continuidade de proteção, resistência de isolamento, medição de tensões de strings, verificação de correntes, parametrização dos inversores, teste de desligamento, comunicação, monitoramento e registro fotográfico.<\u002Fp>\n    <h2>12. Documentação de entrega<\u002Fh2><p>Entregar projeto “como construído”, diagrama unifilar, layout, memoriais, fichas técnicas, manuais, garantias, relatórios de teste, lista de equipamentos, números de série, registros de comissionamento e documentação de homologação.<\u002Fp>\n    <h2>13. Garantias e aceitação<\u002Fh2><p>As garantias mínimas deverão ser confirmadas na contratação. A aceitação dependerá da documentação, ausência de alarmes, funcionamento do monitoramento, conformidade da instalação e desempenho inicial coerente com as condições de irradiância e temperatura observadas.<\u002Fp>\n    <h2>14. Limitações<\u002Fh2><div class=\"notice warning\">Esta especificação é preliminar e não substitui projeto executivo, levantamento de campo, análise estrutural, memorial de proteção, estudo de sombreamento, documentação da distribuidora, ART ou documento equivalente.<\u002Fdiv>`;\n}\n\nfunction renderExecutiveReport(){\n  const c=calc,cfg=c.configuration,cf=c.cashflow;\n  $('#executiveReport').innerHTML=reportHeader('Relatório Executivo SolarPro','Resumo técnico-econômico')+`\n    <h2>Resumo do projeto<\u002Fh2>${reportProjectTable()}\n    <div class=\"grid four\"><div>${metricHTML('Consumo',`${intFmt(c.consumption.monthlyAvg)} kWh/mês`,'Consumo de projeto','info')}<\u002Fdiv><div>${metricHTML('Sistema',`${fmt(c.installedKw,2)} kWp`,`${c.moduleCount} módulos`,'good')}<\u002Fdiv><div>${metricHTML('Geração',`${intFmt(c.annualGeneration)} kWh/ano`,'Primeiro ano','good')}<\u002Fdiv><div>${metricHTML('Investimento',money(c.investment.total),'Estimativa preliminar','warn')}<\u002Fdiv><\u002Fdiv>\n    <h2>Solução selecionada<\u002Fh2><table><tbody><tr><th>Módulo<\u002Fth><td>${escapeHtml(c.module?.manufacturer)} ${escapeHtml(c.module?.model)}<\u002Ftd><th>Quantidade<\u002Fth><td>${c.moduleCount}<\u002Ftd><\u002Ftr><tr><th>Arquitetura<\u002Fth><td>${cfg?.type==='micro'?'Microinversores':'Inversor string'}<\u002Ftd><th>Conversor<\u002Fth><td>${escapeHtml(cfg?.equipment?.manufacturer||'—')} ${escapeHtml(cfg?.equipment?.model||'')}<\u002Ftd><\u002Ftr><tr><th>Potência CA<\u002Fth><td>${fmt(cfg?.acKw,2)} kW<\u002Ftd><th>Relação CC/CA<\u002Fth><td>${fmt(cfg?.dcAc,2)}<\u002Ftd><\u002Ftr><tr><th>Área bruta<\u002Fth><td>${fmt(c.grossArea,1)} m²<\u002Ftd><th>Compatibilidade<\u002Fth><td>${cfg?.compatible?'Preliminarmente compatível':'Requer revisão'}<\u002Ftd><\u002Ftr><\u002Ftbody><\u002Ftable>\n    <h2>Viabilidade<\u002Fh2><table><tbody><tr><th>Cenário<\u002Fth><td>${escapeHtml(cf?.scenario?.name||'—')}<\u002Ftd><th>Economia no primeiro ano<\u002Fth><td>${money(cf?.year1Savings)}<\u002Ftd><\u002Ftr><tr><th>Payback simples<\u002Fth><td>${formatPayback(cf?.simplePayback)}<\u002Ftd><th>Payback descontado<\u002Fth><td>${formatPayback(cf?.discountedPayback)}<\u002Ftd><\u002Ftr><tr><th>VPL<\u002Fth><td>${money(cf?.npv)}<\u002Ftd><th>TIR<\u002Fth><td>${cf?.irr==null?'Não calculada':percent(cf.irr*100,1)}<\u002Ftd><\u002Ftr><\u002Ftbody><\u002Ftable>\n    <h2>Principais alertas<\u002Fh2><div class=\"alerts\">${c.alerts.map(alertHTML).join('')}<\u002Fdiv>\n    <h2>Nota de uso<\u002Fh2><p>Os produtos iniciais são demonstrativos. A adoção profissional exige cadastro de dados oficiais, referências atualizadas, validação elétrica e estrutural, vistoria, projeto executivo, homologação e responsabilidade técnica.<\u002Fp>`;\n}\nfunction renderReports(){renderMemorial();renderSpecification();renderExecutiveReport()}\n\nfunction prepCanvas(canvas){if(!canvas)return null;const ctx=canvas.getContext('2d');ctx.clearRect(0,0,canvas.width,canvas.height);ctx.font='12px system-ui, sans-serif';ctx.lineJoin='round';ctx.lineCap='round';return ctx}\nfunction drawGroupedBars(canvas,labels,series,{currencyAxis=false}={}){\n  const ctx=prepCanvas(canvas);if(!ctx)return;const W=canvas.width,H=canvas.height,p={l:62,r:20,t:24,b:48};const values=series.flatMap(s=>s.values.map(n));let max=Math.max(...values,1)*1.12;const plotW=W-p.l-p.r,plotH=H-p.t-p.b;\n  ctx.strokeStyle='#dce5e0';ctx.fillStyle='#66756d';ctx.lineWidth=1;\n  for(let i=0;i<=5;i++){const y=p.t+plotH*i/5;ctx.beginPath();ctx.moveTo(p.l,y);ctx.lineTo(W-p.r,y);ctx.stroke();const val=max*(1-i/5);ctx.textAlign='right';ctx.fillText(currencyAxis?`R$ ${intFmt(val)}`:intFmt(val),p.l-8,y+4)}\n  const groupW=plotW/labels.length,barW=Math.min(24,(groupW-8)/Math.max(series.length,1));\n  labels.forEach((lab,i)=>{ctx.textAlign='center';ctx.fillStyle='#66756d';ctx.fillText(lab,p.l+groupW*(i+.5),H-18);series.forEach((s,j)=>{const v=n(s.values[i]),h=v/max*plotH,x=p.l+i*groupW+(groupW-series.length*barW)/2+j*barW,y=p.t+plotH-h;ctx.fillStyle=s.color;ctx.fillRect(x,y,barW-2,h)})});\n}\nfunction drawLineChart(canvas,labels,series,{currencyAxis=false,zeroLine=true}={}){\n  const ctx=prepCanvas(canvas);if(!ctx)return;const W=canvas.width,H=canvas.height,p={l:70,r:24,t:24,b:48};const vals=series.flatMap(s=>s.values.map(n));let min=Math.min(...vals,0),max=Math.max(...vals,1);if(min===max){min-=1;max+=1}const pad=(max-min)*.08;min-=pad;max+=pad;const plotW=W-p.l-p.r,plotH=H-p.t-p.b;const yFor=v=>p.t+(max-v)/(max-min)*plotH,xFor=i=>p.l+(labels.length<=1?0:i/(labels.length-1))*plotW;\n  ctx.strokeStyle='#dce5e0';ctx.lineWidth=1;ctx.fillStyle='#66756d';for(let i=0;i<=5;i++){const y=p.t+plotH*i/5;ctx.beginPath();ctx.moveTo(p.l,y);ctx.lineTo(W-p.r,y);ctx.stroke();const val=max-(max-min)*i/5;ctx.textAlign='right';ctx.fillText(currencyAxis?`R$ ${intFmt(val)}`:intFmt(val),p.l-8,y+4)}\n  if(zeroLine&&min<0&&max>0){ctx.strokeStyle='#aebdb5';ctx.setLineDash([5,5]);ctx.beginPath();ctx.moveTo(p.l,yFor(0));ctx.lineTo(W-p.r,yFor(0));ctx.stroke();ctx.setLineDash([])}\n  const step=Math.max(1,Math.ceil(labels.length/12));labels.forEach((lab,i)=>{if(i%step===0||i===labels.length-1){ctx.fillStyle='#66756d';ctx.textAlign='center';ctx.fillText(lab,xFor(i),H-18)}});\n  series.forEach(s=>{ctx.strokeStyle=s.color;ctx.fillStyle=s.color;ctx.lineWidth=3;ctx.beginPath();s.values.forEach((v,i)=>{const x=xFor(i),y=yFor(n(v));i?ctx.lineTo(x,y):ctx.moveTo(x,y)});ctx.stroke();s.values.forEach((v,i)=>{if(labels.length<=15||i%step===0){ctx.beginPath();ctx.arc(xFor(i),yFor(n(v)),3.2,0,Math.PI*2);ctx.fill()}})});\n}\nfunction drawDashboardCharts(){\n  drawGroupedBars($('#energyChart'),MONTHS,[{values:calc.consumption.profile,color:'#8c9a93'},{values:calc.monthlyGeneration,color:'#0f7a4d'}]);\n  const rows=calc.cashflow?.rows||[];drawLineChart($('#cashChart'),['0',...rows.map(r=>String(r.year))],[{values:[-calc.investment.total,...rows.map(r=>r.cumulative)],color:'#0f7a4d'}],{currencyAxis:true});\n}\nfunction drawGenerationChart(){drawGroupedBars($('#generationChart'),MONTHS,[{values:calc.consumption.profile,color:'#8c9a93'},{values:calc.monthlyGeneration,color:'#0f7a4d'},{values:calc.selfConsumption,color:'#175cd3'},{values:calc.injection,color:'#a15c00'}])}\nfunction drawEconomicChart(){const rows=calc.cashflow?.rows||[];drawLineChart($('#economicChart'),['0',...rows.map(r=>String(r.year))],[{values:[-calc.investment.total,...rows.map(r=>r.cumulative)],color:'#0f7a4d'},{values:[-calc.investment.total,...rows.map(r=>r.pvCumulative)],color:'#175cd3'}],{currencyAxis:true})}\nfunction drawScenarioChart(){const rs=calc.scenarioResults;drawGroupedBars($('#scenarioChart'),rs.map(r=>r.scenario.name),[{values:rs.map(r=>Math.max(0,r.npv)),color:'#175cd3'},{values:rs.map(r=>Math.max(0,r.endingBalance)),color:'#0f7a4d'}],{currencyAxis:true})}\nfunction valueFromInput(el){if(el.type==='checkbox')return el.checked;if(el.type==='number'||el.type==='range')return el.value===''?0:n(el.value);return el.value}\nfunction fillInputs(){\n  $$('[data-path]').forEach(el=>{const v=getPath(state,el.dataset.path);if(v===undefined)return;if(el.type==='checkbox')el.checked=!!v;else if(document.activeElement!==el)el.value=v});\n}\nlet renderTimer=null,saveTimer=null;\nfunction scheduleLightRender(){clearTimeout(renderTimer);renderTimer=setTimeout(()=>recalculate(false),120);clearTimeout(saveTimer);saveTimer=setTimeout(autoSave,450)}\nfunction recalculate(full=false){\n  calc=computeSystem(state);\n  renderDashboard();renderConsumption();renderDimensioning();renderConfiguration();renderGeneration();renderEconomics();renderMaterials();renderReports();\n  if(full){renderConsumptionTable();renderFutureLoads();renderLossesForm();renderIrradianceTable();renderArea();renderCatalogs();renderCostForm();renderScenarios();renderComparator();renderReferences();fillInputs()}\n  renderPageSpecific(activePage);\n}\nfunction renderAll(){calc=computeSystem(state);renderNav();renderConsumptionTable();renderFutureLoads();renderLossesForm();renderIrradianceTable();renderArea();renderCatalogs();renderCostForm();renderScenarios();renderComparator();renderMaterials();renderReferences();renderDashboard();renderConsumption();renderDimensioning();renderConfiguration();renderGeneration();renderEconomics();renderReports();fillInputs();renderProjectSelector();renderPageSpecific(activePage)}\n\nfunction storageRead(key,fallback){if(storageDisabled)return fallback;try{const v=localStorage.getItem(key);return v?JSON.parse(v):fallback}catch(e){storageDisabled=true;return fallback}}\nfunction storageWrite(key,value){\n  if(storageDisabled){if(!storageWarned){storageWarned=true;toast('Armazenamento local indisponível neste modo. Use Exportar JSON para salvar o projeto.','error')}return false}\n  try{localStorage.setItem(key,JSON.stringify(value));return true}catch(e){storageDisabled=true;if(!storageWarned){storageWarned=true;toast('Armazenamento local indisponível. Use Exportar JSON para salvar o projeto.','error')}return false}\n}\nfunction getProjects(){return storageRead(STORAGE_KEY,{})}\nfunction autoSave(){storageWrite('solarpro_autosave_v1',state)}\nfunction saveProject(){\n  if(!state.meta.projectId)state.meta.projectId=uid('project');\n  if(!String(state.meta.projectName||'').trim())state.meta.projectName='Projeto sem nome';\n  const projects=getProjects();projects[state.meta.projectId]={state:deepClone(state),updatedAt:new Date().toISOString()};\n  if(storageWrite(STORAGE_KEY,projects)){storageWrite(LAST_KEY,state.meta.projectId);autoSave();renderProjectSelector();toast('Projeto salvo no navegador.')}\n}\nfunction renderProjectSelector(){\n  const el=$('#projectSelector'),projects=getProjects();const options=Object.entries(projects).sort((a,b)=>String(b[1].updatedAt).localeCompare(String(a[1].updatedAt))).map(([id,p])=>`<option value=\"${id}\" ${state.meta.projectId===id?'selected':''}>${escapeHtml(p.state?.meta?.projectName||'Projeto')}<\u002Foption>`).join('');\n  el.innerHTML=options||`<option value=\"${escapeHtml(state.meta.projectId||'')}\">${escapeHtml(state.meta.projectName||'Projeto atual')}<\u002Foption>`;\n  if(options&&state.meta.projectId&&!projects[state.meta.projectId])el.insertAdjacentHTML('afterbegin',`<option value=\"${escapeHtml(state.meta.projectId)}\" selected>${escapeHtml(state.meta.projectName)} (não salvo)<\u002Foption>`);\n}\nfunction loadProjectById(id){const item=getProjects()[id];if(!item)return;state=normalizeState(item.state);storageWrite(LAST_KEY,id);autoSave();renderAll();showPage('dashboard');toast('Projeto carregado.')}\nfunction newProject(){state=defaultState();state.meta.projectId=uid('project');activePage='project';renderAll();showPage('project');autoSave();toast('Novo projeto criado.')}\nfunction deleteCurrentProject(){const projects=getProjects();if(state.meta.projectId&&projects[state.meta.projectId]){delete projects[state.meta.projectId];storageWrite(STORAGE_KEY,projects)}newProject()}\nfunction exportProject(){downloadText(JSON.stringify(state,null,2),`${safeName(state.meta.projectName)}_SolarPro.json`,'application/json;charset=utf-8');toast('Projeto exportado em JSON.')}\nfunction importProjectFile(file){\n  const reader=new FileReader();reader.onload=()=>{try{const raw=JSON.parse(reader.result);state=normalizeState(raw);state.meta.projectId=uid('project');renderAll();showPage('dashboard');autoSave();toast('Projeto importado. Salve para adicioná-lo à lista.')}catch(e){toast('Arquivo de projeto inválido.','error')}};reader.readAsText(file);\n}\nfunction loadInitialState(){\n  const projects=getProjects(),last=storageRead(LAST_KEY,null);if(last&&projects[last]?.state)return normalizeState(projects[last].state);\n  const autosave=storageRead('solarpro_autosave_v1',null);return autosave?normalizeState(autosave):defaultState();\n}\n\nconst EQUIPMENT_FIELDS={\n  module:[\n    ['manufacturer','Fabricante','text'],['model','Modelo','text'],['technology','Tecnologia','text'],['pmax','Potência nominal (W)','number'],['efficiency','Eficiência (%)','number'],\n    ['vmp','Vmp (V)','number'],['imp','Imp (A)','number'],['voc','Voc (V)','number'],['isc','Isc (A)','number'],['betaVoc','Coef. temperatura Voc (%/°C)','number'],['betaP','Coef. temperatura potência (%/°C)','number'],\n    ['maxSystemVoltage','Tensão máxima do sistema (V)','number'],['maxFuse','Fusível máximo (A)','number'],['lengthMm','Comprimento (mm)','number'],['widthMm','Largura (mm)','number'],['weightKg','Peso (kg)','number'],\n    ['warrantyProduct','Garantia do produto (anos)','number'],['warrantyPerformance','Garantia de desempenho (anos)','number'],['degradation','Degradação anual (%)','number'],['price','Preço unitário (R$)','number']\n  ],\n  inverter:[\n    ['manufacturer','Fabricante','text'],['model','Modelo','text'],['pacKw','Potência nominal CA (kW)','number'],['maxDcPowerKw','Potência máxima recomendada CC (kW)','number'],['maxDcVoltage','Tensão máxima warrantyPerformance:25,degradation:.5,price:0};\n  if(type==='inverter')return {...common,pacKw:5,maxDcPowerKw:7.5,maxDcVoltage:1000,mpptMin:120,mpptMax:850,startVoltage:150,mppts:2,inputsPerMppt:2,maxCurrentPerMppt:26,maxShortCircuitPerMppt:32,efficiency:98,phase:1,outputVoltage:'220 V',protection:'IP65',warranty:10,price:0};\n  return {...common,channels:2,pacW:1000,minModulePower:350,maxModulePower:700,maxInputVoltage:65,mpptMin:20,mpptMax:60,maxInputCurrent:16,maxShortCircuit:20,efficiency:97,phase:1,outputVoltage:'220 V',maxUnitsPerCircuit:8,protection:'IP67',warranty:12,price:0};\n}\nfunction openEquipmentModal(type,id=null){\n  const key=equipmentListKey(type),existing=id?findById(state.catalogs[key],id):null,item=existing?deepClone(existing):newEquipment(type);modalContext={type,id,item};\n  const fields=EQUIPMENT_FIELDS[type].map(([k,label,inputType])=>`<div class=\"field span-4\"><label>${escapeHtml(label)}<\u002Flabel><input type=\"${inputType}\" ${inputType==='number'?'step=\"any\"':''} data-modal-field=\"${k}\" value=\"${escapeHtml(item[k]??'')}\"><\u002Fdiv>`).join('');\n  $('#modalTitle').textContent=`${existing?'Editar':'Adicionar'} ${type==='module'?'módulo':type==='inverter'?'inversor':'microinversor'}`;\n  $('#modalBody').innerHTML=`<div class=\"form-grid\">${fields}<div class=\"field span-4\"><label>Status do cadastro<\u002Flabel><select data-modal-field=\"status\"><option value=\"user\" ${item.status==='user'?'selected':''}>Cadastrado pelo usuário<\u002Foption><option value=\"official\" ${item.status==='official'?'selected':''}>Oficial validado<\u002Foption><option value=\"partial\" ${item.status==='partial'?'selected':''}>Oficial parcial<\u002Foption><option value=\"demo\" ${item.status==='demo'?'selected':''}>Demonstrativo<\u002Foption><option value=\"discontinued\" ${item.status==='discontinued'?'selected':''}>Descontinuado<\u002Foption><\u002Fselect><\u002Fdiv><div class=\"field span-8\"><label>Fonte / documento<\u002Flabel><input data-modal-field=\"source\" value=\"${escapeHtml(item.source||'')}\"><\u002Fdiv><div class=\"field span-8\"><label>URL ou referência<\u002Flabel><input data-modal-field=\"sourceUrl\" value=\"${escapeHtml(item.sourceUrl||'')}\"><\u002Fdiv><div class=\"field span-4\"><label>Data de consulta<\u002Flabel><input type=\"date\" data-modal-field=\"consultedAt\" value=\"${escapeHtml(item.consultedAt||todayISO())}\"><\u002Fdiv><div class=\"field span-12\"><div class=\"notice warning\">Marque “Oficial validado” somente após conferir todos os parâmetros no documento oficial aplicável.<\u002Fdiv><\u002Fdiv><\u002Fdiv><div class=\"toolbar mt\"><span class=\"spacer\"><\u002Fspan><button class=\"btn\" id=\"cancelModalBtn\">Cancelar<\u002Fbutton><button class=\"btn primary\" id=\"saveEquipmentModalBtn\">Salvar equipamento<\u002Fbutton><\u002Fdiv>`;\n  $('#modalBackdrop').classList.add('open');$('#cancelModalBtn').onclick=closeModal;$('#saveEquipmentModalBtn').onclick=saveEquipmentModal;\n}\nfunction closeModal(){$('#modalBackdrop').classList.remove('open');modalContext=null}\nfunction saveEquipmentModal(){\n  if(!modalContext)return;const item=modalContext.item;\n  $$('[data-modal-field]',$('#modalBody')).forEach(el=>{item[el.dataset.modalField]=el.type==='number'?n(el.value):el.value});\n  if(!String(item.manufacturer).trim()||!String(item.model).trim()){toast('Informe fabricante e modelo.','error');return}\n  const key=equipmentListKey(modalContext.type),idx=state.catalogs[key].findIndex(x=>x.id===item.id);if(idx>=0)state.catalogs[key][idx]=item;else state.catalogs[key].push(item);\n  closeModal();recalculate(true);autoSave();toast('Equipamento salvo no catálogo.')\n}\nfunction deleteEquipment(type,id){\n  const key=equipmentListKey(type);state.catalogs[key]=state.catalogs[key].filter(x=>x.id!==id);\n  if(type==='module'&&state.selection.moduleId===id)state.selection.moduleId=state.catalogs.modules[0]?.id||'';\n  if(type==='inverter'&&state.selection.inverterId===id)state.selection.inverterId=state.catalogs.inverters[0]?.id||'';\n  if(type==='micro'&&state.selection.microId===id)state.selection.microId=state.catalogs.micros[0]?.id||'';\n  recalculate(true);autoSave();toast('Equipamento removido.')\n}\nfunction exportCatalog(){downloadText(JSON.stringify({version:state.version,exportedAt:new Date().toISOString(),catalogs:state.catalogs},null,2),'SolarPro_Catalogos.json','application/json;charset=utf-8')}\nfunction importCatalogFile(file){const r=new FileReader();r.onload=()=>{try{const raw=JSON.parse(r.result),cats=raw.catalogs||raw;if(!cats.modules&&!cats.inverters&&!cats.micros)throw new Error('estrutura');['modules','inverters','micros'].forEach(k=>{if(Array.isArray(cats[k]))state.catalogs[k]=cats[k]});recalculate(true);autoSave();toast('Catálogos importados. Revise fontes e status.')}catch(e){toast('Arquivo de catálogo inválido.','error')}};r.readAsText(file)}\n\nfunction autoSelectSolution(architecture=state.selection.architecture){\n  calc=computeSystem(state);const mod=calc.recModules.balanced?.module||calc.recModules.all[0]?.module;if(mod)state.selection.moduleId=mod.id;\n  calc=computeSystem(state);state.selection.architecture=architecture;\n  if(architecture==='micro'){const x=calc.microCandidates.find(a=>a.compatible)||calc.microCandidates[0];if(x)state.selection.microId=x.equipment.id}else{const x=calc.stringCandidates.find(a=>a.compatible)||calc.stringCandidates[0];if(x)state.selection.inverterId=x.equipment.id}\n  recalculate(true);autoSave();toast('Solução automática aplicada.')\n}\nfunction exportCashflowCSV(){\n  const rows=[['Ano','Geração (kWh)','Tarifa (R$/kWh)','Economia bruta (R$)','O&M (R$)','Reposições (R$)','Fluxo líquido (R$)','Acumulado (R$)','Valor presente (R$)'],...(calc.cashflow?.rows||[]).map(r=>[r.year,r.generation,r.tariff,r.grossSavings,r.om,r.replacement,r.net,r.cumulative,r.pv])];downloadText(toCSV(rows),`${safeName(state.meta.projectName)}_Fluxo_de_Caixa.csv`,'text/csv;charset=utf-8')\n}\nfunction exportMaterialsCSV(){const rows=[['Item','Especificação preliminar','Unidade','Quantidade','Observação'],...calc.materials.rows.map(r=>[r.item,r.spec,r.unit,r.qty,r.note])];downloadText(toCSV(rows),`${safeName(state.meta.projectName)}_Materiais.csv`,'text/csv;charset=utf-8')}\nfunction exportExcelCompatible(){\n  const c=calc,cf=c.cashflow,cfg=c.configuration;\n  const tr=rows=>rows.map(r=>`<tr>${r.map((v,i)=>`<${i===0?'th':'td'}>${escapeHtml(v??'')}<\u002F${i===0?'th':'td'}>`).join('')}<\u002Ftr>`).join('');\n  const summary=[['Indicador','Valor'],['Projeto',state.meta.projectName],['Cliente',state.meta.clientName],['Consumo médio',`${fmt(c.consumption.monthlyAvg,1)} kWh/mês`],['Potência instalada',`${fmt(c.installedKw,2)} kWp`],['Geração anual',`${fmt(c.annualGeneration,0)} kWh`],['Investimento',money(c.investment.total)],['Payback',formatPayback(cf?.simplePayback)],['VPL',money(cf?.npv)],['TIR',cf?.irr==null?'Não calculada':percent(cf.irr*100,1)]];\n  const monthly=[['Mês','Consumo (kWh)','Geração (kWh)','Autoconsumo (kWh)','Injeção (kWh)'],...MONTHS.map((m,i)=>[m,fmt(c.consumption.profile[i],1),fmt(c.monthlyGeneration[i],1),fmt(c.selfConsumption[i],1),fmt(c.injection[i],1)])];\n  const investment=[['Componente','Valor'],...c.investment.rows.map(r=>[r[0],money(r[1])]),['Total',money(c.investment.total)]];\n  const cash=[['Ano','Geração (kWh)','Tarifa','Economia bruta','O&M','Reposição','Fluxo líquido','Acumulado'],...(cf?.rows||[]).map(r=>[r.year,fmt(r.generation,1),money(r.tariff),money(r.grossSavings),money(r.om),money(r.replacement),money(r.net),money(r.cumulative)])];\n  const materials=[['Item','Especificação','Unidade','Quantidade'],...c.materials.rows.map(r=>[r.item,r.spec,r.unit,fmt(r.qty,Number.isInteger(r.qty)?0:1)])];\n  const html=`<!DOCTYPE html><html><head><meta charset=\"UTF-8\"><style>body{font-family:Arial,sans-serif}table{border-collapse:collapse;margin-bottom:24px}th,td{border:1px solid #999;padding:6px 8px}th{background:#e9f4ee}h1,h2{color:#0f7a4d}<\u002Fstyle><\u002Fhead><body><h1>SolarPro - ${escapeHtml(state.meta.projectName)}<\u002Fh1><h2>Resumo<\u002Fh2><table>${tr(summary)}<\u002Ftable><h2>Geração mensal<\u002Fh2><table>${tr(monthly)}<\u002Ftable><h2>Investimento<\u002Fh2><table>${tr(investment)}<\u002Ftable><h2>Fluxo de caixa<\u002Fh2><table>${tr(cash)}<\u002Ftable><h2>Materiais<\u002Fh2><table>${tr(materials)}<\u002Ftable><\u002Fbody><\u002Fhtml>`;\n  downloadText('\\uFEFF'+html,`${safeName(state.meta.projectName)}_SolarPro.xls`,'application/vnd.ms-excel;charset=utf-8');\n}\nfunction exportSummaryCSV(){\n  const c=calc,cf=c.cashflow,cfg=c.configuration;const rows=[['Indicador','Valor','Unidade'],['Projeto',state.meta.projectName,''],['Cliente',state.meta.clientName,''],['Consumo médio',c.consumption.monthlyAvg,'kWh/mês'],['Consumo anual',c.consumption.annual,'kWh/ano'],['Potência necessária',c.requiredKw,'kWp'],['Potência instalada',c.installedKw,'kWp'],['Módulos',c.moduleCount,'un'],['Modelo de módulo',`${c.module?.manufacturer} ${c.module?.model}`,''],['Arquitetura',cfg?.type==='micro'?'Microinversores':'Inversor string',''],['Conversor',`${cfg?.equipment?.manufacturer||''} ${cfg?.equipment?.model||''}`,''],['Potência CA',cfg?.acKw,'kW'],['Relação CC/CA',cfg?.dcAc,''],['Área bruta',c.grossArea,'m²'],['Geração anual',c.annualGeneration,'kWh'],['Investimento',c.investment.total,'R$'],['Economia primeiro ano',cf?.year1Savings,'R$'],['Payback simples',cf?.simplePayback,'anos'],['VPL',cf?.npv,'R$'],['TIR',cf?.irr==null?'':cf.irr*100,'%'],['LCOE',cf?.lcoe,'R$/kWh']];downloadText(toCSV(rows),`${safeName(state.meta.projectName)}_Resumo.csv`,'text/csv;charset=utf-8')\n}\nfunction printSection(section){\n  const map={memorial:'page-memorial',specification:'page-specification',executive:'page-reports'};const pageId=map[section]||'page-reports';$$('.page').forEach(p=>p.classList.remove('print-target'));const page=$(`#${pageId}`);page.classList.add('print-target');if(section==='executive')showPage('reports',false);else showPage(section,false);setTimeout(()=>window.print(),100)\n}\nwindow.addEventListener('afterprint',()=>{$$('.page').forEach(p=>p.classList.remove('print-target'))});\n\nfunction handleClick(e){\n  const go=e.target.closest('[data-go]');if(go){showPage(go.dataset.go);return}\n  const selectModule=e.target.closest('[data-select-module]');if(selectModule){state.selection.moduleId=selectModule.dataset.selectModule;recalculate(true);autoSave();toast('Módulo selecionado.');return}\n  const selectInv=e.target.closest('[data-select-inverter]');if(selectInv){state.selection.architecture='string';state.selection.inverterId=selectInv.dataset.selectInverter;recalculate(true);autoSave();return}\n  const selectMic=e.target.closest('[data-select-micro]');if(selectMic){state.selection.architecture='micro';state.selection.microId=selectMic.dataset.selectMicro;recalculate(true);autoSave();return}\n  const converter=e.target.closest('[data-select-converter]');if(converter){const [arch,id]=converter.dataset.selectConverter.split(':');state.selection.architecture=arch;if(arch==='string')state.selection.inverterId=id;else state.selection.microId=id;recalculate(true);autoSave();toast('Arquitetura selecionada.');return}\n  const delLoad=e.target.closest('[data-delete-load]');if(delLoad){state.futureLoads.splice(n(delLoad.dataset.deleteLoad),1);recalculate(true);autoSave();return}\n  const delPlane=e.target.closest('[data-delete-plane]');if(delPlane){state.planes.splice(n(delPlane.dataset.deletePlane),1);recalculate(true);autoSave();return}\n  const delScenario=e.target.closest('[data-delete-scenario]');if(delScenario){if(state.scenarios.length<=1){toast('Mantenha ao menos um cenário.','error');return}const idx=n(delScenario.dataset.deleteScenario),id=state.scenarios[idx]?.id;state.scenarios.splice(idx,1);if(state.economics.selectedScenarioId===id)state.economics.selectedScenarioId=state.scenarios[0].id;recalculate(true);autoSave();return}\n  const selectScenario=e.target.closest('[data-select-scenario]');if(selectScenario){state.economics.selectedScenarioId=selectScenario.dataset.selectScenario;recalculate(true);autoSave();return}\n  const delRef=e.target.closest('[data-delete-reference]');if(delRef){state.references.splice(n(delRef.dataset.deleteReference),1);recalculate(true);autoSave();return}\n  const openEq=e.target.closest('[data-open-equipment]');if(openEq){openEquipmentModal(openEq.dataset.openEquipment);return}\n  const editEq=e.target.closest('[data-edit-equipment]');if(editEq){const [type,id]=editEq.dataset.editEquipment.split(':');openEquipmentModal(type,id);return}\n  const delEq=e.target.closest('[data-delete-equipment]');if(delEq){const [type,id]=delEq.dataset.deleteEquipment.split(':');deleteEquipment(type,id);return}\n  const catTab=e.target.closest('[data-catalog-tab]');if(catTab){$$('[data-catalog-tab]').forEach(x=>x.classList.toggle('active',x===catTab));$$('.catalog-panel').forEach(x=>x.classList.remove('active'));$(`#catalog-${catTab.dataset.catalogTab}`).classList.add('active');return}\n  const applyAlt=e.target.closest('[data-apply-alt]');if(applyAlt){const alt=comparisonAlternatives[n(applyAlt.dataset.applyAlt)];if(alt){state.selection=deepClone(alt.stateSelection);recalculate(true);autoSave();toast('Alternativa aplicada ao projeto.')}return}\n  const print=e.target.closest('[data-print-section]');if(print){printSection(print.dataset.printSection);return}\n}\ndocument.addEventListener('click',handleClick);\ndocument.addEventListener('input',e=>{\n  const el=e.target;if(el.dataset.path){setPath(state,el.dataset.path,valueFromInput(el));scheduleLightRender()}\n  if(el.id==='moduleSearch'||el.id==='inverterSearch'||el.id==='microSearch')renderCatalogs();\n});\ndocument.addEventListener('change',e=>{const el=e.target;if(el.dataset.path){setPath(state,el.dataset.path,valueFromInput(el));recalculate(true);autoSave()}});\n\n$('#newProjectBtn').addEventListener('click',newProject);\n$('#saveProjectBtn').addEventListener('click',saveProject);\n$('#exportProjectBtn').addEventListener('click',exportProject);\n$('#importProjectBtn').addEventListener('click',()=>$('#projectFileInput').click());\n$('#projectFileInput').addEventListener('change',e=>{if(e.target.files[0])importProjectFile(e.target.files[0]);e.target.value=''});\n$('#projectSelector').addEventListener('change',e=>loadProjectById(e.target.value));\n$('#printReportBtn').addEventListener('click',()=>printSection('executive'));\n$('#fillDemoConsumption').addEventListener('click',()=>{const vals=[520,548,565,610,632,660,685,672,640,600,560,535];state.consumption.months.forEach((m,i)=>{m.kwh=vals[i];m.bill=vals[i]*n(state.consumption.tariff)+n(state.consumption.nonCompensableMonthly)});state.consumption.mode='history';recalculate(true);autoSave()});\n$('#clearConsumption').addEventListener('click',()=>{state.consumption.months.forEach(m=>{m.kwh=0;m.bill=0;m.injected=0;m.credits=0});recalculate(true);autoSave()});\n$('#addFutureLoadBtn').addEventListener('click',()=>{state.futureLoads.push({id:uid('load'),description:'Nova carga',powerW:1000,qty:1,hoursPerDay:2,daysPerMonth:30,utilizationPct:100});recalculate(true);autoSave()});\n$('#normalizeIrradianceBtn').addEventListener('click',()=>{const factors=[1.052,1.043,1.016,.971,.932,.908,.926,.968,1.011,1.052,1.07,1.065],avg=n(state.solar.irradiance,5.5);state.solar.monthlyIrradiance=factors.map(x=>Number((x*avg).toFixed(2)));recalculate(true);autoSave()});\n$('#addPlaneBtn').addEventListener('click',()=>{state.planes.push({id:uid('plane'),name:`Plano ${state.planes.length+1}`,type:'Telhado metálico',length:10,width:5,obstacleArea:0,orientation:'Norte',tilt:10,maxLoad:18});recalculate(true);autoSave()});\n$('#importCatalogBtn').addEventListener('click',()=>$('#catalogFileInput').click());\n$('#exportCatalogBtn').addEventListener('click',exportCatalog);\n$('#catalogFileInput').addEventListener('change',e=>{if(e.target.files[0])importCatalogFile(e.target.files[0]);e.target.value=''});\n$('#runDimensioningBtn').addEventListener('click',()=>autoSelectSolution(state.selection.architecture));\n$('#autoConfigureBtn').addEventListener('click',()=>autoSelectSolution(state.selection.architecture));\n$('#toggleArchitectureBtn').addEventListener('click',()=>autoSelectSolution(state.selection.architecture==='string'?'micro':'string'));\n$('#addScenarioBtn').addEventListener('click',()=>{const sc={id:uid('scenario'),name:`Cenário ${state.scenarios.length+1}`,tariffEscalation:6,compensablePct:85,inflation:4,consumptionGrowth:0,discountRate:9};state.scenarios.push(sc);recalculate(true);autoSave()});\n$('#buildComparisonBtn').addEventListener('click',()=>{renderComparator();toast('Comparação atualizada.')});\n$('#exportCashflowBtn').addEventListener('click',exportCashflowCSV);\n$('#exportMaterialsBtn').addEventListener('click',exportMaterialsCSV);\n$('#addReferenceBtn').addEventListener('click',()=>{state.references.push({id:uid('ref'),code:'',title:'',version:'',scope:'',source:'',status:'Verificar'});recalculate(true);autoSave()});\n$('#resetAppBtn').addEventListener('click',()=>{state=defaultState();state.meta.projectId=uid('project');activePage='dashboard';renderAll();autoSave();toast('Dados demonstrativos restaurados.')});\n$('#reportExportJson').addEventListener('click',exportProject);\n$('#exportExcelBtn').addEventListener('click',exportExcelCompatible);\n$('#exportSummaryCsvBtn').addEventListener('click',exportSummaryCSV);\n$('#reportExportCatalog').addEventListener('click',exportCatalog);\n$('#closeModalBtn').addEventListener('click',closeModal);\n$('#modalBackdrop').addEventListener('click',e=>{if(e.target===$('#modalBackdrop'))closeModal()});\nwindow.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});\nwindow.addEventListener('resize',()=>renderPageSpecific(activePage));\n\nfunction init(){\n  state=loadInitialState();if(!state.meta.projectId)state.meta.projectId=uid('project');\n  calc=computeSystem(state);renderAll();showPage('dashboard',false);autoSave();\n}\ninit();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
