  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

"<!DOCTYPE html>\n<html lang=\"pt-BR\"><head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>TermoPro — Calculadora de Carga Térmica<\u002Ftitle>\n<style>\n:root{\n  --bg:#eef2f7;--panel:#ffffff;--ink:#172033;--muted:#637083;--line:#d9e1ec;\n  --primary:#0b6bcb;--primary-2:#07539f;--accent:#00a67d;--warn:#e58a00;--danger:#c43d4b;\n  --soft:#eaf4ff;--soft2:#eaf9f4;--shadow:0 10px 30px rgba(22,42,72,.10);--radius:16px;\n}\n*{box-sizing:border-box}\nbody{margin:0;font-family:Inter,Segoe UI,Roboto,Arial,sans-serif;background:var(--bg);color:var(--ink)}\nbutton,input,select,textarea{font:inherit}\n.app{min-height:100vh}\n.topbar{position:sticky;top:0;z-index:30;background:linear-gradient(135deg,#082d55,#0b6bcb);color:white;box-shadow:0 4px 18px rgba(0,0,0,.22)}\n.topbar-inner{max-width:1500px;margin:auto;padding:14px 24px;display:flex;gap:18px;align-items:center;justify-content:space-between}\n.brand{display:flex;align-items:center;gap:12px}\n.logo{width:43px;height:43px;border-radius:12px;background:rgba(255,255,255,.16);display:grid;place-items:center;font-size:25px;border:1px solid rgba(255,255,255,.25)}\n.brand h1{font-size:19px;margin:0}.brand small{display:block;opacity:.80;margin-top:2px}\n.top-actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}\n.btn{border:0;border-radius:10px;padding:9px 13px;cursor:pointer;font-weight:700;transition:.18s;display:inline-flex;gap:7px;align-items:center;justify-content:center}\n.btn:hover{transform:translateY(-1px);filter:brightness(.98)}\n.btn.primary{background:var(--primary);color:#fff}.btn.white{background:#fff;color:#0a4d8b}.btn.ghost{background:rgba(255,255,255,.12);color:#fff;border:1px solid rgba(255,255,255,.28)}\n.btn.secondary{background:#e8eef6;color:#263b55}.btn.success{background:var(--accent);color:white}.btn.danger{background:#ffe8eb;color:#a52236}.btn.sm{padding:6px 9px;font-size:12px}\n.shell{max-width:1500px;margin:0 auto;padding:22px;display:grid;grid-template-columns:260px minmax(0,1fr);gap:20px}\n.sidebar{background:var(--panel);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px;height:fit-content;position:sticky;top:92px}\n.project-box{padding:11px;background:linear-gradient(135deg,var(--soft),#fff);border:1px solid #cde4fb;border-radius:12px;margin-bottom:12px}\n.project-box b{display:block;font-size:14px}.project-box span{font-size:12px;color:var(--muted)}\n.nav{display:flex;flex-direction:column;gap:5px}.nav button{background:transparent;border:0;border-radius:10px;text-align:left;padding:11px 12px;cursor:pointer;color:#35445a;font-weight:650;display:flex;justify-content:space-between;align-items:center}.nav button.active{background:var(--primary);color:#fff}.nav button:hover:not(.active){background:#edf3f9}\n.content{min-width:0}.page{display:none}.page.active{display:block}\n.page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:15px}.page-head h2{margin:0;font-size:24px}.page-head p{margin:5px 0 0;color:var(--muted)}\n.card{background:var(--panel);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;margin-bottom:18px;border:1px solid rgba(213,224,237,.8)}\n.card h3{margin:0 0 4px;font-size:17px}.card .sub{margin:0 0 16px;color:var(--muted);font-size:13px}\n.grid{display:grid;grid-template-columns:repeat(12,minmax(0,1fr));gap:14px}.c12{grid-column:span 12}.c8{grid-column:span 8}.c6{grid-column:span 6}.c4{grid-column:span 4}.c3{grid-column:span 3}.c2{grid-column:span 2}\n.field label{display:block;font-size:12px;font-weight:800;margin:0 0 6px;color:#3f4e62}.field input,.field select,.field textarea{width:100%;border:1px solid var(--line);border-radius:9px;padding:9px 10px;background:#fff;color:var(--ink);outline:none}.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(11,107,203,.12)}\n.field small{display:block;color:var(--muted);margin-top:5px;font-size:11px}.inline{display:flex;gap:9px;align-items:center}.inline>*{min-width:0}\n.check{display:flex;align-items:center;gap:8px;margin-top:24px;font-size:13px}.check input{width:auto}\n.table-wrap{overflow:auto;border:1px solid var(--line);border-radius:12px}table{width:100%;border-collapse:collapse;min-width:900px}th,td{padding:9px 8px;border-bottom:1px solid #e7edf4;text-align:left;font-size:12px;vertical-align:middle}th{background:#f2f6fa;color:#46566c;position:sticky;top:0;z-index:2}td input,td select{width:100%;min-width:80px;border:1px solid #d4dce7;border-radius:7px;padding:6px;background:white}tr:last-child td{border-bottom:0}.num{text-align:right;font-variant-numeric:tabular-nums}.center{text-align:center}\n.toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}.pill{display:inline-flex;padding:4px 8px;border-radius:999px;font-size:11px;font-weight:800;background:#e9eff7;color:#40516a}.pill.ok{background:#dff7ef;color:#08795e}.pill.warn{background:#fff0d7;color:#a26100}.pill.bad{background:#ffe4e8;color:#a32034}\n.weather-banner{display:grid;grid-template-columns:1fr auto;gap:14px;padding:14px;border-radius:12px;background:linear-gradient(120deg,#eaf4ff,#f8fbff);border:1px solid #cce3fb}.weather-stats{display:flex;gap:18px;flex-wrap:wrap;margin-top:8px}.weather-stats b{font-size:17px}.weather-stats span{display:block;font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}\n.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}.kpi{padding:15px;border-radius:13px;background:#f6f9fc;border:1px solid #dfe7f0}.kpi span{display:block;font-size:11px;color:var(--muted);font-weight:800;text-transform:uppercase}.kpi strong{display:block;font-size:24px;margin-top:4px}.kpi small{color:var(--muted)}\n.kpi.blue{background:#eaf4ff;border-color:#c9e2fb}.kpi.green{background:#e9f9f3;border-color:#c7efdf}.kpi.orange{background:#fff4e2;border-color:#f6d9aa}.kpi.red{background:#ffeaed;border-color:#f4c8ce}\n.chart-box{height:330px;position:relative}.chart-box canvas{width:100%;height:100%}.legend{display:flex;gap:15px;flex-wrap:wrap;margin-top:10px;font-size:12px}.legend i{display:inline-block;width:11px;height:11px;border-radius:3px;margin-right:5px}.dot1{background:#0b6bcb}.dot2{background:#00a67d}.dot3{background:#e58a00}.dot4{background:#c43d4b}\n.notice{padding:12px 14px;border-radius:11px;background:#fff8e9;border:1px solid #f1d9a5;color:#76500e;font-size:13px}.notice.info{background:#edf6ff;border-color:#c9e4ff;color:#154f82}.notice.ok{background:#eafaf4;border-color:#c9eedf;color:#0a6d55}\n.split{display:grid;grid-template-columns:1.25fr .75fr;gap:16px}.result-list{display:grid;gap:9px}.result-row{display:flex;justify-content:space-between;gap:15px;padding:10px 12px;border-radius:10px;background:#f6f8fb;border:1px solid #e3e9f1}.result-row b{font-variant-numeric:tabular-nums}.bar{height:9px;border-radius:99px;background:#e5ebf2;overflow:hidden;margin-top:5px}.bar>i{display:block;height:100%;background:linear-gradient(90deg,#0b6bcb,#00a67d)}\n.report{background:#fff}.report-title{text-align:center;border-bottom:2px solid #1c3150;padding-bottom:14px;margin-bottom:18px}.report-title h1{margin:0;font-size:26px}.report-title p{margin:5px;color:#607086}.report-section{margin:20px 0}.report-section h3{border-left:4px solid var(--primary);padding-left:9px}.mini-table{min-width:0}.mini-table td,.mini-table th{padding:7px}\n.footer-note{font-size:11px;color:var(--muted);margin-top:15px}.empty{padding:35px;text-align:center;color:var(--muted)}\n.modal-backdrop{display:none;position:fixed;inset:0;background:rgba(10,26,48,.55);z-index:100;align-items:center;justify-content:center;padding:20px}.modal-backdrop.open{display:flex}.modal{background:white;border-radius:16px;max-width:760px;width:100%;max-height:88vh;overflow:auto;box-shadow:0 30px 80px rgba(0,0,0,.3);padding:20px}.modal h3{margin-top:0}\n.toast{position:fixed;right:22px;bottom:22px;z-index:200;background:#172b45;color:#fff;padding:12px 15px;border-radius:10px;box-shadow:var(--shadow);opacity:0;transform:translateY(15px);pointer-events:none;transition:.2s}.toast.show{opacity:1;transform:translateY(0)}\n\n.system-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}.system-card{border:1px solid var(--line);border-radius:14px;padding:15px;background:linear-gradient(145deg,#fff,#f8fbfe);position:relative}.system-card h4{margin:0 0 7px;font-size:16px}.system-card p{margin:5px 0;color:var(--muted);font-size:12px;line-height:1.45}.system-card .tag{display:inline-flex;margin:2px 4px 2px 0;padding:3px 7px;border-radius:999px;background:#edf3f9;color:#40516a;font-size:10px;font-weight:800}.system-card.recommended{border-color:#78d9be;box-shadow:0 0 0 3px rgba(0,166,125,.08)}.system-card.recommended:after{content:'Compatível';position:absolute;right:10px;top:10px;background:#dff7ef;color:#08795e;border-radius:999px;padding:3px 7px;font-size:10px;font-weight:800}.money{font-variant-numeric:tabular-nums;white-space:nowrap}.rank{width:27px;height:27px;border-radius:50%;display:inline-grid;place-items:center;background:#eaf4ff;color:#07539f;font-weight:900}.economic-chart{height:330px;position:relative}.economic-chart canvas{width:100%;height:100%}.muted-box{background:#f6f9fc;border:1px solid #dfe7f0;border-radius:12px;padding:12px;font-size:12px;color:var(--muted)}.tr-note{color:#07539f;font-weight:800}.input-compact{min-width:72px!important}.status-good{color:#08795e;font-weight:800}.status-warn{color:#a26100;font-weight:800}\n@media(max-width:1200px){.system-grid{grid-template-columns:repeat(2,minmax(0,1fr))}}\n@media(max-width:650px){.system-grid{grid-template-columns:1fr}}\n\n@media(max-width:1050px){.shell{grid-template-columns:1fr}.sidebar{position:static}.nav{flex-direction:row;overflow:auto}.nav button{white-space:nowrap}.grid .c2,.grid .c3,.grid .c4{grid-column:span 6}.split{grid-template-columns:1fr}.kpis{grid-template-columns:repeat(2,1fr)}}\n@media(max-width:650px){.topbar-inner{padding:12px;align-items:flex-start}.brand small{display:none}.shell{padding:12px}.card{padding:14px}.grid .c2,.grid .c3,.grid .c4,.grid .c6,.grid .c8{grid-column:span 12}.kpis{grid-template-columns:1fr}.page-head{display:block}.top-actions .btn span{display:none}}\n@media print{\n  body{background:#fff}.topbar,.sidebar,.no-print,.page:not(#reportPage){display:none!important}.shell{display:block;padding:0}.content{width:100%}.page#reportPage{display:block!important}.card{box-shadow:none;border:0;padding:0}.report{font-size:11px}.report-section{page-break-inside:avoid}.footer-note{display:block} @page{size:A4;margin:14mm}\n  #tp-splash{display:none!important}\n}\n\n/* ============================= TELA DE ABERTURA (TermoPro) ============================= */\n#tp-splash{position:fixed;inset:0;z-index:9999;overflow:hidden;font-family:Inter,Segoe UI,Roboto,Arial,sans-serif;background:radial-gradient(130% 130% at 28% 18%,#0d3566 0%,#082247 46%,#04122b 100%);transition:opacity .7s ease,visibility .7s ease}\n#tp-splash.tp-hide{opacity:0;visibility:hidden;pointer-events:none}\n#tp-canvas{position:absolute;inset:0;width:100%;height:100%;display:block}\n.tp-glow{position:absolute;left:50%;top:44%;width:900px;height:900px;transform:translate(-50%,-50%);pointer-events:none;background:radial-gradient(circle,rgba(0,166,125,.16),rgba(11,107,203,.10) 42%,transparent 66%);animation:tpBreath 6s ease-in-out infinite}\n@keyframes tpBreath{0%,100%{opacity:.55;transform:translate(-50%,-50%) scale(.95)}50%{opacity:1;transform:translate(-50%,-50%) scale(1.08)}}\n/* anel de radiação térmica (ondas expansivas) */\n.tp-rings{position:absolute;left:50%;top:44%;transform:translate(-50%,-50%);pointer-events:none}\n.tp-ring{position:absolute;left:50%;top:50%;width:60px;height:60px;border-radius:50%;transform:translate(-50%,-50%);border:2px solid;opacity:0;animation:tpRing 3.6s cubic-bezier(.2,.6,.3,1) infinite}\n.tp-ring:nth-child(1){border-color:#c43d4b;animation-delay:0s}\n.tp-ring:nth-child(2){border-color:#e58a00;animation-delay:.9s}\n.tp-ring:nth-child(3){border-color:#00a67d;animation-delay:1.8s}\n.tp-ring:nth-child(4){border-color:#2f9be0;animation-delay:2.7s}\n@keyframes tpRing{0%{width:60px;height:60px;opacity:0}8%{opacity:.75}100%{width:760px;height:760px;opacity:0}}\n/* ventilador (climatização) */\n.tp-fan{position:absolute;left:50%;top:44%;width:520px;height:520px;transform:translate(-50%,-50%);border-radius:50%;pointer-events:none;opacity:.16;background:conic-gradient(from 0deg,transparent 0deg,#2f9be0 18deg,transparent 40deg,#00a67d 92deg,transparent 118deg,#e58a00 182deg,transparent 210deg,#c43d4b 272deg,transparent 300deg,#2f9be0 352deg,transparent 360deg);filter:blur(2px);animation:tpSpin 7s linear infinite}\n@keyframes tpSpin{to{transform:translate(-50%,-50%) rotate(360deg)}}\n/* correntes de ar */\n.tp-air{position:absolute;inset:0;pointer-events:none;overflow:hidden}\n.tp-stream{position:absolute;height:2px;width:44%;border-radius:99px;left:-46%;opacity:0;background:linear-gradient(90deg,transparent,rgba(120,200,255,.75),transparent);animation:tpFlow 5.5s linear infinite}\n.tp-stream:nth-child(1){top:22%;animation-delay:0s;animation-duration:5s}\n.tp-stream:nth-child(2){top:34%;animation-delay:1.4s;background:linear-gradient(90deg,transparent,rgba(120,240,200,.7),transparent)}\n.tp-stream:nth-child(3){top:58%;animation-delay:.6s;animation-duration:6.5s;background:linear-gradient(90deg,transparent,rgba(255,205,120,.7),transparent)}\n.tp-stream:nth-child(4){top:70%;animation-delay:2.2s;animation-duration:5.8s;background:linear-gradient(90deg,transparent,rgba(120,200,255,.7),transparent)}\n.tp-stream:nth-child(5){top:82%;animation-delay:3.1s;background:linear-gradient(90deg,transparent,rgba(255,150,150,.6),transparent)}\n@keyframes tpFlow{0%{left:-46%;opacity:0}12%{opacity:1}88%{opacity:1}100%{left:102%;opacity:0}}\n\n.tp-stage{position:absolute;inset:0;z-index:5;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;padding:28px;text-align:center}\n.tp-brand{display:flex;flex-direction:column;align-items:center;transition:transform .7s cubic-bezier(.2,.7,.2,1)}\n.tp-mark{position:relative;width:120px;height:120px;margin-bottom:22px;opacity:0;transform:scale(.6);animation:tpPop .9s cubic-bezier(.2,1.3,.4,1) .2s forwards}\n.tp-mark .tp-mark-ring{position:absolute;inset:0;border-radius:50%;background:conic-gradient(from 90deg,#2f9be0,#00a67d,#e58a00,#c43d4b,#2f9be0);animation:tpSpin 5s linear infinite;box-shadow:0 0 50px rgba(0,166,125,.45)}\n.tp-mark .tp-mark-core{position:absolute;inset:9px;border-radius:50%;background:radial-gradient(circle at 35% 30%,#0f3a6e,#071d3b);display:grid;place-items:center;font-size:52px;text-shadow:0 4px 18px rgba(0,0,0,.5)}\n@keyframes tpPop{to{opacity:1;transform:scale(1)}}\n.tp-title{margin:0;font-size:76px;font-weight:800;letter-spacing:-.03em;line-height:1;background:linear-gradient(96deg,#7cc4ff 0%,#48e0b4 34%,#ffc255 68%,#ff8a97 100%);background-size:220% 100%;-webkit-background-clip:text;background-clip:text;color:transparent;opacity:0;transform:translateY(18px);animation:tpUp .8s ease .45s forwards,tpShine 6s ease-in-out infinite}\n@keyframes tpShine{0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}\n.tp-sub{margin:16px 0 0;font-size:20px;font-weight:500;color:#c7ddf5;max-width:620px;opacity:0;transform:translateY(14px);animation:tpUp .8s ease .75s forwards}\n@keyframes tpUp{to{opacity:1;transform:none}}\n.tp-progress{margin:34px auto 0;width:260px;height:5px;border-radius:99px;background:rgba(255,255,255,.14);overflow:hidden;opacity:0;animation:tpUp .6s ease 1s forwards}\n.tp-progress>i{display:block;height:100%;width:0;border-radius:99px;background:linear-gradient(90deg,#2f9be0,#00a67d,#e58a00,#c43d4b);animation:tpLoad 5s linear .1s forwards}\n@keyframes tpLoad{to{width:100%}}\n.tp-loading{margin-top:12px;font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:#8fb2d8;opacity:0;animation:tpUp .6s ease 1s forwards}\n\n/* aviso legal */\n.tp-legal{width:min(620px,calc(100% - 40px));max-height:0;overflow:hidden;opacity:0;transform:translateY(26px);transition:max-height .7s ease,opacity .6s ease .1s,transform .7s cubic-bezier(.2,.7,.2,1),margin-top .7s ease}\n.tp-stage.tp-ready .tp-legal{max-height:80vh;opacity:1;transform:none;margin-top:36px;overflow:auto}\n.tp-stage.tp-ready .tp-brand{transform:translateY(-6px) scale(.9)}\n.tp-stage.tp-ready .tp-progress,.tp-stage.tp-ready .tp-loading{display:none}\n.tp-card{background:rgba(255,255,255,.98);border-radius:20px;padding:26px 28px;box-shadow:0 34px 90px rgba(2,10,26,.55);text-align:left;color:#243349}\n.tp-card h3{margin:0 0 6px;font-size:20px;color:#0b2a52;display:flex;align-items:center;gap:9px}\n.tp-card .tp-legal-body{font-size:13px;line-height:1.62;color:#455568;max-height:34vh;overflow:auto;padding-right:8px;margin:10px 0 4px}\n.tp-card .tp-legal-body p{margin:0 0 10px}\n.tp-card .tp-legal-body b{color:#243349}\n.tp-agree{display:flex;align-items:flex-start;gap:11px;margin:16px 0 18px;padding:13px 14px;border-radius:12px;background:#eef4fb;border:1px solid #cfe1f5;cursor:pointer;user-select:none}\n.tp-agree input{width:20px;height:20px;margin:1px 0 0;accent-color:#0b6bcb;cursor:pointer;flex:0 0 auto}\n.tp-agree span{font-size:13.5px;color:#2b3c52;font-weight:600;line-height:1.4}\n.tp-actions{display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap}\n.tp-btn{border:0;border-radius:11px;padding:13px 22px;font-size:15px;font-weight:800;cursor:pointer;transition:.18s;color:#fff;background:linear-gradient(135deg,#0b6bcb,#00a67d);box-shadow:0 10px 26px rgba(11,107,203,.34)}\n.tp-btn:hover:not(:disabled){transform:translateY(-1px);filter:brightness(1.04)}\n.tp-btn:disabled{opacity:.42;cursor:not-allowed;box-shadow:none;filter:grayscale(.3)}\n@media(max-width:640px){.tp-title{font-size:52px}.tp-sub{font-size:16px}.tp-mark{width:96px;height:96px}.tp-mark .tp-mark-core{font-size:40px}.tp-card{padding:20px 18px}}\n@media(prefers-reduced-motion:reduce){.tp-ring,.tp-fan,.tp-stream,.tp-mark-ring,.tp-title{animation-duration:.01ms!important;animation-iteration-count:1!important}}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<div id=\"tp-splash\" role=\"dialog\" aria-label=\"Tela de abertura do TermoPro\">\n  <canvas id=\"tp-canvas\"><\u002Fcanvas>\n  <div class=\"tp-glow\"><\u002Fdiv>\n  <div class=\"tp-fan\"><\u002Fdiv>\n  <div class=\"tp-rings\"><span class=\"tp-ring\"><\u002Fspan><span class=\"tp-ring\"><\u002Fspan><span class=\"tp-ring\"><\u002Fspan><span class=\"tp-ring\"><\u002Fspan><\u002Fdiv>\n  <div class=\"tp-air\"><span class=\"tp-stream\"><\u002Fspan><span class=\"tp-stream\"><\u002Fspan><span class=\"tp-stream\"><\u002Fspan><span class=\"tp-stream\"><\u002Fspan><span class=\"tp-stream\"><\u002Fspan><\u002Fdiv>\n  <div class=\"tp-stage\" id=\"tp-stage\">\n    <div class=\"tp-brand\">\n      <div class=\"tp-mark\"><span class=\"tp-mark-ring\"><\u002Fspan><span class=\"tp-mark-core\">🌡️<\u002Fspan><\u002Fdiv>\n      <h1 class=\"tp-title\">TermoPro<\u002Fh1>\n      <p class=\"tp-sub\">Calculadora de Carga Térmica para Sistemas de Climatização<\u002Fp>\n      <div class=\"tp-progress\"><i><\u002Fi><\u002Fdiv>\n      <div class=\"tp-loading\">Preparando o ambiente de cálculo…<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"tp-legal\">\n      <div class=\"tp-card\">\n        <h3>⚠️ Aviso legal e termos de uso<\u002Fh3>\n        <div class=\"tp-legal-body\">\n          <p>O <b>TermoPro<\u002Fb> é uma ferramenta de apoio à engenharia que realiza estimativas de carga térmica por meio de um <b>balanço térmico horário simplificado<\u002Fb>, destinado a <b>estudos preliminares<\u002Fb> e à comparação de alternativas de climatização.<\u002Fp>\n          <p>Os resultados têm caráter <b>indicativo e comparativo<\u002Fb> e <b>não substituem<\u002Fb> o projeto executivo de climatização, a verificação normativa aplicável, a seleção de equipamentos por curvas de desempenho de fabricantes, nem a <b>responsabilidade técnica<\u002Fb> do profissional habilitado.<\u002Fp>\n          <p>Os valores monetários, tarifas e parâmetros de custo são exemplos paramétricos editáveis e devem ser substituídos por cotações e composições de custos locais antes de qualquer decisão. Todos os dados são armazenados <b>localmente neste navegador<\u002Fb>, sem envio a servidores.<\u002Fp>\n          <p>Ao prosseguir, o usuário declara estar ciente dessas limitações e assume integral responsabilidade pela interpretação e pelo uso dos resultados.<\u002Fp>\n        <\u002Fdiv>\n        <label class=\"tp-agree\" for=\"tp-check\">\n          <input type=\"checkbox\" id=\"tp-check\">\n          <span>Li e concordo com o aviso legal e os termos de uso acima.<\u002Fspan>\n        <\u002Flabel>\n        <div class=\"tp-actions\">\n          <button class=\"tp-btn\" id=\"tp-enter\" disabled=\"\">Concordar e acessar o TermoPro<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<script>\n(function(){\n  var splash=document.getElementById('tp-splash');\n  if(!splash) return;\n  document.documentElement.style.overflow='hidden';\n  document.body.style.overflow='hidden';\n\n  /* ---- partículas de convecção (calor sobe, ar frio desce) ---- */\n  var cv=document.getElementById('tp-canvas'),ctx=cv.getContext('2d'),W,H,parts=[],raf,dpr=Math.min(window.devicePixelRatio||1,2);\n  function resize(){W=cv.clientWidth;H=cv.clientHeight;cv.width=W*dpr;cv.height=H*dpr;ctx.setTransform(dpr,0,0,dpr,0,0);}\n  resize();window.addEventListener('resize',resize);\n  var warm=['#c43d4b','#e58a00','#00a67d','#2f9be0','#7cc4ff'];\n  function spawn(){\n    var hot=Math.random()<0.62;\n    return{x:Math.random()*W,\n      y:hot?H+10:-10,\n      r:1.4+Math.random()*3.4,\n      vy:hot?-(0.35+Math.random()*0.9):(0.3+Math.random()*0.7),\n      vx:(Math.random()-.5)*0.5,\n      ph:Math.random()*Math.PI*2,\n      sw:0.6+Math.random()*1.4,\n      c:warm[Math.floor(Math.random()*(hot?3:warm.length))+(hot?0:2>=warm.length?0:0)],\n      a:0.15+Math.random()*0.5};\n  }\n  for(var i=0;i<90;i++){var p=spawn();p.y=Math.random()*H;parts.push(p);}\n  function frame(){\n    ctx.clearRect(0,0,W,H);\n    for(var i=0;i<parts.length;i++){\n      var p=parts[i];p.ph+=0.02;p.x+=p.vx+Math.sin(p.ph)*p.sw*0.3;p.y+=p.vy;\n      if(p.y<-20||p.y>H+20){parts[i]=spawn();continue;}\n      ctx.globalAlpha=p.a;ctx.fillStyle=p.c;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,6.2832);ctx.fill();\n    }\n    ctx.globalAlpha=1;raf=requestAnimationFrame(frame);\n  }\n  frame();\n\n  /* ---- sequência: 5s de animação, depois aviso legal ---- */\n  var stage=document.getElementById('tp-stage'),chk=document.getElementById('tp-check'),btn=document.getElementById('tp-enter');\n  var revealTimer=setTimeout(function(){stage.classList.add('tp-ready');},5000);\n  chk.addEventListener('change',function(){btn.disabled=!chk.checked;});\n  btn.addEventListener('click',function(){\n    if(btn.disabled) return;\n    splash.classList.add('tp-hide');\n    document.documentElement.style.overflow='';\n    document.body.style.overflow='';\n    setTimeout(function(){\n      cancelAnimationFrame(raf);\n      window.removeEventListener('resize',resize);\n      splash.parentNode&&splash.parentNode.removeChild(splash);\n    },800);\n  });\n})();\n<\u002Fscript>\n<div class=\"app\">\n<header class=\"topbar\">\n  <div class=\"topbar-inner\">\n    <div class=\"brand\"><div class=\"logo\">🌡️<\u002Fdiv><div><h1>TermoPro<\u002Fh1><small>Calculadora de Carga Térmica para Sistemas de Climatização<\u002Fsmall><\u002Fdiv><\u002Fdiv>\n    <div class=\"top-actions\">\n      <button class=\"btn ghost\" onclick=\"openProjectModal()\">📁 <span>Projetos<\u002Fspan><\u002Fbutton>\n      <button class=\"btn ghost\" onclick=\"saveProject()\">💾 <span>Salvar<\u002Fspan><\u002Fbutton>\n      <button class=\"btn white\" onclick=\"calculateAll(true)\">▶ <span>Calcular<\u002Fspan><\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fheader>\n<div class=\"shell\">\n  <aside class=\"sidebar\">\n    <div class=\"project-box\"><b id=\"sideProjectName\">Novo projeto<\u002Fb><span id=\"sideProjectMeta\">Sem localização definida<\u002Fspan><\u002Fdiv>\n    <nav class=\"nav\" id=\"nav\">\n      <button data-page=\"projectPage\" class=\"active\">1. Projeto <span>›<\u002Fspan><\u002Fbutton>\n      <button data-page=\"climatePage\">2. Clima <span>›<\u002Fspan><\u002Fbutton>\n      <button data-page=\"zonesPage\">3. Ambientes <span>›<\u002Fspan><\u002Fbutton>\n      <button data-page=\"envelopePage\">4. Envoltória <span>›<\u002Fspan><\u002Fbutton>\n      <button data-page=\"resultsPage\">5. Resultados <span>›<\u002Fspan><\u002Fbutton>\n      <button data-page=\"systemPage\">6. Sistema de Climatização <span>›<\u002Fspan><\u002Fbutton>\n      <button data-page=\"economicPage\">7. Análise Econômica <span>›<\u002Fspan><\u002Fbutton>\n      <button data-page=\"reportPage\">8. Relatório <span>›<\u002Fspan><\u002Fbutton>\n    <\u002Fnav>\n    <div class=\"notice info\" style=\"margin-top:14px\"><b>Modelo:<\u002Fb> balanço térmico horário simplificado, adequado a estudos preliminares e comparação de alternativas.<\u002Fdiv>\n  <\u002Faside>\n  <main class=\"content\">\n    <section id=\"projectPage\" class=\"page active\">\n      <div class=\"page-head\"><div><h2>Dados do projeto<\u002Fh2><p>Identificação, critérios de conforto e premissas gerais.<\u002Fp><\u002Fdiv><span class=\"pill\">Armazenamento local<\u002Fspan><\u002Fdiv>\n      <div class=\"card\">\n        <h3>Identificação<\u002Fh3><p class=\"sub\">Os dados são mantidos apenas no navegador deste equipamento.<\u002Fp>\n        <div class=\"grid\">\n          <div class=\"field c6\"><label>Nome do projeto<\u002Flabel><input id=\"projectName\" value=\"Novo projeto\" oninput=\"syncProjectHeader()\"><\u002Fdiv>\n          <div class=\"field c3\"><label>Cliente<\u002Flabel><input id=\"client\" placeholder=\"Nome do cliente\"><\u002Fdiv>\n          <div class=\"field c3\"><label>Responsável técnico<\u002Flabel><input id=\"engineer\" placeholder=\"Nome / CREA\"><\u002Fdiv>\n          <div class=\"field c8\"><label>Descrição<\u002Flabel><textarea id=\"description\" rows=\"2\" placeholder=\"Objeto, uso da edificação e observações gerais\"><\u002Ftextarea><\u002Fdiv>\n          <div class=\"field c2\"><label>Data-base<\u002Flabel><input id=\"baseDate\" type=\"date\"><\u002Fdiv>\n          <div class=\"field c2\"><label>Margem de projeto (%)<\u002Flabel><input id=\"safetyFactor\" type=\"number\" min=\"0\" max=\"40\" step=\"1\" value=\"10\"><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"card\">\n        <h3>Condições internas e parâmetros<\u002Fh3><p class=\"sub\">Temperaturas e umidade-alvo usadas no balanço térmico.<\u002Fp>\n        <div class=\"grid\">\n          <div class=\"field c3\"><label>Resfriamento — temperatura (°C)<\u002Flabel><input id=\"coolSet\" type=\"number\" step=\"0.5\" value=\"24\"><\u002Fdiv>\n          <div class=\"field c3\"><label>Resfriamento — umidade relativa (%)<\u002Flabel><input id=\"coolRH\" type=\"number\" min=\"30\" max=\"70\" value=\"50\"><\u002Fdiv>\n          <div class=\"field c3\"><label>Aquecimento — temperatura (°C)<\u002Flabel><input id=\"heatSet\" type=\"number\" step=\"0.5\" value=\"20\"><\u002Fdiv>\n          <div class=\"field c3\"><label>Temperatura do solo (°C)<\u002Flabel><input id=\"groundTemp\" type=\"number\" step=\"0.5\" value=\"22\"><\u002Fdiv>\n          <div class=\"field c3\"><label>Albedo do entorno<\u002Flabel><input id=\"albedo\" type=\"number\" min=\"0\" max=\"1\" step=\"0.05\" value=\"0.20\"><\u002Fdiv>\n          <div class=\"field c3\"><label>Coef. externo hₒ (W/m²·K)<\u002Flabel><input id=\"hout\" type=\"number\" min=\"5\" max=\"40\" step=\"1\" value=\"20\"><\u002Fdiv>\n          <div class=\"field c3\"><label>Fator radiante para iluminação<\u002Flabel><input id=\"lightRadFactor\" type=\"number\" min=\"0\" max=\"1\" step=\"0.05\" value=\"0.70\"><\u002Fdiv>\n          <div class=\"field c3\"><label>Fator de simultaneidade geral<\u002Flabel><input id=\"diversity\" type=\"number\" min=\"0.1\" max=\"1\" step=\"0.05\" value=\"1\"><\u002Fdiv>\n          <div class=\"field c12\"><label class=\"check\"><input id=\"conservativeHeat\" type=\"checkbox\" checked=\"\"> No aquecimento, desconsiderar ganhos solares e internos favoráveis (critério conservador).<\u002Flabel><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"card\">\n        <h3>Referenciais e limitações<\u002Fh3>\n        <div class=\"notice\">O aplicativo implementa equações transparentes de transmissão, radiação solar, cargas internas, ventilação e infiltração. Não reproduz integralmente os algoritmos proprietários das normas e não substitui projeto de climatização, verificação normativa, seleção de equipamentos ou responsabilidade técnica.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <section id=\"climatePage\" class=\"page\">\n      <div class=\"page-head\"><div><h2>Clima e localização<\u002Fh2><p>Busca geográfica e obtenção automática de séries horárias.<\u002Fp><\u002Fdiv><span id=\"weatherStatus\" class=\"pill warn\">Clima não carregado<\u002Fspan><\u002Fdiv>\n      <div class=\"card\">\n        <h3>Localização<\u002Fh3><p class=\"sub\">A pesquisa usa geocodificação pública. Selecione uma localidade e carregue os dados.<\u002Fp>\n        <div class=\"grid\">\n          <div class=\"field c6\"><label>Cidade, estado ou país<\u002Flabel><div class=\"inline\"><input id=\"locationQuery\" placeholder=\"Ex.: São Luís, Maranhão\"><button class=\"btn primary\" onclick=\"searchLocation()\">Buscar<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n          <div class=\"field c6\"><label>Resultado da busca<\u002Flabel><select id=\"locationResults\" onchange=\"selectLocation()\"><option value=\"\">Faça uma busca...<\u002Foption><\u002Fselect><\u002Fdiv>\n          <div class=\"field c3\"><label>Latitude<\u002Flabel><input id=\"latitude\" type=\"number\" step=\"0.0001\" value=\"-2.5307\"><\u002Fdiv>\n          <div class=\"field c3\"><label>Longitude<\u002Flabel><input id=\"longitude\" type=\"number\" step=\"0.0001\" value=\"-44.3068\"><\u002Fdiv>\n          <div class=\"field c3\"><label>Fuso horário<\u002Flabel><input id=\"timezone\" value=\"America/Fortaleza\"><\u002Fdiv>\n          <div class=\"field c3\"><label>Elevação (m)<\u002Flabel><input id=\"elevation\" type=\"number\" value=\"4\"><\u002Fdiv>\n          <div class=\"field c12\"><button class=\"btn success\" onclick=\"loadWeather()\">☁️ Obter previsão horária automática<\u002Fbutton><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"card\">\n        <div id=\"weatherBanner\" class=\"weather-banner\">\n          <div><b id=\"weatherPlace\">São Luís, Maranhão, Brasil<\u002Fb><div id=\"weatherMessage\" style=\"color:var(--muted);font-size:13px;margin-top:4px\">Use a busca automática ou informe condições de projeto manualmente.<\u002Fdiv><div class=\"weather-stats\"><div><b id=\"wxMax\">—<\u002Fb><span>Máxima<\u002Fspan><\u002Fdiv><div><b id=\"wxMin\">—<\u002Fb><span>Mínima<\u002Fspan><\u002Fdiv><div><b id=\"wxRH\">—<\u002Fb><span>UR de pico<\u002Fspan><\u002Fdiv><div><b id=\"wxSolar\">—<\u002Fb><span>Radiação máx.<\u002Fspan><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n          <div><span class=\"pill\" id=\"weatherSource\">Manual<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"card\">\n        <h3>Condições externas de cálculo<\u002Fh3><p class=\"sub\">A previsão automática é útil para teste. Para projeto, revise com dados climáticos de projeto aplicáveis à localidade.<\u002Fp>\n        <div class=\"grid\">\n          <div class=\"field c3\"><label>Máxima externa de resfriamento (°C)<\u002Flabel><input id=\"designCoolT\" type=\"number\" step=\"0.1\" value=\"34\"><\u002Fdiv>\n          <div class=\"field c3\"><label>UR externa no pico (%)<\u002Flabel><input id=\"designCoolRH\" type=\"number\" min=\"1\" max=\"100\" value=\"65\"><\u002Fdiv>\n          <div class=\"field c3\"><label>Mínima externa de aquecimento (°C)<\u002Flabel><input id=\"designHeatT\" type=\"number\" step=\"0.1\" value=\"20\"><\u002Fdiv>\n          <div class=\"field c3\"><label>Radiação horizontal máxima (W/m²)<\u002Flabel><input id=\"designSolar\" type=\"number\" step=\"10\" value=\"900\"><\u002Fdiv>\n          <div class=\"field c3\"><label>Margem climática resfriamento (°C)<\u002Flabel><input id=\"coolMargin\" type=\"number\" step=\"0.5\" value=\"1\"><\u002Fdiv>\n          <div class=\"field c3\"><label>Margem climática aquecimento (°C)<\u002Flabel><input id=\"heatMargin\" type=\"number\" step=\"0.5\" value=\"1\"><\u002Fdiv>\n          <div class=\"field c3\"><label>Dia do ano para simulação<\u002Flabel><input id=\"dayOfYear\" type=\"number\" min=\"1\" max=\"366\" value=\"21\"><small>Ex.: 21 = 21 de janeiro; 355 ≈ 21 de dezembro.<\u002Fsmall><\u002Fdiv>\n          <div class=\"field c3\"><label>Fonte da série horária<\u002Flabel><select id=\"hourlyMode\"><option value=\"auto\">Automática, se disponível<\u002Foption><option value=\"synthetic\">Perfil sintético de projeto<\u002Foption><\u002Fselect><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <section id=\"zonesPage\" class=\"page\">\n      <div class=\"page-head\"><div><h2>Ambientes e cargas internas<\u002Fh2><p>Ocupação, iluminação, equipamentos, renovação e infiltração.<\u002Fp><\u002Fdiv><span id=\"zoneCount\" class=\"pill\">0 ambientes<\u002Fspan><\u002Fdiv>\n      <div class=\"card\">\n        <div class=\"toolbar\"><button class=\"btn primary\" onclick=\"addZone()\">＋ Ambiente<\u002Fbutton><button class=\"btn secondary\" onclick=\"duplicateSelectedZone()\">⧉ Duplicar selecionado<\u002Fbutton><button class=\"btn danger\" onclick=\"deleteSelectedRows('zonesTable')\">Excluir selecionado<\u002Fbutton><\u002Fdiv>\n        <div class=\"table-wrap\"><table id=\"zonesTable\"><thead><tr><th>✓<\u002Fth><th>Ambiente<\u002Fth><th>Área<br>m²<\u002Fth><th>Altura<br>m<\u002Fth><th>Pessoas<\u002Fth><th>Atividade<\u002Fth><th>Iluminação<br>W/m²<\u002Fth><th>Equipamentos<br>W<\u002Fth><th>Latente equip.<br>W<\u002Fth><th>Ar exterior<br>L/s·pessoa<\u002Fth><th>Ar exterior<br>L/s·m²<\u002Fth><th>Infiltração<br>ACH<\u002Fth><th>Perfil<\u002Fth><\u002Ftr><\u002Fthead><tbody><\u002Ftbody><\u002Ftable><\u002Fdiv>\n        <div class=\"footer-note\">Perfis: residencial, comercial, escolar e contínuo. A ocupação horária pode ser ajustada no código-fonte ou substituída por um perfil personalizado em evolução futura.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"card\">\n        <h3>Biblioteca de atividades<\u002Fh3><p class=\"sub\">Valores indicativos por pessoa, separados em calor sensível e latente.<\u002Fp>\n        <div class=\"grid\" id=\"activityCards\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <section id=\"envelopePage\" class=\"page\">\n      <div class=\"page-head\"><div><h2>Envoltória<\u002Fh2><p>Superfícies opacas e transparentes vinculadas aos ambientes.<\u002Fp><\u002Fdiv><span id=\"surfaceCount\" class=\"pill\">0 superfícies<\u002Fspan><\u002Fdiv>\n      <div class=\"card\">\n        <div class=\"toolbar\"><button class=\"btn primary\" onclick=\"addSurface()\">＋ Superfície<\u002Fbutton><button class=\"btn secondary\" onclick=\"duplicateSelectedSurface()\">⧉ Duplicar selecionada<\u002Fbutton><button class=\"btn danger\" onclick=\"deleteSelectedRows('surfacesTable')\">Excluir selecionada<\u002Fbutton><button class=\"btn secondary\" onclick=\"openMaterialsModal()\">📚 Biblioteca<\u002Fbutton><\u002Fdiv>\n        <div class=\"table-wrap\"><table id=\"surfacesTable\"><thead><tr><th>✓<\u002Fth><th>Ambiente<\u002Fth><th>Elemento<\u002Fth><th>Tipo<\u002Fth><th>Área<br>m²<\u002Fth><th>Orientação<\u002Fth><th>Inclinação<br>°<\u002Fth><th>U<br>W/m²K<\u002Fth><th>Absortância<\u002Fth><th>FS/SHGC<\u002Fth><th>Sombreamento<\u002Fth><th>Material<\u002Fth><\u002Ftr><\u002Fthead><tbody><\u002Ftbody><\u002Ftable><\u002Fdiv>\n        <div class=\"footer-note\">Para paredes e coberturas, a radiação é convertida em temperatura sol-ar. Para janelas, o ganho solar é calculado diretamente por área × SHGC × radiação incidente × sombreamento.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <section id=\"resultsPage\" class=\"page\">\n      <div class=\"page-head\"><div><h2>Resultados<\u002Fh2><p>Picos horários, decomposição das cargas e capacidade sugerida.<\u002Fp><\u002Fdiv><button class=\"btn primary no-print\" onclick=\"calculateAll(true)\">Recalcular<\u002Fbutton><\u002Fdiv>\n      <div id=\"resultEmpty\" class=\"card empty\">Configure o projeto e clique em <b>Calcular<\u002Fb>.<\u002Fdiv>\n      <div id=\"resultContent\" style=\"display:none\">\n        <div class=\"kpis\" style=\"margin-bottom:18px\">\n          <div class=\"kpi blue\"><span>Pico de resfriamento<\u002Fspan><strong id=\"resPeakKW\">0 kW<\u002Fstrong><small><span id=\"resPeakTR\" class=\"tr-note\">0 TR<\u002Fspan> · <span id=\"resPeakTime\">—<\u002Fspan><\u002Fsmall><\u002Fdiv>\n          <div class=\"kpi green\"><span>Capacidade com margem<\u002Fspan><strong id=\"resCapBTU\">0 BTU/h<\u002Fstrong><small id=\"resCapTR\">0 TR<\u002Fsmall><\u002Fdiv>\n          <div class=\"kpi orange\"><span>Carga sensível<\u002Fspan><strong id=\"resSensible\">0 kW<\u002Fstrong><small><span id=\"resSensibleTR\" class=\"tr-note\">0 TR<\u002Fspan> · <span id=\"resSHR\">SHR 0,00<\u002Fspan><\u002Fsmall><\u002Fdiv>\n          <div class=\"kpi red\"><span>Pico de aquecimento<\u002Fspan><strong id=\"resHeat\">0 kW<\u002Fstrong><small><span id=\"resHeatTR\" class=\"tr-note\">0 TR equivalentes<\u002Fspan> · sem margem<\u002Fsmall><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"card\"><h3>Simulação horária<\u002Fh3><p class=\"sub\">Carga agregada da edificação durante 24 horas.<\u002Fp><div class=\"chart-box\"><canvas id=\"hourlyChart\"><\u002Fcanvas><\u002Fdiv><div class=\"legend\"><span><i class=\"dot1\"><\u002Fi>Resfriamento total<\u002Fspan><span><i class=\"dot2\"><\u002Fi>Sensível<\u002Fspan><span><i class=\"dot3\"><\u002Fi>Latente<\u002Fspan><span><i class=\"dot4\"><\u002Fi>Aquecimento<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <div class=\"split\">\n          <div class=\"card\"><h3>Decomposição no pico<\u002Fh3><p class=\"sub\">Contribuição aproximada por grupo.<\u002Fp><div id=\"componentBars\" class=\"result-list\"><\u002Fdiv><\u002Fdiv>\n          <div class=\"card\"><h3>Indicadores<\u002Fh3><p class=\"sub\">Valores úteis para conferência e pré-seleção.<\u002Fp><div id=\"indicatorList\" class=\"result-list\"><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"card\"><h3>Resultados por ambiente<\u002Fh3><div class=\"table-wrap\"><table id=\"zoneResultsTable\"><thead><tr><th>Ambiente<\u002Fth><th class=\"num\">Área m²<\u002Fth><th class=\"num\">Sensível kW<\u002Fth><th class=\"num\">Latente kW<\u002Fth><th class=\"num\">Total kW<\u002Fth><th class=\"num\">BTU/h<\u002Fth><th class=\"num\">TR<\u002Fth><th class=\"num\">W/m²<\u002Fth><th>Hora do pico<\u002Fth><\u002Ftr><\u002Fthead><tbody><\u002Ftbody><\u002Ftable><\u002Fdiv><\u002Fdiv>\n        <div class=\"card\"><h3>Sugestões de eficiência energética<\u002Fh3><div id=\"suggestions\" class=\"result-list\"><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n\n    <section id=\"systemPage\" class=\"page\">\n      <div class=\"page-head\"><div><h2>Sistema de Climatização<\u002Fh2><p>Pré-seleção técnica, custos paramétricos, manutenção e consumo energético estimado.<\u002Fp><\u002Fdiv><button class=\"btn primary no-print\" onclick=\"calculateAll(false);showPage('systemPage')\">Atualizar pela carga térmica<\u002Fbutton><\u002Fdiv>\n      <div id=\"hvacNoResult\" class=\"card empty\">Calcule a carga térmica para dimensionar e comparar os sistemas.<\u002Fdiv>\n      <div id=\"hvacContent\" style=\"display:none\">\n        <div class=\"kpis\" style=\"margin-bottom:18px\">\n          <div class=\"kpi blue\"><span>Carga com margem<\u002Fspan><strong id=\"hvacLoadKW\">0 kW<\u002Fstrong><small id=\"hvacLoadBTU\">0 BTU/h<\u002Fsmall><\u002Fdiv>\n          <div class=\"kpi green\"><span>Capacidade requerida<\u002Fspan><strong id=\"hvacLoadTR\">0 TR<\u002Fstrong><small>1 TR = 3,5169 kW<\u002Fsmall><\u002Fdiv>\n          <div class=\"kpi orange\"><span>Sistemas selecionados<\u002Fspan><strong id=\"hvacSelectedCount\">0<\u002Fstrong><small>Usados na análise econômica<\u002Fsmall><\u002Fdiv>\n          <div class=\"kpi\"><span>Perfil anual<\u002Fspan><strong id=\"hvacAnnualProfile\">0 h<\u002Fstrong><small id=\"hvacLoadFactorLabel\">Fator de carga 0%<\u002Fsmall><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"card\">\n          <h3>Premissas de operação<\u002Fh3><p class=\"sub\">O consumo é estimado pela carga de projeto, eficiência, horas anuais e fator médio de carga.<\u002Fp>\n          <div class=\"grid\">\n            <div class=\"field c3\"><label>Horas de operação por ano<\u002Flabel><input id=\"hvacAnnualHours\" type=\"number\" min=\"1\" step=\"100\" value=\"2400\"><\u002Fdiv>\n            <div class=\"field c3\"><label>Fator médio de carga (%)<\u002Flabel><input id=\"hvacLoadFactor\" type=\"number\" min=\"5\" max=\"100\" step=\"5\" value=\"65\"><\u002Fdiv>\n            <div class=\"field c6\"><div class=\"notice info\"><b>Equação:<\u002Fb> consumo anual ≈ carga térmica requerida (kW) ÷ COP × horas anuais × fator de carga. Os resultados são comparativos e devem ser refinados com curvas de desempenho dos fabricantes.<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"card\"><h3>Tipos de sistemas<\u002Fh3><p class=\"sub\">Aplicações e características gerais. A compatibilidade considera apenas a faixa de capacidade e não substitui projeto, zoneamento, acústica, ventilação ou análise arquitetônica.<\u002Fp><div id=\"hvacCards\" class=\"system-grid\"><\u002Fdiv><\u002Fdiv>\n        <div class=\"card\">\n          <div style=\"display:flex;justify-content:space-between;gap:12px;align-items:flex-start;flex-wrap:wrap\"><div><h3>Configuração e estimativas<\u002Fh3><p class=\"sub\">Selecione as alternativas e edite capacidade, eficiência e parâmetros de custo.<\u002Fp><\u002Fdiv><button class=\"btn success\" onclick=\"updateHVACEstimates(true)\">Recalcular estimativas<\u002Fbutton><\u002Fdiv>\n          <div class=\"table-wrap\"><table id=\"hvacTable\"><thead><tr><th>Comparar<\u002Fth><th>Sistema<\u002Fth><th>Status<\u002Fth><th class=\"num\">Qtd.<\u002Fth><th class=\"num\">TR/unid.<\u002Fth><th class=\"num\">TR total<\u002Fth><th class=\"num\">COP<\u002Fth><th class=\"num\">Custo-base R$<\u002Fth><th class=\"num\">Custo R$/TR<\u002Fth><th class=\"num\">Instalação R$<\u002Fth><th class=\"num\">Manut. %/ano<\u002Fth><th class=\"num\">Manut. R$/ano<\u002Fth><th class=\"num\">Consumo kWh/ano<\u002Fth><th class=\"num\">Vida útil<\u002Fth><\u002Ftr><\u002Fthead><tbody><\u002Ftbody><\u002Ftable><\u002Fdiv>\n          <div class=\"footer-note\">Os valores monetários iniciais são exemplos paramétricos fictícios e editáveis. Substitua-os por cotações, composições de custos e condições locais antes de qualquer decisão.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <section id=\"economicPage\" class=\"page\">\n      <div class=\"page-head\"><div><h2>Análise Econômica<\u002Fh2><p>VPL do custo do ciclo de vida, TIR incremental, economia e prazo de retorno.<\u002Fp><\u002Fdiv><button class=\"btn primary no-print\" onclick=\"renderEconomicAnalysis(true)\">Atualizar análise<\u002Fbutton><\u002Fdiv>\n      <div id=\"economicNoSystems\" class=\"card empty\">Calcule o projeto e selecione ao menos duas alternativas no menu <b>Sistema de Climatização<\u002Fb>.<\u002Fdiv>\n      <div id=\"economicContent\" style=\"display:none\">\n        <div class=\"card\">\n          <h3>Premissas econômicas<\u002Fh3><p class=\"sub\">Valores reais, sem inflação geral. As taxas de crescimento representam variações reais acima da inflação.<\u002Fp>\n          <div class=\"grid\">\n            <div class=\"field c3\"><label>Custo de energia (R$/kWh)<\u002Flabel><input id=\"energyTariff\" type=\"number\" min=\"0\" step=\"0.01\" value=\"0.95\"><\u002Fdiv>\n            <div class=\"field c3\"><label>Taxa de desconto real (% a.a.)<\u002Flabel><input id=\"realDiscountRate\" type=\"number\" min=\"-20\" max=\"100\" step=\"0.1\" value=\"8\"><\u002Fdiv>\n            <div class=\"field c3\"><label>Horizonte de análise (anos)<\u002Flabel><input id=\"analysisYears\" type=\"number\" min=\"1\" max=\"50\" step=\"1\" value=\"15\"><\u002Fdiv>\n            <div class=\"field c3\"><label>Solução-base para TIR<\u002Flabel><select id=\"baselineSystem\"><\u002Fselect><\u002Fdiv>\n            <div class=\"field c3\"><label>Variação real da energia (% a.a.)<\u002Flabel><input id=\"energyEscalation\" type=\"number\" min=\"-20\" max=\"50\" step=\"0.1\" value=\"0\"><\u002Fdiv>\n            <div class=\"field c3\"><label>Variação real da manutenção (% a.a.)<\u002Flabel><input id=\"maintenanceEscalation\" type=\"number\" min=\"-20\" max=\"50\" step=\"0.1\" value=\"0\"><\u002Fdiv>\n            <div class=\"field c3\"><label>Valor residual no final (% CAPEX)<\u002Flabel><input id=\"residualPct\" type=\"number\" min=\"0\" max=\"100\" step=\"1\" value=\"10\"><\u002Fdiv>\n            <div class=\"field c3\"><label>Reposição ao fim da vida útil (% CAPEX)<\u002Flabel><input id=\"replacementPct\" type=\"number\" min=\"0\" max=\"150\" step=\"1\" value=\"70\"><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"notice info\" style=\"margin-top:14px\"><b>Critério:<\u002Fb> o VPL apresentado é o valor presente dos custos do ciclo de vida — quanto menor, melhor. A TIR é incremental, calculada pelos fluxos de economia da alternativa em relação à solução-base selecionada.<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"kpis\" style=\"margin-bottom:18px\">\n          <div class=\"kpi green\"><span>Menor custo presente<\u002Fspan><strong id=\"bestSystemName\" style=\"font-size:18px\">—<\u002Fstrong><small id=\"bestSystemLCC\">—<\u002Fsmall><\u002Fdiv>\n          <div class=\"kpi blue\"><span>Maior economia em VPL<\u002Fspan><strong id=\"bestSavingsName\" style=\"font-size:18px\">—<\u002Fstrong><small id=\"bestSavingsValue\">—<\u002Fsmall><\u002Fdiv>\n          <div class=\"kpi orange\"><span>Menor consumo anual<\u002Fspan><strong id=\"bestEnergyName\" style=\"font-size:18px\">—<\u002Fstrong><small id=\"bestEnergyValue\">—<\u002Fsmall><\u002Fdiv>\n          <div class=\"kpi\"><span>Carga comparada<\u002Fspan><strong id=\"economicLoadTR\">0 TR<\u002Fstrong><small id=\"economicLoadKW\">0 kW<\u002Fsmall><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"card\"><h3>Comparação do ciclo de vida<\u002Fh3><div class=\"table-wrap\"><table id=\"economicTable\"><thead><tr><th>Ranking<\u002Fth><th>Sistema<\u002Fth><th class=\"num\">Investimento<\u002Fth><th class=\"num\">Energia kWh/ano<\u002Fth><th class=\"num\">Energia R$/ano<\u002Fth><th class=\"num\">Manutenção R$/ano<\u002Fth><th class=\"num\">VPL dos custos<\u002Fth><th class=\"num\">Economia em VPL<\u002Fth><th class=\"num\">TIR incremental<\u002Fth><th class=\"num\">Payback descontado<\u002Fth><\u002Ftr><\u002Fthead><tbody><\u002Ftbody><\u002Ftable><\u002Fdiv><\u002Fdiv>\n        <div class=\"card\"><h3>VPL dos custos por alternativa<\u002Fh3><p class=\"sub\">Investimento, energia, manutenção, reposições e valor residual trazidos a valor presente.<\u002Fp><div class=\"economic-chart\"><canvas id=\"economicChart\"><\u002Fcanvas><\u002Fdiv><\u002Fdiv>\n        <div class=\"card\"><h3>Leitura dos resultados<\u002Fh3><div id=\"economicInsights\" class=\"result-list\"><\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <section id=\"reportPage\" class=\"page\">\n      <div class=\"page-head no-print\"><div><h2>Relatório técnico<\u002Fh2><p>Memória resumida pronta para impressão e exportação.<\u002Fp><\u002Fdiv><div class=\"toolbar\"><button class=\"btn primary\" onclick=\"window.print()\">🖨 PDF / Imprimir<\u002Fbutton><button class=\"btn success\" onclick=\"exportExcel()\">📊 Excel<\u002Fbutton><button class=\"btn secondary\" onclick=\"exportJSON()\">{} JSON<\u002Fbutton><\u002Fdiv><\u002Fdiv>\n      <div class=\"card report\" id=\"reportBody\"><div class=\"empty\">Calcule o projeto para gerar o relatório.<\u002Fdiv><\u002Fdiv>\n    <\u002Fsection>\n  <\u002Fmain>\n<\u002Fdiv>\n<\u002Fdiv>\n\n<div id=\"projectModal\" class=\"modal-backdrop\" onclick=\"closeModalOnBackdrop(event,'projectModal')\"><div class=\"modal\"><div style=\"display:flex;justify-content:space-between;align-items:center\"><h3>Projetos salvos e exemplos<\u002Fh3><button class=\"btn secondary sm\" onclick=\"closeModal('projectModal')\">Fechar<\u002Fbutton><\u002Fdiv><div class=\"toolbar\"><button class=\"btn primary\" onclick=\"newProject()\">＋ Novo<\u002Fbutton><button class=\"btn secondary\" onclick=\"importJSON()\">Importar JSON<\u002Fbutton><\u002Fdiv><div id=\"projectList\"><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n<div id=\"materialsModal\" class=\"modal-backdrop\" onclick=\"closeModalOnBackdrop(event,'materialsModal')\"><div class=\"modal\"><div style=\"display:flex;justify-content:space-between;align-items:center\"><h3>Biblioteca de materiais<\u002Fh3><button class=\"btn secondary sm\" onclick=\"closeModal('materialsModal')\">Fechar<\u002Fbutton><\u002Fdiv><div id=\"materialsList\"><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n<div id=\"toast\" class=\"toast\"><\u002Fdiv>\n<input id=\"jsonFile\" type=\"file\" accept=\"application/json\" style=\"display:none\" onchange=\"handleJSONFile(event)\">\n<script>\n'use strict';\nconst STORAGE_KEY='termocarga_projects_v1';\nconst CURRENT_KEY='termocarga_current_v1';\nlet selectedLocation=null, weatherData=null, lastResults=null, currentProjectId=null;\nconst memoryStore={};\nconst storage={\n getItem(key){try{return window.localStorage.getItem(key)}catch(e){return Object.prototype.hasOwnProperty.call(memoryStore,key)?memoryStore[key]:null}},\n setItem(key,value){try{window.localStorage.setItem(key,value)}catch(e){memoryStore[key]=String(value)}},\n removeItem(key){try{window.localStorage.removeItem(key)}catch(e){delete memoryStore[key]}}\n};\n\nconst activities={\n  seated:{name:'Sentado / escritório',sensible:75,latent:55},\n  light:{name:'Atividade leve',sensible:85,latent:70},\n  walking:{name:'Caminhando / varejo',sensible:95,latent:90},\n  medium:{name:'Trabalho moderado',sensible:120,latent:130},\n  restaurant:{name:'Restaurante',sensible:85,latent:105},\n  exercise:{name:'Exercício leve',sensible:145,latent:205}\n};\nconst materials=[\n {name:'Parede — alvenaria cerâmica rebocada',type:'wall',u:2.40,alpha:.55},\n {name:'Parede — bloco de concreto rebocado',type:'wall',u:2.70,alpha:.60},\n {name:'Parede — alvenaria + isolamento',type:'wall',u:.75,alpha:.50},\n {name:'Parede — painel sanduíche',type:'wall',u:.45,alpha:.45},\n {name:'Cobertura — telha cerâmica + forro',type:'roof',u:1.80,alpha:.60},\n {name:'Cobertura — laje de concreto',type:'roof',u:2.30,alpha:.65},\n {name:'Cobertura — telha metálica simples',type:'roof',u:5.50,alpha:.70},\n {name:'Cobertura — painel termoacústico',type:'roof',u:.45,alpha:.45},\n {name:'Piso sobre solo',type:'floor',u:1.50,alpha:0},\n {name:'Janela vidro simples incolor',type:'window',u:5.70,alpha:0,shgc:.82},\n {name:'Janela vidro laminado',type:'window',u:5.40,alpha:0,shgc:.70},\n {name:'Janela vidro duplo',type:'window',u:2.80,alpha:0,shgc:.60},\n {name:'Janela baixo emissivo',type:'window',u:1.80,alpha:0,shgc:.38},\n {name:'Porta de madeira',type:'door',u:2.20,alpha:.55},\n {name:'Porta metálica',type:'door',u:5.50,alpha:.65}\n];\nconst profiles={\n residential:[0.45,.35,.30,.28,.28,.32,.45,.55,.50,.42,.40,.45,.52,.55,.50,.48,.55,.70,.85,.95,1,.92,.75,.58],\n commercial:[0,0,0,0,0,0,.05,.25,.70,.90,1,1,.92,.95,1,1,.95,.80
