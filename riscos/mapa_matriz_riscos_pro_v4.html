function seed(){let modelo=seedModelRelated();return {meta:{app:'Mapa e Matriz de Riscos',version:APP_VERSION,createdAt:nowISO(),updatedAt:nowISO(),lastAutoBackupAt:null,terminologia:'Mapa de riscos é mais amplo e contém planejamento de respostas; matriz de riscos é subconjunto com alocação contratual.'},processos:[],riscos:[...normalizeImportedRisks(),...normalizeMatrizObrasRisks()],premissas:[],causas:[],gatilhos:[],impactos:modelo.impactos,avaliacoes:[],prevContratante:modelo.prevContratante,prevContratada:modelo.prevContratada,respContratante:modelo.respContratante,respContratada:modelo.respContratada,alocacao:modelo.alocacao,seguro:[],licoes:[],quantificacoes:[],apoio:JSON.parse(JSON.stringify(DEFAULT_SUPPORT)),importacao:{origem:'Matriz de Riscos.accdb.mdb + Matriz de Riscos - Obras.docx',riscosImportados:INITIAL_IMPORTED_RISKS.length,riscosModeloObras:MATRIZ_OBRAS_TEMPLATE.length,observacao:'Base inicial com riscos do Access como mapa de riscos e modelo de obras como matriz contratual.'}}}
function ensureMatrizObras(data){data.riscos=data.riscos||[];let existing=new Set(data.riscos.map(r=>r.origemModeloItemId).filter(Boolean));let modelRisks=normalizeMatrizObrasRisks().filter(r=>!existing.has(r.origemModeloItemId)&&!data.riscos.some(x=>x.cod===r.cod));if(modelRisks.length){data.riscos.push(...modelRisks);let rel=seedModelRelated();['impactos','prevContratante','prevContratada','respContratante','respContratada','alocacao'].forEach(k=>{data[k]=data[k]||[];let ids=new Set(data[k].map(x=>x.id));rel[k].forEach(x=>{if(!ids.has(x.id)&&data.riscos.some(r=>r.cod===x.codRisc))data[k].push(x)})});data.importacao={...(data.importacao||{}),riscosModeloObras:MATRIZ_OBRAS_TEMPLATE.length}}return data}
function migrate(data){let base=seed();data={...base,...(data||{})};data.meta={...base.meta,...(data.meta||{}),app:'Mapa e Matriz de Riscos',version:APP_VERSION,updatedAt:nowISO()};data.apoio={...base.apoio,...(data.apoio||{})};Object.keys(base).forEach(k=>{if(Array.isArray(base[k])&&!Array.isArray(data[k]))data[k]=[]});data.riscos=(data.riscos||[]).map(r=>({...r,risco:repairText(r.risco||''),descricao:repairText(r.descricao||''),status:r.status||'Ativo',incluiMapa:r.incluiMapa||'Sim',incluiMatriz:r.incluiMatriz||'Não',impactaEquilibrio:r.impactaEquilibrio||'A avaliar',justificativaMatriz:r.justificativaMatriz||''}));return ensureMatrizObras(data)}
function load(){try{let raw=localStorage.getItem(STORE_KEY)||localStorage.getItem(LEGACY_PRO_KEY);if(raw)return migrate(JSON.parse(raw));let old=localStorage.getItem(OLD_STORE_KEY);if(old){toast('Dados da versão anterior encontrados e migrados.','ok');return migrate(JSON.parse(old))}return seed()}catch(e){console.error(e);return seed()}}

function allAlerts(){let alerts=[];mapRisks().forEach(r=>{let a=latestEval(r.cod);let score=evalScore(a);let [label]=riskLabel(score);let gaps=[];if(!a)gaps.push('sem avaliação');if(score>=12){if(!related('prevContratante',r.cod).length&&!related('prevContratada',r.cod).length)gaps.push('sem ação preventiva');if(!related('respContratante',r.cod).length&&!related('respContratada',r.cod).length)gaps.push('sem resposta/contingência');if(!a?.responsavelMonitoramento&&!r.donoRisco)gaps.push('sem responsável');}if(isMatrixRisk(r)&&!related('alocacao',r.cod).length)gaps.push('risco da matriz sem alocação contratual');if(r.incluiMatriz==='Sim'&&r.incluiMapa==='Não')gaps.push('matriz deve estar contida no mapa');if(gaps.length)alerts.push({cod:r.cod,risco:r.risco,label,score,gaps,level:score>=20?'extreme':score>=12?'high':'normal'})});return alerts.sort((x,y)=>y.score-x.score)}

    <div class="card"><div class="section-title"><h2>Alertas prioritários</h2><button class="btn small" onclick="go('tratamento')">Ver plano</button></div>${alerts.slice(0,8).map(a=>`<div class="alert ${a.level==='extreme'?'extreme':a.level==='high'?'high':''}"><strong>${esc(a.cod)} · ${esc(a.label)}</strong><br><span class="muted">${esc(trunc(a.risco,115))}</span><br><span class="badge b-warn">${esc(a.gaps.join(' · '))}</span></div>`).join('')||'<div class="alert ok"><strong>Nenhum alerta crítico.</strong><br><span class="muted">Riscos críticos possuem tratamento mínimo cadastrado.</span></div>'}</div>

function ficha(app){if(!selectedRisk&&db.riscos[0])selectedRisk=db.riscos[0].cod;let r=getRisk(selectedRisk);let a=r?latestEval(r.cod):null;let score=evalScore(a),resid=residualScore(a),[label,cls]=riskLabel(score),[rlabel,rcls]=riskLabel(resid);if(!r){app.innerHTML='<div class="card"><h2>Ficha consolidada</h2><p class="muted">Nenhum risco cadastrado.</p></div>';return}let proc=getProcess(r.processoId);let gaps=allAlerts().find(x=>x.cod===r.cod)?.gaps||[];app.innerHTML=`

function miniSection(title,key,cod,cols,wide=false){let rows=related(key,cod);let body=rows.length?`<div class="table-wrap"><table><thead><tr>${cols.map(c=>`<th>${esc(header(c))}</th>`).join('')}</tr></thead><tbody>${rows.map(row=>`<tr>${cols.map(c=>`<td>${formatCell(c,row[c])}</td>`).join('')}</tr>`).join('')}</tbody></table></div>`:`<div class="empty">Nenhum registro nesta seção.</div>`;return `<div class="card ${wide?'span-12':''}"><div class="section-title"><h3>${esc(title)}</h3><button class="btn small" onclick="go('${key}',{prefill:{codRisc:'${esc(cod)}'}})">Adicionar</button></div>${body}</div>`}
function tratamento(app){let alerts=allAlerts();let rows=db.riscos.filter(r=>r.status!=='Desativado').map(r=>{let a=latestEval(r.cod),score=evalScore(a),[label,cls]=riskLabel(score),aloc=related('alocacao',r.cod)[0],prev=related('prevContratante',r.cod).length+related('prevContratada',r.cod).length,resp=related('respContratante',r.cod).length+related('respContratada',r.cod).length,gaps=alerts.find(x=>x.cod===r.cod)?.gaps||[];return {r,a,score,label,cls,aloc:aloc?.alocacao||'',prev,resp,gaps}}).sort((x,y)=>y.score-x.score);app.innerHTML=`<div class="card"><div class="section-title"><h2>Plano de tratamento</h2><div class="actions" style="margin:0"><button class="btn small" onclick="downloadTreatmentCSV()">Exportar CSV</button><button class="btn small" onclick="openReport('tratamento',true)">Imprimir/PDF</button></div></div><p class="muted">Lista os riscos por criticidade e evidencia lacunas de governança.</p><input class="search" id="q" placeholder="Pesquisar no plano..." oninput="filterTable()"></div><div class="card"><div class="table-wrap"><table id="grid"><thead><tr><th>Risco</th><th>Classe</th><th>Residual</th><th>Alocação</th><th>Preventivas</th><th>Respostas</th><th>Lacunas</th><th>Ações</th></tr></thead><tbody>${rows.map(x=>{let resid=residualScore(x.a),[rl,rcls]=riskLabel(resid);return `<tr><td><strong>${esc(x.r.cod)}</strong><br>${esc(trunc(x.r.risco,130))}</td><td><span class="badge ${x.cls}">${esc(x.label)} ${x.score||''}</span></td><td>${resid?`<span class="badge ${rcls}">${esc(rl)} ${resid}</span>`:'-'}</td><td>${esc(x.aloc||'Não definida')}</td><td>${x.prev}</td><td>${x.resp}</td><td>${x.gaps.length?`<span class="badge b-warn">${esc(x.gaps.join(' · '))}</span>`:'<span class="badge b-ok">OK</span>'}</td><td><button class="btn small" onclick="go('ficha',{cod:'${esc(x.r.cod)}'})">Ficha</button></td></tr>`}).join('')}</tbody></table></div></div>`}

function modelos(app){let procOptions=processoOptions('');app.innerHTML=`<div class="card"><h2>Modelos por tipo de obra</h2><p class="muted">Esses modelos são sugestões derivadas da base do Access. A matriz de obras de infraestrutura está em biblioteca própria.</p><div class="row"><div class="field span-4"><label>Tipo de obra</label><select id="modeloTipo">${arrayOptions(Object.keys(MODELOS_OBRA),'',false)}</select></div><div class="field span-5"><label>Processo de destino</label><select id="modeloProc">${procOptions}</select></div><div class="field span-3"><label>Ação</label><button class="btn primary" onclick="aplicarModelo()">Aplicar modelo</button></div></div></div><div class="grid-2">${Object.entries(MODELOS_OBRA).map(([tipo,cods])=>`<div class="card"><div class="section-title"><h3>${esc(tipo)}</h3><span class="badge b-info">${cods.length} riscos</span></div><p class="muted">${cods.map(c=>esc(c)).join(', ')}</p><div class="table-wrap"><table><thead><tr><th>Cód.</th><th>Risco</th></tr></thead><tbody>${cods.map(c=>{let r=getRisk(c);return `<tr><td>${esc(c)}</td><td>${esc(trunc(r?.risco||'Não encontrado',160))}</td></tr>`}).join('')}</tbody></table></div></div>`).join('')}</div>`}
function aplicarModelo(){let tipo=document.getElementById('modeloTipo').value,proc=document.getElementById('modeloProc').value,cods=MODELOS_OBRA[tipo]||[],created=0;cods.forEach(c=>{let r=getRisk(c);if(!r)return;let exists=db.riscos.some(x=>x.processoId===proc&&x.risco===r.risco&&x.tipoObra===tipo);if(!exists){db.riscos.push({...r,id:uid('RM'),cod:riskCode(),processoId:proc,tipoObra:tipo,origem:'Modelo por tipo de obra',incluiMapa:'Sim',incluiMatriz:'Não',impactaEquilibrio:'A avaliar',createdAt:nowISO(),updatedAt:nowISO()});created++}});persist(true);toast(`${created} risco(s) adicionados ao processo.`,created?'ok':'error')}
function matrizObras(app){let rows=MATRIZ_OBRAS_TEMPLATE;app.innerHTML=`<div class="card"><div class="section-title"><h2>Modelo de Matriz de Riscos - Obras de Infraestrutura</h2><span class="badge b-info">${rows.length} riscos</span></div><p class="muted">Modelo cadastrado com os campos: tipo de risco, descrição, materialização, mitigação e alocação de responsabilidade. Os itens MO001 a MO${String(rows.length).padStart(3,'0')} já foram incorporados como riscos do tipo Mapa + Matriz.</p><div class="actions"><button class="btn primary" onclick="reaplicarMatrizObras()">Recriar/atualizar itens MO</button><button class="btn" onclick="openReport('matriz',true)">Imprimir matriz de riscos</button><button class="btn" onclick="downloadMatrixCSV()">CSV/Excel</button></div></div><div class="card"><div class="toolbar"><h3>Biblioteca cadastrada</h3><input class="search" id="q" placeholder="Pesquisar..." oninput="filterTable()"></div><div class="table-wrap"><table id="grid"><thead><tr><th>Cód.</th><th>Tipo</th><th>Descrição</th><th>Materialização</th><th>Mitigação</th><th>Alocação</th></tr></thead><tbody>${rows.map(r=>`<tr><td>${esc(r.cod)}</td><td>${esc(r.tipoRisco)}</td><td>${esc(r.descricao)}</td><td>${esc(r.materializacao)}</td><td>${esc(r.mitigacao)}</td><td>${esc(r.alocacao)}</td></tr>`).join('')}</tbody></table></div></div>`}

function tornado(app){let rows=db.quantificacoes||[];let ranked=rows.map(q=>({...q,range:Math.abs((+q.maximo||0)-(+q.minimo||0))})).sort((a,b)=>b.range-a.range);app.innerHTML=`<div class="card"><div class="section-title"><h2>Futuro módulo: diagrama de tornado</h2><span class="badge b-warn">estrutura preparada</span></div><p class="muted">O sistema já possui cadastro de variáveis quantitativas por risco. Esta tela apresenta um ranking preliminar pela amplitude mín.-máx.; futuramente poderá calcular sensibilidade sobre custo total, prazo total ou VPL.</p><div class="actions"><button class="btn primary" onclick="go('quantificacoes')">Cadastrar variáveis</button></div></div><div class="card"><h3>Ranking preliminar de sensibilidade</h3>${ranked.length?barChart(ranked.map(q=>[`${q.codRisc} · ${q.variavel} (${q.tipoImpacto})`,q.range])):'<p class="muted">Nenhuma variável quantitativa cadastrada.</p>'}</div>`}
function montecarlo(app){let rows=db.quantificacoes||[];app.innerHTML=`<div class="card"><div class="section-title"><h2>Futuro módulo: simulação de Monte Carlo</h2><span class="badge b-warn">estrutura preparada</span></div><p class="muted">As variáveis quantitativas aceitam mínimo, mais provável, máximo, unidade e distribuição. O módulo futuro poderá simular custo e prazo agregados, percentis P50/P80/P90 e reservas de contingência.</p><div class="actions"><button class="btn primary" onclick="runSimpleMonteCarlo()">Rodar simulação simplificada local</button><button class="btn" onclick="go('quantificacoes')">Cadastrar variáveis</button></div></div><div class="card"><h3>Resultado preliminar</h3><div id="mcResult">${rows.length?'<p class="muted">Clique em rodar simulação simplificada para estimar os percentis.</p>':'<p class="muted">Nenhuma variável quantitativa cadastrada.</p>'}</div></div>`}
function triangular(min,mode,max){let u=Math.random(),c=(mode-min)/(max-min||1);return u<c?min+Math.sqrt(u*(max-min)*(mode-min)):max-Math.sqrt((1-u)*(max-min)*(max-mode))}
function percentile(arr,p){if(!arr.length)return 0;let a=[...arr].sort((x,y)=>x-y),idx=(a.length-1)*p,lo=Math.floor(idx),hi=Math.ceil(idx);return a[lo]+(a[hi]-a[lo])*(idx-lo)}
function runSimpleMonteCarlo(){let vars=(db.quantificacoes||[]).filter(q=>q.minimo!==''&&q.maisProvavel!==''&&q.maximo!=='');let n=5000,custos=[],prazos=[];for(let i=0;i<n;i++){let c=0,p=0;vars.forEach(q=>{let v=triangular(+q.minimo,+q.maisProvavel,+q.maximo);if(q.tipoImpacto==='Prazo')p+=v;else c+=v});custos.push(c);prazos.push(p)}let el=document.getElementById('mcResult');if(!vars.length){el.innerHTML='<p class="muted">Cadastre variáveis quantitativas antes de simular.</p>';return}el.innerHTML=`<table><thead><tr><th>Indicador</th><th>P50</th><th>P80</th><th>P90</th></tr></thead><tbody><tr><td>Custo agregado</td><td>${money(percentile(custos,.5))}</td><td>${money(percentile(custos,.8))}</td><td>${money(percentile(custos,.9))}</td></tr><tr><td>Prazo agregado (dias)</td><td>${Math.round(percentile(prazos,.5))}</td><td>${Math.round(percentile(prazos,.8))}</td><td>${Math.round(percentile(prazos,.9))}</td></tr></tbody></table><p class="muted">Simulação simplificada com ${n} iterações, assumindo independência entre variáveis e distribuição triangular.</p>`}

function inputFor(f,val=''){let [name,label,type,span]=f;val=val??'';let h='';if(prefill[name]!==undefined&&!editing)val=prefill[name];
  if(type==='textarea')h=`<textarea name="${name}">${esc(val)}</textarea>`;
  else if(type==='risco')h=`<select name="${name}">${riskOptions(val)}</select>`;
  else if(type==='processo')h=`<select name="${name}">${processoOptions(val)}</select>`;
  else if(type==='natureza')h=`<select name="${name}">${arrayOptions(db.apoio.naturezas,val)}</select>`;
  else if(type==='categoria')h=`<select name="${name}">${arrayOptions(db.apoio.categorias,val)}</select>`;
  else if(type==='fator')h=`<select name="${name}">${arrayOptions(db.apoio.fatores,val)}</select>`;
  else if(type==='premissa')h=`<select name="${name}">${arrayOptions(db.apoio.premissas,val)}</select>`;
  else if(type==='fase')h=`<select name="${name}">${arrayOptions(db.apoio.fases,val)}</select>`;
  else if(type==='tipoObra')h=`<select name="${name}">${arrayOptions(db.apoio.tiposObra,val)}</select>`;
  else if(type==='estrategia')h=`<select name="${name}">${arrayOptions(db.apoio.estrategias,val)}</select>`;
  else if(type==='statusRisco')h=`<select name="${name}">${arrayOptions(db.apoio.statusRisco,val||'Ativo')}</select>`;
  else if(type==='currency')h=`<input name="${name}" type="number" step="0.01" min="0" value="${esc(val)}">`;
  else if(type.startsWith('select:'))h=`<select name="${name}"><option value="">Selecione...</option>${type.slice(7).split('|').map(x=>`<option ${val==x?'selected':''} value="${esc(x)}">${esc(x)}</option>`).join('')}</select>`;
  else if(type==='date')h=`<input name="${name}" type="date" value="${esc(val)}">`;
  else h=`<input name="${name}" type="${type}" ${type==='number'?'min="0" step="1"':''} value="${esc(val)}">`;
  let req=(REQUIRED[current]||[]).includes(name)?' *':'';return `<div class="field span-${span}"><label>${esc(label+req)}</label>${h}</div>`}
function crud(app,key){let c=cfg[key],rows=db[key]||[],rec=editing?rows.find(x=>x.id===editing)||{}:{...(c.defaults?c.defaults():{})};app.innerHTML=`<div class="card"><div class="section-title"><h2>${esc(c.title)}</h2>${key==='riscos'?'<button class="btn small" onclick="repairAllRiskTexts()">Reparar textos importados</button>':''}</div><form id="form"><div class="row">${c.fields.map(f=>inputFor(f,rec[f[0]])).join('')}</div><div class="actions"><button class="btn primary" type="submit">${editing?'Atualizar':'Salvar'}</button>${editing?'<button class="btn" type="button" onclick="editing=null;prefill={};render()">Cancelar edição</button>':''}</div></form></div><div class="card"><div class="toolbar"><div class="toolbar-left"><h3>Registros</h3></div><div class="toolbar-right"><input class="search" id="q" placeholder="Pesquisar..." oninput="filterTable()">${key==='riscos'?'<select class="mini-input" id="statusFilter" onchange="filterTable()"><option value="">Todos os status</option><option>Ativo</option><option>Em revisão</option><option>Mitigado</option><option>Materializado</option><option>Encerrado</option><option>Desativado</option></select>':''}</div></div><div id="tablebox">${table(key,rows,c)}</div></div>`;document.getElementById('form').onsubmit=e=>{e.preventDefault();let data=Object.fromEntries(new FormData(e.target).entries());cleanData(key,data);let errors=validateRecord(key,data,editing);if(errors.length){toast(errors.join(' | '),'error');return}if(editing){let target=rows.find(x=>x.id===editing);Object.assign(target,data,{updatedAt:nowISO()});editing=null}else{data.id=uid(c.prefix);data.createdAt=nowISO();data.updatedAt=nowISO();rows.push(data)}prefill={};persist()}}
function cleanData(key,data){Object.keys(data).forEach(k=>{if(typeof data[k]==='string')data[k]=data[k].trim()});if(key==='avaliacoes'){['prob','impacto','probResidual','impactoResidual'].forEach(k=>{if(data[k]!==''&&data[k]!=null)data[k]=Math.max(1,Math.min(5,+data[k]||1))});['impactoFinanceiro','impactoPrazoDias'].forEach(k=>{if(data[k]!==''&&data[k]!=null)data[k]=+data[k]||0})}if(key==='impactos'){['estimativaFinanceira','estimativaPrazoDias'].forEach(k=>{if(data[k]!==''&&data[k]!=null)data[k]=+data[k]||0})}if(key==='processos'){['valorEstimado','prazoContratualDias'].forEach(k=>{if(data[k]!==''&&data[k]!=null)data[k]=+data[k]||0})}if(key==='seguro'){if(data.limiteCobertura!==''&&data.limiteCobertura!=null)data.limiteCobertura=+data.limiteCobertura||0}if(key==='riscos'){data.risco=repairText(data.risco);data.descricao=repairText(data.descricao);if(!data.natureza)data.natureza=inferNatureza(data.risco);if(!data.categoria)data.categoria=inferCategoria(data.risco);if(!data.fase)data.fase=inferFase(data.risco);if(!data.status)data.status='Ativo'}}

function validateRecord(key,data,editId=null){let errs=[];(REQUIRED[key]||[]).forEach(k=>{if(!String(data[k]??'').trim())errs.push(`${header(k)} é obrigatório.`)});if(key==='riscos'){let dup=db.riscos.find(r=>r.cod===data.cod&&r.id!==editId);if(dup)errs.push('Código do risco já existe.');if(data.incluiMatriz==='Sim'&&data.incluiMapa==='Não')errs.push('Todo risco da matriz de riscos deve estar incluído no mapa de riscos.');if(data.incluiMatriz==='Sim'&&data.impactaEquilibrio==='Não')errs.push('Revise a coerência: risco marcado para matriz normalmente deve ter impacto econômico-financeiro, de prazo, custo ou responsabilidade contratual.')}if(key==='avaliacoes'){['prob','impacto','probResidual','impactoResidual'].forEach(k=>{if(data[k]==='')return;let n=+data[k];if(n<1||n>5)errs.push(`${header(k)} deve estar entre 1 e 5.`)});let dup=db.avaliacoes.find(a=>a.codRisc===data.codRisc&&a.id!==editId);if(dup)errs.push('Já existe avaliação para este risco. Edite a avaliação existente para manter a ficha consolidada consistente.')}if(key==='quantificacoes'){let min=+data.minimo,mp=+data.maisProvavel,max=+data.maximo;if(!(min<=mp&&mp<=max))errs.push('A quantificação deve obedecer: mínimo ≤ mais provável ≤ máximo.')}return errs}

function table(key,rows,c){if(!rows.length)return'<p class="muted">Nenhum registro cadastrado.</p>';return `<div class="table-wrap"><table id="grid"><thead><tr>${c.cols.map(x=>`<th>${esc(header(x))}</th>`).join('')}<th>Ações</th></tr></thead><tbody>${rows.map(r=>`<tr data-status="${esc(r.status||'')}">${c.cols.map(col=>`<td>${formatCell(col,r[col],r,key)}</td>`).join('')}<td>${rowActions(key,r)}</td></tr>`).join('')}</tbody></table></div>`}
function header(k){return ({codRisc:'Risco',prob:'Prob.',impacto:'Impacto',impactoFinanceiro:'Impacto financeiro',impactoPrazoDias:'Impacto em dias',estimativaFinanceira:'Estimativa financeira',estimativaPrazoDias:'Estimativa em dias',valorEstimado:'Valor estimado',processoId:'Processo',direitoReequilibrio:'Reequilíbrio',direitoPrazo:'Prazo',responsavelMonitoramento:'Resp. monitoramento',dataRevisao:'Próxima revisão',incluiMapa:'Mapa?',incluiMatriz:'Matriz?',impactaEquilibrio:'Equilíbrio?',justificativaMatriz:'Justificativa matriz',tipoImpacto:'Tipo de impacto',maisProvavel:'Mais provável'}[k]||k).replace(/([A-Z])/g,' $1')}
function formatCell(col,v,row={},key=''){if(col==='incluiMapa'||col==='incluiMatriz')return `<span class="badge ${v==='Sim'?'b-ok':'b-muted'}">${esc(v||'Não')}</span>`;if(col==='impactaEquilibrio')return `<span class="badge ${v==='Sim'?'b-info':v==='Não'?'b-muted':'b-warn'}">${esc(v||'A avaliar')}</span>`;if(col==='valorEstimado'||col==='impactoFinanceiro'||col==='estimativaFinanceira'||col==='limiteCobertura')return esc(money(v));if(col==='codRisc')return `<button class="btn small ghost" onclick="go('ficha',{cod:'${esc(v)}'})">${esc(v)}</button>`;if(col==='cod'&&key==='riscos')return `<button class="btn small ghost" onclick="go('ficha',{cod:'${esc(v)}'})">${esc(v)}</button>`;if(col==='prob'||col==='impacto'){let score=key==='avaliacoes'?evalScore(row):0;let [l,c]=riskLabel(score);return `${esc(v)}${col==='impacto'?`<br><span class="badge ${c}">${esc(l)} ${score||''}</span>`:''}`}if(col==='status'){let cls=v==='Ativo'?'b-ok':v==='Desativado'?'b-muted':'b-info';return `<span class="badge ${cls}">${esc(v||'')}</span>`}if(String(v??'').length>120)return esc(trunc(v,120));return esc(v)}
function rowActions(key,r){let buttons=`<button class="btn small" onclick="editing='${esc(r.id)}';prefill={};render()">Editar</button> `;if(key==='riscos')buttons+=`<button class="btn small" onclick="go('ficha',{cod:'${esc(r.cod)}'})">Ficha</button> <button class="btn small warn" onclick="toggleRisk('${esc(r.id)}')">${r.status==='Desativado'?'Ativar':'Desativar'}</button> `;buttons+=`<button class="btn small danger" onclick="del('${key}','${esc(r.id)}')">Excluir</button>`;return buttons}
function filterTable(){let q=(document.getElementById('q')?.value||'').toLowerCase();let sf=document.getElementById('statusFilter')?.value||'';document.querySelectorAll('#grid tbody tr').forEach(tr=>{let ok=tr.innerText.toLowerCase().includes(q);if(sf)ok=ok&&tr.dataset.status===sf;tr.style.display=ok?'':'none'})}
function del(key,id){let row=(db[key]||[]).find(x=>x.id===id);if(!row)return;if(key==='riscos'){let linked=['premissas','causas','gatilhos','impactos','avaliacoes','prevContratante','prevContratada','respContratante','respContratada','alocacao','seguro','licoes'].some(k=>db[k].some(x=>x.codRisc===row.cod));let msg=linked?'Este risco possui registros vinculados. Digite EXCLUIR para confirmar a exclusão definitiva.':'Digite EXCLUIR para confirmar a exclusão definitiva do risco.';if(prompt(msg)!=='EXCLUIR')return}else if(!confirm('Excluir este registro?'))return;db[key]=db[key].filter(x=>x.id!==id);persist()}
function toggleRisk(id){let r=db.riscos.find(x=>x.id===id);if(!r)return;r.status=r.status==='Desativado'?'Ativo':'Desativado';r.updatedAt=nowISO();persist()}
function repairAllRiskTexts(){db.riscos.forEach(r=>{r.risco=repairText(r.risco);r.descricao=repairText(r.descricao);if(!r.natureza)r.natureza=inferNatureza(r.risco);if(!r.categoria)r.categoria=inferCategoria(r.risco);if(!r.fase)r.fase=inferFase(r.risco);r.revisaoTexto=r.revisaoTexto||'Correção automática sugerida'});persist(true);toast('Textos reparados com regras automáticas. Recomenda-se revisão humana.','ok')}
function apoio(app){function block(k,t){return `<div class="field span-6"><label>${esc(t)} - uma opção por linha</label><textarea data-k="${esc(k)}">${esc((db.apoio[k]||[]).join('\n'))}</textarea></div>`}app.innerHTML=`<div class="card"><h2>Formulários de apoio</h2><p class="muted">Cadastros auxiliares usados nos formulários e relatórios.</p><form id="apoioForm"><div class="row">${block('naturezas','Naturezas do risco')}${block('categorias','Categorias dos riscos')}${block('fatores','Fatores de risco')}${block('premissas','Tipos de premissas')}${block('fases','Fases')}${block('tiposObra','Tipos de obra')}${block('estrategias','Estratégias de tratamento')}${block('statusRisco','Status do risco')}</div><div class="actions"><button class="btn primary" type="submit">Salvar apoio</button><button class="btn" type="button" onclick="db.apoio=JSON.parse(JSON.stringify(DEFAULT_SUPPORT));persist()">Restaurar padrão</button></div></form></div>`;document.getElementById('apoioForm').onsubmit=e=>{e.preventDefault();e.target.querySelectorAll('textarea').forEach(t=>db.apoio[t.dataset.k]=t.value.split('\n').map(x=>x.trim()).filter(Boolean));persist()}}

function reportCSS(){return `<style>body{font-family:Segoe UI,Arial,sans-serif;color:#172033;margin:28px}h1,h2,h3{color:#12324f}table{width:100%;border-collapse:collapse;margin:12px 0}th,td{border:1px solid #d8dee9;padding:7px;font-size:12px;vertical-align:top;white-space:pre-wrap}th{background:#f1f5f9}.badge{display:inline-block;border-radius:12px;padding:2px 7px;font-size:11px;font-weight:700}.b-baixo{background:#dcfce7;color:#166534}.b-medio{background:#fef3c7;color:#92400e}.b-alto{background:#ffedd5;color:#9a3412}.b-extremo{background:#fee2e2;color:#991b1b}.b-muted{background:#f2f4f7;color:#475467}.muted{color:#667085}.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.kpi{border:1px solid #d8dee9;border-radius:10px;padding:10px}.kpi strong{font-size:22px;display:block}@media print{button{display:none}}</style>`}
function reportHTML(type='executivo'){let mapa=mapRisks(),matriz=matrixRisks(),alerts=allAlerts(),high=mapa.filter(r=>evalScore(latestEval(r.cod))>=12).length,extreme=mapa.filter(r=>evalScore(latestEval(r.cod))>=20).length;let titles={executivo:'Relatório executivo do mapa e da matriz de riscos',mapa:'Mapa de riscos',matriz:'Matriz de riscos',tratamento:'Plano de tratamento dos riscos'};let title=titles[type]||titles.executivo;let body=`<h1>${esc(title)}</h1><p class="muted">Gerado em ${esc(brDate(nowISO()))} · Versão ${APP_VERSION}</p>`;if(type==='executivo'){body+=`<p><strong>Critério:</strong> mapa de riscos é o cadastro amplo com planejamento de respostas; matriz de riscos é o subconjunto com alocação contratual.</p><div class="kpis"><div class="kpi"><span>Riscos no mapa</span><strong>${mapa.length}</strong></div><div class="kpi"><span>Riscos na matriz</span><strong>${matriz.length}</strong></div><div class="kpi"><span>Altos/extremos</span><strong>${high}</strong></div><div class="kpi"><span>Extremos</span><strong>${extreme}</strong></div></div><h2>Riscos prioritários do mapa</h2>${reportRiskTable(mapa.filter(r=>evalScore(latestEval(r.cod))>=12).sort((a,b)=>evalScore(latestEval(b.cod))-evalScore(latestEval(a.cod))).slice(0,25),true)}<h2>Lacunas de governança</h2>${alerts.length?`<table><thead><tr><th>Risco</th><th>Pontuação</th><th>Lacunas</th></tr></thead><tbody>${alerts.map(a=>`<tr><td>${esc(a.cod)} - ${esc(trunc(a.risco,150))}</td><td>${a.score}</td><td>${esc(a.gaps.join(' · '))}</td></tr>`).join('')}</tbody></table>`:'<p>Não há lacunas críticas identificadas.</p>'}`}
if(type==='mapa'){body+=`<p>Este relatório não apresenta alocação de responsabilidade entre contratante e contratado. Seu objetivo é planejar respostas aos riscos da licitação e da boa execução contratual.</p><table><thead><tr><th>Cód.</th><th>Risco</th><th>Natureza</th><th>Fase</th><th>Classe</th><th>Impactos/materialização</th><th>Preventivas</th><th>Respostas</th><th>Responsável</th></tr></thead><tbody>${mapa.map(r=>{let a=latestEval(r.cod),score=evalScore(a),[l,c]=riskLabel(score),imp=related('impactos',r.cod).map(x=>x.impacto).join('\n---\n'),prev=[...related('prevContratante',r.cod),...related('prevContratada',r.cod)].map(x=>x.acao).join('\n---\n'),resp=[...related('respContratante',r.cod),...related('respContratada',r.cod)].map(x=>x.resposta).join('\n---\n');return `<tr><td>${esc(r.cod)}</td><td>${esc(r.risco)}</td><td>${esc(r.natureza)}</td><td>${esc(r.fase)}</td><td><span class="badge ${c}">${esc(l)} ${score||''}</span></td><td>${esc(imp||r.descricao||'')}</td><td>${esc(prev)}</td><td>${esc(resp)}</td><td>${esc(a?.responsavelMonitoramento||r.donoRisco||'')}</td></tr>`}).join('')}</tbody></table>`}
if(type==='matriz'){body+=`<p>Este relatório contém somente riscos marcados para a matriz. Por definição, esses riscos também integram o mapa de riscos.</p><table><thead><tr><th>Cód.</th><th>Tipo/natureza</th><th>Descrição do risco</th><th>Materialização</th><th>Mitigação</th><th>Alocação de responsabilidade</th><th>Reequilíbrio</th><th>Prazo</th></tr></thead><tbody>${matriz.map(r=>{let al=related('alocacao',r.cod)[0]||{},imp=related('impactos',r.cod).map(x=>x.impacto).join('\n---\n'),mit=[...related('prevContratante',r.cod),...related('prevContratada',r.cod)].map(x=>x.acao).join('\n---\n');return `<tr><td>${esc(r.cod)}</td><td>${esc(r.natureza)}</td><td>${esc(r.risco)}</td><td>${esc(imp||r.descricao||'')}</td><td>${esc(mit)}</td><td>${esc(al.condicoes||al.alocacao||'A definir')}</td><td>${esc(al.direitoReequilibrio||'A definir')}</td><td>${esc(al.direitoPrazo||'A definir')}</td></tr>`}).join('')}</tbody></table>`}
if(type==='tratamento'){body+=`<table><thead><tr><th>Risco</th><th>Escopo</th><th>Classe</th><th>Estratégia</th><th>Responsável</th><th>Preventivas</th><th>Respostas</th><th>Lacunas</th></tr></thead><tbody>${mapa.map(r=>{let a=latestEval(r.cod),score=evalScore(a),[l,c]=riskLabel(score),al=allAlerts().find(x=>x.cod===r.cod);return `<tr><td>${esc(r.cod)} - ${esc(trunc(r.risco,180))}</td><td>${esc(riskScopeText(r))}</td><td><span class="badge ${c}">${esc(l)} ${score||''}</span></td><td>${esc(a?.estrategia||'')}</td><td>${esc(a?.responsavelMonitoramento||r.donoRisco||'')}</td><td>${related('prevContratante',r.cod).length+related('prevContratada',r.cod).length}</td><td>${related('respContratante',r.cod).length+related('respContratada',r.cod).length}</td><td>${esc(al?.gaps.join(' · ')||'')}</td></tr>`}).join('')}</tbody></table>`}return `<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><title>${esc(title)}</title>${reportCSS()}</head><body>${body}</body></html>`}
function reportRiskTable(rows,showScope=false){if(!rows.length)return'<p>Nenhum risco alto ou extremo avaliado.</p>';return `<table><thead><tr><th>Cód.</th>${showScope?'<th>Escopo</th>':''}<th>Risco</th><th>Natureza</th><th>Categoria</th><th>Classe</th><th>Alocação quando matriz</th></tr></thead><tbody>${rows.map(r=>{let a=latestEval(r.cod),score=evalScore(a),[l,c]=riskLabel(score),al=related('alocacao',r.cod)[0];return `<tr><td>${esc(r.cod)}</td>${showScope?`<td>${esc(riskScopeText(r))}</td>`:''}<td>${esc(r.risco)}</td><td>${esc(r.natureza)}</td><td>${esc(r.categoria)}</td><td><span class="badge ${c}">${esc(l)} ${score}</span></td><td>${isMatrixRisk(r)?esc(al?.alocacao||'A definir'):'Não aplicável'}</td></tr>`}).join('')}</tbody></table>`}

function openReport(type,print=false){let w=window.open('','_blank');w.document.write(reportHTML(type));w.document.close();if(print)setTimeout(()=>w.print(),400)}
function downloadReportDoc(type){downloadFile(`matriz_riscos_${type}.doc`,reportHTML(type),'application/msword')}
function downloadReportHTML(type){downloadFile(`matriz_riscos_${type}.html`,reportHTML(type),'text/html')}

function riskHTML(cod){let r=getRisk(cod),a=latestEval(cod);if(!r)return reportHTML('executivo');let score=evalScore(a),[l,c]=riskLabel(score);let parts=`<h1>Ficha do Risco ${esc(r.cod)}</h1><p class="muted">Gerado em ${esc(brDate(nowISO()))}</p><h2>${esc(r.risco)}</h2><p>${esc(r.descricao||'')}</p><p><span class="badge ${c}">${esc(l)} ${score||''}</span> Escopo: ${esc(riskScopeText(r))} · Natureza: ${esc(r.natureza||'')} · Categoria: ${esc(r.categoria||'')} · Fase: ${esc(r.fase||'')}</p><p><strong>Impacta equilíbrio?</strong> ${esc(r.impactaEquilibrio||'A avaliar')}<br><strong>Justificativa matriz:</strong> ${esc(r.justificativaMatriz||'')}</p>`;['premissas','causas','gatilhos','impactos','avaliacoes','prevContratante','prevContratada','respContratante','respContratada'].forEach(k=>{let rows=related(k,cod);if(rows.length){parts+=`<h2>${esc(cfg[k]?.title||k)}</h2><table><tbody>${rows.map(row=>`<tr>${Object.entries(row).filter(([kk])=>!['id','createdAt','updatedAt','codRisc'].includes(kk)).map(([kk,v])=>`<td><strong>${esc(header(kk))}</strong><br>${esc(v)}</td>`).join('')}</tr>`).join('')}</tbody></table>`}});if(isMatrixRisk(r)){['alocacao','seguro'].forEach(k=>{let rows=related(k,cod);if(rows.length){parts+=`<h2>${esc(cfg[k]?.title||k)}</h2><table><tbody>${rows.map(row=>`<tr>${Object.entries(row).filter(([kk])=>!['id','createdAt','updatedAt','codRisc'].includes(kk)).map(([kk,v])=>`<td><strong>${esc(header(kk))}</strong><br>${esc(v)}</td>`).join('')}</tr>`).join('')}</tbody></table>`}})}let licoes=related('licoes',cod);if(licoes.length){parts+=`<h2>Lições aprendidas</h2><table><tbody>${licoes.map(row=>`<tr>${Object.entries(row).filter(([kk])=>!['id','createdAt','updatedAt','codRisc'].includes(kk)).map(([kk,v])=>`<td><strong>${esc(header(kk))}</strong><br>${esc(v)}</td>`).join('')}</tr>`).join('')}</tbody></table>`}return `<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><title>Ficha ${esc(cod)}</title>${reportCSS()}</head><body>${parts}</body></html>`}

function downloadRiskDoc(cod){downloadFile(`ficha_risco_${cod}.doc`,riskHTML(cod),'application/msword')}
function openRiskPrint(cod){let w=window.open('','_blank');w.document.write(riskHTML(cod));w.document.close();setTimeout(()=>w.print(),400)}
function csvEscape(v){v=String(v??'');return '"'+v.replace(/"/g,'""')+'"'}
function toCSV(rows,cols){return '\ufeff'+cols.join(';')+'\n'+rows.map(r=>cols.map(c=>csvEscape(r[c])).join(';')).join('\n')}

function downloadRisksCSV(){let rows=db.riscos.map(r=>({...r,escopo:riskScopeText(r),score:evalScore(latestEval(r.cod)),alocacao:related('alocacao',r.cod)[0]?.alocacao||''}));downloadFile('base_riscos_mapa_matriz.csv',toCSV(rows,['cod','escopo','risco','natureza','categoria','fase','status','impactaEquilibrio','score','alocacao']),'text/csv;charset=utf-8')}
function downloadMapCSV(){let rows=mapRisks().map(r=>{let a=latestEval(r.cod),imp=related('impactos',r.cod).map(x=>x.impacto).join(' | '),prev=[...related('prevContratante',r.cod),...related('prevContratada',r.cod)].map(x=>x.acao).join(' | '),resp=[...related('respContratante',r.cod),...related('respContratada',r.cod)].map(x=>x.resposta).join(' | ');return {cod:r.cod,risco:r.risco,natureza:r.natureza,categoria:r.categoria,fase:r.fase,score:evalScore(a),classe:riskLabel(evalScore(a))[0],impactos:imp,preventivas:prev,respostas:resp,responsavel:a?.responsavelMonitoramento||r.donoRisco||''}});downloadFile('mapa_de_riscos.csv',toCSV(rows,['cod','risco','natureza','categoria','fase','score','classe','impactos','preventivas','respostas','responsavel']),'text/csv;charset=utf-8')}
function downloadMatrixCSV(){let rows=matrixRisks().map(r=>{let al=related('alocacao',r.cod)[0]||{},imp=related('impactos',r.cod).map(x=>x.impacto).join(' | '),mit=[...related('prevContratante',r.cod),...related('prevContratada',r.cod)].map(x=>x.acao).join(' | ');return {cod:r.cod,tipo:r.natureza,descricao:r.risco,materializacao:imp||r.descricao,mitigacao:mit,alocacao:al.condicoes||al.alocacao||'',responsabilidade:al.alocacao||'',direitoReequilibrio:al.direitoReequilibrio||'',direitoPrazo:al.direitoPrazo||''}});downloadFile('matriz_de_riscos.csv',toCSV(rows,['cod','tipo','descricao','materializacao','mitigacao','responsabilidade','alocacao','direitoReequilibrio','direitoPrazo']),'text/csv;charset=utf-8')}
function downloadContractCSV(){return downloadMatrixCSV()}
function downloadTreatmentCSV(){let rows=mapRisks().map(r=>{let a=latestEval(r.cod),alert=allAlerts().find(x=>x.cod===r.cod);return {cod:r.cod,escopo:riskScopeText(r),risco:r.risco,score:evalScore(a),classe:riskLabel(evalScore(a))[0],estrategia:a?.estrategia||'',responsavel:a?.responsavelMonitoramento||r.donoRisco||'',preventivas:related('prevContratante',r.cod).length+related('prevContratada',r.cod).length,respostas:related('respContratante',r.cod).length+related('respContratada',r.cod).length,lacunas:alert?.gaps.join(' | ')||''}});downloadFile('plano_tratamento_riscos.csv',toCSV(rows,['cod','escopo','risco','score','classe','estrategia','responsavel','preventivas','respostas','lacunas']),'text/csv;charset=utf-8')}

function exportJSON(){downloadFile('matriz_riscos_backup_completo.json',JSON.stringify(db,null,2),'application/json')}
function importJSON(e){let f=e.target.files[0];if(!f)return;let r=new FileReader();r.onload=()=>{try{backupNow('antes da importação',true);db=migrate(JSON.parse(r.result));localStorage.setItem(STORE_KEY,JSON.stringify(db));toast('JSON importado com sucesso.','ok');render()}catch(err){toast('Arquivo JSON inválido.','error')}};r.readAsText(f);e.target.value=''}
function downloadFile(name,content,type='text/plain'){let blob=new Blob([content],{type});let a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(a.href),1000)}
render();
</script>
