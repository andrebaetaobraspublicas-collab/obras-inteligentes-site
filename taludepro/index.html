"<!DOCTYPE html>\n<html lang=\"pt-BR\"><head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>TaludePro — Calculadora de Taludes<\u002Ftitle>\n\n<style>\n/* ============================================================\n   TaludePro — identidade visual: estratigrafia\n   Paleta derivada de perfis de solo brasileiros\n   ============================================================ */\n:root{\n  --humus:#2c3230;        /* verde-terra escuro (header) */\n  --ocre:#c07a22;         /* ocre — acento principal */\n  --ocre-escuro:#96600f;\n  --agua:#2f6fab;         /* azul técnico (NA) */\n  --papel:#eef0ea;        /* fundo geral */\n  --cartao:#ffffff;\n  --tinta:#25292b;\n  --cinza:#6b7280;\n  --linha:#d8dcd2;\n  --ok:#2e7d4f; --ok-bg:#eaf5ee;\n  --warn:#a3700d; --warn-bg:#fdf6e3;\n  --bad:#b3372f; --bad-bg:#fbeeec;\n}\n*{box-sizing:border-box}\nbody{margin:0;background:var(--papel);color:var(--tinta);\n  font:14px/1.5 \"Segoe UI\",system-ui,-apple-system,Roboto,sans-serif}\nh1,h2,h3{font-weight:700;letter-spacing:-.01em}\n.num{font-variant-numeric:tabular-nums}\n\n/* ---------- Header ---------- */\nheader{background:var(--humus);color:#fff;padding:14px 20px;\n  border-bottom:4px solid var(--ocre)}\n.head{max-width:1500px;margin:auto;display:flex;gap:16px;align-items:center;\n  justify-content:space-between;flex-wrap:wrap}\n.brand h1{margin:0;font-size:22px}\n.brand h1 span{color:var(--ocre)}\n.brand p{margin:2px 0 0;color:#b9c2ba;font-size:12px}\n.actions{display:flex;gap:8px;flex-wrap:wrap;align-items:center}\n.actions select{padding:8px;border-radius:6px;border:0;font-size:13px;max-width:180px}\n\n/* ---------- Botões ---------- */\nbutton{border:0;border-radius:7px;padding:9px 14px;font-weight:700;cursor:pointer;\n  background:#e4e7de;color:var(--tinta);font-size:13px;transition:filter .12s}\nbutton:hover{filter:brightness(.95)}\nbutton:focus-visible{outline:2px solid var(--agua);outline-offset:2px}\nbutton.primary{background:var(--ocre);color:#fff}\nbutton.dark{background:#3b433f;color:#fff}\nbutton.ghost{background:transparent;color:#fff;border:1px solid #ffffff40}\nbutton.danger{background:var(--bad-bg);color:var(--bad)}\nbutton.mini{padding:5px 9px;font-size:12px}\nbutton:disabled{opacity:.5;cursor:wait}\n\n/* ---------- Layout ---------- */\nmain{max-width:1500px;margin:16px auto 60px;padding:0 16px;\n  display:grid;grid-template-columns:minmax(330px,420px) 1fr;gap:16px}\n.card{background:var(--cartao);border:1px solid var(--linha);border-radius:10px;\n  box-shadow:0 2px 10px #2c32300f;padding:16px}\n.panel{height:max-content}\n.section{padding:14px 0;border-bottom:1px solid var(--linha)}\n.section:first-child{padding-top:0}\n.section:last-child{border-bottom:0}\n.section>h2{font-size:14px;color:var(--ocre-escuro);margin:0 0 10px;\n  text-transform:uppercase;letter-spacing:.04em}\n.grid2,.grid3{display:grid;gap:10px}\n.grid2{grid-template-columns:1fr 1fr}\n.grid3{grid-template-columns:repeat(3,1fr)}\nlabel{display:block;font-size:11.5px;font-weight:700;color:#4b5350;margin-bottom:3px}\ninput,select{width:100%;padding:8px 9px;border:1px solid #c5cabc;border-radius:6px;\n  background:#fff;color:var(--tinta);font-size:13.5px}\ninput:focus,select:focus{outline:2px solid #9cc0e0;border-color:var(--agua)}\ninput:invalid{border-color:var(--bad)}\n.hint{font-size:11px;color:var(--cinza);margin:6px 0 0}\n.full{width:100%;margin-top:12px;padding:12px;font-size:14px}\n\n/* Linhas dinâmicas (bermas / camadas) */\n.berma{display:grid;grid-template-columns:1fr 1fr auto;gap:7px;align-items:end;margin:7px 0}\n.camada{display:grid;grid-template-columns:1.25fr .75fr .7fr .7fr .7fr auto;gap:5px;\n  align-items:end;margin:7px 0}\n.camada .swatch{width:100%;height:8px;border-radius:4px;margin-bottom:3px}\n\n/* ---------- Resultados ---------- */\n.right{display:grid;gap:14px;height:max-content}\n.results{display:grid;grid-template-columns:1fr 1fr 1.4fr;gap:12px}\n.metric{border:2px solid var(--linha);border-radius:9px;padding:14px;background:#fafbf8}\n.metric .label{text-transform:uppercase;font-size:10.5px;font-weight:800;\n  color:var(--cinza);letter-spacing:.05em}\n.metric .value{font-size:38px;font-weight:900;margin:4px 0;line-height:1}\n.metric .small{font-size:12.5px;font-weight:700}\n.metric.ok{border-color:var(--ok);background:var(--ok-bg);color:#1d5636}\n.metric.warn{border-color:#d9a514;background:var(--warn-bg);color:#7c5708}\n.metric.bad{border-color:var(--bad);background:var(--bad-bg);color:#8c2a24}\n.metric.note{font-size:12.5px;line-height:1.55;color:#3c4442}\n.metric.note strong{color:var(--tinta)}\n\n/* Gauge de FS — assinatura visual: barra estratificada */\n.gauge{position:relative;height:26px;border-radius:6px;overflow:hidden;margin-top:10px;\n  background:linear-gradient(90deg,\n    #c9573f 0%, #c9573f 33.3%,\n    #d9a514 33.3%, #d9a514 55.5%,\n    #4f8f68 55.5%, #4f8f68 100%)}\n.gauge .tick{position:absolute;top:0;bottom:0;width:2px;background:#00000038}\n.gauge .marker{position:absolute;top:-2px;bottom:-2px;width:5px;background:#1c1e1d;\n  border:1.5px solid #fff;border-radius:3px;transition:left .35s ease}\n.gauge-scale{display:flex;justify-content:space-between;font-size:10px;color:var(--cinza);margin-top:3px}\n\n/* Canvas */\n.canvasWrap{overflow:auto;border:1px solid var(--linha);border-radius:8px;background:#fbfcf9}\ncanvas{display:block;width:100%;min-width:760px;height:auto}\n.legend{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-top:10px;\n  color:#4b5350;font-size:12px}\n.dot{display:inline-block;width:11px;height:11px;border-radius:3px;margin-right:5px;vertical-align:-1px}\n.toolbar{display:flex;gap:8px;align-items:center;justify-content:space-between;\n  flex-wrap:wrap;margin-bottom:10px}\n.toolbar h3{margin:0;font-size:15px}\n.toolbar .tools{display:flex;gap:6px;flex-wrap:wrap}\n\n/* Tabelas */\n.tableWrap{overflow:auto;max-height:340px;border:1px solid var(--linha);border-radius:8px}\ntable{border-collapse:collapse;width:100%;font-size:12px}\nth,td{padding:5px 7px;border-bottom:1px solid #e7eae1;text-align:right;white-space:nowrap}\nth{background:#eef0e8;position:sticky;top:0;font-size:11px;text-transform:uppercase;\n  letter-spacing:.03em;color:#4b5350}\ntd:first-child,th:first-child{text-align:center}\ntbody tr:hover{background:#f6f8f2}\nsummary{cursor:pointer;font-weight:700;font-size:14px;padding:4px 0}\n\n/* Progresso e mensagens */\n.progress{height:7px;background:#e0e3d8;border-radius:10px;overflow:hidden;margin-top:10px}\n.progress>div{height:100%;width:0;background:var(--ocre);transition:width .12s}\n.message{margin-top:8px;min-height:18px;color:#4b5350;font-size:12.5px}\n\n/* Otimizador */\n.optResult{margin-top:10px;font-size:13px}\n.optResult table{font-size:12px}\n.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:800}\n.badge.ok{background:var(--ok-bg);color:var(--ok)}\n.badge.bad{background:var(--bad-bg);color:var(--bad)}\n\nfooter{max-width:1500px;margin:0 auto 30px;padding:0 16px;font-size:11.5px;color:var(--cinza)}\n\n@media(max-width:960px){\n  main{grid-template-columns:1fr}\n  .results{grid-template-columns:1fr}\n  .camada{grid-template-columns:1.2fr .8fr .8fr auto;grid-auto-rows:auto}\n}\n@media print{\n  header .actions,.panel,.progress,.message,.toolbar .tools,#btnCalcular{display:none!important}\n  body{background:#fff}\n  main{display:block;max-width:none}\n  .card{box-shadow:none;break-inside:avoid;margin-bottom:10px}\n  canvas{min-width:0}\n}\n@media (prefers-reduced-motion: reduce){\n  .gauge .marker,.progress>div{transition:none}\n}\n\n/* ---------- Tela de abertura ---------- */\n#splash{position:fixed;inset:0;z-index:9999;overflow:hidden;\n  background:linear-gradient(180deg,#2f4f6e 0%,#5a7d94 26%,#cf9a56 52%,#8a5a2e 100%);\n  display:flex;align-items:center;justify-content:center;transition:opacity .6s ease}\n#splash.fading{opacity:0}\n#splash .sceneWrap{position:absolute;inset:0;z-index:0}\n#splash svg{width:100%;height:100%;display:block}\n#splash .titleWrap{position:relative;z-index:2;text-align:center;color:#fff}\n#splash h1.splashTitle{margin:0;font-size:clamp(44px,9vw,96px);font-weight:900;letter-spacing:-.02em;\n  text-shadow:0 6px 26px #00000055;opacity:0;animation:splashTitleIn .8s ease .3s forwards}\n#splash h1.splashTitle span{color:var(--ocre)}\n#splash p.splashSub{margin:10px 0 0;font-size:clamp(15px,2.4vw,22px);letter-spacing:.14em;\n  text-transform:uppercase;color:#f3e6d2;opacity:0;animation:splashSubIn .8s ease .9s forwards}\n@keyframes splashTitleIn{from{opacity:0;transform:translateY(18px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}\n@keyframes splashSubIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}\n.rock{animation:rockFall 1.7s cubic-bezier(.4,.6,.8,1) forwards;opacity:0}\n@keyframes rockFall{0%{opacity:0;transform:translate(0,0) rotate(0deg)}\n  8%{opacity:1}\n  100%{opacity:.95;transform:translate(var(--rx),var(--ry)) rotate(var(--rr))}}\n#wedge{animation:wedgeSlide 1.9s cubic-bezier(.5,0,.6,1) 1.1s forwards}\n@keyframes wedgeSlide{0%{transform:translate(0,0) rotate(0deg)}100%{transform:translate(48px,36px) rotate(9deg)}}\n.crackLine{stroke-dasharray:340;stroke-dashoffset:340;animation:crackDraw .9s ease .6s forwards}\n@keyframes crackDraw{to{stroke-dashoffset:0}}\n.dust{opacity:0;transform-origin:center;animation:dustPuff 2.2s ease 2.5s forwards}\n@keyframes dustPuff{0%{opacity:0;transform:scale(.3)}30%{opacity:.55}100%{opacity:0;transform:scale(2.6)}}\n\n/* ---------- Aviso legal ---------- */\n#legalGate{position:fixed;inset:0;z-index:10000;background:#171a17d8;display:none;\n  align-items:center;justify-content:center;padding:20px;opacity:0;transition:opacity .4s ease}\n#legalGate.show{display:flex;opacity:1}\n#legalCard{background:var(--cartao);border-radius:12px;max-width:620px;width:100%;\n  padding:26px 26px 22px;box-shadow:0 20px 60px #0006;transform:translateY(14px);opacity:0;\n  animation:legalIn .5s ease forwards}\n@keyframes legalIn{to{transform:translateY(0);opacity:1}}\n#legalCard h2{margin:0 0 4px;font-size:19px;color:var(--humus)}\n#legalCard .tag{display:inline-block;background:var(--warn-bg);color:var(--warn);font-size:11px;\n  font-weight:800;text-transform:uppercase;letter-spacing:.04em;padding:3px 9px;border-radius:20px;margin-bottom:10px}\n#legalCard .legalText{max-height:260px;overflow:auto;font-size:13px;line-height:1.6;color:#3c4442;\n  border:1px solid var(--linha);border-radius:8px;padding:12px 14px;background:#fafbf8}\n#legalCard .legalText p{margin:0 0 10px}\n#legalCard .legalText ul{margin:0 0 10px;padding-left:18px}\n#legalCard label.chk{display:flex;gap:9px;align-items:flex-start;margin:16px 2px 4px;font-size:13px;\n  font-weight:600;color:var(--tinta);cursor:pointer}\n#legalCard label.chk input{margin-top:2px;width:16px;height:16px;flex:none}\n#legalCard .legalActions{margin-top:14px}\n@media (prefers-reduced-motion: reduce){\n  .rock,#wedge,.crackLine,.dust,#splash h1.splashTitle,#splash p.splashSub{animation:none;opacity:1}\n}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<div id=\"splash\">\n  <div class=\"sceneWrap\">\n    <svg viewBox=\"0 0 800 450\" preserveAspectRatio=\"xMidYMax slice\" xmlns=\"http://www.w3.org/2000/svg\">\n      <defs>\n        <clipPath id=\"slopeClip\"><polygon points=\"0,450 0,260 260,80 520,80 800,300 800,450\"><\u002Fpolygon><\u002FclipPath>\n        <radialGradient id=\"sunGlow\" cx=\"50%\" cy=\"50%\" r=\"50%\">\n          <stop offset=\"0%\" stop-color=\"#ffe1a8\"><\u002Fstop>\n          <stop offset=\"100%\" stop-color=\"#ffe1a8\" stop-opacity=\"0\"><\u002Fstop>\n        <\u002FradialGradient>\n      <\u002Fdefs>\n      <circle cx=\"650\" cy=\"90\" r=\"90\" fill=\"url(#sunGlow)\"><\u002Fcircle>\n      <circle cx=\"650\" cy=\"90\" r=\"34\" fill=\"#ffdca0\"><\u002Fcircle>\n      <g clip-path=\"url(#slopeClip)\">\n        <rect x=\"0\" y=\"0\" width=\"800\" height=\"450\" fill=\"#8a5a2e\"><\u002Frect>\n        <rect x=\"0\" y=\"230\" width=\"800\" height=\"220\" fill=\"#75503a\"><\u002Frect>\n        <rect x=\"0\" y=\"320\" width=\"800\" height=\"130\" fill=\"#5e4534\"><\u002Frect>\n      <\u002Fg>\n      <polygon points=\"0,450 0,260 260,80 520,80 800,300 800,450\" fill=\"none\" stroke=\"#3f2a1c\" stroke-width=\"3\"><\u002Fpolygon>\n      <polygon points=\"0,260 260,80 520,80 800,300 800,288 512,72 258,68 0,246\" fill=\"#5c8a4a\"><\u002Fpolygon>\n      <path class=\"crackLine\" d=\"M40,182 L120,150 L210,118 L275,92\" fill=\"none\" stroke=\"#b3372f\" stroke-width=\"4\" stroke-linecap=\"round\"><\u002Fpath>\n      <g id=\"wedge\">\n        <polygon points=\"0,246 0,120 90,120 275,92 258,68 0,246\" fill=\"#6b8f52\"><\u002Fpolygon>\n        <polygon points=\"0,246 0,150 70,150 230,110 210,118 0,246\" fill=\"#9c8a5a\" opacity=\".85\"><\u002Fpolygon>\n        <circle class=\"rock\" style=\"--rx:34px;--ry:58px;--rr:40deg\" cx=\"130\" cy=\"150\" r=\"9\" fill=\"#5e4534\"><\u002Fcircle>\n        <circle class=\"rock\" style=\"--rx:20px;--ry:70px;--rr:-25deg\" cx=\"60\" cy=\"200\" r=\"7\" fill=\"#4a3626\"><\u002Fcircle>\n      <\u002Fg>\n      <circle class=\"rock\" style=\"--rx:70px;--ry:170px;--rr:120deg;animation-delay:1.4s\" cx=\"220\" cy=\"130\" r=\"10\" fill=\"#4a3626\"><\u002Fcircle>\n      <circle class=\"rock\" style=\"--rx:96px;--ry:150px;--rr:-80deg;animation-delay:1.6s\" cx=\"300\" cy=\"140\" r=\"8\" fill=\"#5e4534\"><\u002Fcircle>\n      <circle class=\"rock\" style=\"--rx:50px;--ry:120px;--rr:200deg;animation-delay:1.8s\" cx=\"160\" cy=\"170\" r=\"6\" fill=\"#6b4c33\"><\u002Fcircle>\n      <circle class=\"dust\" cx=\"230\" cy=\"330\" r=\"46\" fill=\"#cbb896\" opacity=\".5\"><\u002Fcircle>\n      <circle class=\"dust\" style=\"animation-delay:2.6s\" cx=\"300\" cy=\"350\" r=\"60\" fill=\"#d8c7a6\" opacity=\".4\"><\u002Fcircle>\n      <circle class=\"dust\" style=\"animation-delay:2.8s\" cx=\"170\" cy=\"360\" r=\"38\" fill=\"#bfa987\" opacity=\".45\"><\u002Fcircle>\n    <\u002Fsvg>\n  <\u002Fdiv>\n  <div class=\"titleWrap\">\n    <h1 class=\"splashTitle\">Talude<span>Pro<\u002Fspan><\u002Fh1>\n    <p class=\"splashSub\">Calculadora de Taludes<\u002Fp>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<div id=\"legalGate\">\n  <div id=\"legalCard\">\n    <span class=\"tag\">Leitura obrigatória<\u002Fspan>\n    <h2>Aviso legal e limitação de responsabilidade<\u002Fh2>\n    <div class=\"legalText\">\n      <p>O <strong>TaludePro<\u002Fstrong> é uma ferramenta de apoio ao cálculo de estabilidade de taludes por métodos de equilíbrio-limite (Fellenius e Bishop Simplificado), destinada a profissionais e estudantes de geotecnia.<\u002Fp>\n      <ul>\n        <li>Os resultados dependem exclusivamente dos parâmetros geotécnicos informados pelo usuário e não substituem investigação de campo (sondagens, ensaios in situ) nem ensaios de laboratório.<\u002Fli>\n        <li>Este software não substitui a análise, o dimensionamento final e a assinatura de um responsável técnico habilitado (engenheiro civil/geotécnico), conforme legislação e normas vigentes, incluindo a NBR 11.682.<\u002Fli>\n        <li>Os valores de fator de segurança mínimo sugeridos são referenciais; a edição vigente da norma técnica deve ser sempre consultada.<\u002Fli>\n        <li>Os autores e desenvolvedores do TaludePro não se responsabilizam por danos materiais, humanos ou ambientais decorrentes do uso, mau uso ou interpretação isolada dos resultados apresentados.<\u002Fli>\n        <li>O uso desta ferramenta é de inteira responsabilidade do usuário, que deve validar todos os resultados antes de qualquer aplicação prática ou tomada de decisão.<\u002Fli>\n      <\u002Ful>\n      <p>Ao continuar, você declara ter lido e concordado com os termos acima.<\u002Fp>\n    <\u002Fdiv>\n    <label class=\"chk\" for=\"chkLegal\"><input type=\"checkbox\" id=\"chkLegal\"><span>Li e concordo com o aviso legal e a limitação de responsabilidade acima.<\u002Fspan><\u002Flabel>\n    <div class=\"legalActions\"><button class=\"primary full\" id=\"btnEntrar\" disabled=\"\">Concordo e entrar no sistema<\u002Fbutton><\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<script>\n(function(){\n  var splash = document.getElementById(\"splash\");\n  var gate = document.getElementById(\"legalGate\");\n  var chk = document.getElementById(\"chkLegal\");\n  var btnEnter = document.getElementById(\"btnEntrar\");\n  document.body.style.overflow = \"hidden\";\n  setTimeout(function(){\n    splash.classList.add(\"fading\");\n    gate.classList.add(\"show\");\n  }, 5000);\n  chk.addEventListener(\"change\", function(){ btnEnter.disabled = !chk.checked; });\n  btnEnter.addEventListener(\"click\", function(){\n    gate.classList.remove(\"show\");\n    splash.remove();\n    setTimeout(function(){ gate.remove(); document.body.style.overflow = \"\"; }, 300);\n  });\n})();\n<\u002Fscript>\n\n<header>\n  <div class=\"head\">\n    <div class=\"brand\">\n      <h1>Talude<span>Pro<\u002Fspan> — Calculadora de Taludes<\u002Fh1>\n      <p>Estabilidade por equilíbrio-limite · Fellenius e Bishop Simplificado · NBR 11.682<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"actions\">\n      <select id=\"selProjetos\" aria-label=\"Projetos salvos\"><option value=\"\">Projetos salvos…<\u002Foption><\u002Fselect>\n      <button class=\"ghost\" id=\"btnCarregar\">Abrir<\u002Fbutton>\n      <button class=\"ghost\" id=\"btnSalvar\">Salvar projeto<\u002Fbutton>\n      <button class=\"ghost\" id=\"btnExcluir\">Excluir<\u002Fbutton>\n      <button class=\"ghost\" id=\"btnExportJSON\">Exportar JSON<\u002Fbutton>\n      <button class=\"ghost\" onclick=\"document.getElementById('fileJSON').click()\">Importar JSON<\u002Fbutton>\n      <input type=\"file\" id=\"fileJSON\" accept=\".json\" hidden=\"\">\n      <button class=\"primary\" id=\"btnPDF\">Relatório PDF<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<main>\n  <!-- ==================== PAINEL DE ENTRADA ==================== -->\n  <div class=\"card panel\">\n\n    <div class=\"section\">\n      <h2>Identificação<\u002Fh2>\n      <div class=\"grid2\">\n        <div><label for=\"projNome\">Projeto<\u002Flabel><input id=\"projNome\" value=\"Talude 01\" maxlength=\"60\"><\u002Fdiv>\n        <div><label for=\"projCliente\">Cliente / Obra<\u002Flabel><input id=\"projCliente\" maxlength=\"60\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"section\">\n      <h2>1 · Geometria do maciço<\u002Fh2>\n      <div class=\"grid2\">\n        <div><label for=\"altura\">Altura total H (m)<\u002Flabel>\n          <input id=\"altura\" type=\"number\" value=\"12\" min=\"1\" max=\"100\" step=\"0.5\"><\u002Fdiv>\n        <div><label for=\"angulo\">Ângulo do talude β (°)<\u002Flabel>\n          <input id=\"angulo\" type=\"number\" value=\"40\" min=\"10\" max=\"80\" step=\"0.5\"><\u002Fdiv>\n      <\u002Fdiv>\n      <p class=\"hint\">Pé do talude na origem (x = 0, y = 0). Terreno horizontal antes do pé e após a crista.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"section\">\n      <h2>2 · Bermas de equilíbrio<\u002Fh2>\n      <div id=\"bermas\"><\u002Fdiv>\n      <button class=\"mini\" id=\"btnAddBerma\">+ Adicionar berma<\u002Fbutton>\n      <p class=\"hint\">Cota medida a partir do pé (0 &lt; cota &lt; H). Largura mínima 1,0 m; espaçamento vertical mínimo 2,0 m.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"section\">\n      <h2>3 · Estratigrafia<\u002Fh2>\n      <div style=\"margin-bottom:8px\">\n        <label for=\"selSolo\">Adicionar camada a partir do banco de solos<\u002Flabel>\n        <div style=\"display:flex;gap:6px\">\n          <select id=\"selSolo\"><\u002Fselect>\n          <button class=\"mini dark\" id=\"btnAddCamadaPreset\" style=\"white-space:nowrap\">Inserir<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div id=\"camadas\"><\u002Fdiv>\n      <button class=\"mini\" id=\"btnAddCamada\">+ Camada personalizada<\u002Fbutton>\n      <p class=\"hint\">Camadas horizontais definidas pela cota do topo. A camada de menor cota estende-se em profundidade. γ em kN/m³, c′ em kPa, φ′ em graus.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"section\">\n      <h2>4 · Água e poropressão<\u002Fh2>\n      <div class=\"grid2\">\n        <div><label for=\"regimeAgua\">Modelo de poropressão<\u002Flabel>\n          <select id=\"regimeAgua\">\n            <option value=\"na\">Nível d'água horizontal<\u002Foption>\n            <option value=\"ru\">Coeficiente r<sub>u<\u002Fsub><\u002Foption>\n            <option value=\"seco\">Talude seco<\u002Foption>\n          <\u002Fselect><\u002Fdiv>\n        <div id=\"wrapNA\"><label for=\"nivelAgua\">Cota do NA (m)<\u002Flabel>\n          <input id=\"nivelAgua\" type=\"number\" value=\"0\" min=\"0\" step=\"0.5\"><\u002Fdiv>\n        <div id=\"wrapRu\" style=\"display:none\"><label for=\"ru\">r<sub>u<\u002Fsub> (0–0,6)<\u002Flabel>\n          <input id=\"ru\" type=\"number\" value=\"0.2\" min=\"0\" max=\"0.6\" step=\"0.05\"><\u002Fdiv>\n      <\u002Fdiv>\n      <p class=\"hint\">NA horizontal: u = γ<sub>w<\u002Fsub>·(NA − y<sub>base<\u002Fsub>), com γ<sub>w<\u002Fsub> = 9,81 kN/m³. Modelo r<sub>u<\u002Fsub>: u = r<sub>u<\u002Fsub>·σ<sub>v<\u002Fsub>.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"section\">\n      <h2>5 · Cargas<\u002Fh2>\n      <div class=\"grid3\">\n        <div><label for=\"sobrecarga\">Sobrecarga na crista q (kPa)<\u002Flabel>\n          <input id=\"sobrecarga\" type=\"number\" value=\"0\" min=\"0\" max=\"200\" step=\"1\"><\u002Fdiv>\n        <div><label for=\"kh\">Sísmico k<sub>h<\u002Fsub><\u002Flabel>\n          <input id=\"kh\" type=\"number\" value=\"0\" min=\"0\" max=\"0.3\" step=\"0.01\"><\u002Fdiv>\n        <div><label for=\"kv\">Sísmico k<sub>v<\u002Fsub><\u002Flabel>\n          <input id=\"kv\" type=\"number\" value=\"0\" min=\"0\" max=\"0.2\" step=\"0.01\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"section\">\n      <h2>6 · Critério de segurança (NBR 11.682)<\u002Fh2>\n      <div class=\"grid2\">\n        <div><label for=\"nivelVidas\">Segurança contra perda de vidas<\u002Flabel>\n          <select id=\"nivelVidas\">\n            <option value=\"alto\">Alto<\u002Foption>\n            <option value=\"medio\" selected=\"\">Médio<\u002Foption>\n            <option value=\"baixo\">Baixo<\u002Foption>\n          <\u002Fselect><\u002Fdiv>\n        <div><label for=\"nivelMat\">Danos materiais e ambientais<\u002Flabel>\n          <select id=\"nivelMat\">\n            <option value=\"alto\">Alto<\u002Foption>\n            <option value=\"medio\" selected=\"\">Médio<\u002Foption>\n            <option value=\"baixo\">Baixo<\u002Foption>\n          <\u002Fselect><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"grid2\" style=\"margin-top:10px\">\n        <div><label for=\"fsCustom\">FS mínimo (editável)<\u002Flabel>\n          <input id=\"fsCustom\" type=\"number\" value=\"1.4\" min=\"1\" max=\"3\" step=\"0.05\"><\u002Fdiv>\n        <div><label for=\"metodo\">Método de cálculo<\u002Flabel>\n          <select id=\"metodo\">\n            <option value=\"bishop\" selected=\"\">Bishop Simplificado<\u002Foption>\n            <option value=\"fellenius\">Fellenius (ordinário)<\u002Foption>\n            <option value=\"ambos\">Comparar os dois<\u002Foption>\n          <\u002Fselect><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"grid2\" style=\"margin-top:10px\">\n        <div><label for=\"nFatias\">Número de fatias<\u002Flabel>\n          <select id=\"nFatias\"><option>20<\u002Foption><option selected=\"\">30<\u002Foption><option>40<\u002Foption><option>60<\u002Foption><\u002Fselect><\u002Fdiv>\n        <div><label for=\"refinar\">Refinamento da busca<\u002Flabel>\n          <select id=\"refinar\">\n            <option value=\"normal\" selected=\"\">Normal (grade + refino local)<\u002Foption>\n            <option value=\"rapido\">Rápido (grade grossa)<\u002Foption>\n            <option value=\"fino\">Fino (grade densa + refino)<\u002Foption>\n          <\u002Fselect><\u002Fdiv>\n      <\u002Fdiv>\n      <p class=\"hint\" id=\"hintFS\"><\u002Fp>\n    <\u002Fdiv>\n\n    <button class=\"primary full\" id=\"btnCalcular\">Calcular estabilidade<\u002Fbutton>\n    <button class=\"dark full\" id=\"btnOtimizar\">Sugerir configuração automática<\u002Fbutton>\n    <div class=\"progress\"><div id=\"barra\"><\u002Fdiv><\u002Fdiv>\n    <div class=\"message\" id=\"mensagem\"><\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ==================== RESULTADOS ==================== -->\n  <div class=\"right\">\n\n    <div class=\"results\">\n      <div class=\"metric\" id=\"boxFS\">\n        <div class=\"label\">Fator de segurança<\u002Fdiv>\n        <div class=\"value num\" id=\"outFS\">—<\u002Fdiv>\n        <div class=\"small\" id=\"outStatus\">Aguardando cálculo<\u002Fdiv>\n        <div class=\"gauge\" aria-hidden=\"true\">\n          <div class=\"tick\" style=\"left:33.3%\"><\u002Fdiv>\n          <div class=\"tick\" style=\"left:55.5%\"><\u002Fdiv>\n          <div class=\"marker\" id=\"gaugeMarker\" style=\"left:0%\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"gauge-scale num\"><span>0,5<\u002Fspan><span>1,0<\u002Fspan><span>1,5<\u002Fspan><span>≥ 2,0<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"metric\">\n        <div class=\"label\">Método e busca<\u002Fdiv>\n        <div class=\"small\" id=\"outMetodo\" style=\"font-size:15px;margin-top:6px\">—<\u002Fdiv>\n        <div class=\"hint\" id=\"outBusca\"><\u002Fdiv>\n        <div class=\"hint num\" id=\"outCirculo\"><\u002Fdiv>\n        <div class=\"hint num\" id=\"outComparacao\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"metric note\">\n        <div class=\"label\">Avaliação técnica<\u002Fdiv>\n        <div id=\"outAvaliacao\" style=\"margin-top:6px\">Preencha os dados e execute o cálculo.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"card\">\n      <div class=\"toolbar\">\n        <h3>Seção transversal<\u002Fh3>\n        <div class=\"tools\">\n          <button class=\"mini\" id=\"btnToggleFatias\">Mostrar fatias<\u002Fbutton>\n          <button class=\"mini\" id=\"btnToggleTop5\">Top 5 círculos<\u002Fbutton>\n          <button class=\"mini\" id=\"btnPNG\">Exportar PNG<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"canvasWrap\"><canvas id=\"canvas\" width=\"1520\" height=\"860\"><\u002Fcanvas><\u002Fdiv>\n      <div class=\"legend\">\n        <span><span class=\"dot\" style=\"background:#b3372f\"><\u002Fspan>Superfície crítica<\u002Fspan>\n        <span><span class=\"dot\" style=\"background:#2f6fab\"><\u002Fspan>Nível d'água<\u002Fspan>\n        <span><span class=\"dot\" style=\"background:#c07a22\"><\u002Fspan>Cotas e dimensões<\u002Fspan>\n        <span id=\"legendCamadas\"><\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"card\">\n      <details>\n        <summary>Tabela de fatias da superfície crítica <span class=\"hint\" id=\"fatiaResumo\"><\u002Fspan><\u002Fsummary>\n        <div style=\"text-align:right;margin:8px 0\"><button class=\"mini\" id=\"btnCSV\">Exportar CSV<\u002Fbutton><\u002Fdiv>\n        <div class=\"tableWrap\">\n          <table id=\"tabFatias\">\n            <thead><tr>\n              <th>#<\u002Fth><th>x (m)<\u002Fth><th>y base (m)<\u002Fth><th>h (m)<\u002Fth><th>b (m)<\u002Fth>\n              <th>W (kN/m)<\u002Fth><th>α (°)<\u002Fth><th>L (m)<\u002Fth><th>c′ (kPa)<\u002Fth>\n              <th>φ′ (°)<\u002Fth><th>u (kPa)<\u002Fth><th>Camada<\u002Fth>\n            <\u002Ftr><\u002Fthead>\n            <tbody><\u002Ftbody>\n          <\u002Ftable>\n        <\u002Fdiv>\n      <\u002Fdetails>\n    <\u002Fdiv>\n\n    <div class=\"card\" id=\"cardOtim\" style=\"display:none\">\n      <h3 style=\"margin:0 0 6px\">Sugestão automática de configuração<\u002Fh3>\n      <div class=\"optResult\" id=\"optOut\"><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"card\">\n      <details>\n        <summary>Histórico de cálculos desta sessão<\u002Fsummary>\n        <div class=\"tableWrap\" style=\"max-height:200px\">\n          <table id=\"tabHist\">\n            <thead><tr><th>#<\u002Fth><th>Hora<\u002Fth><th>H (m)<\u002Fth><th>β (°)<\u002Fth><th>Bermas<\u002Fth>\n              <th>Método<\u002Fth><th>FS<\u002Fth><th>Situação<\u002Fth><\u002Ftr><\u002Fthead>\n            <tbody><\u002Ftbody>\n          <\u002Ftable>\n        <\u002Fdiv>\n      <\u002Fdetails>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fmain>\n\n<footer>\n  <strong>TaludePro<\u002Fstrong> é uma ferramenta de apoio ao projeto e à verificação de estabilidade de taludes por equilíbrio-limite (superfícies circulares).\n  Os resultados dependem da qualidade dos parâmetros geotécnicos adotados e não substituem investigação de campo, ensaios de laboratório\n  nem a análise de um responsável técnico habilitado. Valores de FS mínimo sugeridos conforme NBR 11.682 — confirme sempre a edição vigente da norma.\n<\u002Ffooter>\n\n<script>\n\"use strict\";\n//<ENGINE>\n/* ============================================================\n   TaludePro — MOTOR DE CÁLCULO (independente de DOM)\n   Equilíbrio-limite, superfícies circulares.\n   Métodos: Fellenius (ordinário) e Bishop Simplificado.\n   Unidades: kN, m, kPa, graus (convertidos internamente).\n   Convenção: pé do talude em (0,0); y cresce para cima.\n   ============================================================ */\nconst RAD = Math.PI / 180;\nconst GAMMA_W = 9.81; // kN/m³\n\n/* ---------- Validação ---------- */\nfunction validarEntrada(d) {\n  const err = [];\n  if (!(d.H > 0 && d.H <= 100)) err.push(\"Altura H deve estar entre 0 e 100 m.\");\n  if (!(d.beta >= 10 && d.beta <= 80)) err.push(\"Ângulo β deve estar entre 10° e 80°.\");\n  if (!Array.isArray(d.layers) || d.layers.length === 0) err.push(\"Defina ao menos uma camada de solo.\");\n  (d.layers || []).forEach((c, i) => {\n    if (!(c.gamma >= 10 && c.gamma <= 26)) err.push(`Camada ${i + 1}: γ = ${c.gamma} fora do intervalo 10–26 kN/m³.`);\n    if (!(c.c >= 0 && c.c <= 500)) err.push(`Camada ${i + 1}: c′ = ${c.c} fora do intervalo 0–500 kPa.`);\n    if (!(c.phi >= 0 && c.phi <= 50)) err.push(`Camada ${i + 1}: φ′ = ${c.phi} fora do intervalo 0–50°.`);\n  });\n  const bermas = (d.berms || []).slice().sort((a, b) => a.y - b.y);\n  bermas.forEach((b, i) => {\n    if (!(b.y > 0 && b.y < d.H)) err.push(`Berma ${i + 1}: cota ${b.y} m fora do intervalo (0, H).`);\n    if (!(b.w >= 1)) err.push(`Berma ${i + 1}: largura ${b.w} m menor que 1,0 m.`);\n    if (i > 0 && b.y - bermas[i - 1].y < 2) err.push(`Espaçamento vertical entre bermas ${i} e ${i + 1} menor que 2,0 m.`);\n  });\n  if (d.waterMode === \"na\" && !(d.NA >= 0 && d.NA <= d.H)) err.push(\"Cota do NA deve estar entre 0 e H.\");\n  if (d.waterMode === \"ru\" && !(d.ru >= 0 && d.ru <= 0.6)) err.push(\"ru deve estar entre 0 e 0,6.\");\n  if (!(d.q >= 0 && d.q <= 200)) err.push(\"Sobrecarga q deve estar entre 0 e 200 kPa.\");\n  if (!(d.kh >= 0 && d.kh <= 0.3)) err.push(\"kh deve estar entre 0 e 0,30.\");\n  if (!(d.kv >= 0 && d.kv <= 0.2)) err.push(\"kv deve estar entre 0 e 0,20.\");\n  return err;\n}\n\n/* ---------- Geometria do perfil ---------- */\nfunction buildProfile(d) {\n  const tanB = Math.tan(d.beta * RAD);\n  const berms = (d.berms || []).slice().sort((a, b) => a.y - b.y);\n  const footprint = d.H / tanB + berms.reduce((s, b) => s + b.w, 0);\n  const xLeft = -Math.max(0.8 * d.H, 6);\n  const crestLen = Math.max(1.4 * d.H, 10);\n  const pts = [{ x: xLeft, y: 0 }, { x: 0, y: 0 }];\n  let x = 0, y = 0;\n  for (const b of berms) {\n    x += (b.y - y) / tanB;              // subida até a cota da berma\n    pts.push({ x, y: b.y });\n    x += b.w;                            // patamar da berma\n    pts.push({ x, y: b.y });\n    y = b.y;\n  }\n  x += (d.H - y) / tanB;                 // subida final até a crista\n  pts.push({ x, y: d.H });\n  const crestX = x;\n  pts.push({ x: x + crestLen, y: d.H }); // platô da crista\n  return { pts, xLeft, xRight: x + crestLen, crestX, footprint, berms };\n}\n\nfunction surfY(prof, x) {\n  const p = prof.pts;\n  if (x <= p[0].x) return p[0].y;\n  if (x >= p[p.length - 1].x) return p[p.length - 1].y;\n  for (let i = 1; i < p.length; i++) {\n    if (x <= p[i].x) {\n      const a = p[i - 1], b = p[i];\n      if (b.x === a.x) return Math.max(a.y, b.y);\n      return a.y + (b.y - a.y) * (x - a.x) / (b.x - a.x);\n    }\n  }\n  return p[p.length - 1].y;\n}\n\n/* Camadas: ordenadas por cota do topo (desc.); a última estende-se em profundidade. */\nfunction sortLayers(layers) {\n  return layers.slice().sort((a, b) => b.top - a.top);\n}\nfunction layerAt(layersSorted, y) {\n  for (let i = layersSorted.length - 1; i >= 0; i--) {\n    if (y <= layersSorted[i].top || i === layersSorted.length - 1) {\n      // percorre de baixo para cima: primeira camada cujo topo >= y\n    }\n  }\n  // implementação direta: primeira camada (de cima p/ baixo) cujo topo >= y; senão, a mais profunda\n  for (let i = 0; i < layersSorted.length; i++) {\n    const next = layersSorted[i + 1];\n    const bottom = next ? next.top : -Infinity;\n    if (y <= layersSorted[i].top && y > bottom) return layersSorted[i];\n  }\n  return y > layersSorted[0].top ? layersSorted[0] : layersSorted[layersSorted.length - 1];\n}\n\n/* Peso da coluna de solo entre yb e ys (largura b), somando camadas atravessadas. */\nfunction columnWeight(layersSorted, yb, ys, b) {\n  let W = 0, y0 = yb;\n  for (let i = layersSorted.length - 1; i >= 0; i--) {\n    const top = Math.min(layersSorted[i].top, ys);\n    const next = layersSorted[i + 1];\n    const bottom = Math.max(next ? next.top : -Infinity, y0);\n    if (top > bottom && top > y0) {\n      const seg = Math.min(top, ys) - Math.max(bottom, yb);\n      if (seg > 0) W += layersSorted[i].gamma * seg * b;\n    }\n  }\n  // fallback simples e robusto: integração por sub-passos (evita casos de borda)\n  if (W <= 0) {\n    const n = 8, dy = (ys - yb) / n;\n    for (let k = 0; k < n; k++) {\n      const ym = yb + (k + 0.5) * dy;\n      W += layerAt(layersSorted, ym).gamma * dy * b;\n    }\n  }\n  return W;\n}\n\n/* ---------- Interseção círculo × terreno ---------- */\nfunction circleIntersections(prof, c) {\n  const { Xc, Yc, R } = c;\n  const xa = Math.max(prof.xLeft, Xc - R), xb = Math.min(prof.xRight, Xc + R);\n  if (xb <= xa) return null;\n  const N = 400, xs = [];\n  let prev = null;\n  for (let i = 0; i <= N; i++) {\n    const x = xa + (xb - xa) * i / N;\n    const dx = x - Xc;\n    const disc = R * R - dx * dx;\n    if (disc <= 0) { prev = null; continue; }\n    const ycirc = Yc - Math.sqrt(disc);\n    const f = surfY(prof, x) - ycirc;   // >0: círculo abaixo do terreno\n    if (prev && prev.f * f < 0) {\n      const t = prev.f / (prev.f - f);\n      xs.push(prev.x + t * (x - prev.x));\n    }\n    prev = { x, f };\n  }\n  if (xs.length < 2) return null;\n  return { x1: xs[0], x2: xs[xs.length - 1] };\n}\n\n/* ---------- Fatias ---------- */\nfunction makeSlices(d, prof, circle, nSlices) {\n  const inter = circleIntersections(prof, circle);\n  if (!inter) return null;\n  const { x1, x2 } = inter;\n  if (x2 - x1 < 0.5) return null;\n  const layers = sortLayers(d.layers);\n  const b = (x2 - x1) / nSlices;\n  const slices = [];\n  let invalid = 0;\n  for (let i = 0; i < nSlices; i++) {\n    const xm = x1 + (i + 0.5) * b;\n    const dx = xm - circle.Xc;\n    const disc = circle.R * circle.R - dx * dx;\n    if (disc <= 0) { invalid++; continue; }\n    const yb = circle.Yc - Math.sqrt(disc);\n    const ys = surfY(prof, xm);\n    const h = ys - yb;\n    if (h <= 0.005) { invalid++; continue; }\n    if (yb < -0.6 * d.H) return null;          // profundidade excessiva — círculo rejeitado\n    const alpha = Math.asin(dx / circle.R);    // inclinação da base\n    if (Math.abs(alpha) > 80 * RAD) { invalid++; continue; }\n    const L = b / Math.cos(alpha);\n    let W = columnWeight(layers, yb, ys, b);\n    // Sobrecarga aplicada apenas no platô da crista\n    if (d.q > 0 && ys >= d.H - 1e-6 && xm >= prof.crestX - 1e-6) W += d.q * b;\n    // Poropressão na base\n    let u = 0;\n    if (d.waterMode === \"na\" && d.NA > 0 && d.NA > yb) u = GAMMA_W * (d.NA - yb);\n    else if (d.waterMode === \"ru\") u = d.ru * (W / b);\n    const cam = layerAt(layers, yb + 0.01);\n    slices.push({ i: slices.length + 1, x: xm, b, yb, ys, h, W, alpha, L, c: cam.c, phi: cam.phi * RAD, phiDeg: cam.phi, u, layer: cam.name });\n  }\n  if (slices.length < Math.max(6, nSlices * 0.6)) return null;\n  return slices;\n}\n\n/* ---------- Métodos de cálculo ---------- */\nfunction felleniusFS(slices, kh, kv) {\n  let num = 0, den = 0;\n  for (const s of slices) {\n    const Wv = s.W * (1 - kv);\n    const N = Wv * Math.cos(s.alpha) - kh * s.W * Math.sin(s.alpha) - s.u * s.L;\n    num += s.c * s.L + Math.max(N, 0) * Math.tan(s.phi);\n    den += Wv * Math.sin(s.alpha) + kh * s.W * Math.cos(s.alpha);\n  }\n  if (den <= 0) return null;\n  return { fs: num / den, iterations: 1 };\n}\n\nfunction bishopFS(slices, kh, kv) {\n  let den = 0;\n  for (const s of slices) {\n    den += s.W * (1 - kv) * Math.sin(s.alpha) + kh * s.W * Math.cos(s.alpha);\n  }\n  if (den <= 0) return null;\n  let fs = 1.3;\n  for (let it = 1; it <= 60; it++) {\n    let num = 0;\n    for (const s of slices) {\n      const Wv = s.W * (1 - kv);\n      const m = Math.cos(s.alpha) + Math.sin(s.alpha) * Math.tan(s.phi) / fs;\n      if (m <= 0.05) { num = NaN; break; }\n      num += (s.c * s.b + Math.max(Wv - s.u * s.b, 0) * Math.tan(s.phi)) / m;\n    }\n    if (!Number.isFinite(num)) return null;\n    const next = num / den;\n    if (Math.abs(next - fs) < 1e-4) return { fs: next, iterations: it };\n    fs = next;\n    if (fs < 0.05 || fs > 50) return null;\n  }\n  return { fs, iterations: 60 };\n}\n\nfunction analyzeCircle(d, prof, circle, method, nSlices) {\n  const slices = makeSlices(d, prof, circle, nSlices);\n  if (!slices) return null;\n  const r = method === \"fellenius\" ? felleniusFS(slices, d.kh, d.kv) : bishopFS(slices, d.kh, d.kv);\n  if (!r || !Number.isFinite(r.fs) || r.fs <= 0) return null;\n  return { fs: r.fs, iterations: r.iterations, circle, slices };\n}\n\n/* ---------- Busca da superfície crítica ---------- */\nfunction* gridCircles(d, prof, density) {\n  const H = d.H, cx = prof.crestX;\n  const nx = density === \"fino\" ? 16 : density === \"rapido\" ? 8 : 12;\n  const ny = density === \"fino\" ? 12 : density === \"rapido\" ? 6 : 9;\n  const nr = density === \"fino\" ? 10 : density === \"rapido\" ? 6 : 8;\n  const x0 = -0.25 * cx, x1 = 1.35 * cx;\n  const y0 = 0.7 * H, y1 = 2.6 * H;\n  for (let i = 0; i <= nx; i++) {\n    const Xc = x0 + (x1 - x0) * i / nx;\n    for (let j = 0; j <= ny; j++) {\n      const Yc = y0 + (y1 - y0) * j / ny;\n      const rSurf = Yc - surfY(prof, Xc);           // distância vertical até a superfície\n      const rMin = Math.max(rSurf * 1.02, 0.3 * H);\n      const rMax = Math.hypot(Xc - prof.xLeft * 0.5, Yc + 0.5 * H);\n      if (rMax <= rMin) continue;\n      for (let k = 0; k <= nr; k++) {\n        const R = rMin + (rMax - rMin) * k / nr;\n        yield { Xc, Yc, R };\n      }\n    }\n  }\n}\n\n/* Refino local (padrão de busca por coordenadas) em torno do melhor círculo. */\nfunction refineLocal(d, prof, best, method, nSlices) {\n  let cur = best;\n  let step = { x: 0.06 * d.H, y: 0.06 * d.H, r: 0.06 * d.H };\n  for (let round = 0; round < 4; round++) {\n    let improved = true;\n    while (improved) {\n      improved = false;\n      for (const delta of [\n        { Xc: step.x, Yc: 0, R: 0 }, { Xc: -step.x, Yc: 0, R: 0 },\n        { Xc: 0, Yc: step.y, R: 0 }, { Xc: 0, Yc: -step.y, R: 0 },\n        { Xc: 0, Yc: 0, R: step.r }, { Xc: 0, Yc: 0, R: -step.r }]) {\n        const cand = { Xc: cur.circle.Xc + delta.Xc, Yc: cur.circle.Yc + delta.Yc, R: cur.circle.R + delta.R };\n        if (cand.R < 0.2 * d.H) continue;\n        const r = analyzeCircle(d, prof, cand, method, nSlices);\n        if (r && r.fs < cur.fs - 1e-5) { cur = r; improved = true; }\n      }\n    }\n    step = { x: step.x / 2, y: step.y / 2, r: step.r / 2 };\n  }\n  return cur;\n}\n\n/* Busca completa síncrona (usada nos testes e no otimizador). */\nfunction searchCriticalSync(d, prof, method, nSlices, density, refine) {\n  let best = null;\n  const top = [];\n  for (const c of gridCircles(d, prof, density)) {\n    const r = analyzeCircle(d, prof, c, method, nSlices);\n    if (!r) continue;\n    top.push({ fs: r.fs, circle: c });\n    if (!best || r.fs < best.fs) best = r;\n  }\n  if (!best) return null;\n  top.sort((a, b) => a.fs - b.fs);\n  if (refine) best = refineLocal(d, prof, best, method, nSlices);\n  best.top5 = top.slice(0, 5);\n  return best;\n}\n\n/* ---------- Otimizador: sugestão automática de configuração ---------- */\n/* Objetivo: menor avanço horizontal (footprint) com FS >= alvo.\n   Varia β (busca binária) para 0, 1 e 2 bermas com larguras candidatas. */\nfunction fsForConfig(d, beta, berms, density, refine) {\n  const cfg = Object.assign({}, d, { beta, berms });\n  const prof = buildProfile(cfg);\n  const r = searchCriticalSync(cfg, prof, \"bishop\", 24, density || \"normal\", !!refine);\n  return r ? { fs: r.fs, footprint: prof.footprint } : null;\n}\n\nfunction optimizeConfig(d, target, onStep) {\n  const results = [];\n  const combos = [{ nb: 0, w: 0 }];\n  for (const nb of [1, 2]) for (const w of [2, 3, 4]) combos.push({ nb, w });\n  let step = 0;\n  for (const cb of combos) {\n    const mkBerms = () => {\n      const out = [];\n      for (let i = 1; i <= cb.nb; i++) out.push({ y: +(d.H * i / (cb.nb + 1)).toFixed(2), w: cb.w });\n      return out;\n    };\n    // valida espaçamento mínimo de 2 m entre bermas\n    if (cb.nb > 0 && d.H / (cb.nb + 1) < 2) { step++; continue; }\n    let lo = 14, hi = 68, passBeta = null, passInfo = null;\n    const rHi = fsForConfig(d, hi, mkBerms());\n    const rLo = fsForConfig(d, lo, mkBerms());\n    if (rHi && rHi.fs >= target) { passBeta = hi; passInfo = rHi; }\n    else if (!rLo || rLo.fs < target) { passBeta = null; }\n    else {\n      for (let it = 0; it < 8; it++) {\n        const mid = (lo + hi) / 2;\n        const r = fsForConfig(d, mid, mkBerms());\n        if (r && r.fs >= target) { lo = mid; passBeta = mid; passInfo = r; }\n        else hi = mid;\n      }\n    }\n    /* Verificação final com busca refinada (a grade da busca binária pode\n       superestimar o FS em rupturas locais). Se reprovar, recua β até passar. */\n    if (passBeta !== null) {\n      let vb = passBeta;\n      let v = fsForConfig(d, vb, mkBerms(), \"normal\", true);\n      let guard = 0;\n      while ((!v || v.fs < target) && vb - 2 >= 14 && guard++ < 10) {\n        vb -= 2;\n        v = fsForConfig(d, vb, mkBerms(), \"normal\", true);\n      }\n      if (v && v.fs >= target) { passBeta = vb; passInfo = v; }\n      else { passBeta = null; passInfo = null; }\n    }\n    results.push({\n      nb: cb.nb, w: cb.w, beta: passBeta,\n      fs: passInfo ? passInfo.fs : (rLo ? rLo.fs : null),\n      footprint: passInfo ? passInfo.footprint : null,\n      ok: passBeta !== null\n    });\n    if (onStep) onStep(++step, combos.length);\n  }\n  const ok = results.filter(r => r.ok);\n  ok.sort((a, b) => a.footprint - b.footprint);\n  return { best: ok[0] || null, all: results };\n}\n//<\u002FENGINE>\n\n/* ============================================================\n   TaludePro — INTERFACE\n   ============================================================ */\nconst $ = id => document.getElementById(id);\nconst fmt = (v, d = 2) => Number(v).toLocaleString(\"pt-BR\", { minimumFractionDigits: d, maximumFractionDigits: d });\n\n/* ---------- Banco de solos (valores típicos de referência) ---------- */\nconst SOLOS = [\n  { id: \"arg_muito_mole\", nome: \"Argila muito mole (SPT 0–2)\", gamma: 15.5, c: 5,  phi: 20 },\n  { id: \"arg_mole\",       nome: \"Argila mole (SPT 3–5)\",       gamma: 16.5, c: 8,  phi: 22 },\n  { id: \"arg_media\",      nome: \"Argila média (SPT 6–10)\",     gamma: 17.5, c: 15, phi: 24 },\n  { id: \"arg_rija\",       nome: \"Argila rija (SPT 11–19)\",     gamma: 19,   c: 25, phi: 26 },\n  { id: \"arg_dura\",       nome: \"Argila dura (SPT ≥ 20)\",      gamma: 20,   c: 40, phi: 28 },\n  { id: \"arg_porosa\",     nome: \"Argila porosa colapsível (Centro-Oeste)\", gamma: 15, c: 10, phi: 26 },\n  { id: \"areia_fofa\",     nome: \"Areia fofa (SPT ≤ 4)\",        gamma: 17,   c: 0,  phi: 28 },\n  { id: \"areia_media\",    nome: \"Areia medianamente compacta\", gamma: 18.5, c: 0,  phi: 32 },\n  { id: \"areia_compacta\", nome: \"Areia compacta (SPT ≥ 19)\",   gamma: 20,   c: 0,  phi: 36 },\n  { id: \"areia_siltosa\",  nome: \"Areia siltosa\",               gamma: 18,   c: 2,  phi: 30 },\n  { id: \"silte_arenoso\",  nome: \"Silte arenoso\",               gamma: 18,   c: 5,  phi: 28 },\n  { id: \"silte_argiloso\", nome: \"Silte argiloso\",              gamma: 17.5, c: 10, phi: 26 },\n  { id: \"res_jovem\",      nome: \"Solo residual jovem (granito/gnaisse)\", gamma: 18.5, c: 15, phi: 29 },\n  { id: \"res_maduro\",     nome: \"Solo residual maduro\",        gamma: 18,   c: 12, phi: 27 },\n  { id: \"saprolito\",      nome: \"Saprolito\",                   gamma: 19.5, c: 22, phi: 32 },\n  { id: \"coluvio\",        nome: \"Solo coluvionar (encosta)\",   gamma: 17.5, c: 8,  phi: 24 },\n  { id: \"talus\",          nome: \"Tálus (blocos em matriz)\",    gamma: 18,   c: 5,  phi: 30 },\n  { id: \"lateritico\",     nome: \"Solo laterítico compactado\",  gamma: 18.5, c: 20, phi: 30 },\n  { id: \"aterro_bom\",     nome: \"Aterro compactado (controle bom)\", gamma: 19.5, c: 10, phi: 32 },\n  { id: \"aterro_lancado\", nome: \"Aterro lançado (sem controle)\", gamma: 17, c: 3,  phi: 25 },\n  { id: \"pedregulho\",     nome: \"Pedregulho / cascalho\",       gamma: 20,   c: 0,  phi: 38 },\n  { id: \"rocha_w4\",       nome: \"Rocha muito alterada (W4/W5)\", gamma: 21,  c: 50, phi: 35 },\n  { id: \"rocha_w3\",       nome: \"Rocha alterada (W3)\",         gamma: 22,   c: 80, phi: 38 }\n];\nconst CORES_CAMADAS = [\"#c9a36a\", \"#a67443\", \"#8c5f3a\", \"#d3b88a\", \"#75503a\", \"#9c8a5a\", \"#b98a4e\", \"#5e4534\"];\n\n/* ---------- FS mínimo — NBR 11.682 (Tabela de níveis de segurança) ---------- */\nconst FS_NBR = {\n  alto:  { alto: 1.5, medio: 1.5, baixo: 1.4 },\n  medio: { alto: 1.5, medio: 1.4, baixo: 1.3 },\n  baixo: { alto: 1.4, medio: 1.3, baixo: 1.2 }\n};\nfunction fsMinimoNorma() {\n  return FS_NBR[$(\"nivelVidas\").value][$(\"nivelMat\").value];\n}\nfunction atualizarHintFS(auto) {\n  const v = fsMinimoNorma();\n  if (auto) $(\"fsCustom\").value = v.toFixed(2);\n  $(\"hintFS\").innerHTML = `FS mínimo sugerido pela NBR 11.682 para os níveis selecionados: <strong>${fmt(v)}<\u002Fstrong>. O campo acima pode ser ajustado para critérios de projeto específicos.`;\n}\n\n/* ---------- Estado ---------- */\nconst state = { input: null, prof: null, result: null, resultAlt: null, showSlices: false, showTop5: false, hist: [] };\n\n/* ---------- Linhas dinâmicas ---------- */\nfunction addBerma(y = 6, w = 3) {\n  const r = document.createElement(\"div\");\n  r.className = \"berma\";\n  r.innerHTML = `\n    <div><label>Cota (m)<\u002Flabel><input class=\"b-y\" type=\"number\" value=\"${y}\" step=\"0.5\" min=\"0.5\"><\u002Fdiv>\n    <div><label>Largura (m)<\u002Flabel><input class=\"b-w\" type=\"number\" value=\"${w}\" step=\"0.5\" min=\"1\"><\u002Fdiv>\n    <button class=\"danger mini\" title=\"Remover berma\">×<\u002Fbutton>`;\n  r.querySelector(\"button\").onclick = () => { r.remove(); calcular(); };\n  $(\"bermas\").appendChild(r);\n}\nfunction addCamada(nome = \"Camada\", top = 100, gamma = 18, c = 10, phi = 28) {\n  const idx = document.querySelectorAll(\".camada\").length;\n  const cor = CORES_CAMADAS[idx % CORES_CAMADAS.length];\n  const r = document.createElement(\"div\");\n  r.className = \"camada\";\n  r.innerHTML = `\n    <div><div class=\"swatch\" style=\"background:${cor}\"><\u002Fdiv><label>Nome<\u002Flabel><input class=\"c-n\" value=\"${nome}\"><\u002Fdiv>\n    <div><label>Topo (m)<\u002Flabel><input class=\"c-t\" type=\"number\" value=\"${top}\" step=\"0.5\"><\u002Fdiv>\n    <div><label>γ<\u002Flabel><input class=\"c-g\" type=\"number\" value=\"${gamma}\" step=\"0.1\" min=\"10\" max=\"26\"><\u002Fdiv>\n    <div><label>c′<\u002Flabel><input class=\"c-c\" type=\"number\" value=\"${c}\" step=\"1\" min=\"0\" max=\"500\"><\u002Fdiv>\n    <div><label>φ′<\u002Flabel><input class=\"c-p\" type=\"number\" value=\"${phi}\" step=\"0.5\" min=\"0\" max=\"50\"><\u002Fdiv>\n    <button class=\"danger mini\" title=\"Remover camada\">×<\u002Fbutton>`;\n  r.querySelector(\"button\").onclick = () => {\n    if (document.querySelectorAll(\".camada\").length <= 1) { alert(\"É necessária ao menos uma camada.\"); return; }\n    r.remove(); calcular();\n  };\n  $(\"camadas\").appendChild(r);\n}\nfunction readBermas() {\n  return [...document.querySelectorAll(\".berma\")].map(r => ({\n    y: parseFloat(r.querySelector(\".b-y\").value),\n    w: parseFloat(r.querySelector(\".b-w\").value)\n  }));\n}\nfunction readCamadas() {\n  return [...document.querySelectorAll(\".camada\")].map((r, i) => ({\n    name: r.querySelector(\".c-n\").value || `Camada ${i + 1}`,\n    top: parseFloat(r.querySelector(\".c-t\").value),\n    gamma: parseFloat(r.querySelector(\".c-g\").value),\n    c: parseFloat(r.querySelector(\".c-c\").value),\n    phi: parseFloat(r.querySelector(\".c-p\").value),\n    cor: CORES_CAMADAS[i % CORES_CAMADAS.length]\n  }));\n}\n\n/* ---------- Coleta e validação ---------- */\nfunction collect() {\n  const d = {\n    project: $(\"projNome\").value.trim(), client: $(\"projCliente\").value.trim(),\n    H: parseFloat($(\"altura\").value), beta: parseFloat($(\"angulo\").value),\n    berms: readBermas(), layers: readCamadas(),\n    waterMode: $(\"regimeAgua\").value,\n    NA: parseFloat($(\"nivelAgua\").value) || 0, ru: parseFloat($(\"ru\").value) || 0,\n    q: parseFloat($(\"sobrecarga\").value) || 0,\n    kh: parseFloat($(\"kh\").value) || 0, kv: parseFloat($(\"kv\").value) || 0,\n    method: $(\"metodo\").value, nSlices: parseInt($(\"nFatias\").value, 10),\n    density: $(\"refinar\").value === \"fino\" ? \"fino\" : $(\"refinar\").value === \"rapido\" ? \"rapido\" : \"normal\",\n    fsMin: parseFloat($(\"fsCustom\").value) || fsMinimoNorma()\n  };\n  const errs = validarEntrada(d);\n  if (errs.length) throw new Error(errs.join(\"\\n\"));\n  return d;\n}\n\n/* ---------- Busca assíncrona (mantém a interface responsiva) ---------- */\nasync function searchCriticalAsync(d, prof, method, onProgress) {\n  const circles = [...gridCircles(d, prof, d.density)];\n  let best = null; const top = [];\n  const chunk = 60;\n  for (let i = 0; i < circles.length; i += chunk) {\n    for (let j = i; j < Math.min(i + chunk, circles.length); j++) {\n      const r = analyzeCircle(d, prof, circles[j], method, d.nSlices);\n      if (!r) continue;\n      top.push({ fs: r.fs, circle: circles[j] });\n      if (!best || r.fs < best.fs) best = r;\n    }\n    onProgress(Math.min(1, (i + chunk) / circles.length) * 0.85);\n    await new Promise(res => setTimeout(res, 0));\n  }\n  if (!best) return null;\n  top.sort((a, b) => a.fs - b.fs);\n  if (d.density !== \"rapido\") { best = refineLocal(d, prof, best, method, d.nSlices); }\n  onProgress(1);\n  best.top5 = top.slice(0, 5);\n  return best;\n}\n\n/* ---------- Execução principal ---------- */\nlet calcToken = 0;\nasync function calcular() {\n  const token = ++calcToken;\n  const btn = $(\"btnCalcular\");\n  try {\n    btn.disabled = true;\n    $(\"mensagem\").textContent = \"Validando entrada…\";\n    const d = collect();\n    const prof = buildProfile(d);\n    state.input = d; state.prof = prof;\n    desenhar();\n    $(\"mensagem\").textContent = \"Buscando a superfície crítica…\";\n    const met1 = d.method === \"ambos\" ? \"bishop\" : d.method;\n    const r = await searchCriticalAsync(d, prof, met1, p => { if (token === calcToken) $(\"barra\").style.width = `${Math.round(p * 100)}%`; });\n    if (token !== calcToken) return;\n    let rAlt = null;\n    if (d.method === \"ambos\" && r) {\n      $(\"mensagem\").textContent = \"Calculando também por Fellenius…\";\n      rAlt = analyzeCircle(d, prof, r.circle, \"fellenius\", d.nSlices);\n    }\n    state.result = r; state.resultAlt = rAlt;\n    apresentar(d, r, rAlt, met1);\n    registrarHistorico(d, r, met1);\n    $(\"mensagem\").textContent = r ? \"Análise concluída.\" : \"Nenhuma superfície admissível encontrada — revise a geometria.\";\n  } catch (e) {\n    $(\"mensagem\").textContent = \"Erro: \" + e.message.split(\"\\n\")[0];\n    alert(\"Verifique os dados de entrada:\\n\\n\" + e.message);\n  } finally {\n    if (token === calcToken) { btn.disabled = false; setTimeout(() => { if (token === calcToken) $(\"barra\").style.width = \"0%\"; }, 900); }\n  }\n}\n\n/* ---------- Apresentação dos resultados ---------- */\nfunction apresentar(d, r, rAlt, method) {\n  const nomeMet = m => m === \"bishop\" ? \"Bishop Simplificado\" : \"Fellenius (ordinário)\";\n  if (!r) {\n    $(\"outFS\").textContent = \"—\"; $(\"outStatus\").textContent = \"Sem superfície admissível\";\n    $(\"boxFS\").className = \"metric bad\"; $(\"gaugeMarker\").style.left = \"0%\";\n    $(\"outAvaliacao\").textContent = \"Não foi possível ajustar uma superfície circular à geometria informada. Revise altura, ângulo e bermas.\";\n    $(\"outMetodo\").textContent = nomeMet(method); $(\"outCirculo\").textContent = \"\"; $(\"outComparacao\").textContent = \"\";\n    renderFatias(null); desenhar(); return;\n  }\n  const fsMin = d.fsMin;\n  $(\"outFS\").textContent = fmt(r.fs, 3);\n  const pct = Math.max(0, Math.min(100, (r.fs - 0.5) / 1.5 * 100));\n  $(\"gaugeMarker\").style.left = `calc(${pct}% - 2px)`;\n  let cls, txt, ava;\n  if (r.fs < 1.0) {\n    cls = \"bad\"; txt = \"INSTÁVEL\";\n    ava = `As ações mobilizadoras superam a resistência disponível ao longo da superfície crítica. É necessário rever a concepção geométrica (abatimento do talude, bermas) e/ou prever soluções de estabilização e drenagem.`;\n  } else if (r.fs < fsMin) {\n    cls = \"warn\"; txt = `ABAIXO DO MÍNIMO (${fmt(fsMin)})`;\n    ava = `O fator de segurança calculado é inferior ao mínimo de ${fmt(fsMin)} definido para o nível de segurança selecionado (NBR 11.682). Considere abater o ângulo, ampliar bermas ou controlar a poropressão com drenagem.`;\n  } else {\n    cls = \"ok\"; txt = `ATENDE AO MÍNIMO (${fmt(fsMin)})`;\n    ava = `O fator de segurança supera o mínimo de ${fmt(fsMin)} adotado. A adequação final depende da representatividade dos parâmetros geotécnicos, das condições de drenagem em serviço e da verificação por responsável técnico.`;\n  }\n  $(\"boxFS\").className = `metric ${cls}`;\n  $(\"outStatus\").textContent = txt;\n  $(\"outMetodo\").textContent = nomeMet(method);\n  $(\"outBusca\").textContent = method === \"bishop\" ? `Convergência em ${r.iterations} iteração(ões) · grade + refino local` : \"Solução direta · grade + refino local\";\n  $(\"outCirculo\").textContent = `Centro (${fmt(r.circle.Xc)}, ${fmt(r.circle.Yc)}) m · R = ${fmt(r.circle.R)} m`;\n  $(\"outComparacao\").textContent = rAlt ? `Fellenius na mesma superfície: FS = ${fmt(rAlt.fs, 3)}` : \"\";\n  $(\"outAvaliacao\").innerHTML = ava;\n  renderFatias(r);\n  desenhar();\n}\n\nfunction renderFatias(r) {\n  const tb = $(\"tabFatias\").querySelector(\"tbody\");\n  tb.innerHTML = \"\";\n  if (!r) { $(\"fatiaResumo\").textContent = \"\"; return; }\n  $(\"fatiaResumo\").textContent = `· ${r.slices.length} fatias · ΣW = ${fmt(r.slices.reduce((s, f) => s + f.W, 0), 0)} kN/m`;\n  for (const s of r.slices) {\n    const tr = document.createElement(\"tr\");\n    tr.innerHTML = `<td>${s.i}<\u002Ftd><td class=\"num\">${fmt(s.x)}<\u002Ftd><td class=\"num\">${fmt(s.yb)}<\u002Ftd>\n      <td class=\"num\">${fmt(s.h)}<\u002Ftd><td class=\"num\">${fmt(s.b)}<\u002Ftd><td class=\"num\">${fmt(s.W, 1)}<\u002Ftd>\n      <td class=\"num\">${fmt(s.alpha / RAD, 1)}<\u002Ftd><td class=\"num\">${fmt(s.L)}<\u002Ftd><td class=\"num\">${fmt(s.c, 0)}<\u002Ftd>\n      <td class=\"num\">${fmt(s.phiDeg, 0)}<\u002Ftd><td class=\"num\">${fmt(s.u, 1)}<\u002Ftd><td style=\"text-align:left\">${s.layer}<\u002Ftd>`;\n    tb.appendChild(tr);\n  }\n}\n\nfunction registrarHistorico(d, r, method) {\n  state.hist.unshift({\n    hora: new Date().toLocaleTimeString(\"pt-BR\"), H: d.H, beta: d.beta, nb: d.berms.length,\n    met: method === \"bishop\" ? \"Bishop\" : \"Fellenius\", fs: r ? r.fs : null, fsMin: d.fsMin\n  });\n  state.hist = state.hist.slice(0, 12);\n  const tb = $(\"tabHist\").querySelector(\"tbody\");\n  tb.innerHTML = state.hist.map((h, i) => `<tr><td>${state.hist.length - i}<\u002Ftd><td>${h.hora}<\u002Ftd>\n    <td class=\"num\">${fmt(h.H, 1)}<\u002Ftd><td class=\"num\">${fmt(h.beta, 1)}<\u002Ftd><td class=\"num\">${h.nb}<\u002Ftd>\n    <td>${h.met}<\u002Ftd><td class=\"num\">${h.fs ? fmt(h.fs, 3) : \"—\"}<\u002Ftd>\n    <td>${h.fs === null ? \"—\" : h.fs >= h.fsMin ? '<span class=\"badge ok\">atende<\u002Fspan>' : '<span class=\"badge bad\">não atende<\u002Fspan>'}<\u002Ftd><\u002Ftr>`).join(\"\");\n}\n\n/* ---------- Desenho da seção transversal ---------- */\nfunction desenhar() {\n  const cv = $(\"canvas\"), ctx = cv.getContext(\"2d\");\n  const W = cv.width, Hpx = cv.height;\n  ctx.clearRect(0, 0, W, Hpx);\n  ctx.fillStyle = \"#fbfcf9\"; ctx.fillRect(0, 0, W, Hpx);\n  if (!state.prof || !state.input) return;\n  const d = state.input, prof = state.prof, r = state.result;\n\n  const yBot = -0.45 * d.H;\n  const yTop = Math.max(d.H * 1.25, r ? r.circle.Yc + 1 : 0);\n  const m = { l: 95, r: 40, t: 46, b: 64 };\n  const sx = (W - m.l - m.r) / (prof.xRight - prof.xLeft);\n  const sy = (Hpx - m.t - m.b) / (yTop - yBot);\n  const s = Math.min(sx, sy);\n  const X = x => m.l + (x - prof.xLeft) * s;\n  const Y = y => Hpx - m.b - (y - yBot) * s;\n\n  /* grade de fundo (1 m ou múltiplos) */\n  const stepG = s > 26 ? 1 : s > 13 ? 2 : 5;\n  ctx.strokeStyle = \"#edf0e6\"; ctx.lineWidth = 1;\n  for (let gx = Math.ceil(prof.xLeft / stepG) * stepG; gx <= prof.xRight; gx += stepG) {\n    ctx.beginPath(); ctx.moveTo(X(gx), Y(yBot)); ctx.lineTo(X(gx), Y(yTop)); ctx.stroke();\n  }\n  for (let gy = Math.ceil(yBot / stepG) * stepG; gy <= yTop; gy += stepG) {\n    ctx.beginPath(); ctx.moveTo(X(prof.xLeft), Y(gy)); ctx.lineTo(X(prof.xRight), Y(gy)); ctx.stroke();\n  }\n\n  /* polígono do maciço */\n  const soilPath = () => {\n    ctx.beginPath();\n    ctx.moveTo(X(prof.xLeft), Y(yBot));\n    ctx.lineTo(X(prof.pts[0].x), Y(prof.pts[0].y));\n    for (const p of prof.pts) ctx.lineTo(X(p.x), Y(p.y));\n    ctx.lineTo(X(prof.xRight), Y(yBot));\n    ctx.closePath();\n  };\n\n  /* camadas coloridas, recortadas pelo maciço */\n  const layers = sortLayers(d.layers);\n  ctx.save(); soilPath(); ctx.clip();\n  for (let i = 0; i < layers.length; i++) {\n    const top = Math.min(layers[i].top, yTop);\n    const bottom = i + 1 < layers.length ? layers[i + 1].top : yBot;\n    ctx.fillStyle = layers[i].cor || CORES_CAMADAS[i % CORES_CAMADAS.length];\n    ctx.globalAlpha = 0.55;\n    ctx.fillRect(X(prof.xLeft), Y(top), (prof.xRight - prof.xLeft) * s, (top - bottom) * s);\n    ctx.globalAlpha = 1;\n    /* linha divisória e rótulo */\n    if (i > 0 && layers[i].top < d.H) {\n      ctx.strokeStyle = \"#00000030\"; ctx.setLineDash([6, 5]);\n      ctx.beginPath(); ctx.moveTo(X(prof.xLeft), Y(layers[i].top)); ctx.lineTo(X(prof.xRight), Y(layers[i].top)); ctx.stroke();\n      ctx.setLineDash([]);\n    }\n  }\n  ctx.restore();\n\n  /* contorno do terreno */\n  soilPath();\n  ctx.lineWidth = 3; ctx.strokeStyle = \"#3f4a45\"; ctx.stroke();\n\n  /* nível d'água */\n  if (d.waterMode === \"na\" && d.NA > 0) {\n    ctx.strokeStyle = \"#2f6fab\"; ctx.lineWidth = 2; ctx.setLineDash([8, 6]);\n    ctx.beginPath(); ctx.moveTo(X(prof.xLeft), Y(d.NA)); ctx.lineTo(X(prof.xRight), Y(d.NA)); ctx.stroke();\n    ctx.setLineDash([]);\n    /* símbolo ▽ */\n    const wx = X(prof.xLeft) + 26, wy = Y(d.NA);\n    ctx.fillStyle = \"#2f6fab\";\n    ctx.beginPath(); ctx.moveTo(wx - 9, wy - 12); ctx.lineTo(wx + 9, wy - 12); ctx.lineTo(wx, wy - 1); ctx.closePath(); ctx.fill();\n    ctx.font = \"bold 13px system-ui\"; ctx.fillText(`NA ${fmt(d.NA, 1)} m`, wx + 14, wy - 6);\n  }\n\n  /* fatias (opcional) */\n  if (r && state.showSlices) {\n    ctx.strokeStyle = \"#00000035\"; ctx.lineWidth = 1;\n    for (const f of r.slices) {\n      ctx.beginPath();\n      ctx.moveTo(X(f.x - f.b / 2), Y(surfY(prof, f.x - f.b / 2)));\n      ctx.lineTo(X(f.x - f.b / 2), Y(circleYb(r.circle, f.x - f.b / 2) ?? f.yb));\n      ctx.stroke();\n    }\n  }\n\n  /* top 5 círculos (opcional) */\n  if (r && state.showTop5 && r.top5) {\n    ctx.lineWidth = 1.5;\n    r.top5.slice(1).forEach(t => {\n      ctx.strokeStyle = \"#b3372f44\"; ctx.setLineDash([4, 5]);\n      arcInside(ctx, prof, t.circle, X, Y);\n      ctx.setLineDash([]);\n    });\n  }\n\n  /* superfície crítica */\n  if (r) {\n    ctx.strokeStyle = \"#b3372f\"; ctx.lineWidth = 3.5; ctx.setLineDash([10, 7]);\n    arcInside(ctx, prof, r.circle, X, Y);\n    ctx.setLineDash([]);\n    /* centro e raio */\n    ctx.fillStyle = \"#b3372f\";\n    ctx.beginPath(); ctx.arc(X(r.circle.Xc), Y(r.circle.Yc), 5, 0, 7); ctx.fill();\n    ctx.strokeStyle = \"#b3372f66\"; ctx.lineWidth = 1.5; ctx.setLineDash([3, 4]);\n    const inter = circleIntersections(prof, r.circle);\n    if (inter) {\n      ctx.beginPath(); ctx.moveTo(X(r.circle.Xc), Y(r.circle.Yc));\n      ctx.lineTo(X(inter.x1), Y(surfY(prof, inter.x1))); ctx.stroke();\n    }\n    ctx.setLineDash([]);\n    ctx.font = \"bold 14px system-ui\";\n    ctx.fillText(`FS = ${fmt(r.fs, 3)}`, X(r.circle.Xc) + 10, Y(r.circle.Yc) - 8);\n  }\n\n  /* cotas: H, β e bermas */\n  ctx.strokeStyle = \"#c07a22\"; ctx.fillStyle = \"#96600f\"; ctx.lineWidth = 1.5;\n  ctx.font = \"bold 13px system-ui\";\n  /* cota H */\n  const hx = X(prof.xLeft) + 44;\n  dim(ctx, hx, Y(0), hx, Y(d.H), `H = ${fmt(d.H, 1)} m`, true);\n  /* ângulo β */\n  ctx.beginPath(); ctx.arc(X(0), Y(0), 42, 0, -d.beta * RAD, true); ctx.stroke();\n  ctx.fillText(`β = ${fmt(d.beta, 1)}°`, X(0) + 48, Y(0) - 12);\n  /* bermas */\n  prof.berms.forEach((b, i) => {\n    const xIni = prof.pts.find(p => Math.abs(p.y - b.y) < 1e-9).x;\n    dim(ctx, X(xIni), Y(b.y) - 16, X(xIni + b.w), Y(b.y) - 16, `${fmt(b.w, 1)} m`, false);\n    ctx.fillText(`cota ${fmt(b.y, 1)}`, X(xIni + b.w) + 8, Y(b.y) - 6);\n  });\n  /* eixos */\n  ctx.fillStyle = \"#6b7280\"; ctx.font = \"11px system-ui\";\n  ctx.fillText(\"0,0 (pé do talude)\", X(0) - 40, Y(0) + 22);\n}\n\nfunction circleYb(c, x) {\n  const dx = x - c.Xc, disc = c.R * c.R - dx * dx;\n  return disc > 0 ? c.Yc - Math.sqrt(disc) : null;\n}\nfunction arcInside(ctx, prof, c, X, Y) {\n  /* desenha somente o trecho do círculo interno ao maciço */\n  const inter = circleIntersections(prof, c);\n  if (!inter) return;\n  ctx.beginPath();\n  const N = 90;\n  for (let i = 0; i <= N; i++) {\n    const x = inter.x1 + (inter.x2 - inter.x1) * i / N;\n    const yb = circleYb(c, x);\n    if (yb === null) continue;\n    if (i === 0) ctx.moveTo(X(x), Y(yb)); else ctx.lineTo(X(x), Y(yb));\n  }\n  ctx.stroke();\n}\nfunction dim(ctx, x1, y1, x2, y2, text, vertical) {\n  ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2);\n  if (vertical) { ctx.moveTo(x1 - 6, y1); ctx.lineTo(x1 + 6, y1); ctx.moveTo(x2 - 6, y2); ctx.lineTo(x2 + 6, y2); }\n  else { ctx.moveTo(x1, y1 - 6); ctx.lineTo(x1, y1 + 6); ctx.moveTo(x2, y2 - 6); ctx.lineTo(x2, y2 + 6); }\n  ctx.stroke();\n  ctx.save(); ctx.translate((x1 + x2) / 2, (y1 + y2) / 2);\n  if (vertical) ctx.rotate(-Math.PI / 2);\n  const w = ctx.measureText(text).width;\n  ctx.fillStyle = \"#fbfcf9\"; ctx.fillRect(-w / 2 - 3, -18, w + 6, 16);\n  ctx.fillStyle = \"#96600f\"; ctx.fillText(text, -w / 2, -6);\n  ctx.restore();\n}\n\n/* ---------- Otimizador (assíncrono para não travar a interface) ---------- */\nasync function otimizar() {\n  const btn = $(\"btnOtimizar\");\n  try {\n    btn.disabled = true;\n    const d = collect();\n    const target = d.fsMin;\n    $(\"mensagem\").textContent = `Buscando a configuração de menor avanço horizontal com FS ≥ ${fmt(target)}…`;\n    $(\"barra\").style.width = \"5%\";\n    await new Promise(res => setTimeout(res, 30));\n    const o = optimizeConfig(d, target, (i, n) => { $(\"barra\").style.width = `${Math.round(i / n * 100)}%`; });\n    $(\"cardOtim\").style.display = \"block\";\n    if (!o.best) {\n      $(\"optOut\").innerHTML = `<p>Nenhuma configuração testada (β entre 14° e 68°, até 2 bermas) atingiu FS ≥ ${fmt(target)} com os parâmetros informados. Considere melhorar a drenagem (reduzir NA/r<sub>u<\u002Fsub>), revisar os parâmetros de resistência ou avaliar soluções estruturais.<\u002Fp>`;\n      $(\"mensagem\").textContent = \"Otimização concluída sem solução viável.\";\n      return;\n    }\n    const b = o.best;\n    const linhas = o.all.map(r => `<tr>\n      <td class=\"num\">${r.nb}<\u002Ftd><td class=\"num\">${r.nb ? fmt(r.w, 1) : \"—\"}<\u002Ftd>\n      <td class=\"num\">${r.ok ? fmt(r.beta, 1) + \"°\" : \"—\"}<\u002Ftd>\n      <td class=\"num\">${r.fs !== null ? fmt(r.fs, 3) : \"—\"}<\u002Ftd>\n      <td class=\"num\">${r.ok ? fmt(r.footprint, 1) + \" m\" : \"—\"}<\u002Ftd>\n      <td>${r.ok ? '<span class=\"badge ok\">viável<\u002Fspan>' : '<span class=\"badge bad\">não atinge<\u002Fspan>'}<\u002Ftd><\u002Ftr>`).join(\"\");\n    $(\"optOut\").innerHTML = `\n      <p><strong>Recomendação:<\u002Fstrong> talude com <strong>β = ${fmt(b.beta, 1)}°<\u002Fstrong>${b.nb ? `, com <strong>${b.nb} berma(s) de ${fmt(b.w, 1)} m<\u002Fstrong> em cotas igualmente espaçadas` : \", sem bermas\"} —\n      FS estimado ${fmt(b.fs, 3)} e avanço horizontal total de ${fmt(b.footprint, 1)} m (menor ocupação em planta entre as alternativas viáveis).<\u002Fp>\n      <div class=\"tableWrap\" style=\"max-height:230px\"><table>\n        <thead><tr><th>Bermas<\u002Fth><th>Largura<\u002Fth><th>β máximo viável<\u002Fth><th>FS<\u002Fth><th>Avanço horizontal<\u002Fth><th>Situação<\u002Fth><\u002Ftr><\u002Fthead>\n        <tbody>${linhas}<\u002Ftbody><\u002Ftable><\u002Fdiv>\n      <p style=\"margin-top:8px\"><button class=\"primary\" id=\"btnAplicarOtim\">Aplicar esta configuração e recalcular<\u002Fbutton><\u002Fp>`;\n    $(\"btnAplicarOtim\").onclick = () => {\n      $(\"angulo\").value = b.beta.toFixed(1);\n      $(\"bermas\").innerHTML = \"\";\n      for (let i = 1; i <= b.nb; i++) addBerma(+(d.H * i / (b.nb + 1)).toFixed(2), b.w);\n      calcular();\n      if ($(\"cardOtim\").scrollIntoView) $(\"cardOtim\").scrollIntoView({ behavior: \"smooth\", block: \"nearest\" });\n    };\n    $(\"mensagem\").textContent = \"Otimização concluída. Os valores viáveis foram verificados com busca refinada.\";\n  } catch (e) {\n    alert(\"Verifique os dados de entrada:\\n\\n\" + e.message);\n    $(\"mensagem\").textContent = \"Erro na otimização.\";\n  } finally {\n    btn.disabled = false;\n    setTimeout(() => $(\"barra\").style.width = \"0%\", 900);\n  }\n}\n\n/* ---------- Projetos (localStorage) ---------- */\nconst LS_KEY = \"taludepro_projetos\";\nfunction lerDB() { try { return JSON.parse(localStorage.getItem(LS_KEY) || \"{}\"); } catch { return {}; } }\nfunction snapshot() {\n  return {\n    campos: Object.fromEntries([\"projNome\", \"projCliente\", \"altura\", \"angulo\", \"regimeAgua\", \"nivelAgua\", \"ru\",\n      \"sobrecarga\", \"kh\", \"kv\", \"nivelVidas\", \"nivelMat\", \"fsCustom\", \"metodo\", \"nFatias\", \"refinar\"]\n      .map(id => [id, $(id).value])),\n    bermas: readBermas(), camadas: readCamadas()\n  };\n}\nfunction aplicarSnapshot(o) {\n  for (const [k, v] of Object.entries(o.campos || {})) if ($(k)) $(k).value = v;\n  $(\"bermas\").innerHTML = \"\"; (o.bermas || []).forEach(b => addBerma(b.y, b.w));\n  $(\"camadas\").innerHTML = \"\"; (o.camadas || []).forEach(c => addCamada(c.name, c.top, c.gamma, c.c, c.phi));\n  if (!(o.camadas || []).length) addCamada(\"Solo residual jovem (granito/gnaisse)\", 100, 18.5, 15, 29);\n  toggleAgua(); atualizarHintFS(false);\n}\nfunction refreshProjetos() {\n  const db = lerDB(), sel = $(\"selProjetos\");\n  sel.innerHTML = '<option value=\"\">Projetos salvos…<\u002Foption>' +\n    Object.keys(db).sort().map(k => `<option>${k.replace(/<\u002Fg, \"&lt;\")}<\u002Foption>`).join(\"\");\n}\n\n/* ---------- Exportações ---------- */\nfunction exportPNG() {\n  const a = document.createElement(\"a\");\n  a.download = `${$(\"projNome\").value || \"talude\"}-secao.png`;\n  a.href = $(\"canvas\").toDataURL(\"image/png\"); a.click();\n}\nfunction exportCSV() {\n  if (!state.result) { alert(\"Calcule antes de exportar.\"); return; }\n  const head = \"fatia;x_m;ybase_m;h_m;b_m;W_kN_m;alfa_graus;L_m;c_kPa;phi_graus;u_kPa;camada\";\n  const rows = state.result.slices.map(s =>\n    [s.i, s.x, s.yb, s.h, s.b, s.W, s.alpha / RAD, s.L, s.c, s.phiDeg, s.u, s.layer]\n      .map(v => typeof v === \"number\" ? String(v.toFixed(4)).replace(\".\", \",\") : v).join(\";\"));\n  const blob = new Blob([\"\\uFEFF\" + head + \"\\n\" + rows.join(\"\\n\")], { type: \"text/csv;charset=utf-8\" });\n  const a = document.createElement(\"a\");\n  a.download = `${$(\"projNome\").value || \"talude\"}-fatias.csv`;\n  a.href = URL.createObjectURL(blob); a.click();\n}\nfunction exportJSON() {\n  const blob = new Blob([JSON.stringify({ app: \"TaludePro\", versao: \"1.0\", dados: snapshot() }, null, 2)],\n    { type: \"application/json\" });\n  const a = document.createElement(\"a\");\n  a.download = `${$(\"projNome\").value || \"talude\"}.taludepro.json`;\n  a.href = URL.createObjectURL(blob); a.click();\n}\n\n/* PDF: carrega jsPDF sob demanda; sem rede, cai para impressão do navegador. */\nasync function loadPdfLibs() {\n  if (window.jspdf && window.jspdf.jsPDF) return true;\n  const load = src => new Promise((ok, no) => {\n    const sc = document.createElement(\"script\");\n    sc.src = src; sc.onload = ok; sc.onerror = no; document.head.appendChild(sc);\n  });\n  try {\n    await load(\"https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js\");\n    await load(\"https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.4/jspdf.plugin.autotable.min.js\");\n    return !!(window.jspdf && window.jspdf.jsPDF);\n  } catch { return false; }\n}\nasync function gerarPDF() {\n  if (!state.result) { alert(\"Calcule a estabilidade antes de gerar o relatório.\"); return; }\n  $(\"mensagem\").textContent = \"Preparando o relatório…\";\n  if (!await loadPdfLibs()) {\n    alert(\"Sem acesso à biblioteca de PDF (modo offline). Será aberta a impressão do navegador — escolha “Salvar como PDF”.\");\n    window.print(); return;\n  }\n  const { jsPDF } = window.jspdf;\n  const doc = new jsPDF({ unit: \"mm\", format: \"a4\" });\n  const d = state.input, r = state.result;\n  doc.setFillColor(44, 50, 48); doc.rect(0, 0, 210, 24, \"F\");\n  doc.setTextColor(255); doc.setFontSize(15);\n  doc.text(\"TaludePro — Relatório de Estabilidade de Talude\", 12, 11);\n  doc.setFontSize(9); doc.setTextColor(192, 122, 34);\n  doc.text(\"Equilíbrio-limite · superfícies circulares · NBR 11.682\", 12, 18);\n  doc.setTextColor(40);\n  doc.setFontSize(9);\n  doc.text(`Projeto: ${d.project || \"—\"}    Cliente/Obra: ${d.client || \"—\"}    Data: ${new Date().toLocaleString(\"pt-BR\")}`, 12, 31);\n  const camTxt = sortLayers(d.layers).map(c => `${c.name} (topo ${c.top} m): γ=${c.gamma} · c′=${c.c} · φ′=${c.phi}°`).join(\"\\n\");\n  doc.autoTable({\n    startY: 36, styles: { fontSize: 8 }, headStyles: { fillColor: [44, 50, 48] },\n    head: [[\"Parâmetro\", \"Valor\"]],\n    body: [\n      [\"Geometria\", `H = ${d.H} m · β = ${d.beta}° · ${d.berms.length} berma(s)${d.berms.length ? \": \" + d.berms.map(b => `cota ${b.y} m × ${b.w} m`).join(\"; \") : \"\"}`],\n      [\"Estratigrafia\", camTxt],\n      [\"Água\", d.waterMode === \"na\" ? `NA horizontal na cota ${d.NA} m` : d.waterMode === \"ru\" ? `ru = ${d.ru}` : \"Talude seco\"],\n      [\"Cargas\", `q = ${d.q} kPa · kh = ${d.kh} · kv = ${d.kv}`],\n      [\"Método\", `${d.method === \"fellenius\" ? \"Fellenius\" : \"Bishop Simplificado\"} · ${d.nSlices} fatias · busca em grade + refino local`],\n      [\"Superfície crítica\", `Centro (${r.circle.Xc.toFixed(2)}, ${r.circle.Yc.toFixed(2)}) m · R = ${r.circle.R.toFixed(2)} m`],\n      [\"FS mínimo adotado\", `${d.fsMin.toFixed(2)} (NBR 11.682 — níveis selecionados pelo usuário)`],\n      [\"FATOR DE SEGURANÇA\", `FS = ${r.fs.toFixed(3)} — ${r.fs >= d.fsMin ? \"ATENDE ao mínimo adotado\" : r.fs >= 1 ? \"NÃO ATENDE ao mínimo adotado\" : \"INSTÁVEL (FS < 1)\"}`]\n    ]\n  });\n  let y = doc.lastAutoTable.finalY + 4;\n  const img = $(\"canvas\").toDataURL(\"image/png\");\n  doc.addImage(img, \"PNG\", 12, y, 186, 105); y += 110;\n  if (y > 220) { doc.addPage(); y = 15; }\n  doc.autoTable({\n    startY: y, styles: { fontSize: 6 }, headStyles: { fillColor: [44, 50, 48] },\n    head: [[\"#\", \"x (m)\", \"y base\", \"h (m)\", \"W (kN/m)\", \"α (°)\", \"L (m)\", \"c′\", \"φ′\", \"u (kPa)\", \"Camada\"]],\n    body: r.slices.map(s => [s.i, s.x.toFixed(2), s.yb.toFixed(2), s.h.toFixed(2), s.W.toFixed(1),\n      (s.alpha / RAD).toFixed(1), s.L.toFixed(2), s.c, s.phiDeg, s.u.toFixed(1), s.layer])\n  });\n  const pageH = doc.internal.pageSize.getHeight();\n  doc.setFontSize(7); doc.setTextColor(120);\n  doc.text(\"Ferramenta de apoio. Resultados dependem dos parâmetros adotados e não substituem a análise de responsável técnico habilitado.\", 12, pageH - 8);\n  doc.save(`${d.project || \"talude\"}-relatorio.pdf`);\n  $(\"mensagem\").textContent = \"Relatório PDF gerado.\";\n}\n\n/* ---------- Ligações de eventos ---------- */\nfunction toggleAgua() {\n  const m = $(\"regimeAgua\").value;\n  $(\"wrapNA\").style.display = m === \"na\" ? \"\" : \"none\";\n  $(\"wrapRu\").style.display = m === \"ru\" ? \"\" : \"none\";\n}\nlet __initDone = false;\nfunction init() {\n  if (__initDone) return;\n  __initDone = true;\n  /* banco de solos no seletor */\n  $(\"selSolo\").innerHTML = SOLOS.map(s =>\n    `<option value=\"${s.id}\">${s.nome} — γ=${s.gamma} · c′=${s.c} · φ′=${s.phi}°<\u002Foption>`).join(\"\");\n  $(\"btnAddCamadaPreset\").onclick = () => {\n    const s = SOLOS.find(x => x.id === $(\"selSolo\").value);\n    if (s) { addCamada(s.nome, 100, s.gamma, s.c, s.phi); calcular(); }\n  };\n  $(\"btnAddCamada\").onclick = () => { addCamada(); };\n  $(\"btnAddBerma\").onclick = () => { addBerma(); };\n  $(\"btnCalcular\").onclick = calcular;\n  $(\"btnOtimizar\").onclick = otimizar;\n  $(\"regimeAgua\").onchange = () => { toggleAgua(); calcular(); };\n  [\"nivelVidas\", \"nivelMat\"].forEach(id => $(id).onchange = () => { atualizarHintFS(true); });\n  /* recálculo automático em alterações */\n  [\"altura\", \"angulo\", \"nivelAgua\", \"ru\", \"sobrecarga\", \"kh\", \"kv\", \"metodo\", \"nFatias\", \"refinar\", \"fsCustom\"]\n    .forEach(id => $(id).addEventListener(\"change\", () => calcular()));\n  document.addEventListener(\"change\", e => {\n    if (e.target.closest(\".berma\") || e.target.closest(\".camada\")) calcular();\n  });\n  $(\"btnToggleFatias\").onclick = () => { state.showSlices = !state.showSlices; $(\"btnToggleFatias\").textContent = state.showSlices ? \"Ocultar fatias\" : \"Mostrar fatias\"; desenhar(); };\n  $(\"btnToggleTop5\").onclick = () => { state.showTop5 = !state.showTop5; $(\"btnToggleTop5\").textContent = state.showTop5 ? \"Ocultar top 5\" : \"Top 5 círculos\"; desenhar(); };\n  $(\"btnPNG\").onclick = exportPNG;\n  $(\"btnCSV\").onclick = exportCSV;\n  $(\"btnExportJSON\").onclick = exportJSON;\n  $(\"fileJSON\").onchange = e => {\n    const f = e.target.files[0]; if (!f) return;\n    const rd = new FileReader();\n    rd.onload = () => {\n      try {\n        const o = JSON.parse(rd.result);\n        if (!o.dados) throw new Error(\"Arquivo não reconhecido.\");\n        aplicarSnapshot(o.dados); calcular();\n      } catch (err) { alert(\"Não foi possível importar: \" + err.message); }\n    };\n    rd.readAsText(f); e.target.value = \"\";\n  };\n  $(\"btnPDF\").onclick = gerarPDF;\n  $(\"btnSalvar\").onclick = () => {\n    const k = $(\"projNome\").value.trim();\n    if (!k) { alert(\"Informe o nome do projeto.\"); return; }\n    const db = lerDB();\n    db[k] = { salvoEm: new Date().toISOString(), dados: snapshot() };\n    localStorage.setItem(LS_KEY, JSON.stringify(db));\n    refreshProjetos(); $(\"selProjetos\").value = k;\n    $(\"mensagem\").textContent = `Projeto “${k}” salvo neste navegador.`;\n  };\n  $(\"btnCarregar\").onclick = () => {\n    const db = lerDB(), x = db[$(\"selProjetos\").value];\n    if (!x) { alert(\"Selecione um projeto salvo.\"); return; }\n    aplicarSnapshot(x.dados); calcular();\n  };\n  $(\"btnExcluir\").onclick = () => {\n    const k = $(\"selProjetos\").value;\n    if (!k) { alert(\"Selecione um projeto salvo.\"); return; }\n    if (!confirm(`Excluir o projeto “${k}”?`)) return;\n    const db = lerDB(); delete db[k];\n    localStorage.setItem(LS_KEY, JSON.stringify(db));\n    refreshProjetos();\n  };\n  /* legenda de camadas dinâmica */\n  new MutationObserver(() => {\n    $(\"legendCamadas\").innerHTML = readCamadas().map(c =>\n      `<span><span class=\"dot\" style=\"background:${c.cor};opacity:.7\"><\u002Fspan>${c.name}<\u002Fspan>`).join(\" \");\n  }).observe($(\"camadas\"), { childList: true, subtree: true });\n\n  /* estado inicial */\n  addBerma(6, 3);\n  addCamada(\"Solo residual jovem (granito/gnaisse)\", 100, 18.5, 15, 29);\n  addCamada(\"Rocha alterada (W3)\", 2, 22, 80, 38);\n  toggleAgua(); atualizarHintFS(true); refreshProjetos();\n  calcular();\n}\n/* API pública — facilita depuração e testes automatizados */\nwindow.TaludePro = { init, calcular, otimizar, exportJSON, exportCSV, exportPNG, atualizarHintFS, snapshot, aplicarSnapshot, state, SOLOS };\nif (document.readyState === \"complete\" || document.readyState === \"interactive\") setTimeout(init, 0);\nelse window.addEventListener(\"load\", init);\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
