ca<\u002Fth><td>${fmt(state.fluid.atmPressure,2)} kPa<\u002Ftd><th>Pressão de vapor<\u002Fth><td>${fmt(state.fluid.vaporPressure,2)} kPa<\u002Ftd><\u002Ftr><\u002Ftable>\n  <h2>3. Memória de cálculo da vazão<\u002Fh2><div class=\"formula\">${esc(f.formula)}<\u002Fdiv><p>Após margens, divisão por bombas em operação e percentual por bomba, a vazão adotada é Q = ${fmt(f.m3h,3)} m³/h = ${fmt(f.m3s,6)} m³/s.<\u002Fp>\n  <h2>4. Tubulações e perdas de carga<\u002Fh2><p>A velocidade foi calculada por v = Q/A. O número de Reynolds foi obtido por Re = ρvD/μ. Para Darcy-Weisbach, hf = f(L/D)(v²/2g). Para Hazen-Williams, hf = 10,67·L·Q^1,852/(C^1,852·D^4,8704).<\u002Fp><table><tr><th>Trecho<\u002Fth><th>Q m³/h<\u002Fth><th>D mm<\u002Fth><th>v m/s<\u002Fth><th>Re<\u002Fth><th>f<\u002Fth><th>Darcy m<\u002Fth><th>Hazen m<\u002Fth><th>Localizada m<\u002Fth><\u002Ftr>${pipeRows}<\u002Ftable>\n  <h3>4.1 Perdas localizadas<\u002Fh3><p>Para cada acessório: hl = K·v²/(2g). Para acessórios repetidos, utiliza-se ΣK = quantidade × K unitário.<\u002Fp><table><tr><th>Trecho<\u002Fth><th>Acessório<\u002Fth><th>Qtd.<\u002Fth><th>K unit.<\u002Fth><th>hl m<\u002Fth><\u002Ftr>${fitRows||'<tr><td colspan=\"5\">Nenhum acessório cadastrado.<\u002Ftd><\u002Ftr>'}<\u002Ftable>\n  <h2>5. Altura manométrica total<\u002Fh2><div class=\"formula\">HMT = Hg + ΔP/γ + Δ(v²/2g) + Σhf + Σhl<\u002Fdiv><div class=\"formula\">HMT base = ${fmt(h.staticHead,3)} + ${fmt(h.pressureHead,3)} + ${fmt(h.velocityHead,3)} + ${fmt(h.distributed,3)} + ${fmt(h.localized,3)} = ${fmt(h.base,3)} m<\u002Fdiv><div class=\"formula\">HMT adotada = ${fmt(h.base,3)} × (1 + ${fmt(state.system.hmtMargin,1)}/100) = ${fmt(h.hmt,3)} m<\u002Fdiv>\n  <h2>6. Potência da bomba e do motor<\u002Fh2><div class=\"formula\">P hidráulica = ρ·g·Q·H = ${fmt(state.fluid.density,1)} × 9,80665 × ${fmt(f.m3s,6)} × ${fmt(h.hmt,3)} = ${fmt(p.hydraulic,3)} kW<\u002Fdiv><div class=\"formula\">P eixo = P hidráulica / η bomba = ${fmt(p.hydraulic,3)} / ${fmt(p.pumpEff,3)} = ${fmt(p.shaft,3)} kW<\u002Fdiv><div class=\"formula\">P elétrica = P eixo / (η motor × η transmissão) = ${fmt(p.electric,3)} kW<\u002Fdiv><p>Com fator de serviço ${fmt(state.power.serviceFactor,2)}, a potência requerida é ${fmt(p.required,3)} kW. Motor comercial sugerido: <strong>${fmt(p.motor,2)} kW (${fmt(p.motor*1.35962,2)} cv)<\u002Fstrong>.<\u002Fp>\n  <h2>7. Verificação do NPSH<\u002Fh2><div class=\"formula\">NPSHd = Hatm + Hpressão,sucção + Hestática,sucção − Hvapor − Hperdas,sucção<\u002Fdiv><div class=\"formula\">NPSHd = ${fmt(n.hatm,3)} + ${fmt(n.hpressure,3)} + ${fmt(n.staticSuction,3)} − ${fmt(n.hv,3)} − ${fmt(n.suctionLoss,3)} = ${fmt(n.available,3)} m<\u002Fdiv><p>NPSH requerido informado: ${fmt(n.required,2)} m. Margem desejada: ${fmt(n.margin,2)} m. Reserva encontrada: ${fmt(n.reserve,2)} m.<\u002Fp>\n  <div class=\"break\"><\u002Fdiv><h2>8. Curva do sistema e ponto de operação<\u002Fh2><p>A curva é calculada ponto a ponto, repetindo as equações de perda de carga para cada vazão. O ponto de operação é a interseção entre a curva da bomba e a curva do sistema. Configuração avaliada: <strong>${esc(arrangementLabel())}<\u002Fstrong>.<\u002Fp>${chartImg?`<img src=\"${chartImg}\" style=\"max-width:100%;height:auto\">`:''}\n  <h2>9. Comparação entre modelos<\u002Fh2><table><tr><th>Pos.<\u002Fth><th>Modelo<\u002Fth><th>Q op.<\u002Fth><th>H op.<\u002Fth><th>η %<\u002Fth><th>P abs. kW<\u002Fth><th>Energia/ano<\u002Fth><th>LCC 10 anos<\u002Fth><th>Situação<\u002Fth><\u002Ftr>${pumpRows||'<tr><td colspan=\"9\">Nenhuma bomba cadastrada.<\u002Ftd><\u002Ftr>'}<\u002Ftable>\n  <h2>10. Consumo de energia<\u002Fh2><div class=\"formula\">E mensal = P elétrica × horas/dia × dias/mês × fator de carga = ${fmt(e.power||p.electric,3)} × ${fmt(state.energy.hoursDay,2)} × ${fmt(state.energy.daysMonth,0)} × ${fmt(state.energy.loadFactor,2)} = ${fmt(e.kwhM||0,2)} kWh<\u002Fdiv><p>Consumo anual: ${fmt(e.kwhY||0,2)} kWh. Custo anual estimado: <strong>${money(e.costY||0)}<\u002Fstrong>. Custo de energia por volume bombeado: ${money(e.costPerM3||0)}/m³.<\u002Fp>\n  <h2>11. Alertas e recomendações<\u002Fh2><ul>${alerts}<\u002Ful>\n  <h2>12. Conclusão<\u002Fh2><p>Os resultados representam um pré-dimensionamento hidráulico e energético. A seleção final deve verificar a curva oficial do fabricante, faixa de melhor eficiência, diâmetro real do rotor, potência não sobrecarregada em toda a curva, NPSH requerido, materiais compatíveis com o fluido, condições de partida, válvulas, proteção elétrica e exigências normativas da aplicação.<\u002Fp><p class=\"small\"><strong>Aviso:<\u002Fstrong> este relatório não substitui projeto, anotação de responsabilidade técnica nem validação por profissional habilitado.<\u002Fp>`;\n  setHTML('reportPreview',html);return html;\n}\nfunction pdfTextLines(){const h=results.hyd,f=results.flow,p=results.power,n=results.npsh,e=results.energy||{};const lines=[];lines.push('BombaPro - Relatório Técnico de Bombeamento','',`Projeto: ${state.project.name}`,`Aplicação: ${applicationLabel(state.project.application)}`,`Data: ${state.project.date}`,`Responsável: ${state.project.engineer||'Não informado'}`,'','1. RESUMO EXECUTIVO',`Vazão de projeto: ${fmt(f.m3h,2)} m³/h`,`Altura manométrica total: ${fmt(h.hmt,2)} m`,`Potência hidráulica: ${fmt(p.hydraulic,2)} kW`,`Potência elétrica estimada: ${fmt(p.electric,2)} kW`,`Motor comercial recomendado: ${fmt(p.motor,2)} kW`,`NPSH disponível: ${fmt(n.available,2)} m`,'','2. MEMÓRIA DA VAZÃO',f.formula,`Vazão adotada por bomba: ${fmt(f.m3h,3)} m³/h = ${fmt(f.m3s,6)} m³/s`,'','3. PERDAS DE CARGA');h.pipeResults.forEach(x=>lines.push(`${x.name}: Q=${fmt(x.qM3h,2)} m³/h; D=${fmt(x.D*1000,1)} mm; v=${fmt(x.v,2)} m/s; Re=${fmt(x.Re,0)}; f=${fmt(x.f,4)}; Darcy=${fmt(x.darcy,3)} m; Hazen=${fmt(x.hazen,3)} m; localizada=${fmt(x.localized,3)} m.`));lines.push('',`Perdas distribuídas adotadas: ${fmt(h.distributed,3)} m`,`Perdas localizadas: ${fmt(h.localized,3)} m`,'','4. ALTURA MANOMÉTRICA',`HMT = Hg + ΔP/γ + Δ(v²/2g) + Σhf + Σhl`,`HMT base = ${fmt(h.staticHead,3)} + ${fmt(h.pressureHead,3)} + ${fmt(h.velocityHead,3)} + ${fmt(h.distributed,3)} + ${fmt(h.localized,3)} = ${fmt(h.base,3)} m`,`HMT com margem de ${fmt(state.system.hmtMargin,1)}% = ${fmt(h.hmt,3)} m`,'','5. POTÊNCIA',`P hidráulica = ρgQH = ${fmt(p.hydraulic,3)} kW`,`P eixo = P hidráulica/ηbomba = ${fmt(p.shaft,3)} kW`,`P elétrica = ${fmt(p.electric,3)} kW`,`P com fator de serviço = ${fmt(p.required,3)} kW`,`Motor recomendado = ${fmt(p.motor,2)} kW`,'','6. NPSH',`NPSHd = Hatm + Hpressão + Hestática sucção - Hvapor - Hperdas sucção`,`NPSHd = ${fmt(n.hatm,3)} + ${fmt(n.hpressure,3)} + ${fmt(n.staticSuction,3)} - ${fmt(n.hv,3)} - ${fmt(n.suctionLoss,3)} = ${fmt(n.available,3)} m`,`NPSHr = ${fmt(n.required,2)} m; margem = ${fmt(n.margin,2)} m; reserva = ${fmt(n.reserve,2)} m`,'','7. ENERGIA',`Consumo mensal: ${fmt(e.kwhM||0,2)} kWh`,`Consumo anual: ${fmt(e.kwhY||0,2)} kWh`,`Custo anual: ${money(e.costY||0)}`,'','8. COMPARAÇÃO DE BOMBAS');results.pumps.forEach((x,i)=>lines.push(`${i+1}. ${x.manufacturer} ${x.model}: ${x.op?`Q=${fmt(x.op.q,2)} m³/h; H=${fmt(x.op.h,2)} m; η=${fmt(x.eff,1)}%; energia/ano=${money(x.annualEnergyCost)}; LCC10=${money(x.lcc10)}; ${x.status}`:'sem interseção com a curva do sistema'}.`));lines.push('','9. ALERTAS');results.alerts.forEach(x=>lines.push(`${x.title}: ${x.text}`));lines.push('','10. AVISO','Pré-dimensionamento. Confirmar com curvas oficiais do fabricante, normas aplicáveis e profissional habilitado.');return lines}\nfunction downloadPDF(){calculateAll(false);buildReport(false);if(window.jspdf?.jsPDF){const {jsPDF}=window.jspdf;const doc=new jsPDF({unit:'mm',format:'a4'});const margin=15,width=180;let y=16;doc.setFont('helvetica','normal');doc.setFontSize(10);const add=(txt,bold=false,size=10)=>{doc.setFont('helvetica',bold?'bold':'normal');doc.setFontSize(size);const wrapped=doc.splitTextToSize(String(txt),width);wrapped.forEach(line=>{if(y>282){doc.addPage();y=16}doc.text(line,margin,y);y+=size*.45+1});};pdfTextLines().forEach(line=>{const isHead=/^\\d+\\.|^BombaPro/.test(line);add(line,isHead,isHead?12:9);y+=line===''?2:0});const img=document.getElementById('systemCurveChart')?.toDataURL?.('image/png');if(img){doc.addPage();doc.setFontSize(13);doc.text('Curva do sistema e bombas',15,16);doc.addImage(img,'PNG',15,24,180,95)}doc.save(safeName(state.project.name)+'-relatorio.pdf')}else window.print()}\nfunction exportExcel(){calculateAll(false);if(typeof XLSX==='undefined')return alert('A biblioteca de Excel não foi carregada. Verifique a conexão e tente novamente.');const wb=XLSX.utils.book_new();const add=(name,data)=>XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(data),name.slice(0,31));add('Resumo',[{Projeto:state.project.name,Aplicação:applicationLabel(state.project.application),'Vazão m3h':results.flow.m3h,'HMT m':results.hyd.hmt,'Potência hidráulica kW':results.power.hydraulic,'Potência elétrica kW':results.power.electric,'Motor recomendado kW':results.power.motor,'NPSH disponível m':results.npsh.available,'Custo anual R$':results.energy.costY}]);add('Dados Gerais',[{...state.project,...state.fluid}]);add('Vazão',[{Método:flowMethodLabel(state.flow.method),...state.flow,'Resultado m3h':results.flow.m3h,'Resultado Ls':results.flow.ls,'Memória':results.flow.formula}]);add('Tubulações',results.hyd.pipeResults.map(x=>({Trecho:x.name,Tipo:x.type,'Q m3h':x.qM3h,'Diâmetro mm':x.D*1000,'Velocidade ms':x.v,Reynolds:x.Re,'Fator f':x.f,'Darcy m':x.darcy,'Hazen m':x.hazen,'Adotada m':x.adopted,'Localizada m':x.localized,'Total m':x.total})));add('Acessórios',state.fittings.map(x=>({Trecho:state.pipes[num(x.pipeIndex)]?.name,Acessório:fittingCatalog[x.type]?.name,Quantidade:x.qty,'K unitário':x.k,'K total':num(x.qty)*num(x.k)})));add('HMT',[{'Altura estática m':results.hyd.staticHead,'Pressão m':results.hyd.pressureHead,'Carga cinética m':results.hyd.velocityHead,'Perdas distribuídas m':results.hyd.distributed,'Perdas localizadas m':results.hyd.localized,'HMT base m':results.hyd.base,'Margem %':state.system.hmtMargin,'HMT adotada m':results.hyd.hmt}]);add('Potência e NPSH',[{'Potência hidráulica kW':results.power.hydraulic,'Potência eixo kW':results.power.shaft,'Potência elétrica kW':results.power.electric,'Motor kW':results.power.motor,'NPSH disponível m':results.npsh.available,'NPSH requerido m':results.npsh.required,'Reserva m':results.npsh.reserve}]);add('Bombas',results.pumps.map((x,i)=>({Posição:i+1,Fabricante:x.manufacturer,Modelo:x.model,'Q operação':x.op?.q,'H operação':x.op?.h,Eficiência:x.eff,'Potência absorvida':x.pow?.electric,'Custo energia anual':x.annualEnergyCost,'Preço':x.price,'LCC 10 anos':x.lcc10,Pontuação:x.score,Situação:x.status})));add('Energia',[{...state.energy,...results.energy}]);add('Cenários',results.scenarios.map(x=>({Cenário:x.name,'Vazão %':x.flowPercent,'Horas ano':x.hoursYear,'Q m3h':x.q,'HMT m':x.hmt,'Potência kW':x.power,'Custo R$':x.cost})));add('Alertas',results.alerts.map(x=>({Nível:x.level,Título:x.title,Descrição:x.text})));XLSX.writeFile(wb,safeName(state.project.name)+'-calculos.xlsx')}\nfunction exportJSON(){const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});downloadBlob(blob,safeName(state.project.name)+'.bombapro.json')}\nfunction importJSON(ev){const file=ev.target.files?.[0];if(!file)return;const r=new FileReader();r.onload=()=>{try{const o=JSON.parse(r.result);state={...defaultState(),...o,id:o.id||uid()};renderAllInputs();renderDynamicTables();renderFlowMethod();calculateAll(true);saveCurrentProject(false)}catch(e){alert('Arquivo inválido: '+e.message)}};r.readAsText(file);ev.target.value=''}\nfunction downloadBlob(blob,name){const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1000)}function safeName(s){return String(s||'projeto').normalize('NFD').replace(/[\\u0300-\\u036f]/g,'').replace(/[^a-z0-9_-]+/gi,'-').replace(/^-|-$/g,'')}\n\nfunction getProjects(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]')}catch{return []}}\nfunction saveProjectToStore(p){const arr=getProjects();const i=arr.findIndex(x=>x.id===p.id);const item={...deepClone(p),updatedAt:new Date().toISOString()};if(i>=0)arr[i]=item;else arr.push(item);localStorage.setItem(STORAGE_KEY,JSON.stringify(arr));localStorage.setItem(CURRENT_KEY,p.id)}\nfunction saveCurrentProject(show=true){state.project.name=document.getElementById('projectName')?.value||state.project.name;saveProjectToStore(state);renderHeader();if(show)toast('Projeto salvo no navegador.');renderProjectList()}\nfunction newProject(){state=defaultState();saveProjectToStore(state);renderAllInputs();renderFlowMethod();renderDynamicTables();calculateAll(false);showPage('project')}\nfunction duplicateCurrentProject(){state=deepClone(state);state.id=uid();state.project.name+=' — cópia';saveProjectToStore(state);renderAllInputs();calculateAll(false);renderProjectList();toast('Projeto duplicado.')}\nfunction deleteProject(id){if(!confirm('Excluir este projeto salvo?'))return;let arr=getProjects().filter(x=>x.id!==id);localStorage.setItem(STORAGE_KEY,JSON.stringify(arr));if(state.id===id){state=arr[0]?deepClone(arr[0]):defaultState();saveProjectToStore(state);renderAllInputs();renderDynamicTables();renderFlowMethod();calculateAll(false)}renderProjectList()}\nfunction loadProject(id){const p=getProjects().find(x=>x.id===id);if(!p)return;state=deepClone(p);localStorage.setItem(CURRENT_KEY,id);renderAllInputs();renderDynamicTables();renderFlowMethod();calculateAll(false);closeProjectManager();toast('Projeto carregado.')}\nfunction openProjectManager(){renderProjectList();document.getElementById('projectModal').classList.add('show')}function closeProjectManager(){document.getElementById('projectModal').classList.remove('show')}\nfunction renderProjectList(){const tb=document.getElementById('projectListBody');if(!tb)return;tb.innerHTML=getProjects().filter(p=>p&&p.project).sort((a,b)=>(b.updatedAt||'').localeCompare(a.updatedAt||'')).map(p=>`<tr><td><strong>${esc(p.project.name)}<\u002Fstrong><br><span class=\"muted\">${esc(p.project.client||'Sem cliente')}<\u002Fspan><\u002Ftd><td>${esc(applicationLabel(p.project.application))}<\u002Ftd><td>${p.updatedAt?new Date(p.updatedAt).toLocaleString('pt-BR'):'—'}<\u002Ftd><td><button class=\"btn small primary\" onclick=\"loadProject('${p.id}')\">Abrir<\u002Fbutton> <button class=\"btn small danger\" onclick=\"deleteProject('${p.id}')\">Excluir<\u002Fbutton><\u002Ftd><\u002Ftr>`).join('')}\nfunction loadDemo(type){state=demoState(type);saveProjectToStore(state);renderAllInputs();renderDynamicTables();renderFlowMethod();calculateAll(true);closeProjectManager();showPage('home')}\nfunction demoState(type){const s=defaultState();if(type==='predial'){s.project.name='Edifício residencial — recalque';s.project.application='predial';s.flow.method='reservoir';s.flow.reservoirVolume=30;s.flow.reservoirTime=2;s.system.suctionLevel=0;s.system.pumpLevel=1;s.system.dischargeLevel=28;s.pipes=[{id:uid(),name:'Sucção',type:'suction',material:'pvc',diameter:75,length:10,roughness:.0015,c:150,flowPercent:100},{id:uid(),name:'Recalque',type:'discharge',material:'pvc',diameter:60,length:85,roughness:.0015,c:150,flowPercent:100}];s.fittings=[{id:uid(),pipeIndex:0,type:'foot',qty:1,k:2.5},{id:uid(),pipeIndex:0,type:'elbow90',qty:2,k:.9},{id:uid(),pipeIndex:1,type:'elbow90',qty:6,k:.9},{id:uid(),pipeIndex:1,type:'gate',qty:2,k:.15},{id:uid(),pipeIndex:1,type:'check',qty:1,k:2}];s.energy.hoursDay=3;s.pumps=[];}\n  if(type==='irrigacao'){s.project.name='Irrigação setorizada — 2 ha';s.project.application='irrigacao';s.flow.method='irrigation';s.flow.irrigationArea=2;s.flow.irrigationDepth=6;s.flow.irrigationHours=5;s.flow.irrigationEfficiency=80;s.system.dischargeLevel=8;s.system.dischargePressure=250;s.pipes=[{id:uid(),name:'Sucção do açude',type:'suction',material:'pead',diameter:100,length:18,roughness:.007,c:150,flowPercent:100},{id:uid(),name:'Adutora principal',type:'discharge',material:'pead',diameter:90,length:320,roughness:.007,c:150,flowPercent:100}];s.fittings=[{id:uid(),pipeIndex:0,type:'foot',qty:1,k:2.5},{id:uid(),pipeIndex:1,type:'elbow90',qty:8,k:.9},{id:uid(),pipeIndex:1,type:'filter',qty:1,k:2},{id:uid(),pipeIndex:1,type:'gate',qty:2,k:.15}];s.energy.hoursDay=5;}\n  if(type==='paralelo'){s.project.name='Sistema com duas bombas em paralelo';s.project.application='abastecimento';s.flow.method='direct';s.flow.directValue=40;s.system.dischargeLevel=35;s.pipes=[{id:uid(),name:'Coletor de sucção',type:'suction',material:'steel',diameter:125,length:12,roughness:.045,c:120,flowPercent:100},{id:uid(),name:'Barrilete de recalque',type:'discharge',material:'steel',diameter:100,length:180,roughness:.045,c:120,flowPercent:100}];s.fittings=[{id:uid(),pipeIndex:0,type:'elbow90',qty:2,k:.9},{id:uid(),pipeIndex:1,type:'elbow90',qty:10,k:.9},{id:uid(),pipeIndex:1,type:'check',qty:2,k:2},{id:uid(),pipeIndex:1,type:'butterfly',qty:3,k:.3}];s.flow.operatingPumps=2;s.flow.perPumpPercent=100;s.scenarios=[{id:uid(),name:'Uma bomba',flowPercent:50,extraStatic:0,hoursYear:2200},{id:uid(),name:'Duas bombas',flowPercent:100,extraStatic:0,hoursYear:900}];}\n  s.pumps=[{id:uid(),manufacturer:'AquaTech',model:'AT 32-160',type:'centrifuga',rpm:3500,power:4,efficiency:72,npshr:2.3,price:4200,maintenance:350,curve:'0,50; 5,48; 10,44; 15,38; 20,29; 25,17'}, {id:uid(),manufacturer:'HidroMax',model:'HM 40-200',type:'centrifuga',rpm:3500,power:5.5,efficiency:77,npshr:2.8,price:5600,maintenance:420,curve:'0,58; 5,56; 10,52; 15,46; 20,38; 25,28; 30,16'}, {id:uid(),manufacturer:'EcoPump',model:'EP 30-VFD',type:'multiestagio',rpm:2900,power:4,efficiency:81,npshr:2,price:7200,maintenance:300,curve:'0,54; 5,52; 10,48; 15,42; 20,34; 25,23'}];return s}\nfunction toast(msg){let t=document.getElementById('toast');if(!t){t=document.createElement('div');t.id='toast';t.style.cssText='position:fixed;right:20px;bottom:20px;background:#17324d;color:#fff;padding:12px 16px;border-radius:10px;z-index:200;box-shadow:0 10px 25px rgba(0,0,0,.25);font-weight:700;font-size:13px;transition:.25s';document.body.appendChild(t)}t.textContent=msg;t.style.opacity='1';setTimeout(()=>t.style.opacity='0',2200)}\n\nwindow.addEventListener('beforeunload',()=>saveProjectToStore(state));\nif(document.readyState==='loading'){window.addEventListener('DOMContentLoaded',init);}else{init();}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
