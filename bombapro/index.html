  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

zier(.2,.7,.2,1)}\n.disclaimer-card h2{margin:0 0 4px;font-size:23px;color:#083b6d;display:flex;align-items:center;gap:10px}\n.disclaimer-card .sub{margin:0 0 16px;font-size:13px;color:#64748b;font-weight:600}\n.disclaimer-body{font-size:13.5px;line-height:1.6;color:#334155;max-height:38vh;overflow:auto;padding:16px 18px;border:1px solid #e2ebf4;border-radius:13px;background:#f7fafd}\n.disclaimer-body p{margin:0 0 11px}.disclaimer-body p:last-child{margin:0}\n.disclaimer-body strong{color:#0b365f}\n.agree{display:flex;align-items:flex-start;gap:11px;margin:18px 0 20px;font-size:13.5px;font-weight:600;color:#1f2f45;cursor:pointer;line-height:1.4}\n.agree input{width:20px;height:20px;margin-top:1px;accent-color:#0b6bcb;flex-shrink:0;cursor:pointer}\n.enter-btn{width:100%;border:0;border-radius:13px;padding:15px;font-size:16px;font-weight:800;color:#fff;\n  background:linear-gradient(135deg,#0b6bcb,#00a6a6);box-shadow:0 14px 30px rgba(11,107,203,.35);transition:.2s}\n.enter-btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 18px 36px rgba(11,107,203,.42)}\n.enter-btn:disabled{opacity:.45;cursor:not-allowed;box-shadow:none}\n#splash.show-disclaimer .splash-stage{opacity:.16;filter:blur(3px);transform:scale(.98)}\n#splash.show-disclaimer .splash-progress,#splash.show-disclaimer .splash-loading{opacity:0;transition:opacity .4s}\n#splash.show-disclaimer .disclaimer{opacity:1;pointer-events:auto}\n#splash.show-disclaimer .disclaimer-card{transform:none}\n#splash.done{opacity:0;pointer-events:none}\n@media(max-width:600px){.splash-brand h1{font-size:38px}.splash-brand p{font-size:15px;letter-spacing:3px}.splash-logo{width:46px;height:46px;font-size:24px}}\n<\u002Fstyle>\n\n<div id=\"splash\">\n  <div class=\"splash-stage\">\n    <svg class=\"splash-art\" viewBox=\"0 0 600 380\" xmlns=\"http://www.w3.org/2000/svg\" role=\"img\" aria-label=\"Bomba centrífuga com fluxo de água\">\n      <defs>\n        <linearGradient id=\"spWater\" x1=\"0\" y1=\"0\" x2=\"1\" y2=\ dur=\"1.6s\" begin=\"1.05s\" repeatCount=\"indefinite\"><\u002Fanimate><animate attributeName=\"opacity\" values=\"0;.85;0\" dur=\"1.6s\" begin=\"1.05s\" repeatCount=\"indefinite\"><\u002Fanimate><\u002Fcircle>\n\n      <!-- bolhas no recalque -->\n      <circle cx=\"288\" cy=\"150\" r=\"5.5\" fill=\"#eafcff\" opacity=\"0.85\"><animate attributeName=\"cy\" values=\"146;6\" dur=\"1.3s\" repeatCount=\"indefinite\"><\u002Fanimate><animate attributeName=\"opacity\" values=\"0;.9;0\" dur=\"1.3s\" repeatCount=\"indefinite\"><\u002Fanimate><\u002Fcircle>\n      <circle cx=\"312\" cy=\"150\" r=\"4\" fill=\"#eafcff\" opacity=\"0.7\"><animate attributeName=\"cy\" values=\"146;6\" dur=\"1.3s\" begin=\"0.45s\" repeatCount=\"indefinite\"><\u002Fanimate><animate attributeName=\"opacity\" values=\"0;.85;0\" dur=\"1.3s\" begin=\"0.45s\" repeatCount=\"indefinite\"><\u002Fanimate><\u002Fcircle>\n      <circle cx=\"300\" cy=\"150\" r=\"5\" fill=\"#eafcff\" opacity=\"0.6\"><animate attributeName=\"cy\" values=\"146;6\" dur=\"1.3s\" begin=\"0.9s\" repeatCount=\"indefinite\"><\u002Fanimate><animate attributeName=\"opacity\" values=\"0;.85;0\" dur=\"1.3s\" begin=\"0.9s\" repeatCount=\"indefinite\"><\u002Fanimate><\u002Fcircle>\n\n      <!-- setas de sentido do fluxo -->\n      <path d=\"M150 244 l-16 -9 v18 z\" fill=\"#eafcff\" opacity=\"0.75\"><\u002Fpath>\n      <path d=\"M300 92 l-9 16 h18 z\" fill=\"#eafcff\" opacity=\"0.75\"><\u002Fpath>\n    <\u002Fsvg>\n\n    <div class=\"splash-brand\">\n      <div class=\"row\"><div class=\"splash-logo\">↗<\u002Fdiv><h1>BombaPro<\u002Fh1><\u002Fdiv>\n      <p>Calculadora de Bombas<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"splash-progress\"><span><\u002Fspan><\u002Fdiv>\n    <div class=\"splash-loading\">Iniciando ambiente de cálculo…<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"disclaimer\">\n    <div class=\"disclaimer-card\">\n      <h2>⚠️ Aviso legal<\u002Fh2>\n      <p class=\"sub\">Leia com atenção antes de utilizar o BombaPro<\u002Fp>\n      <div class=\"disclaimer-body\">\n        <p>O <strong>BombaPro — Calculadora de Bombas<\u002Fstrong> é uma ferramenta de apoio à engenharia, destinada ao <strong>pré-dimensionamento<\u002Fstrong> de sistemas de bombeamento. Os resultados são estimativas obtidas a partir dos dados informados pelo usuário e de métodos simplificados de cálculo, podendo divergir das condições reais de operação.<\u002Fp>\n        <p>Todos os resultados devem ser <strong>conferidos e validados por profissional legalmente habilitado<\u002Fstrong> (engenheiro responsável) e confrontados com as <strong>curvas, catálogos e especificações oficiais dos fabricantes<\u002Fstrong> antes de qualquer especificação, aquisição, instalação ou operação de equipamentos.<\u002Fp>\n        <p>O uso das informações geradas por este sistema é de <strong>inteira e exclusiva responsabilidade do usuário<\u002Fstrong>. Os desenvolvedores não se responsabilizam por danos diretos, indiretos, incidentais ou consequentes decorrentes do uso ou da impossibilidade de uso deste software.<\u002Fp>\n        <p>Ao prosseguir, você declara estar ciente de que esta ferramenta <strong>não substitui<\u002Fstrong> o projeto executivo, a Anotação de Responsabilidade Técnica (ART) nem o julgamento profissional qualificado.<\u002Fp>\n      <\u002Fdiv>\n      <label class=\"agree\"><input type=\"checkbox\" id=\"agreeCheck\"><span>Li e concordo com o aviso legal e assumo a responsabilidade pela verificação dos resultados.<\u002Fspan><\u002Flabel>\n      <button class=\"enter-btn\" id=\"enterBtn\" disabled=\"\">Concordar e entrar no sistema<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<script>\n(function(){\n  var splash=document.getElementById('splash');\n  var enterBtn=document.getElementById('enterBtn');\n  var agree=document.getElementById('agreeCheck');\n  document.documentElement.style.overflow='hidden';\n  if(localStorage.getItem('bombapro_consent')==='1'){agree.checked=true;enterBtn.disabled=false;}\n  agree.addEventListener('change',function(){enterBtn.disabled=!agree.checked;});\n  setTimeout(function(){splash.classList.add('show-disclaimer');},5000);\n  enterBtn.addEventListener('click',function(){\n    if(!agree.checked)return;\n    localStorage.setItem('bombapro_consent','1');\n    splash.classList.add('done');\n    document.documentElement.style.overflow='';\n    setTimeout(function(){if(splash&&splash.parentNode)splash.parentNode.removeChild(splash);},650);\n  });\n})();\n<\u002Fscript>\n<!-- ============== FIM DA TELA DE ABERTURA ============== -->\n\n<div class=\"app\">\n  <aside class=\"sidebar\" id=\"sidebar\">\n    <div class=\"brand\"><div class=\"logo\">↗<\u002Fdiv><div><h1>BombaPro<\u002Fh1><small>Engenharia de bombeamento<\u002Fsmall><\u002Fdiv><\u002Fdiv>\n    <nav class=\"nav\" id=\"nav\">\n      <button class=\"active\" data-page=\"home\"><span class=\"icon\">⌂<\u002Fspan>Início<\u002Fbutton>\n      <button data-page=\"project\"><span class=\"icon\">▣<\u002Fspan>Projeto<\u002Fbutton>\n      <button data-page=\"flow\"><span class=\"icon\">≈<\u002Fspan>Vazão<\u002Fbutton>\n      <button data-page=\"system\"><span class=\"icon\">↗<\u002Fspan>Sistema hidráulico<\u002Fbutton>\n      <button data-page=\"pipes\"><span class=\"icon\">━<\u002Fspan>Tubulações<\u002Fbutton>\n      <button data-page=\"fittings\"><span class=\"icon\">⌁<\u002Fspan>Acessórios<\u002Fbutton>\n      <button data-page=\"losses\"><span class=\"icon\">⇣<\u002Fspan>Perdas de carga<\u002Fbutton>\n      <button data-page=\"hmt\"><span class=\"icon\">↕<\u002Fspan>Altura manométrica<\u002Fbutton>\n      <button data-page=\"power\"><span class=\"icon\">⚡<\u002Fspan>Potência e NPSH<\u002Fbutton>\n      <button data-page=\"curve\"><span class=\"icon\">⌁<\u002Fspan>Curva do sistema<\u002Fbutton>\n      <button data-page=\"pumps\"><span class=\"icon\">◉<\u002Fspan>Bombas<\u002Fbutton>\n      <button data-page=\"comparison\"><span class=\"icon\">≡<\u002Fspan>Comparação<\u002Fbutton>\n      <button data-page=\"energy\"><span class=\"icon\">▥<\u002Fspan>Energia<\u002Fbutton>\n      <button data-page=\"scenarios\"><span class=\"icon\">◇<\u002Fspan>Cenários<\u002Fbutton>\n      <button data-page=\"report\"><span class=\"icon\">▤<\u002Fspan>Relatório<\u002Fbutton>\n    <\u002Fnav>\n    <div class=\"sidebar-footer\">Pré-dimensionamento técnico. Confirme os resultados com as curvas oficiais do fabricante e profissional habilitado.<\u002Fdiv>\n  <\u002Faside>\n\n  <main class=\"main\">\n    <header class=\"topbar\">\n      <div class=\"topbar-left\"><button class=\"menu-btn\" id=\"menuBtn\">☰<\u002Fbutton><div><div class=\"project-title\" id=\"topProjectName\">Novo projeto<\u002Fdiv><div class=\"project-sub\" id=\"topProjectMeta\">Sistema personalizado<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"top-actions\">\n        <button class=\"btn soft\" onclick=\"openProjectManager()\">📁 <span class=\"label-hide\">Projetos<\u002Fspan><\u002Fbutton>\n        <button class=\"btn\" onclick=\"saveCurrentProject(true)\">💾 <span class=\"label-hide\">Salvar<\u002Fspan><\u002Fbutton>\n        <button class=\"btn primary\" onclick=\"calculateAll(true)\">▶ Calcular<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fheader>\n\n    <div class=\"content\">\n      <section class=\"page active\" id=\"page-home\">\n        <div class=\"page-head\"><div><h2>Painel do sistema<\u002Fh2><p>Visão consolidada do dimensionamento hidráulico, desempenho energético e adequação dos modelos cadastrados.<\u002Fp><\u002Fdiv><button class=\"btn soft\" onclick=\"loadDemo('predial')\">Carregar exemplo predial<\u002Fbutton><\u002Fdiv>\n        <div class=\"kpis\">\n          <div class=\"kpi\"><div class=\"label\">Vazão de projeto<\u002Fdiv><div><span class=\"value\" id=\"kpiFlow\">—<\u002Fspan><span class=\"unit\">m³/h<\u002Fspan><\u002Fdiv><div class=\"status\" id=\"kpiFlowStatus\">Informe os dados de vazão<\u002Fdiv><\u002Fdiv>\n          <div class=\"kpi\"><div class=\"label\">Altura manométrica<\u002Fdiv><div><span class=\"value\" id=\"kpiHmt\">—<\u002Fspan><span class=\"unit\">mca<\u002Fspan><\u002Fdiv><div class=\"status\" id=\"kpiHmtStatus\">Aguardando cálculo<\u002Fdiv><\u002Fdiv>\n          <div class=\"kpi\"><div class=\"label\">Motor recomendado<\u002Fdiv><div><span class=\"value\" id=\"kpiPower\">—<\u002Fspan><span class=\"unit\">kW<\u002Fspan><\u002Fdiv><div class=\"status\" id=\"kpiPowerStatus\">Aguardando cálculo<\u002Fdiv><\u002Fdiv>\n          <div class=\"kpi\"><div class=\"label\">Custo anual de energia<\u002Fdiv><div><span class=\"value\" id=\"kpiEnergy\">—<\u002Fspan><span class=\"unit\">R$<\u002Fspan><\u002Fdiv><div class=\"status\" id=\"kpiEnergyStatus\">Perfil operacional padrão<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"grid two\">\n          <div class=\"card\"><h3>Resumo hidráulico<\u002Fh3><div class=\"summary-grid\" id=\"homeHydraulicSummary\"><\u002Fdiv><div class=\"mt section-note\" id=\"homeRecommendation\">Cadastre os dados do sistema e execute o cálculo.<\u002Fdiv><\u002Fdiv>\n          <div class=\"card\"><h3>Esquema simplificado<\u002Fh3><div class=\"flow-diagram\"><div class=\"pipe-line\"><\u002Fdiv><div class=\"arrow\"><\u002Fdiv><div class=\"reservoir left\"><\u002Fdiv><div class=\"reservoir right\"><\u002Fdiv><div class=\"pump-symbol\">B<\u002Fdiv><div class=\"diagram-label origin\">Origem<\u002Fdiv><div class=\"diagram-label dest\">Destino<\u002Fdiv><div class=\"diagram-label center\" id=\"diagramText\">Q = — | HMT = —<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n          <div class=\"card\"><h3>Curva do sistema e bombas<\u002Fh3><div class=\"chart-box small\"><canvas id=\"homeCurveChart\"><\u002Fcanvas><\u002Fdiv><\u002Fdiv>\n          <div class=\"card\"><h3>Diagnósticos principais<\u002Fh3><div class=\"alert-list\" id=\"homeAlerts\"><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <section class=\"page\" id=\"page-project\">\n        <div class=\"page-head\"><div><h2>Dados do projeto<\u002Fh2><p>Identificação, aplicação e propriedades do fluido utilizadas em todas as etapas do cálculo.<\u002Fp><\u002Fdiv><button class=\"btn\" onclick=\"newProject()\">＋ Novo projeto<\u002Fbutton><\u002Fdiv>\n        <div class=\"card\"><div class=\"form-grid\">\n          <div class=\"field span2\"><label>Nome do projeto<\u002Flabel><input id=\"projectName\" data-path=\"project.name\" value=\"Novo sistema de bombeamento\"><\u002Fdiv>\n          <div class=\"field\"><label>Responsável técnico<\u002Flabel><input data-path=\"project.engineer\" placeholder=\"Nome do responsável\"><\u002Fdiv>\n          <div class=\"field\"><label>Data do cálculo<\u002Flabel><input type=\"date\" data-path=\"project.date\"><\u002Fdiv>\n          <div class=\"field span2\"><label>Cliente<\u002Flabel><input data-path=\"project.client\"><\u002Fdiv>\n          <div class=\"field span2\"><label>Local da instalação<\u002Flabel><input data-path=\"project.location\"><\u002Fdiv>\n          <div class=\"field\"><label>Tipo de aplicação<\u002Flabel><select data-path=\"project.application\" id=\"applicationType\">\n            <option value=\"predial\">Recalque entre reservatórios<\u002Foption><option value=\"abastecimento\">Abastecimento predial<\u002Foption><option value=\"pressurizacao\">Pressurização de rede<\u002Foption><option value=\"poco\">Bombeamento de poço<\u002Foption><option value=\"irrigacao\">Irrigação<\u002Foption><option value=\"drenagem\">Drenagem<\u002Foption><option value=\"esgoto\">Esgotamento<\u002Foption><option value=\"circulacao\">Circulação<\u002Foption><option value=\"incendio\">Combate a incêndio<\u002Foption><option value=\"industrial\">Aplicação industrial<\u002Foption><option value=\"personalizado\">Sistema personalizado<\u002Foption>\n          <\u002Fselect><\u002Fdiv>\n          <div class=\"field\"><label>Fluido<\u002Flabel><select data-path=\"fluid.type\" id=\"fluidType\"><option value=\"water\">Água<\u002Foption><option value=\"custom\">Personalizado<\u002Foption><\u002Fselect><\u002Fdiv>\n          <div class=\"field\"><label>Temperatura (°C)<\u002Flabel><input type=\"number\" step=\"0.1\" data-path=\"fluid.temperature\" id=\"fluidTemperature\" value=\"20\"><\u002Fdiv>\n          <div class=\"field\"><label>Altitude (m)<\u002Flabel><input type=\"number\" step=\"1\" data-path=\"fluid.altitude\" value=\"0\"><\u002Fdiv>\n          <div class=\"field\"><label>Massa específica (kg/m³)<\u002Flabel><input type=\"number\" step=\"0.1\" data-path=\"fluid.density\" id=\"fluidDensity\" value=\"998.2\"><\u002Fdiv>\n          <div class=\"field\"><label>Viscosidade dinâmica (mPa·s)<\u002Flabel><input type=\"number\" step=\"0.001\" data-path=\"fluid.viscosity\" id=\"fluidViscosity\" value=\"1.002\"><\u002Fdiv>\n          <div class=\"field\"><label>Pressão de vapor (kPa)<\u002Flabel><input type=\"number\" step=\"0.01\" data-path=\"fluid.vaporPressure\" id=\"vaporPressure\" value=\"2.34\"><\u002Fdiv>\n          <div class=\"field\"><label>Pressão atmosférica (kPa)<\u002Flabel><input type=\"number\" step=\"0.01\" data-path=\"fluid.atmPressure\" id=\"atmPressure\" value=\"101.325\"><\u002Fdiv>\n          <div class=\"field span4\"><label>Observações gerais<\u002Flabel><textarea data-path=\"project.notes\" placeholder=\"Premissas, restrições e observações do projeto\"><\u002Ftextarea><\u002Fdiv>\n        <\u002Fdiv><div class=\"mt section-note\">Para água, as propriedades podem ser atualizadas automaticamente conforme a temperatura e a altitude. Para outros fluidos, selecione “Personalizado” e informe os dados do fabricante.<\u002Fdiv><\u002Fdiv>\n      <\u002Fsection>\n\n      <section class=\"page\" id=\"page-flow\">\n        <div class=\"page-head\"><div><h2>Determinação da vazão<\u002Fh2><p>Escolha um método e informe os parâmetros. O resultado é convertido internamente para o Sistema Internacional.<\u002Fp><\u002Fdiv><button class=\"btn primary\" onclick=\"calculateAll(true)\">Calcular vazão<\u002Fbutton><\u002Fdiv>\n        <div class=\"grid two\">\n          <div class=\"card\"><h3>Método de cálculo<\u002Fh3><div class=\"field\"><label>Método<\u002Flabel><select id=\"flowMethod\" data-path=\"flow.method\" onchange=\"renderFlowMethod()\"><option value=\"direct\">Vazão direta<\u002Foption><option value=\"volumeTime\">Volume e tempo<\u002Foption><option value=\"consumption\">Consumo populacional<\u002Foption><option value=\"reservoir\">Enchimento de reservatório<\u002Foption><option value=\"irrigation\">Irrigação<\u002Foption><option value=\"fire\">Combate a incêndio<\u002Foption><\u002Fselect><\u002Fdiv><div id=\"flowMethodFields\" class=\"form-grid mt\"><\u002Fdiv><\u002Fdiv>\n          <div class=\"card highlight\"><h3>Resultado da vazão<\u002Fh3><div style=\"font-size:46px;font-weight:900\" id=\"flowResultBig\">—<\u002Fdiv><div class=\"muted\">m³/h<\u002Fdiv><hr style=\"border-color:rgba(255,255,255,.25)\"><div class=\"summary-grid\" id=\"flowConversions\"><\u002Fdiv><div class=\"mt\" id=\"flowFormulaText\"><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"card mt\"><h3>Critérios de projeto<\u002Fh3><div class=\"form-grid\"><div class=\"field\"><label>Margem de vazão (%)<\u002Flabel><input type=\"number\" min=\"0\" max=\"100\" step=\"0.1\" data-path=\"flow.margin\" value=\"0\"><\u002Fdiv><div class=\"field\"><label>Número de bombas em operação<\u002Flabel><input type=\"number\" min=\"1\" step=\"1\" data-path=\"flow.operatingPumps\" value=\"1\"><\u002Fdiv><div class=\"field\"><label>Número de bombas reserva<\u002Flabel><input type=\"number\" min=\"0\" step=\"1\" data-path=\"flow.reservePumps\" value=\"1\"><\u002Fdiv><div class=\"field\"><label>Vazão por bomba (%)<\u002Flabel><input type=\"number\" min=\"1\" step=\"1\" data-path=\"flow.perPumpPercent\" value=\"100\"><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <\u002Fsection>\n\n      <section class=\"page\" id=\"page-system\">\n        <div class=\"page-head\"><div><h2>Sistema hidráulico<\u002Fh2><p>Defina cotas, pressões e condições de contorno para a equação de energia.<\u002Fp><\u002Fdiv><\u002Fdiv>\n        <div class=\"grid two\">\n          <div class=\"card\"><h3>Geometria e pressões<\u002Fh3><div class=\"form-grid\">\n            <div class=\"field\"><label>Cota do nível de sucção (m)<\u002Flabel><input type=\"number\" step=\"0.01\" data-path=\"system.suctionLevel\" value=\"0\"><\u002Fdiv>\n            <div class=\"field\"><label>Cota do eixo da bomba (m)<\u002Flabel><input type=\"number\" step=\"0.01\" data-path=\"system.pumpLevel\" value=\"1\"><\u002Fdiv>\n            <div class=\"field\"><label>Cota do destino (m)<\u002Flabel><input type=\"number\" step=\"0.01\" data-path=\"system.dischargeLevel\" value=\"20\"><\u002Fdiv>\n            <div class=\"field\"><label>Pressão na sucção (kPa man.)<\u002Flabel><input type=\"number\" step=\"0.01\" data-path=\"system.suctionPressure\" value=\"0\"><\u002Fdiv>\n            <div class=\"field\"><label>Pressão requerida na descarga (kPa)<\u002Flabel><input type=\"number\" step=\"0.01\" data-path=\"system.dischargePressure\" value=\"0\"><\u002Fdiv>\n            <div class=\"field\"><label>Velocidade na origem (m/s)<\u002Flabel><input type=\"number\" step=\"0.01\" data-path=\"system.inletVelocity\" value=\"0\"><\u002Fdiv>\n            <div class=\"field\"><label>Velocidade no destino (m/s)<\u002Flabel><input type=\"number\" step=\"0.01\" data-path=\"system.outletVelocity\" value=\"0\"><\u002Fdiv>\n            <div class=\"field\"><label>Margem sobre a HMT (%)<\u002Flabel><input type=\"number\" min=\"0\" max=\"50\" step=\"0.1\" data-path=\"system.hmtMargin\" value=\"5\"><\u002Fdiv>\n          <\u002Fdiv><div class=\"mt section-note\">A altura estática é obtida pela diferença entre a cota do destino e a cota do nível de sucção. Pressões manométricas positivas aumentam a HMT quando exigidas na descarga.<\u002Fdiv><\u002Fdiv>\n          <div class=\"card\"><h3>Esquema do recalque<\u002Fh3><div class=\"flow-diagram\"><div class=\"pipe-line\"><\u002Fdiv><div class=\"arrow\"><\u002Fdiv><div class=\"reservoir left\"><\u002Fdiv><div class=\"reservoir right\"><\u002Fdiv><div class=\"pump-symbol\">B<\u002Fdiv><div class=\"diagram-label origin\">Nível de sucção<\u002Fdiv><div class=\"diagram-label dest\">Ponto de destino<\u002Fdiv><div class=\"diagram-label center\" id=\"systemDiagramText\">Desnível: —<\u002Fdiv><\u002Fdiv><div class=\"summary-grid mt\" id=\"systemSummary\"><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <section class=\"page\" id=\"page-pipes\">\n        <div class=\"page-head\"><div><h2>Trechos de tubulação<\u002Fh2><p>Cadastre sucção, recalque, derivações ou retornos. O sistema calcula velocidade, Reynolds, fator de atrito e perda distribuída.<\u002Fp><\u002Fdiv><\u002Fdiv>\n        <div class=\"card\"><div class=\"toolbar\"><button class=\"btn primary\" onclick=\"addPipe()\">＋ Adicionar trecho<\u002Fbutton><button class=\"btn\" onclick=\"autoSizePipes()\">Dimensionar diâmetros<\u002Fbutton><span class=\"spacer\"><\u002Fspan><span class=\"chip blue\">Darcy-Weisbach e Hazen-Williams<\u002Fspan><\u002Fdiv><div class=\"table-wrap\"><table class=\"data-table\" id=\"pipesTable\"><thead><tr><th>#<\u002Fth><th>Identificação<\u002Fth><th>Tipo<\u002Fth><th>Material<\u002Fth><th>DN/int. (mm)<\u002Fth><th>Compr. (m)<\u002Fth><th>Rug. (mm)<\u002Fth><th>C<\u002Fth><th>Vazão (%)<\u002Fth><th>Vel. (m/s)<\u002Fth><th>Re<\u002Fth><th>f<\u002Fth><th>hf (m)<\u002Fth><th><\u002Fth><\u002Ftr><\u002Fthead><tbody><\u002Ftbody><\u002Ftable><\u002Fdiv><\u002Fdiv>\n        <div class=\"grid three mt\"><div class=\"card flat\"><h3>Critérios de velocidade<\u002Fh3><div class=\"form-grid\"><div class=\"field\"><label>Mín. geral (m/s)<\u002Flabel><input type=\"number\" step=\"0.1\" data-path=\"criteria.minVelocity\" value=\"0.5\"><\u002Fdiv><div class=\"field\"><label>Máx. sucção (m/s)<\u002Flabel><input type=\"number\" step=\"0.1\" data-path=\"criteria.maxSuctionVelocity\" value=\"1.5\"><\u002Fdiv><div class=\"field\"><label>Máx. recalque (m/s)<\u002Flabel><input type=\"number\" step=\"0.1\" data-path=\"criteria.maxDischargeVelocity\" value=\"3\"><\u002Fdiv><\u002Fdiv><\u002Fdiv><div class=\"card flat\"><h3>Método de perda<\u002Fh3><div class=\"field\"><label>Método adotado<\u002Flabel><select data-path=\"criteria.lossMethod\"><option value=\"darcy\">Darcy-Weisbach<\u002Foption><option value=\"hazen\">Hazen-Williams<\u002Foption><option value=\"max\">Maior valor entre os métodos<\u002Foption><option value=\"average\">Média dos métodos<\u002Foption><\u002Fselect><\u002Fdiv><\u002Fdiv><div class=\"card flat\"><h3>Fator de atrito<\u002Fh3><div class=\"field\"><label>Equação<\u002Flabel><select data-path=\"criteria.frictionMethod\"><option value=\"haaland\">Haaland<\u002Foption><option value=\"swamee\">Swamee-Jain<\u002Foption><option value=\"colebrook\">Colebrook-White iterativo<\u002Foption><\u002Fselect><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <\u002Fsection>\n\n      <section class=\"page\" id=\"page-fittings\">\n        <div class=\"page-head\"><div><h2>Acessórios e perdas localizadas<\u002Fh2><p>Associe acessórios aos trechos. A perda é calculada por ΣK·v²/(2g).<\u002Fp><\u002Fdiv><\u002Fdiv>\n        <div class=\"card\"><div class=\"toolbar\"><button class=\"btn primary\" onclick=\"addFitting()\">＋ Adicionar acessório<\u002Fbutton><span class=\"spacer\"><\u002Fspan><span class=\"chip blue\" id=\"fittingsTotalChip\">ΣK = 0<\u002Fspan><\u002Fdiv><div class=\"table-wrap\"><table class=\"data-table\" id=\"fittingsTable\"><thead><tr><th>#<\u002Fth><th>Trecho<\u002Fth><th>Acessório<\u002Fth><th>Quantidade<\u002Fth><th>K unitário<\u002Fth><th>K total<\u002Fth><th>Velocidade (m/s)<\u002Fth><th>hl (m)<\u002Fth><th><\u002Fth><\u002Ftr><\u002Fthead><tbody><\u002Ftbody><\u002Ftable><\u002Fdiv><\u002Fdiv>\n      <\u002Fsection>\n\n      <section class=\"page\" id=\"page-losses\">\n        <div class=\"page-head\"><div><h2>Perdas de carga<\u002Fh2><p>Comparativo por trecho e composição das perdas distribuídas e localizadas.<\u002Fp><\u002Fdiv><button class=\"btn primary\" onclick=\"calculateAll(true)\">Atualizar resultados<\u002Fbutton><\u002Fdiv>\n        <div class=\"kpis\"><div class=\"kpi\"><div class=\"label\">Perdas distribuídas<\u002Fdiv><div><span class=\"value\" id=\"lossDistributed\">—<\u002Fspan><span class=\"unit\">m<\u002Fspan><\u002Fdiv><\u002Fdiv><div class=\"kpi\"><div class=\"label\">Perdas localizadas<\u002Fdiv><div><span class=\"value\" id=\"lossLocalized\">—<\u002Fspan><span class=\"unit\">m<\u002Fspan><\u002Fdiv><\u002Fdiv><div class=\"kpi\"><div class=\"label\">Perda total<\u002Fdiv><div><span class=\"value\" id=\"lossTotal\">—<\u002Fspan><span class=\"unit\">m<\u002Fspan><\u002Fdiv><\u002Fdiv><div class=\"kpi\"><div class=\"label\">% da HMT<\u002Fdiv><div><span class=\"value\" id=\"lossPercentHmt\">—<\u002Fspan><span class=\"unit\">%<\u002Fspan><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"grid two\"><div class=\"card\"><h3>Perdas por trecho<\u002Fh3><div class=\"table-wrap\"><table class=\"data-table\" id=\"lossesDetailTable\"><thead><tr><th>Trecho<\u002Fth><th>Q (m³/h)<\u002Fth><th>V (m/s)<\u002Fth><th>Darcy (m)<\u002Fth><th>Hazen (m)<\u002Fth><th>Adotada (m)<\u002Fth><th>Localizada (m)<\u002Fth><th>Total (m)<\u002Fth><\u002Ftr><\u002Fthead><tbody><\u002Ftbody><\u002Ftable><\u002Fdiv><\u002Fdiv><div class=\"card\"><h3>Composição das perdas<\u002Fh3><div class=\"chart-box small\"><canvas id=\"lossesChart\"><\u002Fcanvas><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <\u002Fsection>\n\n      <section class=\"page\" id=\"page-hmt\">\n        <div class=\"page-head\"><div><h2>Altura manométrica total<\u002Fh2><p>Memória da equação de energia, com apresentação dos termos e da margem adotada.<\u002Fp><\u002Fdiv><\u002Fdiv>\n        <div class=\"grid two\"><div class=\"card highlight\"><h3>HMT adotada<\u002Fh3><div style=\"font-size:58px;font-weight:900\" id=\"hmtBig\">—<\u002Fdiv><div class=\"muted\">metro ry-grid mt\" id=\"npshSummary\"><\u002Fdiv><div class=\"mt section-note\" id=\"npshAdvice\">Aguardando cálculo.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <\u002Fsection>\n\n      <section class=\"page\" id=\"page-curve\">\n        <div class=\"page-head\"><div><h2>Curva do sistema<\u002Fh2><p>A curva é recalculada em diversos pontos de vazão, considerando as perdas nos trechos e acessórios.<\u002Fp><\u002Fdiv><button class=\"btn\" onclick=\"exportChart('systemCurveChart','curva-sistema.png')\">⬇ Exportar imagem<\u002Fbutton><\u002Fdiv>\n        <div class=\"card\"><div class=\"toolbar\"><div class=\"field\" style=\"min-width:180px\"><label>Arranjo das bombas<\u002Flabel><select data-path=\"curve.arrangement\"><option value=\"single\">Bomba única<\u002Foption><option value=\"parallel\">Bombas em paralelo<\u002Foption><option value=\"series\">Bombas em série<\u002Foption><\u002Fselect><\u002Fdiv><div class=\"field\" style=\"min-width:130px\"><label>Quantidade<\u002Flabel><input type=\"number\" min=\"1\" max=\"10\" step=\"1\" data-path=\"curve.pumpCount\" value=\"1\"><\u002Fdiv><div class=\"field\" style=\"min-width:150px\"><label>Rotação / frequência (%)<\u002Flabel><input type=\"number\" min=\"30\" max=\"120\" step=\"1\" data-path=\"curve.speedPercent\" value=\"100\"><\u002Fdiv><div class=\"field\" style=\"min-width:185px\"><label>Vazão máxima (% projeto)<\u002Flabel><input type=\"number\" min=\"100\" max=\"400\" step=\"10\" data-path=\"curve.maxPercent\" value=\"180\"><\u002Fdiv><div class=\"field\" style=\"min-width:130px\"><label>Pontos<\u002Flabel><input type=\"number\" min=\"10\" max=\"100\" step=\"1\" data-path=\"curve.points\" value=\"35\"><\u002Fdiv><span class=\"spacer\"><\u002Fspan><span class=\"chip blue\" id=\"curveEquationChip\">H(Q) = —<\u002Fspan><\u002Fdiv><div class=\"section-note mb\">Nas bombas em paralelo, as vazões são somadas para uma mesma altura. Nas bombas em série, as alturas são somadas para uma mesma vazão. A rotação é ajustada pelas leis de ><div class=\"field\"><label>Adequação hidráulica (%)<\u002Flabel><input type=\"number\" data-path=\"weights.hydraulic\" value=\"25\"><\u002Fdiv><div class=\"field\"><label>Eficiência (%)<\u002Flabel><input type=\"number\" data-path=\"weights.efficiency\" value=\"20\"><\u002Fdiv><div class=\"field\"><label>NPSH (%)<\u002Flabel><input type=\"number\" data-path=\"weights.npsh\" value=\"15\"><\u002Fdiv><div class=\"field\"><label>Energia (%)<\u002Flabel><input type=\"number\" data-path=\"weights.energy\" value=\"15\"><\u002Fdiv><div class=\"field\"><label>Aquisição (%)<\u002Flabel><input type=\"number\" data-path=\"weights.price\" value=\"10\"><\u002Fdiv><div class=\"field\"><label>Ciclo de vida (%)<\u002Flabel><input type=\"number\" data-path=\"weights.lifecycle\" value=\"15\"><\u002Fdiv><div class=\"field\"><label>Soma dos pesos<\u002Flabel><input id=\"weightsSum\" readonly=\"\"><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"card mt\"><div class=\"table-wrap\"><table class=\"data-table\" id=\"comparisonTable\"><thead><tr><th>Pos.<\u002Fth><th>Modelo<\u002Fth><th>Q op.<\u002Fth><th>H op.<\u002Fth><th>Desvio Q<\u002Fth><th>η<\u002Fth><th>Pot. abs.<\u002Fth><th>NPSH<\u002Fth><th>Custo energia/ano<\u002Fth><th>Preço<\u002Fth><th>LCC 10 anos<\u002Fth><th>Pontuação<\u002Fth><th>Situação<\u002Fth><\u002Ftr><\u002Fthead><tbody><\u002Ftbody><\u002Ftable><\u002Fdiv><\u002Fdiv>\n      <\u002Fsection>\n\n      <section class=\"page\" id=\"page-energy\">\n        <div class=\"page-head\"><div><h2>Consumo de energia<\u002Fh2><p>Estimativa baseada na potência elétrica absorvida, perfil operacional e tarifa informada.<\u002Fp><\u002Fdiv><\u002Fdiv>\n        <div class=\"grid two\"><div class=\"card\"><h3>Perfil operacional<\u002Fh3><div class=\"form-grid\"><div class=\"field\"><label>Horas por dia<\u002Flabel><input type=\"number\" min=\"0\" max=\"24\" step=\"0.1\" data-path=\"energy.hoursDay\" value=\"4\"><\u002Fdiv><div class=\"field\"><label>Dias por mês<\u002Flabel><input type=\"number\" min=\"0\" max=\"31\" step=\"1\" data-path=\"energy.daysMonth\" value=\"30\"><\u002Fdiv><div class=\"field\"><label>Meses por ano<\u002Flabel><input type=\"number\" min=\"0\" max=\"12\" step=\"1\" data-path=\"energy.monthsYear\" value=\"12\"><\u002Fdiv><div class=\"field\"><label>Tarifa de energia (R$/kWh)<\u002Flabel><input type=\"number\" min=\"0\" step=\"0.01\" data-path=\"energy.tariff\" value=\"0.95\"><\u002Fdiv><div class=\"field\"><label>Fator de carga<\u002Flabel><input type=\"number\" min=\"0\" max=\"1\" step=\"0.01\" data-path=\"energy.loadFactor\" value=\"1\"><\u002Fdiv><div class=\"field\"><label>Fator CO₂ (kg/kWh)<\u002Flabel><input type=\"number\" min=\"0\" step=\"0.001\" data-path=\"energy.co2Factor\" value=\"0.08\"><\u002Fdiv><\u002Fdiv><div class=\"summary-grid mt\" id=\"energySummary\"><\u002Fdiv><\u002Fdiv><div class=\"card\"><h3>Projeção mensal<\u002Fh3><div class=\"chart-box small\"><canvas id=\"energyChart\"><\u002Fcanvas><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n        <div class=\"card mt\"><h3>Análise de ciclo de vida<\u002Fh3><div class=\"form-grid\"><div class=\"field\"><label>Taxa de desconto (% a.a.)<\u002Flabel><input type=\"number\" step=\"0.1\" data-path=\"lcc.discountRate\" value=\"6\"><\u002Fdiv><div class=\"field\"><label>Reajuste da energia (% a.a.)<\u002Flabel><input type=\"number\" step=\"0.1\" data-path=\"lcc.energyEscalation\" value=\"4\"><\u002Fdiv><div class=\"field\"><label>Inflação da manutenção (% a.a.)<\u002Flabel><input type=\"number\" step=\"0.1\" data-path=\"lcc.maintenanceEscalation\" value=\"4\"><\u002Fdiv><div class=\"field\"><label>Custo de instalação (% aquisição)<\u002Flabel><input type=\"number\" step=\"0.1\" data-path=\"lcc.installPercent\" value=\"20\"><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <\u002Fsection>\n\n      <section class=\"page\" id=\"page-scenarios\">\n        <div class=\"page-head\"><div><h2>Cenários operacionais<\u002Fh2><p>Compare demanda, HMT, potência e custo em condições alternativas.<\u002Fp><\u002Fdiv><\u002Fdiv>\n        <div class=\"card\"><div class=\"toolbar\"><button class=\"btn primary\" onclick=\"addScenario()\">＋ Adicionar cenário<\u002Fbutton><button class=\"btn\" onclick=\"addDefaultScenarios()\">Inserir mínimo/médio/máximo<\u002Fbutton><\u002Fdiv><div class=\"table-wrap\"><table class=\"data-table\" id=\"scenariosTable\"><thead><tr><th>#<\u002Fth><th>Cenário<\u002Fth><th>Vazão (% projeto)<\u002Fth><th>Altura estática adicional (m)<\u002Fth><th>Horas/ano<\u002Fth><th>Q (m³/h)<\u002Fth><th>HMT (m)<\u002Fth><th>Potência (kW)<\u002Fth><th>Custo anual (R$)<\u002Fth><th><\u002Fth><\u002Ftr><\u002Fthead><tbody><\u002Ftbody><\u002Ftable><\u002Fdiv><\u002Fdiv>\n        <div class=\"grid two mt\"><div class=\"card\"><h3>Comparação de potência<\u002Fh3><div class=\"chart-box small\"><canvas id=\"scenarioChart\"><\u002Fcanvas><\u002Fdiv><\u002Fdiv><div class=\"card\"><h3>Síntese ponderada<\u002Fh3><div class=\"summary-grid\" id=\"scenarioSummary\"><\u002Fdiv><div class=\"mt section-note\" id=\"scenarioAdvice\">Cadastre cenários para avaliar operação variável.<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <\u002Fsection>\n\n      <section class=\"page\" id=\"page-report\">\n        <div class=\"page-head\"><div><h2>Relatório técnico<\u002Fh2><p>Memória de cálculo completa, premissas, fórmulas, alertas e comparação de modelos.<\u002Fp><\u002Fdiv><\u002Fdiv>\n        <div class=\"card\"><div class=\"toolbar\"><button class=\"btn primary\" onclick=\"buildReport(true)\">⟳ Atualizar relatório<\u002Fbutton><button class=\"btn ok\" onclick=\"downloadPDF()\">⬇ Baixar PDF<\u002Fbutton><button class=\"btn\" onclick=\"exportExcel()\">⬇ Exportar Excel<\u002Fbutton><button class=\"btn\" onclick=\"window.print()\">🖨 Imprimir<\u002Fbutton><button class=\"btn\" onclick=\"exportJSON()\">⬇ Exportar JSON<\u002Fbutton><button class=\"btn\" onclick=\"document.getElementById('jsonImport').click()\">⬆ Importar JSON<\u002Fbutton><input type=\"file\" id=\"jsonImport\" accept=\"application/json\" class=\"hidden\" onchange=\"importJSON(event)\"><\u002Fdiv><div class=\"report-preview\" id=\"reportPreview\"><\u002Fdiv><\u002Fdiv>\n      <\u002Fsection>\n    <\u002Fdiv>\n  <\u002Fmain>\n<\u002Fdiv>\n\n<div class=\"modal-backdrop\" id=\"projectModal\"><div class=\"modal\"><div class=\"modal-head\"><h3>Gerenciador de projetos<\u002Fh3><button class=\"btn icon-only\" onclick=\"closeProjectManager()\">×<\u002Fbutton><\u002Fdiv><div class=\"toolbar\"><button class=\"btn primary\" onclick=\"newProject();closeProjectManager()\">＋ Novo<\u002Fbutton><button class=\"btn\" onclick=\"duplicateCurrentProject()\">Duplicar atual<\u002Fbutton><button class=\"btn\" onclick=\"loadDemo('predial')\">Exemplo predial<\u002Fbutton><button class=\"btn\" onclick=\"loadDemo('irrigacao')\">Exemplo irrigação<\u002Fbutton><button class=\"btn\" onclick=\"loadDemo('paralelo')\">Exemplo paralelo<\u002Fbutton><\u002Fdiv><div class=\"table-wrap\"><table class=\"data-table\"><thead><tr><th>Projeto<\u002Fth><th>Aplicação<\u002Fth><th>Atualizado<\u002Fth><th>Ações<\u002Fth><\u002Ftr><\u002Fthead><tbody id=\"projectListBody\"><\u002Ftbody><\u002Ftable><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n\n<script>\n'use strict';\nconst G=9.80665;\nconst STORAGE_KEY='bombapro_projects_v1';\nconst CURRENT_KEY='bombapro_current_v1';\nconst materials={\n  pvc:{name:'PVC',roughness:0.0015,c:150},cpvc:{name:'CPVC',roughness:0.0015,c:150},ppr:{name:'PPR',roughness:0.007,c:150},pead:{name:'PEAD',roughness:0.007,c:150},\n  steel:{name:'Aço carbono',roughness:0.045,c:120},galv:{name:'Aço galvanizado',roughness:0.15,c:110},inox:{name:'Aço inoxidável',roughness:0.015,c:140},\n  iron:{name:'Ferro fundido',roughness:0.26,c:100},copper:{name:'Cobre',roughness:0.0015,c:140},concrete:{name:'Concreto',roughness:0.3,c:100},custom:{name:'Personalizado',roughness:0.05,c:120}\n};\nconst fittingCatalog={\n  sharpEntrance:{name:'Entrada de borda viva',k:0.50},roundedEntrance:{name:'Entrada arredondada',k:0.10},exit:{name:'Saída livre',k:1.00},elbow45:{name:'Joelho 45°',k:0.40},elbow90:{name:'Joelho 90°',k:0.90},curve45:{name:'Curva 45°',k:0.20},curve90:{name:'Curva 90°',k:0.30},teeRun:{name:'Tê passagem direta',k:0.60},teeBranch:{name:'Tê derivação',k:1.80},gate:{name:'Válvula gaveta aberta',k:0.15},globe:{name:'Válvula globo aberta',k:10.0},butterfly:{name:'Válvula borboleta aberta',k:0.30},check:{name:'Válvula de retenção',k:2.00},foot:{name:'Válvula de pé',k:2.50},filter:{name:'Filtro/crivo',k:2.00},reducer:{name:'Redução',k:0.30},expander:{name:'Ampliação',k:0.50},meter:{name:'Medidor de vazão',k:1.50},custom:{name:'Personalizado',k:1.00}\n};\nconst motorSizes=[0.18,0.25,0.37,0.55,0.75,1.1,1.5,2.2,3,4,5.5,7.5,9.2,11,15,18.5,22,30,37,45,55,75,90,110,132,160,200,250,315,400];\nlet state={};let results={};let charts={};\n\nfunction defaultState(){return {\n  id:uid(),project:{name:'Novo sistema de bombeamento',engineer:'',client:'',location:'',application:'predial',date:new Date().toISOString().slice(0,10),notes:''},\n  fluid:{type:'water',temperature:20,altitude:0,density:998.2,viscosity:1.002,vaporPressure:2.34,atmPressure:101.325},\n  flow:{method:'direct',directValue:10,directUnit:'m3h',volume:20,volumeUnit:'m3',time:2,timeUnit:'h',population:100,perCapita:150,k1:1.2,k2:1.5,operatingHours:8,reservoirVolume:20,reservoirTime:2,cyclesDay:1,irrigationArea:1,irrigationDepth:5,irrigationHours:4,irrigationEfficiency:80,fireHydrantFlow:300,fireHydrants:2,fireSprinklerFlow:0,margin:0,operatingPumps:1,reservePumps:1,perPumpPercent:100},\n  system:{suctionLevel:0,pumpLevel:1,dischargeLevel:20,suctionPressure:0,dischargePressure:0,inletVelocity:0,outletVelocity:0,hmtMargin:5},\n  criteria:{minVelocity:0.5,maxSuctionVelocity:1.5,maxDischargeVelocity:3,lossMethod:'darcy',frictionMethod:'haaland'},\n  pipes:[{id:uid(),name:'Sucção',type:'suction',material:'pvc',diameter:60,length:8,roughness:0.0015,c:150,flowPercent:100},{id:uid(),name:'Recalque',type:'discharge',material:'pvc',diameter:50,length:60,roughness:0.0015,c:150,flowPercent:100}],\n  fittings:[{id:uid(),pipeIndex:0,type:'foot',qty:1,k:2.5},{id:uid(),pipeIndex:1,type:'elbow90',qty:4,k:0.9},{id:uid(),pipeIndex:1,type:'gate',qty:1,k:0.15},{id:uid(),pipeIndex:1,type:'check',qty:1,k:2}],\n  power:{pumpEfficiency:72,motorEfficiency:90,transmissionEfficiency:100,serviceFactor:1.10},npsh:{required:2.5,margin:0.5},curve:{maxPercent:180,points:35,arrangement:'single',pumpCount:1,speedPercent:100},\n  pumps:[],weights:{hydraulic:25,efficiency:20,npsh:15,energy:15,price:10,lifecycle:15},energy:{hoursDay:4,daysMonth:30,monthsYear:12,tariff:0.95,loadFactor:1,co2Factor:0.08},lcc:{discountRate:6,energyEscalation:4,maintenanceEscalation:4,installPercent:20},scenarios:[]\n};}\nfunction uid(){return Math.random().toString(36).slice(2,10)+Date.now().toString(36)}\nfunction num(v,d=0){v=parseFloat(v);return Number.isFinite(v)?v:d}\nfunction clamp(v,a,b){return Math.min(b,Math.max(a,v))}\nfunction fmt(v,d=2){return Number.isFinite(v)?v.toLocaleString('pt-BR',{minimumFractionDigits:d,maximumFractionDigits:d}):'—'}\nfunction money(v){return Number.isFinite(v)?v.toLocaleString('pt-BR',{style:'currency',currency:'BRL'}):'—'}\nfunction esc(s){return String(s??'').replace(/[&<>\"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;'}[c]))}\nfunction deepClone(o){return JSON.parse(JSON.stringify(o))}\nfunction getPath(obj,path){return path.split('.').reduce((o,k)=>o?.[k],obj)}\nfunction setPath(obj,path,val){const a=path.split('.');let o=obj;for(let i=0;i<a.length-1;i++){if(!o[a[i]])o[a[i]]={};o=o[a[i]];}o[a.at(-1)]=val}\nfunction debounce(fn,ms=250){let t;return(...a)=>{clearTimeout(t);t=setTimeout(()=>fn(...a),ms)}}\n\nfunction init(){\n  loadInitial();bindUI();renderAllInputs();renderDynamicTables();renderFlowMethod();calculateAll(false);showPage('home');\n}\nfunction loadInitial(){\n  const projects=getProjects();const currentId=localStorage.getItem(CURRENT_KEY);const found=projects.find(p=>p.id===currentId);state=(found&&found.project)?deepClone(found):defaultState();\n  if(!projects.length){saveProjectToStore(state)}\n}\nfunction bindUI(){\n  document.querySelectorAll('[data-page]').forEach(b=>b.addEventListener('click',()=>showPage(b.dataset.page)));\n  document.getElementById('menuBtn').onclick=()=>document.getElementById('sidebar').classList.toggle('open');\n  document.addEventListener('input',debounce(e=>{const el=e.target;if(el.dataset.path){let v=(el.type==='number')?num(el.value):el.value;setPath(state,el.dataset.path,v);specialInput(el);calculateAll(false)}},250));\n  document.addEventListener('change',e=>{const el=e.target;if(el.dataset.path){let v=(el.type==='number')?num(el.value):el.value;setPath(state,el.dataset.path,v);specialInput(el);calculateAll(false)}});\n}\nfunction specialInput(el){\n  if(el.id==='fluidTemperature'&&state.fluid.type==='water')updateWaterProperties();\n  if(el.id==='fluidType'){state.fluid.type=el.value;if(el.value==='water')updateWaterProperties()}\n  if(el.id==='applicationType'){autoApplicationDefaults(el.value);renderFlowMethod()}\n  if(el.dataset.path?.startsWith('weights.'))updateWeightsSum();\n}\nfunction showPage(name){\n  document.querySelectorAll('.page').forEach(p=>p.classList.toggle('active',p.id==='page-'+name));\n  document.querySelectorAll('[data-page]').forEach(b=>b.classList.toggle('active',b.dataset.page===name));\n  document.getElementById('sidebar').classList.remove('open');\n  if(name==='report')buildReport(false);if(['curve','home'].includes(name))setTimeout(renderCurveCharts,50);\n  window.scrollTo({top:0,behavior:'smooth'});\n}\nfunction renderAllInputs(){\n  document.querySelectorAll('[data-path]').forEach(el=>{const v=getPath(state,el.dataset.path);if(v!==undefined)el.value=v});\n  document.getElementById('topProjectName').textContent=state.project.name;\n  document.getElementById('topProjectMeta').textContent=applicationLabel(state.project.application)+' • '+(state.project.location||'Local não informado');\n  updateWeightsSum();\n}\nfunction updateWeightsSum(){const s=Object.values(state.weights).reduce((a,b)=>a+num(b),0);const el=document.getElementById('weightsSum');if(el){el.value=fmt(s,0)+'%';el.style.borderColor=Math.abs(s-100)<.01?'#16815d':'#c33d45'}}\nfunction applicationLabel(v){return {predial:'Recalque entre reservatórios',abastecimento:'Abastecimento predial',pressurizacao:'Pressurização',poco:'Bombeamento de poço',irrigacao:'Irrigação',drenagem:'Drenagem',esgoto:'Esgotamento',circulacao:'Circulação',incendio:'Combate a incêndio',industrial:'Aplicação industrial',personalizado:'Sistema personalizado'}[v]||v}\nfunction updateWaterProperties(){\n  const t=clamp(num(state.fluid.temperature,20),0,100);const rho=1000*(1-((t+288.9414)/(508929.2*(t+68.12963)))*Math.pow(t-3.9863,2));\n  const mu=2.414e-5*Math.pow(10,247.8/(t+133.15))*1000;const pV=0.61078*Math.exp((17.2694*t)/(t+237.29));const pAtm=101.325*Math.pow(1-2.25577e-5*num(state.fluid.altitude),5.2559);\n  Object.assign(state.fluid,{density:rho,viscosity:mu,vaporPressure:pV,atmPressure:pAtm});['fluidDensity','fluidViscosity','vaporPressure','atmPressure'].forEach(id=>{const e=document.getElementById(id);if(e)e.value=fmt(state.fluid[{fluidDensity:'density',fluidViscosity:'viscosity',vaporPressure:'vaporPressure',atmPressure:'atmPressure'}[id]],id==='fluidDensity'?1:3).replace('.','').replace(',','.')});\n}\nfunction autoApplicationDefaults(type){\n  if(type==='incendio'){state.flow.method='fire';state.system.hmtMargin=10;state.criteria.maxDischargeVelocity=5}\n  if(type==='irrigacao'){state.flow.method='irrigation';state.system.dischargePressure=300;state.energy.hoursDay=8}\n  if(type==='predial'){state.flow.method='reservoir';state.system.dischargePressure=0;state.criteria.maxDischargeVelocity=3}\n  const fm=document.getElementById('flowMethod');if(fm)fm.value=state.flow.method;\n}\n\nfunction renderFlowMethod(){\n  const m=state.flow.method;const box=document.getElementById('flowMethodFields');if(!box)return;\n  const f=(label,path,type='number',extra='')=>`<div class=\"field\"><label>${label}<\u002Flabel><input type=\"${type}\" data-path=\"${path}\" value=\"${esc(getPath(state,path))}\" ${extra}><\u002Fdiv>`;\n  let h='';\n  if(m==='direct')h=`<div class=\"field span2\"><label>Vazão informada<\u002Flabel><div class=\"input-unit\"><input type=\"number\" min=\"0\" step=\"0.001\" data-path=\"flow.directValue\" value=\"${state.flow.directValue}\"><select data-path=\"flow.directUnit\"><option value=\"m3h\" ${state.flow.directUnit==='m3h'?'selected':''}>m³/h<\u002Foption><option value=\"ls\" ${state.flow.directUnit==='ls'?'selected':''}>L/s<\u002Foption><option value=\"lmin\" ${state.flow.directUnit==='lmin'?'selected':''}>L/min<\u002Foption><option value=\"m3s\" ${state.flow.directUnit==='m3s'?'selected':''}>m³/s<\u002Foption><option value=\"gpm\" ${state.flow.directUnit==='gpm'?'selected':''}>GPM<\u002Foption><\u002Fselect><\u002Fdiv><\u002Fdiv>`;\n  if(m==='volumeTime')h=f('Volume','flow.volume')+`<div class=\"field\"><label>Unidade do volume<\u002Flabel><select data-path=\"flow.volumeUnit\"><option value=\"m3\" ${state.flow.volumeUnit==='m3'?'selected':''}>m³<\u002Foption><option value=\"l\" ${state.flow.volumeUnit==='l'?'selected':''}>litros<\u002Foption><\u002Fselect><\u002Fdiv>`+f('Tempo','flow.time')+`<div class=\"field\"><label>Unidade do tempo<\u002Flabel><select data-path=\"flow.timeUnit\"><option value=\"h\" ${state.flow.timeUnit==='h'?'selected':''}>horas<\u002Foption><option value=\"min\" ${state.flow.timeUnit==='min'?'selected':''}>minutos<\u002Foption><option value=\"s\" ${state.flow.timeUnit==='s'?'selected':''}>segundos<\u002Foption><\u002Fselect><\u002Fdiv>`;\n  if(m==='consumption')h=f('População atendida','flow.population')+f('Consumo per capita (L/hab.dia)','flow.perCapita')+f('Coeficiente K1','flow.k1')+f('Coeficiente K2','flow.k2')+f('Horas de bombeamento/dia','flow.operatingHours');\n  if(m==='reservoir')h=f('Volume útil (m³)','flow.reservoirVolume')+f('Tempo de enchimento (h)','flow.reservoirTime')+f('Ciclos por dia','flow.cyclesDay');\n  if(m==='irrigation')h=f('Área irrigada (ha)','flow.irrigationArea')+f('Lâmina diária (mm)','flow.irrigationDepth')+f('Tempo de aplicação (h)','flow.irrigationHours')+f('Eficiência do sistema (%)','flow.irrigationEfficiency');\n  if(m==='fire')h=f('Vazão por hidrante (L/min)','flow.fireHydrantFlow')+f('Hidrantes simultâneos','flow.fireHydrants')+f('Vazão adicional de sprinklers (L/min)','flow.fireSprinklerFlow');\n  box.innerHTML=h;\n}\nfunction calcFlow(){\n  const f=state.flow;let q=0,formula='';\n  if(f.method==='direct'){const v=num(f.directValue);q={m3h:v,ls:v*3.6,lmin:v*.06,m3s:v*3600,gpm:v*.2271247}[f.directUnit]||0;formula=`Vazão direta convertida para m³/h.`}\n  if(f.method==='volumeTime'){let V=num(f.volume)*(f.volumeUnit==='l'?.001:1);let t=num(f.time)*(f.timeUnit==='min'?1/60:f.timeUnit==='s'?1/3600:1);q=t>0?V/t:0;formula=`Q = V/t = ${fmt(V,3)} / ${fmt(t,3)} = ${fmt(q,3)} m³/h.`}\n  if(f.method==='consumption'){q=num(f.population)*num(f.perCapita)*num(f.k1,1)*num(f.k2,1)/1000/Math.max(num(f.operatingHours),.001);formula=`Q = População × consumo × K1 × K2 / horas = ${fmt(q,3)} m³/h.`}\n  if(f.method==='reservoir'){q=num(f.reservoirVolume)*Math.max(num(f.cyclesDay),1)/Math.max(num(f.reservoirTime),.001);formula=`Q = volume × ciclos / tempo = ${fmt(q,3)} m³/h.`}\n  if(f.method==='irrigation'){const vol=num(f.irrigationArea)*10000*num(f.irrigationDepth)/1000; q=vol/Math.max(num(f.irrigationHours),.001)/(Math.max(num(f.irrigationEfficiency),1)/100);formula=`Q = área × lâmina / (tempo × eficiência) = ${fmt(q,3)} m³/h.`}\n  if(f.method==='fire'){q=(num(f.fireHydrantFlow)*num(f.fireHydrants)+num(f.fireSprinklerFlow))*.06;formula=`Q = (hidrantes × vazão + sprinklers) × 0,06 = ${fmt(q,3)} m³/h.`}\n  q*=1+num(f.margin)/100;q/=Math.max(num(f.operatingPumps),1);q*=num(f.perPumpPercent,100)/100;\n  return {m3h:q,m3s:q/3600,ls:q/3.6,lmin:q/0.06,gpm:q/0.2271247,formula};\n}\n\nfunction materialOptions(sel){return Object.entries(materials).map(([k,v])=>`<option value=\"${k}\" ${k===sel?'selected':''}>${v.name}<\u002Foption>`).join('')}\nfunction pipeTypeOptions(sel){return [['suction','Sucção'],['discharge','Recalque'],['branch','Derivação'],['return','Retorno']].map(([k,v])=>`<option value=\"${k}\" ${k===sel?'selected':''}>${v}<\u002Foption>`).join('')}\nfunction renderDynamicTables(){renderPipes();renderFittings();renderPumps();renderScenarios()}\nfunction renderPipes(){const tb=document.querySelector('#pipesTable tbody');if(!tb)return;tb.innerHTML=state.pipes.map((p,i)=>`<tr><td>${i+1}<\u002Ftd><td><input value=\"${esc(p.name)}\" onchange=\"updatePipe(${i},'name',this.value)\"><\u002Ftd><td><select onchange=\"updatePipe(${i},'type',this.value)\">${pipeTypeOptions(p.type)}<\u002Fselect><\u002Ftd><td><select onchange=\"changePipeMaterial(${i},this.value)\">${materialOptions(p.material)}<\u002Fselect><\u002Ftd><td><input type=\"number\" step=\"0.1\" value=\"${p.diameter}\" onchange=\"updatePipe(${i},'diameter',this.value)\"><\u002Ftd><td><input type=\"number\" step=\"0.1\" value=\"${p.length}\" onchange=\"updatePipe(${i},'length',this.value)\"><\u002Ftd><td><input type=\"number\" step=\"0.0001\" value=\"${p.roughness}\" onchange=\"updatePipe(${i},'roughness',this.value)\"><\u002Ftd><td><input type=\"number\" step=\"1\" value=\"${p.c}\" onchange=\"updatePipe(${i},'c',this.value)\"><\u002Ftd><td><input type=\"number\" step=\"1\" value=\"${p.flowPercent}\" onchange=\"updatePipe(${i},'flowPercent',this.value)\"><\u002Ftd><td class=\"num\" id=\"pvel-${i}\">—<\u002Ftd><td class=\"num\" id=\"pre-${i}\">—<\u002Ftd><td class=\"num\" id=\"pf-${i}\">—<\u002Ftd><td class=\"num\" id=\"phf-${i}\">—<\u002Ftd><td><button class=\"btn danger small\" onclick=\"removePipe(${i})\">×<\u002Fbutton><\u002Ftd><\u002Ftr>`).join('')}\nfunction updatePipe(i,k,v){state.pipes[i][k]=['name','type','material'].includes(k)?v:num(v);renderFittings();calculateAll(false)}\nfunction changePipeMaterial(i,v){state.pipes[i].material=v;state.pipes[i].roughness=materials[v].roughness;state.pipes[i].c=materials[v].c;renderPipes();calculateAll(false)}\nfunction addPipe(){state.pipes.push({id:uid(),name:'Trecho '+(state.pipes.length+1),type:'discharge',material:'pvc',diameter:50,length:10,roughness:.0015,c:150,flowPercent:100});renderPipes();renderFittings();calculateAll(false)}\nfunction removePipe(i){if(state.pipes.length<=1)return alert('Mantenha ao menos um trecho.');state.pipes.splice(i,1);state.fittings=state.fittings.filter(f=>f.pipeIndex!==i).map(f=>({...f,pipeIndex:f.pipeIndex>i?f.pipeIndex-1:f.pipeIndex}));renderPipes();renderFittings();calculateAll(false)}\nfunction autoSizePipes(){const q=calcFlow().m3s;state.pipes.forEach(p=>{const vmax=p.type==='suction'?num(state.criteria.maxSuctionVelocity,1.5):num(state.criteria.maxDischargeVelocity,3);const d=Math.sqrt(4*q*(num(p.flowPercent,100)/100)/(Math.PI*vmax))*1000;p.diameter=Math.ceil(d/5)*5});renderPipes();calculateAll(true)}\nfunction fittingOptions(sel){return Object.entries(fittingCatalog).map(([k,v])=>`<option value=\"${k}\" ${k===sel?'selected':''}>${v.name}<\u002Foption>`).join('')}\nfunction pipeOptions(sel){return state.pipes.map((p,i)=>`<option value=\"${i}\" ${i===num(sel)?'selected':''}>${i+1}. ${esc(p.name)}<\u002Foption>`).join('')}\nfunction renderFittings(){const tb=document.querySelector('#fittingsTable tbody');if(!tb)return;tb.innerHTML=state.fittings.map((f,i)=>`<tr><td>${i+1}<\u002Ftd><td><select onchange=\"updateFitting(${i},'pipeIndex',this.value)\">${pipeOptions(f.pipeIndex)}<\u002Fselect><\u002Ftd><td><select onchange=\"changeFittingType(${i},this.value)\">${fittingOptions(f.type)}<\u002Fselect><\u002Ftd><td><input type=\"number\" min=\"0\" step=\"1\" value=\"${f.qty}\" onchange=\"updateFitting(${i},'qty',this.value)\"><\u002Ftd><td><input type=\"number\" min=\"0\" step=\"0.01\" value=\"${f.k}\" onchange=\"updateFitting(${i},'k',this.value)\"><\u002Ftd><td });const ops=results.pumps.filter(x=>x.op).map(x=>({x:x.op.q,y:x.op.h,label:x.model}));if(ops.length)datasets.push({label:'Pontos de operação',data:ops,showLine:false,pointRadius:6,pointHoverRadius:8});const config={type:'scatter',data:{datasets},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'nearest',intersect:false},plugins:{legend:{position:'bottom'},tooltip:{callbacks:{label:c=>`${c.dataset.label}: Q ${fmt(c.parsed.x,2)} m³/h, H ${fmt(c.parsed.y,2)} m`}}},scales:{x:{type:'linear',beginAtZero:true,title:{display:true,text:'Vazão (m³/h)'}},y:{beginAtZero:true,title:{display:true,text:'Altura manométrica (m)'}}}}};chart('systemCurveChart',config);chart('homeCurveChart',deepClone(config));const h0=calculateHydraulicsAtFlow(0).hmt,hq=results.hyd.hmt,k=(hq-h0)/Math.max(results.flow.m3h*results.flow.m3h,.001);setText('curveEquationChip',`H(Q) ≈ ${fmt(h0,2)} + ${fmt(k,5)}·Q² • ${arrangementLabel()}`)}\nfunction exportChart(id,filename){const c=document.getElementById(id);if(!c)return;const a=document.createElement('a');a.href=c.toDataURL('image/png');a.download=filename;a.click()}\n\nfunction buildReport(recalc=true){if(recalc)calculateAll(false);const h=results.hyd,f=results.flow,p=results.power,n=results.npsh,e=results.energy||{};const pipeRows=h.pipeResults.map(x=>`<tr><td>${esc(x.name)}<\u002Ftd><td>${fmt(x.qM3h,2)}<\u002Ftd><td>${fmt(x.D*1000,1)}<\u002Ftd><td>${fmt(x.v,2)}<\u002Ftd><td>${fmt(x.Re,0)}<\u002Ftd><td>${fmt(x.f,4)}<\u002Ftd><td>${fmt(x.darcy,3)}<\u002Ftd><td>${fmt(x.hazen,3)}<\u002Ftd><td>${fmt(x.localized,3)}<\u002Ftd><\u002Ftr>`).join('');const fitRows=state.fittings.map((x,i)=>{const pr=h.pipeResults[num(x.pipeIndex)];return `<tr><td>${esc(state.pipes[num(x.pipeIndex)]?.name||'—')}<\u002Ftd><td>${esc(fittingCatalog[x.type]?.name||x.type)}<\u002Ftd><td>${fmt(x.qty,0)}<\u002Ftd><td>${fmt(x.k,2)}<\u002Ftd><td>${fmt(num(x.qty)*num(x.k)*(pr?.v||0)**2/(2*G),3)}<\u002Ftd><\u002Ftr>`}).join('');const pumpRows=results.pumps.map((x,i)=>`
