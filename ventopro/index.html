document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"30f88df7-ca56-4fcf-bc87-a461e0f0b507\"><\u002Fscript>\n\n\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n<style>\nhtml,body{margin:0;padding:0;height:100%;background:#0c1822;overflow:hidden}\na{color:#d8a534}a:hover{color:#e6bb55}\n@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}\n@keyframes fadeIn{from{opacity:0}to{opacity:1}}\n@keyframes lineGrow{from{transform:scaleX(0)}to{transform:scaleX(1)}}\n<\u002Fstyle>\n<script src=\"467e4a74-1f14-498f-9475-c3a908decd7c\"><\u002Fscript>\n<\u002Fhelmet>\n<div style=\"position:fixed;inset:0;background:#0c1822;font-family:'Segoe UI',system-ui,sans-serif\">\n  <canvas ref=\"{{ canvasRef }}\" style=\"position:absolute;inset:0;width:100%;height:100%;display:block\"><\u002Fcanvas>\n\n  <sc-if value=\"{{ isIntro }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none\">\n      <div style=\"text-align:center;animation:fadeUp 1.2s .6s ease both\">\n        <div style=\"font-family:monospace;font-size:12px;letter-spacing:4px;color:#d8a534;text-transform:uppercase;margin-bottom:14px\">ABNT NBR 6123:2023<\u002Fdiv>\n        <h1 style=\"font-family:Georgia,'Times New Roman',serif;font-weight:600;font-size:64px;color:#f2f0e9;margin:0;letter-spacing:1px\">Vento<span style=\"color:#d8a534\">Pro<\u002Fspan><\u002Fh1>\n        <div style=\"width:120px;height:2px;background:#d8a534;margin:18px auto;transform-origin:center;animation:lineGrow 1s 1.4s ease both\"><\u002Fdiv>\n        <div style=\"font-size:16px;color:#c7d3da;letter-spacing:.5px;animation:fadeIn 1s 1.6s ease both\">Cálculo de forças devidas ao vento em edificações<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"position:absolute;left:0;right:0;bottom:0;height:3px;background:rgba(242,240,233,.12)\">\n      <div ref=\"{{ progressRef }}\" style=\"height:100%;width:0%;background:#d8a534\"><\u002Fdiv>\n    <\u002Fdiv>\n    <sc-if value=\"{{ podePular }}\" hint-placeholder-val=\"{{ true }}\">\n      <button sc-camel-on-click=\"{{ pular }}\" style=\"position:absolute;right:22px;bottom:22px;background:rgba(242,240,233,.08);border:1px solid rgba(242,240,233,.3);color:#c7d3da;padding:8px 16px;border-radius:5px;font-size:13px;cursor:pointer;font-family:inherit\" style-hover=\"background:rgba(242,240,233,.16);color:#f2f0e9\">Pular introdução →<\u002Fbutton>\n    <\u002Fsc-if>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ isLegal }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"position:absolute;inset:0;background:rgba(12,24,34,.72);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;padding:24px;animation:fadeIn .5s ease both;overflow:auto\">\n      <div style=\"background:#f2f0e9;border:1px solid #c9cdb8;border-radius:10px;max-width:640px;width:100%;overflow:hidden;box-shadow:0 24px 60px rgba(0,0,0,.5);animation:fadeUp .6s .15s ease both\">\n        <div style=\"background:linear-gradient(160deg,#12222e 0%,#1f3a4d 100%);padding:20px 26px;border-bottom:3px solid #d8a534;display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap\">\n          <div>\n            <div style=\"font-family:Georgia,serif;font-size:22px;font-weight:600;color:#f2f0e9\">Vento<span style=\"color:#d8a534\">Pro<\u002Fspan><\u002Fdiv>\n            <div style=\"font-size:12px;color:#c7d3da;margin-top:2px\">Termo de responsabilidade e advertências legais<\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"background:rgba(216,165,52,.14);border:1px solid #d8a534;color:#d8a534;padding:5px 11px;border-radius:4px;font-size:11px;font-weight:600;white-space:nowrap\">ABNT NBR 6123:2023<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding:22px 26px;color:#12222e;font-size:13.5px;line-height:1.6;max-height:46vh;overflow:auto\">\n          <p style=\"margin:0 0 12px\">Antes de utilizar o <b>VentoPro<\u002Fb>, leia atentamente as advertências abaixo:<\u002Fp>\n          <div style=\"display:flex;flex-direction:column;gap:10px\">\n            <div style=\"background:#fff;border:1px solid #c9cdb8;border-left:3px solid #d8a534;border-radius:0 6px 6px 0;padding:10px 14px\"><b>1. Ferramenta de auxílio.<\u002Fb> Este programa é um instrumento de apoio ao cálculo das forças devidas ao vento conforme a ABNT NBR 6123. Ele <b>não substitui<\u002Fb> o julgamento técnico de engenheiro(a) legalmente habilitado(a), responsável pelo projeto.<\u002Fdiv>\n            <div style=\"background:#fff;border:1px solid #c9cdb8;border-left:3px solid #d8a534;border-radius:0 6px 6px 0;padding:10px 14px\"><b>2. Verificação obrigatória.<\u002Fb> Todos os dados de entrada, parâmetros adotados (V₀, S1, S2, S3, coeficientes) e resultados devem ser conferidos e validados pelo(a) profissional responsável antes de qualquer uso em projeto.<\u002Fdiv>\n            <div style=\"background:#fff;border:1px solid #c9cdb8;border-left:3px solid #d8a534;border-radius:0 6px 6px 0;padding:10px 14px\"><b>3. Limites de aplicação.<\u002Fb> O programa cobre casos usuais previstos na norma. Edificações de forma especial, muito flexíveis ou sujeitas a efeitos dinâmicos relevantes podem exigir estudos complementares (ensaios em túnel de vento, análise dinâmica).<\u002Fdiv>\n            <div style=\"background:#fff;border:1px solid #c9cdb8;border-left:3px solid #d8a534;border-radius:0 6px 6px 0;padding:10px 14px\"><b>4. Isenção de responsabilidade.<\u002Fb> Os autores e distribuidores do VentoPro não se responsabilizam por danos diretos ou indiretos decorrentes do uso, mau uso ou impossibilidade de uso do programa, nem por decisões de projeto nele baseadas.<\u002Fdiv>\n            <div style=\"background:#fff;border:1px solid #c9cdb8;border-left:3px solid #d8a534;border-radius:0 6px 6px 0;padding:10px 14px\"><b>5. Atualização normativa.<\u002Fb> É responsabilidade do usuário verificar a vigência da edição da norma e de eventuais erratas aplicáveis à data do projeto.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding:18px 26px 22px;border-top:1px solid #c9cdb8;background:#e7e3d7\">\n          <label sc-camel-on-click=\"{{ toggleAceite }}\" style=\"display:flex;align-items:flex-start;gap:10px;cursor:pointer;font-size:13.5px;color:#12222e;user-select:none\">\n            <span style=\"width:20px;height:20px;flex:none;border:2px solid {{ checkBorder }};border-radius:4px;background:{{ checkBg }};color:#12222e;display:inline-flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;margin-top:1px\">{{ checkMark }}<\u002Fspan>\n            <span>Declaro que li e <b>concordo<\u002Fb> com as advertências acima e que a utilização dos resultados é de minha inteira responsabilidade profissional.<\u002Fspan>\n          <\u002Flabel>\n          <sc-if value=\"{{ mostraAviso }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"margin-top:10px;padding:9px 13px;border-radius:6px;border-left:4px solid #b2622a;background:rgba(178,98,42,.12);color:#7a4319;font-size:12.5px\">É necessário concordar com os termos para acessar o sistema.<\u002Fdiv>\n          <\u002Fsc-if>\n          <div style=\"display:flex;gap:10px;margin-top:16px;flex-wrap:wrap\">\n            <button sc-camel-on-click=\"{{ entrar }}\" style=\"flex:2;min-width:200px;padding:12px;border:none;border-radius:6px;cursor:pointer;font-family:Georgia,serif;font-size:15px;font-weight:600;letter-spacing:.3px;background:{{ btnBg }};color:{{ btnColor }}\" style-hover=\"filter:brightness(1.08)\">Concordo — acessar o sistema<\u002Fbutton>\n            <button sc-camel-on-click=\"{{ recusar }}\" style=\"flex:1;min-width:120px;padding:12px;border:1px solid #c9cdb8;border-radius:6px;cursor:pointer;font-family:Georgia,serif;font-size:14px;background:transparent;color:#5b7183\" style-hover=\"background:#f2f0e9\">Não concordo<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:&quot;100%&quot;,&quot;height&quot;:&quot;720px&quot;},&quot;duracaoIntro&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:5,&quot;min&quot;:3,&quot;max&quot;:12,&quot;step&quot;:1,&quot;unit&quot;:&quot;s&quot;,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Introdução&quot;},&quot;permitirPular&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Introdução&quot;},&quot;intensidadeVento&quot;:{&quot;editor&quot;:&quot;range&quot;,&quot;default&quot;:1,&quot;min&quot;:0.5,&quot;max&quot;:2,&quot;step&quot;:0.1,&quot;tsType&quot;:&quot;number&quot;,&quot;section&quot;:&quot;Animação&quot;}}\">\nclass Component extends DCLogic {\n  state = { phase: 'intro', aceito: false, aviso: false };\n  canvasRef = React.createRef();\n  progressRef = React.createRef();\n\n  renderVals() {\n    const s = this.state;\n    return {\n      canvasRef: this.canvasRef,\n      progressRef: this.progressRef,\n      isIntro: s.phase === 'intro',\n      isLegal: s.phase === 'legal',\n      podePular: this.props.permitirPular ?? true,\n      pular: () => this.goLegal(),\n      aceito: s.aceito,\n      checkBorder: s.aceito ? '#d8a534' : '#5b7183',\n      checkBg: s.aceito ? '#d8a534' : '#ffffff',\n      checkMark: s.aceito ? '\\u2713' : '',\n      btnBg: s.aceito ? '#c2472e' : '#b8b4a6',\n      btnColor: s.aceito ? '#ffffff' : '#f2f0e9',\n      mostraAviso: s.aviso,\n      toggleAceite: () => this.setState(p => ({ aceito: !p.aceito, aviso: false })),\n      entrar: () => {\n        if (!this.state.aceito) { this.setState({ aviso: true }); return; }\n        window.location.href = (window.__resources && window.__resources.sistema) || '../uploads/vento_nbr6123.html';\n      },\n      recusar: () => this.setState({ aceito: false, aviso: true })\n    };\n  }\n\n  goLegal() {\n    if (this.state.phase !== 'intro') return;\n    this._introDone = true;\n    this.setState({ phase: 'legal' });\n  }\n\n  componentDidMount() {\n    this._alive = true;\n    const wait = () => {\n      if (!this._alive) return;\n      if (window.THREE && this.canvasRef.current) this.init3D();\n      else setTimeout(wait, 60);\n    };\n    wait();\n  }\n  componentWillUnmount() {\n    this._alive = false;\n    cancelAnimationFrame(this._raf);\n    if (this._renderer) this._renderer.dispose();\n    window.removeEventListener('resize', this._onResize);\n  }\n\n  init3D() {\n    const THREE = window.THREE, canvas = this.canvasRef.current;\n    const renderer = this._renderer = new THREE.WebGLRenderer({ canvas, antialias: true });\n    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));\n    const scene = new THREE.Scene();\n    scene.background = new THREE.Color(0x0c1822);\n    scene.fog = new THREE.Fog(0x0c1822, 260, 720);\n    const cam = new THREE.PerspectiveCamera(48, 1, 1, 2000);\n    this._onResize = () => {\n      renderer.setSize(innerWidth, innerHeight, false);\n      cam.aspect = innerWidth / innerHeight; cam.updateProjectionMatrix();\n    };\n    this._onResize(); window.addEventListener('resize', this._onResize);\n\n    scene.add(new THREE.HemisphereLight(0x8fb6cc, 0x101c26, 0.85));\n    const sun = new THREE.DirectionalLight(0xd8a534, 0.55);\n    sun.position.set(-180, 220, 120); scene.add(sun);\n    const fill = new THREE.DirectionalLight(0x2f6f8f, 0.4);\n    fill.position.set(160, 120, -140); scene.add(fill);\n\n    // ground\n    const ground = new THREE.Mesh(new THREE.PlaneGeometry(3000, 3000), new THREE.MeshLambertMaterial({ color: 0x0f1e2a }));\n    ground.rotation.x = -Math.PI / 2; scene.add(ground);\n    const grid = new THREE.GridHelper(1400, 46, 0x1f3a4d, 0x16293a);\n    grid.position.y = 0.2; scene.add(grid);\n\n    // city: slender modern towers\n    const buildings = []; // {x,z,hw,hd,h} for flow deflection\n    const rng = (() => { let s = 42; return () => (s = (s * 16807) % 2147483647) / 2147483647; })();\n    const boxGeo = new THREE.BoxGeometry(1, 1, 1); boxGeo.translate(0, 0.5, 0);\n    const palette = [0x1c3040, 0x24404f, 0x2c4a5c, 0x1a2a38, 0x33566a];\n    const edgeMat = new THREE.LineBasicMaterial({ color: 0x7fa8bf, transparent: true, opacity: 0.35 });\n    for (let gx = -5; gx <= 5; gx++) for (let gz = -4; gz <= 4; gz++) {\n      if (rng() < 0.18) continue;\n      const x = gx * 42 + (rng() - 0.5) * 14, z = gz * 42 + (rng() - 0.5) * 14;\n      const core = Math.max(0, 1 - (Math.abs(gx) + Math.abs(gz)) / 7);\n      const h = 22 + rng() * 55 + core * (90 + rng() * 110); // tall & slender in the core\n      const w = 9 + rng() * 8, d = 9 + rng() * 8;\n      const mat = new THREE.MeshLambertMaterial({ color: palette[(rng() * palette.length) | 0] });\n      const m = new THREE.Mesh(boxGeo, mat);\n      m.position.set(x, 0, z); m.scale.set(w, h, d); scene.add(m);\n      const eg = new THREE.LineSegments(new THREE.EdgesGeometry(boxGeo), edgeMat);\n      eg.position.copy(m.position); eg.scale.copy(m.scale); scene.add(eg);\n      if (h > 90 && rng() > 0.5) { // setback crown on the tallest\n        const m2 = new THREE.Mesh(boxGeo, mat);\n        m2.position.set(x, h, z); m2.scale.set(w * 0.55, h * 0.18, d * 0.55); scene.add(m2);\n      }\n      buildings.push({ x, z, hw: w / 2 + 4, hd: d / 2 + 4, h: h + 6 });\n    }\n\n    // wind particles with line trails\n    const intensity = this.props.intensidadeVento ?? 1;\n    const N = 420, TRAIL = 7;\n    const parts = [];\n    const spawn = (p) => {\n      p.x = -320 - Math.random() * 260;\n      p.y = 4 + Math.pow(Math.random(), 1.6) * 190;\n      p.z = (Math.random() - 0.5) * 420;\n      p.vx = (55 + Math.random() * 45) * intensity; p.vy = 0; p.vz = 0;\n      p.hist = Array.from({ length: TRAIL }, () => [p.x, p.y, p.z]);\n    };\n    for (let i = 0; i < N; i++) { const p = {}; spawn(p); p.x = -320 + Math.random() * 640; parts.push(p); }\n    const segCount = N * (TRAIL - 1);\n    const pos = new Float32Array(segCount * 6);\n    const col = new Float32Array(segCount * 6);\n    const lineGeo = new THREE.BufferGeometry();\n    lineGeo.setAttribute('position', new THREE.BufferAttribute(pos, 3));\n    lineGeo.setAttribute('color', new THREE.BufferAttribute(col, 3));\n    const lines = new THREE.LineSegments(lineGeo, new THREE.LineBasicMaterial({ vertexColors: true, transparent: true, opacity: 0.75, blending: THREE.AdditiveBlending, depthWrite: false }));\n    scene.add(lines);\n    const cA = new THREE.Color(0xd8a534), cB = new THREE.Color(0x8fd0e8);\n\n    const dur = (this.props.duracaoIntro ?? 5) * 1000;\n    const t0 = performance.now();\n    let last = t0;\n    const tick = (now) => {\n      if (!this._alive) return;\n      this._raf = requestAnimationFrame(tick);\n      const dt = Math.min((now - last) / 1000, 0.05); last = now;\n      const t = (now - t0) / 1000;\n\n      // camera: slow cinematic dolly\n      const k = Math.min(t / (dur / 1000), 1), e = 1 - Math.pow(1 - k, 2);\n      const ang = -0.45 + e * 0.35 + t * 0.012;\n      const r = 430 - e * 110, hgt = 200 - e * 60;\n      cam.position.set(Math.sin(ang) * r, hgt, Math.cos(ang) * r);\n      cam.lookAt(0, 55, 0);\n\n      // particles\n      for (let i = 0; i < N; i++) {\n        const p = parts[i];\n        let ax = 0, ay = -p.vy * 1.5, az = -p.vz * 1.5;\n        for (let b = 0; b < buildings.length; b++) {\n          const B = buildings[b];\n          const dx = p.x - B.x, dz = p.z - B.z;\n          if (p.y < B.h && Math.abs(dx) < B.hw + 14 && Math.abs(dz) < B.hd + 14) {\n            const side = dz >= 0 ? 1 : -1;\n            const prox = 1 - Math.max(Math.abs(dx) / (B.hw + 14), Math.abs(dz) / (B.hd + 14));\n            az += side * 900 * prox; ay += 520 * prox * (1 - p.y / B.h);\n            if (dx < 0) ax -= 300 * prox;\n          }\n        }\n        p.vx += ax * dt; p.vy += ay * dt; p.vz += az * dt;\n        p.vx += (70 * intensity - p.vx) * dt * 0.8;\n        p.x += p.vx * dt; p.y += p.vy * dt; p.z += p.vz * dt;\n        if (p.x > 340 || p.y < 1) spawn(p);\n        p.hist.pop(); p.hist.unshift([p.x, p.y, p.z]);\n        const heat = Math.min(p.y / 160, 1);\n        for (let s = 0; s < TRAIL - 1; s++) {\n          const o = (i * (TRAIL - 1) + s) * 6, a = p.hist[s], b2 = p.hist[s + 1];\n          pos[o] = a[0]; pos[o + 1] = a[1]; pos[o + 2] = a[2];\n          pos[o + 3] = b2[0]; pos[o + 4] = b2[1]; pos[o + 5] = b2[2];\n          const fade = (1 - s / (TRAIL - 1)) * 0.9;\n          const c = cA.clone().lerp(cB, heat);\n          col[o] = c.r * fade; col[o + 1] = c.g * fade; col[o + 2] = c.b * fade;\n          col[o + 3] = c.r * fade * 0.5; col[o + 4] = c.g * fade * 0.5; col[o + 5] = c.b * fade * 0.5;\n        }\n      }\n      lineGeo.attributes.position.needsUpdate = true;\n      lineGeo.attributes.color.needsUpdate = true;\n      renderer.render(scene, cam);\n\n      if (!this._introDone) {\n        const pr = this.progressRef.current;\n        if (pr) pr.style.width = Math.min((now - t0) / dur * 100, 100) + '%';\n        if (now - t0 >= dur) this.goLegal();\n      }\n    };\n    this._raf = requestAnimationFrame(tick);\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
